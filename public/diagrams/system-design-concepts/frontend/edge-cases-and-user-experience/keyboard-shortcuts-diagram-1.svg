<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Keyboard Event Processing Pipeline</text>

  <!-- Stage 1: Browser Event -->
  <rect x="30" y="60" width="160" height="90" rx="8" fill="#6d5bd0"/>
  <text x="110" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">1. Browser Event</text>
  <text x="42" y="100" font-size="9" fill="#ffffff">keydown fired</text>
  <text x="42" y="114" font-size="9" fill="#ffffff">event.key: &quot;s&quot;</text>
  <text x="42" y="128" font-size="9" fill="#ffffff">event.metaKey: true</text>
  <text x="42" y="142" font-size="9" fill="#ffffff">event.repeat: false</text>

  <line x1="190" y1="105" x2="220" y2="105" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 2: Input Filter -->
  <rect x="220" y="60" width="160" height="90" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="300" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">2. Input Filter</text>
  <text x="232" y="100" font-size="9" fill="#1a1822">Is focus in input/textarea?</text>
  <text x="232" y="114" font-size="9" fill="#1a1822">Is contentEditable active?</text>
  <text x="232" y="128" font-size="9" fill="#1a1822">Is modal capturing keys?</text>
  <text x="232" y="142" font-size="9" fill="#1a1822">→ Skip if text input</text>

  <line x1="380" y1="105" x2="410" y2="105" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 3: Normalizer -->
  <rect x="410" y="60" width="160" height="90" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="490" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">3. Key Normalizer</text>
  <text x="422" y="100" font-size="9" fill="#1a1822">Map Cmd→Ctrl (cross-OS)</text>
  <text x="422" y="114" font-size="9" fill="#1a1822">Normalize key codes</text>
  <text x="422" y="128" font-size="9" fill="#1a1822">Handle dead keys/IME</text>
  <text x="422" y="142" font-size="9" fill="#1a1822">→ Canonical: &quot;Mod+S&quot;</text>

  <line x1="570" y1="105" x2="600" y2="105" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 4: Scope Resolver -->
  <rect x="600" y="60" width="160" height="90" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="680" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">4. Scope Resolver</text>
  <text x="612" y="100" font-size="9" fill="#1a1822">Walk scope hierarchy:</text>
  <text x="612" y="114" font-size="9" fill="#1a1822">  element → panel →</text>
  <text x="612" y="128" font-size="9" fill="#1a1822">  page → global</text>
  <text x="612" y="142" font-size="9" fill="#1a1822">→ First match wins</text>

  <line x1="680" y1="150" x2="680" y2="175" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 5: Handler Dispatch -->
  <rect x="600" y="175" width="160" height="65" rx="8" fill="#6d5bd0"/>
  <text x="680" y="197" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">5. Dispatch</text>
  <text x="612" y="215" font-size="9" fill="#ffffff">preventDefault()</text>
  <text x="612" y="229" font-size="9" fill="#ffffff">Execute handler fn</text>

  <!-- Scope Hierarchy Detail -->
  <rect x="30" y="185" width="540" height="285" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="300" y="210" text-anchor="middle" font-size="14" font-weight="600" fill="#6d5bd0">Scope Hierarchy &amp; Priority Resolution</text>

  <!-- Global scope -->
  <rect x="50" y="225" width="500" height="230" rx="6" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="300" y="245" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Global Scope (priority: 0)</text>
  <text x="60" y="262" font-size="9" fill="#1a1822">Mod+K → Command palette | Mod+/ → Help | Esc → Close overlay</text>

  <!-- Page scope -->
  <rect x="70" y="275" width="460" height="165" rx="6" fill="#ffffff" stroke="#d7d1e6"/>
  <text x="300" y="295" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1822">Page Scope — Editor (priority: 1)</text>
  <text x="80" y="312" font-size="9" fill="#1a1822">Mod+S → Save | Mod+Z → Undo | Mod+Shift+Z → Redo</text>

  <!-- Panel scope -->
  <rect x="90" y="325" width="420" height="100" rx="6" fill="#f3f1f8" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="300" y="345" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Panel Scope — Canvas (priority: 2)</text>
  <text x="100" y="362" font-size="9" fill="#1a1822">Space → Pan tool | V → Select | R → Rectangle | T → Text</text>

  <!-- Element scope -->
  <rect x="110" y="375" width="380" height="40" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0"/>
  <text x="300" y="395" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Element Scope — Selected Shape (priority: 3, highest)</text>
  <text x="300" y="410" text-anchor="middle" font-size="9" fill="#1a1822">Delete → Remove shape | Enter → Edit text | Arrow keys → Nudge</text>

  <!-- Chord sequence -->
  <rect x="600" y="265" width="270" height="200" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="735" y="287" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Chord Sequences</text>
  <text x="615" y="310" font-size="10" fill="#1a1822">Multi-key combos (VS Code style):</text>

  <rect x="615" y="322" width="240" height="28" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="735" y="340" text-anchor="middle" font-size="9" fill="#1a1822">Mod+K → Mod+S = Save All</text>

  <rect x="615" y="355" width="240" height="28" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="735" y="373" text-anchor="middle" font-size="9" fill="#1a1822">Mod+K → Mod+C = Copy Path</text>

  <rect x="615" y="388" width="240" height="28" rx="4" fill="#f3f1f8" stroke="#d7d1e6"/>
  <text x="735" y="406" text-anchor="middle" font-size="9" fill="#1a1822">g → g = Go to top (Vim-style)</text>

  <text x="615" y="435" font-size="9" fill="#1a1822">Timeout: 1500ms between keys</text>
  <text x="615" y="450" font-size="9" fill="#1a1822">Show hint: &quot;Waiting for 2nd key...&quot;</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>
