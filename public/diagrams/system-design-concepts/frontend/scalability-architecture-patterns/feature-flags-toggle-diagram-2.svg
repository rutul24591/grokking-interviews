<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Feature Flag Evaluation Flow</title>
  <desc id="desc">Flow diagram showing client-side vs server-side feature flag evaluation with their trade-offs</desc>
  
  <!-- Background -->
  <rect width="800" height="450" fill="var(--bg-color, #ffffff)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="var(--text-color, #1a1a1a)">Feature Flag Evaluation: Client-Side vs Server-Side</text>
  
  <!-- Client-Side Evaluation -->
  <rect x="50" y="70" width="340" height="180" rx="8" fill="var(--primary-light, #e3f2fd)" stroke="var(--primary-color, #1976d2)" stroke-width="2"/>
  <text x="220" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--primary-color, #1976d2)">Client-Side Evaluation</text>
  
  <!-- Client flow -->
  <rect x="70" y="115" width="100" height="50" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="120" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--text-color, #1a1a1a)">App Loads</text>
  <text x="120" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Browser</text>
  
  <path d="M170 140 L200 140" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="200" y="115" width="100" height="50" rx="6" fill="var(--info-light, #e7f3ff)" stroke="var(--info-color, #0d6efd)" stroke-width="1"/>
  <text x="250" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--info-color, #0d6efd)">SDK Fetches</text>
  <text x="250" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Flag Config</text>
  
  <path d="M250 165 L250 195" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="200" y="195" width="100" height="40" rx="6" fill="var(--success-light, #d4edda)" stroke="var(--success-color, #28a745)" stroke-width="1"/>
  <text x="250" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--success-color, #28a745)">Evaluate</text>
  <text x="250" y="228" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Local rules</text>
  
  <path d="M170 215 L195 215" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="70" y="195" width="100" height="40" rx="6" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="1"/>
  <text x="120" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--warning-color, #ffc107)">Render UI</text>
  <text x="120" y="228" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Based on flag</text>
  
  <!-- Client characteristics -->
  <rect x="70" y="260" width="300" height="60" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="220" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--text-color, #1a1a1a)">Characteristics</text>
  <text x="85" y="300" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--success-color, #28a745)">✓ Sub-millisecond evaluation</text>
  <text x="85" y="313" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--error-color, #dc3545)">✗ Rules exposed to users</text>
  
  <!-- Server-Side Evaluation -->
  <rect x="410" y="70" width="340" height="180" rx="8" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="2"/>
  <text x="580" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text-color, #1a1a1a)">Server-Side Evaluation</text>
  
  <!-- Server flow -->
  <rect x="430" y="115" width="100" height="50" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="480" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--text-color, #1a1a1a)">Request</text>
  <text x="480" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Client → Server</text>
  
  <path d="M530 140 L560 140" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="560" y="115" width="100" height="50" rx="6" fill="var(--info-light, #e7f3ff)" stroke="var(--info-color, #0d6efd)" stroke-width="1"/>
  <text x="610" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--info-color, #0d6efd)">Flag Service</text>
  <text x="610" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Evaluate</text>
  
  <path d="M610 165 L610 195" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="560" y="195" width="100" height="40" rx="6" fill="var(--success-light, #d4edda)" stroke="var(--success-color, #28a745)" stroke-width="1"/>
  <text x="610" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--success-color, #28a745)">Return Value</text>
  <text x="610" y="228" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">true/false</text>
  
  <path d="M560 215 L530 215" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="430" y="195" width="100" height="40" rx="6" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="1"/>
  <text x="480" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--warning-color, #ffc107)">Render</text>
  <text x="480" y="228" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Server-side</text>
  
  <!-- Server characteristics -->
  <rect x="430" y="260" width="300" height="60" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="580" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--text-color, #1a1a1a)">Characteristics</text>
  <text x="445" y="300" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--success-color, #28a745)">✓ Rules stay confidential</text>
  <text x="445" y="313" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--error-color, #dc3545)">✗ Network latency added</text>
  
  <!-- Comparison Table -->
  <text x="400" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text-color, #1a1a1a)">Comparison</text>
  
  <rect x="100" y="365" width="600" height="75" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  
  <!-- Headers -->
  <rect x="100" y="365" width="150" height="25" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <rect x="250" y="365" width="225" height="25" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <rect x="475" y="365" width="225" height="25" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  
  <text x="175" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="var(--text-color, #1a1a1a)">Aspect</text>
  <text x="362" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="var(--text-color, #1a1a1a)">Client-Side</text>
  <text x="587" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="var(--text-color, #1a1a1a)">Server-Side</text>
  
  <!-- Row 1: Security -->
  <rect x="100" y="390" width="150" height="25" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <rect x="250" y="390" width="225" height="25" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <rect x="475" y="390" width="225" height="25" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  
  <text x="175" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-color, #1a1a1a)">Security</text>
  <text x="362" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--error-color, #dc3545)">Rules visible in bundle</text>
  <text x="587" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--success-color, #28a745)">Rules stay on server</text>
  
  <!-- Row 2: Performance -->
  <rect x="100" y="415" width="150" height="25" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  
  <text x="175" y="432" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-color, #1a1a1a)">Performance</text>
  <text x="362" y="432" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--success-color, #28a745)">Instant (local eval)</text>
  <text x="587" y="432" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--warning-color, #ffc107)">+Network latency</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-color, #1a1a1a)"/>
    </marker>
  </defs>
</svg>
