<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, sans-serif">
  <rect width="900" height="520" rx="12" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="2"/>

  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Shared Service Registry via Singletons</text>

  <!-- Service Registry (center) -->
  <rect x="310" y="60" width="280" height="80" rx="12" fill="#6d5bd0" stroke="#5a49b5" stroke-width="2"/>
  <text x="450" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Service Registry</text>
  <text x="450" y="112" text-anchor="middle" font-size="11" fill="#ffffff" fill-opacity="0.85">Central singleton holding all shared services</text>

  <!-- Three singleton services -->
  <rect x="60" y="200" width="200" height="90" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="60" y="200" width="200" height="30" rx="10" fill="#6d5bd0"/>
  <rect x="60" y="218" width="200" height="12" fill="#6d5bd0"/>
  <text x="160" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Logger Service</text>
  <text x="160" y="252" text-anchor="middle" font-size="11" fill="#1a1822">Singleton instance</text>
  <text x="160" y="268" text-anchor="middle" font-size="10" fill="#6d5bd0">log(), warn(), error()</text>
  <text x="160" y="282" text-anchor="middle" font-size="10" fill="#6d5bd0">Shared buffer &amp; transport</text>

  <rect x="350" y="200" width="200" height="90" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="350" y="200" width="200" height="30" rx="10" fill="#6d5bd0"/>
  <rect x="350" y="218" width="200" height="12" fill="#6d5bd0"/>
  <text x="450" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Config Service</text>
  <text x="450" y="252" text-anchor="middle" font-size="11" fill="#1a1822">Singleton instance</text>
  <text x="450" y="268" text-anchor="middle" font-size="10" fill="#6d5bd0">get(), set(), reload()</text>
  <text x="450" y="282" text-anchor="middle" font-size="10" fill="#6d5bd0">Feature flags &amp; env vars</text>

  <rect x="640" y="200" width="200" height="90" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="640" y="200" width="200" height="30" rx="10" fill="#6d5bd0"/>
  <rect x="640" y="218" width="200" height="12" fill="#6d5bd0"/>
  <text x="740" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Cache Service</text>
  <text x="740" y="252" text-anchor="middle" font-size="11" fill="#1a1822">Singleton instance</text>
  <text x="740" y="268" text-anchor="middle" font-size="10" fill="#6d5bd0">get(), set(), invalidate()</text>
  <text x="740" y="282" text-anchor="middle" font-size="10" fill="#6d5bd0">In-memory LRU cache</text>

  <!-- Lines from registry to services -->
  <line x1="380" y1="140" x2="160" y2="200" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr1)"/>
  <line x1="450" y1="140" x2="450" y2="200" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr1)"/>
  <line x1="520" y1="140" x2="740" y2="200" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr1)"/>

  <!-- Consumers -->
  <rect x="40" y="380" width="160" height="60" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="120" y="408" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Dashboard Page</text>
  <text x="120" y="424" text-anchor="middle" font-size="10" fill="#6d5bd0">Uses: Logger, Config</text>

  <rect x="230" y="380" width="160" height="60" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="310" y="408" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Auth Module</text>
  <text x="310" y="424" text-anchor="middle" font-size="10" fill="#6d5bd0">Uses: Logger, Cache</text>

  <rect x="420" y="380" width="160" height="60" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="500" y="408" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">API Client</text>
  <text x="500" y="424" text-anchor="middle" font-size="10" fill="#6d5bd0">Uses: Config, Cache</text>

  <rect x="610" y="380" width="160" height="60" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="690" y="408" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1822">Analytics</text>
  <text x="690" y="424" text-anchor="middle" font-size="10" fill="#6d5bd0">Uses: Logger, Config</text>

  <!-- Lines from consumers up to services (dashed) -->
  <line x1="100" y1="380" x2="130" y2="290" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="140" y1="380" x2="420" y2="290" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>

  <line x1="290" y1="380" x2="160" y2="290" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="330" y1="380" x2="710" y2="290" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>

  <line x1="480" y1="380" x2="480" y2="290" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="520" y1="380" x2="740" y2="290" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>

  <line x1="670" y1="380" x2="190" y2="290" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="710" y1="380" x2="450" y2="290" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Key -->
  <rect x="40" y="470" width="820" height="35" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="60" y="492" font-size="11" font-weight="600" fill="#1a1822">Key:</text>
  <line x1="95" y1="487" x2="135" y2="487" stroke="#6d5bd0" stroke-width="2"/>
  <text x="142" y="492" font-size="11" fill="#1a1822">Registry owns service</text>
  <line x1="290" y1="487" x2="330" y2="487" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="337" y="492" font-size="11" fill="#1a1822">Consumer accesses singleton (same reference)</text>
  <text x="630" y="492" font-size="11" fill="#6d5bd0" font-weight="600">All consumers share the same instance per service</text>

  <defs>
    <marker id="arr1" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>