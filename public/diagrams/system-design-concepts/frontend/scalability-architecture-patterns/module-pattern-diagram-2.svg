<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="900" height="540" rx="8" fill="#f3f1f8"/>

  <text x="450" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a1822">Module Dependency Graph</text>
  <text x="450" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#888888">Directed graph showing import relationships between modules</text>

  <!-- Entry point -->
  <rect x="350" y="70" width="200" height="50" rx="10" fill="#6d5bd0" stroke="#5a4ab5" stroke-width="2"/>
  <text x="450" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">app/index.js</text>
  <text x="450" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#d4d0e8">Entry Point</text>

  <!-- Level 2 nodes -->
  <!-- Router -->
  <rect x="40" y="175" width="180" height="45" rx="8" fill="#6d5bd0" stroke="#5a4ab5" stroke-width="2"/>
  <text x="130" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">router.js</text>

  <!-- Store -->
  <rect x="260" y="175" width="180" height="45" rx="8" fill="#6d5bd0" stroke="#5a4ab5" stroke-width="2"/>
  <text x="350" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">store/index.js</text>

  <!-- API -->
  <rect x="480" y="175" width="180" height="45" rx="8" fill="#6d5bd0" stroke="#5a4ab5" stroke-width="2"/>
  <text x="570" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">api/client.js</text>

  <!-- Config -->
  <rect x="700" y="175" width="160" height="45" rx="8" fill="#2f9d74" stroke="#248a64" stroke-width="2"/>
  <text x="780" y="202" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">config.js</text>

  <!-- Arrows from entry to level 2 -->
  <line x1="390" y1="120" x2="170" y2="175" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrPurple)"/>
  <line x1="430" y1="120" x2="350" y2="175" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrPurple)"/>
  <line x1="490" y1="120" x2="550" y2="175" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrPurple)"/>
  <line x1="520" y1="120" x2="760" y2="175" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrPurple)"/>

  <!-- Level 3 nodes -->
  <!-- HomePage -->
  <rect x="20" y="285" width="150" height="45" rx="8" fill="#4a90d9" stroke="#3a7ac5" stroke-width="2"/>
  <text x="95" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">HomePage.js</text>

  <!-- DashboardPage -->
  <rect x="190" y="285" width="160" height="45" rx="8" fill="#4a90d9" stroke="#3a7ac5" stroke-width="2"/>
  <text x="270" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">DashboardPage.js</text>

  <!-- userSlice -->
  <rect x="370" y="285" width="150" height="45" rx="8" fill="#d4a843" stroke="#b89235" stroke-width="2"/>
  <text x="445" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">userSlice.js</text>

  <!-- cartSlice -->
  <rect x="540" y="285" width="150" height="45" rx="8" fill="#d4a843" stroke="#b89235" stroke-width="2"/>
  <text x="615" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">cartSlice.js</text>

  <!-- httpUtils -->
  <rect x="710" y="285" width="160" height="45" rx="8" fill="#2f9d74" stroke="#248a64" stroke-width="2"/>
  <text x="790" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">httpUtils.js</text>

  <!-- Arrows level 2 to level 3 -->
  <line x1="100" y1="220" x2="85" y2="285" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <line x1="160" y1="220" x2="240" y2="285" stroke="#4a90d9" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <line x1="350" y1="220" x2="420" y2="285" stroke="#d4a843" stroke-width="1.5" marker-end="url(#arrYellow)"/>
  <line x1="380" y1="220" x2="590" y2="285" stroke="#d4a843" stroke-width="1.5" marker-end="url(#arrYellow)"/>
  <line x1="600" y1="220" x2="760" y2="285" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- Level 4: shared utilities -->
  <rect x="150" y="395" width="160" height="45" rx="8" fill="#2f9d74" stroke="#248a64" stroke-width="2"/>
  <text x="230" y="422" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">utils/format.js</text>

  <rect x="370" y="395" width="170" height="45" rx="8" fill="#2f9d74" stroke="#248a64" stroke-width="2"/>
  <text x="455" y="422" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">utils/validators.js</text>

  <rect x="600" y="395" width="170" height="45" rx="8" fill="#2f9d74" stroke="#248a64" stroke-width="2"/>
  <text x="685" y="422" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">utils/constants.js</text>

  <!-- Cross-cutting arrows -->
  <line x1="95" y1="330" x2="200" y2="395" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <line x1="270" y1="330" x2="230" y2="395" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <line x1="445" y1="330" x2="430" y2="395" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <line x1="615" y1="330" x2="480" y2="395" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <line x1="790" y1="330" x2="685" y2="395" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- Circular dependency warning -->
  <path d="M 445 330 Q 520 365 615 330" stroke="#c44d4d" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrRed)"/>
  <path d="M 615 330 Q 520 365 445 330" stroke="#c44d4d" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrRed)"/>
  <text x="530" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#c44d4d" font-weight="bold">Circular Dep!</text>

  <!-- Legend -->
  <rect x="30" y="465" width="840" height="60" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1"/>
  <text x="50" y="486" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1a1822">Legend:</text>

  <rect x="110" y="476" width="14" height="14" rx="3" fill="#6d5bd0"/>
  <text x="130" y="488" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Core Infrastructure</text>

  <rect x="260" y="476" width="14" height="14" rx="3" fill="#4a90d9"/>
  <text x="280" y="488" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Page Components</text>

  <rect x="390" y="476" width="14" height="14" rx="3" fill="#d4a843"/>
  <text x="410" y="488" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">State Slices</text>

  <rect x="510" y="476" width="14" height="14" rx="3" fill="#2f9d74"/>
  <text x="530" y="488" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Shared Utilities</text>

  <line x1="650" y1="483" x2="680" y2="483" stroke="#c44d4d" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="690" y="488" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Circular Dependency (anti-pattern)</text>

  <text x="50" y="510" font-family="system-ui, sans-serif" font-size="10" fill="#888888">Arrows indicate import direction: importing module points to its dependency. Bundlers traverse this graph for tree shaking &amp; code splitting.</text>

  <!-- Markers -->
  <defs>
    <marker id="arrPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90d9"/>
    </marker>
    <marker id="arrYellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d4a843"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c44d4d"/>
    </marker>
  </defs>
</svg>