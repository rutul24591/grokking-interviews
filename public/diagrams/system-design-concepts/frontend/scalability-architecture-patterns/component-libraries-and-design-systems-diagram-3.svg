<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Component Library Versioning Strategy</title>
  <desc id="desc">Component library versioning flow showing semantic versioning, codemods for migration, and deprecation lifecycle</desc>
  
  <!-- Background -->
  <rect width="800" height="450" fill="var(--bg-color, #ffffff)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="var(--text-color, #1a1a1a)">Component Library Versioning Strategy</text>
  
  <!-- Semantic Versioning -->
  <rect x="50" y="70" width="220" height="140" rx="8" fill="var(--primary-light, #e3f2fd)" stroke="var(--primary-color, #1976d2)" stroke-width="2"/>
  <text x="160" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--primary-color, #1976d2)">Semantic Versioning</text>
  
  <rect x="70" y="115" width="180" height="35" rx="4" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="160" y="135" text-anchor="middle" font-family="monospace" font-size="11" font-weight="600" fill="var(--text-color, #1a1a1a)">MAJOR.MINOR.PATCH</text>
  <text x="160" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">2.1.3</text>
  
  <text x="70" y="170" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">
    <tspan x="70" dy="0">MAJOR:</tspan>
    <tspan x="130" dy="0" fill="var(--error-color, #dc3545)" font-weight="600">Breaking changes</tspan>
  </text>
  <text x="70" y="185" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">
    <tspan x="70" dy="0">MINOR:</tspan>
    <tspan x="130" dy="0" fill="var(--success-color, #28a745)" font-weight="600">New features</tspan>
  </text>
  <text x="70" y="200" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">
    <tspan x="70" dy="0">PATCH:</tspan>
    <tspan x="130" dy="0" fill="var(--info-color, #0d6efd)" font-weight="600">Bug fixes</tspan>
  </text>
  
  <!-- Breaking Change Flow -->
  <rect x="290" y="70" width="460" height="140" rx="8" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="2"/>
  <text x="520" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text-color, #1a1a1a)">Breaking Change Migration Flow</text>
  
  <!-- Step 1 -->
  <rect x="310" y="115" width="80" height="35" rx="4" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="1"/>
  <text x="350" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="var(--warning-color, #ffc107)">v1.0.0</text>
  <text x="350" y="143" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Current</text>
  
  <path d="M390 132 L420 132" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="405" y="127" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Deprecate</text>
  
  <!-- Step 2 -->
  <rect x="420" y="115" width="80" height="35" rx="4" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="1"/>
  <text x="460" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="var(--warning-color, #ffc107)">v1.5.0</text>
  <text x="460" y="143" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Deprecation</text>
  
  <path d="M500 132 L530 132" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="515" y="127" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Codemod</text>
  
  <!-- Step 3 -->
  <rect x="530" y="115" width="80" height="35" rx="4" fill="var(--info-light, #e7f3ff)" stroke="var(--info-color, #0d6efd)" stroke-width="1"/>
  <text x="570" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="var(--info-color, #0d6efd)">v2.0.0</text>
  <text x="570" y="143" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Breaking</text>
  
  <path d="M610 132 L640 132" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="625" y="127" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Migrate</text>
  
  <!-- Step 4 -->
  <rect x="640" y="115" width="80" height="35" rx="4" fill="var(--success-light, #d4edda)" stroke="var(--success-color, #28a745)" stroke-width="1"/>
  <text x="680" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="var(--success-color, #28a745)">v2.x.y</text>
  <text x="680" y="143" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Adopted</text>
  
  <!-- Codemod Example -->
  <rect x="310" y="165" width="420" height="35" rx="4" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="520" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--text-color, #1a1a1a)">Codemod: Automated Migration</text>
  <text x="520" y="193" text-anchor="middle" font-family="monospace" font-size="8" fill="var(--text-muted, #666666)">npx @my-org/codemods v1-to-v2</text>
  
  <!-- Deprecation Timeline -->
  <text x="400" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text-color, #1a1a1a)">Deprecation Timeline</text>
  
  <rect x="100" y="270" width="600" height="80" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  
  <!-- Timeline -->
  <path d="M130 310 L670 310" stroke="var(--text-color, #1a1a1a)" stroke-width="2"/>
  
  <!-- v1.0 release -->
  <circle cx="130" cy="310" r="6" fill="var(--success-color, #28a745)"/>
  <text x="130" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">v1.0</text>
  <text x="130" y="342" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Release</text>
  
  <!-- Deprecation warning -->
  <rect x="230" y="285" width="100" height="50" rx="4" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="1"/>
  <text x="280" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="var(--warning-color, #ffc107)">v1.5.0</text>
  <text x="280" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Deprecation</text>
  <text x="280" y="332" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="var(--text-muted, #666666)">warnings</text>
  
  <!-- v2.0 release -->
  <circle cx="400" cy="310" r="6" fill="var(--error-color, #dc3545)"/>
  <text x="400" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">v2.0</text>
  <text x="400" y="342" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Breaking</text>
  
  <!-- v1.x EOL -->
  <rect x="500" y="285" width="100" height="50" rx="4" fill="var(--error-light, #f8d7da)" stroke="var(--error-color, #dc3545)" stroke-width="1"/>
  <text x="550" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="var(--error-color, #dc3545)">v1.x EOL</text>
  <text x="550" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">6-12 months</text>
  <text x="550" y="332" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="var(--text-muted, #666666)">security only</text>
  
  <!-- v2.x adoption -->
  <circle cx="670" cy="310" r="6" fill="var(--success-color, #28a745)"/>
  <text x="670" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">v2.x</text>
  <text x="670" y="342" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Adoption</text>
  
  <!-- Time markers -->
  <text x="130" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Month 0</text>
  <text x="280" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Month 3</text>
  <text x="400" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Month 6</text>
  <text x="550" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Month 12-18</text>
  <text x="670" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Ongoing</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-color, #1a1a1a)"/>
    </marker>
  </defs>
</svg>
