<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="900" height="500" rx="8" fill="#f3f1f8"/>

  <text x="450" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a1822">Feature Flag Evaluation Pipeline</text>

  <!-- Step 1: User Context -->
  <rect x="30" y="70" width="120" height="90" rx="8" fill="#6d5bd0" stroke="#5a4ab5" stroke-width="1.5"/>
  <text x="90" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">User Context</text>
  <text x="90" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">userId</text>
  <text x="90" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">email / org</text>
  <text x="90" y="146" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">attributes</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="115" x2="190" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 2: Flag Service / SDK -->
  <rect x="190" y="70" width="130" height="90" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="255" y="97" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#6d5bd0">Flag Service</text>
  <text x="255" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">SDK Init</text>
  <text x="255" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Flag Cache</text>
  <text x="255" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Streaming Updates</text>

  <!-- Arrow 2 -->
  <line x1="320" y1="115" x2="360" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 3: Rules Engine -->
  <rect x="360" y="70" width="130" height="90" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="425" y="97" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#6d5bd0">Rules Engine</text>
  <text x="425" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Prerequisite Flags</text>
  <text x="425" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Segment Match</text>
  <text x="425" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Override Rules</text>

  <!-- Arrow 3 -->
  <line x1="490" y1="115" x2="530" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 4: Targeting -->
  <rect x="530" y="70" width="130" height="90" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="595" y="97" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#6d5bd0">Targeting</text>
  <text x="595" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">% Rollout</text>
  <text x="595" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Sticky Bucketing</text>
  <text x="595" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">User Segments</text>

  <!-- Arrow 4 -->
  <line x1="660" y1="115" x2="700" y2="115" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Step 5: Evaluated Value -->
  <rect x="700" y="70" width="170" height="90" rx="8" fill="#2f9d74" stroke="#248a64" stroke-width="1.5"/>
  <text x="785" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Evaluated Value</text>
  <text x="785" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">boolean | string |</text>
  <text x="785" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">number | JSON</text>
  <text x="785" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff">+ evaluation reason</text>

  <!-- Vertical arrow from Evaluated Value to Component -->
  <line x1="785" y1="160" x2="785" y2="200" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 6: Component Rendering -->
  <rect x="670" y="200" width="200" height="80" rx="8" fill="#ffffff" stroke="#2f9d74" stroke-width="2"/>
  <text x="770" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#2f9d74">Component Rendering</text>
  <text x="770" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Conditional UI branches</text>
  <text x="770" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Feature gating logic</text>

  <!-- Server-side evaluation path (below) -->
  <rect x="30" y="210" width="400" height="45" rx="6" fill="#6d5bd0" fill-opacity="0.08" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="230" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#6d5bd0">Server-Side Evaluation (SSR / Edge)</text>
  <text x="230" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Flag resolved on server before HTML is sent to client -- no layout shift</text>

  <!-- Client-side evaluation path -->
  <rect x="30" y="270" width="400" height="45" rx="6" fill="#2f9d74" fill-opacity="0.08" stroke="#2f9d74" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="230" y="288" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#2f9d74">Client-Side Evaluation (SPA / CSR)</text>
  <text x="230" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">SDK downloads flag ruleset, evaluates locally -- fast but flicker risk</text>

  <!-- Data flow: Flag Config Source -->
  <rect x="30" y="350" width="840" height="120" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#1a1822">Flag Configuration Source</text>

  <rect x="55" y="390" width="150" height="60" rx="6" fill="#6d5bd0" fill-opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="130" y="413" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#6d5bd0">Dashboard UI</text>
  <text x="130" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Product / Eng toggle</text>
  <text x="130" y="444" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">flags in real-time</text>

  <rect x="230" y="390" width="150" height="60" rx="6" fill="#6d5bd0" fill-opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="305" y="413" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#6d5bd0">API / REST</text>
  <text x="305" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">CI/CD pipelines</text>
  <text x="305" y="444" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">set flags on deploy</text>

  <rect x="405" y="390" width="150" height="60" rx="6" fill="#6d5bd0" fill-opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="480" y="413" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#6d5bd0">SSE / WebSocket</text>
  <text x="480" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Real-time streaming</text>
  <text x="480" y="444" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">flag change events</text>

  <rect x="580" y="390" width="150" height="60" rx="6" fill="#6d5bd0" fill-opacity="0.1" stroke="#6d5bd0" stroke-width="1"/>
  <text x="655" y="413" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#6d5bd0">Local Overrides</text>
  <text x="655" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">Dev/QA localStorage</text>
  <text x="655" y="444" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822">URL query params</text>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8" fill="#2f9d74"/>
    </marker>
  </defs>
</svg>