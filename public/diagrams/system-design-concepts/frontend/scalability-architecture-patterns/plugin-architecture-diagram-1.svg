<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Plugin Architecture Host-Plugin Model</title>
  <desc id="desc">Architecture diagram showing plugin host application with extension points, plugin registry, and sandboxed plugin execution</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--bg-color, #ffffff)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="var(--text-color, #1a1a1a)">Plugin Architecture Model</text>
  
  <!-- Host Application -->
  <rect x="50" y="70" width="500" height="380" rx="8" fill="var(--primary-light, #e3f2fd)" stroke="var(--primary-color, #1976d2)" stroke-width="3"/>
  <text x="300" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="var(--primary-color, #1976d2)">Host Application</text>
  
  <!-- Core Application -->
  <rect x="70" y="115" width="200" height="100" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="2"/>
  <text x="170" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="var(--text-color, #1a1a1a)">Core Application</text>
  <text x="170" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Main functionality</text>
  <text x="170" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Business logic</text>
  <text x="170" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">UI framework</text>
  
  <!-- Extension Points -->
  <rect x="70" y="235" width="200" height="80" rx="6" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="2"/>
  <text x="170" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="var(--warning-color, #ffc107)">Extension Points</text>
  <text x="170" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Hooks, APIs, Events</text>
  <text x="170" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">UI slots, Commands</text>
  
  <!-- Plugin Registry -->
  <rect x="290" y="115" width="240" height="100" rx="6" fill="var(--info-light, #e7f3ff)" stroke="var(--info-color, #0d6efd)" stroke-width="2"/>
  <text x="410" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="var(--info-color, #0d6efd)">Plugin Registry</text>
  <text x="410" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Discovery &amp; Loading</text>
  <text x="410" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Lifecycle Management</text>
  <text x="410" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">API Bridge</text>
  
  <!-- Plugin Sandbox -->
  <rect x="290" y="235" width="240" height="80" rx="6" fill="var(--success-light, #d4edda)" stroke="var(--success-color, #28a745)" stroke-width="2"/>
  <text x="410" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="var(--success-color, #28a745)">Plugin Sandbox</text>
  <text x="410" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Isolated Execution</text>
  <text x="410" y="295" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Capability Restrictions</text>
  
  <!-- Arrows -->
  <path d="M270 165 L285 165" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M270 275 L285 275" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M410 215 L410 230" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Plugins -->
  <rect x="570" y="70" width="180" height="120" rx="8" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="2"/>
  <text x="660" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text-color, #1a1a1a)">Plugins</text>
  
  <!-- Plugin 1 -->
  <rect x="585" y="110" width="150" height="30" rx="4" fill="var(--bg-color, #ffffff)" stroke="var(--success-color, #28a745)" stroke-width="1"/>
  <text x="660" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--success-color, #28a745)">Plugin A</text>
  
  <!-- Plugin 2 -->
  <rect x="585" y="145" width="150" height="30" rx="4" fill="var(--bg-color, #ffffff)" stroke="var(--success-color, #28a745)" stroke-width="1"/>
  <text x="660" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--success-color, #28a745)">Plugin B</text>
  
  <!-- Connection to Registry -->
  <path d="M585 130 L560 130 L560 165" stroke="var(--success-color, #28a745)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <path d="M585 165 L560 165" stroke="var(--success-color, #28a745)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  
  <!-- Sandboxing Strategies -->
  <rect x="570" y="210" width="180" height="140" rx="8" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="2"/>
  <text x="660" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text-color, #1a1a1a)">Sandboxing</text>
  
  <rect x="585" y="250" width="150" height="25" rx="4" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="660" y="267" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">Iframe (Complete)</text>
  
  <rect x="585" y="280" width="150" height="25" rx="4" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="660" y="297" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">Web Worker (JS only)</text>
  
  <rect x="585" y="310" width="150" height="25" rx="4" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="660" y="327" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">Capability-based</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-color, #1a1a1a)"/>
    </marker>
  </defs>
</svg>
