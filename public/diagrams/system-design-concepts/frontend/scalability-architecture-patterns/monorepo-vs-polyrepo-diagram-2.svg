<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Monorepo Affected Detection and Build Caching</title>
  <desc id="desc">Flow diagram showing how monorepo tools detect affected packages and use remote caching to skip unchanged builds</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--bg-color, #ffffff)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="var(--text-color, #1a1a1a)">Affected Detection &amp; Remote Caching</text>
  
  <!-- Left side: Affected Detection -->
  <rect x="50" y="70" width="340" height="200" rx="8" fill="var(--primary-light, #e3f2fd)" stroke="var(--primary-color, #1976d2)" stroke-width="2"/>
  <text x="220" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--primary-color, #1976d2)">Affected Detection</text>
  
  <!-- Git diff -->
  <rect x="70" y="115" width="100" height="50" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="120" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--text-color, #1a1a1a)">git diff</text>
  <text x="120" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">main...HEAD</text>
  
  <path d="M170 140 L200 140" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Changed files -->
  <rect x="200" y="115" width="100" height="50" rx="6" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="1"/>
  <text x="250" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--warning-color, #ffc107)">Changed</text>
  <text x="250" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">packages/utils</text>
  
  <path d="M250 165 L250 195" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="265" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Analyze</text>
  
  <!-- Dependency graph -->
  <rect x="200" y="195" width="100" height="60" rx="6" fill="var(--info-light, #e7f3ff)" stroke="var(--info-color, #0d6efd)" stroke-width="1"/>
  <text x="250" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--info-color, #0d6efd)">Dep Graph</text>
  <text x="250" y="232" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Find dependents</text>
  <text x="250" y="247" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">utils → ui-lib → web</text>
  
  <path d="M170 225 L195 225" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Affected packages -->
  <rect x="70" y="195" width="100" height="60" rx="6" fill="var(--success-light, #d4edda)" stroke="var(--success-color, #28a745)" stroke-width="2"/>
  <text x="120" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--success-color, #28a745)">Affected</text>
  <text x="120" y="232" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">packages/utils</text>
  <text x="120" y="247" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">packages/ui-lib</text>
  
  <!-- Right side: Remote Caching -->
  <rect x="410" y="70" width="340" height="200" rx="8" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="2"/>
  <text x="580" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text-color, #1a1a1a)">Remote Cache</text>
  
  <!-- Local build -->
  <rect x="430" y="115" width="100" height="50" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="480" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--text-color, #1a1a1a)">Local Build</text>
  <text x="480" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Compute hash</text>
  
  <path d="M530 140 L560 140" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="545" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Query</text>
  
  <!-- Remote cache -->
  <rect x="560" y="115" width="100" height="50" rx="6" fill="var(--info-light, #e7f3ff)" stroke="var(--info-color, #0d6efd)" stroke-width="2"/>
  <text x="610" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--info-color, #0d6efd)">Remote Cache</text>
  <text x="610" y="152" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Vercel/Nx Cloud</text>
  
  <path d="M610 165 L610 195" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Cache hit/miss -->
  <rect x="560" y="195" width="100" height="60" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="610" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--text-color, #1a1a1a)">Cache Hit?</text>
  
  <!-- Hit path -->
  <path d="M560 225 L530 225" stroke="var(--success-color, #28a745)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="545" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--success-color, #28a745)" font-weight="600">Yes</text>
  
  <!-- Miss path -->
  <path d="M610 255 L610 285 L530 285 L530 315" stroke="var(--error-color, #dc3545)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="625" y="275" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--error-color, #dc3545)" font-weight="600">No</text>
  <text x="545" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Build &amp; upload</text>
  
  <!-- Downloaded cache -->
  <rect x="430" y="195" width="100" height="60" rx="6" fill="var(--success-light, #d4edda)" stroke="var(--success-color, #28a745)" stroke-width="2"/>
  <text x="480" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--success-color, #28a745)">Download</text>
  <text x="480" y="232" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Cached artifacts</text>
  <text x="480" y="247" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Skip build!</text>
  
  <!-- Built locally -->
  <rect x="430" y="285" width="100" height="60" rx="6" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="2"/>
  <text x="480" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--warning-color, #ffc107)">Build</text>
  <text x="480" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Run locally</text>
  <text x="480" y="337" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Upload result</text>
  
  <!-- Bottom: Impact comparison -->
  <text x="400" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text-color, #1a1a1a)">Build Time Impact</text>
  
  <!-- Without cache -->
  <rect x="100" y="400" width="280" height="80" rx="6" fill="var(--error-light, #f8d7da)" stroke="var(--error-color, #dc3545)" stroke-width="2"/>
  <text x="240" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--error-color, #dc3545)">Without Remote Cache</text>
  <text x="240" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">Build all affected packages</text>
  <text x="240" y="467" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">~15 minutes</text>
  
  <!-- With cache -->
  <rect x="420" y="400" width="280" height="80" rx="6" fill="var(--success-light, #d4edda)" stroke="var(--success-color, #28a745)" stroke-width="2"/>
  <text x="560" y="425" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--success-color, #28a745)">With Remote Cache</text>
  <text x="560" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">Download cached artifacts</text>
  <text x="560" y="467" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">~2 minutes (87% faster)</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-color, #1a1a1a)"/>
    </marker>
  </defs>
</svg>
