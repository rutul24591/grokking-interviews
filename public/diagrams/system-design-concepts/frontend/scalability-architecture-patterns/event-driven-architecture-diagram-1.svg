<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="900" height="500" rx="8" fill="#f3f1f8"/>

  <text x="450" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1a1822">Event Topology: Producers, Channel &amp; Consumers</text>

  <!-- Producers Column -->
  <text x="130" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#6d5bd0">Event Producers</text>

  <rect x="30" y="85" width="200" height="50" rx="8" fill="#6d5bd0" stroke="#5a4cb0" stroke-width="1.5"/>
  <text x="130" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">User Interaction</text>

  <rect x="30" y="150" width="200" height="50" rx="8" fill="#6d5bd0" stroke="#5a4cb0" stroke-width="1.5"/>
  <text x="130" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">API Response Handler</text>

  <rect x="30" y="215" width="200" height="50" rx="8" fill="#6d5bd0" stroke="#5a4cb0" stroke-width="1.5"/>
  <text x="130" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">WebSocket Message</text>

  <rect x="30" y="280" width="200" height="50" rx="8" fill="#6d5bd0" stroke="#5a4cb0" stroke-width="1.5"/>
  <text x="130" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Timer / Scheduler</text>

  <rect x="30" y="345" width="200" height="50" rx="8" fill="#6d5bd0" stroke="#5a4cb0" stroke-width="1.5"/>
  <text x="130" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">State Change Observer</text>

  <!-- Arrows from Producers to Event Bus -->
  <line x1="230" y1="110" x2="330" y2="230" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="230" y1="175" x2="330" y2="230" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="230" y1="240" x2="330" y2="240" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="230" y1="305" x2="330" y2="250" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="230" y1="370" x2="330" y2="255" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Event Bus / Channel -->
  <rect x="330" y="130" width="240" height="230" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="3"/>
  <rect x="345" y="145" width="210" height="35" rx="6" fill="#6d5bd0"/>
  <text x="450" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">Event Bus / Channel</text>

  <rect x="355" y="195" width="190" height="30" rx="5" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">Topic: user.action</text>

  <rect x="355" y="235" width="190" height="30" rx="5" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">Topic: data.updated</text>

  <rect x="355" y="275" width="190" height="30" rx="5" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">Topic: system.notification</text>

  <rect x="355" y="315" width="190" height="30" rx="5" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="450" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">Topic: error.occurred</text>

  <!-- Arrows from Event Bus to Consumers -->
  <line x1="570" y1="230" x2="670" y2="110" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="570" y1="235" x2="670" y2="180" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="570" y1="245" x2="670" y2="250" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="570" y1="255" x2="670" y2="320" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Consumers Column -->
  <text x="770" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#2f9d74">Event Consumers</text>

  <rect x="670" y="85" width="200" height="50" rx="8" fill="#2f9d74" stroke="#248a64" stroke-width="1.5"/>
  <text x="770" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">UI Component A</text>

  <rect x="670" y="155" width="200" height="50" rx="8" fill="#2f9d74" stroke="#248a64" stroke-width="1.5"/>
  <text x="770" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">State Manager</text>

  <rect x="670" y="225" width="200" height="50" rx="8" fill="#2f9d74" stroke="#248a64" stroke-width="1.5"/>
  <text x="770" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Analytics Logger</text>

  <rect x="670" y="295" width="200" height="50" rx="8" fill="#2f9d74" stroke="#248a64" stroke-width="1.5"/>
  <text x="770" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">Error Handler</text>

  <!-- Legend -->
  <rect x="30" y="430" width="840" height="55" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="50" y="455" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#1a1822">Key:</text>
  <rect x="85" y="442" width="16" height="16" rx="3" fill="#6d5bd0"/>
  <text x="108" y="455" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">Producer emits events</text>
  <rect x="270" y="442" width="16" height="16" rx="3" fill="#2f9d74"/>
  <text x="293" y="455" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">Consumer subscribes to topics</text>
  <text x="510" y="455" font-family="system-ui, sans-serif" font-size="11" fill="#1a1822">Producers and consumers are fully decoupled via the event channel</text>
  <text x="50" y="475" font-family="system-ui, sans-serif" font-size="10" fill="#888888">Multiple consumers can subscribe to the same topic; producers need no knowledge of who is listening</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
  </defs>
</svg>