<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">State Propagation in React (Observer Pattern)</text>

  <!-- Zustand Store (Subject) -->
  <rect x="310" y="58" width="280" height="72" rx="10" fill="#6d5bd0" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">Zustand Store (Subject)</text>
  <text x="450" y="100" text-anchor="middle" font-size="11" fill="#ffffff">state = { user: "Alice", theme: "dark", count: 5 }</text>
  <text x="450" y="118" text-anchor="middle" font-size="10" fill="#ffffff">Internally maintains a Set&lt;Listener&gt;</text>

  <!-- setState trigger -->
  <rect x="30" y="72" width="160" height="44" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="110" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">User Action</text>
  <text x="110" y="106" text-anchor="middle" font-size="10" fill="#1a1822">set({ count: 6 })</text>
  <line x1="190" y1="94" x2="308" y2="94" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="308,94 300,89 300,99" fill="#6d5bd0"/>

  <!-- Selector layer -->
  <rect x="80" y="170" width="740" height="40" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#6d5bd0">Selector Layer &amp; Equality Check (prevents unnecessary re-renders)</text>

  <!-- Arrows from store to selector layer -->
  <line x1="450" y1="130" x2="450" y2="170" stroke="#6d5bd0" stroke-width="2"/>
  <polygon points="450,170 445,162 455,162" fill="#6d5bd0"/>
  <text x="480" y="155" font-size="9" fill="#6d5bd0">notify all listeners</text>

  <!-- Component A - subscribed to count -->
  <rect x="40" y="260" width="200" height="120" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="40" y="260" width="200" height="30" rx="8" fill="#6d5bd0"/>
  <rect x="40" y="278" width="200" height="12" fill="#6d5bd0"/>
  <text x="140" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">CounterDisplay</text>
  <text x="60" y="310" font-size="10" fill="#1a1822">useStore(s =&gt; s.count)</text>
  <text x="60" y="328" font-size="10" fill="#6d5bd0">selector returns: 6</text>
  <text x="60" y="346" font-size="10" fill="#1a1822">prev: 5 !== 6</text>
  <rect x="60" y="352" width="160" height="20" rx="4" fill="#6d5bd0"/>
  <text x="140" y="366" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">RE-RENDERS</text>

  <!-- Component B - subscribed to user -->
  <rect x="280" y="260" width="200" height="120" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <rect x="280" y="260" width="200" height="30" rx="8" fill="#6d5bd0"/>
  <rect x="280" y="278" width="200" height="12" fill="#6d5bd0"/>
  <text x="380" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">UserProfile</text>
  <text x="300" y="310" font-size="10" fill="#1a1822">useStore(s =&gt; s.user)</text>
  <text x="300" y="328" font-size="10" fill="#6d5bd0">selector returns: "Alice"</text>
  <text x="300" y="346" font-size="10" fill="#1a1822">prev: "Alice" === "Alice"</text>
  <rect x="300" y="352" width="160" height="20" rx="4" fill="#d7d1e6"/>
  <text x="380" y="366" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">SKIPPED</text>

  <!-- Component C - subscribed to theme -->
  <rect x="520" y="260" width="200" height="120" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="2"/>
  <rect x="520" y="260" width="200" height="30" rx="8" fill="#6d5bd0"/>
  <rect x="520" y="278" width="200" height="12" fill="#6d5bd0"/>
  <text x="620" y="282" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">ThemeToggle</text>
  <text x="540" y="310" font-size="10" fill="#1a1822">useStore(s =&gt; s.theme)</text>
  <text x="540" y="328" font-size="10" fill="#6d5bd0">selector returns: "dark"</text>
  <text x="540" y="346" font-size="10" fill="#1a1822">prev: "dark" === "dark"</text>
  <rect x="540" y="352" width="160" height="20" rx="4" fill="#d7d1e6"/>
  <text x="620" y="366" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1822">SKIPPED</text>

  <!-- Component D - no selector (subscribes to all) -->
  <rect x="760" y="260" width="120" height="120" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="760" y="260" width="120" height="30" rx="8" fill="#6d5bd0"/>
  <rect x="760" y="278" width="120" height="12" fill="#6d5bd0"/>
  <text x="820" y="282" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">DebugPanel</text>
  <text x="770" y="310" font-size="9" fill="#1a1822">useStore()</text>
  <text x="770" y="328" font-size="9" fill="#6d5bd0">no selector</text>
  <text x="770" y="346" font-size="9" fill="#1a1822">always differs</text>
  <rect x="770" y="352" width="100" height="20" rx="4" fill="#6d5bd0"/>
  <text x="820" y="366" text-anchor="middle" font-size="10" font-weight="600" fill="#ffffff">RE-RENDERS</text>

  <!-- Arrows from selector layer to components -->
  <line x1="140" y1="210" x2="140" y2="260" stroke="#6d5bd0" stroke-width="2"/>
  <polygon points="140,260 135,252 145,252" fill="#6d5bd0"/>
  <line x1="380" y1="210" x2="380" y2="260" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="380,260 375,252 385,252" fill="#d7d1e6"/>
  <line x1="620" y1="210" x2="620" y2="260" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="620,260 615,252 625,252" fill="#d7d1e6"/>
  <line x1="820" y1="210" x2="820" y2="260" stroke="#6d5bd0" stroke-width="2"/>
  <polygon points="820,260 815,252 825,252" fill="#6d5bd0"/>

  <!-- DOM output -->
  <text x="450" y="420" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1822">Resulting DOM Updates</text>

  <rect x="40" y="435" width="200" height="40" rx="6" fill="#6d5bd0"/>
  <text x="140" y="460" text-anchor="middle" font-size="11" fill="#ffffff">Count: 5 -&gt; 6 (patched)</text>

  <rect x="280" y="435" width="200" height="40" rx="6" fill="#d7d1e6"/>
  <text x="380" y="460" text-anchor="middle" font-size="11" fill="#1a1822">No DOM change</text>

  <rect x="520" y="435" width="200" height="40" rx="6" fill="#d7d1e6"/>
  <text x="620" y="460" text-anchor="middle" font-size="11" fill="#1a1822">No DOM change</text>

  <rect x="760" y="435" width="120" height="40" rx="6" fill="#6d5bd0"/>
  <text x="820" y="460" text-anchor="middle" font-size="11" fill="#ffffff">Debug (patched)</text>

  <!-- Arrows from components to DOM -->
  <line x1="140" y1="380" x2="140" y2="435" stroke="#6d5bd0" stroke-width="1.5"/>
  <polygon points="140,435 135,428 145,428" fill="#6d5bd0"/>
  <line x1="820" y1="380" x2="820" y2="435" stroke="#6d5bd0" stroke-width="1.5"/>
  <polygon points="820,435 815,428 825,428" fill="#6d5bd0"/>
</svg>