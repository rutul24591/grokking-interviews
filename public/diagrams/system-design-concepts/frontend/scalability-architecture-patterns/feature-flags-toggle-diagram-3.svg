<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Feature Flag Progressive Rollout Strategy</title>
  <desc id="desc">Progressive rollout stages showing percentage-based gradual rollout with monitoring gates and automated rollback</desc>
  
  <!-- Background -->
  <rect width="800" height="450" fill="var(--bg-color, #ffffff)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="var(--text-color, #1a1a1a)">Progressive Rollout Strategy</text>
  
  <!-- Rollout stages -->
  <rect x="50" y="70" width="700" height="120" rx="8" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="2"/>
  
  <!-- Stage 1: 1% -->
  <rect x="70" y="90" width="120" height="80" rx="6" fill="var(--success-light, #d4edda)" stroke="var(--success-color, #28a745)" stroke-width="2"/>
  <text x="130" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--success-color, #28a745)">1%</text>
  <text x="130" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">Canary</text>
  <text x="130" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Internal users</text>
  <text x="130" y="163" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">24h bake</text>
  
  <!-- Arrow 1 -->
  <path d="M190 130 L220 130" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="205" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Monitor</text>
  
  <!-- Stage 2: 5% -->
  <rect x="220" y="90" width="120" height="80" rx="6" fill="var(--success-light, #d4edda)" stroke="var(--success-color, #28a745)" stroke-width="2"/>
  <text x="280" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--success-color, #28a745)">5%</text>
  <text x="280" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">Early Adopters</text>
  <text x="280" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Opt-in users</text>
  <text x="280" y="163" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">48h bake</text>
  
  <!-- Arrow 2 -->
  <path d="M340 130 L370 130" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="355" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Monitor</text>
  
  <!-- Stage 3: 25% -->
  <rect x="370" y="90" width="120" height="80" rx="6" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="2"/>
  <text x="430" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--warning-color, #ffc107)">25%</text>
  <text x="430" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">Broad Rollout</text>
  <text x="430" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Random users</text>
  <text x="430" y="163" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">72h bake</text>
  
  <!-- Arrow 3 -->
  <path d="M490 130 L520 130" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="505" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Monitor</text>
  
  <!-- Stage 4: 50% -->
  <rect x="520" y="90" width="120" height="80" rx="6" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="2"/>
  <text x="580" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--warning-color, #ffc107)">50%</text>
  <text x="580" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">Half Users</text>
  <text x="580" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">A/B comparison</text>
  <text x="580" y="163" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">72h bake</text>
  
  <!-- Arrow 4 -->
  <path d="M640 130 L670 130" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="655" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">Monitor</text>
  
  <!-- Stage 5: 100% -->
  <rect x="670" y="90" width="120" height="80" rx="6" fill="var(--primary-light, #e3f2fd)" stroke="var(--primary-color, #1976d2)" stroke-width="2"/>
  <text x="730" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--primary-color, #1976d2)">100%</text>
  <text x="730" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">Full Rollout</text>
  <text x="730" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">All users</text>
  <text x="730" y="163" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Complete</text>
  
  <!-- Monitoring Gates -->
  <text x="400" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text-color, #1a1a1a)">Monitoring Gates (Between Each Stage)</text>
  
  <rect x="100" y="245" width="600" height="90" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  
  <!-- Metrics -->
  <rect x="120" y="260" width="170" height="60" rx="4" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="205" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--text-color, #1a1a1a)">Error Rate</text>
  <text x="205" y="297" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--error-color, #dc3545)" font-weight="600">Alert if &gt;X% increase</text>
  <text x="205" y="312" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Auto-rollback trigger</text>
  
  <rect x="315" y="260" width="170" height="60" rx="4" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="400" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--text-color, #1a1a1a)">Latency</text>
  <text x="400" y="297" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--error-color, #dc3545)" font-weight="600">Alert if &gt;Yms increase</text>
  <text x="400" y="312" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Auto-rollback trigger</text>
  
  <rect x="510" y="260" width="170" height="60" rx="4" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="595" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--text-color, #1a1a1a)">Conversion</text>
  <text x="595" y="297" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--error-color, #dc3545)" font-weight="600">Alert if &lt;Z% change</text>
  <text x="595" y="312" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Manual review</text>
  
  <!-- Rollback path -->
  <path d="M400 335 L400 365 L130 365 L130 175" stroke="var(--error-color, #dc3545)" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowhead)"/>
  <text x="415" y="355" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--error-color, #dc3545)" font-weight="600">Auto-Rollback on Threshold Breach</text>
  
  <!-- Rollback box -->
  <rect x="50" y="375" width="160" height="50" rx="6" fill="var(--error-light, #f8d7da)" stroke="var(--error-color, #dc3545)" stroke-width="2"/>
  <text x="130" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--error-color, #dc3545)">Rollback</text>
  <text x="130" y="412" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Previous stage %</text>
  
  <!-- Consistent bucketing note -->
  <rect x="550" y="375" width="200" height="50" rx="6" fill="var(--info-light, #e7f3ff)" stroke="var(--info-color, #0d6efd)" stroke-width="1"/>
  <text x="650" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--info-color, #0d6efd)">Consistent Bucketing</text>
  <text x="650" y="412" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Same users at each stage</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-color, #1a1a1a)"/>
    </marker>
  </defs>
</svg>
