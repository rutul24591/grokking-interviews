<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Monorepo vs Polyrepo Structure Comparison</title>
  <desc id="desc">Visual comparison showing monorepo single repository structure versus polyrepo multiple repository structure with their characteristics</desc>
  
  <!-- Background -->
  <rect width="800" height="450" fill="var(--bg-color, #ffffff)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="var(--text-color, #1a1a1a)">Monorepo vs Polyrepo Structure</text>
  
  <!-- Monorepo side -->
  <rect x="50" y="70" width="340" height="280" rx="8" fill="var(--primary-light, #e3f2fd)" stroke="var(--primary-color, #1976d2)" stroke-width="3"/>
  <text x="220" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="var(--primary-color, #1976d2)">Monorepo</text>
  <text x="220" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="var(--text-muted, #666666)">Single Repository</text>
  
  <!-- Monorepo structure -->
  <rect x="70" y="130" width="300" height="200" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="2"/>
  
  <!-- Root -->
  <rect x="85" y="145" width="270" height="35" rx="4" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="220" y="167" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--text-color, #1a1a1a)">/ (root)</text>
  <text x="320" y="167" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">package.json, tsconfig</text>
  
  <!-- Apps folder -->
  <path d="M100 180 L100 200 L120 200" stroke="var(--border-color, #e0e0e0)" stroke-width="1" fill="none"/>
  <rect x="120" y="185" width="80" height="30" rx="4" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="1"/>
  <text x="160" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--warning-color, #ffc107)">/apps</text>
  
  <rect x="220" y="185" width="60" height="30" rx="4" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="250" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">web-app</text>
  
  <rect x="290" y="185" width="60" height="30" rx="4" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="320" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">admin</text>
  
  <!-- Packages folder -->
  <path d="M100 180 L100 235 L120 235" stroke="var(--border-color, #e0e0e0)" stroke-width="1" fill="none"/>
  <rect x="120" y="220" width="80" height="30" rx="4" fill="var(--info-light, #e7f3ff)" stroke="var(--info-color, #0d6efd)" stroke-width="1"/>
  <text x="160" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="var(--info-color, #0d6efd)">/packages</text>
  
  <rect x="220" y="220" width="60" height="30" rx="4" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="250" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">ui-lib</text>
  
  <rect x="290" y="220" width="60" height="30" rx="4" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="320" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">utils</text>
  
  <rect x="255" y="255" width="60" height="30" rx="4" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="285" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">config</text>
  
  <!-- Monorepo characteristics -->
  <rect x="70" y="365" width="300" height="70" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="220" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--text-color, #1a1a1a)">Characteristics</text>
  <text x="85" y="405" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--success-color, #28a745)">✓ Atomic commits across packages</text>
  <text x="85" y="418" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--success-color, #28a745)">✓ Shared tooling &amp; config</text>
  <text x="85" y="431" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--error-color, #dc3545)">✗ Large repo size</text>
  
  <!-- Polyrepo side -->
  <rect x="410" y="70" width="340" height="280" rx="8" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="3"/>
  <text x="580" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="var(--text-color, #1a1a1a)">Polyrepo</text>
  <text x="580" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="var(--text-muted, #666666)">Multiple Repositories</text>
  
  <!-- Repo 1 -->
  <rect x="430" y="130" width="140" height="70" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--warning-color, #ffc107)" stroke-width="2"/>
  <text x="500" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--warning-color, #ffc107)">web-app</text>
  <text x="500" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">github.com/org/web</text>
  <text x="500" y="187" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">package.json</text>
  
  <!-- Repo 2 -->
  <rect x="610" y="130" width="140" height="70" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--warning-color, #ffc107)" stroke-width="2"/>
  <text x="680" y="155" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--warning-color, #ffc107)">admin</text>
  <text x="680" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">github.com/org/admin</text>
  <text x="680" y="187" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">package.json</text>
  
  <!-- Repo 3 -->
  <rect x="430" y="220" width="140" height="70" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--info-color, #0d6efd)" stroke-width="2"/>
  <text x="500" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--info-color, #0d6efd)">ui-lib</text>
  <text x="500" y="262" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">github.com/org/ui</text>
  <text x="500" y="277" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">npm package</text>
  
  <!-- Repo 4 -->
  <rect x="610" y="220" width="140" height="70" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--info-color, #0d6efd)" stroke-width="2"/>
  <text x="680" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--info-color, #0d6efd)">utils</text>
  <text x="680" y="262" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">github.com/org/utils</text>
  <text x="680" y="277" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">npm package</text>
  
  <!-- Dependency arrows -->
  <path d="M500 200 L500 215" stroke="var(--text-color, #1a1a1a)" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowhead)"/>
  <path d="M680 200 L680 215" stroke="var(--text-color, #1a1a1a)" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowhead)"/>
  <text x="590" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">npm install</text>
  
  <!-- Polyrepo characteristics -->
  <rect x="430" y="365" width="300" height="70" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="580" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--text-color, #1a1a1a)">Characteristics</text>
  <text x="445" y="405" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--success-color, #28a745)">✓ Independent repos &amp; CI/CD</text>
  <text x="445" y="418" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--success-color, #28a745)">✓ Smaller individual repos</text>
  <text x="445" y="431" text-anchor="start" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--error-color, #dc3545)">✗ Coordinated updates hard</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-color, #1a1a1a)"/>
    </marker>
  </defs>
</svg>
