<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" role="img" aria-labelledby="title desc">
  <title id="title">Micro-Frontends App Shell Runtime Integration</title>
  <desc id="desc">Flow diagram showing the 6-step runtime integration process: App Shell loads, Route matching, MFE loading, MFE mounting, MFE lifecycle, and Cross-MFE communication</desc>
  
  <!-- Background -->
  <rect width="800" height="550" fill="var(--bg-color, #ffffff)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="var(--text-color, #1a1a1a)">App Shell Runtime Integration Flow</text>
  
  <!-- Step 1: App Shell Loads -->
  <rect x="50" y="70" width="150" height="80" rx="8" fill="var(--primary-light, #e3f2fd)" stroke="var(--primary-color, #1976d2)" stroke-width="2"/>
  <text x="125" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="var(--primary-color, #1976d2)">STEP 1</text>
  <text x="125" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">App Shell</text>
  <text x="125" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Loads global chrome</text>
  <text x="125" y="147" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">(nav, header, footer)</text>
  
  <!-- Arrow 1 -->
  <path d="M200 110 L240 110" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2: Route Matching -->
  <rect x="240" y="70" width="150" height="80" rx="8" fill="var(--primary-light, #e3f2fd)" stroke="var(--primary-color, #1976d2)" stroke-width="2"/>
  <text x="315" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="var(--primary-color, #1976d2)">STEP 2</text>
  <text x="315" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">Route Match</text>
  <text x="315" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">URL → MFE mapping</text>
  <text x="315" y="147" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">/checkout → checkout-mfe</text>
  
  <!-- Arrow 2 -->
  <path d="M390 110 L430 110" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3: MFE Loading -->
  <rect x="430" y="70" width="150" height="80" rx="8" fill="var(--primary-light, #e3f2fd)" stroke="var(--primary-color, #1976d2)" stroke-width="2"/>
  <text x="505" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="var(--primary-color, #1976d2)">STEP 3</text>
  <text x="505" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">MFE Loading</text>
  <text x="505" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Dynamic import</text>
  <text x="505" y="147" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">or Module Federation</text>
  
  <!-- Arrow 3 (down to step 4) -->
  <path d="M505 150 L505 200" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4: MFE Mounting -->
  <rect x="430" y="200" width="150" height="80" rx="8" fill="var(--success-light, #d4edda)" stroke="var(--success-color, #28a745)" stroke-width="2"/>
  <text x="505" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="var(--success-color, #28a745)">STEP 4</text>
  <text x="505" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">MFE Mounting</text>
  <text x="505" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Mount into DOM slot</text>
  <text x="505" y="277" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">within shell layout</text>
  
  <!-- Arrow 4 (down to step 5) -->
  <path d="M505 280 L505 330" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 5: MFE Lifecycle -->
  <rect x="430" y="330" width="150" height="80" rx="8" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="2"/>
  <text x="505" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="var(--warning-color, #ffc107)">STEP 5</text>
  <text x="505" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">MFE Lifecycle</text>
  <text x="505" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Navigate: unmount</text>
  <text x="505" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">current → mount next</text>
  
  <!-- Arrow 5 (left to step 6) -->
  <path d="M430 370 L390 370" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 6: Cross-MFE Communication -->
  <rect x="240" y="330" width="150" height="80" rx="8" fill="var(--info-light, #e7f3ff)" stroke="var(--info-color, #0d6efd)" stroke-width="2"/>
  <text x="315" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="var(--info-color, #0d6efd)">STEP 6</text>
  <text x="315" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">Cross-MFE</text>
  <text x="315" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Custom events</text>
  <text x="315" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Event bus / URL params</text>
  
  <!-- Arrow 6 (left back to step 1, completing the cycle) -->
  <path d="M240 370 L200 370 L200 200 L125 200" stroke="var(--text-color, #1a1a1a)" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead)"/>
  <text x="210" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">Continuous</text>
  <text x="210" y="292" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">cycle</text>
  
  <!-- Visual representation of App Shell with MFE slot -->
  <rect x="50" y="450" width="700" height="90" rx="8" fill="var(--panel-color, #f5f5f5)" stroke="var(--border-color, #e0e0e0)" stroke-width="2"/>
  <text x="400" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="var(--text-color, #1a1a1a)">App Shell Layout</text>
  
  <!-- Header -->
  <rect x="70" y="480" width="660" height="20" rx="4" fill="var(--primary-color, #1976d2)" opacity="0.3"/>
  <text x="400" y="494" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--primary-color, #1976d2)">Header / Navigation (Global Chrome)</text>
  
  <!-- MFE Slot -->
  <rect x="70" y="505" width="660" height="25" rx="4" fill="var(--success-color, #28a745)" opacity="0.3" stroke="var(--success-color, #28a745)" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="400" y="522" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--success-color, #28a745)" font-weight="600">MFE Mount Slot (Dynamic Content)</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-color, #1a1a1a)"/>
    </marker>
  </defs>
</svg>
