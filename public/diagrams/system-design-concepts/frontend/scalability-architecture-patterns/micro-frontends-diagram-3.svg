<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Strangler Fig Migration Pattern for Micro-Frontends</title>
  <desc id="desc">Five-stage migration pattern from monolith to micro-frontends: Identify seams, Build shell, Strangle incrementally, Decompose shared code, Decommission monolith</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--bg-color, #ffffff)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="var(--text-color, #1a1a1a)">Strangler Fig Migration: Monolith → Micro-Frontends</text>
  
  <!-- Stage 1: Identify Seams -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="var(--primary-light, #e3f2fd)" stroke="var(--primary-color, #1976d2)" stroke-width="2"/>
    <text x="70" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="var(--primary-color, #1976d2)">STAGE 1</text>
    <text x="70" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">Identify</text>
    <text x="70" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">Seams</text>
    <text x="70" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Analyze monolith</text>
    <text x="70" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Find boundaries</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M190 120 L230 120" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 2: Build Shell -->
  <g transform="translate(230, 70)">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="var(--primary-light, #e3f2fd)" stroke="var(--primary-color, #1976d2)" stroke-width="2"/>
    <text x="70" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="var(--primary-color, #1976d2)">STAGE 2</text>
    <text x="70" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">Build</text>
    <text x="70" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">Shell</text>
    <text x="70" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Create app shell</text>
    <text x="70" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Route to both</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M370 120 L410 120" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 3: Strangle Incrementally -->
  <g transform="translate(410, 70)">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="3"/>
    <text x="70" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="var(--warning-color, #ffc107)">STAGE 3</text>
    <text x="70" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">Strangle</text>
    <text x="70" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">Incrementally</text>
    <text x="70" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Extract features</text>
    <text x="70" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">One at a time</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M550 120 L590 120" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 4: Decompose Shared Code -->
  <g transform="translate(590, 70)">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="var(--info-light, #e7f3ff)" stroke="var(--info-color, #0d6efd)" stroke-width="2"/>
    <text x="70" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="var(--info-color, #0d6efd)">STAGE 4</text>
    <text x="70" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">Decompose</text>
    <text x="70" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">Shared Code</text>
    <text x="70" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Extract shared</text>
    <text x="70" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">packages</text>
  </g>
  
  <!-- Arrow 4 (down to stage 5) -->
  <path d="M660 170 L660 220" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stage 5: Decommission Monolith -->
  <g transform="translate(590, 220)">
    <rect x="0" y="0" width="140" height="100" rx="8" fill="var(--success-light, #d4edda)" stroke="var(--success-color, #28a745)" stroke-width="3"/>
    <text x="70" y="25" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="var(--success-color, #28a745)">STAGE 5</text>
    <text x="70" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">Decommission</text>
    <text x="70" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--text-color, #1a1a1a)">Monolith</text>
    <text x="70" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Remove monolith</text>
    <text x="70" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">MFEs complete</text>
  </g>
  
  <!-- Visual: Monolith shrinking over time -->
  <text x="400" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text-color, #1a1a1a)">Monolith Size Over Migration Stages</text>
  
  <!-- Monolith visualization -->
  <g transform="translate(100, 380)">
    <!-- Stage 1: Full monolith -->
    <rect x="0" y="0" width="100" height="80" rx="4" fill="var(--error-color, #dc3545)" opacity="0.8"/>
    <text x="50" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#ffffff">Stage 1</text>
    <text x="50" y="15" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">100%</text>
  </g>
  
  <g transform="translate(220, 380)">
    <!-- Stage 2: Still full -->
    <rect x="0" y="0" width="100" height="80" rx="4" fill="var(--error-color, #dc3545)" opacity="0.8"/>
    <rect x="0" y="0" width="100" height="10" rx="4" fill="var(--success-color, #28a745)" opacity="0.5"/>
    <text x="50" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#ffffff">Stage 2</text>
    <text x="50" y="15" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">90%</text>
  </g>
  
  <g transform="translate(340, 380)">
    <!-- Stage 3: Half extracted -->
    <rect x="0" y="0" width="100" height="80" rx="4" fill="var(--error-color, #dc3545)" opacity="0.5"/>
    <rect x="0" y="0" width="100" height="40" rx="4" fill="var(--success-color, #28a745)" opacity="0.6"/>
    <text x="50" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#ffffff">Stage 3</text>
    <text x="50" y="15" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">50%</text>
  </g>
  
  <g transform="translate(460, 380)">
    <!-- Stage 4: Mostly extracted -->
    <rect x="0" y="0" width="100" height="80" rx="4" fill="var(--error-color, #dc3545)" opacity="0.3"/>
    <rect x="0" y="0" width="100" height="65" rx="4" fill="var(--success-color, #28a745)" opacity="0.7"/>
    <text x="50" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#ffffff">Stage 4</text>
    <text x="50" y="15" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">20%</text>
  </g>
  
  <g transform="translate(580, 380)">
    <!-- Stage 5: Gone -->
    <rect x="0" y="0" width="100" height="80" rx="4" fill="var(--success-color, #28a745)" opacity="0.8"/>
    <text x="50" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#ffffff">Stage 5</text>
    <text x="50" y="15" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">0%</text>
  </g>
  
  <!-- Legend -->
  <rect x="150" y="480" width="20" height="15" fill="var(--error-color, #dc3545)" opacity="0.6"/>
  <text x="180" y="492" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">Monolith</text>
  
  <rect x="320" y="480" width="20" height="15" fill="var(--success-color, #28a745)" opacity="0.7"/>
  <text x="350" y="492" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">Micro-Frontends</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-color, #1a1a1a)"/>
    </marker>
  </defs>
</svg>
