<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Factory vs Constructor vs Builder Pattern Comparison">
  <rect width="900" height="500" rx="16" fill="#f3f1f8" />

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Factory vs Constructor vs Builder: When to Use Each</text>

  <defs>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6d5bd0" />
    </marker>
  </defs>

  <!-- Column 1: Factory -->
  <rect x="25" y="60" width="270" height="420" rx="14" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <rect x="25" y="60" width="270" height="46" rx="14" fill="#6d5bd0" />
  <rect x="25" y="85" width="270" height="21" fill="#6d5bd0" />
  <text x="160" y="90" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Factory Pattern</text>

  <!-- Factory diagram -->
  <rect x="55" y="120" width="210" height="36" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="160" y="143" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="600">createComponent("button")</text>

  <line x1="160" y1="156" x2="160" y2="174" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arr3)" />

  <rect x="55" y="178" width="210" height="30" rx="8" fill="#6d5bd0" />
  <text x="160" y="198" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Factory decides type at runtime</text>

  <line x1="100" y1="208" x2="100" y2="226" stroke="#6d5bd0" stroke-width="1" marker-end="url(#arr3)" />
  <line x1="160" y1="208" x2="160" y2="226" stroke="#6d5bd0" stroke-width="1" marker-end="url(#arr3)" />
  <line x1="220" y1="208" x2="220" y2="226" stroke="#6d5bd0" stroke-width="1" marker-end="url(#arr3)" />

  <rect x="55" y="230" width="60" height="24" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="85" y="246" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="9">Button</text>
  <rect x="130" y="230" width="60" height="24" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="160" y="246" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="9">Input</text>
  <rect x="205" y="230" width="60" height="24" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="235" y="246" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="9">Card</text>

  <!-- Factory - When to use -->
  <line x1="45" y1="270" x2="275" y2="270" stroke="#d7d1e6" stroke-width="1" />
  <text x="160" y="290" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="12" font-weight="700">When to Use</text>
  <text x="50" y="310" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">&#x2713; Type decided at runtime</text>
  <text x="50" y="328" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">&#x2713; Multiple product families</text>
  <text x="50" y="346" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">&#x2713; Complex creation logic</text>
  <text x="50" y="364" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">&#x2713; Plugin/extension systems</text>

  <line x1="45" y1="378" x2="275" y2="378" stroke="#d7d1e6" stroke-width="1" />
  <text x="160" y="398" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Frontend Example</text>
  <text x="50" y="418" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">Form field factory that</text>
  <text x="50" y="434" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">creates text, select, date,</text>
  <text x="50" y="450" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">or checkbox based on</text>
  <text x="50" y="466" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">schema config at runtime.</text>

  <!-- Column 2: Constructor -->
  <rect x="315" y="60" width="270" height="420" rx="14" fill="#ffffff" stroke="#d7d1e6" stroke-width="2" />
  <rect x="315" y="60" width="270" height="46" rx="14" fill="#1a1822" />
  <rect x="315" y="85" width="270" height="21" fill="#1a1822" />
  <text x="450" y="90" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Constructor / new</text>

  <!-- Constructor diagram -->
  <rect x="345" y="120" width="210" height="36" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="450" y="143" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="600">new Button({ size: "lg" })</text>

  <line x1="450" y1="156" x2="450" y2="174" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arr3)" />

  <rect x="345" y="178" width="210" height="30" rx="8" fill="#1a1822" />
  <text x="450" y="198" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Caller knows exact type</text>

  <line x1="450" y1="208" x2="450" y2="226" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arr3)" />

  <rect x="380" y="230" width="140" height="24" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="450" y="246" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="9">Button (always)</text>

  <!-- Constructor - When to use -->
  <line x1="335" y1="270" x2="565" y2="270" stroke="#d7d1e6" stroke-width="1" />
  <text x="450" y="290" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="12" font-weight="700">When to Use</text>
  <text x="340" y="310" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">&#x2713; Type known at compile time</text>
  <text x="340" y="328" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">&#x2713; Simple, few parameters</text>
  <text x="340" y="346" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">&#x2713; No creation logic needed</text>
  <text x="340" y="364" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">&#x2713; Direct instantiation is clear</text>

  <line x1="335" y1="378" x2="565" y2="378" stroke="#d7d1e6" stroke-width="1" />
  <text x="450" y="398" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Frontend Example</text>
  <text x="340" y="418" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">Direct React component</text>
  <text x="340" y="434" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">usage: &lt;Button size="lg"&gt;</text>
  <text x="340" y="450" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">where the developer picks</text>
  <text x="340" y="466" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">the component explicitly.</text>

  <!-- Column 3: Builder -->
  <rect x="605" y="60" width="270" height="420" rx="14" fill="#ffffff" stroke="#d7d1e6" stroke-width="2" />
  <rect x="605" y="60" width="270" height="46" rx="14" fill="#6d5bd0" opacity="0.7" />
  <rect x="605" y="85" width="270" height="21" fill="#6d5bd0" opacity="0.7" />
  <text x="740" y="90" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="16" font-weight="700">Builder Pattern</text>

  <!-- Builder diagram -->
  <rect x="635" y="120" width="210" height="30" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="740" y="140" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">FormBuilder.new()</text>

  <line x1="740" y1="150" x2="740" y2="162" stroke="#6d5bd0" stroke-width="1" marker-end="url(#arr3)" />

  <rect x="635" y="165" width="210" height="22" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="740" y="180" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">.addField("name", "text")</text>

  <line x1="740" y1="187" x2="740" y2="195" stroke="#6d5bd0" stroke-width="1" marker-end="url(#arr3)" />

  <rect x="635" y="198" width="210" height="22" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="740" y="213" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">.addField("email", "email")</text>

  <line x1="740" y1="220" x2="740" y2="228" stroke="#6d5bd0" stroke-width="1" marker-end="url(#arr3)" />

  <rect x="635" y="231" width="210" height="22" rx="6" fill="#6d5bd0" opacity="0.7" />
  <text x="740" y="246" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">.build() &#8594; ComplexForm</text>

  <!-- Builder - When to use -->
  <line x1="625" y1="270" x2="855" y2="270" stroke="#d7d1e6" stroke-width="1" />
  <text x="740" y="290" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="12" font-weight="700">When to Use</text>
  <text x="630" y="310" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">&#x2713; Many optional parameters</text>
  <text x="630" y="328" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">&#x2713; Step-by-step construction</text>
  <text x="630" y="346" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">&#x2713; Same process, diff results</text>
  <text x="630" y="364" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">&#x2713; Immutable object assembly</text>

  <line x1="625" y1="378" x2="855" y2="378" stroke="#d7d1e6" stroke-width="1" />
  <text x="740" y="398" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Frontend Example</text>
  <text x="630" y="418" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">Query builder for complex</text>
  <text x="630" y="434" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">filter UIs: chain .where(),</text>
  <text x="630" y="450" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">.orderBy(), .limit() then</text>
  <text x="630" y="466" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10.5">.build() to produce query.</text>
</svg>