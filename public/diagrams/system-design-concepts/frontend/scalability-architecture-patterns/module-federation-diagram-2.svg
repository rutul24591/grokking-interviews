<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Module Federation Shared Dependency Version Negotiation</title>
  <desc id="desc">Flow diagram showing how Module Federation negotiates shared dependency versions between host and remote applications</desc>
  
  <!-- Background -->
  <rect width="800" height="450" fill="var(--bg-color, #ffffff)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="var(--text-color, #1a1a1a)">Shared Dependency Version Negotiation</text>
  
  <!-- Host App -->
  <rect x="50" y="70" width="200" height="120" rx="8" fill="var(--primary-light, #e3f2fd)" stroke="var(--primary-color, #1976d2)" stroke-width="2"/>
  <text x="150" y="100" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--primary-color, #1976d2)">Host App</text>
  <text x="150" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="var(--text-color, #1a1a1a)">Requires: React ^18.0.0</text>
  <text x="150" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="var(--text-color, #1a1a1a)">Provides: React 18.2.0</text>
  <text x="150" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="var(--text-color, #1a1a1a)">Singleton: true</text>
  <text x="150" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-muted, #666666)">(eager: true)</text>
  
  <!-- Arrow to Shared Scope -->
  <path d="M250 130 L310 130" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Shared Scope Box -->
  <rect x="310" y="70" width="180" height="180" rx="8" fill="var(--info-light, #e7f3ff)" stroke="var(--info-color, #0d6efd)" stroke-width="3"/>
  <text x="400" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--info-color, #0d6efd)">Shared Scope</text>
  
  <!-- Version Resolution Logic -->
  <rect x="325" y="110" width="150" height="125" rx="6" fill="var(--bg-color, #ffffff)" stroke="var(--border-color, #e0e0e0)" stroke-width="1"/>
  <text x="400" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="var(--text-color, #1a1a1a)">Version Resolution</text>
  
  <text x="400" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">Step 1: Check existing</text>
  <text x="400" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">Step 2: Validate range</text>
  <text x="400" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">Step 3: Return or load</text>
  <text x="400" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-color, #1a1a1a)">Step 4: Update scope</text>
  <text x="400" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--success-color, #28a745)" font-weight="600">Result: React 18.2.0</text>
  <text x="400" y="228" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="var(--text-muted, #666666)">(satisfies all ranges)</text>
  
  <!-- Arrow from Shared to Remote -->
  <path d="M490 130 L550 130" stroke="var(--text-color, #1a1a1a)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Remote App 1 -->
  <rect x="550" y="70" width="200" height="80" rx="8" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="2"/>
  <text x="650" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--warning-color, #ffc107)">Remote App 1</text>
  <text x="650" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="var(--text-color, #1a1a1a)">Requires: React ^18.0.0</text>
  <text x="650" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--success-color, #28a745)" font-weight="600">✓ Uses shared React 18.2.0</text>
  
  <!-- Remote App 2 -->
  <rect x="550" y="170" width="200" height="80" rx="8" fill="var(--warning-light, #fff3cd)" stroke="var(--warning-color, #ffc107)" stroke-width="2"/>
  <text x="650" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--warning-color, #ffc107)">Remote App 2</text>
  <text x="650" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="var(--text-color, #1a1a1a)">Requires: React ^17.0.0</text>
  <text x="650" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--success-color, #28a745)" font-weight="600">✓ Uses shared React 18.2.0</text>
  
  <!-- Scenario 2: Version Conflict -->
  <text x="400" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="var(--text-color, #1a1a1a)">Version Conflict Scenario</text>
  
  <!-- Conflict Example -->
  <rect x="100" y="305" width="280" height="120" rx="8" fill="var(--error-light, #f8d7da)" stroke="var(--error-color, #dc3545)" stroke-width="2"/>
  <text x="240" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--error-color, #dc3545)">Incompatible Version Request</text>
  
  <text x="240" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">Host provides: React 18.2.0 (singleton)</text>
  <text x="240" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">Remote requires: React ^16.0.0</text>
  <text x="240" y="389" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--error-color, #dc3545)" font-weight="600">✗ Version mismatch!</text>
  <text x="240" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Remote loads its own React 16.x (fallback)</text>
  
  <!-- Resolution Options -->
  <rect x="420" y="305" width="280" height="120" rx="8" fill="var(--success-light, #d4edda)" stroke="var(--success-color, #28a745)" stroke-width="2"/>
  <text x="560" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="var(--success-color, #28a745)">Resolution Strategies</text>
  
  <text x="560" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">1. Widen version range in remote</text>
  <text x="560" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">2. Use eager: true in host (load first)</text>
  <text x="560" y="389" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="var(--text-color, #1a1a1a)">3. Allow duplicate (not singleton)</text>
  <text x="560" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="var(--text-muted, #666666)">Best practice: Align versions across apps</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-color, #1a1a1a)"/>
    </marker>
  </defs>
</svg>
