<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Client to Facade to Subsystems flow diagram">
  <rect width="900" height="500" rx="18" fill="#f3f1f8" />
  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1a1822">Client &amp;rarr; Facade &amp;rarr; Subsystems Flow</text>

  <!-- Client Box -->
  <rect x="60" y="70" width="160" height="360" rx="14" fill="#ffffff" stroke="#d7d1e6" stroke-width="2" />
  <text x="140" y="100" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1a1822">Client Code</text>
  <rect x="80" y="120" width="120" height="36" rx="8" fill="#6d5bd0" />
  <text x="140" y="143" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">login()</text>
  <rect x="80" y="170" width="120" height="36" rx="8" fill="#6d5bd0" />
  <text x="140" y="193" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">saveData()</text>
  <rect x="80" y="220" width="120" height="36" rx="8" fill="#6d5bd0" />
  <text x="140" y="243" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">fetchProfile()</text>
  <rect x="80" y="270" width="120" height="36" rx="8" fill="#6d5bd0" />
  <text x="140" y="293" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ffffff">trackEvent()</text>
  <text x="140" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6d5bd0" font-weight="600">Simple API calls</text>
  <text x="140" y="358" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6d5bd0" font-weight="600">No subsystem</text>
  <text x="140" y="376" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6d5bd0" font-weight="600">knowledge needed</text>

  <!-- Arrow Client to Facade -->
  <line x1="220" y1="250" x2="310" y2="250" stroke="#6d5bd0" stroke-width="2.5" marker-end="url(#arrowhead)" />
  <text x="265" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1a1822" font-weight="600">calls</text>

  <!-- Facade Box -->
  <rect x="310" y="100" width="180" height="300" rx="14" fill="#6d5bd0" stroke="#5a4ab5" stroke-width="2" />
  <text x="400" y="132" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff">FACADE</text>
  <line x1="330" y1="145" x2="470" y2="145" stroke="#ffffff" stroke-width="1" opacity="0.4" />
  <text x="400" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" opacity="0.9">Unified Interface</text>
  <rect x="330" y="190" width="140" height="28" rx="6" fill="#ffffff" opacity="0.2" />
  <text x="400" y="209" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" font-weight="600">Validates inputs</text>
  <rect x="330" y="228" width="140" height="28" rx="6" fill="#ffffff" opacity="0.2" />
  <text x="400" y="247" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" font-weight="600">Orchestrates calls</text>
  <rect x="330" y="266" width="140" height="28" rx="6" fill="#ffffff" opacity="0.2" />
  <text x="400" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" font-weight="600">Handles errors</text>
  <rect x="330" y="304" width="140" height="28" rx="6" fill="#ffffff" opacity="0.2" />
  <text x="400" y="323" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" font-weight="600">Transforms data</text>
  <text x="400" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.7">Hides complexity</text>
  <text x="400" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.7">from consumers</text>

  <!-- Arrows Facade to Subsystems -->
  <line x1="490" y1="170" x2="590" y2="120" stroke="#d7d1e6" stroke-width="2" marker-end="url(#arrowGray)" />
  <line x1="490" y1="220" x2="590" y2="210" stroke="#d7d1e6" stroke-width="2" marker-end="url(#arrowGray)" />
  <line x1="490" y1="280" x2="590" y2="310" stroke="#d7d1e6" stroke-width="2" marker-end="url(#arrowGray)" />
  <line x1="490" y1="330" x2="590" y2="400" stroke="#d7d1e6" stroke-width="2" marker-end="url(#arrowGray)" />
  <text x="545" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1a1822">delegates</text>

  <!-- Subsystem Boxes -->
  <rect x="590" y="80" width="250" height="75" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <text x="610" y="105" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1a1822">Auth Subsystem</text>
  <text x="610" y="122" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">OAuth flow, token refresh,</text>
  <text x="610" y="136" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">session management, MFA</text>

  <rect x="590" y="175" width="250" height="75" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <text x="610" y="200" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1a1822">Network Subsystem</text>
  <text x="610" y="217" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">HTTP client, retry logic,</text>
  <text x="610" y="231" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">caching, interceptors</text>

  <rect x="590" y="270" width="250" height="75" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <text x="610" y="295" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1a1822">Storage Subsystem</text>
  <text x="610" y="312" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">IndexedDB, localStorage,</text>
  <text x="610" y="326" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">cache API, serialization</text>

  <rect x="590" y="365" width="250" height="75" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <text x="610" y="390" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1a1822">DOM Subsystem</text>
  <text x="610" y="407" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">Event delegation, mutations,</text>
  <text x="610" y="421" font-family="system-ui, sans-serif" font-size="10" fill="#6d5bd0">animations, observers</text>

  <!-- Labels -->
  <text x="140" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1a1822">Consumer Layer</text>
  <text x="400" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1a1822">Facade Layer</text>
  <text x="715" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1a1822">Subsystem Layer</text>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0" />
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d7d1e6" />
    </marker>
  </defs>
</svg>