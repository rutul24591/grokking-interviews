<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Polling Patterns and Memory Implications</text>
  
  <!-- Pattern 1: Naive Polling -->
  <rect x="50" y="80" width="400" height="220" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Pattern 1: Naive Polling (BAD)</text>
  
  <rect x="70" y="130" width="360" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="85" y="155" font-family="monospace" font-size="11" fill="#ef4444">// Problem: No cleanup!</text>
  <text x="85" y="175" font-family="monospace" font-size="11" fill="#e2e8f0">useEffect(() =&gt; {'{'}</text>
  <text x="85" y="195" font-family="monospace" font-size="11" fill="#e2e8f0">  const id = setInterval(() =&gt; {'{'}</text>
  <text x="85" y="215" font-family="monospace" font-size="11" fill="#e2e8f0">    fetchData(); // API call every 1s</text>
  <text x="85" y="235" font-family="monospace" font-size="11" fill="#e2e8f0">  {'}'}, 1000);</text>
  <text x="85" y="255" font-family="monospace" font-size="11" fill="#fbbf24">  // Missing: return cleanup!</text>
  <text x="85" y="275" font-family="monospace" font-size="11" fill="#e2e8f0">{'}'}, []);</text>
  
  <rect x="70" y="235" width="360" height="55" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="250" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">Consequences:</text>
  <text x="250" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">• Multiple overlapping intervals after re-renders</text>
  <text x="250" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">• API rate limit exceeded, memory grows</text>
  
  <!-- Pattern 2: Proper Cleanup -->
  <rect x="470" y="80" width="380" height="220" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Pattern 2: Proper Cleanup (GOOD)</text>
  
  <rect x="490" y="130" width="340" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="505" y="155" font-family="monospace" font-size="11" fill="#22c55e">// Solution: Cleanup on unmount</text>
  <text x="505" y="175" font-family="monospace" font-size="11" fill="#e2e8f0">useEffect(() =&gt; {'{'}</text>
  <text x="505" y="195" font-family="monospace" font-size="11" fill="#e2e8f0">  const id = setInterval(() =&gt; {'{'}</text>
  <text x="505" y="215" font-family="monospace" font-size="11" fill="#e2e8f0">    fetchData();</text>
  <text x="505" y="235" font-family="monospace" font-size="11" fill="#e2e8f0">  {'}'}, 1000);</text>
  <text x="505" y="255" font-family="monospace" font-size="11" fill="#22c55e">  return () =&gt; clearInterval(id);</text>
  <text x="505" y="275" font-family="monospace" font-size="11" fill="#e2e8f0">{'}'}, []);</text>
  
  <rect x="490" y="235" width="340" height="55" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="660" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">Benefits:</text>
  <text x="660" y="272" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">• Single interval, proper cleanup, no leaks</text>
  
  <!-- Pattern 3: Exponential Backoff -->
  <rect x="50" y="320" width="400" height="210" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Pattern 3: Exponential Backoff (BETTER)</text>
  
  <rect x="70" y="370" width="360" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="85" y="395" font-family="monospace" font-size="10" fill="#3b82f6">// Adaptive: slow down on failures</text>
  <text x="85" y="415" font-family="monospace" font-size="11" fill="#e2e8f0">useEffect(() =&gt; {'{'}</text>
  <text x="85" y="435" font-family="monospace" font-size="11" fill="#e2e8f0">  let delay = 1000;</text>
  <text x="85" y="455" font-family="monospace" font-size="11" fill="#e2e8f0">  const poll = async () =&gt; {'{'}</text>
  <text x="85" y="475" font-family="monospace" font-size="11" fill="#e2e8f0">    const ok = await fetchData();</text>
  <text x="85" y="495" font-family="monospace" font-size="11" fill="#fbbf24">    delay = ok ? 1000 : Math.min(delay * 2, 30000);</text>
  <text x="85" y="515" font-family="monospace" font-size="11" fill="#e2e8f0">    timerId = setTimeout(poll, delay);</text>
  <text x="85" y="535" font-family="monospace" font-size="11" fill="#e2e8f0">  {'}'};</text>
  <text x="85" y="555" font-family="monospace" font-size="11" fill="#e2e8f0">  poll();</text>
  <text x="85" y="575" font-family="monospace" font-size="11" fill="#22c55e">  return () =&gt; clearTimeout(timerId);</text>
  <text x="85" y="595" font-family="monospace" font-size="11" fill="#e2e8f0">{'}'}, []);</text>
  
  <!-- Pattern 4: Request-based -->
  <rect x="470" y="320" width="380" height="210" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Pattern 4: Request-Based (BEST)</text>
  
  <rect x="490" y="370" width="340" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="505" y="395" font-family="monospace" font-size="10" fill="#f59e0b">// No timer: poll only when needed</text>
  <text x="505" y="415" font-family="monospace" font-size="11" fill="#e2e8f0">const {'{'} data, isLoading, mutate {'}'} = </text>
  <text x="505" y="435" font-family="monospace" font-size="11" fill="#22c55e">  useSWR('/api/data', fetcher, {'{'}</text>
  <text x="505" y="455" font-family="monospace" font-size="11" fill="#e2e8f0">    refreshInterval: 5000, // Auto-refresh</text>
  <text x="505" y="475" font-family="monospace" font-size="11" fill="#e2e8f0">    dedupingInterval: 2000,</text>
  <text x="505" y="495" font-family="monospace" font-size="11" fill="#e2e8f0">    revalidateOnFocus: true</text>
  <text x="505" y="515" font-family="monospace" font-size="11" fill="#e2e8f0">  {'}'});</text>
  <text x="505" y="535" font-family="monospace" font-size="10" fill="#94a3b8">// Library handles cleanup automatically</text>
  
  <!-- Bottom comparison -->
  <rect x="50" y="545" width="800" height="80" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="450" y="570" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b">Memory Impact Comparison (after 100 navigation cycles)</text>
  
  <rect x="70" y="585" width="180" height="30" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="160" y="605" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">Naive: 50+ timers</text>
  
  <rect x="260" y="585" width="180" height="30" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="350" y="605" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">Cleanup: 0 timers</text>
  
  <rect x="450" y="585" width="180" height="30" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="540" y="605" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">Backoff: 0-1 timers</text>
  
  <rect x="640" y="585" width="180" height="30" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="730" y="605" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e40af">SWR: Library managed</text>
</svg>
