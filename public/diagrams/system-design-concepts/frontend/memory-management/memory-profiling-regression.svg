<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Memory Regression Detection and Prevention</text>
  
  <!-- Top: Regression Timeline -->
  <rect x="50" y="80" width="800" height="200" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Memory Growth Over Time - Detecting Regressions</text>
  
  <!-- Graph area -->
  <rect x="70" y="130" width="760" height="130" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Y-axis -->
  <line x1="80" y1="140" x2="80" y2="250" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="75" y="145" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">500MB</text>
  <text x="75" y="195" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">250MB</text>
  <text x="75" y="255" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">0MB</text>
  
  <!-- Threshold line -->
  <line x1="80" y1="155" x2="830" y2="155" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="835" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#dc2626" font-weight="600">ALERT THRESHOLD</text>
  
  <!-- Baseline (healthy) -->
  <polyline points="80,230 150,228 220,230 290,227 360,230 430,228 500,230 570,227 640,230 710,228 780,230 830,228" fill="none" stroke="#22c55e" stroke-width="2.5"/>
  <text x="840" y="233" font-family="system-ui, sans-serif" font-size="9" fill="#16a34a" font-weight="600">Healthy</text>
  
  <!-- Regression (growing) -->
  <polyline points="80,230 150,225 220,215 290,200 360,180 430,165 500,150 570,140 640,135 710,132 780,130 830,128" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <text x="840" y="133" font-family="system-ui, sans-serif" font-size="9" fill="#dc2626" font-weight="600">Leak!</text>
  
  <!-- X-axis markers -->
  <text x="80" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Day 1</text>
  <text x="270" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Day 7</text>
  <text x="460" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Day 14</text>
  <text x="650" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Day 21</text>
  <text x="830" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Day 28</text>
  
  <!-- Alert indicator -->
  <circle cx="500" cy="150" r="8" fill="#ef4444"/>
  <text x="500" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" font-weight="700">!</text>
  <text x="500" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#dc2626" font-weight="600">Alert triggered</text>
  
  <!-- Bottom Left: Prevention Strategy -->
  <rect x="50" y="300" width="400" height="230" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Prevention Strategy</text>
  
  <rect x="70" y="350" width="360" height="50" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="250" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#15803d">1. CI Memory Budget</text>
  <text x="250" y="392" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Fail builds exceeding memory thresholds</text>
  
  <rect x="70" y="410" width="360" height="50" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="250" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">2. Automated Snapshots</text>
  <text x="250" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">Compare heap snapshots in CI pipeline</text>
  
  <rect x="70" y="470" width="360" height="50" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="250" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#5b21b6">3. Performance Tests</text>
  <text x="250" y="512" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6d28d9">Include memory checks in E2E tests</text>
  
  <!-- Bottom Right: Response Workflow -->
  <rect x="470" y="300" width="380" height="230" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Response Workflow</text>
  
  <rect x="490" y="350" width="340" height="40" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="660" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">1. Alert received (Slack/PageDog)</text>
  
  <rect x="490" y="400" width="340" height="40" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="660" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">2. Reproduce with heap snapshots</text>
  
  <rect x="490" y="450" width="340" height="40" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="660" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">3. Identify leak source (retainers)</text>
  
  <rect x="490" y="500" width="340" height="40" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1"/>
  <text x="660" y="525" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">4. Fix + add regression test</text>
</svg>
