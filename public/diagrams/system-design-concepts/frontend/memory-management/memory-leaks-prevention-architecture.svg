<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Common Frontend Memory Leak Sources</text>
  
  <!-- Main container -->
  <rect x="50" y="70" width="800" height="420" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Root Set Box -->
  <rect x="70" y="95" width="180" height="100" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="160" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1a1a2e">Root Set</text>
  <text x="160" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#475569">Globals, Window,</text>
  <text x="160" y="166" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#475569">Active callbacks,</text>
  <text x="160" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#475569">Execution stack</text>
  
  <!-- Arrow from Root to Heap -->
  <defs>
    <marker id="arrow1" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#64748b"/>
    </marker>
  </defs>
  <line x1="250" y1="145" x2="290" y2="145" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow1)"/>
  <text x="270" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">references</text>
  
  <!-- JS Heap Box -->
  <rect x="295" y="95" width="280" height="200" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="435" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1a1a2e">JavaScript Heap</text>
  
  <!-- Young Generation -->
  <rect x="315" y="145" width="240" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="435" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e40af">Young Generation</text>
  <text x="435" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#64748b">Short-lived objects, frequent GC</text>
  
  <!-- Old Generation -->
  <rect x="315" y="220" width="240" height="60" rx="8" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="435" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e3a8a">Old Generation</text>
  <text x="435" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#64748b">Long-lived objects, infrequent GC</text>
  
  <!-- Arrow from Heap to Leak Sources -->
  <line x1="575" y1="195" x2="615" y2="195" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrow1)"/>
  
  <!-- Leak Sources Container -->
  <rect x="620" y="95" width="210" height="370" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="725" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1a1a2e">Leak Sources</text>
  
  <!-- Leak Source 1: Unbounded Caches -->
  <rect x="640" y="145" width="170" height="55" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="725" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">Unbounded Caches</text>
  <text x="725" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#7f1d1d">Maps without eviction</text>
  
  <!-- Leak Source 2: Event Listeners -->
  <rect x="640" y="210" width="170" height="55" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="725" y="233" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#9d174d">Event Listeners</text>
  <text x="725" y="251" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#831843">Not detached on unmount</text>
  
  <!-- Leak Source 3: Timers -->
  <rect x="640" y="275" width="170" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="725" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Timers</text>
  <text x="725" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#78350f">Intervals keep firing</text>
  
  <!-- Leak Source 4: Detached DOM -->
  <rect x="640" y="340" width="170" height="55" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="725" y="363" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">Detached DOM</text>
  <text x="725" y="381" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#064e3b">JS holds removed nodes</text>
  
  <!-- Leak Source 5: Closures -->
  <rect x="640" y="405" width="170" height="55" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="725" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#3730a3">Closures</text>
  <text x="725" y="446" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="400" fill="#312e81">Capture large state</text>
  
  <!-- Bottom note -->
  <rect x="70" y="505" width="760" height="60" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Key Principle: Memory leaks are unintended reference chains</text>
  <text x="450" y="550" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="400" fill="#475569">Fix by breaking the reference chain or bounding the data structure</text>
</svg>
