<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>

  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    Polling vs Push (Performance Trade-offs)
  </text>

  <rect x="60" y="85" width="780" height="360" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <rect x="100" y="130" width="330" height="140" rx="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="265" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Polling</text>
  <text x="265" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">simple control flow</text>
  <text x="265" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">cost: CPU, battery, network</text>
  <text x="265" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">needs budgets + cancel</text>

  <rect x="470" y="130" width="330" height="140" rx="14" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="635" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Push</text>
  <text x="635" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">less background churn</text>
  <text x="635" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">better freshness</text>
  <text x="635" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">cost: connections + reconnect</text>

  <rect x="100" y="305" width="700" height="110" rx="14" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="450" y="337" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Hybrid</text>
  <text x="450" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">push when connected, bounded polling as fallback</text>
  <text x="450" y="383" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">risk: accidental double work unless modes are exclusive</text>
</svg>

