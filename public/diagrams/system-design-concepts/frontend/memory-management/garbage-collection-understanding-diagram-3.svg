<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>

  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    Scaling Strategy: Memory as a Budget (Long-Lived SPAs)
  </text>

  <!-- Pipeline boxes -->
  <defs>
    <marker id="arrowBudget" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <rect x="70" y="95" width="180" height="90" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="160" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Define Budget</text>
  <text x="160" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">heap baseline</text>
  <text x="160" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">growth per minute</text>

  <line x1="250" y1="140" x2="310" y2="140" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowBudget)"/>

  <rect x="310" y="95" width="200" height="90" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="410" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Measure</text>
  <text x="410" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">lab profiling</text>
  <text x="410" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">RUM heuristics</text>

  <line x1="510" y1="140" x2="570" y2="140" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowBudget)"/>

  <rect x="570" y="95" width="250" height="90" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="695" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Prevent Regressions</text>
  <text x="695" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">PR checks</text>
  <text x="695" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">cache caps</text>

  <!-- Guardrails -->
  <rect x="70" y="220" width="750" height="200" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="95" y="250" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Operational guardrails</text>

  <rect x="110" y="270" width="220" height="120" rx="12" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="220" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Lifecycle Hygiene</text>
  <text x="220" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">listeners, timers</text>
  <text x="220" y="342" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">observers, subscriptions</text>
  <text x="220" y="362" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">teardown on unmount</text>

  <rect x="350" y="270" width="220" height="120" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="460" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Bounded State</text>
  <text x="460" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">cap caches</text>
  <text x="460" y="342" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">prune histories</text>
  <text x="460" y="362" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">avoid unbounded queues</text>

  <rect x="590" y="270" width="200" height="120" rx="12" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="690" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Detection</text>
  <text x="690" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">heap growth alerts</text>
  <text x="690" y="342" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">session soak tests</text>
  <text x="690" y="362" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">release gates</text>

  <!-- Bottom note -->
  <text x="450" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">
    Outcome: predictable GC behavior, stable heap, and fewer tail-latency incidents as features and traffic scale.
  </text>
</svg>

