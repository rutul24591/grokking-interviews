<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>

  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    Browser Memory Architecture (GC Mental Model)
  </text>

  <!-- Browser box -->
  <rect x="40" y="70" width="820" height="380" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="70" y="98" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Browser Process / Tab</text>

  <!-- Roots -->
  <rect x="70" y="125" width="220" height="120" rx="10" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="180" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">Root Set</text>
  <text x="85" y="172" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#111827">Examples</text>
  <text x="85" y="192" font-family="system-ui, sans-serif" font-size="11" fill="#374151">• Globals</text>
  <text x="85" y="210" font-family="system-ui, sans-serif" font-size="11" fill="#374151">• Active stack frames</text>
  <text x="85" y="228" font-family="system-ui, sans-serif" font-size="11" fill="#374151">• Queued callbacks</text>

  <!-- JS Heap -->
  <rect x="330" y="125" width="260" height="250" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="460" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">JavaScript Heap</text>

  <rect x="355" y="170" width="210" height="70" rx="10" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="460" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Young Generation</text>
  <text x="460" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">frequent minor GC</text>

  <rect x="355" y="255" width="210" height="95" rx="10" fill="#BFDBFE" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="460" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Old Generation</text>
  <text x="460" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">less frequent major GC</text>
  <text x="460" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">may compact</text>

  <!-- DOM -->
  <rect x="630" y="125" width="200" height="170" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="730" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">DOM + Layout</text>
  <text x="650" y="176" font-family="system-ui, sans-serif" font-size="11" fill="#374151">• DOM tree</text>
  <text x="650" y="194" font-family="system-ui, sans-serif" font-size="11" fill="#374151">• Style/layout state</text>
  <text x="650" y="212" font-family="system-ui, sans-serif" font-size="11" fill="#374151">• Render objects</text>
  <text x="650" y="230" font-family="system-ui, sans-serif" font-size="11" fill="#374151">• Event registries</text>

  <!-- GC box -->
  <rect x="630" y="315" width="200" height="60" rx="10" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="730" y="342" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Garbage Collector</text>
  <text x="730" y="362" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">mark → sweep → (compact)</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <line x1="290" y1="185" x2="330" y2="200" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="310" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">references</text>

  <line x1="590" y1="205" x2="630" y2="205" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="610" y="194" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748B">wrappers</text>

  <line x1="690" y1="315" x2="560" y2="315" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="625" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#B45309">reclaim</text>

  <line x1="690" y1="315" x2="690" y2="295" stroke="#F59E0B" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="712" y="304" font-family="system-ui, sans-serif" font-size="10" fill="#B45309">coord</text>

  <!-- Note -->
  <rect x="70" y="395" width="760" height="40" rx="10" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="450" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">
    Key idea: objects stay alive if reachable from roots (including event registries and queued callbacks).
  </text>
</svg>

