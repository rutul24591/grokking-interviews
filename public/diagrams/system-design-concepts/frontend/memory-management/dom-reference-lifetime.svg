<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">DOM Reference Lifetime Patterns</text>
  
  <!-- Pattern 1: Component-Scoped (GOOD) -->
  <rect x="50" y="80" width="270" height="450" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="185" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#166534">Pattern 1: Component-Scoped</text>
  <text x="185" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">(RECOMMENDED)</text>
  
  <rect x="65" y="150" width="240" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="80" y="175" font-family="monospace" font-size="10" fill="#22c55e">const imgRef = useRef(null);</text>
  <text x="80" y="195" font-family="monospace" font-size="10" fill="#e2e8f0">useEffect(() =&gt; {'{'}</text>
  <text x="80" y="215" font-family="monospace" font-size="10" fill="#e2e8f0">  // ref valid here</text>
  <text x="80" y="235" font-family="monospace" font-size="10" fill="#22c55e">  return () =&gt; {'{'} imgRef.current = null {'}'};</text>
  <text x="80" y="255" font-family="monospace" font-size="10" fill="#e2e8f0">{'}'}, []);</text>
  
  <rect x="65" y="245" width="240" height="100" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="185" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1e293b">Lifetime</text>
  <text x="185" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Mount → Ref created</text>
  <text x="185" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Unmount → Ref cleared</text>
  <text x="185" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">DOM can be GC'd</text>
  
  <rect x="65" y="360" width="240" height="55" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="185" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">✓ No leak</text>
  <text x="185" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Reference dies with component</text>
  
  <!-- Pattern 2: Global Reference (BAD) -->
  <rect x="335" y="80" width="270" height="450" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="470" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#991b1b">Pattern 2: Global Reference</text>
  <text x="470" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">(AVOID)</text>
  
  <rect x="350" y="150" width="240" height="80" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="365" y="175" font-family="monospace" font-size="10" fill="#ef4444">// Global variable!</text>
  <text x="365" y="195" font-family="monospace" font-size="10" fill="#e2e8f0">let globalImgRef = null;</text>
  <text x="365" y="215" font-family="monospace" font-size="10" fill="#e2e8f0">useEffect(() =&gt; {'{'}</text>
  <text x="365" y="235" font-family="monospace" font-size="10" fill="#fbbf24">  globalImgRef = imgElement;</text>
  <text x="365" y="255" font-family="monospace" font-size="10" fill="#e2e8f0">  // Missing cleanup!</text>
  <text x="365" y="275" font-family="monospace" font-size="10" fill="#e2e8f0">{'}'}, []);</text>
  
  <rect x="350" y="245" width="240" height="100" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="470" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1e293b">Lifetime</text>
  <text x="470" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Mount → Ref assigned</text>
  <text x="470" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">Unmount → Ref NOT cleared</text>
  <text x="470" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">DOM CANNOT be GC'd</text>
  
  <rect x="350" y="360" width="240" height="55" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="470" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">✗ MEMORY LEAK</text>
  <text x="470" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Global keeps DOM alive forever</text>
  
  <!-- Pattern 3: Cached Reference (CONDITIONAL) -->
  <rect x="620" y="80" width="260" height="450" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="750" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#92400e">Pattern 3: Cached Reference</text>
  <text x="750" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">(USE SPARINGLY)</text>
  
  <rect x="635" y="150" width="230" height="90" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="650" y="175" font-family="monospace" font-size="9" fill="#f59e0b">// Cache with WeakMap</text>
  <text x="650" y="195" font-family="monospace" font-size="10" fill="#e2e8f0">const domCache = new WeakMap();</text>
  <text x="650" y="215" font-family="monospace" font-size="10" fill="#e2e8f0">useEffect(() =&gt; {'{'}</text>
  <text x="650" y="235" font-family="monospace" font-size="10" fill="#e2e8f0">  domCache.set(id, element);</text>
  <text x="650" y="255" font-family="monospace" font-size="10" fill="#22c55e">  return () =&gt; domCache.delete(id);</text>
  <text x="650" y="275" font-family="monospace" font-size="10" fill="#e2e8f0">{'}'}, [id]);</text>
  
  <rect x="635" y="255" width="230" height="90" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="750" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1e293b">Lifetime</text>
  <text x="750" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Mount → Cached</text>
  <text x="750" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Unmount → Removed from cache</text>
  <text x="750" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">WeakMap allows GC</text>
  
  <rect x="635" y="360" width="230" height="55" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="750" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">⚠ Conditional</text>
  <text x="750" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">OK if cleanup implemented</text>
  
  <!-- Bottom summary -->
  <rect x="50" y="540" width="830" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="465" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Rule: DOM references should never outlive the component that owns them</text>
</svg>
