<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>

  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    Listener Retention Chain (Architecture)
  </text>

  <defs>
    <marker id="arrowEL1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <rect x="70" y="95" width="250" height="105" rx="12" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="195" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Event Registry</text>
  <text x="195" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">target → handler list</text>
  <text x="195" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">lives until detached</text>

  <line x1="320" y1="147" x2="370" y2="147" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowEL1)"/>

  <rect x="370" y="95" width="250" height="105" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="495" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Callback</text>
  <text x="495" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">reachable via registry</text>
  <text x="495" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">captures closure</text>

  <line x1="620" y1="147" x2="670" y2="147" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowEL1)"/>

  <rect x="670" y="95" width="160" height="105" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="750" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Closure</text>
  <text x="750" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">state + refs</text>
  <text x="750" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">may include DOM</text>

  <rect x="70" y="250" width="760" height="190" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="95" y="280" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Leak condition</text>
  <text x="95" y="310" font-family="system-ui, sans-serif" font-size="11" fill="#334155">
    If the view unmounts but the listener remains attached, view-lifetime objects can become session-lifetime retention.
  </text>

  <rect x="95" y="335" width="245" height="80" rx="12" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="217.5" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Symptom</text>
  <text x="217.5" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">rising baseline</text>

  <rect x="365" y="335" width="245" height="80" rx="12" fill="#F1F5F9" stroke="#94A3B8" stroke-width="2"/>
  <text x="487.5" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Impact</text>
  <text x="487.5" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">more GC cost</text>

  <rect x="585" y="335" width="245" height="80" rx="12" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="707.5" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Fix</text>
  <text x="707.5" y="388" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">reliable detach</text>
</svg>

