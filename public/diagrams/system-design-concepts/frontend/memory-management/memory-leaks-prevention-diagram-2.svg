<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>

  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    Leak Prevention: Performance Trade-offs
  </text>

  <!-- Quadrant -->
  <rect x="70" y="80" width="760" height="360" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="450" y1="110" x2="450" y2="420" stroke="#E2E8F0" stroke-width="2"/>
  <line x1="100" y1="265" x2="800" y2="265" stroke="#E2E8F0" stroke-width="2"/>

  <text x="450" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">More memory retained →</text>
  <text x="95" y="265" text-anchor="middle" transform="rotate(-90 95 265)" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">
    More CPU / recompute →
  </text>

  <!-- Quadrant labels -->
  <text x="265" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Low CPU, High Retention</text>
  <text x="635" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">High CPU, High Retention</text>
  <text x="265" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Low CPU, Low Retention</text>
  <text x="635" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">High CPU, Low Retention</text>

  <!-- Cards -->
  <rect x="130" y="165" width="260" height="80" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="260" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Aggressive Caching</text>
  <text x="260" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">fast responses</text>
  <text x="260" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">requires caps + TTL</text>

  <rect x="510" y="165" width="280" height="80" rx="12" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="650" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Pooling Everywhere</text>
  <text x="650" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">less churn</text>
  <text x="650" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">risk: permanent retention</text>

  <rect x="130" y="325" width="260" height="80" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="260" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Bounded-by-Design</text>
  <text x="260" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">predictable memory</text>
  <text x="260" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">best default at scale</text>

  <rect x="510" y="325" width="280" height="80" rx="12" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="650" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Recompute on Demand</text>
  <text x="650" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">low retention</text>
  <text x="650" y="398" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">risk: CPU &amp; jank</text>
</svg>

