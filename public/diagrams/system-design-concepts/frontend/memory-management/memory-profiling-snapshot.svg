<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Heap Snapshot Analysis - Understanding Retainers</text>
  
  <!-- Left: Object List -->
  <rect x="50" y="80" width="280" height="450" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="190" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Object List</text>
  
  <!-- Table header -->
  <rect x="65" y="125" width="250" height="25" rx="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <text x="80" y="143" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#475569">Constructor</text>
  <text x="180" y="143" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#475569">#</text>
  <text x="210" y="143" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#475569">Size</text>
  <text x="260" y="143" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#475569">Δ</text>
  
  <!-- Object rows -->
  <rect x="65" y="155" width="250" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="80" y="174" font-family="monospace" font-size="10" fill="#1e293b">(array)</text>
  <text x="185" y="174" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">2,450</text>
  <text x="215" y="174" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">2.1MB</text>
  <text x="265" y="174" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">+120</text>
  
  <rect x="65" y="188" width="250" height="28" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="80" y="207" font-family="monospace" font-size="10" fill="#92400e" font-weight="600">UserData</text>
  <text x="185" y="207" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">847</text>
  <text x="215" y="207" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">1.2MB</text>
  <text x="265" y="207" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626" font-weight="600">+847</text>
  
  <rect x="65" y="221" width="250" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="80" y="240" font-family="monospace" font-size="10" fill="#1e293b">(string)</text>
  <text x="185" y="240" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">5,200</text>
  <text x="215" y="240" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">850KB</text>
  <text x="265" y="240" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">+45</text>
  
  <rect x="65" y="254" width="250" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="80" y="273" font-family="monospace" font-size="10" fill="#1e293b">HTMLElement</text>
  <text x="185" y="273" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">1,247</text>
  <text x="215" y="273" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">620KB</text>
  <text x="265" y="273" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">+12</text>
  
  <rect x="65" y="287" width="250" height="28" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="80" y="306" font-family="monospace" font-size="10" fill="#92400e" font-weight="600">EventTarget</text>
  <text x="185" y="306" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">324</text>
  <text x="215" y="306" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">280KB</text>
  <text x="265" y="306" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626" font-weight="600">+324</text>
  
  <rect x="65" y="320" width="250" height="28" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="80" y="339" font-family="monospace" font-size="10" fill="#1e293b">(closure)</text>
  <text x="185" y="339" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">892</text>
  <text x="215" y="339" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">180KB</text>
  <text x="265" y="339" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">+28</text>
  
  <text x="190" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Sorted by Δ (delta)</text>
  <text x="190" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626" font-weight="600">↑ High positive Δ = potential leak</text>
  
  <!-- Right: Retainer Chain -->
  <rect x="350" y="80" width="500" height="450" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="600" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Retainer Chain (Path to Root)</text>
  
  <!-- Selected object -->
  <rect x="370" y="130" width="460" height="50" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="600" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#991b1b">Selected: UserData #847 (1.2MB)</text>
  <text x="600" y="172" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">This object is retained by the chain below</text>
  
  <!-- Arrow up -->
  <line x1="600" y1="180" x2="600" y2="200" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowUp)"/>
  <defs>
    <marker id="arrowUp" markerWidth="10" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 7, 10 7, 5 0" fill="#ef4444"/>
    </marker>
  </defs>
  
  <!-- Retainer 1 -->
  <rect x="370" y="210" width="460" height="45" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="385" y="238" font-family="monospace" font-size="11" fill="#9d174d" font-weight="600">1. eventHandler closure</text>
  <text x="750" y="238" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">(captures UserData)</text>
  
  <!-- Arrow up -->
  <line x1="600" y1="255" x2="600" y2="275" stroke="#ec4899" stroke-width="2" marker-end="url(#arrowUp)"/>
  
  <!-- Retainer 2 -->
  <rect x="370" y="285" width="460" height="45" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="385" y="313" font-family="monospace" font-size="11" fill="#3730a3" font-weight="600">2. EventListener registry</text>
  <text x="750" y="313" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">(holds handler)</text>
  
  <!-- Arrow up -->
  <line x1="600" y1="330" x2="600" y2="350" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowUp)"/>
  
  <!-- Retainer 3 -->
  <rect x="370" y="360" width="460" height="45" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="385" y="388" font-family="monospace" font-size="11" fill="#92400e" font-weight="600">3. window (global)</text>
  <text x="750" y="388" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">(root - never GC'd)</text>
  
  <!-- Root indicator -->
  <rect x="370" y="420" width="460" height="40" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="600" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#065f46">✓ Root found: window.addEventListener never cleaned up</text>
  
  <!-- Bottom callout -->
  <rect x="370" y="475" width="460" height="45" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="600" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#92400e" font-weight="600">Fix: Add cleanup in useEffect - removeEventListener on unmount</text>
</svg>
