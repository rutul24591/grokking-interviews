<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>

  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    Listener Strategy Trade-offs (Performance)
  </text>

  <rect x="60" y="85" width="780" height="360" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <rect x="100" y="130" width="230" height="135" rx="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="215" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Per-node</text>
  <text x="215" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">simple</text>
  <text x="215" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">high cardinality</text>
  <text x="215" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">more teardown edges</text>

  <rect x="360" y="130" width="230" height="135" rx="14" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="475" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Delegation</text>
  <text x="475" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">low cardinality</text>
  <text x="475" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">simpler teardown</text>
  <text x="475" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">routing complexity</text>

  <rect x="620" y="130" width="220" height="135" rx="14" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="730" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Global</text>
  <text x="730" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">centralized</text>
  <text x="730" y="206" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">retention root risk</text>
  <text x="730" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">feature coupling</text>

  <rect x="100" y="300" width="740" height="110" rx="14" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="470" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">High-frequency events (scroll/resize/pointer)</text>
  <text x="470" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">small per-event allocations can create churn; missing detach can retain large graphs</text>
  <text x="470" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">treat as budgeted surfaces with explicit teardown checks</text>
</svg>

