<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Object Reachability and Garbage Collection</text>
  
  <!-- Left: Reachable Objects -->
  <rect x="50" y="80" width="400" height="450" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Reachable Objects (Stay Alive)</text>
  
  <!-- Root node -->
  <circle cx="250" cy="150" r="35" fill="#22c55e" stroke="#15803d" stroke-width="2.5"/>
  <text x="250" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">ROOT</text>
  
  <!-- Level 1 objects -->
  <circle cx="150" cy="230" r="30" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <text x="150" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#166534">Obj A</text>
  
  <circle cx="250" cy="230" r="30" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <text x="250" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#166534">Obj B</text>
  
  <circle cx="350" cy="230" r="30" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <text x="350" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#166534">Obj C</text>
  
  <!-- Level 2 objects -->
  <circle cx="120" cy="310" r="28" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="120" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#166534">A1</text>
  
  <circle cx="180" cy="310" r="28" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="180" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#166534">A2</text>
  
  <circle cx="250" cy="310" r="28" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="250" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#166534">B1</text>
  
  <circle cx="330" cy="310" r="28" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="330" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#166534">C1</text>
  
  <circle cx="380" cy="310" r="28" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="380" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#166534">C2</text>
  
  <!-- Level 3 objects -->
  <circle cx="100" cy="390" r="25" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
  <text x="100" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#166534">A1a</text>
  
  <circle cx="140" cy="390" r="25" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
  <text x="140" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#166534">A1b</text>
  
  <circle cx="250" cy="390" r="25" fill="#dcfce7" stroke="#15803d" stroke-width="1.5"/>
  <text x="250" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#166534">B1a</text>
  
  <!-- Connection lines (reachable) -->
  <line x1="250" y1="185" x2="150" y2="200" stroke="#16a34a" stroke-width="2"/>
  <line x1="250" y1="185" x2="250" y2="200" stroke="#16a34a" stroke-width="2"/>
  <line x1="250" y1="185" x2="350" y2="200" stroke="#16a34a" stroke-width="2"/>
  
  <line x1="150" y1="260" x2="120" y2="282" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="150" y1="260" x2="180" y2="282" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="250" y1="260" x2="250" y2="282" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="350" y1="260" x2="330" y2="282" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="350" y1="260" x2="380" y2="282" stroke="#16a34a" stroke-width="1.5"/>
  
  <line x1="120" y1="338" x2="100" y2="365" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="120" y1="338" x2="140" y2="365" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="250" y1="338" x2="250" y2="365" stroke="#16a34a" stroke-width="1.5"/>
  
  <text x="250" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">All reachable = NOT collected</text>
  
  <!-- Right: Unreachable Objects (Garbage) -->
  <rect x="470" y="80" width="380" height="450" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Unreachable Objects (Garbage)</text>
  
  <!-- Detached objects -->
  <circle cx="570" cy="180" r="30" fill="#fca5a5" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="570" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">Obj X</text>
  
  <circle cx="660" cy="180" r="30" fill="#fca5a5" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="660" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">Obj Y</text>
  
  <circle cx="750" cy="180" r="30" fill="#fca5a5" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="750" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">Obj Z</text>
  
  <!-- Child objects -->
  <circle cx="620" cy="270" r="28" fill="#fecaca" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="620" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#991b1b">X1</text>
  
  <circle cx="700" cy="270" r="28" fill="#fecaca" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="700" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#991b1b">Y1</text>
  
  <circle cx="780" cy="270" r="28" fill="#fecaca" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="780" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#991b1b">Z1</text>
  
  <!-- Connection lines (unreachable) -->
  <line x1="570" y1="210" x2="620" y2="242" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="660" y1="210" x2="700" y2="242" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="750" y1="210" x2="780" y2="242" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  
  <!-- Cycle reference example -->
  <circle cx="600" cy="370" r="30" fill="#fca5a5" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="600" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">Obj P</text>
  
  <circle cx="720" cy="370" r="30" fill="#fca5a5" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="720" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">Obj Q</text>
  
  <!-- Cycle arrows -->
  <path d="M 630 370 Q 660 370, 690 370" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="3,2" marker-end="url(#arrowCycle1)"/>
  <defs>
    <marker id="arrowCycle1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
  
  <path d="M 690 385 Q 660 385, 630 385" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="3,2" marker-end="url(#arrowCycle2)"/>
  <defs>
    <marker id="arrowCycle2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
  
  <text x="660" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b">Cycle: P ↔ Q</text>
  <text x="660" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b">(No path from ROOT)</text>
  
  <text x="660" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b">All unreachable = GC will collect</text>
  
  <!-- Bottom legend -->
  <rect x="50" y="540" width="300" height="30" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="200" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Reachable from ROOT (stays alive)</text>
  
  <rect x="550" y="540" width="300" height="30" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="700" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b">✗ Unreachable (will be collected)</text>
</svg>
