<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Memory Leak Detection Workflow</text>
  
  <!-- Step 1: Baseline -->
  <rect x="50" y="80" width="160" height="100" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="130" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#166534">1. Establish</text>
  <text x="130" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#166534">Baseline</text>
  <text x="130" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Load fresh page,</text>
  <text x="130" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">take heap snapshot</text>
  
  <!-- Arrow 1 -->
  <defs>
    <marker id="arrowFlow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#64748b"/>
    </marker>
  </defs>
  <line x1="210" y1="130" x2="250" y2="130" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowFlow)"/>
  
  <!-- Step 2: Exercise -->
  <rect x="255" y="80" width="160" height="100" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="335" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#854d0e">2. Exercise</text>
  <text x="335" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#854d0e">App Flow</text>
  <text x="335" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a16207">Navigate, interact,</text>
  <text x="335" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a16207">trigger suspected leak</text>
  
  <!-- Arrow 2 -->
  <line x1="415" y1="130" x2="455" y2="130" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowFlow)"/>
  
  <!-- Step 3: Snapshot -->
  <rect x="460" y="80" width="160" height="100" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="540" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#92400e">3. Take</text>
  <text x="540" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#92400e">Snapshot</text>
  <text x="540" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Capture heap after</text>
  <text x="540" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">suspected leak occurs</text>
  
  <!-- Arrow 3 -->
  <line x1="620" y1="130" x2="660" y2="130" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowFlow)"/>
  
  <!-- Step 4: Compare -->
  <rect x="665" y="80" width="160" height="100" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="745" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#991b1b">4. Compare</text>
  <text x="745" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#991b1b">Snapshots</text>
  <text x="745" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">Find objects that</text>
  <text x="745" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">grew unexpectedly</text>
  
  <!-- Middle Section: Analysis -->
  <rect x="50" y="220" width="800" height="180" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="450" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Heap Snapshot Analysis</text>
  
  <!-- Analysis boxes -->
  <rect x="70" y="270" width="240" height="110" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af">Shallow Size</text>
  <text x="190" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Memory held directly</text>
  <text x="190" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">by the object itself</text>
  <text x="190" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">e.g., array length, string</text>
  
  <rect x="330" y="270" width="240" height="110" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="450" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#9d174d">Retained Size</text>
  <text x="450" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Memory freed if this</text>
  <text x="450" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">object is collected</text>
  <text x="450" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">Includes all children</text>
  
  <rect x="590" y="270" width="240" height="110" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="710" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46">Retainers</text>
  <text x="710" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">Objects keeping this</text>
  <text x="710" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#374151">alive (reference chain)</text>
  <text x="710" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Trace to find root cause</text>
  
  <!-- Bottom Section: Fix & Verify -->
  <rect x="50" y="430" width="380" height="100" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="240" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">5. Apply Fix</text>
  <text x="240" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Break reference chain, add cleanup,</text>
  <text x="240" y="502" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">bound data structures, use WeakMap</text>
  
  <rect x="450" y="430" width="400" height="100" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="650" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#5b21b6">6. Verify Fix</text>
  <text x="650" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6d28d9">Repeat workflow, confirm memory</text>
  <text x="650" y="502" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6d28d9">stays stable across navigation cycles</text>
</svg>
