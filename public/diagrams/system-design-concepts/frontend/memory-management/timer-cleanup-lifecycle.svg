<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Timer Lifecycle and Cleanup Points</text>
  
  <!-- Main lifecycle flow -->
  <rect x="50" y="80" width="800" height="180" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Timer Lifecycle Stages</text>
  
  <!-- Stage 1: Create -->
  <circle cx="130" cy="170" r="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="130" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">1. Create</text>
  <text x="130" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">setTimeout</text>
  <text x="130" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">setInterval</text>
  
  <!-- Arrow 1 -->
  <line x1="180" y1="170" x2="220" y2="170" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowTimer)"/>
  <defs>
    <marker id="arrowTimer" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#64748b"/>
    </marker>
  </defs>
  <text x="200" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">schedules</text>
  
  <!-- Stage 2: Wait -->
  <circle cx="280" cy="170" r="50" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/>
  <text x="280" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0c4a6e">2. Wait</text>
  <text x="280" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#075985">In timer queue</text>
  <text x="280" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#075985">Callback pending</text>
  
  <!-- Arrow 2 -->
  <line x1="330" y1="170" x2="370" y2="170" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowTimer)"/>
  <text x="350" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">delay expires</text>
  
  <!-- Stage 3: Execute -->
  <circle cx="450" cy="170" r="50" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="450" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af">3. Execute</text>
  <text x="450" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">Callback runs</text>
  <text x="450" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">On main thread</text>
  
  <!-- Arrow 3 (for setInterval) -->
  <path d="M 500 170 Q 520 170, 520 140 L 520 110 Q 520 100, 540 100" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="530" y="95" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">interval</text>
  
  <!-- Arrow 3 (continue) -->
  <line x1="500" y1="170" x2="540" y2="170" stroke="#64748b" stroke-width="2.5" marker-end="url(#arrowTimer)"/>
  <text x="520" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">completes</text>
  
  <!-- Stage 4: Cleanup or Repeat -->
  <rect x="560" y="120" width="270" height="100" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="695" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#166534">4. Decision Point</text>
  
  <rect x="580" y="160" width="110" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="635" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">setInterval</text>
  <text x="635" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Repeats → Stage 2</text>
  
  <rect x="710" y="160" width="100" height="50" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="760" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">setTimeout</text>
  <text x="760" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Done (auto-cleanup)</text>
  
  <!-- Cleanup section -->
  <rect x="50" y="280" width="400" height="250" rx="12" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">The Leak Problem</text>
  
  <rect x="70" y="335" width="360" height="70" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">setInterval Without clearInterval</text>
  <text x="250" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">Timer keeps firing after component unmounts</text>
  <text x="250" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">Callback captures stale closure, causes errors</text>
  
  <rect x="70" y="420" width="360" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="250" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Common Scenarios</text>
  <text x="250" y="468" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">• Polling continues after navigation away</text>
  <text x="250" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">• Retry loops overlap, causing request storms</text>
  <text x="250" y="502" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">• Animation frames continue on unmounted components</text>
  
  <!-- Solution section -->
  <rect x="470" y="280" width="380" height="250" rx="12" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="660" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#065f46">The Solution: Cleanup Patterns</text>
  
  <rect x="490" y="335" width="340" height="55" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#047857">useEffect Cleanup</text>
  <text x="660" y="380" text-anchor="middle" font-family="monospace" font-size="10" fill="#059669">return () =&gt; clearInterval(id)</text>
  
  <rect x="490" y="400" width="340" height="55" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="660" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">AbortController for Fetch</text>
  <text x="660" y="445" text-anchor="middle" font-family="monospace" font-size="10" fill="#1e3a8a">controller.abort() cancels pending</text>
  
  <rect x="490" y="465" width="340" height="55" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="660" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#5b21b6">Cancel Animation Frames</text>
  <text x="660" y="510" text-anchor="middle" font-family="monospace" font-size="10" fill="#6d28d9">return () =&gt; cancelAnimationFrame(id)</text>
</svg>
