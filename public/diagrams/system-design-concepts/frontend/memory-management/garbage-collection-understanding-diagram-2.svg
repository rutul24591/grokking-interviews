<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>

  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    GC Performance Trade-offs (Frontend Symptoms)
  </text>

  <!-- Left: Allocation vs Pause -->
  <rect x="50" y="80" width="380" height="330" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="240" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">
    Allocation Rate vs Pause Risk
  </text>

  <!-- Axes -->
  <line x1="90" y1="360" x2="390" y2="360" stroke="#94A3B8" stroke-width="2"/>
  <line x1="90" y1="360" x2="90" y2="150" stroke="#94A3B8" stroke-width="2"/>
  <text x="240" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">Allocation rate</text>
  <text x="55" y="255" text-anchor="middle" transform="rotate(-90 55 255)" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">
    Pause / jank risk
  </text>

  <!-- Curve -->
  <path d="M 95 350 C 170 320, 230 285, 300 235 C 340 205, 360 185, 385 165" fill="none" stroke="#EC4899" stroke-width="4"/>
  <circle cx="150" cy="330" r="6" fill="#10B981"/>
  <text x="150" y="318" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#065F46">OK</text>
  <circle cx="280" cy="250" r="6" fill="#F59E0B"/>
  <text x="280" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#92400E">RISK</text>
  <circle cx="365" cy="180" r="6" fill="#EF4444"/>
  <text x="365" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#7F1D1D">JANK</text>

  <text x="240" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">
    Tail latency regresses before averages.
  </text>

  <!-- Right: Churn vs Retention -->
  <rect x="470" y="80" width="380" height="330" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="660" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#111827">
    Two Failure Modes
  </text>

  <rect x="500" y="145" width="320" height="110" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="660" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Churn</text>
  <text x="660" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Many short-lived allocations</text>
  <text x="660" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Symptom: frequent minor GCs</text>
  <text x="660" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Mitigation: reduce intermediates</text>

  <rect x="500" y="275" width="320" height="110" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="660" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Retention</text>
  <text x="660" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Objects live too long (leaks)</text>
  <text x="660" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Symptom: old-gen growth</text>
  <text x="660" y="372" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">Mitigation: break retainers</text>

  <!-- Bottom callout -->
  <rect x="50" y="430" width="800" height="45" rx="12" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="450" y="458" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400E" font-weight="700">
    Interview framing: you rarely tune GC in the browser; you design allocation and lifetime patterns so GC stays predictable.
  </text>
</svg>

