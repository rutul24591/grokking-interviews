<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>

  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    DOM Handles: Caching vs Lookup (Performance Trade-offs)
  </text>

  <rect x="70" y="80" width="760" height="360" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Left card -->
  <rect x="110" y="120" width="320" height="140" rx="14" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="270" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Cache DOM References</text>
  <text x="270" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">lower CPU in hot paths</text>
  <text x="270" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">risk: retention beyond view</text>
  <text x="270" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">leak blast radius high</text>

  <!-- Right card -->
  <rect x="470" y="120" width="320" height="140" rx="14" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="630" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Lookup on Demand</text>
  <text x="630" y="176" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">safer lifetimes</text>
  <text x="630" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">bounded retention edges</text>
  <text x="630" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">risk: repeated lookup CPU</text>

  <!-- Bottom: virtualization -->
  <rect x="110" y="290" width="680" height="120" rx="14" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="450" y="322" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Virtualization / Windowing</text>
  <text x="450" y="346" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">bounds DOM cardinality</text>
  <text x="450" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">reduces memory and event surfaces</text>
  <text x="450" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">mitigates long-session degradation</text>
</svg>

