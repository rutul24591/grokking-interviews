<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Memory Monitoring &amp; Regression Prevention</text>
  
  <!-- Left: Monitoring Dashboard -->
  <rect x="50" y="80" width="400" height="280" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Production Memory Dashboard</text>
  
  <!-- Memory usage chart -->
  <rect x="70" y="130" width="360" height="140" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  
  <!-- Y-axis labels -->
  <text x="65" y="150" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">500MB</text>
  <text x="65" y="190" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">250MB</text>
  <text x="65" y="230" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">0MB</text>
  
  <!-- Threshold line -->
  <line x1="80" y1="160" x2="420" y2="160" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="430" y="165" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626" font-weight="600">Alert threshold</text>
  
  <!-- Healthy baseline line -->
  <line x1="80" y1="210" x2="420" y2="210" stroke="#22c55e" stroke-width="2"/>
  <text x="430" y="215" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a" font-weight="600">Healthy baseline</text>
  
  <!-- Leak growth line -->
  <polyline points="80,210 140,205 200,195 260,180 320,165 380,150" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="390" y="145" font-family="system-ui, sans-serif" font-size="10" fill="#d97706" font-weight="600">Leak detected</text>
  
  <!-- X-axis labels -->
  <text x="80" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">0min</text>
  <text x="200" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">15min</text>
  <text x="320" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">30min</text>
  <text x="420" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">60min</text>
  
  <!-- Metrics boxes -->
  <rect x="70" y="300" width="110" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="125" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e40af">Heap Size</text>
  <text x="125" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e3a8a">245 MB</text>
  
  <rect x="190" y="300" width="110" height="50" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="1"/>
  <text x="245" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9d174d">DOM Nodes</text>
  <text x="245" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#9d174d">1,247</text>
  
  <rect x="310" y="300" width="110" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="365" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#92400e">Event Listeners</text>
  <text x="365" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">89</text>
  
  <!-- Right: Prevention Strategy -->
  <rect x="470" y="80" width="380" height="280" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Regression Prevention Strategy</text>
  
  <!-- Prevention steps -->
  <rect x="490" y="130" width="340" height="55" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="515" y="155" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#166534">1. CI Memory Budget</text>
  <text x="515" y="175" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Fail build if heap exceeds threshold</text>
  
  <rect x="490" y="195" width="340" height="55" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="515" y="220" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af">2. Automated Snapshots</text>
  <text x="515" y="240" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#1e3a8a">Compare heap snapshots in CI pipeline</text>
  
  <rect x="490" y="260" width="340" height="55" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="515" y="285" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#5b21b6">3. Alert on Growth</text>
  <text x="515" y="305" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#6d28d9">PageDog/Slack alerts on memory growth</text>
  
  <rect x="490" y="325" width="340" height="55" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="515" y="350" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">4. Regular Audits</text>
  <text x="515" y="370" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Monthly memory profiling sessions</text>
  
  <!-- Bottom: Key Metrics -->
  <rect x="50" y="380" width="800" height="150" rx="12" fill="#fafafa" stroke="#e5e7eb" stroke-width="2"/>
  <text x="450" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1f2937">Key Memory Metrics to Track</text>
  
  <!-- Metric 1 -->
  <rect x="70" y="430" width="170" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="155" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#1e40af">JS Heap Size</text>
  <text x="155" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Total heap memory</text>
  <text x="155" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Alert: &gt;500MB sustained</text>
  
  <!-- Metric 2 -->
  <rect x="255" y="430" width="170" height="80" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="340" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#9d174d">DOM Nodes</text>
  <text x="340" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Count in document</text>
  <text x="340" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Alert: &gt;5000 nodes</text>
  
  <!-- Metric 3 -->
  <rect x="440" y="430" width="170" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="525" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#92400e">Detached Nodes</text>
  <text x="525" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Removed but retained</text>
  <text x="525" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Alert: Any growth trend</text>
  
  <!-- Metric 4 -->
  <rect x="625" y="430" width="170" height="80" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="710" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#065f46">Event Listeners</text>
  <text x="710" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#374151">Active listeners</text>
  <text x="710" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#374151">Alert: Growing baseline</text>
</svg>
