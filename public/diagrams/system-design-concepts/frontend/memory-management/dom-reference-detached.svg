<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Detached DOM Leak - How It Happens</text>
  
  <!-- Left: Before Removal -->
  <rect x="50" y="80" width="400" height="450" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Before: Component Mounted</text>
  
  <!-- DOM Tree -->
  <rect x="80" y="135" width="340" height="380" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Document root -->
  <rect x="150" y="150" width="200" height="35" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="173" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">document</text>
  
  <!-- Arrow down -->
  <line x1="250" y1="185" x2="250" y2="205" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- HTML -->
  <rect x="150" y="205" width="200" height="35" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="228" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">&lt;html&gt;</text>
  
  <!-- Arrow down -->
  <line x1="250" y1="240" x2="250" y2="260" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Body -->
  <rect x="150" y="260" width="200" height="35" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="283" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">&lt;body&gt;</text>
  
  <!-- Arrow down -->
  <line x1="250" y1="295" x2="250" y2="315" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Component root -->
  <rect x="150" y="315" width="200" height="35" rx="6" fill="#86efac" stroke="#16a34a" stroke-width="2"/>
  <text x="250" y="338" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#166534">#app (Component)</text>
  
  <!-- Child elements -->
  <rect x="170" y="365" width="160" height="28" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="250" y="383" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#166534">&lt;div class="card"&gt;</text>
  
  <rect x="180" y="400" width="140" height="25" rx="4" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <text x="250" y="417" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">&lt;img src="..."&gt;</text>
  
  <!-- JS Reference box -->
  <rect x="280" y="380" width="130" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="345" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">JS Reference</text>
  <text x="345" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">imgRef.current</text>
  
  <!-- Connection line -->
  <line x1="320" y1="410" x2="320" y2="410" stroke="#f59e0b" stroke-width="2"/>
  <line x1="320" y1="410" x2="280" y2="410" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,2"/>
  
  <text x="250" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ DOM in document</text>
  <text x="250" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ JS reference valid</text>
  <text x="250" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Memory will be freed on unmount</text>
  
  <!-- Right: After Removal (Leak) -->
  <rect x="470" y="80" width="380" height="450" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">After: Component Unmounted (LEAK!)</text>
  
  <!-- Detached DOM Tree -->
  <rect x="490" y="135" width="340" height="380" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="5,5"/>
  
  <!-- Detached label -->
  <text x="660" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#dc2626">⚠ DETACHED FROM DOCUMENT</text>
  
  <!-- Same DOM structure but faded -->
  <rect x="560" y="180" width="200" height="35" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="660" y="203" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">document</text>
  
  <line x1="660" y1="215" x2="660" y2="235" stroke="#fca5a5" stroke-width="2" stroke-dasharray="3,2"/>
  
  <rect x="560" y="235" width="200" height="35" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="660" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">&lt;html&gt;</text>
  
  <line x1="660" y1="270" x2="660" y2="290" stroke="#fca5a5" stroke-width="2" stroke-dasharray="3,2"/>
  
  <rect x="560" y="290" width="200" height="35" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="2"/>
  <text x="660" y="313" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">&lt;body&gt;</text>
  
  <line x1="660" y1="325" x2="660" y2="345" stroke="#fca5a5" stroke-width="2" stroke-dasharray="3,2"/>
  
  <!-- Component removed from tree -->
  <rect x="560" y="345" width="200" height="35" rx="6" fill="#fecaca" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="660" y="368" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#dc2626">#app (REMOVED)</text>
  
  <!-- But child still referenced! -->
  <rect x="580" y="395" width="160" height="28" rx="4" fill="#fecaca" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="660" y="413" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">&lt;img&gt; DETACHED</text>
  
  <!-- JS Reference still exists -->
  <rect x="690" y="410" width="130" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="755" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">JS Reference</text>
  <text x="755" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">imgRef.current</text>
  
  <!-- Connection line showing the leak -->
  <line x1="730" y1="440" x2="700" y2="440" stroke="#f59e0b" stroke-width="2"/>
  <line x1="700" y1="440" x2="680" y2="420" stroke="#ef4444" stroke-width="2"/>
  
  <text x="660" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ DOM removed from document</text>
  <text x="660" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ JS reference still holds it</text>
  <text x="660" y="525" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ Cannot be GC'd = LEAK!</text>
</svg>
