<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>

  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    Memory Profiling Workflow (Repeatable Pipeline)
  </text>

  <defs>
    <marker id="arrowPipeM1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Steps -->
  <rect x="60" y="95" width="170" height="90" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="145" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Reproduce</text>
  <text x="145" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">stable scenario</text>
  <text x="145" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">clear steady state</text>

  <line x1="230" y1="140" x2="280" y2="140" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowPipeM1)"/>

  <rect x="280" y="95" width="190" height="90" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="375" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Capture</text>
  <text x="375" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">timeline + snapshots</text>
  <text x="375" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">baseline vs post</text>

  <line x1="470" y1="140" x2="520" y2="140" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowPipeM1)"/>

  <rect x="520" y="95" width="190" height="90" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="615" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Analyze</text>
  <text x="615" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">retainer chains</text>
  <text x="615" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">diff snapshots</text>

  <line x1="710" y1="140" x2="760" y2="140" stroke="#64748B" stroke-width="2.5" marker-end="url(#arrowPipeM1)"/>

  <rect x="760" y="95" width="120" height="90" rx="12" fill="#FCE7F3" stroke="#EC4899" stroke-width="2"/>
  <text x="820" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Validate</text>
  <text x="820" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">soak test</text>
  <text x="820" y="168" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">repeat cycles</text>

  <!-- Bottom panel: what to look for -->
  <rect x="60" y="225" width="820" height="210" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="90" y="255" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#111827">Signals to look for</text>

  <rect x="90" y="275" width="250" height="135" rx="12" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="215" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Timeline Shape</text>
  <text x="215" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">stable floor = healthy</text>
  <text x="215" y="352" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">rising floor = retention</text>
  <text x="215" y="374" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">flat but busy = churn</text>

  <rect x="370" y="275" width="250" height="135" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="495" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Retainer Chains</text>
  <text x="495" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">unexpected global refs</text>
  <text x="495" y="352" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">unbounded maps/arrays</text>
  <text x="495" y="374" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">detached DOM retention</text>

  <rect x="650" y="275" width="230" height="135" rx="12" fill="#FFF7ED" stroke="#F59E0B" stroke-width="2"/>
  <text x="765" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Regression Proof</text>
  <text x="765" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">repeat navigation</text>
  <text x="765" y="352" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">long-session soak</text>
  <text x="765" y="374" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#334155">budget gates</text>
</svg>

