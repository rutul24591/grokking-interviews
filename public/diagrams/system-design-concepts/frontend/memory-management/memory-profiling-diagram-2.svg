<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="500" rx="10" fill="#F8F9FC"/>

  <text x="450" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#111827">
    Profiling Techniques: Fidelity vs Overhead
  </text>

  <!-- Table container -->
  <rect x="60" y="85" width="780" height="360" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="100" y="120" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Technique</text>
  <text x="360" y="120" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Best for</text>
  <text x="660" y="120" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Trade-off</text>

  <line x1="80" y1="132" x2="820" y2="132" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Rows -->
  <!-- Row 1 -->
  <rect x="80" y="150" width="220" height="62" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="190" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Heap Snapshot</text>
  <text x="190" y="198" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">object graph</text>

  <text x="360" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#334155">retention root cause</text>
  <text x="360" y="200" font-family="system-ui, sans-serif" font-size="11" fill="#334155">retainer chains</text>

  <text x="660" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#334155">heavy, expert interpretation</text>
  <text x="660" y="200" font-family="system-ui, sans-serif" font-size="11" fill="#334155">can perturb lifetimes</text>

  <!-- Row 2 -->
  <rect x="80" y="225" width="220" height="62" rx="10" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="190" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Allocation Timeline</text>
  <text x="190" y="273" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">time series</text>

  <text x="360" y="255" font-family="system-ui, sans-serif" font-size="11" fill="#334155">leak shape detection</text>
  <text x="360" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#334155">churn vs retention</text>

  <text x="660" y="255" font-family="system-ui, sans-serif" font-size="11" fill="#334155">lower attribution detail</text>
  <text x="660" y="275" font-family="system-ui, sans-serif" font-size="11" fill="#334155">still adds overhead</text>

  <!-- Row 3 -->
  <rect x="80" y="300" width="220" height="62" rx="10" fill="#FFF7ED" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="190" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Soak Automation</text>
  <text x="190" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">repeat journeys</text>

  <text x="360" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#334155">regression prevention</text>
  <text x="360" y="350" font-family="system-ui, sans-serif" font-size="11" fill="#334155">release gates</text>

  <text x="660" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#334155">scenario stability needed</text>
  <text x="660" y="350" font-family="system-ui, sans-serif" font-size="11" fill="#334155">risk of flaky signals</text>

  <!-- Row 4 -->
  <rect x="80" y="375" width="220" height="52" rx="10" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5"/>
  <text x="190" y="404" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#111827">Prod Telemetry</text>

  <text x="360" y="400" font-family="system-ui, sans-serif" font-size="11" fill="#334155">detection and prioritization</text>

  <text x="660" y="400" font-family="system-ui, sans-serif" font-size="11" fill="#334155">limited detail, privacy limits</text>

  <!-- Footer note -->
  <text x="450" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">
    Practical strategy: production signals → lab profiling for root cause → automation to prevent regressions.
  </text>
</svg>

