<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Timer Overlap Problem and Solutions</text>
  
  <!-- Top: The Problem -->
  <rect x="50" y="80" width="800" height="200" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">The Problem: Overlapping Timers After Re-renders</text>
  
  <!-- Timeline without cleanup -->
  <rect x="70" y="130" width="760" height="130" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Time axis -->
  <line x1="80" y1="240" x2="820" y2="240" stroke="#9ca3af" stroke-width="2"/>
  <text x="820" y="255" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Time →</text>
  
  <!-- Render events -->
  <line x1="150" y1="235" x2="150" y2="245" stroke="#6366f1" stroke-width="2"/>
  <text x="150" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4f46e5">Render 1</text>
  
  <line x1="300" y1="235" x2="300" y2="245" stroke="#6366f1" stroke-width="2"/>
  <text x="300" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4f46e5">Render 2</text>
  
  <line x1="450" y1="235" x2="450" y2="245" stroke="#6366f1" stroke-width="2"/>
  <text x="450" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4f46e5">Render 3</text>
  
  <line x1="600" y1="235" x2="600" y2="245" stroke="#6366f1" stroke-width="2"/>
  <text x="600" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4f46e5">Render 4</text>
  
  <!-- Timer 1 (from Render 1) -->
  <rect x="150" y="145" width="660" height="20" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="160" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Timer 1 (never cleaned up)</text>
  
  <!-- Timer 2 (from Render 2) -->
  <rect x="300" y="170" width="510" height="20" rx="4" fill="#f97316" opacity="0.7"/>
  <text x="310" y="185" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Timer 2</text>
  
  <!-- Timer 3 (from Render 3) -->
  <rect x="450" y="195" width="360" height="20" rx="4" fill="#eab308" opacity="0.7"/>
  <text x="460" y="210" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Timer 3</text>
  
  <!-- Timer 4 (from Render 4) -->
  <rect x="600" y="220" width="210" height="20" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="610" y="235" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Timer 4</text>
  
  <!-- Impact callout -->
  <rect x="70" y="280" width="300" height="80" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="220" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#991b1b">Impact at T=4:</text>
  <text x="220" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">• 4 timers firing simultaneously</text>
  <text x="220" y="342" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">• 4x API calls per interval</text>
  <text x="220" y="357" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">• Memory grows with each render</text>
  
  <!-- Bottom: The Solution -->
  <rect x="50" y="300" width="800" height="230" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">The Solution: Cleanup Prevents Overlap</text>
  
  <!-- Timeline with cleanup -->
  <rect x="70" y="350" width="760" height="160" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Time axis -->
  <line x1="80" y1="490" x2="820" y2="490" stroke="#9ca3af" stroke-width="2"/>
  <text x="820" y="505" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">Time →</text>
  
  <!-- Render events -->
  <line x1="150" y1="485" x2="150" y2="495" stroke="#6366f1" stroke-width="2"/>
  <text x="150" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4f46e5">Render 1</text>
  
  <line x1="300" y1="485" x2="300" y2="495" stroke="#6366f1" stroke-width="2"/>
  <text x="300" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4f46e5">Render 2</text>
  
  <line x1="450" y1="485" x2="450" y2="495" stroke="#6366f1" stroke-width="2"/>
  <text x="450" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4f46e5">Render 3</text>
  
  <line x1="600" y1="485" x2="600" y2="495" stroke="#6366f1" stroke-width="2"/>
  <text x="600" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4f46e5">Render 4</text>
  
  <!-- Timer 1 (cleaned up at Render 2) -->
  <rect x="150" y="365" width="145" height="20" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="160" y="380" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Timer 1</text>
  <line x1="295" y1="365" x2="295" y2="385" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="310" y="380" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444" font-weight="600">✕ cleaned</text>
  
  <!-- Timer 2 (cleaned up at Render 3) -->
  <rect x="300" y="390" width="145" height="20" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="310" y="405" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Timer 2</text>
  <line x1="445" y1="390" x2="445" y2="410" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="460" y="405" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444" font-weight="600">✕ cleaned</text>
  
  <!-- Timer 3 (cleaned up at Render 4) -->
  <rect x="450" y="415" width="145" height="20" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="460" y="430" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Timer 3</text>
  <line x1="595" y1="415" x2="595" y2="435" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="610" y="430" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444" font-weight="600">✕ cleaned</text>
  
  <!-- Timer 4 (current, still running) -->
  <rect x="600" y="440" width="210" height="20" rx="4" fill="#22c55e" opacity="0.7"/>
  <text x="610" y="455" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" font-weight="600">Timer 4 (only active one)</text>
  
  <!-- Solution callout -->
  <rect x="70" y="530" width="350" height="60" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="245" y="555" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#065f46">Result with Cleanup:</text>
  <text x="245" y="575" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">• Only 1 timer active at any time</text>
  <text x="245" y="590" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">• No overlapping API calls</text>
  
  <!-- Code snippet -->
  <rect x="440" y="530" width="390" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="455" y="555" font-family="monospace" font-size="10" fill="#22c55e">useEffect(() =&gt; {'{'}</text>
  <text x="455" y="572" font-family="monospace" font-size="10" fill="#e2e8f0">  const id = setInterval(poll, 1000);</text>
  <text x="455" y="589" font-family="monospace" font-size="10" fill="#22c55e">  return () =&gt; clearInterval(id); // ← This prevents overlap!</text>
  <text x="455" y="606" font-family="monospace" font-size="10" fill="#22c55e">{'}'}, []);</text>
</svg>
