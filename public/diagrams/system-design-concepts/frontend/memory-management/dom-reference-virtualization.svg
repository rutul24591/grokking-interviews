<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Virtualization Reduces DOM Memory Footprint</text>
  
  <!-- Left: Without Virtualization -->
  <rect x="50" y="80" width="400" height="450" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Without Virtualization</text>
  
  <!-- DOM Tree with all items -->
  <rect x="70" y="135" width="360" height="380" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Root -->
  <rect x="90" y="150" width="320" height="30" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">&lt;ul&gt; - List Container</text>
  
  <!-- Many list items -->
  <rect x="110" y="190" width="280" height="20" rx="4" fill="#fecaca" stroke="#fca5a5" stroke-width="1"/>
  <text x="250" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#7f1d1d">&lt;li&gt; Item 1&lt;/li&gt;</text>
  
  <rect x="110" y="215" width="280" height="20" rx="4" fill="#fecaca" stroke="#fca5a5" stroke-width="1"/>
  <text x="250" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#7f1d1d">&lt;li&gt; Item 2&lt;/li&gt;</text>
  
  <rect x="110" y="240" width="280" height="20" rx="4" fill="#fecaca" stroke="#fca5a5" stroke-width="1"/>
  <text x="250" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#7f1d1d">&lt;li&gt; Item 3&lt;/li&gt;</text>
  
  <rect x="110" y="265" width="280" height="20" rx="4" fill="#fecaca" stroke="#fca5a5" stroke-width="1"/>
  <text x="250" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#7f1d1d">&lt;li&gt; Item 4&lt;/li&gt;</text>
  
  <rect x="110" y="290" width="280" height="20" rx="4" fill="#fecaca" stroke="#fca5a5" stroke-width="1"/>
  <text x="250" y="305" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#7f1d1d">&lt;li&gt; Item 5&lt;/li&gt;</text>
  
  <!-- Dots indicating more -->
  <text x="250" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#991b1b">⋮</text>
  <text x="250" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#991b1b">(9,995 more items)</text>
  
  <rect x="110" y="370" width="280" height="20" rx="4" fill="#fecaca" stroke="#fca5a5" stroke-width="1"/>
  <text x="250" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#7f1d1d">&lt;li&gt; Item 10000&lt;/li&gt;</text>
  
  <!-- Stats -->
  <rect x="70" y="430" width="360" height="70" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#991b1b">Memory Impact</text>
  <text x="250" y="478" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">DOM Nodes: 10,000+</text>
  <text x="250" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d">Memory: ~50-100 MB</text>
  
  <!-- Right: With Virtualization -->
  <rect x="470" y="80" width="380" height="450" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">With Virtualization</text>
  
  <!-- Virtualized DOM -->
  <rect x="490" y="135" width="340" height="380" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Outer container -->
  <rect x="510" y="150" width="300" height="350" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">Viewport (visible area)</text>
  
  <!-- Only visible items rendered -->
  <rect x="530" y="190" width="260" height="25" rx="4" fill="#86efac" stroke="#16a34a" stroke-width="1.5"/>
  <text x="660" y="208" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">&lt;li&gt; Item 247 (visible)&lt;/li&gt;</text>
  
  <rect x="530" y="220" width="260" height="25" rx="4" fill="#86efac" stroke="#16a34a" stroke-width="1.5"/>
  <text x="660" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">&lt;li&gt; Item 248 (visible)&lt;/li&gt;</text>
  
  <rect x="530" y="250" width="260" height="25" rx="4" fill="#86efac" stroke="#16a34a" stroke-width="1.5"/>
  <text x="660" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">&lt;li&gt; Item 249 (visible)&lt;/li&gt;</text>
  
  <rect x="530" y="280" width="260" height="25" rx="4" fill="#86efac" stroke="#16a34a" stroke-width="1.5"/>
  <text x="660" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">&lt;li&gt; Item 250 (visible)&lt;/li&gt;</text>
  
  <rect x="530" y="310" width="260" height="25" rx="4" fill="#86efac" stroke="#16a34a" stroke-width="1.5"/>
  <text x="660" y="328" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">&lt;li&gt; Item 251 (visible)&lt;/li&gt;</text>
  
  <!-- Overscan buffer -->
  <rect x="520" y="345" width="280" height="50" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="660" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">Overscan buffer (2 items)</text>
  <text x="660" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#92400e">Pre-rendered for smooth scroll</text>
  
  <!-- Inner tall container -->
  <line x1="505" y1="145" x2="505" y2="505" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="495" y="350" text-anchor="end" font-family="system-ui, sans-serif" font-size="8" fill="#6b7280" transform="rotate(-90, 495, 350)">Total height = 10,000 × itemHeight</text>
  
  <!-- Stats -->
  <rect x="490" y="430" width="340" height="70" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46">Memory Impact</text>
  <text x="660" y="478" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">DOM Nodes: ~25 (visible + overscan)</text>
  <text x="660" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Memory: ~2-5 MB</text>
  
  <!-- Bottom comparison -->
  <rect x="50" y="540" width="800" height="30" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Virtualization reduces DOM nodes by 99%+ for long lists, dramatically reducing memory pressure</text>
</svg>
