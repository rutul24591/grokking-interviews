<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Memory Impact: With vs Without Cleanup</text>
  
  <!-- Left Chart: Without Cleanup -->
  <rect x="50" y="80" width="400" height="280" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Without Cleanup (Memory Leak)</text>
  
  <!-- Chart area -->
  <rect x="70" y="130" width="360" height="180" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Y-axis -->
  <line x1="70" y1="140" x2="70" y2="300" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="65" y="145" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">500MB</text>
  <text x="65" y="220" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">250MB</text>
  <text x="65" y="305" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">0MB</text>
  
  <!-- Threshold line -->
  <line x1="70" y1="160" x2="430" y2="160" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="435" y="165" font-family="system-ui, sans-serif" font-size="9" fill="#dc2626">CRASH</text>
  
  <!-- Memory growth line (steep) -->
  <polyline points="70,290 130,270 190,240 250,200 310,170 370,145 430,130" fill="none" stroke="#ef4444" stroke-width="3"/>
  
  <!-- Navigation markers -->
  <line x1="130" y1="290" x2="130" y2="310" stroke="#6b7280" stroke-width="1"/>
  <text x="130" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Nav 1</text>
  
  <line x1="190" y1="290" x2="190" y2="310" stroke="#6b7280" stroke-width="1"/>
  <text x="190" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Nav 2</text>
  
  <line x1="250" y1="290" x2="250" y2="310" stroke="#6b7280" stroke-width="1"/>
  <text x="250" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Nav 3</text>
  
  <line x1="310" y1="290" x2="310" y2="310" stroke="#6b7280" stroke-width="1"/>
  <text x="310" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Nav 4</text>
  
  <line x1="370" y1="290" x2="370" y2="310" stroke="#6b7280" stroke-width="1"/>
  <text x="370" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Nav 5</text>
  
  <!-- Impact boxes -->
  <rect x="70" y="320" width="100" height="35" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="120" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#991b1b">GC Pauses</text>
  <text x="120" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">Increasing</text>
  
  <rect x="180" y="320" width="100" height="35" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="230" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#92400e">Frame Drops</text>
  <text x="230" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Jank visible</text>
  
  <rect x="290" y="320" width="140" height="35" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="360" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#991b1b">Tab Crash</text>
  <text x="360" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#7f1d1d">~5-10 navs</text>
  
  <!-- Right Chart: With Cleanup -->
  <rect x="470" y="80" width="380" height="280" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">With Cleanup (Stable)</text>
  
  <!-- Chart area -->
  <rect x="490" y="130" width="340" height="180" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Y-axis -->
  <line x1="490" y1="140" x2="490" y2="300" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="485" y="145" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">500MB</text>
  <text x="485" y="220" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">250MB</text>
  <text x="485" y="305" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280">0MB</text>
  
  <!-- Threshold line -->
  <line x1="490" y1="160" x2="830" y2="160" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="835" y="165" font-family="system-ui, sans-serif" font-size="9" fill="#dc2626">CRASH</text>
  
  <!-- Memory stable line -->
  <polyline points="490,285 550,280 610,283 670,278 730,282 790,280 830,283" fill="none" stroke="#22c55e" stroke-width="3"/>
  
  <!-- Navigation markers -->
  <line x1="550" y1="290" x2="550" y2="310" stroke="#6b7280" stroke-width="1"/>
  <text x="550" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Nav 1</text>
  
  <line x1="610" y1="290" x2="610" y2="310" stroke="#6b7280" stroke-width="1"/>
  <text x="610" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Nav 2</text>
  
  <line x1="670" y1="290" x2="670" y2="310" stroke="#6b7280" stroke-width="1"/>
  <text x="670" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Nav 3</text>
  
  <line x1="730" y1="290" x2="730" y2="310" stroke="#6b7280" stroke-width="1"/>
  <text x="730" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Nav 4</text>
  
  <line x1="790" y1="290" x2="790" y2="310" stroke="#6b7280" stroke-width="1"/>
  <text x="790" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b7280">Nav 5</text>
  
  <!-- Impact boxes -->
  <rect x="490" y="320" width="110" height="35" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="545" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#065f46">GC Pauses</text>
  <text x="545" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Minimal</text>
  
  <rect x="610" y="320" width="110" height="35" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="665" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#065f46">Frame Rate</text>
  <text x="665" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Stable 60fps</text>
  
  <rect x="730" y="320" width="100" height="35" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="780" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#065f46">Session</text>
  <text x="780" y="348" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">No crashes</text>
  
  <!-- Bottom Summary -->
  <rect x="50" y="380" width="800" height="150" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="450" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Memory Growth Comparison After 50 Navigation Cycles</text>
  
  <!-- Without cleanup stats -->
  <rect x="70" y="430" width="360" height="85" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#991b1b">Without Cleanup</text>
  <text x="250" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#7f1d1d">Memory: 100MB → 450MB (350% growth)</text>
  <text x="250" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#7f1d1d">Result: Tab crash after ~10 navigations</text>
  
  <!-- With cleanup stats -->
  <rect x="450" y="430" width="380" height="85" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="640" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#166534">With Cleanup</text>
  <text x="640" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Memory: 100MB → 110MB (10% growth)</text>
  <text x="640" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Result: Stable for entire session</text>
</svg>
