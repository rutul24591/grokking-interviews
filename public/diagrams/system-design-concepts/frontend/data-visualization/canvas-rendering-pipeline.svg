<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Canvas Rendering Pipeline</text>
  
  <!-- Pipeline Flow -->
  <rect x="50" y="80" width="180" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Data</text>
  <text x="140" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">ArrayBuffer</text>
  <text x="140" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">Typed Arrays</text>
  
  <line x1="230" y1="130" x2="280" y2="130" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  
  <rect x="280" y="80" width="180" height="100" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="370" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#065f46">Transform</text>
  <text x="370" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Scale/Rotate</text>
  <text x="370" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Project to 2D</text>
  
  <line x1="460" y1="130" x2="510" y2="130" stroke="#10b981" stroke-width="3" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
  
  <rect x="510" y="80" width="180" height="100" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="600" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Rasterize</text>
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">Draw Shapes</text>
  <text x="600" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">Fill/Stroke</text>
  
  <line x1="690" y1="130" x2="740" y2="130" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <rect x="740" y="80" width="130" height="100" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="805" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Display</text>
  <text x="805" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4338ca">Pixel Buffer</text>
  <text x="805" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4338ca">Screen</text>
  
  <!-- Canvas Example -->
  <rect x="50" y="210" width="400" height="320" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="250" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Canvas Drawing Commands</text>
  
  <rect x="70" y="270" width="360" height="240" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="90" y="300" font-family="monospace" font-size="9" fill="#22c55e">// Setup</text>
  <text x="90" y="320" font-family="monospace" font-size="9" fill="#e2e8f0">const ctx = canvas.getContext('2d');</text>
  <text x="90" y="345" font-family="monospace" font-size="9" fill="#22c55e">// Draw rectangle</text>
  <text x="90" y="365" font-family="monospace" font-size="9" fill="#f59e0b">ctx.fillStyle = '#3b82f6';</text>
  <text x="90" y="385" font-family="monospace" font-size="9" fill="#e2e8f0">ctx.fillRect(50, 50, 100, 100);</text>
  <text x="90" y="410" font-family="monospace" font-size="9" fill="#22c55e">// Draw circle</text>
  <text x="90" y="430" font-family="monospace" font-size="9" fill="#f59e0b">ctx.beginPath();</text>
  <text x="90" y="450" font-family="monospace" font-size="9" fill="#e2e8f0">ctx.arc(200, 100, 50, 0, Math.PI * 2);</text>
  <text x="90" y="470" font-family="monospace" font-size="9" fill="#e2e8f0">ctx.fill();</text>
  <text x="90" y="495" font-family="monospace" font-size="9" fill="#22c55e">// Draw line</text>
  <text x="90" y="515" font-family="monospace" font-size="9" fill="#e2e8f0">ctx.lineTo(300, 200);</text>
  
  <!-- SVG Example -->
  <rect x="470" y="210" width="400" height="320" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="670" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">SVG DOM Elements</text>
  
  <rect x="490" y="270" width="360" height="240" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="510" y="300" font-family="monospace" font-size="9" fill="#22c55e">&lt;!-- SVG Elements --&gt;</text>
  <text x="510" y="320" font-family="monospace" font-size="9" fill="#f59e0b">&lt;svg viewBox="0 0 400 300"&gt;</text>
  <text x="530" y="340" font-family="monospace" font-size="9" fill="#22c55e">&lt;!-- Rectangle --&gt;</text>
  <text x="530" y="360" font-family="monospace" font-size="9" fill="#3b82f6">&lt;rect</text>
  <text x="550" y="380" font-family="monospace" font-size="9" fill="#e2e8f0">x="50" y="50"</text>
  <text x="550" y="400" font-family="monospace" font-size="9" fill="#e2e8f0">width="100" height="100"</text>
  <text x="550" y="420" font-family="monospace" font-size="9" fill="#3b82f6">/&gt;</text>
  <text x="530" y="440" font-family="monospace" font-size="9" fill="#22c55e">&lt;!-- Circle --&gt;</text>
  <text x="530" y="460" font-family="monospace" font-size="9" fill="#10b981">&lt;circle</text>
  <text x="550" y="480" font-family="monospace" font-size="9" fill="#e2e8f0">cx="200" cy="100" r="50"</text>
  <text x="550" y="500" font-family="monospace" font-size="9" fill="#10b981">/&gt;</text>
  <text x="510" y="520" font-family="monospace" font-size="9" fill="#f59e0b">&lt;/svg&gt;</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="800" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Canvas: imperative drawing commands (immediate mode) | SVG: declarative DOM elements (retained mode)</text>
</svg>
