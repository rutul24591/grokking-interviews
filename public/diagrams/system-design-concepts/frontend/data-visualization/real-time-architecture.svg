<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Real-Time Update Architecture</text>
  
  <!-- Data Source -->
  <rect x="50" y="80" width="180" height="100" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Data Source</text>
  <text x="140" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">WebSocket / SSE</text>
  <text x="140" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">Streaming data</text>
  
  <!-- Arrow -->
  <line x1="230" y1="130" x2="280" y2="130" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Buffer -->
  <rect x="280" y="80" width="180" height="100" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="370" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Buffer</text>
  <text x="370" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4338ca">Collect incoming</text>
  <text x="370" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4338ca">Batch for efficiency</text>
  
  <!-- Arrow -->
  <line x1="460" y1="130" x2="510" y2="130" stroke="#6366f1" stroke-width="3" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Processing -->
  <rect x="510" y="80" width="180" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="600" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Processing</text>
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">Transform/Aggregate</text>
  <text x="600" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">Throttle/Sample</text>
  
  <!-- Arrow -->
  <line x1="690" y1="130" x2="740" y2="130" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  
  <!-- Rendering -->
  <rect x="740" y="80" width="130" height="100" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="805" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#065f46">Render</text>
  <text x="805" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">60fps target</text>
  <text x="805" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Canvas/WebGL</text>
  
  <!-- Update Strategies -->
  <rect x="50" y="210" width="820" height="200" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="460" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Update Strategies by Frequency</text>
  
  <!-- Low Frequency -->
  <rect x="70" y="270" width="380" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="260" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Low Frequency (&lt;10Hz)</text>
  <text x="260" y="330" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Direct update (render each)</text>
  <text x="260" y="355" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• SVG rendering acceptable</text>
  <text x="260" y="380" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Full interactivity</text>
  
  <!-- Medium Frequency -->
  <rect x="470" y="270" width="380" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Medium Frequency (10-100Hz)</text>
  <text x="660" y="330" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Batched updates (16ms batches)</text>
  <text x="660" y="355" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Canvas rendering preferred</text>
  <text x="660" y="380" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Throttled interactivity</text>
  
  <!-- High Frequency -->
  <rect x="70" y="410" width="380" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="260" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">High Frequency (100-1000Hz)</text>
  <text x="260" y="470" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Sampling required</text>
  <text x="260" y="495" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• WebGL for rendering</text>
  <text x="260" y="520" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Limited interactivity</text>
  
  <!-- Very High Frequency -->
  <rect x="470" y="410" width="380" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="660" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Very High Frequency (1000+Hz)</text>
  <text x="660" y="470" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Aggregation required</text>
  <text x="660" y="495" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• GPU acceleration essential</text>
  <text x="660" y="520" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Overview + drill-down pattern</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="800" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Pipeline: ingest → buffer → process → render. Match update strategy to data frequency for optimal performance</text>
</svg>
