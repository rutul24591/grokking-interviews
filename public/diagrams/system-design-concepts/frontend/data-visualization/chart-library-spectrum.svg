<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Chart Library Spectrum</text>
  
  <!-- Spectrum Line -->
  <line x1="100" y1="275" x2="800" y2="275" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Flexibility Label -->
  <text x="100" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Maximum Flexibility</text>
  
  <!-- Productivity Label -->
  <text x="800" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Maximum Productivity</text>
  
  <!-- D3.js -->
  <rect x="80" y="275" width="120" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="140" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">D3.js</text>
  <text x="140" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Low-Level</text>
  
  <!-- Vega -->
  <rect x="210" y="275" width="100" height="60" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="260" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">Vega</text>
  <text x="260" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Grammar</text>
  
  <!-- Recharts -->
  <rect x="350" y="275" width="120" height="60" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af">Recharts</text>
  <text x="410" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e3a8a">Component</text>
  
  <!-- Victory -->
  <rect x="480" y="275" width="100" height="60" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="530" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af">Victory</text>
  <text x="530" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e3a8a">Component</text>
  
  <!-- Chart.js -->
  <rect x="610" y="275" width="120" height="60" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="670" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46">Chart.js</text>
  <text x="670" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">High-Level</text>
  
  <!-- Highcharts -->
  <rect x="740" y="275" width="120" height="60" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="800" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#065f46">Highcharts</text>
  <text x="800" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Commercial</text>
  
  <!-- Characteristics -->
  <rect x="50" y="370" width="800" height="160" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Low-Level Characteristics -->
  <rect x="70" y="395" width="360" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">Low-Level (D3.js, Vega)</text>
  <text x="250" y="455" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">✓ Build any visualization</text>
  <text x="250" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">✓ Maximum control</text>
  <text x="250" y="495" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ Steep learning curve</text>
  <text x="250" y="515" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ More development time</text>
  
  <!-- High-Level Characteristics -->
  <rect x="450" y="395" width="360" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="630" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b">High-Level (Chart.js, Highcharts)</text>
  <text x="630" y="455" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">✓ Rapid development</text>
  <text x="630" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">✓ Easy to learn</text>
  <text x="630" y="495" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ Limited customization</text>
  <text x="630" y="515" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ May not support custom charts</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="800" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Choose based on requirements: flexibility vs productivity. Middle-ground libraries (Recharts, Victory) offer balance for React applications</text>
</svg>
