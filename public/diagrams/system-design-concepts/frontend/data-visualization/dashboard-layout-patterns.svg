<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Dashboard Layout Patterns</text>
  
  <!-- Grid Layout -->
  <rect x="50" y="80" width="400" height="200" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Grid Layout</text>
  <text x="250" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">Equal importance metrics</text>
  
  <rect x="70" y="150" width="170" height="110" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="155" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Chart 1</text>
  
  <rect x="250" y="150" width="170" height="110" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="335" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Chart 2</text>
  
  <rect x="70" y="270" width="170" height="110" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="155" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Chart 3</text>
  
  <rect x="250" y="270" width="170" height="110" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="335" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Chart 4</text>
  
  <!-- Hierarchical Layout -->
  <rect x="470" y="80" width="400" height="200" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="670" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Hierarchical Layout</text>
  <text x="670" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4338ca">Priority-based arrangement</text>
  
  <rect x="490" y="150" width="360" height="70" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="670" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">KPI 1 (Most Important)</text>
  
  <rect x="490" y="230" width="170" height="40" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="575" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">KPI 2</text>
  
  <rect x="670" y="230" width="180" height="40" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="760" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">KPI 3</text>
  
  <!-- Tabbed Layout -->
  <rect x="50" y="300" width="400" height="230" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="250" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Tabbed Layout</text>
  <text x="250" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">Many visualizations / categories</text>
  
  <rect x="70" y="370" width="360" height="140" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="80" y="380" width="80" height="30" rx="4" fill="#f59e0b"/>
  <text x="120" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">Tab 1</text>
  <rect x="170" y="380" width="80" height="30" rx="4" fill="#e5e7eb"/>
  <text x="210" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Tab 2</text>
  <rect x="260" y="380" width="80" height="30" rx="4" fill="#e5e7eb"/>
  <text x="300" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Tab 3</text>
  <text x="250" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Content for Tab 1</text>
  <text x="250" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Multiple charts in tab</text>
  <text x="250" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Reduces initial complexity</text>
  
  <!-- Drill-Down Layout -->
  <rect x="470" y="300" width="400" height="230" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="670" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#065f46">Drill-Down Layout</text>
  <text x="670" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Overview → Detail</text>
  
  <rect x="490" y="370" width="360" height="70" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="670" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Overview (Summary Metrics)</text>
  <text x="670" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Click to drill down ↓</text>
  
  <line x1="670" y1="440" x2="670" y2="460" stroke="#10b981" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
  
  <rect x="490" y="465" width="360" height="55" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="670" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Detail (Granular Data)</text>
  <text x="670" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Detailed breakdown, filters</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="800" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Choose layout based on information architecture: grid for equal importance, hierarchical for priority, tabbed for categories, drill-down for detail</text>
</svg>
