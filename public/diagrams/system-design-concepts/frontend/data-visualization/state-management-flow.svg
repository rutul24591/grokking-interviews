<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Interaction State Management Flow</text>
  
  <!-- Data State -->
  <rect x="50" y="80" width="250" height="150" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="175" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">Data State</text>
  <text x="175" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">(Immutable)</text>
  <rect x="70" y="165" width="210" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="175" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Raw dataset</text>
  <text x="175" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Never mutated</text>
  
  <!-- Arrow to Derived -->
  <path d="M 300 155 L 350 155 L 350 275 L 400 275" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  
  <!-- Interaction State -->
  <rect x="50" y="275" width="250" height="150" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="175" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Interaction State</text>
  <text x="175" y="340" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4338ca">(User Actions)</text>
  <rect x="70" y="360" width="210" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="175" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Selection, filters</text>
  <text x="175" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Zoom, hover</text>
  
  <!-- Arrow to Derived -->
  <path d="M 300 350 L 400 350" stroke="#6366f1" stroke-width="3" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Derived State -->
  <rect x="420" y="200" width="280" height="150" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="560" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Derived State</text>
  <text x="560" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">(Memoized)</text>
  <rect x="440" y="285" width="240" height="55" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="560" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Filtered data</text>
  <text x="560" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Highlighted points</text>
  
  <!-- Arrow to Render -->
  <path d="M 700 275 L 750 275" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  
  <!-- Render -->
  <rect x="770" y="200" width="110" height="150" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="825" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#065f46">Render</text>
  <text x="825" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Visualization</text>
  <text x="825" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Updates</text>
  
  <!-- User Interaction Loop -->
  <path d="M 825 350 L 825 420 L 175 420 L 175 460" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow4)"/>
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  <text x="500" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6366f1" font-style="italic">User Interaction</text>
  
  <!-- Event Examples -->
  <rect x="50" y="480" width="400" height="60" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="250" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Interaction Events</text>
  <text x="250" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">onClick, onHover, onBrush, onZoom, onFilter</text>
  
  <!-- Selector Examples -->
  <rect x="470" y="480" width="410" height="60" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="675" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Selector Examples</text>
  <text x="675" y="530" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">getFilteredData, getHighlightedPoints, getVisibleRange</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="800" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">State flow: Data State + Interaction State → Derived State (memoized) → Render. User interactions update Interaction State, triggering re-render.</text>
</svg>
