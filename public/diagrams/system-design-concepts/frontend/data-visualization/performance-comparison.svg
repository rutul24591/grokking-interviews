<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Performance Comparison: Canvas vs SVG</text>
  
  <!-- FPS Chart -->
  <rect x="50" y="80" width="400" height="220" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">FPS vs Element Count</text>
  
  <!-- Y Axis -->
  <line x1="90" y1="140" x2="90" y2="270" stroke="#64748b" stroke-width="2"/>
  <text x="80" y="145" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">60</text>
  <text x="80" y="185" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">45</text>
  <text x="80" y="225" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">30</text>
  <text x="80" y="265" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">0</text>
  <text x="90" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">FPS</text>
  
  <!-- X Axis -->
  <line x1="90" y1="270" x2="420" y2="270" stroke="#64748b" stroke-width="2"/>
  <text x="90" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">100</text>
  <text x="200" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">1K</text>
  <text x="310" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">10K</text>
  <text x="420" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">100K</text>
  <text x="250" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Element Count</text>
  
  <!-- Canvas Line (stays high) -->
  <path d="M 90 145 L 200 145 L 310 150 L 420 160" stroke="#3b82f6" stroke-width="3" fill="none"/>
  <circle cx="90" cy="145" r="4" fill="#3b82f6"/>
  <circle cx="200" cy="145" r="4" fill="#3b82f6"/>
  <circle cx="310" cy="150" r="4" fill="#3b82f6"/>
  <circle cx="420" cy="160" r="4" fill="#3b82f6"/>
  <text x="380" y="155" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#3b82f6">Canvas</text>
  
  <!-- SVG Line (drops) -->
  <path d="M 90 145 L 200 150 L 310 220 L 420 265" stroke="#ef4444" stroke-width="3" fill="none"/>
  <circle cx="90" cy="145" r="4" fill="#ef4444"/>
  <circle cx="200" cy="150" r="4" fill="#ef4444"/>
  <circle cx="310" cy="220" r="4" fill="#ef4444"/>
  <circle cx="420" cy="265" r="4" fill="#ef4444"/>
  <text x="380" y="240" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ef4444">SVG</text>
  
  <!-- Memory Chart -->
  <rect x="470" y="80" width="400" height="220" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="670" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Memory Usage (MB)</text>
  
  <!-- Y Axis -->
  <line x1="510" y1="140" x2="510" y2="270" stroke="#64748b" stroke-width="2"/>
  <text x="500" y="145" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">500</text>
  <text x="500" y="185" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">375</text>
  <text x="500" y="230" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">250</text>
  <text x="500" y="265" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">0</text>
  <text x="510" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">MB</text>
  
  <!-- X Axis -->
  <line x1="510" y1="270" x2="840" y2="270" stroke="#64748b" stroke-width="2"/>
  <text x="510" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">100</text>
  <text x="620" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">1K</text>
  <text x="730" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">10K</text>
  <text x="840" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">100K</text>
  
  <!-- Canvas Memory (low) -->
  <rect x="540" y="250" width="50" height="20" fill="#3b82f6" opacity="0.6"/>
  <rect x="650" y="245" width="50" height="25" fill="#3b82f6" opacity="0.6"/>
  <rect x="760" y="235" width="50" height="35" fill="#3b82f6" opacity="0.6"/>
  <text x="780" y="230" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#3b82f6">Canvas</text>
  
  <!-- SVG Memory (high) -->
  <rect x="590" y="245" width="50" height="25" fill="#ef4444" opacity="0.6"/>
  <rect x="700" y="220" width="50" height="50" fill="#ef4444" opacity="0.6"/>
  <rect x="810" y="160" width="50" height="110" fill="#ef4444" opacity="0.6"/>
  <text x="780" y="250" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ef4444">SVG</text>
  
  <!-- Summary Table -->
  <rect x="50" y="320" width="820" height="210" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="460" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Performance Summary</text>
  
  <!-- Table Header -->
  <rect x="70" y="375" width="180" height="40" rx="4" fill="#e2e8f0"/>
  <text x="160" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Metric</text>
  <rect x="250" y="375" width="200" height="40" rx="4" fill="#dbeafe"/>
  <text x="350" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">Canvas</text>
  <rect x="450" y="375" width="200" height="40" rx="4" fill="#fee2e2"/>
  <text x="550" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#991b1b">SVG</text>
  <rect x="650" y="375" width="220" height="40" rx="4" fill="#e2e8f0"/>
  <text x="760" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Winner</text>
  
  <!-- Row 1: FPS -->
  <rect x="70" y="415" width="180" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="160" y="437" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">FPS (10K elements)</text>
  <rect x="250" y="415" width="200" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="350" y="437" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e40af">55-60 FPS</text>
  <rect x="450" y="415" width="200" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="550" y="437" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b">15-25 FPS</text>
  <rect x="650" y="415" width="220" height="35" rx="4" fill="#d1fae5" stroke="#10b981"/>
  <text x="760" y="437" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">Canvas (2-3x faster)</text>
  
  <!-- Row 2: Memory -->
  <rect x="70" y="450" width="180" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="160" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Memory (10K elements)</text>
  <rect x="250" y="450" width="200" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="350" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e40af">~50 MB</text>
  <rect x="450" y="450" width="200" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="550" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b">~250 MB</text>
  <rect x="650" y="450" width="220" height="35" rx="4" fill="#d1fae5" stroke="#10b981"/>
  <text x="760" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">Canvas (5x less)</text>
  
  <!-- Row 3: Load Time -->
  <rect x="70" y="485" width="180" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="160" y="507" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Initial Load</text>
  <rect x="250" y="485" width="200" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="350" y="507" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e40af">Fast (single element)</text>
  <rect x="450" y="485" width="200" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="550" y="507" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#991b1b">Slower (many DOM nodes)</text>
  <rect x="650" y="485" width="220" height="35" rx="4" fill="#d1fae5" stroke="#10b981"/>
  <text x="760" y="507" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">Canvas</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="800" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Canvas maintains 60fps at 100K+ elements | SVG degrades significantly above 5K elements | Canvas uses 5x less memory for large datasets</text>
</svg>
