<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Large Dataset Performance Benchmarks</text>
  
  <!-- FPS Chart -->
  <rect x="50" y="80" width="400" height="220" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="250" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">FPS by Technique (100K points)</text>
  
  <!-- Y Axis -->
  <line x1="90" y1="140" x2="90" y2="270" stroke="#64748b" stroke-width="2"/>
  <text x="80" y="145" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">60</text>
  <text x="80" y="185" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">45</text>
  <text x="80" y="225" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">30</text>
  <text x="80" y="265" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">0</text>
  
  <!-- X Axis -->
  <line x1="90" y1="270" x2="420" y2="270" stroke="#64748b" stroke-width="2"/>
  
  <!-- Bars -->
  <rect x="110" y="145" width="50" height="125" fill="#3b82f6" opacity="0.8"/>
  <text x="135" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#1e40af">60</text>
  <text x="135" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#475569">GPU</text>
  
  <rect x="180" y="155" width="50" height="115" fill="#10b981" opacity="0.8"/>
  <text x="205" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#065f46">55</text>
  <text x="205" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#475569">Virtual</text>
  
  <rect x="250" y="185" width="50" height="85" fill="#f59e0b" opacity="0.8"/>
  <text x="275" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#92400e">40</text>
  <text x="275" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#475569">Aggregate</text>
  
  <rect x="320" y="225" width="50" height="45" fill="#ef4444" opacity="0.8"/>
  <text x="345" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#991b1b">15</text>
  <text x="345" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#475569">Sample</text>
  
  <!-- Memory Chart -->
  <rect x="470" y="80" width="400" height="220" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="670" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Memory Usage (MB)</text>
  
  <!-- Y Axis -->
  <line x1="510" y1="140" x2="510" y2="270" stroke="#64748b" stroke-width="2"/>
  <text x="500" y="145" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">500</text>
  <text x="500" y="185" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">375</text>
  <text x="500" y="230" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">250</text>
  <text x="500" y="265" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#475569">0</text>
  
  <!-- X Axis -->
  <line x1="510" y1="270" x2="840" y2="270" stroke="#64748b" stroke-width="2"/>
  
  <!-- Bars -->
  <rect x="530" y="245" width="50" height="25" fill="#3b82f6" opacity="0.8"/>
  <text x="555" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#1e40af">50</text>
  <text x="555" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#475569">GPU</text>
  
  <rect x="600" y="235" width="50" height="35" fill="#10b981" opacity="0.8"/>
  <text x="625" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#065f46">75</text>
  <text x="625" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#475569">Virtual</text>
  
  <rect x="670" y="210" width="50" height="60" fill="#f59e0b" opacity="0.8"/>
  <text x="695" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#92400e">150</text>
  <text x="695" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#475569">Aggregate</text>
  
  <rect x="740" y="160" width="50" height="110" fill="#ef4444" opacity="0.8"/>
  <text x="765" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#991b1b">300</text>
  <text x="765" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#475569">Raw</text>
  
  <!-- Summary Table -->
  <rect x="50" y="320" width="820" height="210" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="460" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Performance Summary (100K points)</text>
  
  <!-- Table Header -->
  <rect x="70" y="375" width="180" height="40" rx="4" fill="#e2e8f0"/>
  <text x="160" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Technique</text>
  <rect x="250" y="375" width="140" height="40" rx="4" fill="#e2e8f0"/>
  <text x="320" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">FPS</text>
  <rect x="390" y="375" width="140" height="40" rx="4" fill="#e2e8f0"/>
  <text x="460" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Memory</text>
  <rect x="530" y="375" width="180" height="40" rx="4" fill="#e2e8f0"/>
  <text x="620" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Best For</text>
  <rect x="710" y="375" width="160" height="40" rx="4" fill="#e2e8f0"/>
  <text x="790" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Complexity</text>
  
  <!-- Row 1: GPU -->
  <rect x="70" y="415" width="180" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="160" y="437" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">GPU (WebGL)</text>
  <rect x="250" y="415" width="140" height="35" rx="4" fill="#d1fae5" stroke="#10b981"/>
  <text x="320" y="437" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">60 FPS</text>
  <rect x="390" y="415" width="140" height="35" rx="4" fill="#d1fae5" stroke="#10b981"/>
  <text x="460" y="437" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">50 MB</text>
  <rect x="530" y="415" width="180" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="620" y="437" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">1M+ points</text>
  <rect x="710" y="415" width="160" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="790" y="437" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">High</text>
  
  <!-- Row 2: Virtual -->
  <rect x="70" y="450" width="180" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="160" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Virtualization</text>
  <rect x="250" y="450" width="140" height="35" rx="4" fill="#d1fae5" stroke="#10b981"/>
  <text x="320" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">55 FPS</text>
  <rect x="390" y="450" width="140" height="35" rx="4" fill="#d1fae5" stroke="#10b981"/>
  <text x="460" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">75 MB</text>
  <rect x="530" y="450" width="180" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="620" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Scrollable views</text>
  <rect x="710" y="450" width="160" height="35" rx="4" fill="#d1fae5" stroke="#10b981"/>
  <text x="790" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Medium</text>
  
  <!-- Row 3: Aggregate -->
  <rect x="70" y="485" width="180" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="160" y="507" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Aggregation</text>
  <rect x="250" y="485" width="140" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="320" y="507" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">40 FPS</text>
  <rect x="390" y="485" width="140" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="460" y="507" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">150 MB</text>
  <rect x="530" y="485" width="180" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="620" y="507" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Pattern discovery</text>
  <rect x="710" y="485" width="160" height="35" rx="4" fill="#d1fae5" stroke="#10b981"/>
  <text x="790" y="507" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Medium</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="800" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">GPU: best performance, highest complexity | Virtualization: best balance | Aggregation: good for patterns | Raw: avoid for 100K+ points</text>
</svg>
