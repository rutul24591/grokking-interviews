<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Real-Time Data Flow Timing</text>
  
  <!-- Timeline -->
  <line x1="80" y1="120" x2="850" y2="120" stroke="#64748b" stroke-width="3"/>
  <text x="860" y="125" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#64748b" font-weight="600">Time →</text>
  
  <!-- Tick marks -->
  <line x1="80" y1="110" x2="80" y2="130" stroke="#64748b" stroke-width="2"/>
  <text x="80" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">t=0ms</text>
  
  <line x1="280" y1="110" x2="280" y2="130" stroke="#64748b" stroke-width="2"/>
  <text x="280" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">t=50ms</text>
  
  <line x1="480" y1="110" x2="480" y2="130" stroke="#64748b" stroke-width="2"/>
  <text x="480" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">t=100ms</text>
  
  <line x1="680" y1="110" x2="680" y2="130" stroke="#64748b" stroke-width="2"/>
  <text x="680" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">t=150ms</text>
  
  <line x1="850" y1="110" x2="850" y2="130" stroke="#64748b" stroke-width="2"/>
  <text x="850" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">t=200ms</text>
  
  <!-- Data Arrival -->
  <rect x="100" y="180" width="80" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e40af">Data In</text>
  <text x="140" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e3a8a">10 pts @ 10ms</text>
  
  <rect x="200" y="180" width="80" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="240" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e40af">Data In</text>
  <text x="240" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e3a8a">10 pts @ 10ms</text>
  
  <rect x="300" y="180" width="80" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="340" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e40af">Data In</text>
  <text x="340" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e3a8a">10 pts @ 10ms</text>
  
  <rect x="400" y="180" width="80" height="50" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="440" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e40af">Data In</text>
  <text x="440" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#1e3a8a">10 pts @ 10ms</text>
  
  <!-- Buffer -->
  <rect x="100" y="260" width="380" height="60" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="290" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#92400e">Buffer (100ms window)</text>
  <text x="290" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">Accumulates 40 points</text>
  
  <!-- Arrow to Batch -->
  <path d="M 480 290 L 530 290" stroke="#f59e0b" stroke-width="3" marker-end="url(#arrow1)"/>
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
  
  <!-- Batch Processing -->
  <rect x="540" y="260" width="150" height="60" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="615" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#3730a3">Batch Process</text>
  <text x="615" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4338ca">Transform &amp; Aggregate</text>
  
  <!-- Arrow to Render -->
  <path d="M 690 290 L 740 290" stroke="#6366f1" stroke-width="3" marker-end="url(#arrow2)"/>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
  </defs>
  
  <!-- Render -->
  <rect x="750" y="260" width="120" height="60" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="810" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#065f46">Render</text>
  <text x="810" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">60 FPS target</text>
  
  <!-- Latency Breakdown -->
  <rect x="50" y="350" width="820" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <text x="460" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b">Latency Breakdown (Target: &lt;200ms)</text>
  
  <!-- Latency Bars -->
  <rect x="70" y="410" width="180" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="160" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Buffering</text>
  <rect x="100" y="450" width="120" height="40" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="160" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">100ms</text>
  <text x="160" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Accumulate data</text>
  
  <rect x="270" y="410" width="180" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="360" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Processing</text>
  <rect x="300" y="450" width="120" height="25" rx="4" fill="#6366f1" opacity="0.6"/>
  <text x="360" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#3730a3">50ms</text>
  <text x="360" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Transform data</text>
  
  <rect x="470" y="410" width="180" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="560" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Rendering</text>
  <rect x="500" y="450" width="120" height="17" rx="4" fill="#10b981" opacity="0.6"/>
  <text x="560" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">17ms</text>
  <text x="560" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">60 FPS frame</text>
  
  <rect x="670" y="410" width="180" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="760" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Total Latency</text>
  <rect x="700" y="450" width="120" height="55" rx="4" fill="#3b82f6" opacity="0.6"/>
  <text x="760" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e40af">~167ms</text>
  <text x="760" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Within target</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="800" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Data flow: Buffer (100ms) → Process (50ms) → Render (17ms @ 60FPS) = ~167ms total latency. Adjust buffer window to balance latency vs batch efficiency.</text>
</svg>
