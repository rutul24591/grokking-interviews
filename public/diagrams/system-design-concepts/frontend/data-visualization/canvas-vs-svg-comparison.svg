<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Canvas vs SVG Comparison</text>
  
  <!-- Canvas Side -->
  <rect x="50" y="80" width="400" height="450" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="250" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#92400e">Canvas</text>
  <text x="250" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#78350f">Raster-Based, Immediate Mode</text>
  
  <!-- Canvas Rendering -->
  <rect x="70" y="170" width="360" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Rendering Pipeline</text>
  <text x="250" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">JavaScript → Pixel Buffer → Display</text>
  <text x="250" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Direct pixel manipulation</text>
  <text x="250" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">No DOM elements created</text>
  
  <!-- Canvas Pros/Cons -->
  <rect x="70" y="290" width="360" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Characteristics</text>
  <text x="250" y="350" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">✓ 10,000+ elements</text>
  <text x="250" y="370" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">✓ Real-time updates</text>
  <text x="250" y="390" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ Manual accessibility</text>
  <text x="250" y="410" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ Manual hit testing</text>
  
  <!-- Canvas Use Cases -->
  <rect x="70" y="430" width="360" height="90" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="250" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#92400e">Best For</text>
  <text x="250" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">Heatmaps, particle systems,</text>
  <text x="250" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">real-time data, games</text>
  
  <!-- SVG Side -->
  <rect x="470" y="80" width="400" height="450" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="670" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#065f46">SVG</text>
  <text x="670" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#047857">Vector-Based, Retained Mode</text>
  
  <!-- SVG Rendering -->
  <rect x="490" y="170" width="360" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="670" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Rendering Pipeline</text>
  <text x="670" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">XML → DOM Elements → Display</text>
  <text x="670" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Each shape is a DOM node</text>
  <text x="670" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Browser manages scene graph</text>
  
  <!-- SVG Pros/Cons -->
  <rect x="490" y="290" width="360" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="670" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Characteristics</text>
  <text x="670" y="350" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">✓ Built-in accessibility</text>
  <text x="670" y="370" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">✓ Automatic hit testing</text>
  <text x="670" y="390" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ 1000-5000 element limit</text>
  <text x="670" y="410" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ DOM overhead</text>
  
  <!-- SVG Use Cases -->
  <rect x="490" y="430" width="360" height="90" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="670" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#065f46">Best For</text>
  <text x="670" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Charts, diagrams, icons,</text>
  <text x="670" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">interactive visualizations</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="820" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="460" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Canvas: pixel-based, immediate mode, high performance | SVG: DOM-based, retained mode, built-in accessibility</text>
</svg>
