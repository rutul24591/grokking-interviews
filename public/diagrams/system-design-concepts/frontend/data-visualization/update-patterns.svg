<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Update Pattern Comparison</text>
  
  <!-- Direct Update -->
  <rect x="50" y="80" width="260" height="220" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="180" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Direct Update</text>
  <text x="180" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#78350f">Render every data point</text>
  
  <rect x="70" y="170" width="220" height="110" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="180" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Data → Render (1:1)</text>
  <circle cx="120" cy="230" r="6" fill="#f59e0b"/>
  <circle cx="140" cy="240" r="6" fill="#f59e0b"/>
  <circle cx="160" cy="235" r="6" fill="#f59e0b"/>
  <circle cx="180" cy="250" r="6" fill="#f59e0b"/>
  <circle cx="200" cy="245" r="6" fill="#f59e0b"/>
  <circle cx="220" cy="255" r="6" fill="#f59e0b"/>
  <circle cx="240" cy="260" r="6" fill="#f59e0b" opacity="0.3"/>
  <circle cx="260" cy="265" r="6" fill="#f59e0b" opacity="0.3"/>
  <text x="180" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#78350f">All points rendered</text>
  
  <rect x="70" y="285" width="220" height="40" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="180" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7f1d1d" font-weight="600">Best for: &lt;1000 points</text>
  
  <!-- Batched Update -->
  <rect x="330" y="80" width="260" height="220" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="460" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#065f46">Batched Update</text>
  <text x="460" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857">Group updates, render batch</text>
  
  <rect x="350" y="170" width="220" height="110" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="460" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Buffer → Batch → Render</text>
  <rect x="370" y="215" width="180" height="50" rx="4" fill="#10b981" opacity="0.3"/>
  <text x="460" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">16ms batch (60fps)</text>
  <text x="460" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#047857">Reduces render overhead</text>
  
  <rect x="350" y="285" width="220" height="40" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="460" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#047857" font-weight="600">Best for: 1000-10000 points</text>
  
  <!-- Sampled Update -->
  <rect x="610" y="80" width="260" height="220" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="740" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3730a3">Sampled Update</text>
  <text x="740" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4338ca">Render subset of data</text>
  
  <rect x="630" y="170" width="220" height="110" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="740" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Sample N of M points</text>
  <circle cx="670" cy="230" r="6" fill="#6366f1"/>
  <circle cx="690" cy="240" r="6" fill="#6366f1" opacity="0.2"/>
  <circle cx="710" cy="235" r="6" fill="#6366f1"/>
  <circle cx="730" cy="250" r="6" fill="#6366f1" opacity="0.2"/>
  <circle cx="750" cy="245" r="6" fill="#6366f1"/>
  <circle cx="770" cy="255" r="6" fill="#6366f1" opacity="0.2"/>
  <circle cx="790" cy="260" r="6" fill="#6366f1"/>
  <circle cx="810" cy="265" r="6" fill="#6366f1" opacity="0.2"/>
  <text x="740" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#4338ca">Show 10% of points</text>
  
  <rect x="630" y="285" width="220" height="40" rx="4" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="740" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4338ca" font-weight="600">Best for: 10000-100000 points</text>
  
  <!-- Aggregated Update -->
  <rect x="50" y="320" width="400" height="210" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="250" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Aggregated Update</text>
  <text x="250" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Bin data, show aggregates</text>
  
  <rect x="70" y="410" width="360" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="250" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">100,000 points → 100 bins</text>
  <rect x="90" y="455" width="50" height="40" fill="#22c55e" opacity="0.4"/>
  <rect x="150" y="455" width="50" height="60" fill="#22c55e" opacity="0.6"/>
  <rect x="210" y="455" width="50" height="50" fill="#22c55e"/>
  <rect x="270" y="455" width="50" height="35" fill="#22c55e" opacity="0.5"/>
  <rect x="330" y="455" width="50" height="45" fill="#22c55e" opacity="0.7"/>
  <text x="250" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Histogram / Heatmap</text>
  
  <!-- GPU Update -->
  <rect x="470" y="320" width="400" height="210" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="670" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e40af">GPU Accelerated</text>
  <text x="670" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#1e3a8a">Parallel rendering</text>
  
  <rect x="490" y="410" width="360" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="670" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">GPU parallel processing</text>
  <text x="670" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">1,000,000+ points at 60fps</text>
  <text x="670" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">WebGL / Compute shaders</text>
  
  <!-- Bottom note -->
  <rect x="50" y="545" width="800" height="25" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Match update pattern to data volume: direct (&lt;1K), batched (1-10K), sampled (10-100K), aggregated (100K+), GPU (1M+)</text>
</svg>
