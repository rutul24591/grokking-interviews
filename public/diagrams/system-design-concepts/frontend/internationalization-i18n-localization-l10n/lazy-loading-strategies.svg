<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Lazy Loading Strategies</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Namespace-based, locale-based, and route-based loading approaches</text>
  
  <!-- Namespace-Based -->
  <rect x="30" y="100" width="270" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Namespace-Based</text>
  
  <rect x="50" y="155" width="230" height="110" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  
  <!-- Chunks -->
  <rect x="65" y="175" width="100" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="115" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">common (load)</text>
  
  <rect x="175" y="175" width="100" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="225" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">errors (load)</text>
  
  <rect x="65" y="215" width="100" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="115" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">settings (lazy)</text>
  
  <rect x="175" y="215" width="100" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="225" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">dashboard (lazy)</text>
  
  <text x="165" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Load common upfront, lazy load features</text>
  
  <!-- Locale-Based -->
  <rect x="315" y="100" width="270" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Locale-Based</text>
  
  <rect x="335" y="155" width="230" height="110" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <!-- Chunks -->
  <rect x="350" y="175" width="100" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="400" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">en (current)</text>
  
  <rect x="350" y="215" width="100" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="400" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">es (lazy)</text>
  
  <rect x="460" y="175" width="100" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="510" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">fr (lazy)</text>
  
  <rect x="460" y="215" width="100" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="510" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">de (lazy)</text>
  
  <text x="450" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Load current locale, lazy load others</text>
  
  <!-- Route-Based -->
  <rect x="600" y="100" width="270" height="180" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="735" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Route-Based</text>
  
  <rect x="620" y="155" width="230" height="110" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  
  <!-- Chunks -->
  <rect x="635" y="175" width="100" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="685" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">/ (current)</text>
  
  <rect x="745" y="175" width="100" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="795" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">/settings (lazy)</text>
  
  <rect x="635" y="215" width="100" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="685" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">/dashboard (lazy)</text>
  
  <rect x="745" y="215" width="100" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="795" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#647480">/profile (lazy)</text>
  
  <text x="735" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Load per-route translations</text>
  
  <!-- Loading Flow -->
  <rect x="30" y="300" width="840" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Loading Flow Example</text>
  
  <rect x="50" y="350" width="800" height="60" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="65" y="375" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">1. Detect locale (es) → Load es + common namespace</text>
  <text x="65" y="395" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">2. Navigate to /settings → Load settings namespace</text>
  <text x="65" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">3. User switches to fr → Load fr locale chunk</text>
  
  <!-- Bundle Size Comparison -->
  <rect x="30" y="440" width="400" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="230" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Bundle Size Impact</text>
  
  <rect x="50" y="490" width="360" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="65" y="510" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">All translations: 800KB | Lazy loaded: 50KB initial (94% reduction)</text>
  
  <!-- Best For -->
  <rect x="450" y="440" width="420" height="90" rx="8" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="660" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Recommended Approach</text>
  
  <rect x="465" y="490" width="390" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="660" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Hybrid: Locale-based + Namespace-based (load current locale + common, lazy load rest)</text>
</svg>
