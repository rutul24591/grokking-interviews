<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Locale Detection Strategies</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Browser language, URL, user profile, and geolocation detection methods</text>
  
  <!-- Browser Language -->
  <rect x="30" y="100" width="200" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="130" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Browser Language</text>
  
  <rect x="50" y="155" width="160" height="70" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  <text x="65" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">navigator.language</text>
  <text x="65" y="200" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#0369a1">'en-US'</text>
  <text x="65" y="217" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Accept-Language header</text>
  
  <rect x="50" y="230" width="160" height="25" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="130" y="247" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#15803d">✓ Automatic</text>
  
  <!-- URL Path -->
  <rect x="250" y="100" width="200" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="350" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">URL Path</text>
  
  <rect x="270" y="155" width="160" height="70" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="285" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">/en/products</text>
  <text x="285" y="200" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">/es/productos</text>
  <text x="285" y="217" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">/fr/produits</text>
  
  <rect x="270" y="230" width="160" height="25" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="350" y="247" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#15803d">✓ SEO-friendly</text>
  
  <!-- User Profile -->
  <rect x="470" y="100" width="200" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="570" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">User Profile</text>
  
  <rect x="490" y="155" width="160" height="70" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  <text x="505" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Stored preference</text>
  <text x="505" y="200" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#15803d">user.locale = 'es'</text>
  <text x="505" y="217" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Cross-device sync</text>
  
  <rect x="490" y="230" width="160" height="25" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="570" y="247" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#15803d">✓ Explicit choice</text>
  
  <!-- Geolocation -->
  <rect x="690" y="100" width="180" height="140" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="780" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Geolocation (IP)</text>
  
  <rect x="710" y="155" width="140" height="70" rx="6" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="725" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">IP → Country</text>
  <text x="725" y="200" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Country → Language</text>
  <text x="725" y="217" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#7e22ce">US → en, DE → de</text>
  
  <rect x="710" y="230" width="140" height="25" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="780" y="247" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#b45309">~ Fallback only</text>
  
  <!-- Detection Priority Pipeline -->
  <rect x="30" y="260" width="840" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Detection Priority Order</text>
  
  <!-- Priority boxes -->
  <rect x="50" y="310" width="150" height="70" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="125" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#15803d">1. User Override</text>
  <text x="125" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">(Manual selection)</text>
  
  <path d="M 200 345 L 220 345" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  
  <rect x="220" y="310" width="150" height="70" rx="6" fill="#dbeafe" stroke="#0284c7"/>
  <text x="295" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#0369a1">2. User Profile</text>
  <text x="295" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">(Authenticated)</text>
  
  <path d="M 370 345 L 390 345" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  
  <rect x="390" y="310" width="150" height="70" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="465" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#92400e">3. URL Path</text>
  <text x="465" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">(/en/, /es/)</text>
  
  <path d="M 540 345 L 560 345" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  
  <rect x="560" y="310" width="150" height="70" rx="6" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="635" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#15803d">4. Cookie/Storage</text>
  <text x="635" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">(Previous visit)</text>
  
  <path d="M 710 345 L 730 345" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  
  <rect x="730" y="310" width="130" height="70" rx="6" fill="#fee2e2" stroke="#ef4444"/>
  <text x="795" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#b91c1c">5. Browser</text>
  <text x="795" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">→ Default</text>
  
  <!-- Comparison Table -->
  <rect x="30" y="420" width="840" height="110" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Strategy Comparison</text>
  
  <rect x="50" y="470" width="190" height="50" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="145" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b21a8">Browser Language</text>
  <text x="145" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Automatic but unreliable</text>
  
  <rect x="260" y="470" width="190" height="50" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="355" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b21a8">URL Path</text>
  <text x="355" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">SEO-friendly, explicit</text>
  
  <rect x="470" y="470" width="190" height="50" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="565" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b21a8">User Profile</text>
  <text x="565" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Best for authenticated</text>
  
  <rect x="680" y="470" width="190" height="50" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="775" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b21a8">Geolocation</text>
  <text x="775" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Fallback only</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
  </defs>
</svg>
