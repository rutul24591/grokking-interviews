<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Currency Conversion Flow</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Rate fetching, caching, and conversion pipeline</text>
  
  <!-- Exchange Rate API -->
  <rect x="30" y="100" width="180" height="100" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="120" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Exchange Rate API</text>
  <text x="120" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">OpenExchangeRates</text>
  <text x="120" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Fixer, CurrencyLayer</text>
  
  <!-- Arrow to Rate Cache -->
  <path d="M 210 150 L 270 150" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  <text x="240" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Fetch every</text>
  <text x="240" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">5-15 min</text>
  
  <!-- Rate Cache -->
  <rect x="270" y="100" width="200" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="370" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Rate Cache (Redis)</text>
  
  <rect x="290" y="155" width="160" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="305" y="170" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b45309">USD base:</text>
  <text x="305" y="185" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b45309">EUR: 0.92, GBP: 0.79</text>
  
  <!-- Timestamp -->
  <rect x="290" y="195" width="160" height="25" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="370" y="212" text-anchor="middle" font-family="monospace, sans-serif" font-size="7" fill="#92400e">Updated: 14:30:00 UTC</text>
  
  <!-- Arrow to Conversion -->
  <path d="M 470 150 L 530 150" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  <text x="500" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Use cached</text>
  <text x="500" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">rate</text>
  
  <!-- Conversion Layer -->
  <rect x="530" y="100" width="200" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="630" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Conversion Layer</text>
  
  <rect x="550" y="155" width="160" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="565" y="175" text-anchor="middle" font-family="monospace, sans-serif" font-size="8" fill="#15803d">amount * rate / 100</text>
  
  <!-- Arrow to Display -->
  <path d="M 730 150 L 790 150" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" fill="none"/>
  <text x="760" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Format</text>
  
  <!-- Display Layer -->
  <rect x="790" y="100" width="80" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="830" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6b21a8">Display</text>
  <text x="830" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">€92.00</text>
  <text x="830" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#6b21a8">Rates as of</text>
  <text x="830" y="207" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#6b21a8">14:30 UTC</text>
  
  <!-- Example Conversion -->
  <rect x="30" y="230" width="400" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="230" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Example: $100 USD → EUR</text>
  
  <rect x="50" y="280" width="360" height="75" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="65" y="305" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Base amount: 10000 cents ($100.00)</text>
  <text x="65" y="325" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Rate: 1 USD = 0.92 EUR</text>
  <text x="65" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#15803d">Converted: 9200 cents (€92.00)</text>
  
  <!-- Rate Staleness Handling -->
  <rect x="450" y="230" width="420" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Rate Staleness Handling</text>
  
  <rect x="465" y="280" width="390" height="75" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="480" y="305" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Cache age &lt; 5 min: Use cached rate</text>
  <text x="480" y="325" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Cache age 5-15 min: Use cached, show timestamp</text>
  <text x="480" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">Cache age &gt; 15 min: Fetch fresh rate</text>
  
  <!-- Multi-Currency Display -->
  <rect x="30" y="390" width="400" height="140" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="230" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Multi-Currency Display Pattern</text>
  
  <rect x="50" y="440" width="360" height="75" rx="6" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="65" y="465" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Primary: Customer&apos;s selected currency</text>
  <text x="65" y="485" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Secondary: Base currency (in parentheses)</text>
  <text x="65" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b21a8">Example: €92.00 ($100.00)</text>
  
  <!-- Checkout Clarity -->
  <rect x="450" y="390" width="420" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="660" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Checkout Currency Clarity</text>
  
  <rect x="465" y="440" width="390" height="75" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  <text x="480" y="465" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Clearly state which currency will be charged:</text>
  <text x="480" y="485" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ "You will be charged €92.00 EUR"</text>
  <text x="480" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ "Total: €92.00" (ambiguous)</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
