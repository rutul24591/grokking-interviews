<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Number Formatting Options</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Decimal, currency, percentage, and unit formatting across locales</text>
  
  <!-- Decimal Formatting -->
  <rect x="30" y="100" width="270" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Decimal Numbers</text>
  
  <rect x="50" y="155" width="230" height="70" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  <text x="65" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Number: 1234.567</text>
  <text x="65" y="200" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">en-US: 1,234.567</text>
  <text x="65" y="217" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">de-DE: 1.234,567</text>
  
  <rect x="50" y="235" width="230" height="25" rx="4" fill="#dbeafe" stroke="#0284c7"/>
  <text x="165" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Intl.NumberFormat(locale)</text>
  
  <!-- Currency Formatting -->
  <rect x="315" y="100" width="270" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Currency</text>
  
  <rect x="335" y="155" width="230" height="70" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="350" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Amount: 1234.56 USD</text>
  <text x="350" y="200" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#b45309">en-US: $1,234.56</text>
  <text x="350" y="217" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#b45309">de-DE: 1.234,56 $</text>
  
  <rect x="335" y="235" width="230" height="25" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">style: &apos;currency&apos;, currency: &apos;USD&apos;</text>
  
  <!-- Percentage Formatting -->
  <rect x="600" y="100" width="270" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="735" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Percentage</text>
  
  <rect x="620" y="155" width="230" height="70" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  <text x="635" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Value: 0.8756</text>
  <text x="635" y="200" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">en-US: 87.56%</text>
  <text x="635" y="217" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">ar-SA: ٪٨٧٫٥٦</text>
  
  <rect x="620" y="235" width="230" height="25" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="735" y="252" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">style: &apos;percent&apos;</text>
  
  <!-- Unit Formatting -->
  <rect x="30" y="260" width="270" height="140" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="165" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">Units</text>
  
  <rect x="50" y="315" width="230" height="70" rx="6" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="65" y="340" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Distance: 1234.5 km</text>
  <text x="65" y="360" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">en-US: 767 mi</text>
  <text x="65" y="377" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">de-DE: 1.234,5 km</text>
  
  <rect x="50" y="395" width="230" height="25" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="165" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">style: &apos;unit&apos;, unit: &apos;kilometer&apos;</text>
  
  <!-- Compact Formatting -->
  <rect x="315" y="260" width="270" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Compact Notation</text>
  
  <rect x="335" y="315" width="230" height="70" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="350" y="340" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Number: 1500000</text>
  <text x="350" y="360" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#b45309">en-US: 1.5M</text>
  <text x="350" y="377" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#b45309">ja-JP: 150 万</text>
  
  <rect x="335" y="395" width="230" height="25" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">notation: &apos;compact&apos;</text>
  
  <!-- Numeral Systems -->
  <rect x="600" y="260" width="270" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="735" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Numeral Systems</text>
  
  <rect x="620" y="315" width="230" height="70" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  <text x="635" y="340" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Number: 1234</text>
  <text x="635" y="360" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">latn: 1,234</text>
  <text x="635" y="377" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">arab: ١٬٢٣٤</text>
  
  <rect x="620" y="395" width="230" height="25" rx="4" fill="#dbeafe" stroke="#0284c7"/>
  <text x="735" y="412" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">numberingSystem: &apos;arab&apos;</text>
  
  <!-- API Usage Example -->
  <rect x="30" y="420" width="840" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Intl.NumberFormat API Usage</text>
  
  <rect x="50" y="470" width="800" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="65" y="495" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#475560">new Intl.NumberFormat(&apos;de-DE&apos;, { style: &apos;currency&apos;, currency: &apos;EUR&apos; }).format(1234.56)</text>
  <text x="65" y="510" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">→ &quot;1.234,56 €&quot;</text>
</svg>
