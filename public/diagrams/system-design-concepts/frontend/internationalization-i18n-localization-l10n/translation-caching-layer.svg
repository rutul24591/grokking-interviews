<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Translation Caching Layer</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">localStorage, service worker, and CDN caching</text>
  
  <!-- Browser Cache Layers -->
  <rect x="30" y="100" width="280" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="170" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Browser Cache Layers</text>
  
  <rect x="50" y="155" width="240" height="130" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  
  <!-- localStorage -->
  <rect x="65" y="175" width="210" height="35" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="80" y="197" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">localStorage</text>
  <text x="250" y="197" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Immediate</text>
  
  <!-- Service Worker -->
  <rect x="65" y="220" width="210" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="80" y="242" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Service Worker Cache</text>
  <text x="250" y="242" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Offline</text>
  
  <!-- Memory Cache -->
  <rect x="65" y="265" width="210" height="35" rx="4" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="80" y="287" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">In-Memory (Runtime)</text>
  <text x="250" y="287" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Fastest</text>
  
  <!-- CDN -->
  <rect x="330" y="100" width="280" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="470" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">CDN Caching</text>
  
  <rect x="350" y="155" width="240" height="130" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <text x="365" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Edge caching for translations</text>
  <text x="365" y="200" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Cache-Control headers</text>
  <text x="365" y="220" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Versioned URLs for invalidation</text>
  
  <rect x="365" y="245" width="210" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="470" y="265" text-anchor="middle" font-family="monospace, sans-serif" font-size="8" fill="#b45309">/locales/en/common.v123.json</text>
  
  <!-- Cache Flow -->
  <rect x="630" y="100" width="240" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="750" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Cache Hit Flow</text>
  
  <rect x="650" y="155" width="200" height="130" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  
  <!-- Flow -->
  <rect x="665" y="175" width="170" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="750" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">1. Check Memory</text>
  
  <path d="M 750 205 L 750 220" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  
  <rect x="665" y="220" width="170" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="750" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">2. Check localStorage</text>
  
  <path d="M 750 250 L 750 265" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)" fill="none"/>
  
  <rect x="665" y="265" width="170" height="30" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="750" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">3. Fetch from Network</text>
  
  <!-- Cache Invalidation -->
  <rect x="30" y="320" width="400" height="110" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="230" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Cache Invalidation Strategies</text>
  
  <rect x="50" y="370" width="360" height="50" rx="6" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="65" y="395" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Version URLs: common.v123.json → v124 forces new fetch</text>
  
  <!-- Cache Performance -->
  <rect x="450" y="320" width="420" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Cache Performance Impact</text>
  
  <rect x="465" y="370" width="390" height="50" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="480" y="395" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Without cache: 200-500ms per locale switch</text>
  <text x="480" y="412" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">With cache: &lt;10ms (localStorage) or instant (memory)</text>
  
  <!-- Offline Support -->
  <rect x="30" y="450" width="400" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="230" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Offline Support with Service Worker</text>
  
  <rect x="50" y="495" width="360" height="25" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="230" y="512" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Precache critical translations during service worker install</text>
  
  <!-- Versioning -->
  <rect x="450" y="450" width="420" height="80" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="660" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Version Hash in URL</text>
  
  <rect x="465" y="495" width="390" height="25" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="660" y="512" text-anchor="middle" font-family="monospace, sans-serif" font-size="8" fill="#475560">/locales/en/common.a1b2c3d4.json → Cache busts on content change</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
