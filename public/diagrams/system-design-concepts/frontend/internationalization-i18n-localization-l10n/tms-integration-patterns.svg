<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">TMS Integration Patterns</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">API-based, Git-based, and hybrid approaches</text>
  
  <!-- API-Based -->
  <rect x="30" y="100" width="270" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">API-Based Sync</text>
  
  <rect x="50" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  
  <!-- Flow diagram -->
  <rect x="65" y="175" width="100" height="40" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="115" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Codebase</text>
  
  <path d="M 165 195 L 195 195" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  
  <rect x="195" y="175" width="80" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="235" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">TMS API</text>
  
  <text x="65" y="240" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">✓ Real-time sync</text>
  <text x="65" y="257" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">✓ Automated</text>
  <text x="65" y="274" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#dc2626">✗ TMS is source of truth</text>
  
  <text x="165" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#0369a1">Best for: Continuous localization</text>
  
  <!-- Git-Based -->
  <rect x="315" y="100" width="270" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Git-Based (PR Workflow)</text>
  
  <rect x="335" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <!-- Flow diagram -->
  <rect x="350" y="175" width="70" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="385" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">TMS</text>
  
  <path d="M 420 195 L 450 195" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)" fill="none"/>
  
  <rect x="450" y="175" width="100" height="40" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="500" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">GitHub PR</text>
  
  <text x="350" y="240" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">✓ Version control</text>
  <text x="350" y="257" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">✓ Code review</text>
  <text x="350" y="274" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#dc2626">✗ Slower workflow</text>
  
  <text x="450" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#b45309">Best for: Git-centric teams</text>
  
  <!-- Hybrid -->
  <rect x="600" y="100" width="270" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="735" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Hybrid Approach</text>
  
  <rect x="620" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  
  <!-- Flow diagram -->
  <rect x="635" y="175" width="60" height="40" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="665" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#0369a1">Source</text>
  
  <path d="M 695 195 L 725 195" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  
  <rect x="725" y="175" width="60" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="755" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#b45309">TMS</text>
  
  <path d="M 785 195 L 815 195" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  
  <rect x="815" y="175" width="60" height="40" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="845" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#0369a1">Git</text>
  
  <text x="635" y="240" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">✓ Source in Git</text>
  <text x="635" y="257" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">✓ TMS features</text>
  <text x="635" y="274" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">~ More complex setup</text>
  
  <text x="735" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#15803d">Best for: Most production setups</text>
  
  <!-- Comparison Table -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Integration Comparison</text>
  
  <!-- Table headers -->
  <rect x="50" y="365" width="180" height="30" rx="4" fill="#e2e8f0"/>
  <text x="140" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Aspect</text>
  <rect x="230" y="365" width="200" height="30" rx="4" fill="#dbeafe" stroke="#0284c7"/>
  <text x="330" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#0369a1">API-Based</text>
  <rect x="430" y="365" width="200" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="530" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#92400e">Git-Based</text>
  <rect x="630" y="365" width="250" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="755" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#15803d">Hybrid</text>
  
  <!-- Row 1: Speed -->
  <text x="60" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Speed</text>
  <text x="235" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Fast (real-time)</text>
  <text x="435" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">Slow (PR review)</text>
  <text x="635" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Medium</text>
  
  <!-- Row 2: Version Control -->
  <text x="60" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Version Control</text>
  <text x="235" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#dc2626">✗ TMS only</text>
  <text x="435" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Full Git</text>
  <text x="635" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Source in Git</text>
  
  <!-- Row 3: Automation -->
  <text x="60" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Automation</text>
  <text x="235" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ High</text>
  <text x="435" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">~ Manual PR</text>
  <text x="635" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Medium-High</text>
  
  <!-- Row 4: Complexity -->
  <text x="60" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Setup Complexity</text>
  <text x="235" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Low</text>
  <text x="435" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Low-Medium</text>
  <text x="635" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">~ Medium-High</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
