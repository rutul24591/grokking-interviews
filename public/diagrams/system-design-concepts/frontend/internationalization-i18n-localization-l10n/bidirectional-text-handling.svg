<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Bidirectional Text Handling</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Unicode Bidi algorithm handles mixed LTR/RTL content correctly</text>
  
  <!-- Mixed Content Example 1 -->
  <rect x="30" y="100" width="400" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="230" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Arabic with English Words</text>
  
  <rect x="50" y="155" width="360" height="70" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  <text x="65" y="185" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">RTL Base Direction:</text>
  <text x="65" y="210" text-anchor="start" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b" lang="ar" dir="rtl">مرحبا بك في website الجديد</text>
  
  <!-- Mixed Content Example 2 -->
  <rect x="470" y="100" width="400" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="670" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Numbers in RTL Text</text>
  
  <rect x="490" y="155" width="360" height="70" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="505" y="185" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Numbers stay LTR:</text>
  <text x="505" y="210" text-anchor="start" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b" lang="ar" dir="rtl">السعر 100 دولار للقطعة</text>
  
  <!-- Isolation Example -->
  <rect x="30" y="260" width="400" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="230" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Using unicode-bidi: isolate</text>
  
  <rect x="50" y="315" width="360" height="70" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  <text x="65" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Isolated English in Arabic:</text>
  <text x="65" y="370" text-anchor="start" font-family="system-ui, sans-serif" font-size="14" fill="#1e293b">
    <tspan lang="ar" dir="rtl">انظر إلى </tspan>
    <tspan fill="#22c55e" font-weight="600">&lt;span dir="ltr"&gt;Hello&lt;/span&gt;</tspan>
    <tspan lang="ar" dir="rtl"> هناك</tspan>
  </text>
  
  <!-- URL Handling -->
  <rect x="470" y="260" width="400" height="140" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="670" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">URLs in RTL Text</text>
  
  <rect x="490" y="315" width="360" height="70" rx="6" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="505" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#6b21a8">URLs stay LTR:</text>
  <text x="505" y="370" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" fill="#1e293b" lang="ar" dir="rtl">زيارة https://example.com/ar للمزيد</text>
  
  <!-- Bidi Algorithm Steps -->
  <rect x="30" y="420" width="840" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Unicode Bidi Algorithm Steps</text>
  
  <rect x="50" y="470" width="800" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">1. Determine base direction → 2. Resolve embedding levels → 3. Reorder for display → 4. Apply mirroring</text>
  
  <!-- Common Issues -->
  <rect x="50" y="540" width="400" height="35" rx="6" fill="#fee2e2" stroke="#ef4444"/>
  <text x="250" y="563" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Issue: Punctuation at wrong end → Fix: Use proper bidi isolation</text>
  
  <rect x="470" y="540" width="400" height="35" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="670" y="563" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Solution: &lt;span dir="auto"&gt; for dynamic content</text>
</svg>
