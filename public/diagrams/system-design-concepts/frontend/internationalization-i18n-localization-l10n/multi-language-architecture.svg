<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Multi-language Architecture</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Translation files, i18n library, and rendering pipeline</text>
  
  <!-- Translation Files -->
  <rect x="30" y="100" width="200" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="130" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Translation Files</text>
  
  <rect x="50" y="155" width="160" height="110" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  <text x="65" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">locales/</text>
  <text x="80" y="200" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">en/</text>
  <text x="95" y="215" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#0369a1">common.json</text>
  <text x="95" y="228" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#0369a1">errors.json</text>
  <text x="80" y="245" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0369a1">es/</text>
  <text x="95" y="260" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#0369a1">common.json</text>
  
  <!-- Arrow to i18n Library -->
  <path d="M 230 190 L 290 190" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  
  <!-- i18n Library -->
  <rect x="290" y="120" width="220" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">i18n Library</text>
  
  <rect x="310" y="175" width="180" height="70" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="325" y="200" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Key lookup</text>
  <text x="325" y="217" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Interpolation</text>
  <text x="325" y="234" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Pluralization</text>
  
  <!-- Arrow to React Components -->
  <path d="M 510 190 L 570 190" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- React Components -->
  <rect x="570" y="100" width="300" height="180" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="720" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">React Components</text>
  
  <rect x="590" y="155" width="260" height="110" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  
  <!-- Component example -->
  <rect x="605" y="175" width="230" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="620" y="197" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">{`<Button>{t('common.save')}</Button>`}</text>
  
  <rect x="605" y="215" width="230" height="35" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="620" y="237" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">{`<h1>{t('welcome.title')}</h1>`}</text>
  
  <!-- Locale Detection -->
  <rect x="30" y="310" width="280" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="170" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Locale Detection</text>
  
  <rect x="50" y="365" width="240" height="50" rx="6" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="65" y="390" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">• Browser language</text>
  <text x="65" y="407" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">• URL path (/en/, /es/)</text>
  
  <!-- Fallback Chain -->
  <rect x="330" y="310" width="280" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="470" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Fallback Chain</text>
  
  <rect x="350" y="365" width="240" height="50" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="365" y="390" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">es-MX → es → en → default</text>
  
  <!-- Lazy Loading -->
  <rect x="630" y="310" width="240" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="750" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Lazy Loading</text>
  
  <rect x="650" y="365" width="200" height="50" rx="6" fill="#dbeafe" stroke="#0284c7"/>
  <text x="665" y="390" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Load locale on demand</text>
  <text x="665" y="407" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Cache loaded translations</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
