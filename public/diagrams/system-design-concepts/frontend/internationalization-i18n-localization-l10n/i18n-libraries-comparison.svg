<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">i18n Libraries Comparison</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">react-i18next, Lingui, next-intl, and FormatJS features</text>
  
  <!-- react-i18next -->
  <rect x="30" y="100" width="270" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">react-i18next</text>
  
  <rect x="50" y="155" width="230" height="110" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  <text x="65" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">✓ Most popular React i18n</text>
  <text x="65" y="200" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">✓ Full ICU MessageFormat</text>
  <text x="65" y="220" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">✓ Rich plugin ecosystem</text>
  <text x="65" y="240" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">~15KB minified</text>
  <text x="65" y="260" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#0369a1">Best for: Most projects</text>
  
  <!-- Lingui -->
  <rect x="315" y="100" width="270" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Lingui</text>
  
  <rect x="335" y="155" width="230" height="110" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="350" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">✓ Compile-time extraction</text>
  <text x="350" y="200" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">✓ Macro syntax (inline)</text>
  <text x="350" y="220" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">✓ Small runtime</text>
  <text x="350" y="240" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">~8KB minified</text>
  <text x="350" y="260" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#b45309">Best for: Inline translations</text>
  
  <!-- next-intl -->
  <rect x="600" y="100" width="270" height="180" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="735" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">next-intl</text>
  
  <rect x="620" y="155" width="230" height="110" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  <text x="635" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">✓ Next.js App Router native</text>
  <text x="635" y="200" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">✓ Server Components support</text>
  <text x="635" y="220" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">✓ Middleware locale detection</text>
  <text x="635" y="240" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">~10KB minified</text>
  <text x="635" y="260" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#15803d">Best for: Next.js projects</text>
  
  <!-- Feature Comparison Table -->
  <rect x="30" y="300" width="840" height="230" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Feature Comparison</text>
  
  <!-- Table headers -->
  <rect x="50" y="345" width="180" height="30" rx="4" fill="#e2e8f0"/>
  <text x="140" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Feature</text>
  <rect x="230" y="345" width="180" height="30" rx="4" fill="#dbeafe" stroke="#0284c7"/>
  <text x="320" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#0369a1">react-i18next</text>
  <rect x="410" y="345" width="180" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="500" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Lingui</text>
  <rect x="590" y="345" width="180" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="680" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#15803d">next-intl</text>
  <rect x="770" y="345" width="100" height="30" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="820" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b21a8">FormatJS</text>
  
  <!-- Row 1: Pluralization -->
  <text x="60" y="395" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Pluralization</text>
  <text x="320" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ ICU</text>
  <text x="500" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ ICU</text>
  <text x="680" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ ICU</text>
  <text x="820" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ ICU</text>
  
  <!-- Row 2: Gender -->
  <text x="60" y="425" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Gender</text>
  <text x="320" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Select</text>
  <text x="500" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Select</text>
  <text x="680" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Select</text>
  <text x="820" y="425" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Select</text>
  
  <!-- Row 3: Context -->
  <text x="60" y="455" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Context</text>
  <text x="320" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Built-in</text>
  <text x="500" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">~ Comments</text>
  <text x="680" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Namespaces</text>
  <text x="820" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Built-in</text>
  
  <!-- Row 4: Lazy Loading -->
  <text x="60" y="485" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Lazy Loading</text>
  <text x="320" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Yes</text>
  <text x="500" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Yes</text>
  <text x="680" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Yes</text>
  <text x="820" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Yes</text>
  
  <!-- Row 5: Learning Curve -->
  <text x="60" y="515" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Learning Curve</text>
  <text x="320" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">~ Moderate</text>
  <text x="500" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Low</text>
  <text x="680" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Low (Next.js)</text>
  <text x="820" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">~ Moderate</text>
</svg>
