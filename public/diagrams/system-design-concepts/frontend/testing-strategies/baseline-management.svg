<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Baseline Management</text>
  <!-- Initial Capture -->
  <rect x="50" y="80" width="200" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="150" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">1. Initial Capture</text>
  <text x="150" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Screenshot each component</text>
  <text x="150" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Consistent environment</text>
  <text x="150" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Multiple browsers/viewports</text>
  <path d="M 250 140 L 300 140" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Review -->
  <rect x="300" y="80" width="200" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">2. Review</text>
  <text x="400" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Verify screenshots correct</text>
  <text x="400" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Check all states covered</text>
  <text x="400" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Approve as baselines</text>
  <path d="M 500 140 L 550 140" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Store -->
  <rect x="550" y="80" width="200" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="650" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">3. Store</text>
  <text x="650" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Cloud service (Percy)</text>
  <text x="650" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Or Git LFS (self-hosted)</text>
  <text x="650" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Versioned, reviewable</text>
  <path d="M 750 140 L 800 140" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Use -->
  <rect x="800" y="80" width="80" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="840" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6b21a8">4. Use</text>
  <text x="840" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#6b21a8">Compare new</text>
  <text x="840" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#6b21a8">screenshots</text>
  <text x="840" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#6b21a8">against these</text>
  <!-- Update workflow -->
  <rect x="50" y="220" width="800" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Baseline Update Workflow</text>
  <rect x="70" y="270" width="170" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="155" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Code change made</text>
  <path d="M 240 285 L 280 285" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="280" y="270" width="170" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="365" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">New screenshot captured</text>
  <path d="M 450 285 L 490 285" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="490" y="270" width="170" height="30" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="575" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Diff compared</text>
  <path d="M 660 285 L 700 285" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="700" y="270" width="130" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="765" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Approved → Updated</text>
  <rect x="70" y="310" width="760" height="40" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="450" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Review carefully before approving — incorrect baselines cause future tests to pass incorrectly (bug becomes expected appearance)</text>
  <!-- Best practices -->
  <rect x="50" y="380" width="800" height="150" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Baseline Best Practices</text>
  <rect x="70" y="430" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Capture all component states</text>
  <rect x="330" y="430" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Version baselines with code</text>
  <rect x="590" y="430" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="452" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Review diffs before approving</text>
  <rect x="70" y="470" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Use cloud service for management</text>
  <rect x="330" y="470" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Avoid large binaries in Git</text>
  <rect x="590" y="470" width="240" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="492" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Use Git LFS if self-hosting</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
