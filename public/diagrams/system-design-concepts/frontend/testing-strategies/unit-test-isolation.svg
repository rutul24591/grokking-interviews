<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Unit Test Isolation</text>
  <rect x="300" y="80" width="300" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
  <text x="450" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#15803d">Unit Under Test</text>
  <text x="450" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#15803d">Function or Component</text>
  <rect x="320" y="165" width="260" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Inputs: controlled test data</text>
  <rect x="320" y="215" width="260" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Outputs: verified assertions</text>
  <rect x="50" y="300" width="260" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="180" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Mocked Dependencies</text>
  <rect x="70" y="350" width="220" height="25" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="180" y="367" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">API calls (mocked responses)</text>
  <rect x="70" y="380" width="220" height="25" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="180" y="397" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Browser APIs (mocked)</text>
  <rect x="330" y="300" width="260" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="460" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Test Environment</text>
  <rect x="350" y="350" width="220" height="25" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="460" y="367" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">JSDOM (isolated DOM)</text>
  <rect x="350" y="380" width="220" height="25" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="460" y="397" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Clean module registry</text>
  <rect x="610" y="300" width="240" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="730" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6b21a8">Assertions</text>
  <rect x="630" y="350" width="200" height="25" rx="4" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="730" y="367" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Expected output matches actual</text>
  <rect x="630" y="380" width="200" height="25" rx="4" fill="#ffffff" stroke="#e9d5ff"/>
  <text x="730" y="397" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Mock interactions verified</text>
  <path d="M 180 300 L 350 180" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none"/>
  <path d="M 730 300 L 550 180" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none"/>
  <rect x="50" y="440" width="800" height="90" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Isolation Principle</text>
  <text x="450" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">The unit under test is tested in complete isolation. All external dependencies are replaced with mocks that return controlled, predictable values. This ensures that test failures are caused by the unit itself, not by external factors.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
