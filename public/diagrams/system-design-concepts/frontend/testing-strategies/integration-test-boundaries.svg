<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Integration Test Boundaries</text>
  <!-- Real implementations (center) -->
  <rect x="300" y="80" width="300" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="3"/>
  <text x="450" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#15803d">Real Implementations</text>
  <rect x="320" y="135" width="260" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Parent component</text>
  <rect x="320" y="170" width="260" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Child components</text>
  <rect x="320" y="205" width="260" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">State management (Redux, Zustand)</text>
  <rect x="320" y="240" width="260" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Utility functions</text>
  <!-- Mocked dependencies (surrounding) -->
  <rect x="50" y="300" width="260" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="180" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Mocked: APIs</text>
  <rect x="70" y="350" width="220" height="25" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="180" y="367" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">REST/GraphQL endpoints (MSW)</text>
  <rect x="70" y="380" width="220" height="25" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="180" y="397" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Third-party services</text>
  <rect x="330" y="300" width="260" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Mocked: Browser APIs</text>
  <rect x="350" y="350" width="220" height="25" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="367" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">localStorage, geolocation</text>
  <rect x="350" y="380" width="220" height="25" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="397" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">window APIs, document APIs</text>
  <rect x="610" y="300" width="240" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="730" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Mocked: External Libs</text>
  <rect x="630" y="350" width="200" height="25" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="730" y="367" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Analytics, monitoring</text>
  <rect x="630" y="380" width="200" height="25" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="730" y="397" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Payment, auth providers</text>
  <rect x="50" y="440" width="800" height="90" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Boundary Principle</text>
  <text x="450" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Mock external dependencies (outside your control). Use real implementations for internal dependencies (components, utilities, state). This ensures realistic integration testing while maintaining test isolation.</text>
</svg>
