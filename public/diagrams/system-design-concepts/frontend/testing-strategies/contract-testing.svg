<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Contract Testing</text>
  <!-- Frontend -->
  <rect x="50" y="80" width="350" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="225" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0c4a6e">Frontend Contract</text>
  <rect x="70" y="135" width="310" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="225" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">GET /api/users → User[]</text>
  <rect x="70" y="170" width="310" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="225" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">POST /api/users → { id, name }</text>
  <rect x="70" y="205" width="310" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="225" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Error: 400, 404, 500 responses</text>
  <!-- Backend -->
  <rect x="500" y="80" width="350" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="675" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#15803d">Backend Contract</text>
  <rect x="520" y="135" width="310" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="675" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">GET /api/users → User[]</text>
  <rect x="520" y="170" width="310" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="675" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">POST /api/users → { id, name }</text>
  <rect x="520" y="205" width="310" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="675" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Error: 400, 404, 500 responses</text>
  <!-- Contract Tests -->
  <rect x="200" y="280" width="500" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#92400e">Shared Contract Tests</text>
  <rect x="220" y="335" width="460" height="25" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="450" y="352" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Verify request format matches (method, URL, headers, body)</text>
  <rect x="220" y="365" width="460" height="25" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="450" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Verify response format matches (status, headers, body fields)</text>
  <!-- Agreement -->
  <path d="M 225 260 L 350 280" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 675 260 L 550 280" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <!-- Benefits -->
  <rect x="50" y="420" width="800" height="110" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Benefits</text>
  <rect x="70" y="470" width="240" height="45" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="497" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Catch mismatches early</text>
  <rect x="330" y="470" width="240" height="45" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="497" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Prevent breaking changes</text>
  <rect x="590" y="470" width="240" height="45" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="497" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Independent team development</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
