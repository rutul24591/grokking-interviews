<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Lifting State Up: From Duplicated to Single Source of Truth</text>

  <!-- LEFT SIDE: Before (Duplicated State) -->
  <rect x="20" y="50" width="410" height="430" rx="8" fill="#fff" stroke="#d97843" stroke-width="1.5"/>
  <rect x="20" y="50" width="410" height="35" rx="8" fill="#d97843"/>
  <rect x="20" y="70" width="410" height="15" fill="#d97843"/>
  <text x="225" y="73" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">BEFORE: Duplicated State</text>

  <!-- Component A with own state -->
  <rect x="50" y="110" width="160" height="130" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="130" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">ComponentA</text>
  <rect x="70" y="148" width="120" height="25" rx="4" fill="#6d5bd0"/>
  <text x="130" y="165" text-anchor="middle" font-size="10" fill="#fff">localState: "Hi"</text>
  <rect x="70" y="180" width="120" height="25" rx="4" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1"/>
  <text x="130" y="197" text-anchor="middle" font-size="9" fill="#6d5bd0">onChange handler</text>
  <text x="130" y="228" text-anchor="middle" font-size="9" fill="#888">Manages own copy</text>

  <!-- Component B with own state -->
  <rect x="240" y="110" width="160" height="130" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="320" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">ComponentB</text>
  <rect x="260" y="148" width="120" height="25" rx="4" fill="#6d5bd0"/>
  <text x="320" y="165" text-anchor="middle" font-size="10" fill="#fff">localState: "Hello"</text>
  <rect x="260" y="180" width="120" height="25" rx="4" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1"/>
  <text x="320" y="197" text-anchor="middle" font-size="9" fill="#6d5bd0">onChange handler</text>
  <text x="320" y="228" text-anchor="middle" font-size="9" fill="#888">Manages own copy</text>

  <!-- Out of sync warning -->
  <rect x="140" y="260" width="170" height="30" rx="6" fill="#d97843"/>
  <text x="225" y="280" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">OUT OF SYNC!</text>

  <!-- Arrows showing no connection -->
  <line x1="130" y1="248" x2="130" y2="280" stroke="#d97843" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="320" y1="248" x2="320" y2="280" stroke="#d97843" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Problem description -->
  <rect x="50" y="310" width="350" height="80" rx="6" fill="#fff5f0" stroke="#d97843" stroke-width="1"/>
  <text x="225" y="332" text-anchor="middle" font-size="11" font-weight="600" fill="#d97843">Problems:</text>
  <text x="70" y="350" font-size="10" fill="#1a1822">1. Each component owns a separate copy of state</text>
  <text x="70" y="366" font-size="10" fill="#1a1822">2. Updates in A don't reflect in B</text>
  <text x="70" y="382" font-size="10" fill="#1a1822">3. No single source of truth</text>

  <!-- Divider arrow -->
  <polygon points="440,250 460,240 460,245 480,245 480,255 460,255 460,260" fill="#2f9d74"/>

  <!-- RIGHT SIDE: After (Lifted State) -->
  <rect x="470" y="50" width="410" height="430" rx="8" fill="#fff" stroke="#2f9d74" stroke-width="1.5"/>
  <rect x="470" y="50" width="410" height="35" rx="8" fill="#2f9d74"/>
  <rect x="470" y="70" width="410" height="15" fill="#2f9d74"/>
  <text x="675" y="73" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">AFTER: Lifted State</text>

  <!-- Parent component -->
  <rect x="560" y="100" width="230" height="80" rx="8" fill="#edeaf5" stroke="#2f9d74" stroke-width="2"/>
  <text x="675" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1822">Parent</text>
  <rect x="590" y="138" width="170" height="28" rx="4" fill="#2f9d74"/>
  <text x="675" y="157" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">sharedState: "Hello"</text>

  <!-- Props arrows down -->
  <line x1="610" y1="182" x2="560" y2="232" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#greenArrow)"/>
  <line x1="740" y1="182" x2="790" y2="232" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#greenArrow)"/>

  <!-- Left arrow label -->
  <rect x="520" y="195" width="80" height="22" rx="4" fill="#e0f5ec"/>
  <text x="560" y="210" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="600">props: value</text>

  <!-- Right arrow label -->
  <rect x="755" y="195" width="80" height="22" rx="4" fill="#e0f5ec"/>
  <text x="795" y="210" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="600">props: value</text>

  <!-- Component A (controlled) -->
  <rect x="500" y="235" width="150" height="100" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="575" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">ComponentA</text>
  <rect x="515" y="268" width="120" height="22" rx="4" fill="#edeaf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="575" y="283" text-anchor="middle" font-size="9" fill="#2f9d74">props.value</text>
  <rect x="515" y="296" width="120" height="22" rx="4" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1"/>
  <text x="575" y="311" text-anchor="middle" font-size="9" fill="#6d5bd0">props.onChange</text>

  <!-- Component B (controlled) -->
  <rect x="700" y="235" width="150" height="100" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="775" y="258" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a1822">ComponentB</text>
  <rect x="715" y="268" width="120" height="22" rx="4" fill="#edeaf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="775" y="283" text-anchor="middle" font-size="9" fill="#2f9d74">props.value</text>
  <rect x="715" y="296" width="120" height="22" rx="4" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1"/>
  <text x="775" y="311" text-anchor="middle" font-size="9" fill="#6d5bd0">props.onChange</text>

  <!-- Callback arrows up -->
  <line x1="560" y1="340" x2="620" y2="182" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#purpleArrow)"/>
  <line x1="790" y1="340" x2="730" y2="182" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#purpleArrow)"/>

  <!-- Callback labels -->
  <text x="555" y="365" font-size="8" fill="#6d5bd0">onChange callback</text>
  <text x="755" y="365" font-size="8" fill="#6d5bd0">onChange callback</text>

  <!-- In Sync indicator -->
  <rect x="590" y="385" width="170" height="30" rx="6" fill="#2f9d74"/>
  <text x="675" y="405" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">ALWAYS IN SYNC</text>

  <!-- Benefits -->
  <rect x="500" y="425" width="350" height="45" rx="6" fill="#e0f5ec" stroke="#2f9d74" stroke-width="1"/>
  <text x="675" y="443" text-anchor="middle" font-size="10" font-weight="600" fill="#2f9d74">Single source of truth in Parent</text>
  <text x="675" y="458" text-anchor="middle" font-size="9" fill="#1a1822">Both children always reflect the same state value</text>

  <!-- Bottom summary -->
  <rect x="60" y="400" width="330" height="65" rx="6" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1"/>
  <text x="225" y="420" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Key Principle</text>
  <text x="225" y="438" text-anchor="middle" font-size="10" fill="#1a1822">When siblings need shared state, lift it to</text>
  <text x="225" y="453" text-anchor="middle" font-size="10" fill="#1a1822">the nearest common ancestor. Pass data down</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="greenArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2f9d74"/>
    </marker>
    <marker id="purpleArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>