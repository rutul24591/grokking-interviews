<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1822">Leader Election Pattern for Cross-Tab Coordination</text>

  <defs>
    <marker id="a1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
    <marker id="a2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9d74"/>
    </marker>
    <marker id="a3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97843"/>
    </marker>
  </defs>

  <!-- Phase 1: Election -->
  <text x="220" y="62" text-anchor="middle" font-size="13" fill="#6d5bd0" font-weight="bold">Phase 1: Election via Web Locks</text>

  <!-- Web Lock box -->
  <rect x="160" y="75" width="140" height="50" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="230" y="97" text-anchor="middle" font-size="11" fill="#6d5bd0" font-weight="bold">Web Lock</text>
  <text x="230" y="114" text-anchor="middle" font-size="10" fill="#1a1822">"app-leader" (exclusive)</text>

  <!-- Tab A - Leader -->
  <rect x="30" y="145" width="160" height="110" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="145" width="160" height="28" rx="8" fill="#6d5bd0"/>
  <rect x="30" y="165" width="160" height="2" fill="#6d5bd0"/>
  <text x="110" y="164" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Tab A (Leader)</text>
  <circle cx="55" cy="192" r="8" fill="#2f9d74"/>
  <text x="120" y="196" text-anchor="middle" font-size="10" fill="#1a1822">Lock acquired</text>
  <text x="110" y="218" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="bold">WebSocket open</text>
  <text x="110" y="234" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="bold">Polling active</text>
  <text x="110" y="248" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="bold">Token refresh</text>

  <!-- Tab B - Follower -->
  <rect x="230" y="145" width="160" height="90" rx="8" fill="#edeaf5" stroke="#d7d1e6" stroke-width="1.5"/>
  <rect x="230" y="145" width="160" height="28" rx="8" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="310" y="164" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Tab B (Follower)</text>
  <circle cx="255" cy="192" r="8" fill="#d97843"/>
  <text x="330" y="196" text-anchor="middle" font-size="10" fill="#1a1822">Lock queued</text>
  <text x="310" y="218" text-anchor="middle" font-size="10" fill="#1a1822">Receives broadcasts</text>

  <!-- Tab C - Follower -->
  <rect x="230" y="250" width="160" height="70" rx="8" fill="#edeaf5" stroke="#d7d1e6" stroke-width="1.5"/>
  <rect x="230" y="250" width="160" height="28" rx="8" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="310" y="269" text-anchor="middle" font-size="11" fill="#1a1822" font-weight="bold">Tab C (Follower)</text>
  <circle cx="255" cy="298" r="8" fill="#d97843"/>
  <text x="330" y="302" text-anchor="middle" font-size="10" fill="#1a1822">Lock queued</text>

  <!-- Arrows: Lock to tabs -->
  <line x1="200" y1="125" x2="110" y2="143" stroke="#2f9d74" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="260" y1="125" x2="290" y2="143" stroke="#d97843" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>

  <!-- Phase 2: Operation -->
  <text x="630" y="62" text-anchor="middle" font-size="13" fill="#2f9d74" font-weight="bold">Phase 2: Leader Operates &amp; Broadcasts</text>

  <!-- Server -->
  <rect x="580" y="75" width="120" height="50" rx="8" fill="#2f9d74"/>
  <text x="640" y="97" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Server</text>
  <text x="640" y="113" text-anchor="middle" font-size="10" fill="#fff">WebSocket / API</text>

  <!-- Leader Tab (right side) -->
  <rect x="560" y="145" width="160" height="80" rx="8" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="560" y="145" width="160" height="28" rx="8" fill="#6d5bd0"/>
  <rect x="560" y="165" width="160" height="2" fill="#6d5bd0"/>
  <text x="640" y="164" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Tab A (Leader)</text>
  <text x="640" y="193" text-anchor="middle" font-size="10" fill="#1a1822">Receives server data</text>
  <text x="640" y="210" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="bold">Broadcasts to followers</text>

  <!-- Arrow: Server -> Leader -->
  <line x1="640" y1="125" x2="640" y2="143" stroke="#2f9d74" stroke-width="2" marker-end="url(#a2)"/>

  <!-- BroadcastChannel pipe -->
  <rect x="560" y="242" width="160" height="32" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="640" y="263" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="bold">BroadcastChannel</text>

  <!-- Arrow: Leader -> Channel -->
  <line x1="640" y1="225" x2="640" y2="240" stroke="#6d5bd0" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Follower tabs (right side) -->
  <rect x="760" y="160" width="120" height="50" rx="8" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="820" y="182" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="bold">Tab B</text>
  <text x="820" y="198" text-anchor="middle" font-size="10" fill="#1a1822">Updates state</text>

  <rect x="760" y="225" width="120" height="50" rx="8" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="820" y="247" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="bold">Tab C</text>
  <text x="820" y="263" text-anchor="middle" font-size="10" fill="#1a1822">Updates state</text>

  <!-- Arrows: Channel -> Followers -->
  <line x1="720" y1="252" x2="720" y2="185" stroke="#6d5bd0" stroke-width="1.5"/>
  <line x1="720" y1="185" x2="758" y2="185" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="720" y1="252" x2="758" y2="252" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Phase 3: Failover -->
  <text x="450" y="345" text-anchor="middle" font-size="13" fill="#d97843" font-weight="bold">Phase 3: Leader Tab Closes &amp;mdash; Automatic Failover</text>

  <!-- Closed Tab A -->
  <rect x="80" y="365" width="160" height="60" rx="8" fill="#edeaf5" stroke="#d7d1e6" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.5"/>
  <text x="160" y="392" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.5">Tab A (Closed)</text>
  <line x1="90" y1="370" x2="230" y2="420" stroke="#d97843" stroke-width="2" opacity="0.6"/>
  <line x1="230" y1="370" x2="90" y2="420" stroke="#d97843" stroke-width="2" opacity="0.6"/>
  <text x="160" y="415" text-anchor="middle" font-size="10" fill="#d97843" font-weight="bold">Lock released</text>

  <!-- Arrow: lock release -->
  <line x1="240" y1="395" x2="350" y2="395" stroke="#d97843" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#a3)"/>
  <text x="295" y="388" text-anchor="middle" font-size="9" fill="#d97843">lock freed</text>

  <!-- New Leader Tab B -->
  <rect x="355" y="365" width="190" height="80" rx="8" fill="#2f9d74" opacity="0.15" stroke="#2f9d74" stroke-width="2"/>
  <rect x="355" y="365" width="190" height="28" rx="8" fill="#2f9d74"/>
  <rect x="355" y="385" width="190" height="2" fill="#2f9d74"/>
  <text x="450" y="384" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">Tab B (New Leader)</text>
  <text x="450" y="410" text-anchor="middle" font-size="10" fill="#1a1822">Acquires lock from queue</text>
  <text x="450" y="426" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="bold">Opens new WebSocket</text>
  <text x="450" y="442" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="bold">Resumes leader duties</text>

  <!-- Tab C stays follower -->
  <rect x="600" y="375" width="140" height="50" rx="8" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="670" y="397" text-anchor="middle" font-size="10" fill="#1a1822" font-weight="bold">Tab C (Follower)</text>
  <text x="670" y="413" text-anchor="middle" font-size="10" fill="#1a1822">Still queued</text>

  <!-- Arrow: New leader -> Tab C -->
  <line x1="545" y1="410" x2="598" y2="400" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Legend -->
  <rect x="40" y="468" width="14" height="14" rx="3" fill="#6d5bd0"/>
  <text x="60" y="480" font-size="11" fill="#1a1822">Leader tab</text>
  <rect x="170" y="468" width="14" height="14" rx="3" fill="#edeaf5" stroke="#d7d1e6"/>
  <text x="190" y="480" font-size="11" fill="#1a1822">Follower tab</text>
  <rect x="310" y="468" width="14" height="14" rx="3" fill="#2f9d74"/>
  <text x="330" y="480" font-size="11" fill="#1a1822">Promoted leader</text>
  <circle cx="467" cy="475" r="8" fill="#2f9d74"/>
  <text x="482" y="480" font-size="11" fill="#1a1822">Lock acquired</text>
  <circle cx="607" cy="475" r="8" fill="#d97843"/>
  <text x="622" y="480" font-size="11" fill="#1a1822">Lock queued / waiting</text>
</svg>
