<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Live Region Priority showing polite vs assertive announcement behavior">
  <rect width="900" height="500" rx="16" fill="#f3f1f8" />

  <text x="450" y="38" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Live Region Priority: polite vs assertive</text>

  <!-- Timeline header -->
  <text x="450" y="72" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">How aria-live priority affects the screen reader speech queue</text>

  <!-- ===== POLITE SCENARIO ===== -->
  <rect x="40" y="100" width="820" height="170" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <rect x="40" y="100" width="820" height="36" rx="12" fill="#3498db" />
  <rect x="40" y="124" width="820" height="12" fill="#3498db" />
  <text x="450" y="124" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">aria-live=&quot;polite&quot; — Waits for Idle</text>

  <!-- Timeline bar polite -->
  <line x1="70" y1="180" x2="830" y2="180" stroke="#d7d1e6" stroke-width="2" />

  <!-- Current speech block -->
  <rect x="70" y="155" width="280" height="50" rx="8" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="1.5" />
  <text x="210" y="176" text-anchor="middle" fill="#3498db" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Currently Speaking...</text>
  <text x="210" y="194" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">&quot;Navigation, main menu, 5 items&quot;</text>

  <!-- Live region update arrives (polite) -->
  <line x1="250" y1="148" x2="250" y2="155" stroke="#e67e22" stroke-width="2" />
  <rect x="190" y="128" width="120" height="22" rx="6" fill="#e67e22" />
  <text x="250" y="143" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Live update arrives</text>

  <!-- Gap / waiting -->
  <rect x="360" y="160" width="80" height="40" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4 2" />
  <text x="400" y="178" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Idle</text>
  <text x="400" y="192" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">(pause)</text>

  <!-- Polite announcement plays after -->
  <rect x="450" y="155" width="340" height="50" rx="8" fill="#2ecc71" opacity="0.15" stroke="#2ecc71" stroke-width="1.5" />
  <text x="620" y="176" text-anchor="middle" fill="#2ecc71" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Polite Announcement Plays</text>
  <text x="620" y="194" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">&quot;3 new messages received&quot;</text>

  <!-- Arrow showing wait -->
  <path d="M 250 210 C 250 230, 450 230, 450 210" stroke="#e67e22" stroke-width="1.5" fill="none" stroke-dasharray="4 3" />
  <text x="350" y="240" text-anchor="middle" fill="#e67e22" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Queued — waits until speech finishes</text>

  <!-- ===== ASSERTIVE SCENARIO ===== -->
  <rect x="40" y="280" width="820" height="170" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <rect x="40" y="280" width="820" height="36" rx="12" fill="#e74c3c" />
  <rect x="40" y="304" width="820" height="12" fill="#e74c3c" />
  <text x="450" y="304" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">aria-live=&quot;assertive&quot; — Interrupts Immediately</text>

  <!-- Timeline bar assertive -->
  <line x1="70" y1="360" x2="830" y2="360" stroke="#d7d1e6" stroke-width="2" />

  <!-- Current speech block (cut short) -->
  <rect x="70" y="335" width="180" height="50" rx="8" fill="#3498db" opacity="0.15" stroke="#3498db" stroke-width="1.5" />
  <text x="160" y="356" text-anchor="middle" fill="#3498db" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Speaking...</text>
  <text x="160" y="374" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">&quot;Navigation, main me—&quot;</text>

  <!-- Cut indicator -->
  <line x1="250" y1="328" x2="250" y2="392" stroke="#e74c3c" stroke-width="2.5" stroke-dasharray="6 3" />
  <text x="258" y="328" fill="#e74c3c" font-family="system-ui, sans-serif" font-size="10" font-weight="700">CUT!</text>

  <!-- Live region update arrives (assertive) -->
  <line x1="250" y1="322" x2="250" y2="335" stroke="#e74c3c" stroke-width="2" />
  <rect x="190" y="300" width="120" height="22" rx="6" fill="#e74c3c" />
  <text x="250" y="315" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Live update arrives</text>

  <!-- Assertive announcement immediately plays -->
  <rect x="260" y="335" width="340" height="50" rx="8" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="1.5" />
  <text x="430" y="356" text-anchor="middle" fill="#e74c3c" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Assertive Announcement Plays NOW</text>
  <text x="430" y="374" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">&quot;Error: Form submission failed&quot;</text>

  <!-- Remaining speech resumes (maybe) -->
  <rect x="610" y="340" width="210" height="40" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" stroke-dasharray="4 2" />
  <text x="715" y="358" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Previous speech may</text>
  <text x="715" y="372" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">not resume</text>

  <!-- Arrow showing interrupt -->
  <path d="M 250 392 L 260 392" stroke="#e74c3c" stroke-width="2" />
  <text x="350" y="414" text-anchor="middle" fill="#e74c3c" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Immediate — interrupts current speech</text>

  <!-- Usage guidance -->
  <rect x="40" y="450" width="400" height="40" rx="8" fill="#3498db" opacity="0.1" stroke="#3498db" stroke-width="1" />
  <text x="60" y="468" fill="#3498db" font-family="system-ui, sans-serif" font-size="11" font-weight="600">polite:</text>
  <text x="110" y="468" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Status updates, new content, chat messages</text>
  <text x="60" y="484" fill="#3498db" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Use for:</text>
  <text x="115" y="484" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Non-urgent information the user should know</text>

  <rect x="460" y="450" width="400" height="40" rx="8" fill="#e74c3c" opacity="0.1" stroke="#e74c3c" stroke-width="1" />
  <text x="480" y="468" fill="#e74c3c" font-family="system-ui, sans-serif" font-size="11" font-weight="600">assertive:</text>
  <text x="545" y="468" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Errors, alerts, critical validation failures</text>
  <text x="480" y="484" fill="#e74c3c" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Use for:</text>
  <text x="535" y="484" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">Time-sensitive information requiring attention</text>
</svg>