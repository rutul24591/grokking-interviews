<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Focus ring visibility states showing :focus, :focus-visible, and :focus-within pseudo-classes">
  <rect width="900" height="500" rx="16" fill="#f3f1f8" />

  <text x="450" y="38" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Focus Ring Visibility States</text>

  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0" />
    </marker>
  </defs>

  <!-- Column 1: :focus -->
  <rect x="30" y="60" width="270" height="200" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <rect x="30" y="60" width="270" height="36" rx="12" fill="#6d5bd0" />
  <rect x="30" y="84" width="270" height="12" fill="#6d5bd0" />
  <text x="165" y="84" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">:focus</text>

  <text x="165" y="118" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Triggers on ALL focus events</text>

  <circle cx="60" cy="142" r="4" fill="#6d5bd0" />
  <text x="72" y="146" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Mouse click on button</text>
  <circle cx="60" cy="164" r="4" fill="#6d5bd0" />
  <text x="72" y="168" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Tab key navigation</text>
  <circle cx="60" cy="186" r="4" fill="#6d5bd0" />
  <text x="72" y="190" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Programmatic .focus() call</text>
  <circle cx="60" cy="208" r="4" fill="#6d5bd0" />
  <text x="72" y="212" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Touch interaction</text>

  <text x="165" y="244" text-anchor="middle" fill="#e74c3c" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Problem: Shows ring on mouse click too</text>

  <!-- Column 2: :focus-visible -->
  <rect x="315" y="60" width="270" height="200" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <rect x="315" y="60" width="270" height="36" rx="12" fill="#6d5bd0" />
  <rect x="315" y="84" width="270" height="12" fill="#6d5bd0" />
  <text x="450" y="84" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">:focus-visible</text>

  <text x="450" y="118" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Triggers only when needed</text>

  <circle cx="345" cy="142" r="4" fill="#e74c3c" />
  <text x="357" y="146" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Mouse click on button</text>
  <line x1="345" y1="142" x2="560" y2="142" stroke="#e74c3c" stroke-width="0.5" opacity="0.4" />

  <circle cx="345" cy="164" r="4" fill="#27ae60" />
  <text x="357" y="168" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Tab key navigation</text>

  <circle cx="345" cy="186" r="4" fill="#27ae60" />
  <text x="357" y="190" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Programmatic .focus() (inputs)</text>

  <circle cx="345" cy="208" r="4" fill="#e74c3c" />
  <text x="357" y="212" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Touch interaction</text>
  <line x1="345" y1="208" x2="480" y2="208" stroke="#e74c3c" stroke-width="0.5" opacity="0.4" />

  <text x="450" y="244" text-anchor="middle" fill="#27ae60" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Best practice: Use for keyboard-only rings</text>

  <!-- Column 3: :focus-within -->
  <rect x="600" y="60" width="270" height="200" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <rect x="600" y="60" width="270" height="36" rx="12" fill="#6d5bd0" />
  <rect x="600" y="84" width="270" height="12" fill="#6d5bd0" />
  <text x="735" y="84" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">:focus-within</text>

  <text x="735" y="118" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Matches parent when child focused</text>

  <circle cx="630" cy="142" r="4" fill="#6d5bd0" />
  <text x="642" y="146" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Focus on child input</text>
  <circle cx="630" cy="164" r="4" fill="#6d5bd0" />
  <text x="642" y="168" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Focus on child button</text>
  <circle cx="630" cy="186" r="4" fill="#6d5bd0" />
  <text x="642" y="190" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Any descendant gets focus</text>
  <circle cx="630" cy="208" r="4" fill="#6d5bd0" />
  <text x="642" y="212" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Style parent container</text>

  <text x="735" y="244" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Use case: Form groups, dropdowns</text>

  <!-- Bottom: Visual comparison -->
  <rect x="30" y="290" width="840" height="195" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <text x="450" y="318" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Visual Comparison: Mouse Click vs Keyboard Tab</text>

  <!-- Mouse Click scenario -->
  <text x="230" y="348" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Mouse Click on Button</text>

  <rect x="100" y="362" width="120" height="40" rx="8" fill="#6d5bd0" />
  <text x="160" y="386" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Submit</text>

  <text x="160" y="420" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">:focus = active</text>
  <text x="160" y="436" text-anchor="middle" fill="#e74c3c" font-family="system-ui, sans-serif" font-size="11">:focus-visible = inactive</text>
  <text x="160" y="452" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">No visible ring</text>

  <rect x="250" y="362" width="120" height="40" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1" />
  <text x="310" y="386" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12">Cancel</text>

  <!-- Keyboard Tab scenario -->
  <text x="670" y="348" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Keyboard Tab to Button</text>

  <rect x="530" y="358" width="120" height="40" rx="8" fill="#6d5bd0" stroke="#1a1822" stroke-width="3" stroke-dasharray="0" />
  <rect x="526" y="354" width="128" height="48" rx="10" fill="none" stroke="#6d5bd0" stroke-width="2" opacity="0.5" />
  <text x="590" y="382" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Submit</text>

  <text x="590" y="420" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">:focus = active</text>
  <text x="590" y="436" text-anchor="middle" fill="#27ae60" font-family="system-ui, sans-serif" font-size="11">:focus-visible = active</text>
  <text x="590" y="452" text-anchor="middle" fill="#27ae60" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Visible focus ring shown</text>

  <rect x="680" y="362" width="120" height="40" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1" />
  <text x="740" y="386" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12">Cancel</text>
</svg>