<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">WCAG Audit Workflow</text>

  <!-- Step 1: Define Scope -->
  <rect x="30" y="70" width="160" height="70" rx="10" fill="#6d5bd0"/>
  <text x="110" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">1. Define Scope</text>
  <text x="110" y="118" text-anchor="middle" font-size="10" fill="#ffffff">Target level, pages,</text>
  <text x="110" y="130" text-anchor="middle" font-size="10" fill="#ffffff">user flows</text>

  <line x1="190" y1="105" x2="220" y2="105" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Automated Scan -->
  <rect x="220" y="70" width="160" height="70" rx="10" fill="#6d5bd0"/>
  <text x="300" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">2. Automated Scan</text>
  <text x="300" y="118" text-anchor="middle" font-size="10" fill="#ffffff">axe-core, Lighthouse,</text>
  <text x="300" y="130" text-anchor="middle" font-size="10" fill="#ffffff">WAVE, Pa11y</text>

  <line x1="380" y1="105" x2="410" y2="105" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Manual Testing -->
  <rect x="410" y="70" width="160" height="70" rx="10" fill="#6d5bd0"/>
  <text x="490" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">3. Manual Testing</text>
  <text x="490" y="118" text-anchor="middle" font-size="10" fill="#ffffff">Keyboard, screen</text>
  <text x="490" y="130" text-anchor="middle" font-size="10" fill="#ffffff">reader, visual review</text>

  <line x1="570" y1="105" x2="600" y2="105" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Assistive Tech -->
  <rect x="600" y="70" width="160" height="70" rx="10" fill="#6d5bd0"/>
  <text x="680" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">4. Assistive Tech</text>
  <text x="680" y="118" text-anchor="middle" font-size="10" fill="#ffffff">NVDA, JAWS,</text>
  <text x="680" y="130" text-anchor="middle" font-size="10" fill="#ffffff">VoiceOver, TalkBack</text>

  <!-- Arrow down from step 4 -->
  <line x1="680" y1="140" x2="680" y2="180" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Document Findings -->
  <rect x="600" y="180" width="160" height="70" rx="10" fill="#6d5bd0"/>
  <text x="680" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">5. Document</text>
  <text x="680" y="228" text-anchor="middle" font-size="10" fill="#ffffff">Map issues to WCAG</text>
  <text x="680" y="240" text-anchor="middle" font-size="10" fill="#ffffff">SC, severity, impact</text>

  <line x1="600" y1="215" x2="570" y2="215" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 6: Prioritize -->
  <rect x="410" y="180" width="160" height="70" rx="10" fill="#6d5bd0"/>
  <text x="490" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">6. Prioritize</text>
  <text x="490" y="228" text-anchor="middle" font-size="10" fill="#ffffff">Critical/High/Med/Low</text>
  <text x="490" y="240" text-anchor="middle" font-size="10" fill="#ffffff">by user impact</text>

  <line x1="410" y1="215" x2="380" y2="215" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 7: Remediate -->
  <rect x="220" y="180" width="160" height="70" rx="10" fill="#6d5bd0"/>
  <text x="300" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">7. Remediate</text>
  <text x="300" y="228" text-anchor="middle" font-size="10" fill="#ffffff">Fix code, update</text>
  <text x="300" y="240" text-anchor="middle" font-size="10" fill="#ffffff">components, add ARIA</text>

  <line x1="220" y1="215" x2="190" y2="215" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 8: Retest -->
  <rect x="30" y="180" width="160" height="70" rx="10" fill="#6d5bd0"/>
  <text x="110" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">8. Retest</text>
  <text x="110" y="228" text-anchor="middle" font-size="10" fill="#ffffff">Verify fixes, run</text>
  <text x="110" y="240" text-anchor="middle" font-size="10" fill="#ffffff">automated checks again</text>

  <!-- Loop arrow from Retest back to Automated Scan -->
  <path d="M 110 250 L 110 280 L 300 280 L 300 140" fill="none" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow)"/>
  <text x="205" y="274" text-anchor="middle" font-size="10" font-style="italic" fill="#6d5bd0">Iterate until pass</text>

  <!-- Bottom: Continuous monitoring section -->
  <rect x="60" y="310" width="780" height="170" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="335" text-anchor="middle" font-size="14" font-weight="bold" fill="#6d5bd0">Continuous Monitoring (Post-Audit)</text>

  <!-- CI/CD box -->
  <rect x="80" y="350" width="180" height="55" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="170" y="373" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">CI/CD Integration</text>
  <text x="170" y="391" text-anchor="middle" font-size="10" fill="#1a1822">axe-core in pipeline,</text>
  <text x="170" y="403" text-anchor="middle" font-size="10" fill="#1a1822">fail builds on violations</text>

  <!-- Linter box -->
  <rect x="275" y="350" width="180" height="55" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="365" y="373" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">Lint Rules</text>
  <text x="365" y="391" text-anchor="middle" font-size="10" fill="#1a1822">eslint-plugin-jsx-a11y,</text>
  <text x="365" y="403" text-anchor="middle" font-size="10" fill="#1a1822">Storybook a11y addon</text>

  <!-- User testing box -->
  <rect x="470" y="350" width="180" height="55" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="560" y="373" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">User Testing</text>
  <text x="560" y="391" text-anchor="middle" font-size="10" fill="#1a1822">Disability user sessions,</text>
  <text x="560" y="403" text-anchor="middle" font-size="10" fill="#1a1822">usability studies</text>

  <!-- VPAT box -->
  <rect x="665" y="350" width="160" height="55" rx="8" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1"/>
  <text x="745" y="373" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">VPAT / ACR</text>
  <text x="745" y="391" text-anchor="middle" font-size="10" fill="#1a1822">Accessibility conformance</text>
  <text x="745" y="403" text-anchor="middle" font-size="10" fill="#1a1822">report for procurement</text>

  <text x="450" y="458" text-anchor="middle" font-size="11" font-style="italic" fill="#1a1822">Automated tools catch ~30-40% of WCAG issues. Manual + assistive tech testing is essential for full coverage.</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>
</svg>