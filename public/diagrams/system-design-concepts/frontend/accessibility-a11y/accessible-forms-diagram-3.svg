<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Form Validation Accessibility Lifecycle showing stages from input through inline validation, submit validation, error summary, field errors, correction, and success">
  <rect width="900" height="500" rx="16" fill="#f3f1f8" />

  <!-- Title -->
  <text x="450" y="36" fill="#1a1822" font-family="system-ui, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Form Validation Accessibility Lifecycle</text>
  <text x="450" y="58" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Complete validation flow from user input through error correction to success</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrFwd" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0" />
    </marker>
    <marker id="arrBack" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#d7d1e6" />
    </marker>
  </defs>

  <!-- Phase 1: Input -->
  <rect x="30" y="80" width="120" height="130" rx="10" fill="#6d5bd0" />
  <text x="90" y="105" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">PHASE 1</text>
  <text x="90" y="125" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Input</text>
  <line x1="50" y1="135" x2="130" y2="135" stroke="#ffffff" stroke-width="1" opacity="0.4" />
  <text x="90" y="155" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.9">User types in</text>
  <text x="90" y="170" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.9">form fields</text>
  <text x="90" y="190" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" opacity="0.7">aria-required</text>
  <text x="90" y="202" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle" opacity="0.7">autocomplete</text>

  <!-- Arrow 1->2 -->
  <line x1="150" y1="145" x2="175" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrFwd)" />

  <!-- Phase 2: Inline Validation -->
  <rect x="180" y="80" width="120" height="130" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <text x="240" y="105" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">PHASE 2</text>
  <text x="240" y="125" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Inline</text>
  <text x="240" y="140" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Validation</text>
  <line x1="200" y1="148" x2="280" y2="148" stroke="#d7d1e6" stroke-width="1" />
  <text x="240" y="167" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">On blur/change</text>
  <text x="240" y="182" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Single field check</text>
  <text x="240" y="200" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">aria-describedby</text>

  <!-- Arrow 2->3 -->
  <line x1="300" y1="145" x2="325" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrFwd)" />

  <!-- Phase 3: Submit Validation -->
  <rect x="330" y="80" width="120" height="130" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <text x="390" y="105" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">PHASE 3</text>
  <text x="390" y="125" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Submit</text>
  <text x="390" y="140" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Validation</text>
  <line x1="350" y1="148" x2="430" y2="148" stroke="#d7d1e6" stroke-width="1" />
  <text x="390" y="167" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">All fields checked</text>
  <text x="390" y="182" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Cross-field rules</text>
  <text x="390" y="200" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">preventDefault()</text>

  <!-- Arrow 3->4 -->
  <line x1="450" y1="145" x2="475" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrFwd)" />

  <!-- Phase 4: Error Summary -->
  <rect x="480" y="80" width="120" height="130" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <text x="540" y="105" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">PHASE 4</text>
  <text x="540" y="125" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Error</text>
  <text x="540" y="140" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Summary</text>
  <line x1="500" y1="148" x2="580" y2="148" stroke="#d7d1e6" stroke-width="1" />
  <text x="540" y="167" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">role=&amp;quot;alert&amp;quot;</text>
  <text x="540" y="182" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Focus moved here</text>
  <text x="540" y="200" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Links to each field</text>

  <!-- Arrow 4->5 -->
  <line x1="600" y1="145" x2="625" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrFwd)" />

  <!-- Phase 5: Field Errors -->
  <rect x="630" y="80" width="120" height="130" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <text x="690" y="105" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">PHASE 5</text>
  <text x="690" y="125" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Field-Level</text>
  <text x="690" y="140" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Errors</text>
  <line x1="650" y1="148" x2="730" y2="148" stroke="#d7d1e6" stroke-width="1" />
  <text x="690" y="167" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">aria-invalid=true</text>
  <text x="690" y="182" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Inline messages</text>
  <text x="690" y="200" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">Visual indicators</text>

  <!-- Arrow 5->6 (curves down) -->
  <line x1="750" y1="145" x2="775" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrFwd)" />

  <!-- Phase 6: Correction -->
  <rect x="780" y="80" width="100" height="130" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <text x="830" y="105" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">PHASE 6</text>
  <text x="830" y="128" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Correction</text>
  <line x1="795" y1="138" x2="865" y2="138" stroke="#d7d1e6" stroke-width="1" />
  <text x="830" y="158" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">User fixes field</text>
  <text x="830" y="173" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Error clears</text>
  <text x="830" y="200" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">aria-invalid</text>
  <text x="830" y="210" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">removed</text>

  <!-- Feedback loop arrow from Correction back to Inline Validation -->
  <path d="M 830 210 L 830 240 L 240 240 L 240 210" fill="none" stroke="#d7d1e6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrBack)" />
  <text x="535" y="255" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" font-style="italic">Re-validate on correction (loop until all fields valid)</text>

  <!-- Success path -->
  <rect x="30" y="280" width="850" height="60" rx="10" fill="#6d5bd0" opacity="0.1" stroke="#6d5bd0" stroke-width="1" />
  <text x="60" y="306" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="12" font-weight="700">SUCCESS PATH:</text>
  <text x="185" y="306" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">All fields valid &amp;rarr; Form submits &amp;rarr; Success message in <tspan font-family="monospace" fill="#6d5bd0">aria-live=&amp;quot;polite&amp;quot;</tspan> region &amp;rarr; Focus to confirmation or next step</text>
  <text x="60" y="326" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" font-style="italic">Polite (not assertive) because the user completed their task successfully</text>

  <!-- Detailed behavior table -->
  <text x="450" y="370" fill="#1a1822" font-family="system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Validation Trigger Timing Strategy</text>

  <!-- Table header -->
  <rect x="30" y="385" width="270" height="30" rx="6" fill="#6d5bd0" />
  <text x="165" y="405" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Strategy</text>
  <rect x="300" y="385" width="290" height="30" rx="0" fill="#6d5bd0" />
  <text x="445" y="405" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">When to Use</text>
  <rect x="590" y="385" width="290" height="30" rx="6" fill="#6d5bd0" />
  <text x="735" y="405" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">A11y Consideration</text>

  <!-- Row 1 -->
  <rect x="30" y="415" width="270" height="28" fill="#ffffff" stroke="#d7d1e6" stroke-width="1" />
  <text x="45" y="434" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Validate on blur</text>
  <rect x="300" y="415" width="290" height="28" fill="#ffffff" stroke="#d7d1e6" stroke-width="1" />
  <text x="315" y="434" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Simple fields (email, required)</text>
  <rect x="590" y="415" width="290" height="28" fill="#ffffff" stroke="#d7d1e6" stroke-width="1" />
  <text x="605" y="434" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Non-intrusive, good default</text>

  <!-- Row 2 -->
  <rect x="30" y="443" width="270" height="28" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="45" y="462" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Validate on submit</text>
  <rect x="300" y="443" width="290" height="28" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="315" y="462" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Cross-field rules, server checks</text>
  <rect x="590" y="443" width="290" height="28" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="605" y="462" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Needs error summary + focus mgmt</text>

  <!-- Row 3 -->
  <rect x="30" y="471" width="270" height="28" fill="#ffffff" stroke="#d7d1e6" stroke-width="1" />
  <text x="45" y="490" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Validate on change (debounced)</text>
  <rect x="300" y="471" width="290" height="28" fill="#ffffff" stroke="#d7d1e6" stroke-width="1" />
  <text x="315" y="490" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Username availability, passwords</text>
  <rect x="590" y="471" width="290" height="28" fill="#ffffff" stroke="#d7d1e6" stroke-width="1" />
  <text x="605" y="490" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Can be chatty for screen readers</text>
</svg>