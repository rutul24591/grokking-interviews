<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Label-Input Association Patterns showing four methods: Explicit for/id, Implicit wrapping, aria-label, and aria-labelledby">
  <rect width="900" height="500" rx="16" fill="#f3f1f8" />

  <!-- Title -->
  <text x="450" y="36" fill="#1a1822" font-family="system-ui, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Label-Input Association Patterns</text>
  <text x="450" y="58" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Four methods for connecting labels to form controls for screen reader accessibility</text>

  <!-- Connector lines from title to boxes -->
  <line x1="450" y1="66" x2="450" y2="80" stroke="#d7d1e6" stroke-width="2" />
  <line x1="120" y1="80" x2="780" y2="80" stroke="#d7d1e6" stroke-width="2" />
  <line x1="120" y1="80" x2="120" y2="98" stroke="#d7d1e6" stroke-width="2" />
  <line x1="340" y1="80" x2="340" y2="98" stroke="#d7d1e6" stroke-width="2" />
  <line x1="560" y1="80" x2="560" y2="98" stroke="#d7d1e6" stroke-width="2" />
  <line x1="780" y1="80" x2="780" y2="98" stroke="#d7d1e6" stroke-width="2" />

  <!-- Column 1: Explicit for/id -->
  <rect x="25" y="98" width="190" height="385" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <rect x="25" y="98" width="190" height="44" rx="12" fill="#6d5bd0" />
  <rect x="25" y="122" width="190" height="20" fill="#6d5bd0" />
  <text x="120" y="126" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Explicit (for/id)</text>
  <text x="120" y="163" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" font-style="italic">Most common &amp; recommended</text>

  <!-- Code representation -->
  <rect x="38" y="182" width="164" height="70" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="48" y="200" fill="#6d5bd0" font-family="monospace" font-size="10" font-weight="600">&lt;label for=&quot;email&quot;&gt;</text>
  <text x="56" y="215" fill="#1a1822" font-family="monospace" font-size="10">Email</text>
  <text x="48" y="230" fill="#6d5bd0" font-family="monospace" font-size="10" font-weight="600">&lt;/label&gt;</text>
  <text x="48" y="245" fill="#6d5bd0" font-family="monospace" font-size="10" font-weight="600">&lt;input id=&quot;email&quot; /&gt;</text>

  <!-- Arrow showing connection -->
  <line x1="92" y1="260" x2="92" y2="280" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="148" y1="260" x2="148" y2="280" stroke="#6d5bd0" stroke-width="2" marker-start="url(#arrowhead)" />

  <!-- Connection label -->
  <rect x="38" y="285" width="164" height="32" rx="6" fill="#6d5bd0" opacity="0.15" />
  <text x="120" y="305" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">for = id match</text>

  <!-- Pros -->
  <text x="42" y="340" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Advantages:</text>
  <circle cx="48" cy="358" r="3" fill="#6d5bd0" />
  <text x="56" y="362" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Flexible layout</text>
  <circle cx="48" cy="378" r="3" fill="#6d5bd0" />
  <text x="56" y="382" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Clicking label focuses input</text>
  <circle cx="48" cy="398" r="3" fill="#6d5bd0" />
  <text x="56" y="402" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Largest click target</text>
  <circle cx="48" cy="418" r="3" fill="#6d5bd0" />
  <text x="56" y="422" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Works cross-component</text>

  <!-- Rating -->
  <rect x="38" y="440" width="164" height="28" rx="6" fill="#6d5bd0" />
  <text x="120" y="459" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Best Practice</text>

  <!-- Column 2: Implicit Wrapping -->
  <rect x="245" y="98" width="190" height="385" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <rect x="245" y="98" width="190" height="44" rx="12" fill="#6d5bd0" />
  <rect x="245" y="122" width="190" height="20" fill="#6d5bd0" />
  <text x="340" y="126" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">Implicit (Wrapping)</text>
  <text x="340" y="163" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" font-style="italic">No id attribute needed</text>

  <!-- Code representation -->
  <rect x="258" y="182" width="164" height="70" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="268" y="200" fill="#6d5bd0" font-family="monospace" font-size="10" font-weight="600">&lt;label&gt;</text>
  <text x="276" y="215" fill="#1a1822" font-family="monospace" font-size="10">Email</text>
  <text x="276" y="230" fill="#6d5bd0" font-family="monospace" font-size="10" font-weight="600">&lt;input /&gt;</text>
  <text x="268" y="245" fill="#6d5bd0" font-family="monospace" font-size="10" font-weight="600">&lt;/label&gt;</text>

  <!-- Arrow showing connection -->
  <rect x="258" y="285" width="164" height="32" rx="6" fill="#6d5bd0" opacity="0.15" />
  <text x="340" y="305" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">DOM nesting = association</text>

  <!-- Pros -->
  <text x="262" y="340" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Advantages:</text>
  <circle cx="268" cy="358" r="3" fill="#6d5bd0" />
  <text x="276" y="362" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">No id management</text>
  <circle cx="268" cy="378" r="3" fill="#6d5bd0" />
  <text x="276" y="382" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Simpler markup</text>
  <circle cx="268" cy="398" r="3" fill="#6d5bd0" />
  <text x="276" y="402" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Clicking label focuses input</text>
  <circle cx="268" cy="418" r="3" fill="#6d5bd0" />
  <text x="276" y="422" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Good for simple forms</text>

  <!-- Rating -->
  <rect x="258" y="440" width="164" height="28" rx="6" fill="#6d5bd0" opacity="0.75" />
  <text x="340" y="459" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Good Alternative</text>

  <!-- Column 3: aria-label -->
  <rect x="465" y="98" width="190" height="385" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <rect x="465" y="98" width="190" height="44" rx="12" fill="#6d5bd0" />
  <rect x="465" y="122" width="190" height="20" fill="#6d5bd0" />
  <text x="560" y="126" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">aria-label</text>
  <text x="560" y="163" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" font-style="italic">Invisible to sighted users</text>

  <!-- Code representation -->
  <rect x="478" y="182" width="164" height="70" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="488" y="200" fill="#6d5bd0" font-family="monospace" font-size="10" font-weight="600">&lt;input</text>
  <text x="496" y="215" fill="#1a1822" font-family="monospace" font-size="10">aria-label=</text>
  <text x="496" y="230" fill="#6d5bd0" font-family="monospace" font-size="10">&quot;Search site&quot;</text>
  <text x="488" y="245" fill="#6d5bd0" font-family="monospace" font-size="10" font-weight="600">/&gt;</text>

  <!-- Arrow showing connection -->
  <rect x="478" y="285" width="164" height="32" rx="6" fill="#6d5bd0" opacity="0.15" />
  <text x="560" y="305" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">String value = label text</text>

  <!-- Pros -->
  <text x="482" y="340" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Use when:</text>
  <circle cx="488" cy="358" r="3" fill="#6d5bd0" />
  <text x="496" y="362" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">No visible label needed</text>
  <circle cx="488" cy="378" r="3" fill="#6d5bd0" />
  <text x="496" y="382" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Icon-only buttons</text>
  <circle cx="488" cy="398" r="3" fill="#6d5bd0" />
  <text x="496" y="402" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Search inputs with icons</text>
  <circle cx="488" cy="418" r="3" fill="#6d5bd0" />
  <text x="496" y="422" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Not translatable by tools</text>

  <!-- Rating -->
  <rect x="478" y="440" width="164" height="28" rx="6" fill="#1a1822" opacity="0.7" />
  <text x="560" y="459" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Fallback Only</text>

  <!-- Column 4: aria-labelledby -->
  <rect x="685" y="98" width="190" height="385" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <rect x="685" y="98" width="190" height="44" rx="12" fill="#6d5bd0" />
  <rect x="685" y="122" width="190" height="20" fill="#6d5bd0" />
  <text x="780" y="126" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle">aria-labelledby</text>
  <text x="780" y="163" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" font-style="italic">References existing text</text>

  <!-- Code representation -->
  <rect x="698" y="182" width="164" height="70" rx="6" fill="#f3f1f8" stroke="#d7d1e6" stroke-width="1" />
  <text x="708" y="200" fill="#6d5bd0" font-family="monospace" font-size="10" font-weight="600">&lt;h2 id=&quot;sec&quot;&gt;</text>
  <text x="716" y="215" fill="#1a1822" font-family="monospace" font-size="10">Billing</text>
  <text x="708" y="230" fill="#6d5bd0" font-family="monospace" font-size="10" font-weight="600">&lt;/h2&gt;</text>
  <text x="708" y="245" fill="#6d5bd0" font-family="monospace" font-size="9">&lt;input aria-labelledby=&quot;sec&quot;/&gt;</text>

  <!-- Arrow showing connection -->
  <rect x="698" y="285" width="164" height="32" rx="6" fill="#6d5bd0" opacity="0.15" />
  <text x="780" y="305" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">ID ref = label source</text>

  <!-- Pros -->
  <text x="702" y="340" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Use when:</text>
  <circle cx="708" cy="358" r="3" fill="#6d5bd0" />
  <text x="716" y="362" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Label text already exists</text>
  <circle cx="708" cy="378" r="3" fill="#6d5bd0" />
  <text x="716" y="382" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Multiple label sources</text>
  <circle cx="708" cy="398" r="3" fill="#6d5bd0" />
  <text x="716" y="402" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Overrides native &lt;label&gt;</text>
  <circle cx="708" cy="418" r="3" fill="#6d5bd0" />
  <text x="716" y="422" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Composable from many IDs</text>

  <!-- Rating -->
  <rect x="698" y="440" width="164" height="28" rx="6" fill="#1a1822" opacity="0.7" />
  <text x="780" y="459" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Advanced Use Cases</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0" />
    </marker>
  </defs>
</svg>