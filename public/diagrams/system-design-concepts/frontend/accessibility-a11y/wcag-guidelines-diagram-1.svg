<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui, sans-serif">
  <rect width="900" height="520" rx="12" fill="#f3f1f8"/>
  <text x="450" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">WCAG 2.2 Principle Hierarchy (POUR)</text>

  <!-- WCAG 2.2 top box -->
  <rect x="325" y="60" width="250" height="44" rx="8" fill="#6d5bd0"/>
  <text x="450" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">WCAG 2.2</text>

  <!-- Connector lines from WCAG to 4 principles -->
  <line x1="450" y1="104" x2="120" y2="140" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="450" y1="104" x2="340" y2="140" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="450" y1="104" x2="560" y2="140" stroke="#6d5bd0" stroke-width="2"/>
  <line x1="450" y1="104" x2="780" y2="140" stroke="#6d5bd0" stroke-width="2"/>

  <!-- Principle 1: Perceivable -->
  <rect x="20" y="140" width="200" height="44" rx="8" fill="#6d5bd0"/>
  <text x="120" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">1. Perceivable</text>

  <!-- Perceivable guidelines -->
  <rect x="10" y="196" width="220" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="120" y="216" text-anchor="middle" font-size="11" fill="#1a1822">1.1 Text Alternatives</text>

  <rect x="10" y="232" width="220" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="120" y="252" text-anchor="middle" font-size="11" fill="#1a1822">1.2 Time-Based Media</text>

  <rect x="10" y="268" width="220" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="120" y="288" text-anchor="middle" font-size="11" fill="#1a1822">1.3 Adaptable</text>

  <rect x="10" y="304" width="220" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="120" y="324" text-anchor="middle" font-size="11" fill="#1a1822">1.4 Distinguishable</text>

  <!-- Principle 2: Operable -->
  <rect x="240" y="140" width="200" height="44" rx="8" fill="#6d5bd0"/>
  <text x="340" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">2. Operable</text>

  <rect x="230" y="196" width="220" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="340" y="216" text-anchor="middle" font-size="11" fill="#1a1822">2.1 Keyboard Accessible</text>

  <rect x="230" y="232" width="220" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="340" y="252" text-anchor="middle" font-size="11" fill="#1a1822">2.2 Enough Time</text>

  <rect x="230" y="268" width="220" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="340" y="288" text-anchor="middle" font-size="11" fill="#1a1822">2.3 Seizures &amp; Physical</text>

  <rect x="230" y="304" width="220" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="340" y="324" text-anchor="middle" font-size="11" fill="#1a1822">2.4 Navigable</text>

  <rect x="230" y="340" width="220" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="340" y="360" text-anchor="middle" font-size="11" fill="#1a1822">2.5 Input Modalities</text>

  <!-- Principle 3: Understandable -->
  <rect x="460" y="140" width="200" height="44" rx="8" fill="#6d5bd0"/>
  <text x="560" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">3. Understandable</text>

  <rect x="450" y="196" width="220" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="560" y="216" text-anchor="middle" font-size="11" fill="#1a1822">3.1 Readable</text>

  <rect x="450" y="232" width="220" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="560" y="252" text-anchor="middle" font-size="11" fill="#1a1822">3.2 Predictable</text>

  <rect x="450" y="268" width="220" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="560" y="288" text-anchor="middle" font-size="11" fill="#1a1822">3.3 Input Assistance</text>

  <!-- Principle 4: Robust -->
  <rect x="680" y="140" width="200" height="44" rx="8" fill="#6d5bd0"/>
  <text x="780" y="168" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">4. Robust</text>

  <rect x="670" y="196" width="220" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="780" y="216" text-anchor="middle" font-size="11" fill="#1a1822">4.1 Compatible</text>

  <!-- Summary counts -->
  <rect x="120" y="420" width="660" height="80" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="445" text-anchor="middle" font-size="13" font-weight="bold" fill="#6d5bd0">WCAG 2.2 Totals</text>
  <text x="230" y="475" text-anchor="middle" font-size="12" fill="#1a1822">4 Principles</text>
  <text x="390" y="475" text-anchor="middle" font-size="12" fill="#1a1822">13 Guidelines</text>
  <text x="560" y="475" text-anchor="middle" font-size="12" fill="#1a1822">86 Success Criteria</text>
  <text x="700" y="475" text-anchor="middle" font-size="12" fill="#1a1822">3 Levels (A/AA/AAA)</text>

  <!-- Connector lines from principles to guidelines -->
  <line x1="120" y1="184" x2="120" y2="196" stroke="#d7d1e6" stroke-width="1.5"/>
  <line x1="340" y1="184" x2="340" y2="196" stroke="#d7d1e6" stroke-width="1.5"/>
  <line x1="560" y1="184" x2="560" y2="196" stroke="#d7d1e6" stroke-width="1.5"/>
  <line x1="780" y1="184" x2="780" y2="196" stroke="#d7d1e6" stroke-width="1.5"/>
</svg>