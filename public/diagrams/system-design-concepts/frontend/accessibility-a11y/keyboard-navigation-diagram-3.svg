<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Keyboard trap in modal dialog showing focus cycling within modal">
  <rect width="900" height="500" rx="16" fill="#f3f1f8" />

  <text x="450" y="38" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Focus Trap in Modal Dialog</text>
  <text x="450" y="60" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">Focus cycles within the modal; Escape closes it and restores focus</text>

  <defs>
    <marker id="arrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0" />
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e74c3c" />
    </marker>
  </defs>

  <!-- Background page (dimmed) -->
  <rect x="40" y="80" width="820" height="400" rx="12" fill="#e8e5f0" stroke="#d7d1e6" stroke-width="1" opacity="0.6" />

  <!-- Dimmed background elements -->
  <rect x="70" y="100" width="200" height="30" rx="6" fill="#c4bfda" opacity="0.5" />
  <text x="170" y="120" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Navigation (unfocusable)</text>

  <rect x="70" y="145" width="140" height="28" rx="6" fill="#c4bfda" opacity="0.5" />
  <text x="140" y="164" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Search (unfocusable)</text>

  <rect x="70" y="188" width="200" height="250" rx="6" fill="#c4bfda" opacity="0.4" />
  <text x="170" y="320" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Background Content</text>
  <text x="170" y="338" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">(inert / aria-hidden)</text>

  <!-- Block arrows showing Tab cannot reach background -->
  <line x1="290" y1="115" x2="340" y2="115" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,3" />
  <line x1="332" y1="108" x2="340" y2="115" stroke="#e74c3c" stroke-width="2" />
  <line x1="332" y1="122" x2="340" y2="115" stroke="#e74c3c" stroke-width="2" />
  <line x1="335" y1="108" x2="345" y2="122" stroke="#e74c3c" stroke-width="3" />

  <line x1="228" y1="160" x2="340" y2="160" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4,3" />
  <line x1="332" y1="153" x2="340" y2="160" stroke="#e74c3c" stroke-width="2" />
  <line x1="332" y1="167" x2="340" y2="160" stroke="#e74c3c" stroke-width="2" />
  <line x1="335" y1="153" x2="345" y2="167" stroke="#e74c3c" stroke-width="3" />

  <text x="300" y="200" fill="#e74c3c" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Focus blocked</text>

  <!-- Modal overlay -->
  <rect x="340" y="90" width="500" height="370" rx="14" fill="#ffffff" stroke="#6d5bd0" stroke-width="3" />

  <!-- Modal header -->
  <rect x="340" y="90" width="500" height="50" rx="14" fill="#6d5bd0" />
  <rect x="340" y="124" width="500" height="16" fill="#6d5bd0" />
  <text x="380" y="122" fill="#ffffff" font-family="system-ui, sans-serif" font-size="15" font-weight="700">Confirm Action</text>

  <!-- Close button (focusable 1) -->
  <rect x="790" y="100" width="32" height="32" rx="16" fill="#ffffff" stroke="#ffffff" stroke-width="1.5" />
  <text x="806" y="122" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="18" font-weight="700">x</text>
  <circle cx="790" cy="96" r="14" fill="#6d5bd0" />
  <text x="790" y="101" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">1</text>

  <!-- Modal body -->
  <text x="380" y="175" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13">Are you sure you want to delete this item?</text>
  <text x="380" y="200" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">This action cannot be undone. All associated</text>
  <text x="380" y="218" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">data will be permanently removed.</text>

  <!-- Input field (focusable 2) -->
  <text x="380" y="256" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Type &quot;DELETE&quot; to confirm:</text>
  <rect x="380" y="265" width="420" height="36" rx="6" fill="#f8f7fc" stroke="#d7d1e6" stroke-width="1.5" />
  <circle cx="370" cy="283" r="14" fill="#6d5bd0" />
  <text x="370" y="288" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">2</text>

  <!-- Cancel button (focusable 3) -->
  <rect x="530" y="320" width="120" height="40" rx="8" fill="#f8f7fc" stroke="#d7d1e6" stroke-width="1.5" />
  <text x="590" y="345" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13">Cancel</text>
  <circle cx="520" cy="340" r="14" fill="#6d5bd0" />
  <text x="520" y="345" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">3</text>

  <!-- Delete button (focusable 4) -->
  <rect x="670" y="320" width="120" height="40" rx="8" fill="#e74c3c" />
  <text x="730" y="345" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Delete</text>
  <circle cx="660" cy="340" r="14" fill="#6d5bd0" />
  <text x="660" y="345" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">4</text>

  <!-- Focus cycle arrows -->
  <!-- 1 -> 2 -->
  <path d="M790,132 C790,160 400,250 378,275" fill="none" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow3)" />
  <!-- 2 -> 3 -->
  <path d="M590,303 C560,310 540,318 528,330" fill="none" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow3)" />
  <!-- 3 -> 4 -->
  <line x1="645" y1="340" x2="653" y2="340" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow3)" />
  <!-- 4 -> 1 (wrap around) -->
  <path d="M800,340 C830,340 840,240 840,140 C840,96 820,90 798,96" fill="none" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow3)" />
  <text x="848" y="220" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" font-weight="600" transform="rotate(90, 848, 220)">Tab wraps</text>

  <!-- Escape key indicator -->
  <rect x="380" y="385" width="420" height="50" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" />
  <text x="410" y="407" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Escape Key Behavior:</text>
  <text x="410" y="425" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Closes modal and returns focus to the element that opened it</text>

  <!-- Legend -->
  <rect x="380" y="448" width="420" height="25" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1" />
  <circle cx="400" cy="460" r="8" fill="#6d5bd0" />
  <text x="400" y="464" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="8" font-weight="700">N</text>
  <text x="415" y="464" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Focus order within trap</text>
  <line x1="550" y1="460" x2="575" y2="460" stroke="#e74c3c" stroke-width="2" />
  <line x1="570" y1="454" x2="580" y2="466" stroke="#e74c3c" stroke-width="2.5" />
  <text x="590" y="464" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Focus blocked from background</text>
</svg>