<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Tab order and focus flow through interactive elements">
  <rect width="900" height="500" rx="16" fill="#f3f1f8" />

  <text x="450" y="38" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Tab Order &amp; Focus Flow</text>
  <text x="450" y="60" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">How Tab moves through interactive elements in DOM order</text>

  <!-- Page wireframe -->
  <rect x="80" y="80" width="740" height="390" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />

  <!-- Header bar -->
  <rect x="80" y="80" width="740" height="50" rx="12" fill="#6d5bd0" />
  <rect x="80" y="114" width="740" height="16" fill="#6d5bd0" />
  <text x="130" y="112" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Header Navigation</text>

  <!-- Skip link (element 1) -->
  <rect x="110" y="90" width="100" height="28" rx="6" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <text x="160" y="109" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Skip to Main</text>
  <circle cx="100" cy="104" r="14" fill="#6d5bd0" />
  <text x="100" y="109" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">1</text>

  <!-- Nav links -->
  <rect x="440" y="90" width="60" height="28" rx="6" fill="none" stroke="#ffffff" stroke-width="1.5" />
  <text x="470" y="109" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">Home</text>
  <circle cx="430" cy="104" r="14" fill="#ffffff" />
  <text x="430" y="109" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="700">2</text>

  <rect x="520" y="90" width="60" height="28" rx="6" fill="none" stroke="#ffffff" stroke-width="1.5" />
  <text x="550" y="109" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">About</text>
  <circle cx="510" cy="104" r="14" fill="#ffffff" />
  <text x="510" y="109" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="700">3</text>

  <rect x="600" y="90" width="70" height="28" rx="6" fill="none" stroke="#ffffff" stroke-width="1.5" />
  <text x="635" y="109" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11">Contact</text>
  <circle cx="590" cy="104" r="14" fill="#ffffff" />
  <text x="590" y="109" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="700">4</text>

  <!-- Search input (element 5) -->
  <rect x="110" y="155" width="250" height="36" rx="6" fill="#f8f7fc" stroke="#d7d1e6" stroke-width="1.5" />
  <text x="130" y="178" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="12">Search...</text>
  <circle cx="100" cy="173" r="14" fill="#6d5bd0" />
  <text x="100" y="178" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">5</text>

  <!-- Search button (element 6) -->
  <rect x="370" y="155" width="80" height="36" rx="6" fill="#6d5bd0" />
  <text x="410" y="178" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Search</text>
  <circle cx="360" cy="173" r="14" fill="#6d5bd0" stroke="#ffffff" stroke-width="2" />
  <text x="360" y="178" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">6</text>

  <!-- Main content area -->
  <rect x="110" y="210" width="480" height="230" rx="8" fill="#f8f7fc" stroke="#d7d1e6" stroke-width="1" />
  <text x="130" y="235" fill="#1a1822" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Main Content</text>

  <!-- Link in content (element 7) -->
  <text x="130" y="265" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">Read more about </text>
  <text x="252" y="265" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="12" text-decoration="underline">accessibility</text>
  <circle cx="243" cy="260" r="14" fill="#6d5bd0" />
  <text x="243" y="265" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">7</text>

  <!-- Form fields -->
  <text x="130" y="305" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Email</text>
  <rect x="130" y="312" width="200" height="32" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <circle cx="120" cy="328" r="14" fill="#6d5bd0" />
  <text x="120" y="333" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">8</text>

  <text x="350" y="305" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="500">Message</text>
  <rect x="350" y="312" width="200" height="32" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <circle cx="340" cy="328" r="14" fill="#6d5bd0" />
  <text x="340" y="333" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">9</text>

  <!-- Submit button (element 10) -->
  <rect x="130" y="360" width="100" height="36" rx="6" fill="#6d5bd0" />
  <text x="180" y="383" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="600">Submit</text>
  <circle cx="120" cy="378" r="14" fill="#6d5bd0" stroke="#ffffff" stroke-width="2" />
  <text x="120" y="383" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">10</text>

  <!-- Sidebar -->
  <rect x="610" y="155" width="190" height="285" rx="8" fill="#f8f7fc" stroke="#d7d1e6" stroke-width="1" />
  <text x="630" y="180" fill="#1a1822" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Sidebar</text>

  <rect x="630" y="195" width="150" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1" />
  <text x="705" y="215" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" text-decoration="underline">Sidebar Link 1</text>
  <circle cx="620" cy="210" r="14" fill="#6d5bd0" />
  <text x="620" y="215" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">11</text>

  <rect x="630" y="235" width="150" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1" />
  <text x="705" y="255" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" text-decoration="underline">Sidebar Link 2</text>
  <circle cx="620" cy="250" r="14" fill="#6d5bd0" />
  <text x="620" y="255" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700">12</text>

  <!-- Arrows showing flow -->
  <defs>
    <marker id="arrow1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6d5bd0" />
    </marker>
  </defs>

  <!-- Flow arrow 1->2 -->
  <path d="M215,104 C300,90 380,90 425,104" fill="none" stroke="#6d5bd0" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow1)" />

  <!-- Legend -->
  <rect x="110" y="450" width="680" height="30" rx="6" fill="#ffffff" stroke="#d7d1e6" stroke-width="1" />
  <circle cx="140" cy="465" r="10" fill="#6d5bd0" />
  <text x="140" y="469" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" font-weight="700">N</text>
  <text x="160" y="469" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">= Tab stop order (follows DOM source order)</text>
  <text x="450" y="469" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Tab key moves focus forward | Shift+Tab moves backward</text>
</svg>