<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Accessibility Tree vs DOM Tree comparison">
  <rect width="900" height="500" rx="16" fill="#f3f1f8" />

  <text x="450" y="38" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Accessibility Tree vs DOM Tree</text>

  <!-- Left column: DOM Tree -->
  <rect x="30" y="60" width="400" height="420" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <rect x="30" y="60" width="400" height="40" rx="12" fill="#6d5bd0" />
  <rect x="30" y="84" width="400" height="16" fill="#6d5bd0" />
  <text x="230" y="86" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">DOM Tree (All Elements)</text>

  <!-- DOM nodes -->
  <rect x="150" y="114" width="160" height="28" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1" />
  <text x="230" y="133" text-anchor="middle" fill="#1a1822" font-family="monospace" font-size="12">&lt;html&gt;</text>

  <line x1="230" y1="142" x2="140" y2="162" stroke="#d7d1e6" stroke-width="1.5" />
  <line x1="230" y1="142" x2="320" y2="162" stroke="#d7d1e6" stroke-width="1.5" />

  <rect x="60" y="162" width="160" height="28" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1" />
  <text x="140" y="181" text-anchor="middle" fill="#1a1822" font-family="monospace" font-size="12">&lt;head&gt;</text>

  <rect x="240" y="162" width="160" height="28" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1" />
  <text x="320" y="181" text-anchor="middle" fill="#1a1822" font-family="monospace" font-size="12">&lt;body&gt;</text>

  <!-- head children -->
  <line x1="140" y1="190" x2="100" y2="210" stroke="#d7d1e6" stroke-width="1.5" />
  <line x1="140" y1="190" x2="180" y2="210" stroke="#d7d1e6" stroke-width="1.5" />

  <rect x="45" y="210" width="110" height="26" rx="6" fill="#e8e4f0" stroke="#d7d1e6" stroke-width="1" />
  <text x="100" y="228" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">&lt;title&gt;</text>
  <rect x="125" y="210" width="110" height="26" rx="6" fill="#e8e4f0" stroke="#d7d1e6" stroke-width="1" />
  <text x="180" y="228" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">&lt;style&gt;</text>

  <!-- body children -->
  <line x1="320" y1="190" x2="270" y2="210" stroke="#d7d1e6" stroke-width="1.5" />
  <line x1="320" y1="190" x2="370" y2="210" stroke="#d7d1e6" stroke-width="1.5" />

  <rect x="240" y="210" width="60" height="26" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1" />
  <text x="270" y="228" text-anchor="middle" fill="#1a1822" font-family="monospace" font-size="10">&lt;nav&gt;</text>
  <rect x="340" y="210" width="70" height="26" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1" />
  <text x="375" y="228" text-anchor="middle" fill="#1a1822" font-family="monospace" font-size="10">&lt;main&gt;</text>

  <!-- nav children -->
  <line x1="270" y1="236" x2="270" y2="256" stroke="#d7d1e6" stroke-width="1.5" />
  <rect x="240" y="256" width="60" height="26" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1" />
  <text x="270" y="274" text-anchor="middle" fill="#1a1822" font-family="monospace" font-size="10">&lt;a&gt;</text>

  <!-- main children -->
  <line x1="375" y1="236" x2="340" y2="256" stroke="#d7d1e6" stroke-width="1.5" />
  <line x1="375" y1="236" x2="400" y2="256" stroke="#d7d1e6" stroke-width="1.5" />

  <rect x="308" y="256" width="60" height="26" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1" />
  <text x="338" y="274" text-anchor="middle" fill="#1a1822" font-family="monospace" font-size="10">&lt;h1&gt;</text>
  <rect x="374" y="256" width="55" height="26" rx="6" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1" />
  <text x="401" y="274" text-anchor="middle" fill="#1a1822" font-family="monospace" font-size="10">&lt;p&gt;</text>

  <!-- Hidden elements -->
  <line x1="375" y1="282" x2="340" y2="302" stroke="#d7d1e6" stroke-width="1.5" />
  <line x1="375" y1="282" x2="400" y2="302" stroke="#d7d1e6" stroke-width="1.5" />

  <rect x="295" y="302" width="90" height="26" rx="6" fill="#fde8e8" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4 2" />
  <text x="340" y="320" text-anchor="middle" fill="#e74c3c" font-family="monospace" font-size="10">&lt;div hidden&gt;</text>
  <rect x="368" y="302" width="70" height="26" rx="6" fill="#fde8e8" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4 2" />
  <text x="403" y="320" text-anchor="middle" fill="#e74c3c" font-family="monospace" font-size="10">&lt;span&gt;</text>
  <text x="403" y="336" text-anchor="middle" fill="#e74c3c" font-family="system-ui, sans-serif" font-size="9">aria-hidden</text>

  <!-- Legend DOM side -->
  <rect x="50" y="370" width="14" height="14" rx="3" fill="#6d5bd0" opacity="0.15" stroke="#6d5bd0" stroke-width="1" />
  <text x="72" y="382" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Exposed to AX tree</text>
  <rect x="50" y="392" width="14" height="14" rx="3" fill="#e8e4f0" stroke="#d7d1e6" stroke-width="1" />
  <text x="72" y="404" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Not exposed (metadata)</text>
  <rect x="50" y="414" width="14" height="14" rx="3" fill="#fde8e8" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4 2" />
  <text x="72" y="426" fill="#e74c3c" font-family="system-ui, sans-serif" font-size="11">Hidden from AX tree</text>

  <!-- Right column: Accessibility Tree -->
  <rect x="470" y="60" width="400" height="420" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <rect x="470" y="60" width="400" height="40" rx="12" fill="#2ecc71" />
  <rect x="470" y="84" width="400" height="16" fill="#2ecc71" />
  <text x="670" y="86" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Accessibility Tree (Exposed)</text>

  <!-- AX Root -->
  <rect x="590" y="118" width="160" height="32" rx="8" fill="#2ecc71" opacity="0.15" stroke="#2ecc71" stroke-width="1.5" />
  <text x="670" y="139" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="600">RootWebArea</text>

  <line x1="670" y1="150" x2="580" y2="176" stroke="#2ecc71" stroke-width="1.5" />
  <line x1="670" y1="150" x2="760" y2="176" stroke="#2ecc71" stroke-width="1.5" />

  <!-- Navigation -->
  <rect x="500" y="176" width="160" height="32" rx="8" fill="#2ecc71" opacity="0.15" stroke="#2ecc71" stroke-width="1.5" />
  <text x="580" y="192" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">navigation</text>
  <text x="580" y="204" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">role: navigation</text>

  <!-- Main -->
  <rect x="680" y="176" width="160" height="32" rx="8" fill="#2ecc71" opacity="0.15" stroke="#2ecc71" stroke-width="1.5" />
  <text x="760" y="192" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">main</text>
  <text x="760" y="204" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">role: main</text>

  <!-- Link under nav -->
  <line x1="580" y1="208" x2="580" y2="230" stroke="#2ecc71" stroke-width="1.5" />
  <rect x="500" y="230" width="160" height="40" rx="8" fill="#2ecc71" opacity="0.15" stroke="#2ecc71" stroke-width="1.5" />
  <text x="580" y="248" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">link &quot;Home&quot;</text>
  <text x="580" y="264" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">role: link, name: Home</text>

  <!-- Main children -->
  <line x1="760" y1="208" x2="720" y2="230" stroke="#2ecc71" stroke-width="1.5" />
  <line x1="760" y1="208" x2="800" y2="230" stroke="#2ecc71" stroke-width="1.5" />

  <rect x="640" y="230" width="160" height="40" rx="8" fill="#2ecc71" opacity="0.15" stroke="#2ecc71" stroke-width="1.5" />
  <text x="720" y="248" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">heading &quot;Title&quot;</text>
  <text x="720" y="264" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">role: heading, level: 1</text>

  <rect x="735" y="230" width="120" height="40" rx="8" fill="#2ecc71" opacity="0.15" stroke="#2ecc71" stroke-width="1.5" />
  <text x="795" y="248" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">paragraph</text>
  <text x="795" y="264" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">role: paragraph</text>

  <!-- Key differences callout -->
  <rect x="490" y="300" width="360" height="160" rx="10" fill="#f0fdf4" stroke="#2ecc71" stroke-width="1.5" />
  <text x="510" y="324" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Key Differences:</text>

  <circle cx="510" cy="348" r="4" fill="#2ecc71" />
  <text x="522" y="352" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">&lt;head&gt;, &lt;style&gt; are excluded</text>

  <circle cx="510" cy="372" r="4" fill="#2ecc71" />
  <text x="522" y="376" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Semantic elements map to roles</text>

  <circle cx="510" cy="396" r="4" fill="#2ecc71" />
  <text x="522" y="400" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">aria-hidden elements are pruned</text>

  <circle cx="510" cy="420" r="4" fill="#2ecc71" />
  <text x="522" y="424" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Each node has: role, name, state, value</text>

  <circle cx="510" cy="444" r="4" fill="#2ecc71" />
  <text x="522" y="448" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">display:none elements are excluded</text>
</svg>