<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Modal focus trap cycle showing Tab and Shift+Tab navigation through focusable elements inside a modal dialog">
  <rect width="900" height="500" rx="16" fill="#f3f1f8" />

  <!-- Title -->
  <text x="450" y="38" fill="#1a1822" font-family="system-ui, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Modal Focus Trap Cycle</text>
  <text x="450" y="60" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Focus cycles through focusable elements inside the modal, never escaping to the background</text>

  <!-- Modal container -->
  <rect x="150" y="90" width="600" height="370" rx="14" fill="#ffffff" stroke="#6d5bd0" stroke-width="2.5" />
  <rect x="150" y="90" width="600" height="48" rx="14" fill="#6d5bd0" />
  <rect x="150" y="118" width="600" height="20" fill="#6d5bd0" />
  <text x="450" y="122" fill="#ffffff" font-family="system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Modal Dialog</text>
  <text x="450" y="162" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" font-style="italic">role=&amp;quot;dialog&amp;quot; aria-modal=&amp;quot;true&amp;quot;</text>

  <!-- Close Button (Element 1) -->
  <rect x="260" y="185" width="160" height="50" rx="10" fill="#6d5bd0" stroke="#1a1822" stroke-width="1.5" />
  <text x="340" y="215" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Close Button</text>
  <text x="340" y="252" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" font-weight="600">1st focusable</text>

  <!-- Form Field (Element 2) -->
  <rect x="490" y="185" width="160" height="50" rx="10" fill="#6d5bd0" stroke="#1a1822" stroke-width="1.5" />
  <text x="570" y="215" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Form Field</text>
  <text x="570" y="252" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" font-weight="600">2nd focusable</text>

  <!-- Submit Button (Element 3) -->
  <rect x="375" y="290" width="160" height="50" rx="10" fill="#6d5bd0" stroke="#1a1822" stroke-width="1.5" />
  <text x="455" y="320" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Submit Button</text>
  <text x="455" y="357" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" font-weight="600">3rd (last) focusable</text>

  <!-- Tab arrows (clockwise cycle) -->
  <!-- Close -> Form Field -->
  <line x1="420" y1="200" x2="488" y2="200" stroke="#1a1822" stroke-width="2" marker-end="url(#arrowTab)" />
  <text x="454" y="193" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Tab</text>

  <!-- Form Field -> Submit -->
  <line x1="570" y1="237" x2="537" y2="290" stroke="#1a1822" stroke-width="2" marker-end="url(#arrowTab)" />
  <text x="568" y="268" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Tab</text>

  <!-- Submit -> Close (wrap around - curved) -->
  <path d="M 375,315 C 200,315 200,210 258,210" fill="none" stroke="#6d5bd0" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowWrap)" />
  <text x="215" y="268" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Tab</text>
  <text x="215" y="283" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">(wraps around)</text>

  <!-- Shift+Tab arrows (counter-clockwise) -->
  <!-- Form Field -> Close -->
  <line x1="488" y1="225" x2="420" y2="225" stroke="#1a1822" stroke-width="2" marker-end="url(#arrowTab)" />
  <text x="454" y="244" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Shift+Tab</text>

  <!-- Submit -> Form Field -->
  <line x1="520" y1="290" x2="580" y2="237" stroke="#1a1822" stroke-width="2" marker-end="url(#arrowTab)" />
  <text x="575" y="288" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Shift+Tab</text>

  <!-- Close -> Submit (wrap around - curved) -->
  <path d="M 340,237 C 340,400 455,400 455,342" fill="none" stroke="#6d5bd0" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowWrap)" />
  <text x="365" y="395" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Shift+Tab</text>
  <text x="365" y="410" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">(wraps around)</text>

  <!-- Legend -->
  <rect x="200" y="440" width="500" height="36" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1" />
  <line x1="225" y1="458" x2="265" y2="458" stroke="#1a1822" stroke-width="2" />
  <text x="275" y="462" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Normal Tab flow</text>
  <line x1="400" y1="458" x2="440" y2="458" stroke="#6d5bd0" stroke-width="2.5" stroke-dasharray="6,3" />
  <text x="450" y="462" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Wrap-around (focus trap)</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowTab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a1822" />
    </marker>
    <marker id="arrowWrap" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0" />
    </marker>
  </defs>
</svg>