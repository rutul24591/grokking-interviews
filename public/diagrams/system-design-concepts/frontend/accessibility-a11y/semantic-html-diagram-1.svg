<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-label="Semantic HTML vs Div Soup comparison">
  <rect width="900" height="520" rx="16" fill="#f3f1f8" />

  <text x="450" y="38" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Semantic HTML vs Div Soup</text>

  <!-- Left column: Div Soup -->
  <rect x="30" y="56" width="410" height="440" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <rect x="30" y="56" width="410" height="40" rx="12" fill="#e74c3c" />
  <rect x="30" y="80" width="410" height="16" fill="#e74c3c" />
  <text x="235" y="82" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Div Soup (Non-Semantic)</text>

  <text x="50" y="120" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;div class=&amp;quot;header&amp;quot;&amp;gt;</text>
  <text x="70" y="138" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;div class=&amp;quot;nav&amp;quot;&amp;gt;</text>
  <text x="90" y="156" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;div class=&amp;quot;nav-item&amp;quot;&amp;gt;Home&amp;lt;/div&amp;gt;</text>
  <text x="90" y="174" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;div class=&amp;quot;nav-item&amp;quot;&amp;gt;About&amp;lt;/div&amp;gt;</text>
  <text x="70" y="192" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;/div&amp;gt;</text>
  <text x="50" y="210" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;/div&amp;gt;</text>
  <text x="50" y="234" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;div class=&amp;quot;content&amp;quot;&amp;gt;</text>
  <text x="70" y="252" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;div class=&amp;quot;title&amp;quot;&amp;gt;Article&amp;lt;/div&amp;gt;</text>
  <text x="70" y="270" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;div class=&amp;quot;text&amp;quot;&amp;gt;Body...&amp;lt;/div&amp;gt;</text>
  <text x="50" y="288" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;/div&amp;gt;</text>
  <text x="50" y="312" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;div class=&amp;quot;sidebar&amp;quot;&amp;gt;</text>
  <text x="70" y="330" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;div class=&amp;quot;widget&amp;quot;&amp;gt;...&amp;lt;/div&amp;gt;</text>
  <text x="50" y="348" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;/div&amp;gt;</text>
  <text x="50" y="372" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;div class=&amp;quot;footer&amp;quot;&amp;gt;</text>
  <text x="70" y="390" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;div class=&amp;quot;copy&amp;quot;&amp;gt;&amp;copy; 2026&amp;lt;/div&amp;gt;</text>
  <text x="50" y="408" fill="#64748b" font-family="monospace" font-size="11">&amp;lt;/div&amp;gt;</text>

  <!-- Problems list -->
  <text x="50" y="438" fill="#e74c3c" font-family="system-ui, sans-serif" font-size="11" font-weight="600">No landmarks for screen readers</text>
  <text x="50" y="456" fill="#e74c3c" font-family="system-ui, sans-serif" font-size="11" font-weight="600">No document outline generated</text>
  <text x="50" y="474" fill="#e74c3c" font-family="system-ui, sans-serif" font-size="11" font-weight="600">No implicit ARIA roles</text>

  <!-- Right column: Semantic -->
  <rect x="460" y="56" width="410" height="440" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <rect x="460" y="56" width="410" height="40" rx="12" fill="#6d5bd0" />
  <rect x="460" y="80" width="410" height="16" fill="#6d5bd0" />
  <text x="665" y="82" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="14" font-weight="700">Semantic HTML</text>

  <text x="480" y="120" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;header&amp;gt;</text>
  <text x="500" y="138" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;nav aria-label=&amp;quot;Main&amp;quot;&amp;gt;</text>
  <text x="520" y="156" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;a href=&amp;quot;/&amp;quot;&amp;gt;Home&amp;lt;/a&amp;gt;</text>
  <text x="520" y="174" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;a href=&amp;quot;/about&amp;quot;&amp;gt;About&amp;lt;/a&amp;gt;</text>
  <text x="500" y="192" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;/nav&amp;gt;</text>
  <text x="480" y="210" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;/header&amp;gt;</text>
  <text x="480" y="234" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;main&amp;gt;</text>
  <text x="500" y="252" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;article&amp;gt;</text>
  <text x="520" y="270" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;h1&amp;gt;Article Title&amp;lt;/h1&amp;gt;</text>
  <text x="520" y="288" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;p&amp;gt;Body text...&amp;lt;/p&amp;gt;</text>
  <text x="500" y="306" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;/article&amp;gt;</text>
  <text x="480" y="324" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;/main&amp;gt;</text>
  <text x="480" y="348" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;aside aria-label=&amp;quot;Sidebar&amp;quot;&amp;gt;</text>
  <text x="500" y="366" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;section&amp;gt;...&amp;lt;/section&amp;gt;</text>
  <text x="480" y="384" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;/aside&amp;gt;</text>
  <text x="480" y="408" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;footer&amp;gt;</text>
  <text x="500" y="426" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;small&amp;gt;&amp;copy; 2026&amp;lt;/small&amp;gt;</text>
  <text x="480" y="444" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;/footer&amp;gt;</text>

  <!-- Benefits list -->
  <text x="480" y="472" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Screen readers navigate by landmarks</text>
  <text x="480" y="488" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Clear document outline from headings</text>
</svg>