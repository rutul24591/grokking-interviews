<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">Accessible Color Palette Generation Pipeline</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#6d5bd0">From brand colors to a fully accessible, WCAG-compliant palette</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- Step 1: Base Colors -->
  <rect x="30" y="80" width="180" height="160" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="80" width="180" height="32" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="100" width="180" height="12" fill="#6d5bd0"/>
  <text x="120" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">1. Base Colors</text>

  <rect x="50" y="124" width="30" height="30" rx="4" fill="#2563eb"/>
  <text x="65" y="168" text-anchor="middle" font-size="9" fill="#1a1822">#2563EB</text>
  <rect x="90" y="124" width="30" height="30" rx="4" fill="#dc2626"/>
  <text x="105" y="168" text-anchor="middle" font-size="9" fill="#1a1822">#DC2626</text>
  <rect x="130" y="124" width="30" height="30" rx="4" fill="#16a34a"/>
  <text x="145" y="168" text-anchor="middle" font-size="9" fill="#1a1822">#16A34A</text>
  <rect x="170" y="124" width="30" height="30" rx="4" fill="#9333ea"/>
  <text x="185" y="168" text-anchor="middle" font-size="9" fill="#1a1822">#9333EA</text>

  <text x="120" y="195" text-anchor="middle" font-size="10" fill="#1a1822">Brand / Design tokens</text>
  <text x="120" y="210" text-anchor="middle" font-size="10" fill="#1a1822">from design team</text>
  <text x="120" y="228" text-anchor="middle" font-size="10" font-style="italic" fill="#6d5bd0">Input palette</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="160" x2="245" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- Step 2: Contrast Check -->
  <rect x="250" y="80" width="180" height="160" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="250" y="80" width="180" height="32" rx="10" fill="#6d5bd0"/>
  <rect x="250" y="100" width="180" height="12" fill="#6d5bd0"/>
  <text x="340" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">2. Contrast Check</text>

  <text x="270" y="130" font-size="11" fill="#1a1822">On White (#FFF):</text>
  <rect x="270" y="136" width="50" height="18" rx="3" fill="#2563eb"/>
  <text x="330" y="150" font-size="10" font-weight="bold" fill="#22c55e">4.6:1 &#x2713;</text>
  <rect x="270" y="158" width="50" height="18" rx="3" fill="#dc2626"/>
  <text x="330" y="172" font-size="10" font-weight="bold" fill="#22c55e">4.6:1 &#x2713;</text>
  <rect x="270" y="180" width="50" height="18" rx="3" fill="#16a34a"/>
  <text x="330" y="194" font-size="10" font-weight="bold" fill="#ef4444">3.2:1 &#x2717;</text>
  <rect x="270" y="202" width="50" height="18" rx="3" fill="#9333ea"/>
  <text x="330" y="216" font-size="10" font-weight="bold" fill="#22c55e">5.6:1 &#x2713;</text>

  <text x="340" y="235" text-anchor="middle" font-size="10" font-style="italic" fill="#6d5bd0">WCAG 2.2 formula</text>

  <!-- Arrow 2 -->
  <line x1="430" y1="160" x2="465" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- Step 3: Adjustment -->
  <rect x="470" y="80" width="180" height="160" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="470" y="80" width="180" height="32" rx="10" fill="#6d5bd0"/>
  <rect x="470" y="100" width="180" height="12" fill="#6d5bd0"/>
  <text x="560" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">3. Adjust Failures</text>

  <text x="490" y="130" font-size="11" fill="#1a1822">Green fails &#x2192; darken:</text>

  <rect x="490" y="140" width="30" height="20" rx="3" fill="#16a34a"/>
  <text x="530" y="155" font-size="11" fill="#1a1822">&#x2192;</text>
  <rect x="550" y="140" width="30" height="20" rx="3" fill="#15803d"/>
  <text x="590" y="155" font-size="11" fill="#1a1822">&#x2192;</text>
  <rect x="610" y="140" width="30" height="20" rx="3" fill="#166534"/>

  <text x="490" y="180" font-size="10" fill="#1a1822">#16A34A</text>
  <text x="550" y="180" font-size="10" fill="#1a1822">#15803D</text>
  <text x="610" y="180" font-size="10" font-weight="bold" fill="#22c55e">#166534</text>

  <text x="560" y="200" text-anchor="middle" font-size="10" fill="#1a1822">Ratio: 3.2 &#x2192; 4.1 &#x2192; 5.1</text>

  <text x="560" y="225" text-anchor="middle" font-size="10" fill="#1a1822">Strategies: darken, shift hue,</text>
  <text x="560" y="235" text-anchor="middle" font-size="10" fill="#1a1822">adjust saturation</text>

  <!-- Arrow 3 -->
  <line x1="650" y1="160" x2="685" y2="160" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- Step 4: Final Palette -->
  <rect x="690" y="80" width="180" height="160" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="2.5"/>
  <rect x="690" y="80" width="180" height="32" rx="10" fill="#22c55e"/>
  <rect x="690" y="100" width="180" height="12" fill="#22c55e"/>
  <text x="780" y="101" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">4. Final Palette</text>

  <rect x="710" y="124" width="30" height="30" rx="4" fill="#2563eb" stroke="#22c55e" stroke-width="2"/>
  <text x="725" y="168" text-anchor="middle" font-size="9" fill="#22c55e">PASS</text>
  <rect x="750" y="124" width="30" height="30" rx="4" fill="#dc2626" stroke="#22c55e" stroke-width="2"/>
  <text x="765" y="168" text-anchor="middle" font-size="9" fill="#22c55e">PASS</text>
  <rect x="790" y="124" width="30" height="30" rx="4" fill="#166534" stroke="#22c55e" stroke-width="2"/>
  <text x="805" y="168" text-anchor="middle" font-size="9" fill="#22c55e">PASS</text>
  <rect x="830" y="124" width="30" height="30" rx="4" fill="#9333ea" stroke="#22c55e" stroke-width="2"/>
  <text x="845" y="168" text-anchor="middle" font-size="9" fill="#22c55e">PASS</text>

  <text x="780" y="195" text-anchor="middle" font-size="10" fill="#1a1822">All colors meet</text>
  <text x="780" y="210" text-anchor="middle" font-size="10" font-weight="bold" fill="#22c55e">WCAG AA 4.5:1</text>
  <text x="780" y="228" text-anchor="middle" font-size="10" font-style="italic" fill="#6d5bd0">Deploy-ready</text>

  <!-- Contrast Matrix Section -->
  <rect x="30" y="265" width="840" height="215" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5"/>
  <text x="450" y="290" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1822">Contrast Matrix: Final Palette vs Background Colors</text>

  <!-- Matrix headers -->
  <text x="200" y="318" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">Foreground</text>
  <text x="380" y="318" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">On White (#FFF)</text>
  <text x="540" y="318" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">On Light Gray (#F5F5F5)</text>
  <text x="720" y="318" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1822">On Dark (#1A1822)</text>

  <!-- Separator -->
  <line x1="60" y1="326" x2="840" y2="326" stroke="#d7d1e6" stroke-width="1"/>

  <!-- Row: Blue -->
  <rect x="80" y="334" width="20" height="20" rx="3" fill="#2563eb"/>
  <text x="200" y="349" text-anchor="middle" font-size="11" fill="#1a1822">Blue #2563EB</text>
  <rect x="340" y="334" width="80" height="22" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="380" y="349" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">4.6:1 AA</text>
  <rect x="500" y="334" width="80" height="22" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="540" y="349" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">4.3:1 AA*</text>
  <rect x="680" y="334" width="80" height="22" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="720" y="349" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">4.1:1 AA*</text>

  <!-- Row: Red -->
  <rect x="80" y="364" width="20" height="20" rx="3" fill="#dc2626"/>
  <text x="200" y="379" text-anchor="middle" font-size="11" fill="#1a1822">Red #DC2626</text>
  <rect x="340" y="364" width="80" height="22" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="380" y="379" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">4.6:1 AA</text>
  <rect x="500" y="364" width="80" height="22" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="540" y="379" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">4.3:1 AA*</text>
  <rect x="680" y="364" width="80" height="22" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="720" y="379" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">4.0:1 AA*</text>

  <!-- Row: Green -->
  <rect x="80" y="394" width="20" height="20" rx="3" fill="#166534"/>
  <text x="200" y="409" text-anchor="middle" font-size="11" fill="#1a1822">Green #166534</text>
  <rect x="340" y="394" width="80" height="22" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="380" y="409" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">5.1:1 AA</text>
  <rect x="500" y="394" width="80" height="22" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="540" y="409" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">4.8:1 AA</text>
  <rect x="680" y="394" width="80" height="22" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="720" y="409" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">3.7:1 AA*</text>

  <!-- Row: Purple -->
  <rect x="80" y="424" width="20" height="20" rx="3" fill="#9333ea"/>
  <text x="200" y="439" text-anchor="middle" font-size="11" fill="#1a1822">Purple #9333EA</text>
  <rect x="340" y="424" width="80" height="22" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="380" y="439" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">5.6:1 AA</text>
  <rect x="500" y="424" width="80" height="22" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="540" y="439" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">5.3:1 AA</text>
  <rect x="680" y="424" width="80" height="22" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="720" y="439" text-anchor="middle" font-size="11" font-weight="bold" fill="#22c55e">3.4:1 AA*</text>

  <!-- Footer note -->
  <text x="450" y="470" text-anchor="middle" font-size="10" fill="#6d5bd0">* AA for large text only (&#x2265;18pt or &#x2265;14pt bold). For normal text AA, target &#x2265;4.5:1.</text>
  <text x="450" y="486" text-anchor="middle" font-size="10" fill="#1a1822">Always test both light and dark mode backgrounds. Generate shade scales (50-950) for each base color.</text>
</svg>