<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Skip link navigation flow showing Tab key revealing skip link and focus jumping to main content">
  <rect width="900" height="500" rx="16" fill="#f3f1f8" />

  <text x="450" y="36" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Skip Link Navigation Flow</text>

  <!-- Step 1: Page loads, skip link hidden -->
  <rect x="30" y="56" width="260" height="410" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <rect x="30" y="56" width="260" height="36" rx="12" fill="#6d5bd0" />
  <rect x="30" y="78" width="260" height="14" fill="#6d5bd0" />
  <text x="160" y="80" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Step 1: Page Loads</text>

  <!-- Browser chrome -->
  <rect x="46" y="102" width="228" height="20" rx="4" fill="#e8e5f0" stroke="#d7d1e6" stroke-width="1" />
  <text x="160" y="116" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">https://example.com</text>

  <!-- Header/Nav area -->
  <rect x="46" y="130" width="228" height="60" rx="4" fill="#e8e5f0" stroke="#d7d1e6" stroke-width="1" />
  <text x="160" y="150" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Navigation Bar</text>
  <text x="70" y="175" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">Home</text>
  <text x="110" y="175" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">About</text>
  <text x="155" y="175" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">Products</text>
  <text x="210" y="175" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">Contact</text>

  <!-- Main content -->
  <rect x="46" y="198" width="228" height="130" rx="4" fill="#f8f7fc" stroke="#d7d1e6" stroke-width="1" />
  <text x="160" y="220" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Main Content</text>
  <rect x="60" y="232" width="200" height="8" rx="2" fill="#d7d1e6" />
  <rect x="60" y="248" width="180" height="8" rx="2" fill="#d7d1e6" />
  <rect x="60" y="264" width="190" height="8" rx="2" fill="#d7d1e6" />
  <rect x="60" y="280" width="160" height="8" rx="2" fill="#d7d1e6" />
  <rect x="60" y="296" width="200" height="8" rx="2" fill="#d7d1e6" />

  <!-- Skip link is off-screen (indicated) -->
  <text x="160" y="358" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10" font-style="italic">Skip link is positioned</text>
  <text x="160" y="373" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10" font-style="italic">off-screen (hidden)</text>

  <!-- Dashed box indicating off-screen skip link -->
  <rect x="56" y="390" width="208" height="24" rx="4" fill="none" stroke="#6d5bd0" stroke-width="1" stroke-dasharray="4 3" />
  <text x="160" y="406" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="9" font-style="italic">top: -9999px (off-screen)</text>

  <!-- Arrow 1 to 2 -->
  <line x1="300" y1="260" x2="320" y2="260" stroke="#6d5bd0" stroke-width="2" />
  <polygon points="320,254 332,260 320,266" fill="#6d5bd0" />
  <text x="316" y="248" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Tab</text>

  <!-- Step 2: Tab pressed, skip link visible -->
  <rect x="340" y="56" width="260" height="410" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <rect x="340" y="56" width="260" height="36" rx="12" fill="#6d5bd0" />
  <rect x="340" y="78" width="260" height="14" fill="#6d5bd0" />
  <text x="470" y="80" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Step 2: Tab Pressed</text>

  <!-- Browser chrome -->
  <rect x="356" y="102" width="228" height="20" rx="4" fill="#e8e5f0" stroke="#d7d1e6" stroke-width="1" />
  <text x="470" y="116" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">https://example.com</text>

  <!-- Skip link visible at top -->
  <rect x="356" y="130" width="228" height="30" rx="6" fill="#6d5bd0" stroke="#4a3fa0" stroke-width="2" />
  <text x="470" y="150" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Skip to main content</text>

  <!-- Focus ring indicator -->
  <rect x="352" y="126" width="236" height="38" rx="8" fill="none" stroke="#fbbf24" stroke-width="3" stroke-dasharray="6 3" />
  <text x="470" y="182" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Focus ring visible</text>

  <!-- Header/Nav area -->
  <rect x="356" y="194" width="228" height="60" rx="4" fill="#e8e5f0" stroke="#d7d1e6" stroke-width="1" />
  <text x="470" y="214" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Navigation Bar</text>
  <text x="380" y="239" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">Home</text>
  <text x="420" y="239" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">About</text>
  <text x="465" y="239" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">Products</text>
  <text x="520" y="239" fill="#64748b" font-family="system-ui, sans-serif" font-size="9">Contact</text>

  <!-- Main content -->
  <rect x="356" y="262" width="228" height="130" rx="4" fill="#f8f7fc" stroke="#d7d1e6" stroke-width="1" />
  <text x="470" y="284" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Main Content</text>
  <rect x="370" y="296" width="200" height="8" rx="2" fill="#d7d1e6" />
  <rect x="370" y="312" width="180" height="8" rx="2" fill="#d7d1e6" />
  <rect x="370" y="328" width="190" height="8" rx="2" fill="#d7d1e6" />
  <rect x="370" y="344" width="160" height="8" rx="2" fill="#d7d1e6" />
  <rect x="370" y="360" width="200" height="8" rx="2" fill="#d7d1e6" />

  <text x="470" y="420" text-anchor="middle" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10" font-weight="600">User sees skip link</text>
  <text x="470" y="436" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">and presses Enter</text>

  <!-- Arrow 2 to 3 -->
  <line x1="610" y1="260" x2="630" y2="260" stroke="#6d5bd0" stroke-width="2" />
  <polygon points="630,254 642,260 630,266" fill="#6d5bd0" />
  <text x="626" y="248" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Enter</text>

  <!-- Step 3: Focus jumps to main content -->
  <rect x="650" y="56" width="230" height="410" rx="12" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <rect x="650" y="56" width="230" height="36" rx="12" fill="#6d5bd0" />
  <rect x="650" y="78" width="230" height="14" fill="#6d5bd0" />
  <text x="765" y="80" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700">Step 3: Focus Jumps</text>

  <!-- Browser chrome -->
  <rect x="666" y="102" width="198" height="20" rx="4" fill="#e8e5f0" stroke="#d7d1e6" stroke-width="1" />
  <text x="765" y="116" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">example.com#main</text>

  <!-- Header/Nav area (dimmed) -->
  <rect x="666" y="130" width="198" height="50" rx="4" fill="#e8e5f0" stroke="#d7d1e6" stroke-width="1" opacity="0.5" />
  <text x="765" y="150" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="11">Navigation Bar</text>
  <text x="765" y="168" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="9" font-style="italic">SKIPPED</text>

  <!-- Curved arrow showing skip -->
  <path d="M 680 140 C 660 140, 656 200, 666 210" stroke="#6d5bd0" stroke-width="2" fill="none" stroke-dasharray="5 3" />
  <polygon points="663,206 670,216 672,204" fill="#6d5bd0" />

  <!-- Main content with focus -->
  <rect x="666" y="190" width="198" height="150" rx="4" fill="#f0edf9" stroke="#6d5bd0" stroke-width="2.5" />
  <rect x="662" y="186" width="206" height="158" rx="6" fill="none" stroke="#fbbf24" stroke-width="3" stroke-dasharray="6 3" />
  <text x="765" y="216" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Main Content</text>
  <text x="765" y="234" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10">Focus lands here</text>
  <rect x="680" y="248" width="170" height="8" rx="2" fill="#b8aee6" />
  <rect x="680" y="264" width="150" height="8" rx="2" fill="#b8aee6" />
  <rect x="680" y="280" width="160" height="8" rx="2" fill="#b8aee6" />
  <rect x="680" y="296" width="140" height="8" rx="2" fill="#b8aee6" />
  <rect x="680" y="312" width="170" height="8" rx="2" fill="#b8aee6" />

  <!-- ID target indicator -->
  <text x="765" y="370" text-anchor="middle" fill="#1a1822" font-family="monospace" font-size="10">&amp;lt;main id=&amp;quot;main-content&amp;quot;</text>
  <text x="765" y="386" text-anchor="middle" fill="#1a1822" font-family="monospace" font-size="10">tabindex=&amp;quot;-1&amp;quot;&amp;gt;</text>

  <text x="765" y="416" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Keyboard user can now</text>
  <text x="765" y="432" text-anchor="middle" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Tab through content</text>

  <!-- Bottom legend -->
  <rect x="30" y="472" width="14" height="14" rx="3" fill="#fbbf24" />
  <text x="50" y="484" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Focus ring</text>
  <rect x="130" y="472" width="14" height="14" rx="3" fill="#6d5bd0" />
  <text x="150" y="484" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Skip link / Active element</text>
  <line x1="330" y1="479" x2="360" y2="479" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="5 3" />
  <text x="368" y="484" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10">Focus jump path</text>
</svg>