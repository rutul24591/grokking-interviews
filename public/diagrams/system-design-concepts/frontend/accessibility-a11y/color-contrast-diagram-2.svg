<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">Color Blindness Simulation: Same UI Under Different Types</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#6d5bd0">~8% of men and ~0.5% of women are affected by some form of color vision deficiency</text>

  <!-- Normal Vision -->
  <rect x="30" y="75" width="195" height="200" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="30" y="75" width="195" height="34" rx="10" fill="#6d5bd0"/>
  <rect x="30" y="95" width="195" height="14" fill="#6d5bd0"/>
  <text x="128" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Normal Vision</text>

  <!-- Normal swatches -->
  <rect x="48" y="120" width="36" height="36" rx="6" fill="#ef4444"/>
  <text x="66" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Red</text>
  <rect x="96" y="120" width="36" height="36" rx="6" fill="#22c55e"/>
  <text x="114" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Green</text>
  <rect x="144" y="120" width="36" height="36" rx="6" fill="#3b82f6"/>
  <text x="162" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Blue</text>

  <!-- Normal UI sample -->
  <rect x="48" y="182" width="160" height="30" rx="6" fill="#ef4444"/>
  <text x="128" y="202" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Error: Invalid input</text>
  <rect x="48" y="220" width="160" height="30" rx="6" fill="#22c55e"/>
  <text x="128" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Success: Saved!</text>

  <!-- Protanopia -->
  <rect x="245" y="75" width="195" height="200" rx="10" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
  <rect x="245" y="75" width="195" height="34" rx="10" fill="#b45309"/>
  <rect x="245" y="95" width="195" height="14" fill="#b45309"/>
  <text x="343" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Protanopia (~1.3%)</text>

  <!-- Protanopia swatches (red-blind: reds become dark olive/brown) -->
  <rect x="263" y="120" width="36" height="36" rx="6" fill="#8b7e3c"/>
  <text x="281" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Red?</text>
  <rect x="311" y="120" width="36" height="36" rx="6" fill="#a8a443"/>
  <text x="329" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Green?</text>
  <rect x="359" y="120" width="36" height="36" rx="6" fill="#3b78d6"/>
  <text x="377" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Blue</text>

  <!-- Protanopia UI -->
  <rect x="263" y="182" width="160" height="30" rx="6" fill="#8b7e3c"/>
  <text x="343" y="202" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Error: Invalid input</text>
  <rect x="263" y="220" width="160" height="30" rx="6" fill="#a8a443"/>
  <text x="343" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Success: Saved!</text>

  <!-- Deuteranopia -->
  <rect x="460" y="75" width="195" height="200" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
  <rect x="460" y="75" width="195" height="34" rx="10" fill="#d97706"/>
  <rect x="460" y="95" width="195" height="14" fill="#d97706"/>
  <text x="558" y="98" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffffff">Deuteranopia (~1.2%)</text>

  <!-- Deuteranopia swatches (green-blind: greens become brownish) -->
  <rect x="478" y="120" width="36" height="36" rx="6" fill="#b89430"/>
  <text x="496" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Red?</text>
  <rect x="526" y="120" width="36" height="36" rx="6" fill="#bba03a"/>
  <text x="544" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Green?</text>
  <rect x="574" y="120" width="36" height="36" rx="6" fill="#4475cc"/>
  <text x="592" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Blue</text>

  <!-- Deuteranopia UI -->
  <rect x="478" y="182" width="160" height="30" rx="6" fill="#b89430"/>
  <text x="558" y="202" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Error: Invalid input</text>
  <rect x="478" y="220" width="160" height="30" rx="6" fill="#bba03a"/>
  <text x="558" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Success: Saved!</text>

  <!-- Tritanopia -->
  <rect x="675" y="75" width="195" height="200" rx="10" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
  <rect x="675" y="75" width="195" height="34" rx="10" fill="#7c3aed"/>
  <rect x="675" y="95" width="195" height="14" fill="#7c3aed"/>
  <text x="773" y="98" text-anchor="middle" font-size="13" font-weight="bold" fill="#ffffff">Tritanopia (~0.01%)</text>

  <!-- Tritanopia swatches (blue-blind: blues become greenish) -->
  <rect x="693" y="120" width="36" height="36" rx="6" fill="#e84a5e"/>
  <text x="711" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Red</text>
  <rect x="741" y="120" width="36" height="36" rx="6" fill="#1db8a0"/>
  <text x="759" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Green</text>
  <rect x="789" y="120" width="36" height="36" rx="6" fill="#1dafa0"/>
  <text x="807" y="170" text-anchor="middle" font-size="9" fill="#1a1822">Blue?</text>

  <!-- Tritanopia UI -->
  <rect x="693" y="182" width="160" height="30" rx="6" fill="#e84a5e"/>
  <text x="773" y="202" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Error: Invalid input</text>
  <rect x="693" y="220" width="160" height="30" rx="6" fill="#1db8a0"/>
  <text x="773" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">Success: Saved!</text>

  <!-- Problem callout -->
  <rect x="30" y="290" width="840" height="55" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <text x="50" y="310" font-size="14" font-weight="bold" fill="#ef4444">Problem:</text>
  <text x="120" y="310" font-size="13" fill="#1a1822">Red/Green error/success states look nearly identical to protanopia and deuteranopia users.</text>
  <text x="50" y="332" font-size="13" fill="#1a1822">Never rely on color alone to convey meaning. Use icons, patterns, labels, and shape as secondary indicators.</text>

  <!-- Solution section -->
  <rect x="30" y="360" width="840" height="120" rx="10" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="50" y="385" font-size="14" font-weight="bold" fill="#22c55e">Solution: Multi-cue Design</text>

  <!-- Solution error example -->
  <rect x="50" y="400" width="240" height="34" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="76" y="422" font-size="18" fill="#ef4444">&#x26A0;</text>
  <text x="100" y="422" font-size="12" font-weight="bold" fill="#ef4444">Error: Invalid input</text>
  <line x1="100" y1="430" x2="270" y2="430" stroke="#ef4444" stroke-width="2"/>

  <!-- Solution success example -->
  <rect x="50" y="442" width="240" height="34" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="76" y="464" font-size="18" fill="#22c55e">&#x2713;</text>
  <text x="100" y="464" font-size="12" font-weight="bold" fill="#22c55e">Success: Saved!</text>

  <!-- Annotations for solution -->
  <text x="320" y="418" font-size="11" fill="#1a1822">&#x2190; Icon + Color + Border + Background tint</text>
  <text x="320" y="438" font-size="11" fill="#1a1822">&#x2190; Underline as additional visual cue</text>
  <text x="320" y="462" font-size="11" fill="#1a1822">&#x2190; Checkmark icon distinguishes from error even without color</text>

  <!-- Types legend -->
  <text x="560" y="400" font-size="11" font-weight="bold" fill="#1a1822">CVD Types:</text>
  <rect x="560" y="410" width="12" height="12" rx="2" fill="#b45309"/>
  <text x="578" y="421" font-size="10" fill="#1a1822">Protanopia (no red cones)</text>
  <rect x="560" y="428" width="12" height="12" rx="2" fill="#d97706"/>
  <text x="578" y="439" font-size="10" fill="#1a1822">Deuteranopia (no green cones)</text>
  <rect x="560" y="446" width="12" height="12" rx="2" fill="#7c3aed"/>
  <text x="578" y="457" font-size="10" fill="#1a1822">Tritanopia (no blue cones)</text>
  <rect x="560" y="464" width="12" height="12" rx="2" fill="#6b7280"/>
  <text x="578" y="475" font-size="10" fill="#1a1822">Achromatopsia (no color, ~0.003%)</text>
</svg>