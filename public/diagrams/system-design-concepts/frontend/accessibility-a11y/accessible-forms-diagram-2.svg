<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="Error Announcement Flow showing the sequence from user submission to validation failure to aria-live announcement and focus management">
  <rect width="900" height="500" rx="16" fill="#f3f1f8" />

  <!-- Title -->
  <text x="450" y="36" fill="#1a1822" font-family="system-ui, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Error Announcement Flow</text>
  <text x="450" y="58" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">How form validation errors reach assistive technology users</text>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0" />
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d7d1e6" />
    </marker>
  </defs>

  <!-- Step 1: User Submits -->
  <rect x="30" y="90" width="150" height="90" rx="12" fill="#6d5bd0" />
  <text x="105" y="118" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">STEP 1</text>
  <text x="105" y="138" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">User Submits</text>
  <text x="105" y="158" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.85">Click button or</text>
  <text x="105" y="170" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.85">press Enter</text>

  <!-- Arrow 1->2 -->
  <line x1="180" y1="135" x2="210" y2="135" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 2: Validation Runs -->
  <rect x="215" y="90" width="150" height="90" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <text x="290" y="115" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">STEP 2</text>
  <text x="290" y="135" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Validation Runs</text>
  <text x="290" y="155" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Client-side checks</text>
  <text x="290" y="167" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">e.preventDefault()</text>

  <!-- Arrow 2->3 -->
  <line x1="365" y1="135" x2="395" y2="135" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 3: Errors Collected -->
  <rect x="400" y="90" width="150" height="90" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <text x="475" y="115" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">STEP 3</text>
  <text x="475" y="135" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Errors Collected</text>
  <text x="475" y="155" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">Build error object</text>
  <text x="475" y="167" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">{ field: message }</text>

  <!-- Arrow 3->4 -->
  <line x1="550" y1="135" x2="580" y2="135" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 4: Error Summary Rendered -->
  <rect x="585" y="90" width="150" height="90" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <text x="660" y="115" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">STEP 4</text>
  <text x="660" y="135" fill="#1a1822" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Error Summary</text>
  <text x="660" y="155" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">role=&amp;quot;alert&amp;quot; div</text>
  <text x="660" y="167" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle">lists all errors</text>

  <!-- Arrow 4->5 -->
  <line x1="735" y1="135" x2="765" y2="135" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Step 5: Focus Moved -->
  <rect x="770" y="90" width="110" height="90" rx="12" fill="#6d5bd0" />
  <text x="825" y="118" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">STEP 5</text>
  <text x="825" y="138" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Focus Moves</text>
  <text x="825" y="158" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.85">To error summary</text>
  <text x="825" y="170" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" text-anchor="middle" opacity="0.85">or first error</text>

  <!-- Parallel Track: aria-live announcement -->
  <rect x="30" y="215" width="850" height="75" rx="12" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="6,3" />
  <text x="60" y="243" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="12" font-weight="700">Screen Reader Pipeline:</text>
  <text x="60" y="270" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">Error summary uses <tspan font-family="monospace" fill="#6d5bd0">role=&amp;quot;alert&amp;quot;</tspan> or <tspan font-family="monospace" fill="#6d5bd0">aria-live=&amp;quot;assertive&amp;quot;</tspan> &amp;rarr; Browser sends accessibility event &amp;rarr; Screen reader interrupts and reads errors</text>

  <!-- Detailed breakdown: Error Summary Structure -->
  <text x="450" y="325" fill="#1a1822" font-family="system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle">Error Summary DOM Structure</text>

  <!-- Error summary box -->
  <rect x="80" y="345" width="340" height="140" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <rect x="80" y="345" width="340" height="32" rx="10" fill="#6d5bd0" />
  <rect x="80" y="362" width="340" height="15" fill="#6d5bd0" />
  <text x="250" y="368" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Error Summary (role=&amp;quot;alert&amp;quot;)</text>

  <text x="100" y="400" fill="#1a1822" font-family="monospace" font-size="11">&amp;lt;h2&amp;gt;2 errors found&amp;lt;/h2&amp;gt;</text>
  <text x="100" y="420" fill="#6d5bd0" font-family="monospace" font-size="11">&amp;lt;a href=&amp;quot;#email&amp;quot;&amp;gt;Enter email&amp;lt;/a&amp;gt;</text>
  <text x="100" y="440" fill="#6d5bd0" font-family="monospace" font-size="11">&amp;lt;a href=&amp;quot;#pwd&amp;quot;&amp;gt;Enter password&amp;lt;/a&amp;gt;</text>
  <text x="100" y="460" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10" font-style="italic">Links jump to each field</text>

  <!-- Arrow from summary to field errors -->
  <line x1="420" y1="415" x2="470" y2="415" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)" />

  <!-- Field-level error box -->
  <rect x="480" y="345" width="380" height="140" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <rect x="480" y="345" width="380" height="32" rx="10" fill="#6d5bd0" />
  <rect x="480" y="362" width="380" height="15" fill="#6d5bd0" />
  <text x="670" y="368" fill="#ffffff" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Field-Level Inline Errors</text>

  <text x="500" y="400" fill="#1a1822" font-family="monospace" font-size="10">&amp;lt;input id=&amp;quot;email&amp;quot; aria-invalid=&amp;quot;true&amp;quot;</text>
  <text x="516" y="416" fill="#1a1822" font-family="monospace" font-size="10">aria-describedby=&amp;quot;email-err&amp;quot; /&amp;gt;</text>
  <text x="500" y="436" fill="#6d5bd0" font-family="monospace" font-size="10">&amp;lt;span id=&amp;quot;email-err&amp;quot; role=&amp;quot;alert&amp;quot;&amp;gt;</text>
  <text x="516" y="452" fill="#6d5bd0" font-family="monospace" font-size="10">Please enter a valid email</text>
  <text x="500" y="468" fill="#6d5bd0" font-family="monospace" font-size="10">&amp;lt;/span&amp;gt;</text>
</svg>