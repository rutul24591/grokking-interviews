<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-label="ARIA states and properties decision tree for choosing the right ARIA attributes">
  <rect width="900" height="500" rx="16" fill="#f3f1f8" />

  <!-- Title -->
  <text x="450" y="35" fill="#1a1822" font-family="system-ui, sans-serif" font-size="22" font-weight="700" text-anchor="middle">ARIA States &amp; Properties Decision Tree</text>
  <text x="450" y="55" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle">Flowchart for selecting the correct ARIA attribute for your use case</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6d5bd0" />
    </marker>
  </defs>

  <!-- Start node -->
  <rect x="340" y="70" width="220" height="40" rx="20" fill="#6d5bd0" />
  <text x="450" y="95" fill="#ffffff" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Does a native HTML element exist?</text>

  <!-- Yes arrow left -->
  <line x1="400" y1="110" x2="400" y2="140" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)" />
  <text x="380" y="132" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Yes</text>

  <!-- Use native box -->
  <rect x="310" y="145" width="180" height="35" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <text x="400" y="168" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Use native HTML instead!</text>

  <!-- No arrow right -->
  <line x1="560" y1="90" x2="620" y2="90" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)" />
  <text x="580" y="84" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">No</text>

  <!-- Does it need a label? -->
  <rect x="625" y="70" width="220" height="40" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <text x="735" y="95" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Does it need a label?</text>

  <!-- Yes arrow down from label -->
  <line x1="695" y1="110" x2="695" y2="145" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)" />
  <text x="678" y="132" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Yes</text>

  <!-- Label decision -->
  <rect x="615" y="150" width="160" height="35" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <text x="695" y="172" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Is there visible label text?</text>

  <!-- Visible label: yes -->
  <line x1="660" y1="185" x2="610" y2="215" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="620" y="200" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Yes</text>
  <rect x="520" y="218" width="140" height="30" rx="6" fill="#6d5bd0" />
  <text x="590" y="238" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">aria-labelledby</text>

  <!-- Visible label: no -->
  <line x1="730" y1="185" x2="780" y2="215" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="765" y="200" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10" font-weight="600">No</text>
  <rect x="720" y="218" width="120" height="30" rx="6" fill="#6d5bd0" />
  <text x="780" y="238" fill="#ffffff" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">aria-label</text>

  <!-- No arrow right from label -->
  <line x1="845" y1="90" x2="870" y2="90" stroke="#6d5bd0" stroke-width="1.5" />
  <line x1="870" y1="90" x2="870" y2="275" stroke="#6d5bd0" stroke-width="1.5" />
  <line x1="870" y1="275" x2="510" y2="275" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="854" y="84" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10" font-weight="600">No</text>

  <!-- Second row: State question -->
  <rect x="300" y="260" width="210" height="40" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <text x="405" y="285" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Does it have toggle state?</text>

  <!-- Yes arrow down -->
  <line x1="350" y1="300" x2="350" y2="325" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)" />
  <text x="334" y="317" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Yes</text>

  <!-- Toggle state options -->
  <rect x="240" y="330" width="220" height="75" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <text x="350" y="350" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Choose based on pattern:</text>
  <rect x="252" y="358" width="95" height="22" rx="4" fill="#6d5bd0" />
  <text x="300" y="374" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">aria-expanded</text>
  <rect x="354" y="358" width="95" height="22" rx="4" fill="#6d5bd0" />
  <text x="402" y="374" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">aria-pressed</text>
  <rect x="252" y="384" width="95" height="16" rx="4" fill="#d7d1e6" />
  <text x="300" y="395" fill="#1a1822" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">disclosure</text>
  <rect x="354" y="384" width="95" height="16" rx="4" fill="#d7d1e6" />
  <text x="402" y="395" fill="#1a1822" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">toggle button</text>

  <!-- No arrow right -->
  <line x1="510" y1="280" x2="550" y2="280" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)" />
  <text x="522" y="274" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">No</text>

  <!-- Dynamic content question -->
  <rect x="555" y="260" width="220" height="40" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2" />
  <text x="665" y="285" fill="#1a1822" font-family="system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Does content update live?</text>

  <!-- Yes arrow down -->
  <line x1="620" y1="300" x2="620" y2="325" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrow)" />
  <text x="604" y="317" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Yes</text>

  <!-- Live region options -->
  <rect x="520" y="330" width="200" height="75" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <text x="620" y="350" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Choose urgency level:</text>
  <rect x="532" y="358" width="82" height="22" rx="4" fill="#6d5bd0" />
  <text x="573" y="374" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">polite</text>
  <rect x="622" y="358" width="86" height="22" rx="4" fill="#6d5bd0" />
  <text x="665" y="374" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">assertive</text>
  <rect x="532" y="384" width="82" height="16" rx="4" fill="#d7d1e6" />
  <text x="573" y="395" fill="#1a1822" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">non-critical</text>
  <rect x="622" y="384" width="86" height="16" rx="4" fill="#d7d1e6" />
  <text x="665" y="395" fill="#1a1822" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">urgent</text>

  <!-- No arrow right from dynamic -->
  <line x1="775" y1="280" x2="810" y2="280" stroke="#6d5bd0" stroke-width="1.5" />
  <line x1="810" y1="280" x2="810" y2="335" stroke="#6d5bd0" stroke-width="1.5" marker-end="url(#arrow)" />
  <text x="794" y="274" fill="#1a1822" font-family="system-ui, sans-serif" font-size="10" font-weight="600">No</text>

  <!-- Visibility / description -->
  <rect x="745" y="340" width="130" height="65" rx="8" fill="#ffffff" stroke="#d7d1e6" stroke-width="1.5" />
  <text x="810" y="358" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Other attributes:</text>
  <rect x="754" y="366" width="112" height="18" rx="4" fill="#6d5bd0" />
  <text x="810" y="380" fill="#ffffff" font-family="system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">aria-describedby</text>
  <rect x="754" y="388" width="112" height="14" rx="4" fill="#d7d1e6" />
  <text x="810" y="398" fill="#1a1822" font-family="system-ui, sans-serif" font-size="9" text-anchor="middle">aria-hidden</text>

  <!-- Bottom legend -->
  <rect x="50" y="435" width="800" height="50" rx="10" fill="#ffffff" stroke="#d7d1e6" stroke-width="1" />
  <text x="70" y="458" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11" font-weight="700">First Rule of ARIA:</text>
  <text x="195" y="458" fill="#1a1822" font-family="system-ui, sans-serif" font-size="11">If you can use a native HTML element or attribute with the semantics and behavior you require, do so.</text>
  <text x="70" y="476" fill="#6d5bd0" font-family="system-ui, sans-serif" font-size="11">Only add ARIA when native HTML cannot convey the semantics your component needs.</text>
</svg>