<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Mobile-First CSS Architecture</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Base styles target mobile, min-width media queries progressively enhance for larger screens</text>
  
  <!-- CSS Loading Comparison -->
  <rect x="30" y="100" width="400" height="200" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="230" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#b91c1c">Desktop-First (Inefficient)</text>
  
  <rect x="50" y="155" width="360" height="130" rx="6" fill="#ffffff" stroke="#fecaca"/>
  
  <!-- Desktop-first CSS loading -->
  <text x="65" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Mobile device loads:</text>
  <rect x="65" y="195" width="330" height="25" rx="3" fill="#fee2e2" stroke="#ef4444"/>
  <text x="80" y="212" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b91c1c">Base CSS (desktop styles) - 50KB</text>
  
  <rect x="65" y="225" width="330" height="25" rx="3" fill="#fee2e2" stroke="#ef4444"/>
  <text x="80" y="242" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b91c1c">Media Query (max-width: 768px) - 20KB</text>
  
  <text x="65" y="265" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#dc2626">Total: 70KB (mobile overrides desktop!)</text>
  
  <!-- Mobile-First CSS Loading -->
  <rect x="470" y="100" width="400" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#15803d">Mobile-First (Efficient)</text>
  
  <rect x="490" y="155" width="360" height="130" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  
  <!-- Mobile-first CSS loading -->
  <text x="505" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Mobile device loads:</text>
  <rect x="505" y="195" width="330" height="25" rx="3" fill="#dcfce7" stroke="#22c55e"/>
  <text x="520" y="212" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#15803d">Base CSS (mobile styles) - 30KB</text>
  
  <text x="505" y="235" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#647480">Media queries (min-width) not matched — not applied</text>
  
  <text x="505" y="265" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#15803d">Total: 30KB (57% savings!)</text>
  
  <!-- CSS Code Comparison -->
  <rect x="30" y="320" width="420" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="240" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Desktop-First CSS (max-width)</text>
  
  <rect x="50" y="375" width="380" height="75" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="65" y="400" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">/* Base = desktop */</text>
  <text x="65" y="415" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">.container {'{'} width: 1200px; {'}'}</text>
  <text x="65" y="430" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">@media (max-width: 768px) {'{'}</text>
  <text x="80" y="445" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#dc2626">.container {'{'} width: 100%; {'}'}</text>
  
  <!-- Mobile-First Code -->
  <rect x="470" y="320" width="400" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Mobile-First CSS (min-width)</text>
  
  <rect x="490" y="375" width="360" height="75" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  <text x="505" y="400" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">/* Base = mobile */</text>
  <text x="505" y="415" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">.container {'{'} width: 100%; {'}'}</text>
  <text x="505" y="430" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">@media (min-width: 768px) {'{'}</text>
  <text x="520" y="445" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#15803d">.container {'{'} width: 720px; {'}'}</text>
  
  <!-- Key Benefit -->
  <rect x="30" y="480" width="840" height="50" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Mobile-first: Mobile devices load only mobile CSS. Desktop-first: Mobile loads desktop CSS then overrides it (wasteful).</text>
</svg>
