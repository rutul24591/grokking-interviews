<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Responsive Design Breakpoints</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Same HTML structure adapts via CSS across mobile, tablet, and desktop</text>
  
  <!-- Mobile View -->
  <rect x="50" y="100" width="240" height="380" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="170" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Mobile (320px)</text>
  
  <!-- Mobile layout -->
  <rect x="70" y="150" width="200" height="50" rx="4" fill="#dbeafe" stroke="#0284c7"/>
  <text x="170" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Header</text>
  
  <rect x="70" y="210" width="200" height="80" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="170" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Main Content</text>
  <text x="170" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">(1 column)</text>
  
  <rect x="70" y="300" width="200" height="50" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="170" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#166534">Sidebar</text>
  
  <rect x="70" y="360" width="200" height="50" rx="4" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="170" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b21a8">Footer</text>
  
  <text x="170" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">@media (max-width: 599px)</text>
  
  <!-- Tablet View -->
  <rect x="330" y="100" width="240" height="380" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Tablet (768px)</text>
  
  <!-- Tablet layout -->
  <rect x="350" y="150" width="200" height="50" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Header</text>
  
  <rect x="350" y="210" width="135" height="140" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="418" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Main</text>
  <text x="418" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">(2 columns)</text>
  
  <rect x="495" y="210" width="55" height="140" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="523" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#166534">Sidebar</text>
  
  <rect x="350" y="360" width="200" height="50" rx="4" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="450" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b21a8">Footer</text>
  
  <text x="450" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">@media (min-width: 600px)</text>
  
  <!-- Desktop View -->
  <rect x="610" y="100" width="240" height="380" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="730" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Desktop (1024px+)</text>
  
  <!-- Desktop layout -->
  <rect x="630" y="150" width="200" height="50" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="730" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Header</text>
  
  <rect x="630" y="210" width="90" height="140" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="675" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Main</text>
  <text x="675" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">(3 columns)</text>
  
  <rect x="730" y="210" width="65" height="140" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="763" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Content</text>
  
  <rect x="805" y="210" width="25" height="140" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="818" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Sidebar</text>
  
  <rect x="630" y="360" width="200" height="50" rx="4" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="730" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b21a8">Footer</text>
  
  <text x="730" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">@media (min-width: 1024px)</text>
  
  <!-- Arrows showing progression -->
  <path d="M 290 290 L 320 290" stroke="#647480" stroke-width="2" marker-end="url(#arrow-gray)" fill="none"/>
  <path d="M 570 290 L 600 290" stroke="#647480" stroke-width="2" marker-end="url(#arrow-gray)" fill="none"/>
  
  <!-- Key Concept -->
  <rect x="50" y="520" width="800" height="20" rx="4" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="535" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Same HTML structure, different CSS layout via media queries — content reflows based on available space</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
