<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Mobile Network Types Comparison</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">2G, 3G, 4G, 5G speed and latency comparisons</text>
  
  <!-- 2G -->
  <rect x="30" y="100" width="200" height="200" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="130" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">2G (EDGE)</text>
  
  <rect x="50" y="155" width="160" height="130" rx="6" fill="#ffffff" stroke="#fecaca"/>
  <text x="65" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#b91c1c">Speed: ~0.1 Mbps</text>
  <text x="65" y="205" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#b91c1c">Latency: 500-1000ms</text>
  <text x="65" y="235" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Basic browsing</text>
  <text x="65" y="255" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Text only</text>
  <text x="65" y="275" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">⚠ Very slow!</text>
  
  <!-- 3G -->
  <rect x="250" y="100" width="200" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="350" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#92400e">3G (HSPA)</text>
  
  <rect x="270" y="155" width="160" height="130" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="285" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#b45309">Speed: ~3 Mbps</text>
  <text x="285" y="205" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#b45309">Latency: 100-500ms</text>
  <text x="285" y="235" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Basic images</text>
  <text x="285" y="255" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Standard web</text>
  <text x="285" y="275" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#f59e0b">~ Optimize for this</text>
  
  <!-- 4G -->
  <rect x="470" y="100" width="200" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="570" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#15803d">4G (LTE)</text>
  
  <rect x="490" y="155" width="160" height="130" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  <text x="505" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#15803d">Speed: ~30 Mbps</text>
  <text x="505" y="205" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#15803d">Latency: 30-50ms</text>
  <text x="505" y="235" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• HD images</text>
  <text x="505" y="255" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• Video streaming</text>
  <text x="505" y="275" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Good experience</text>
  
  <!-- 5G -->
  <rect x="690" y="100" width="180" height="200" rx="8" fill="#dbeafe" stroke="#0284c7" stroke-width="2"/>
  <text x="780" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#0369a1">5G</text>
  
  <rect x="710" y="155" width="140" height="130" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  <text x="725" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#0369a1">Speed: ~300 Mbps</text>
  <text x="725" y="205" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#0369a1">Latency: 1-10ms</text>
  <text x="725" y="235" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• 4K video</text>
  <text x="725" y="255" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">• AR/VR</text>
  <text x="725" y="275" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">✓ Excellent</text>
  
  <!-- Load Time Comparison -->
  <rect x="30" y="320" width="840" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Load Time for 1MB Page</text>
  
  <rect x="50" y="370" width="180" height="60" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="140" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">2G: ~80 seconds</text>
  <text x="140" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">(Users abandon!)</text>
  
  <rect x="240" y="370" width="180" height="60" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="330" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">3G: ~3 seconds</text>
  <text x="330" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">(Target baseline)</text>
  
  <rect x="430" y="370" width="180" height="60" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="520" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">4G: ~0.3 seconds</text>
  <text x="520" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">(Fast!)</text>
  
  <rect x="620" y="370" width="240" height="60" rx="4" fill="#dbeafe" stroke="#0284c7"/>
  <text x="740" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">5G: ~0.03 seconds</text>
  <text x="740" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">(Near instant!)</text>
  
  <!-- Global Coverage -->
  <rect x="30" y="460" width="400" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="230" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">Global Network Distribution (2026)</text>
  <text x="230" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">3G: 45% | 4G: 50% | 5G: 5% | 2G: &lt;1%</text>
  
  <!-- Optimization Target -->
  <rect x="450" y="460" width="420" height="70" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="660" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#15803d">Optimization Target</text>
  <text x="660" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Design for 3G, enhance for 4G/5G. 3G still common globally.</text>
</svg>
