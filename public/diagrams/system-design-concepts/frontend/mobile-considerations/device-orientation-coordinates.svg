<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Device Orientation Coordinates</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Alpha (compass), Beta (front-back tilt), Gamma (left-right tilt)</text>
  
  <!-- Device in 3D Space -->
  <rect x="350" y="120" width="200" height="280" rx="20" fill="#f0f9ff" stroke="#0284c7" stroke-width="3"/>
  <text x="450" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Device</text>
  
  <!-- Alpha (Z-axis rotation) -->
  <path d="M 450 260 L 450 180" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)" fill="none"/>
  <text x="470" y="200" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#b91c1c">Alpha (Z)</text>
  <text x="470" y="220" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">0-360° (compass)</text>
  
  <!-- Circular arrow for alpha -->
  <path d="M 420 150 A 30 30 0 1 1 480 150" stroke="#ef4444" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
  
  <!-- Beta (X-axis rotation) -->
  <path d="M 450 260 L 550 260" stroke="#22c55e" stroke-width="3" marker-end="url(#arrow-green)" fill="none"/>
  <text x="560" y="265" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#15803d">Beta (X)</text>
  <text x="560" y="285" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">-180 to 180° (tilt)</text>
  
  <!-- Gamma (Y-axis rotation) -->
  <path d="M 450 260 L 380 320" stroke="#0284c7" stroke-width="3" marker-end="url(#arrow-blue)" fill="none"/>
  <text x="320" y="340" text-anchor="end" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0369a1">Gamma (Y)</text>
  <text x="320" y="360" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">-90 to 90° (tilt)</text>
  
  <!-- Axis Labels -->
  <text x="450" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">Coordinate System</text>
  
  <rect x="50" y="450" width="260" height="80" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="70" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Alpha (α)</text>
  <text x="70" y="495" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Compass direction</text>
  <text x="70" y="515" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">0° = North, 90° = East</text>
  
  <rect x="320" y="450" width="260" height="80" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="340" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#15803d">Beta (β)</text>
  <text x="340" y="495" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Front-back tilt</text>
  <text x="340" y="515" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">0° = flat, 90° = face up</text>
  
  <rect x="590" y="450" width="260" height="80" rx="6" fill="#dbeafe" stroke="#0284c7"/>
  <text x="610" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#0369a1">Gamma (γ)</text>
  <text x="610" y="495" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Left-right tilt</text>
  <text x="610" y="515" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">0° = flat, 90° = tilted right</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
  </defs>
</svg>
