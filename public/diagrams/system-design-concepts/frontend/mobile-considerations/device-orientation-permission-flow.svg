<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Device Orientation Permission Flow</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">iOS 13+ requires explicit permission request, Android doesn't (yet)</text>
  
  <!-- Start -->
  <rect x="30" y="100" width="180" height="80" rx="40" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="120" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0c4a6e">User Action</text>
  <text x="120" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">(Click button)</text>
  
  <!-- Arrow -->
  <path d="M 210 140 L 260 140" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  
  <!-- Check iOS -->
  <rect x="260" y="100" width="140" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="330" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#92400e">iOS 13+?</text>
  
  <!-- Yes path -->
  <path d="M 330 180 L 330 220" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  <text x="340" y="210" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Yes</text>
  
  <!-- Request Permission -->
  <rect x="260" y="220" width="140" height="80" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="330" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#6b21a8">Request</text>
  <text x="330" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Permission</text>
  
  <!-- Arrow -->
  <path d="M 330 300 L 330 340" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)" fill="none"/>
  
  <!-- Granted? -->
  <rect x="260" y="340" width="140" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="330" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#166534">Granted?</text>
  
  <!-- Granted path -->
  <path d="M 400 380 L 450 380" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" fill="none"/>
  <text x="410" y="372" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Yes</text>
  
  <!-- Start Orientation -->
  <rect x="450" y="340" width="140" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="520" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#15803d">Start</text>
  <text x="520" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Tracking</text>
  
  <!-- Denied path -->
  <path d="M 330 420 L 330 460" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" fill="none"/>
  <text x="340" y="450" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">No</text>
  
  <!-- Show Alternative -->
  <rect x="260" y="460" width="140" height="80" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="330" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#b91c1c">Show</text>
  <text x="330" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Alternative</text>
  
  <!-- No path (Android or old iOS) -->
  <path d="M 400 140 L 450 140" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  <text x="410" y="132" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">No</text>
  
  <!-- Direct start (Android) -->
  <rect x="450" y="100" width="140" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="520" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#15803d">Start</text>
  <text x="520" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Tracking</text>
  <text x="520" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#15803d">(No permission needed)</text>
  
  <!-- Best Practices Box -->
  <rect x="620" y="100" width="250" height="430" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="745" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Best Practices</text>
  
  <rect x="640" y="150" width="210" height="360" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="655" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#475560">✓ Request on user action</text>
  <text x="655" y="205" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Not on page load</text>
  <text x="655" y="235" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#475560">✓ Explain why needed</text>
  <text x="655" y="260" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Before requesting</text>
  <text x="655" y="290" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#475560">✓ Handle denial</text>
  <text x="655" y="315" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Provide alternative</text>
  <text x="655" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#475560">✓ Store permission state</text>
  <text x="655" y="370" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Avoid repeated requests</text>
  <text x="655" y="400" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#475560">✓ Test on iOS</text>
  <text x="655" y="425" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Android doesn't require</text>
  <text x="655" y="450" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">permission (yet)</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
