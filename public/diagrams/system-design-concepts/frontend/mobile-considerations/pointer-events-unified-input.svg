<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Pointer Events: Unified Input API</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Single handler for touch, mouse, and pen input; pointerType distinguishes input type</text>
  
  <!-- Input Types -->
  <rect x="30" y="100" width="180" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="120" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Touch Input</text>
  <text x="120" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Finger on screen</text>
  <text x="120" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Multi-touch support</text>
  <text x="120" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">pointerType: 'touch'</text>
  
  <rect x="240" y="100" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="330" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Mouse Input</text>
  <text x="330" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Mouse click/move</text>
  <text x="330" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Single pointer</text>
  <text x="330" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">pointerType: 'mouse'</text>
  
  <rect x="450" y="100" width="180" height="120" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="540" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Pen Input</text>
  <text x="540" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Stylus/pen</text>
  <text x="540" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Pressure sensitive</text>
  <text x="540" y="210" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">pointerType: 'pen'</text>
  
  <!-- All converge to Pointer Events -->
  <path d="M 120 220 L 120 260 L 450 260" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  <path d="M 330 220 L 330 250 L 450 250" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)" fill="none"/>
  <path d="M 540 220 L 540 260 L 450 260" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  
  <!-- Pointer Events Handler -->
  <rect x="450" y="260" width="200" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="550" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Single Handler</text>
  <text x="550" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">pointerdown</text>
  <text x="550" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">pointermove</text>
  <text x="550" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">pointerup</text>
  
  <!-- Arrow to Code Example -->
  <path d="M 650 310 L 700 310" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)" fill="none"/>
  
  <!-- Code Example -->
  <rect x="700" y="260" width="170" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="785" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e293b">Code</text>
  
  <rect x="715" y="310" width="140" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="725" y="330" text-anchor="start" font-family="monospace, sans-serif" font-size="7" fill="#475560">element.addEventListener(</text>
  <text x="725" y="342" text-anchor="start" font-family="monospace, sans-serif" font-size="7" fill="#475560">  'pointerdown',</text>
  
  <!-- Pointer Type Check -->
  <rect x="700" y="380" width="170" height="80" rx="8" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="785" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#0c4a6e">Check Type</text>
  
  <rect x="715" y="430" width="140" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="725" y="447" text-anchor="start" font-family="monospace, sans-serif" font-size="6" fill="#0369a1">if (e.pointerType ===</text>
  
  <rect x="715" y="458" width="140" height="25" rx="3" fill="#ffffff" stroke="#bae6fd"/>
  <text x="725" y="475" text-anchor="start" font-family="monospace, sans-serif" font-size="6" fill="#0369a1">  'touch') {'{'} ... {'}'}</text>
  
  <!-- Comparison: Touch Events Approach -->
  <rect x="30" y="380" width="400" height="150" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="230" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#b91c1c">Touch Events Approach (More Code)</text>
  
  <rect x="50" y="430" width="360" height="85" rx="6" fill="#ffffff" stroke="#fecaca"/>
  <text x="65" y="455" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b91c1c">// Touch handlers</text>
  <text x="65" y="470" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b91c1c">element.addEventListener('touchstart', ...)</text>
  <text x="65" y="485" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b91c1c">element.addEventListener('touchmove', ...)</text>
  <text x="65" y="500" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b91c1c">// Mouse handlers (duplicate!)</text>
  <text x="65" y="515" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b91c1c">element.addEventListener('mousedown', ...)</text>
  
  <!-- Comparison: Pointer Events Approach -->
  <rect x="450" y="380" width="420" height="150" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="660" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#15803d">Pointer Events Approach (Less Code)</text>
  
  <rect x="465" y="430" width="390" height="85" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  <text x="480" y="455" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#15803d">// Single handler for all input</text>
  <text x="480" y="470" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#15803d">element.addEventListener('pointerdown', (e) => {'{'}</text>
  <text x="495" y="485" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#15803d">if (e.pointerType === 'touch') {'{'} ... {'}'}</text>
  <text x="495" y="500" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#15803d">else if (e.pointerType === 'mouse') {'{'} ... {'}'}</text>
  <text x="480" y="515" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#15803d">{'}'})</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>
