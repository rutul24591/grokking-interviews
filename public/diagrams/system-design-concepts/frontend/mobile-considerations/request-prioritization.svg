<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Request Prioritization</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Critical requests first, non-critical deferred on slow networks</text>
  
  <!-- Critical Requests -->
  <rect x="30" y="100" width="270" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#15803d">Critical (Load First)</text>
  
  <rect x="50" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  
  <rect x="65" y="175" width="200" height="25" rx="3" fill="#dcfce7" stroke="#22c55e"/>
  <text x="80" y="192" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">HTML Document</text>
  
  <rect x="65" y="205" width="200" height="25" rx="3" fill="#dcfce7" stroke="#22c55e"/>
  <text x="80" y="222" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Critical CSS (above-fold)</text>
  
  <rect x="65" y="235" width="200" height="25" rx="3" fill="#dcfce7" stroke="#22c55e"/>
  <text x="80" y="252" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Above-fold images</text>
  
  <text x="165" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Blocks rendering if delayed</text>
  
  <!-- Arrow -->
  <path d="M 300 200 L 350 200" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" fill="none"/>
  
  <!-- Non-Critical Requests -->
  <rect x="350" y="100" width="270" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="485" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Non-Critical (Defer)</text>
  
  <rect x="370" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <rect x="385" y="175" width="200" height="25" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-dasharray="4,4"/>
  <text x="400" y="192" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Below-fold images (lazy)</text>
  
  <rect x="385" y="205" width="200" height="25" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-dasharray="4,4"/>
  <text x="400" y="222" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Analytics scripts</text>
  
  <rect x="385" y="235" width="200" height="25" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-dasharray="4,4"/>
  <text x="400" y="252" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Third-party widgets</text>
  
  <text x="485" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Load after critical, on idle</text>
  
  <!-- Arrow -->
  <path d="M 620 200 L 670 200" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- Network Impact -->
  <rect x="670" y="100" width="200" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="770" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Network Impact</text>
  
  <rect x="690" y="155" width="160" height="130" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  
  <text x="705" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Fast Network (4G/WiFi):</text>
  <text x="705" y="200" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">• Load all in parallel</text>
  <text x="705" y="215" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">• Prioritization less critical</text>
  
  <text x="705" y="245" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Slow Network (3G/2G):</text>
  <text x="705" y="265" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#dc2626">• Strict prioritization needed</text>
  <text x="705" y="280" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#dc2626">• Block non-critical</text>
  
  <!-- Timeline Comparison -->
  <rect x="30" y="320" width="840" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Loading Timeline Comparison</text>
  
  <!-- Without Prioritization -->
  <rect x="50" y="370" width="380" height="60" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="65" y="395" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#b91c1c">Without Prioritization:</text>
  <text x="65" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">All requests compete, critical delayed by non-critical → Slow FCP</text>
  
  <!-- With Prioritization -->
  <rect x="450" y="370" width="380" height="60" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="465" y="395" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#15803d">With Prioritization:</text>
  <text x="465" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Critical first, non-critical deferred → Fast FCP, better UX</text>
  
  <!-- Best Practices -->
  <rect x="30" y="460" width="400" height="70" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="230" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6b21a8">Prioritization Techniques</text>
  <text x="230" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">preload, fetchpriority, requestIdleCallback</text>
  
  <!-- Resource Hints -->
  <rect x="450" y="460" width="420" height="70" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">Resource Hints</text>
  <text x="660" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#92400e">preconnect, prefetch, preload for latency reduction</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
