<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">PWA Architecture</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Service worker proxies network requests, manifest enables home screen install</text>
  
  <!-- User/Device -->
  <rect x="30" y="100" width="140" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="100" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">User</text>
  <text x="100" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Mobile Device</text>
  <text x="100" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Browser</text>
  
  <!-- Arrow to Service Worker -->
  <path d="M 170 160 L 230 160" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  
  <!-- Service Worker -->
  <rect x="230" y="100" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Service Worker</text>
  <text x="320" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Network Proxy</text>
  <text x="320" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Offline Support</text>
  <text x="320" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Push Notifications</text>
  
  <!-- Arrows to Cache and Network -->
  <path d="M 410 140 L 470 120" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)" fill="none"/>
  <path d="M 410 180 L 470 200" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- Cache -->
  <rect x="470" y="100" width="140" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="640" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Cache Storage</text>
  <text x="640" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">App Shell</text>
  <text x="640" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Static Assets</text>
  
  <!-- Network -->
  <rect x="470" y="190" width="140" height="80" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="640" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Network</text>
  <text x="640" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">API / Content</text>
  
  <!-- Arrow back to browser -->
  <path d="M 610 160 L 670 160" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" fill="none"/>
  
  <!-- App -->
  <rect x="670" y="100" width="200" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="770" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#15803d">Web App</text>
  <text x="770" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Instant Load</text>
  <text x="770" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Offline Capable</text>
  
  <!-- Web App Manifest -->
  <rect x="30" y="250" width="400" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="230" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Web App Manifest</text>
  
  <rect x="50" y="300" width="360" height="75" rx="6" fill="#ffffff" stroke="#fde68a"/>
  <text x="65" y="325" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b45309">{`{`}</text>
  <text x="80" y="340" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b45309">"name": "My PWA",</text>
  <text x="80" y="355" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b45309">"display": "standalone",</text>
  <text x="80" y="370" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b45309">"start_url": "/",</text>
  <text x="80" y="385" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b45309">"icons": [...]</text>
  <text x="65" y="400" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b45309">{`}`}</text>
  
  <!-- Add to Home Screen -->
  <rect x="450" y="250" width="420" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="660" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Add to Home Screen</text>
  
  <rect x="465" y="300" width="390" height="75" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  <text x="480" y="325" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Requirements:</text>
  <text x="480" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">✓ Valid manifest</text>
  <text x="600" y="345" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">✓ Service worker</text>
  <text x="480" y="365" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">✓ HTTPS</text>
  <text x="600" y="365" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">✓ User engagement</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
