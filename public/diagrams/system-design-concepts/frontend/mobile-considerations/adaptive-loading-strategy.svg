<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Adaptive Loading Strategy</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Detect network speed, serve appropriate content based on connection</text>
  
  <!-- Network Detection -->
  <rect x="30" y="100" width="200" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="130" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">1. Detect Network</text>
  
  <rect x="50" y="155" width="160" height="70" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="65" y="180" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#0369a1">navigator.connection</text>
  <text x="65" y="195" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#0369a1">.effectiveType</text>
  <text x="65" y="210" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#0369a1">.saveData</text>
  
  <!-- Arrow -->
  <path d="M 230 170 L 280 170" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  
  <!-- Decision -->
  <rect x="280" y="100" width="180" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="370" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">2. Evaluate</text>
  
  <rect x="300" y="155" width="140" height="70" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="315" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Slow network?</text>
  <text x="315" y="197" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Data saver on?</text>
  <text x="315" y="214" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Low battery?</text>
  
  <!-- Arrow to Lite -->
  <path d="M 370 240 L 370 280" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" fill="none"/>
  <text x="380" y="270" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Yes</text>
  
  <!-- Arrow to Full -->
  <path d="M 460 170 L 510 170" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" fill="none"/>
  <text x="470" y="162" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">No</text>
  
  <!-- Lite Version -->
  <rect x="280" y="280" width="180" height="120" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="370" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#b91c1c">Lite Version</text>
  
  <rect x="300" y="335" width="140" height="50" rx="4" fill="#ffffff" stroke="#fecaca"/>
  <text x="315" y="355" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#b91c1c">• Small images</text>
  <text x="315" y="370" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#b91c1c">• Defer non-critical</text>
  
  <!-- Full Version -->
  <rect x="510" y="100" width="180" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#15803d">Full Version</text>
  
  <rect x="530" y="155" width="140" height="50" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="545" y="175" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#15803d">• Full images</text>
  <text x="545" y="190" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#15803d">• All features</text>
  
  <!-- Examples -->
  <rect x="30" y="420" width="400" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="230" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Adaptive Image Loading</text>
  
  <rect x="50" y="470" width="360" height="50" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="65" y="495" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">if (connection.saveData || connection.effectiveType === '2g')</text>
  <text x="65" y="510" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">  img.src = img.dataset.smallSrc;</text>
  
  <!-- Data Savings -->
  <rect x="450" y="420" width="420" height="110" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="660" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#15803d">Data Savings Impact</text>
  
  <rect x="465" y="470" width="390" height="50" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="480" y="495" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">3G + Data Saver: 60-80% data reduction</text>
  <text x="480" y="515" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Load time: 8s → 3s on 3G network</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
