<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Touch Events Lifecycle</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">touchstart → touchmove → touchend event sequence with coordinate tracking</text>
  
  <!-- Touch Event Sequence -->
  <rect x="30" y="100" width="840" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="450" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Touch Event Sequence</text>
  
  <!-- touchstart -->
  <rect x="60" y="155" width="140" height="70" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="130" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#15803d">touchstart</text>
  <text x="130" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Finger touches</text>
  <text x="130" y="220" text-anchor="middle" font-family="monospace, sans-serif" font-size="8" fill="#15803d">(x: 100, y: 200)</text>
  
  <!-- Arrow -->
  <path d="M 200 190 L 240 190" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  
  <!-- touchmove -->
  <rect x="240" y="155" width="140" height="70" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="310" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#b45309">touchmove</text>
  <text x="310" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Finger moves</text>
  <text x="310" y="220" text-anchor="middle" font-family="monospace, sans-serif" font-size="8" fill="#b45309">(multiple events)</text>
  
  <!-- Arrow -->
  <path d="M 380 190 L 420 190" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- touchmove (multiple) -->
  <rect x="420" y="155" width="140" height="70" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="490" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#b45309">touchmove</text>
  <text x="490" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Finger moves</text>
  <text x="490" y="220" text-anchor="middle" font-family="monospace, sans-serif" font-size="8" fill="#b45309">(x: 150, y: 210)</text>
  
  <!-- Arrow -->
  <path d="M 560 190 L 600 190" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- touchend -->
  <rect x="600" y="155" width="140" height="70" rx="6" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="670" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#166534">touchend</text>
  <text x="670" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">Finger lifts</text>
  <text x="670" y="220" text-anchor="middle" font-family="monospace, sans-serif" font-size="8" fill="#166534">(x: 200, y: 220)</text>
  
  <!-- Touch Point Tracking -->
  <rect x="30" y="260" width="400" height="160" rx="8" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="230" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Touch Point Tracking</text>
  
  <rect x="50" y="310" width="360" height="95" rx="6" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="65" y="335" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">event.touches: Array of all current touches</text>
  <text x="65" y="355" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">event.targetTouches: Touches on this element</text>
  <text x="65" y="375" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">event.changedTouches: Touches that changed</text>
  <text x="65" y="395" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">touch.clientX, touch.clientY (viewport coords)</text>
  
  <!-- Multi-Touch Example -->
  <rect x="450" y="260" width="420" height="160" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Multi-Touch (2 fingers)</text>
  
  <rect x="465" y="310" width="390" height="95" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <!-- Two touch points -->
  <circle cx="520" cy="350" r="25" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="520" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Touch 1</text>
  
  <circle cx="720" cy="350" r="25" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="720" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Touch 2</text>
  
  <text x="580" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Distance = 200px</text>
  <text x="580" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Pinch: track distance change</text>
  
  <!-- Event Properties Table -->
  <rect x="30" y="440" width="840" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Touch Event Properties</text>
  
  <rect x="50" y="490" width="800" height="30" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="510" text-anchor="middle" font-family="monospace, sans-serif" font-size="9" fill="#475560">clientX, clientY (viewport) | pageX, pageY (document) | screenX, screenY (screen) | identifier (unique ID)</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
