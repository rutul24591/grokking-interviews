<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">PWA Offline Strategies</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Cache-first for static assets, network-first for dynamic content</text>
  
  <!-- Cache-First Strategy -->
  <rect x="30" y="100" width="270" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Cache-First</text>
  
  <rect x="50" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#bae6fd"/>
  
  <!-- Flow diagram -->
  <rect x="65" y="175" width="100" height="40" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="115" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Request</text>
  
  <path d="M 165 195 L 195 195" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  
  <rect x="195" y="175" width="80" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="235" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Cache</text>
  
  <path d="M 235 215 L 235 245" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  
  <rect x="195" y="245" width="80" height="30" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="235" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#b45309">Network</text>
  
  <text x="165" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Best for: Static assets</text>
  <text x="165" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">(CSS, JS, images)</text>
  
  <!-- Network-First Strategy -->
  <rect x="315" y="100" width="270" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Network-First</text>
  
  <rect x="335" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <!-- Flow diagram -->
  <rect x="350" y="175" width="100" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="400" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Request</text>
  
  <path d="M 450 195 L 480 195" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)" fill="none"/>
  
  <rect x="480" y="175" width="80" height="40" rx="4" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="520" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Network</text>
  
  <path d="M 520 215 L 520 245" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" fill="none"/>
  
  <rect x="480" y="245" width="80" height="30" rx="3" fill="#dcfce7" stroke="#22c55e"/>
  <text x="520" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#15803d">Cache</text>
  
  <text x="450" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Best for: Dynamic content</text>
  <text x="450" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">(API responses)</text>
  
  <!-- Stale-While-Revalidate Strategy -->
  <rect x="600" y="100" width="270" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="735" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Stale-While-Revalidate</text>
  
  <rect x="620" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  
  <!-- Flow diagram -->
  <rect x="635" y="175" width="100" height="40" rx="4" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="685" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Request</text>
  
  <path d="M 735 195 L 765 195" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  
  <rect x="765" y="175" width="80" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="805" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Cache</text>
  
  <path d="M 805 215 L 805 245" stroke="#22c55e" stroke-width="2" fill="none"/>
  
  <rect x="765" y="245" width="80" height="30" rx="3" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="805" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#6b21a8">Update</text>
  
  <text x="735" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Best for: Frequently</text>
  <text x="735" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">updated content</text>
  
  <!-- Strategy Comparison Table -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Strategy Comparison</text>
  
  <!-- Table headers -->
  <rect x="50" y="365" width="180" height="30" rx="4" fill="#e2e8f0"/>
  <text x="140" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Strategy</text>
  <rect x="230" y="365" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <text x="330" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Speed</text>
  <rect x="430" y="365" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <text x="530" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Freshness</text>
  <rect x="630" y="365" width="250" height="30" rx="4" fill="#e2e8f0"/>
  <text x="755" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#1e293b">Use Case</text>
  
  <!-- Row 1: Cache-First -->
  <text x="60" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Cache-First</text>
  <text x="235" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Fastest</text>
  <text x="435" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">May be stale</text>
  <text x="635" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Static assets (CSS, JS, images)</text>
  
  <!-- Row 2: Network-First -->
  <text x="60" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Network-First</text>
  <text x="235" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">Slower (network)</text>
  <text x="435" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Freshest</text>
  <text x="635" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">API responses, dynamic content</text>
  
  <!-- Row 3: Stale-While-Revalidate -->
  <text x="60" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">Stale-While-Revalidate</text>
  <text x="235" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Fast (cache)</text>
  <text x="435" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#f59e0b">Eventually fresh</text>
  <text x="635" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475560">News feeds, frequently updated</text>
  
  <!-- Offline Page -->
  <rect x="30" y="545" width="840" height="25" rx="6" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="562" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Always provide custom offline page — better than browser's default offline dinosaur!</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>
