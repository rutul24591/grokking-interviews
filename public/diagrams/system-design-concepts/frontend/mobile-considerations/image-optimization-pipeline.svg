<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Image Optimization Pipeline</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Responsive images, format conversion, and lazy loading</text>
  
  <!-- Original Image -->
  <rect x="30" y="100" width="140" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="100" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0c4a6e">Original</text>
  <rect x="50" y="165" width="100" height="60" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="100" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">2000×1500</text>
  <text x="100" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">2MB JPEG</text>
  
  <!-- Arrow -->
  <path d="M 170 170 L 210 170" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  
  <!-- Responsive Sizes -->
  <rect x="210" y="100" width="200" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="310" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#92400e">Responsive Sizes</text>
  
  <rect x="230" y="155" width="160" height="75" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="245" y="180" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b45309">400w (mobile)</text>
  <text x="245" y="195" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b45309">800w (tablet)</text>
  <text x="245" y="210" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#b45309">1600w (desktop)</text>
  
  <!-- Arrow -->
  <path d="M 410 170 L 450 170" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- Format Conversion -->
  <rect x="450" y="100" width="200" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="550" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#166534">Format Conversion</text>
  
  <rect x="470" y="155" width="160" height="75" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="485" y="180" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#15803d">WebP (75% smaller)</text>
  <text x="485" y="195" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#15803d">AVIF (50% smaller)</text>
  <text x="485" y="210" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#15803d">JPEG fallback</text>
  
  <!-- Arrow -->
  <path d="M 650 170 L 690 170" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" fill="none"/>
  
  <!-- Lazy Loading -->
  <rect x="690" y="100" width="180" height="140" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="780" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6b21a8">Lazy Loading</text>
  
  <rect x="710" y="155" width="140" height="75" rx="4" fill="#f3e8ff" stroke="#a855f7"/>
  <text x="780" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Load on scroll</text>
  <text x="780" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">IntersectionObserver</text>
  <text x="780" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Placeholder/LQIP</text>
  
  <!-- srcset Example -->
  <rect x="30" y="260" width="400" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="230" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">srcset Implementation</text>
  
  <rect x="50" y="310" width="360" height="75" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="65" y="335" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">&lt;img src="medium.jpg"</text>
  <text x="65" y="350" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">  srcset="small.jpg 400w,</text>
  <text x="65" y="365" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">    medium.jpg 800w,</text>
  <text x="65" y="380" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">    large.jpg 1600w"</text>
  <text x="65" y="395" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#475560">  sizes="(max-width: 600px) 400px, 800px"&gt;</text>
  
  <!-- Performance Impact -->
  <rect x="450" y="260" width="420" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="660" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Performance Impact</text>
  
  <rect x="465" y="310" width="390" height="75" rx="6" fill="#ffffff" stroke="#fde68a"/>
  
  <text x="480" y="335" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Without Optimization:</text>
  <text x="480" y="355" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#dc2626">2MB image → 60 seconds on 3G</text>
  
  <text x="480" y="380" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475560">With Optimization:</text>
  <text x="480" y="400" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">50KB WebP (mobile) → 1.5 seconds on 3G</text>
  <text x="480" y="420" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">97% reduction!</text>
  
  <!-- Best Practices -->
  <rect x="30" y="420" width="840" height="110" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#15803d">Best Practices</text>
  
  <rect x="50" y="470" width="800" height="50" rx="6" fill="#ffffff" stroke="#dcfce7"/>
  <text x="65" y="495" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Always use srcset for responsive images</text>
  <text x="450" y="495" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Use WebP/AVIF with JPEG fallback</text>
  <text x="65" y="515" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Lazy load off-screen images</text>
  <text x="450" y="515" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Compress images (TinyPNG, ImageOptim)</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
