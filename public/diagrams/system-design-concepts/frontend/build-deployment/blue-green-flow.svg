<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Blue-Green Deployment Flow</text>
  <rect x="50" y="80" width="160" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="130" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">Blue Active</text>
  <text x="130" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">v1.0 serving traffic</text>
  <path d="M 210 130 L 260 130" stroke="#647480" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="260" y="80" width="160" height="100" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="340" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0c4a6e">Deploy to Green</text>
  <text x="340" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">v2.0 deployed</text>
  <path d="M 420 130 L 470 130" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="470" y="80" width="160" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="550" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#92400e">Health Checks</text>
  <text x="550" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Tests on v2.0</text>
  <path d="M 630 130 L 680 130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="680" y="80" width="180" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="770" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6b21a8">Switch Traffic</text>
  <text x="770" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Blue -> Green</text>
  <rect x="50" y="200" width="820" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Post-Deployment</text>
  <rect x="70" y="250" width="360" height="50" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="250" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Green is now active (v2.0 serving traffic)</text>
  <rect x="450" y="250" width="380" height="50" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="640" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Blue remains available for instant rollback</text>
  <rect x="50" y="340" width="820" height="100" rx="8" fill="#fee2e2" stroke="#ef4444"/>
  <text x="450" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#b91c1c">Rollback Path (if issues detected)</text>
  <rect x="70" y="390" width="760" height="40" rx="4" fill="#ffffff" stroke="#fecaca"/>
  <text x="450" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">Instant switch back to Blue (v1.0) — no rebuild or redeploy needed</text>
  <rect x="50" y="460" width="820" height="70" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Next Deployment Cycle</text>
  <text x="450" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Deploy v3.0 to Blue (now inactive), test, switch traffic. Blue and green alternate roles on each deployment.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
