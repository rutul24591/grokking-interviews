<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Zero-Downtime CDN Cache Management</text>
  <rect x="50" y="80" width="380" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="240" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Versioned Asset URLs</text>
  <rect x="70" y="130" width="340" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="240" y="152" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#0369a1">/v1/app.abc123.js (v1 assets)</text>
  <rect x="70" y="175" width="340" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="240" y="197" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#0369a1">/v2/app.def456.js (v2 assets)</text>
  <rect x="70" y="220" width="340" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="240" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Old HTML → v1 assets, New HTML → v2 assets</text>
  <rect x="470" y="80" width="380" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="660" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Cache-Control Headers</text>
  <rect x="490" y="130" width="340" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Versioned assets: max-age=31536000</text>
  <rect x="490" y="175" width="340" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="197" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">HTML pages: no-cache</text>
  <rect x="490" y="220" width="340" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="660" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Non-versioned: max-age=86400</text>
  <rect x="50" y="300" width="800" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">User Experience During Deployment</text>
  <rect x="70" y="350" width="360" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="250" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Users with old HTML: continue with v1 assets</text>
  <rect x="470" y="350" width="360" height="50" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="650" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Users with new HTML: receive v2 assets</text>
  <rect x="50" y="440" width="800" height="90" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Key Principle</text>
  <text x="450" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Versioned URLs ensure compatibility — old HTML always gets old assets, new HTML always gets new assets. No cache purge needed.</text>
  <text x="450" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">CDN caches both versions simultaneously, serving the correct version based on the URL requested.</text>
</svg>
