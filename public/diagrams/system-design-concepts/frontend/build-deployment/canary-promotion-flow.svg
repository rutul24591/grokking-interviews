<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Canary Promotion Flow</text>
  <rect x="50" y="80" width="160" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="130" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">Stage 1: 1%</text>
  <text x="130" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">15 minutes</text>
  <path d="M 210 120 L 260 120" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="260" y="80" width="160" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="340" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">Stage 2: 5%</text>
  <text x="340" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">30 minutes</text>
  <path d="M 420 120 L 470 120" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="470" y="80" width="160" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="550" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">Stage 3: 10%</text>
  <text x="550" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">1 hour</text>
  <path d="M 630 120 L 680 120" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="680" y="80" width="160" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="760" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">Stage 4: 25%</text>
  <text x="760" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">2 hours</text>
  <rect x="50" y="180" width="160" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="130" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">Stage 5: 50%</text>
  <text x="130" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">4 hours</text>
  <path d="M 210 220 L 260 220" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="260" y="180" width="160" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="340" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">Stage 6: 100%</text>
  <text x="340" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Full rollout</text>
  <rect x="470" y="180" width="380" height="80" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="660" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#b91c1c">Rollback Path</text>
  <text x="660" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">If metrics degrade → instant switch back to old version</text>
  <rect x="50" y="280" width="800" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Promotion Criteria</text>
  <rect x="70" y="330" width="240" height="50" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="190" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Error rate within threshold</text>
  <rect x="330" y="330" width="240" height="50" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Response time within threshold</text>
  <rect x="590" y="330" width="240" height="50" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="710" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Business metrics stable</text>
  <rect x="50" y="420" width="800" height="110" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Automated vs Manual</text>
  <text x="450" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Automated: Metrics-driven promotion (fast, consistent). Manual: Human approval at each stage (oversight, compliance).</text>
  <text x="450" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Automated is preferred for most deployments. Manual for regulated industries or high-risk changes.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
