<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">CI/CD Pipeline Stages</text>
  <rect x="50" y="80" width="130" height="100" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="115" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0c4a6e">Install</text>
  <text x="115" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Dependencies</text>
  <text x="115" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">npm install</text>
  <path d="M 180 130 L 230 130" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="230" y="80" width="130" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="295" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#92400e">Build</text>
  <text x="295" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Compile &amp; bundle</text>
  <text x="295" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Webpack/Vite</text>
  <path d="M 360 130 L 410 130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="410" y="80" width="130" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="475" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#166534">Test</text>
  <text x="475" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Unit, integration</text>
  <text x="475" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">E2E tests</text>
  <path d="M 540 130 L 590 130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="590" y="80" width="130" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="655" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6b21a8">Analyze</text>
  <text x="655" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Bundle size</text>
  <text x="655" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Security scan</text>
  <path d="M 720 130 L 770 130" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="770" y="80" width="100" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="820" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">Deploy</text>
  <text x="820" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">CDN/Hosting</text>
  <rect x="50" y="200" width="820" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Quality Gates</text>
  <rect x="70" y="250" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="160" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Test coverage > 80%</text>
  <rect x="270" y="250" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="360" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Bundle size under 200KB</text>
  <rect x="470" y="250" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="560" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Lighthouse > 90</text>
  <rect x="670" y="250" width="180" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="760" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Zero vulnerabilities</text>
  <rect x="50" y="320" width="820" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">CD Pipeline (After Merge)</text>
  <rect x="70" y="370" width="240" height="40" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="190" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Production build + E2E tests</text>
  <rect x="330" y="370" width="240" height="40" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="450" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Deploy to staging for QA</text>
  <rect x="590" y="370" width="260" height="40" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="720" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Deploy to production + verify</text>
  <rect x="50" y="440" width="820" height="90" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Fail Fast Principle</text>
  <text x="450" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Run fast checks first (lint, types, unit tests) before slow checks (E2E, visual). If fast checks fail, stop pipeline early to save time.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
