<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Blue-Green Rollback</text>
  <rect x="50" y="80" width="350" height="180" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="225" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#b91c1c">Green Active (Issues Detected)</text>
  <text x="225" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#b91c1c">Version 2.0 with errors</text>
  <rect x="70" y="160" width="310" height="35" rx="4" fill="#ffffff" stroke="#fecaca"/>
  <text x="225" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Error rate spike detected</text>
  <rect x="70" y="205" width="310" height="35" rx="4" fill="#ffffff" stroke="#fecaca"/>
  <text x="225" y="227" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Performance degradation</text>
  <rect x="500" y="80" width="350" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="675" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#15803d">Blue Standby (Ready)</text>
  <text x="675" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#15803d">Version 1.0 (stable)</text>
  <rect x="520" y="160" width="310" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="675" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Previous stable version</text>
  <rect x="520" y="205" width="310" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="675" y="227" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Ready for instant switch</text>
  <path d="M 400 170 L 500 170" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)" fill="none"/>
  <text x="450" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#b91c1c">INSTANT SWITCH</text>
  <rect x="50" y="280" width="800" height="120" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#15803d">After Rollback</text>
  <rect x="70" y="330" width="360" height="50" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="250" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Blue is active again (v1.0 serving traffic)</text>
  <rect x="450" y="330" width="380" height="50" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="640" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Green is available for fix and redeploy</text>
  <rect x="50" y="420" width="800" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Rollback Characteristics</text>
  <rect x="70" y="470" width="240" height="45" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="190" y="497" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">Time: Instant (seconds)</text>
  <rect x="330" y="470" width="240" height="45" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="450" y="497" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">No rebuild needed</text>
  <rect x="590" y="470" width="240" height="45" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="710" y="497" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475560">No data loss</text>
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
