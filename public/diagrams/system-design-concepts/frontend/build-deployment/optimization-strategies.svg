  <text x="450" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Tree-shaking: 30-50% reduction | Code splitting: 50-70% initial load reduction | Minification: 50-70% size reduction | Caching: instant repeat visits</text>
