<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Zero-Downtime Strategies Comparison</text>
  <rect x="50" y="80" width="260" height="180" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Blue-Green</text>
  <rect x="70" y="130" width="220" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Instant traffic switch</text>
  <rect x="70" y="165" width="220" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Instant rollback</text>
  <rect x="70" y="200" width="220" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Double infrastructure</text>
  <rect x="330" y="80" width="260" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Canary</text>
  <rect x="350" y="130" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Gradual traffic increase</text>
  <rect x="350" y="165" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Limited blast radius</text>
  <rect x="350" y="200" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Metrics-driven promotion</text>
  <rect x="610" y="80" width="240" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="730" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Rolling Updates</text>
  <rect x="630" y="130" width="200" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Instance-by-instance replace</text>
  <rect x="630" y="165" width="200" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Lower infrastructure cost</text>
  <rect x="630" y="200" width="200" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Slower rollback</text>
  <rect x="50" y="280" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Frontend Applications</text>
  <rect x="70" y="330" width="240" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="190" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Blue-green: CDN origin switch</text>
  <rect x="330" y="330" width="240" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Canary: traffic splitting</text>
  <rect x="590" y="330" width="240" height="40" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="710" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Rolling: less relevant (stateless)</text>
  <rect x="50" y="400" width="800" height="120" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Recommendation</text>
  <text x="450" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">For frontend: Blue-green (CDN origin switch) is simplest and fastest. Canary for high-risk UI changes.</text>
  <text x="450" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Rolling updates are more relevant for backend services with running instances.</text>
  <text x="450" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">All strategies achieve zero-downtime — choose based on risk tolerance, infrastructure cost, and rollback speed needs.</text>
</svg>
