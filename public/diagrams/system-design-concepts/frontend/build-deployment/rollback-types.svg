<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Rollback Types Comparison</text>
  <rect x="50" y="80" width="260" height="200" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Instant Rollback</text>
  <rect x="70" y="130" width="220" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Traffic switch (blue-green)</text>
  <rect x="70" y="165" width="220" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Flag disable (feature flags)</text>
  <rect x="70" y="200" width="220" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Time: seconds</text>
  <rect x="70" y="235" width="220" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">No redeploy needed</text>
  <rect x="330" y="80" width="260" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Fast Rollback</text>
  <rect x="350" y="130" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">CI/CD redeploy</text>
  <rect x="350" y="165" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Previous version available</text>
  <rect x="350" y="200" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Time: minutes</text>
  <rect x="350" y="235" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Pipeline duration</text>
  <rect x="610" y="80" width="240" height="200" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="730" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#b91c1c">Slow Rollback (Avoid)</text>
  <rect x="630" y="130" width="200" height="30" rx="4" fill="#ffffff" stroke="#fecaca"/>
  <text x="730" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Manual rollback</text>
  <rect x="630" y="165" width="200" height="30" rx="4" fill="#ffffff" stroke="#fecaca"/>
  <text x="730" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Rebuild from source</text>
  <rect x="630" y="200" width="200" height="30" rx="4" fill="#ffffff" stroke="#fecaca"/>
  <text x="730" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Time: hours</text>
  <rect x="630" y="235" width="200" height="30" rx="4" fill="#ffffff" stroke="#fecaca"/>
  <text x="730" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">High user impact</text>
  <rect x="50" y="300" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Rollback Speed Impact</text>
  <rect x="70" y="350" width="240" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="190" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Instant: Minimal user impact</text>
  <rect x="330" y="350" width="240" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="450" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Fast: Moderate user impact</text>
  <rect x="590" y="350" width="240" height="40" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="710" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Slow: High user impact</text>
  <rect x="50" y="420" width="800" height="110" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Recommendation</text>
  <text x="450" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Use instant rollback (blue-green, feature flags) for critical deployments. Use fast rollback (CI/CD redeploy) for non-critical deployments.</text>
  <text x="450" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Avoid slow rollback — optimize pipeline speed and automate rollback execution.</text>
</svg>
