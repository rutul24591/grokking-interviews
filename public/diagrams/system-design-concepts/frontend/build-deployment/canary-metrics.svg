  <rect x="350" y="175" width="220" height="35" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="197" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Canary: 210ms (within 5%)</text>
  <rect x="350" y="220" width="220" height="35" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="460" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Status: Healthy</text>
  <rect x="610" y="80" width="240" height="180" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="730" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Business Metrics</text>
  <rect x="630" y="130" width="200" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Baseline: 5% conversion</text>
  <rect x="630" y="175" width="200" height="35" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="730" y="197" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Canary: 4.8% (within 5%)</text>
  <rect x="630" y="220" width="200" height="35" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="730" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Status: Healthy</text>
  <rect x="50" y="280" width="800" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Metric Thresholds</text>
  <rect x="70" y="330" width="240" height="50" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="190" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Error rate: within 10%</text>
  <rect x="330" y="330" width="240" height="50" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="355" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Response time: within 5%</text>
