  <rect x="70" y="130" width="220" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Baseline: 0.5%</text>
  <rect x="70" y="175" width="220" height="35" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="197" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Canary: 0.6% (within 10%)</text>
  <rect x="70" y="220" width="220" height="35" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="180" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Status: Healthy</text>
  <rect x="330" y="80" width="260" height="180" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
