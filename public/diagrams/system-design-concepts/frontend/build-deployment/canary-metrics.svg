  <text x="450" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Promotion Decision</text>
  <text x="450" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">All metrics within thresholds → proceed to next rollout stage. Any metric beyond threshold → halt and rollback.</text>
  <text x="450" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Metrics-driven decisions remove guesswork from deployment, ensuring objective rollout validation.</text>
