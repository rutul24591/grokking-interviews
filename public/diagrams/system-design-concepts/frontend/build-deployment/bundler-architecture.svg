<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Bundler Architecture</text>
  <rect x="50" y="80" width="260" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Entry Points</text>
  <rect x="70" y="130" width="220" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">app.tsx (main entry)</text>
  <rect x="70" y="165" width="220" height="30" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="180" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">vendor.ts (shared libs)</text>
  <path d="M 310 150 L 360 150" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="360" y="80" width="260" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="490" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Loaders</text>
  <rect x="380" y="130" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="490" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">ts-loader (TypeScript)</text>
  <rect x="380" y="165" width="220" height="30" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="490" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">css-loader (styles)</text>
  <path d="M 620 150 L 670 150" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="670" y="80" width="200" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="770" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#166534">Plugins</text>
  <rect x="690" y="130" width="160" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="770" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Tree-shaking</text>
  <rect x="690" y="165" width="160" height="30" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="770" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Minification</text>
  <rect x="50" y="240" width="800" height="140" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Dependency Graph</text>
  <rect x="70" y="290" width="760" height="70" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="325" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">Entry modules resolve all imports recursively, building a complete dependency graph that determines which modules are included in the bundle</text>
  <rect x="50" y="400" width="260" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="180" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Code Splitting</text>
  <rect x="70" y="450" width="220" height="50" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="180" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Dynamic imports create chunks</text>
  <rect x="330" y="400" width="260" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="460" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#92400e">Optimization</text>
  <rect x="350" y="450" width="220" height="50" rx="4" fill="#ffffff" stroke="#fde68a"/>
  <text x="460" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Minify, compress, hash</text>
  <rect x="610" y="400" width="260" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="740" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Output Bundles</text>
  <rect x="630" y="450" width="220" height="50" rx="4" fill="#ffffff" stroke="#bae6fd"/>
  <text x="740" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">app.abc123.js, vendor.def456.js</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
