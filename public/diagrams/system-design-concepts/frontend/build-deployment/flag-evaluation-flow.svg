<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Flag Evaluation Flow</text>
  <rect x="50" y="80" width="180" height="100" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="140" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0c4a6e">User Request</text>
  <text x="140" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">Page load / navigation</text>
  <path d="M 230 130 L 280 130" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="280" y="80" width="180" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="370" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#92400e">SDK Fetches Flags</text>
  <text x="370" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">From flag management system</text>
  <path d="M 460 130 L 510 130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="510" y="80" width="180" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="600" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#166534">Evaluate Targeting</text>
  <text x="600" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">User ID, segments, rules</text>
  <path d="M 690 130 L 740 130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="740" y="80" width="130" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="805" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6b21a8">Flag State</text>
  <text x="805" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Enabled or disabled</text>
  <rect x="50" y="200" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">Feature Code Execution</text>
  <rect x="70" y="250" width="360" height="40" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="250" y="275" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#15803d">if (flag.enabled) runNewFeature()</text>
  <rect x="470" y="250" width="360" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="650" y="275" text-anchor="middle" font-family="monospace, sans-serif" font-size="10" fill="#b45309">else runExistingFeature()</text>
  <rect x="50" y="320" width="800" height="100" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Performance Optimization</text>
  <rect x="70" y="370" width="240" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="190" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Cache flag states locally</text>
  <rect x="330" y="370" width="240" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Async evaluation</text>
  <rect x="590" y="370" width="240" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="710" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Default values on failure</text>
  <rect x="50" y="440" width="800" height="90" rx="8" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="450" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Runtime Updates</text>
  <text x="450" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Flag states update at runtime via WebSocket or polling. Feature enable/disable takes effect immediately without application reload.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
