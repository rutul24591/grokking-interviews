<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Zero-Downtime Deployment Flow</text>
  <rect x="50" y="80" width="160" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="130" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#15803d">1. Deploy v2</text>
  <text x="130" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Alongside v1</text>
  <path d="M 210 130 L 260 130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="260" y="80" width="160" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="340" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#92400e">2. Health Checks</text>
  <text x="340" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Verify v2 health</text>
  <path d="M 420 130 L 470 130" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="470" y="80" width="160" height="100" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="550" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0c4a6e">3. Switch Traffic</text>
  <text x="550" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">v1 → v2</text>
  <path d="M 630 130 L 680 130" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <rect x="680" y="80" width="180" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="770" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#6b21a8">4. Verify</text>
  <text x="770" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Post-deploy health</text>
  <rect x="50" y="200" width="800" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="450" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#1e293b">At Every Stage</text>
  <rect x="70" y="250" width="760" height="40" rx="4" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="450" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475560">At least one healthy version serves traffic. Users never experience downtime.</text>
  <rect x="50" y="320" width="800" height="100" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#15803d">Rollback Path (if issues detected)</text>
  <rect x="70" y="370" width="760" height="40" rx="4" fill="#ffffff" stroke="#dcfce7"/>
  <text x="450" y="395" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Instant switch back to v1 — no rebuild or redeploy needed</text>
  <rect x="50" y="440" width="800" height="90" rx="8" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="450" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#0c4a6e">Post-Deployment</text>
  <text x="450" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Monitor v2 health metrics. After stabilization period (e.g., 24 hours), decommission v1 assets from CDN.</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#647480"/>
    </marker>
  </defs>
</svg>
