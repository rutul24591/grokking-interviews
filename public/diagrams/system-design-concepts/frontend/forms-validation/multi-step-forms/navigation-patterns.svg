<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Navigation Patterns Comparison</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Linear vs Free Navigation vs Conditional Branching</text>
  
  <!-- Linear Navigation -->
  <rect x="30" y="100" width="270" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2.5"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Linear Navigation</text>
  
  <!-- Linear flow -->
  <rect x="50" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#bae6fd" stroke-width="1.5"/>
  
  <rect x="65" y="170" width="40" height="40" rx="6" fill="#0284c7"/>
  <text x="85" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">1</text>
  <path d="M 105 190 L 135 190" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  
  <rect x="135" y="170" width="40" height="40" rx="6" fill="#0284c7"/>
  <text x="155" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">2</text>
  <path d="M 175 190 L 205 190" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)" fill="none"/>
  
  <rect x="205" y="170" width="40" height="40" rx="6" fill="#bae6fd" stroke="#0284c7" stroke-width="2"/>
  <text x="225" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#0369a1">3</text>
  <path d="M 245 190 L 265 190" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="4,4" fill="none"/>
  
  <rect x="265" y="170" width="40" height="40" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="285" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#94a3b8">4</text>
  
  <text x="165" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">← Can go back</text>
  <text x="165" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">→ Must go forward in order</text>
  <text x="165" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#0c4a6e">Best for: Simple wizards</text>
  
  <!-- Free Navigation -->
  <rect x="315" y="100" width="270" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Free Navigation</text>
  
  <rect x="335" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1.5"/>
  
  <!-- Clickable step indicators -->
  <rect x="350" y="170" width="50" height="35" rx="6" fill="#f59e0b"/>
  <text x="375" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Step 1</text>
  
  <rect x="415" y="170" width="50" height="35" rx="6" fill="#f59e0b"/>
  <text x="440" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Step 2</text>
  
  <rect x="480" y="170" width="50" height="35" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="505" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#92400e">Step 3</text>
  
  <rect x="350" y="215" width="50" height="35" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="375" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">Step 4</text>
  
  <rect x="415" y="215" width="50" height="35" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
  <text x="440" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">Step 5</text>
  
  <!-- Click arrows -->
  <path d="M 400 160 L 400 145 L 420 145 L 420 160" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)" fill="none"/>
  <path d="M 465 160 L 465 145 L 485 145 L 485 160" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <text x="450" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">↔ Can navigate freely</text>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Best for: Complex forms, power users</text>
  
  <!-- Conditional Branching -->
  <rect x="600" y="100" width="270" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.5"/>
  <text x="735" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Conditional Branching</text>
  
  <rect x="620" y="155" width="230" height="130" rx="6" fill="#ffffff" stroke="#dcfce7" stroke-width="1.5"/>
  
  <!-- Branch diagram -->
  <rect x="635" y="170" width="50" height="35" rx="6" fill="#22c55e"/>
  <text x="660" y="192" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ffffff">Start</text>
  
  <path d="M 685 187 L 710 187 L 710 165" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  <text x="700" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#15803d">Business?</text>
  
  <path d="M 685 187 L 710 187 L 710 210" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  <text x="700" y="220" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#15803d">Personal</text>
  
  <!-- Business path -->
  <rect x="720" y="150" width="55" height="30" rx="4" fill="#22c55e" opacity="0.3"/>
  <text x="747" y="169" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Biz Info</text>
  
  <rect x="785" y="150" width="55" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="812" y="169" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Review</text>
  
  <!-- Personal path -->
  <rect x="720" y="195" width="55" height="30" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="747" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Address</text>
  
  <rect x="785" y="195" width="55" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="812" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">Review</text>
  
  <text x="735" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">→ Path changes based on answers</text>
  <text x="735" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#166534">Best for: User-type specific flows</text>
  
  <!-- Comparison table -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Pattern Selection Guide</text>
  
  <!-- Table headers -->
  <rect x="50" y="365" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <text x="150" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Pattern</text>
  <rect x="250" y="365" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <text x="350" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">User Control</text>
  <rect x="450" y="365" width="400" height="30" rx="4" fill="#e2e8f0"/>
  <text x="650" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Use When</text>
  
  <!-- Row 1 -->
  <text x="60" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#0369a1">Linear</text>
  <text x="260" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Previous only</text>
  <text x="460" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Simple flows, guided experience needed</text>
  
  <!-- Row 2 -->
  <text x="60" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#b45309">Free Navigation</text>
  <text x="260" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Full control</text>
  <text x="460" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Long forms, users may need to skip/return</text>
  
  <!-- Row 3 -->
  <text x="60" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#15803d">Conditional</text>
  <text x="260" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Path varies</text>
  <text x="460" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Different user types, context-dependent flows</text>
  
  <!-- Row 4 -->
  <text x="60" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#6b21a8">Hybrid</text>
  <text x="260" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Configurable</text>
  <text x="460" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Most real-world applications use combinations</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
