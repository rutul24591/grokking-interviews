<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Progress Indicator Styles Comparison</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Numbered vs Progress Bar vs Named Steps</text>
  
  <!-- Style 1: Numbered Steps -->
  <rect x="30" y="100" width="270" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Numbered Steps</text>
  
  <rect x="50" y="155" width="230" height="70" rx="6" fill="#ffffff" stroke="#bae6fd" stroke-width="1.5"/>
  
  <!-- Step circles -->
  <circle cx="85" cy="180" r="18" fill="#0284c7"/>
  <text x="85" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">1</text>
  <line x1="103" y1="180" x2="137" y2="180" stroke="#0284c7" stroke-width="3"/>
  
  <circle cx="155" cy="180" r="18" fill="#0284c7"/>
  <text x="155" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">2</text>
  <line x1="173" y1="180" x2="207" y2="180" stroke="#e2e8f0" stroke-width="3"/>
  
  <circle cx="225" cy="180" r="18" fill="#e2e8f0" stroke="#0284c7" stroke-width="2"/>
  <text x="225" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#64748b">3</text>
  <line x1="243" y1="180" x2="255" y2="180" stroke="#e2e8f0" stroke-width="3"/>
  
  <text x="165" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Step 2 of 4</text>
  
  <rect x="50" y="235" width="230" height="35" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="65" y="250" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#92400e">✓ Clear progress</text>
  <text x="65" y="265" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#dc2626">✗ Can discourage if many steps</text>
  
  <!-- Style 2: Progress Bar -->
  <rect x="315" y="100" width="270" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Progress Bar</text>
  
  <rect x="335" y="155" width="230" height="70" rx="6" fill="#ffffff" stroke="#dcfce7" stroke-width="1.5"/>
  
  <!-- Progress bar -->
  <rect x="355" y="175" width="190" height="25" rx="4" fill="#e2e8f0"/>
  <rect x="355" y="175" width="114" height="25" rx="4" fill="#22c55e"/>
  <text x="555" y="193" text-anchor="end" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#166534">60%</text>
  
  <text x="450" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">3 of 5 steps completed</text>
  
  <rect x="335" y="235" width="230" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="350" y="250" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#15803d">✓ Visual, less intimidating</text>
  <text x="350" y="265" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#dc2626">✗ Less precise</text>
  
  <!-- Style 3: Named Steps -->
  <rect x="600" y="100" width="270" height="140" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="735" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">Named Steps</text>
  
  <rect x="620" y="155" width="230" height="70" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1.5"/>
  
  <!-- Named steps -->
  <rect x="635" y="165" width="55" height="20" rx="3" fill="#7c3aed"/>
  <text x="662" y="179" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#ffffff">Personal</text>
  
  <line x1="690" y1="175" x2="705" y2="175" stroke="#7c3aed" stroke-width="2"/>
  
  <rect x="705" y="165" width="55" height="20" rx="3" fill="#7c3aed"/>
  <text x="732" y="179" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#ffffff">Address</text>
  
  <line x1="760" y1="175" x2="775" y2="175" stroke="#e9d5ff" stroke-width="2"/>
  
  <rect x="775" y="165" width="55" height="20" rx="3" fill="#e9d5ff" stroke="#7c3aed"/>
  <text x="802" y="179" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#6b21a8">Payment</text>
  
  <line x1="830" y1="175" x2="845" y2="175" stroke="#e9d5ff" stroke-width="2"/>
  
  <rect x="845" y="165" width="55" height="20" rx="3" fill="#f3f4f6" stroke="#d1d5db"/>
  <text x="872" y="179" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#9ca3af">Review</text>
  
  <text x="735" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Current: Address step</text>
  
  <rect x="620" y="235" width="230" height="35" rx="4" fill="#faf5ff" stroke="#7c3aed" stroke-width="1"/>
  <text x="635" y="250" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#6b21a8">✓ Shows what&apos;s coming</text>
  <text x="635" y="265" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#dc2626">✗ Needs space for labels</text>
  
  <!-- Combined Approach (Recommended) -->
  <rect x="30" y="260" width="840" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#92400e">Recommended: Combined Approach</text>
  <text x="450" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#b45309">Numbered + Named + Percentage = Best completion rates</text>
  
  <rect x="60" y="330" width="780" height="60" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1.5"/>
  
  <!-- Combined progress indicator -->
  <circle cx="100" cy="360" r="20" fill="#0284c7"/>
  <text x="100" y="366" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">1</text>
  <text x="100" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Personal</text>
  <line x1="120" y1="360" x2="180" y2="360" stroke="#0284c7" stroke-width="3"/>
  
  <circle cx="200" cy="360" r="20" fill="#0284c7"/>
  <text x="200" y="366" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">2</text>
  <text x="200" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">Address</text>
  <line x1="220" y1="360" x2="280" y2="360" stroke="#e2e8f0" stroke-width="3"/>
  
  <circle cx="300" cy="360" r="20" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="300" y="366" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#64748b">3</text>
  <text x="300" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Payment</text>
  <line x1="320" y1="360" x2="380" y2="360" stroke="#e2e8f0" stroke-width="3"/>
  
  <circle cx="400" cy="360" r="20" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="366" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#64748b">4</text>
  <text x="400" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Review</text>
  
  <!-- Percentage indicator -->
  <rect x="500" y="340" width="120" height="50" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="560" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#166534">50%</text>
  <text x="560" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Complete</text>
  
  <!-- Research note -->
  <rect x="640" y="340" width="180" height="50" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="730" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Research Finding:</text>
  <text x="730" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Named steps have 12% higher</text>
  
  <!-- Best Practices -->
  <rect x="30" y="420" width="400" height="110" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="230" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Best Practices</text>
  <text x="50" y="465" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Show all steps upfront (don&apos;t hide total count)</text>
  <text x="50" y="482" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Use descriptive step names, not generic labels</text>
  <text x="50" y="499" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Highlight completed, current, and remaining distinctly</text>
  <text x="50" y="516" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">• Allow clicking completed steps to go back</text>
  
  <!-- Common Mistakes -->
  <rect x="450" y="420" width="420" height="110" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="660" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Common Mistakes</text>
  <text x="470" y="465" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">• Too many steps (8+) discourages completion</text>
  <text x="470" y="482" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">• Vague step names (&quot;Step 1&quot;, &quot;Step 2&quot;)</text>
  <text x="470" y="499" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">• No indication of total progress</text>
  <text x="470" y="516" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">• Can&apos;t navigate back to previous steps</text>
</svg>
