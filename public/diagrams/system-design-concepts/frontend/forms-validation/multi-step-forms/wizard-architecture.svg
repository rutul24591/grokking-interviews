<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Multi-step Form Wizard Architecture</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Step manager, navigation, and data accumulation</text>
  
  <!-- Step Manager (Center) -->
  <rect x="350" y="100" width="200" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2.5"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Step Manager</text>
  <text x="450" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">• Current step</text>
  <text x="450" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">• Navigation</text>
  <text x="450" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">• Validation</text>
  
  <!-- Step 1 -->
  <rect x="50" y="240" width="160" height="100" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2.5"/>
  <text x="130" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Step 1</text>
  <text x="130" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Personal Info</text>
  <text x="130" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">5 fields</text>
  
  <!-- Step 2 -->
  <rect x="250" y="240" width="160" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="330" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Step 2</text>
  <text x="330" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Address</text>
  <text x="330" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">4 fields</text>
  
  <!-- Step 3 (Current) -->
  <rect x="450" y="240" width="160" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="3"/>
  <text x="530" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Step 3</text>
  <text x="530" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#7e22ce">Payment</text>
  <text x="530" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Current</text>
  
  <!-- Step 4 -->
  <rect x="650" y="240" width="160" height="100" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="730" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#475569">Step 4</text>
  <text x="730" y="300" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">Review</text>
  <text x="730" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Pending</text>
  
  <!-- Arrows between steps -->
  <path d="M 210 290 L 245 290" stroke="#e2e8f0" stroke-width="2" marker-end="url(#arrow-gray)" fill="none"/>
  <path d="M 410 290 L 445 290" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)" fill="none"/>
  <path d="M 610 290 L 645 290" stroke="#e2e8f0" stroke-width="2" marker-end="url(#arrow-gray)" fill="none"/>
  
  <!-- Arrows from Step Manager -->
  <path d="M 350 180 L 210 260" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-dashed)" fill="none"/>
  <path d="M 450 200 L 450 235" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" fill="none"/>
  <path d="M 550 180 L 690 260" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-dashed)" fill="none"/>
  
  <!-- Data Store -->
  <rect x="50" y="380" width="300" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="200" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Accumulated Data</text>
  
  <rect x="70" y="430" width="260" height="75" rx="6" fill="#ffffff" stroke="#dcfce7" stroke-width="1.5"/>
  <text x="85" y="452" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#475569">{"{"}</text>
  <text x="100" y="470" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">"personal": {"{ name, email, phone }"},</text>
  <text x="100" y="487" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">"address": {"{ street, city, zip }"},</text>
  <text x="100" y="504" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">"payment": {"{ ... }"} // being filled</text>
  <text x="85" y="521" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#475569">{"}"}</text>
  
  <!-- Progress Indicator -->
  <rect x="550" y="380" width="300" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="700" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Progress Indicator</text>
  
  <rect x="570" y="430" width="260" height="75" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1.5"/>
  
  <!-- Progress steps -->
  <circle cx="595" cy="455" r="10" fill="#22c55e"/>
  <text x="595" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#ffffff">✓</text>
  <line x1="605" y1="455" x2="645" y2="455" stroke="#22c55e" stroke-width="2"/>
  
  <circle cx="655" cy="455" r="10" fill="#22c55e"/>
  <text x="655" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#ffffff">✓</text>
  <line x1="665" y1="455" x2="705" y2="455" stroke="#7c3aed" stroke-width="2"/>
  
  <circle cx="715" cy="455" r="10" fill="#7c3aed"/>
  <text x="715" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#ffffff">3</text>
  <line x1="725" y1="455" x2="765" y2="455" stroke="#e2e8f0" stroke-width="2"/>
  
  <circle cx="775" cy="455" r="10" fill="#e2e8f0"/>
  <text x="775" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#94a3b8">4</text>
  
  <text x="700" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#92400e">Step 3 of 4 (75%)</text>
  
  <!-- Navigation Controls -->
  <rect x="350" y="480" width="200" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="365" y="490" width="70" height="20" rx="4" fill="#475569"/>
  <text x="400" y="504" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#ffffff">Previous</text>
  <rect x="445" y="490" width="90" height="20" rx="4" fill="#7c3aed"/>
  <text x="490" y="504" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#ffffff">Next →</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e2e8f0"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
</svg>
