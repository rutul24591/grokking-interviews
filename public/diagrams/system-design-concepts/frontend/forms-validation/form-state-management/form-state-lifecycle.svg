<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Form State Lifecycle</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">State transitions from initialization through submission</text>
  
  <!-- Initialization State -->
  <rect x="50" y="100" width="180" height="100" rx="10" fill="#f0f9ff" stroke="#0284c7" stroke-width="2.5"/>
  <text x="140" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Initialization</text>
  <text x="140" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Load defaults</text>
  <text x="140" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Set initialValues</text>
  <text x="140" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Reset state flags</text>
  
  <!-- Arrow to Idle -->
  <path d="M 230 150 L 280 150" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  <text x="255" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">ready</text>
  
  <!-- Idle/Active State -->
  <rect x="280" y="100" width="200" height="100" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.5"/>
  <text x="380" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Idle / Active</text>
  <text x="380" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">User interacting</text>
  <text x="380" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Values changing</text>
  <text x="380" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Validation running</text>
  
  <!-- Self-loop for user interactions -->
  <path d="M 330 100 L 330 70 L 430 70 L 430 100" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  <text x="380" y="62" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">onChange/onBlur</text>
  
  <!-- Arrow to Validating -->
  <path d="M 480 150 L 530 150" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  <text x="505" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">async validation</text>
  
  <!-- Validating State -->
  <rect x="530" y="100" width="160" height="100" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="610" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Validating</text>
  <text x="610" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">API calls</text>
  <text x="610" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Checking rules</text>
  <text x="610" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">isLoading: true</text>
  
  <!-- Arrow back to Idle (validation complete) -->
  <path d="M 610 200 L 610 240 L 380 240 L 380 200" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-gray)" fill="none"/>
  <text x="495" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">complete</text>
  
  <!-- Arrow to Submitting -->
  <path d="M 690 150 L 740 150" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)" fill="none"/>
  <text x="715" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">onSubmit</text>
  
  <!-- Submitting State -->
  <rect x="740" y="100" width="160" height="100" rx="10" fill="#faf5ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="820" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Submitting</text>
  <text x="820" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#7e22ce">POST request</text>
  <text x="820" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#7e22ce">Inputs locked</text>
  <text x="820" y="196" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#7e22ce">Loading state</text>
  
  <!-- Arrow to Success -->
  <path d="M 820 200 L 820 260 L 680 260 L 680 300" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" fill="none"/>
  <text x="750" y="275" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">success (2xx)</text>
  
  <!-- Arrow to Error -->
  <path d="M 780 200 L 780 280 L 450 280 L 450 300" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" fill="none"/>
  <text x="580" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">error (4xx/5xx)</text>
  
  <!-- Success State -->
  <rect x="580" y="300" width="200" height="110" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="2.5"/>
  <text x="680" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Success</text>
  <text x="680" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Show confirmation</text>
  <text x="680" y="383" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Reset form OR</text>
  <text x="680" y="401" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Navigate away</text>
  
  <!-- Error State -->
  <rect x="280" y="300" width="200" height="110" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2.5"/>
  <text x="380" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Submission Error</text>
  <text x="380" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">Show error message</text>
  <text x="380" y="383" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">Unlock inputs</text>
  <text x="380" y="401" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">Retry option</text>
  
  <!-- Arrow from Error back to Idle -->
  <path d="M 320 300 L 320 250 L 380 250 L 380 200" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-gray)" fill="none"/>
  <text x="310" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">retry</text>
  
  <!-- Arrow from Success to Initialization (reset) -->
  <path d="M 580 350 L 250 350 L 250 200 L 230 200" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-gray)" fill="none"/>
  <text x="415" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">reset form</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Legend -->
  <rect x="50" y="440" width="300" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="70" y="465" text-anchor="start" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Legend:</text>
  <rect x="70" y="480" width="20" height="20" rx="4" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="100" y="495" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Initial state</text>
  <rect x="70" y="505" width="20" height="20" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="100" y="520" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Active state</text>
  <path d="M 70 545 L 90 545" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow-gray)"/>
  <text x="100" y="550" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Transition (reversible)</text>
  
  <!-- Bottom note -->
  <rect x="370" y="440" width="480" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="610" y="465" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Key Considerations:</text>
  <text x="390" y="490" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Always handle submission errors gracefully - never leave form in submitting state</text>
  <text x="390" y="510" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Lock inputs during submission to prevent duplicate submissions</text>
  <text x="390" y="530" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#475569">• Provide clear recovery paths from error states</text>
</svg>
