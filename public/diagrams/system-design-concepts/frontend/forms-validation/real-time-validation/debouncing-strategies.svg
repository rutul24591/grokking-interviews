<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Debouncing Strategies Comparison</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Trailing vs Leading vs Fixed debounce patterns</text>
  
  <!-- Trailing Debounce -->
  <rect x="30" y="100" width="270" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="165" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Trailing Debounce (Most Common)</text>
  
  <!-- Timeline visualization -->
  <rect x="50" y="155" width="230" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Input events -->
  <line x1="60" y1="180" x2="270" y2="180" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="70" cy="180" r="4" fill="#0284c7"/>
  <circle cx="90" cy="180" r="4" fill="#0284c7"/>
  <circle cx="110" cy="180" r="4" fill="#0284c7"/>
  <circle cx="130" cy="180" r="4" fill="#0284c7"/>
  <circle cx="150" cy="180" r="4" fill="#0284c7"/>
  <circle cx="170" cy="180" r="4" fill="#0284c7"/>
  <text x="165" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">User typing...</text>
  
  <!-- Debounce wait period -->
  <rect x="175" y="210" width="60" height="20" rx="3" fill="#f59e0b" opacity="0.3"/>
  <text x="205" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">300ms wait</text>
  
  <!-- Validation trigger -->
  <rect x="240" y="210" width="30" height="20" rx="3" fill="#22c55e"/>
  <text x="255" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#ffffff">Run</text>
  
  <text x="60" y="250" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">✓ Waits for typing to stop</text>
  <text x="60" y="265" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">✓ Validates final value</text>
  <text x="60" y="280" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ Delayed feedback</text>
  
  <!-- Leading Debounce -->
  <rect x="315" y="100" width="270" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.5"/>
  <text x="450" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">Leading Debounce</text>
  
  <rect x="335" y="155" width="230" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Leading timeline -->
  <line x1="345" y1="180" x2="555" y2="180" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="355" cy="180" r="4" fill="#0284c7"/>
  <circle cx="375" cy="180" r="4" fill="#0284c7"/>
  <circle cx="395" cy="180" r="4" fill="#0284c7"/>
  <circle cx="415" cy="180" r="4" fill="#0284c7"/>
  <circle cx="435" cy="180" r="4" fill="#0284c7"/>
  
  <!-- Immediate validation -->
  <rect x="350" y="210" width="30" height="20" rx="3" fill="#22c55e"/>
  <text x="365" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#ffffff">Run</text>
  
  <!-- Cooldown period -->
  <rect x="385" y="210" width="100" height="20" rx="3" fill="#22c55e" opacity="0.3"/>
  <text x="435" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">300ms cooldown</text>
  
  <!-- Next validation -->
  <circle cx="535" cy="180" r="4" fill="#0284c7"/>
  <rect x="530" y="210" width="30" height="20" rx="3" fill="#22c55e"/>
  <text x="545" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#ffffff">Run</text>
  
  <text x="345" y="250" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">✓ Immediate feedback</text>
  <text x="345" y="265" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">✓ Good for first char</text>
  <text x="345" y="280" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ May validate incomplete</text>
  
  <!-- Fixed Debounce -->
  <rect x="600" y="100" width="270" height="200" rx="8" fill="#e0e7ff" stroke="#4f46e5" stroke-width="2.5"/>
  <text x="735" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#3730a3">Fixed Interval (Rare for Validation)</text>
  
  <rect x="620" y="155" width="230" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  
  <!-- Fixed timeline -->
  <line x1="630" y1="180" x2="840" y2="180" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Fixed intervals -->
  <rect x="640" y="210" width="25" height="20" rx="3" fill="#4f46e5"/>
  <text x="652" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#ffffff">Run</text>
  
  <rect x="700" y="210" width="25" height="20" rx="3" fill="#4f46e5"/>
  <text x="712" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#ffffff">Run</text>
  
  <rect x="760" y="210" width="25" height="20" rx="3" fill="#4f46e5"/>
  <text x="772" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="700" fill="#ffffff">Run</text>
  
  <text x="640" y="250" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">✓ Predictable timing</text>
  <text x="640" y="265" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">✓ Periodic re-validation</text>
  <text x="640" y="280" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#dc2626">✗ Ignores user input pattern</text>
  
  <!-- Recommendation table -->
  <rect x="30" y="320" width="840" height="210" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Recommendation by Use Case</text>
  
  <!-- Table headers -->
  <rect x="50" y="365" width="250" height="30" rx="4" fill="#e2e8f0"/>
  <text x="175" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Use Case</text>
  <rect x="300" y="365" width="200" height="30" rx="4" fill="#e2e8f0"/>
  <text x="400" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Recommended</text>
  <rect x="500" y="365" width="370" height="30" rx="4" fill="#e2e8f0"/>
  <text x="685" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#1e293b">Debounce Timing</text>
  
  <!-- Row 1 -->
  <rect x="50" y="395" width="800" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="417" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Async validation (username, email)</text>
  <text x="310" y="417" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#16a34a">Trailing</text>
  <text x="510" y="417" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">300-400ms - balances responsiveness with API load</text>
  
  <!-- Row 2 -->
  <rect x="50" y="430" width="800" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="452" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Sync validation (format, length)</text>
  <text x="310" y="452" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#16a34a">Trailing</text>
  <text x="510" y="452" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">150-250ms - faster feedback, minimal cost</text>
  
  <!-- Row 3 -->
  <rect x="50" y="465" width="800" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="487" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Password strength meter</text>
  <text x="310" y="487" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#16a34a">Leading + Trailing</text>
  <text x="510" y="487" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Immediate first, then 150ms trailing</text>
  
  <!-- Row 4 -->
  <rect x="50" y="500" width="800" height="35" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="522" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Search autocomplete</text>
  <text x="310" y="522" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#16a34a">Trailing</text>
  <text x="510" y="522" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">400-500ms - reduce API calls</text>
  
  <!-- Bottom note -->
  <rect x="30" y="540" width="840" height="30" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#92400e">Default recommendation: Trailing debounce at 300ms works for 90% of validation scenarios</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="debounce-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
