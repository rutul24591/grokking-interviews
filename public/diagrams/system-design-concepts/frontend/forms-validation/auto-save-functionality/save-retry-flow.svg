<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Auto-save Retry Flow with Exponential Backoff</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Handling save failures gracefully with retry logic</text>
  
  <!-- Initial Save Attempt -->
  <rect x="30" y="100" width="160" height="90" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2.5"/>
  <text x="110" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Save Attempt 1</text>
  <text x="110" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">POST /api/draft</text>
  <text x="110" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Status: Saving...</text>
  
  <!-- Arrow - Fail -->
  <path d="M 190 145 L 230 145" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" fill="none"/>
  <text x="210" y="137" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Network error</text>
  
  <!-- Retry 1 -->
  <rect x="230" y="100" width="160" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="310" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Retry 1</text>
  <text x="310" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Wait 1 second</text>
  <text x="310" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Exponential backoff</text>
  
  <!-- Arrow - Fail -->
  <path d="M 390 145 L 430 145" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" fill="none"/>
  <text x="410" y="137" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Still failing</text>
  
  <!-- Retry 2 -->
  <rect x="430" y="100" width="160" height="90" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2.5"/>
  <text x="510" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#9a3412">Retry 2</text>
  <text x="510" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c2410c">Wait 2 seconds</text>
  <text x="510" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#c2410c">Backoff 2x</text>
  
  <!-- Arrow - Fail -->
  <path d="M 590 145 L 630 145" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" fill="none"/>
  <text x="610" y="137" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Server error</text>
  
  <!-- Retry 3 (Final) -->
  <rect x="630" y="100" width="160" height="90" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2.5"/>
  <text x="710" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Retry 3 (Final)</text>
  <text x="710" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">Wait 4 seconds</text>
  <text x="710" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">Last attempt</text>
  
  <!-- Success path from Retry 3 -->
  <path d="M 710 190 L 710 240 L 550 240 L 550 280" stroke="#22c55e" stroke-width="2.5" marker-end="url(#arrow-green)" fill="none"/>
  <text x="640" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">Success!</text>
  
  <!-- Failure path -->
  <path d="M 790 145 L 850 145" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" fill="none"/>
  <text x="820" y="137" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Max retries</text>
  
  <!-- Final Failure State -->
  <rect x="850" y="100" width="120" height="90" rx="8" fill="#7f1d1d" stroke="#991b1b" stroke-width="2.5"/>
  <text x="910" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Failed</text>
  <text x="910" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#fca5a5">Show error</text>
  <text x="910" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#fca5a5">Manual retry</text>
  
  <!-- Success State -->
  <rect x="450" y="280" width="200" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2.5"/>
  <text x="550" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">✓ Save Successful</text>
  <text x="550" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Update status: Saved</text>
  
  <!-- Local Backup (parallel) -->
  <rect x="30" y="280" width="200" height="120" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="130" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Local Backup</text>
  <text x="130" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Always save to</text>
  <text x="130" y="362" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">localStorage first</text>
  <text x="130" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#16a34a">✓ Data preserved even if server fails</text>
  
  <!-- User Options on Final Failure -->
  <rect x="250" y="280" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="340" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">User Options</text>
  <rect x="270" y="335" width="140" height="25" rx="4" fill="#f59e0b"/>
  <text x="340" y="352" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff">Retry Now</text>
  <rect x="270" y="365" width="140" height="25" rx="4" fill="#e5e7eb"/>
  <text x="340" y="382" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#374151">Continue Editing</text>
  
  <!-- Status Indicator Examples -->
  <rect x="670" y="280" width="200" height="120" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="770" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Status Indicators</text>
  
  <!-- Status examples -->
  <rect x="690" y="330" width="160" height="20" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="705" y="344" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">🔄 Saving...</text>
  
  <rect x="690" y="355" width="160" height="20" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="705" y="369" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">✓ Saved 2m ago</text>
  
  <rect x="690" y="380" width="160" height="20" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="705" y="394" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">⚠ Save failed - Retry</text>
  
  <!-- Backoff Timeline -->
  <rect x="30" y="420" width="840" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Exponential Backoff Timeline</text>
  
  <!-- Timeline -->
  <line x1="80" y1="480" x2="820" y2="480" stroke="#e2e8f0" stroke-width="3"/>
  
  <!-- Attempt markers -->
  <rect x="100" y="465" width="50" height="30" rx="4" fill="#0284c7"/>
  <text x="125" y="484" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">Try 1</text>
  
  <rect x="250" y="465" width="50" height="30" rx="4" fill="#f59e0b"/>
  <text x="275" y="484" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">Try 2</text>
  
  <rect x="450" y="465" width="50" height="30" rx="4" fill="#f97316"/>
  <text x="475" y="484" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">Try 3</text>
  
  <rect x="700" y="465" width="50" height="30" rx="4" fill="#ef4444"/>
  <text x="725" y="484" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">Try 4</text>
  
  <!-- Wait times -->
  <path d="M 150 480 L 240 480" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="195" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">1s</text>
  
  <path d="M 300 480 L 440 480" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="370" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">2s</text>
  
  <path d="M 500 480 L 690 480" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="595" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">4s</text>
  
  <path d="M 750 480 L 800 480" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="775" y="472" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">8s</text>
  
  <text x="450" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Wait time doubles after each failure (1s → 2s → 4s → 8s)</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
