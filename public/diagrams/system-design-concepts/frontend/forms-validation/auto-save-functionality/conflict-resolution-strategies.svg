<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Conflict Resolution Strategies</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Handling concurrent edits in auto-save systems</text>
  
  <!-- Scenario: Two users editing same document -->
  <rect x="30" y="100" width="400" height="140" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="230" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#b91c1c">Conflict Scenario</text>
  
  <!-- User A -->
  <rect x="50" y="145" width="160" height="80" rx="6" fill="#ffffff" stroke="#fecaca" stroke-width="1.5"/>
  <text x="130" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#b91c1c">User A (Tab 1)</text>
  <text x="130" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Version 3 → Edit → Save</text>
  <text x="130" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">"Updated title"</text>
  
  <!-- User B -->
  <rect x="250" y="145" width="160" height="80" rx="6" fill="#ffffff" stroke="#fecaca" stroke-width="1.5"/>
  <text x="330" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#b91c1c">User B (Tab 2)</text>
  <text x="330" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b91c1c">Version 3 → Edit → Save</text>
  <text x="330" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">"Added paragraph"</text>
  
  <!-- Server -->
  <rect x="450" y="100" width="180" height="140" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="540" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Server</text>
  <text x="540" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">Current: Version 3</text>
  
  <rect x="470" y="180" width="140" height="45" rx="4" fill="#334155"/>
  <text x="540" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#fca5a5">User A saves first</text>
  <text x="540" y="215" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff">→ Version 4 created</text>
  
  <!-- Conflict arrow -->
  <path d="M 630 170 L 680 170" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" fill="none"/>
  <text x="655" y="162" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">User B saves</text>
  <text x="655" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">(has v3, server has v4)</text>
  
  <!-- Strategy 1: Last Write Wins -->
  <rect x="30" y="260" width="270" height="130" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="165" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Last Write Wins</text>
  
  <rect x="50" y="305" width="230" height="70" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1.5"/>
  <text x="65" y="325" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">• User B's save overwrites User A's</text>
  <text x="65" y="342" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">• Simple but data loss risk</text>
  <text x="65" y="359" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">• User A's changes lost</text>
  <text x="165" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#dc2626">✗ Not recommended for important data</text>
  
  <!-- Strategy 2: Reject & Notify -->
  <rect x="315" y="260" width="270" height="130" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Reject &amp; Notify</text>
  
  <rect x="335" y="305" width="230" height="70" rx="6" fill="#ffffff" stroke="#dcfce7" stroke-width="1.5"/>
  <text x="350" y="325" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">• Server rejects User B's save (409)</text>
  <text x="350" y="342" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">• User B shown conflict UI</text>
  <text x="350" y="359" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">• Can merge or overwrite</text>
  <text x="450" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#16a34a">✓ Recommended approach</text>
  
  <!-- Strategy 3: Auto-merge -->
  <rect x="600" y="260" width="270" height="130" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="735" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Auto-merge (CRDT)</text>
  
  <rect x="620" y="305" width="230" height="70" rx="6" fill="#ffffff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="635" y="325" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">• Both changes automatically merged</text>
  <text x="635" y="342" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">• Uses CRDT or operational transform</text>
  <text x="635" y="359" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">• No user intervention needed</text>
  <text x="735" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#0284c7">✓ Best for collaborative editing</text>
  
  <!-- Conflict Resolution UI -->
  <rect x="30" y="410" width="500" height="120" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="280" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">Conflict Resolution UI</text>
  
  <rect x="50" y="455" width="460" height="60" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1.5"/>
  
  <!-- Your version -->
  <rect x="65" y="465" width="130" height="40" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="130" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#92400e">Your Version</text>
  <text x="130" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#b45309">"Added paragraph"</text>
  
  <!-- Merge button -->
  <rect x="210" y="470" width="60" height="30" rx="4" fill="#22c55e"/>
  <text x="240" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#ffffff">Merge</text>
  
  <!-- Server version -->
  <rect x="285" y="465" width="130" height="40" rx="4" fill="#e0e7ff" stroke="#4f46e5"/>
  <text x="350" y="485" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#3730a3">Server Version</text>
  <text x="350" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#4338ca">"Updated title"</text>
  
  <!-- Overwrite button -->
  <rect x="430" y="470" width="70" height="30" rx="4" fill="#ef4444"/>
  <text x="465" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#ffffff">Overwrite</text>
  
  <!-- Prevention strategies -->
  <rect x="545" y="410" width="325" height="120" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="707" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Prevention Strategies</text>
  
  <rect x="565" y="455" width="285" height="60" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="580" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#475569">BroadcastChannel API:</text>
  <text x="580" y="490" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Sync state between tabs in real-time</text>
  <text x="580" y="505" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Show "Someone else is editing" warning</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
