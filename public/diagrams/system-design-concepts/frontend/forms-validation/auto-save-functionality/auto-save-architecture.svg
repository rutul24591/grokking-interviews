<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Auto-save Architecture</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Debouncing, save manager, local and server persistence</text>
  
  <!-- User Input -->
  <rect x="30" y="100" width="140" height="80" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="100" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">User Input</text>
  <text x="100" y="160" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">onChange events</text>
  
  <!-- Arrow to Debounce -->
  <path d="M 170 140 L 210 140" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  
  <!-- Debounce Layer -->
  <rect x="210" y="100" width="160" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="290" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">Debounce Layer</text>
  <text x="290" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">1000ms delay</text>
  <text x="290" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">Cancel on new input</text>
  
  <!-- Arrow to Save Manager -->
  <path d="M 370 140 L 410 140" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- Save Manager -->
  <rect x="410" y="100" width="180" height="120" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2.5"/>
  <text x="500" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Save Manager</text>
  <text x="500" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">• Queue management</text>
  <text x="500" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">• Retry logic</text>
  <text x="500" y="199" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">• Status updates</text>
  
  <!-- Split to Local and Server -->
  <path d="M 590 160 L 630 160" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)" fill="none"/>
  <path d="M 590 190 L 630 190 L 630 240" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-purple)" fill="none"/>
  
  <!-- Local Storage -->
  <rect x="630" y="120" width="140" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="700" y="150" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#166534">Local Storage</text>
  <text x="700" y="175" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">localStorage</text>
  <text x="700" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">IndexedDB backup</text>
  
  <!-- Server Save -->
  <rect x="630" y="240" width="140" height="80" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="700" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#6b21a8">Server Save</text>
  <text x="700" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">API POST</text>
  <text x="700" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7e22ce">With retry</text>
  
  <!-- Status Indicator -->
  <rect x="30" y="240" width="200" height="100" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="130" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Status Indicator</text>
  
  <!-- Status states -->
  <rect x="50" y="290" width="160" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="70" y="310" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">• Saving... (spinner)</text>
  <text x="70" y="325" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">• Saved 2m ago</text>
  
  <!-- Offline Queue -->
  <rect x="250" y="240" width="200" height="100" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="350" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#9a3412">Offline Queue</text>
  
  <rect x="270" y="290" width="160" height="40" rx="6" fill="#ffffff" stroke="#fed7aa" stroke-width="1.5"/>
  <text x="285" y="310" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#c2410c">• Queue changes</text>
  <text x="285" y="325" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#c2410c">• Sync on reconnect</text>
  
  <!-- Conflict Detection -->
  <rect x="470" y="240" width="200" height="100" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="570" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Conflict Detection</text>
  
  <rect x="490" y="290" width="160" height="40" rx="6" fill="#ffffff" stroke="#fecaca" stroke-width="1.5"/>
  <text x="505" y="310" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">• Version numbers</text>
  <text x="505" y="325" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">• 409 Conflict handling</text>
  
  <!-- Draft Recovery -->
  <rect x="690" y="240" width="180" height="100" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="780" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Draft Recovery</text>
  
  <rect x="710" y="290" width="140" height="40" rx="6" fill="#ffffff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="725" y="310" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">• Load on page open</text>
  <text x="725" y="325" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0369a1">• Offer to restore</text>
  
  <!-- Timeline at bottom -->
  <rect x="30" y="360" width="840" height="160" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Auto-save Timeline</text>
  
  <!-- Timeline -->
  <line x1="80" y1="430" x2="820" y2="430" stroke="#e2e8f0" stroke-width="3"/>
  
  <!-- Events on timeline -->
  <circle cx="120" cy="430" r="8" fill="#0284c7"/>
  <text x="120" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">User types</text>
  
  <circle cx="200" cy="430" r="8" fill="#0284c7"/>
  <text x="200" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Continues</text>
  
  <circle cx="280" cy="430" r="8" fill="#0284c7"/>
  <text x="280" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Pauses</text>
  
  <!-- Debounce period -->
  <rect x="320" y="415" width="80" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">1000ms</text>
  
  <!-- Save trigger -->
  <rect x="440" y="415" width="60" height="30" rx="4" fill="#22c55e"/>
  <text x="470" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">Save</text>
  
  <!-- Local save -->
  <path d="M 470 445 L 470 470 L 550 470" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green-2)" fill="none"/>
  <rect x="520" y="470" width="70" height="25" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="555" y="487" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#15803d">Local ✓</text>
  
  <!-- Server save -->
  <path d="M 500 430 L 580 430" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple-2)" fill="none"/>
  <rect x="580" y="415" width="70" height="30" rx="4" fill="#faf5ff" stroke="#7c3aed"/>
  <text x="615" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#6b21a8">Server</text>
  
  <!-- Retry scenario -->
  <path d="M 650 430 L 680 430" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-red)" fill="none"/>
  <text x="665" y="422" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#b91c1c">fail</text>
  
  <rect x="680" y="415" width="70" height="30" rx="4" fill="#fee2e2" stroke="#ef4444"/>
  <text x="715" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Retry 1s</text>
  
  <path d="M 750 430 L 780 430" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber-2)" fill="none"/>
  <rect x="780" y="415" width="70" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="815" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">Retry 2s</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-green-2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-purple-2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-amber-2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
