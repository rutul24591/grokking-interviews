<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Accessible Error Handling Flow</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Screen reader announcement, focus management, and error linking</text>
  
  <!-- Step 1: Form Submit -->
  <rect x="30" y="100" width="180" height="100" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2.5"/>
  <text x="120" y="140" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">1. Form Submit</text>
  <text x="120" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">User clicks Submit</text>
  <text x="120" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#0369a1">Validation runs</text>
  
  <!-- Arrow -->
  <path d="M 210 150 L 250 150" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
  <text x="230" y="142" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">errors found</text>
  
  <!-- Step 2: Announce -->
  <rect x="250" y="100" width="200" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="350" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">2. Announce to SR</text>
  <text x="350" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">role=&quot;alert&quot;</text>
  <text x="350" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#b45309">&quot;Form has 3 errors&quot;</text>
  
  <!-- Arrow -->
  <path d="M 450 150 L 490 150" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <!-- Step 3: Focus -->
  <rect x="490" y="100" width="200" height="100" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="590" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">3. Move Focus</text>
  <text x="590" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#7e22ce">focus() on 1st error</text>
  <text x="590" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#7e22ce">Scroll into view</text>
  
  <!-- Arrow -->
  <path d="M 690 150 L 730 150" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrow-purple)" fill="none"/>
  
  <!-- Step 4: Link -->
  <rect x="730" y="100" width="140" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.5"/>
  <text x="800" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">4. Link Errors</text>
  <text x="800" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">aria-describedby</text>
  <text x="800" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">Error announced</text>
  
  <!-- Visual Example -->
  <rect x="30" y="230" width="840" height="290" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Visual Implementation</text>
  
  <!-- Error Summary -->
  <rect x="50" y="280" width="800" height="70" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="2"/>
  <text x="80" y="310" text-anchor="start" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#b91c1c">⚠ Please correct 3 errors:</text>
  <text x="100" y="335" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">• Email address is invalid</text>
  <text x="300" y="335" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">• Password is required</text>
  <text x="520" y="335" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#b91c1c">• Phone number format invalid</text>
  
  <!-- Form Fields -->
  <rect x="50" y="365" width="800" height="140" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  
  <!-- Email field with error -->
  <text x="70" y="390" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#374151">Email Address *</text>
  <rect x="70" y="400" width="300" height="35" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <text x="85" y="422" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">user@example</text>
  <text x="70" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#ef4444">⚠ Please enter a valid email address</text>
  <text x="380" y="422" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#059669">aria-invalid=&quot;true&quot;</text>
  <text x="520" y="422" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#059669">aria-describedby=&quot;email-error&quot;</text>
  
  <!-- Password field with error -->
  <text x="450" y="390" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#374151">Password *</text>
  <rect x="450" y="400" width="300" height="35" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <text x="465" y="422" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">••••••••</text>
  <text x="450" y="445" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#ef4444">⚠ Password is required</text>
  
  <!-- Focus indicator -->
  <rect x="60" y="395" width="320" height="95" rx="8" fill="none" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="700" y="410" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#6b21a8">Focus moves here</text>
  <path d="M 700 425 L 650 440" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple-2)" fill="none"/>
  
  <!-- Screen Reader Output -->
  <rect x="50" y="520" width="800" height="50" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="80" y="545" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#22c55e">Screen Reader Announces:</text>
  <text x="280" y="545" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#e2e8f0">&quot;Form has 3 errors. Email Address, edit text, invalid entry. Please enter a valid email address.&quot;</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-purple-2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>
