<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Accessible Form Architecture</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Semantic HTML, ARIA, focus management, and screen reader support</text>
  
  <!-- Screen Reader Flow (Left) -->
  <rect x="30" y="100" width="280" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2.5"/>
  <text x="170" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#0c4a6e">Screen Reader Flow</text>
  
  <rect x="50" y="155" width="240" height="130" rx="6" fill="#ffffff" stroke="#bae6fd" stroke-width="1.5"/>
  
  <!-- Step 1 -->
  <rect x="65" y="170" width="210" height="25" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="80" y="187" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">1. Announces label</text>
  
  <!-- Step 2 -->
  <rect x="65" y="200" width="210" height="25" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="80" y="217" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">2. Announces field type</text>
  
  <!-- Step 3 -->
  <rect x="65" y="230" width="210" height="25" rx="4" fill="#f0f9ff" stroke="#0284c7"/>
  <text x="80" y="247" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">3. Announces requirements</text>
  
  <!-- Step 4 -->
  <rect x="65" y="260" width="210" height="25" rx="4" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="80" y="277" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#92400e">4. If invalid: announces error</text>
  
  <!-- Visual Form (Center) -->
  <rect x="330" y="100" width="280" height="200" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="2.5"/>
  <text x="470" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e293b">Visual Form Structure</text>
  
  <rect x="350" y="155" width="240" height="130" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  
  <!-- Label -->
  <rect x="365" y="170" width="80" height="20" rx="3" fill="#e2e8f0"/>
  <text x="405" y="184" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Label</text>
  
  <!-- Input -->
  <rect x="365" y="195" width="210" height="30" rx="4" fill="#ffffff" stroke="#0284c7" stroke-width="2"/>
  <text x="380" y="215" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">user@example.com</text>
  
  <!-- Error message -->
  <rect x="365" y="230" width="210" height="20" rx="3" fill="#fee2e2" stroke="#fca5a5"/>
  <text x="380" y="244" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">⚠ Please enter a valid email</text>
  
  <!-- ARIA indicators -->
  <text x="580" y="180" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#059669">aria-invalid=&quot;true&quot;</text>
  <text x="580" y="195" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#059669">aria-describedby=&quot;err&quot;</text>
  <text x="580" y="210" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#059669">role=&quot;alert&quot;</text>
  
  <!-- Keyboard Navigation (Right) -->
  <rect x="630" y="100" width="240" height="200" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="750" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#6b21a8">Keyboard Navigation</text>
  
  <rect x="650" y="155" width="200" height="130" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1.5"/>
  
  <!-- Tab order -->
  <circle cx="680" cy="180" r="15" fill="#7c3aed"/>
  <text x="680" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">1</text>
  <path d="M 695 180 L 725 180" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" fill="none"/>
  
  <circle cx="745" cy="180" r="15" fill="#7c3aed"/>
  <text x="745" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff">2</text>
  <path d="M 760 180 L 790 180" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-purple)" fill="none"/>
  
  <circle cx="810" cy="180" r="15" fill="#e9d5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="810" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#6b21a8">3</text>
  
  <text x="750" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Tab = Next field</text>
  <text x="750" y="240" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Shift+Tab = Previous</text>
  <text x="750" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6b21a8">Enter/Space = Activate</text>
  
  <!-- Focus Management (Bottom Left) -->
  <rect x="30" y="320" width="420" height="200" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="240" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#92400e">Focus Management on Error</text>
  
  <rect x="50" y="370" width="380" height="135" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1.5"/>
  
  <!-- Focus flow -->
  <rect x="65" y="385" width="100" height="40" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="115" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#b91c1c">Form Submit</text>
  <text x="115" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">with errors</text>
  
  <path d="M 165 405 L 195 405" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" fill="none"/>
  
  <rect x="195" y="385" width="110" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="250" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#92400e">Announce</text>
  <text x="250" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#92400e">&quot;3 errors&quot;</text>
  
  <path d="M 305 405 L 335 405" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber)" fill="none"/>
  
  <rect x="335" y="385" width="80" height="40" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="375" y="405" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#166534">Focus</text>
  <text x="375" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#166534">1st error</text>
  
  <!-- Error summary -->
  <rect x="65" y="440" width="350" height="55" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
  <text x="80" y="460" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#b91c1c">Error Summary:</text>
  <text x="80" y="478" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">• Email is invalid</text>
  <text x="200" y="478" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">• Password required</text>
  <text x="320" y="478" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">• Phone invalid</text>
  
  <!-- WCAG Checklist (Bottom Right) -->
  <rect x="470" y="320" width="400" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.5"/>
  <text x="670" y="350" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#166534">WCAG 2.1 Form Checklist</text>
  
  <rect x="490" y="370" width="360" height="135" rx="6" fill="#ffffff" stroke="#dcfce7" stroke-width="1.5"/>
  
  <text x="510" y="395" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Every input has a visible label</text>
  <text x="510" y="415" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Error messages linked via aria-describedby</text>
  <text x="510" y="435" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Focus moves to first error on submit</text>
  <text x="510" y="455" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Errors announced to screen readers</text>
  <text x="510" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Keyboard accessible (Tab navigation)</text>
  <text x="510" y="495" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Visible focus indicators</text>
  <text x="510" y="515" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#15803d">✓ Color not sole indicator of errors</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
