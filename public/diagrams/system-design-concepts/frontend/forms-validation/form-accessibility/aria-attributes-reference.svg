<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="600" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">ARIA Attributes for Accessible Forms</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">Essential ARIA attributes and their usage in form elements</text>
  
  <!-- Input with aria-invalid -->
  <rect x="30" y="100" width="270" height="120" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="165" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#b91c1c">aria-invalid</text>
  <rect x="50" y="145" width="230" height="35" rx="4" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <text x="65" y="168" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Email address</text>
  <text x="50" y="195" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#b91c1c">aria-invalid="true"</text>
  <text x="50" y="210" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Indicates field has validation error</text>
  
  <!-- Input with aria-describedby -->
  <rect x="315" y="100" width="270" height="120" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="450" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#15803d">aria-describedby</text>
  <rect x="335" y="145" width="230" height="35" rx="4" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <text x="350" y="168" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Password</text>
  <text x="335" y="195" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#15803d">aria-describedby="pwd-help"</text>
  <text x="335" y="210" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#15803d">Links to help text or error message</text>
  
  <!-- Input with aria-required -->
  <rect x="600" y="100" width="270" height="120" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="735" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">aria-required</text>
  <rect x="620" y="145" width="230" height="35" rx="4" fill="#ffffff" stroke="#0284c7" stroke-width="2"/>
  <text x="635" y="168" text-anchor="start" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">Phone number *</text>
  <text x="620" y="195" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#0c4a6e">aria-required="true"</text>
  <text x="620" y="210" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#0c4a6e">Indicates field must be filled</text>
  
  <!-- aria-live regions -->
  <rect x="30" y="240" width="400" height="140" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="230" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">aria-live (Dynamic Announcements)</text>
  
  <rect x="50" y="290" width="360" height="75" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="70" y="315" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">&lt;div aria-live="polite"&gt;</text>
  <text x="85" y="332" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Password strength: Medium</text>
  <text x="70" y="355" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#6b21a8">&lt;/div&gt;</text>
  
  <text x="70" y="375" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#6b21a8">polite:</text>
  <text x="120" y="375" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Announces when screen reader is idle</text>
  <text x="70" y="392" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#6b21a8">assertive:</text>
  <text x="140" y="392" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Interrupts current announcement (use for errors)</text>
  
  <!-- role="alert" -->
  <rect x="445" y="240" width="220" height="140" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="555" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#b91c1c">role="alert"</text>
  
  <rect x="465" y="290" width="180" height="75" rx="6" fill="#ffffff" stroke="#fecaca" stroke-width="1.5"/>
  <text x="480" y="315" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#b91c1c">&lt;div role="alert"&gt;</text>
  <text x="495" y="332" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">⚠ Invalid email format</text>
  <text x="480" y="355" text-anchor="start" font-family="monospace, sans-serif" font-size="9" fill="#b91c1c">&lt;/div&gt;</text>
  
  <text x="555" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#b91c1c">Immediately announces error messages</text>
  
  <!-- aria-expanded -->
  <rect x="680" y="240" width="190" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="775" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">aria-expanded</text>
  
  <rect x="700" y="290" width="150" height="75" rx="6" fill="#ffffff" stroke="#fde68a" stroke-width="1.5"/>
  <text x="715" y="315" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#92400e">button:</text>
  <text x="715" y="332" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#92400e">aria-expanded="true"</text>
  <text x="715" y="349" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#b45309">For dropdowns, accordions</text>
  
  <!-- Focus management -->
  <rect x="30" y="400" width="280" height="170" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="170" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Focus Management</text>
  
  <rect x="50" y="445" width="240" height="110" rx="6" fill="#ffffff" stroke="#dcfce7" stroke-width="1.5"/>
  <text x="70" y="470" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#15803d">On Error:</text>
  <text x="70" y="490" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475569">1. Move focus to first error field</text>
  <text x="70" y="507" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475569">2. Announce error count</text>
  <text x="70" y="524" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475569">3. Ensure error is visible</text>
  <text x="70" y="545" text-anchor="start" font-family="monospace, sans-serif" font-size="8" fill="#15803d">errorField.focus()</text>
  
  <!-- Keyboard navigation -->
  <rect x="325" y="400" width="280" height="170" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="465" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">Keyboard Navigation</text>
  
  <rect x="345" y="445" width="240" height="110" rx="6" fill="#ffffff" stroke="#bae6fd" stroke-width="1.5"/>
  <text x="365" y="470" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#0369a1">Essential Keys:</text>
  <text x="365" y="490" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Tab / Shift+Tab: Navigate fields</text>
  <text x="365" y="507" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Enter / Space: Activate buttons</text>
  <text x="365" y="524" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Arrow keys: Navigate options</text>
  <text x="365" y="545" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#475569">Escape: Close dropdowns</text>
  
  <!-- Screen reader flow -->
  <rect x="620" y="400" width="250" height="170" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="745" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#6b21a8">Screen Reader Flow</text>
  
  <rect x="640" y="445" width="210" height="110" rx="6" fill="#ffffff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="655" y="470" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#6b21a8">What users hear:</text>
  <text x="655" y="492" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#475569">"Email address, edit text,</text>
  <text x="655" y="507" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#475569">required, invalid entry,</text>
  <text x="655" y="522" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#475569">please enter a valid email"</text>
  <text x="655" y="545" text-anchor="start" font-family="system-ui, sans-serif" font-size="8" fill="#6b21a8">Label + type + required + error</text>
  
  <!-- Bottom note -->
  <rect x="30" y="580" width="840" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Best Practice: Use native HTML elements when possible — they have built-in accessibility. Use ARIA only when native elements cannot meet requirements.</text>
</svg>
