<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a1a2e">Chunked Upload Flow</text>
  <text x="450" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#64748b">File splitting, parallel upload, and server reassembly</text>
  
  <!-- Step 1: File Splitting -->
  <rect x="30" y="100" width="200" height="140" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2.5"/>
  <text x="130" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#0c4a6e">1. File Splitting</text>
  
  <!-- File visualization -->
  <rect x="50" y="155" width="160" height="70" rx="6" fill="#ffffff" stroke="#0284c7" stroke-width="1.5"/>
  <rect x="60" y="165" width="140" height="12" rx="2" fill="#0284c7" opacity="0.3"/>
  <text x="130" y="174" text-anchor="middle" font-family="monospace, sans-serif" font-size="8" fill="#0369a1">Chunk 1 (5MB)</text>
  <rect x="60" y="180" width="140" height="12" rx="2" fill="#0284c7" opacity="0.5"/>
  <text x="130" y="189" text-anchor="middle" font-family="monospace, sans-serif" font-size="8" fill="#0369a1">Chunk 2 (5MB)</text>
  <rect x="60" y="195" width="140" height="12" rx="2" fill="#0284c7" opacity="0.7"/>
  <text x="130" y="204" text-anchor="middle" font-family="monospace, sans-serif" font-size="8" fill="#0369a1">Chunk 3 (5MB)</text>
  <text x="130" y="218" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">...</text>
  
  <text x="130" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0369a1">File: 50MB → 10 chunks</text>
  
  <!-- Arrow to Step 2 -->
  <path d="M 230 170 L 280 170" stroke="#0284c7" stroke-width="2.5" marker-end="url(#arrow-blue-1)" fill="none"/>
  
  <!-- Step 2: Parallel Upload -->
  <rect x="280" y="100" width="280" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2.5"/>
  <text x="420" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#92400e">2. Parallel Upload</text>
  
  <!-- Concurrent uploads -->
  <rect x="300" y="155" width="240" height="70" rx="6" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  
  <!-- Upload streams -->
  <path d="M 315 170 L 380 170" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber-1)" fill="none"/>
  <rect x="380" y="162" width="50" height="16" rx="3" fill="#f59e0b" opacity="0.3"/>
  <text x="405" y="173" text-anchor="middle" font-family="monospace, sans-serif" font-size="7" fill="#92400e">Chunk 1</text>
  
  <path d="M 315 190 L 380 190" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber-2)" fill="none"/>
  <rect x="380" y="182" width="50" height="16" rx="3" fill="#f59e0b" opacity="0.5"/>
  <text x="405" y="193" text-anchor="middle" font-family="monospace, sans-serif" font-size="7" fill="#92400e">Chunk 2</text>
  
  <path d="M 315 210 L 380 210" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber-3)" fill="none"/>
  <rect x="380" y="202" width="50" height="16" rx="3" fill="#f59e0b" opacity="0.7"/>
  <text x="405" y="213" text-anchor="middle" font-family="monospace, sans-serif" font-size="7" fill="#92400e">Chunk 3</text>
  
  <text x="460" y="180" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Concurrent:</text>
  <text x="460" y="195" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">3-5 streams</text>
  <text x="460" y="210" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#b45309">Retry failed</text>
  
  <!-- Arrow to Step 3 -->
  <path d="M 560 170 L 610 170" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-amber-4)" fill="none"/>
  
  <!-- Step 3: Server Reassembly -->
  <rect x="610" y="100" width="260" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2.5"/>
  <text x="740" y="135" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">3. Server Reassembly</text>
  
  <!-- Reassembly visualization -->
  <rect x="630" y="155" width="220" height="70" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  
  <!-- Chunks coming together -->
  <rect x="645" y="165" width="40" height="12" rx="2" fill="#22c55e" opacity="0.3"/>
  <text x="665" y="174" text-anchor="middle" font-family="monospace, sans-serif" font-size="7" fill="#15803d">1</text>
  <rect x="687" y="165" width="40" height="12" rx="2" fill="#22c55e" opacity="0.5"/>
  <text x="707" y="174" text-anchor="middle" font-family="monospace, sans-serif" font-size="7" fill="#15803d">2</text>
  <rect x="729" y="165" width="40" height="12" rx="2" fill="#22c55e" opacity="0.7"/>
  <text x="749" y="174" text-anchor="middle" font-family="monospace, sans-serif" font-size="7" fill="#15803d">3</text>
  <text x="785" y="174" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">...</text>
  <rect x="800" y="165" width="40" height="12" rx="2" fill="#22c55e" opacity="1"/>
  <text x="820" y="174" text-anchor="middle" font-family="monospace, sans-serif" font-size="7" fill="#15803d">10</text>
  
  <path d="M 740 185 L 740 200" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green-1)" fill="none"/>
  <rect x="680" y="200" width="120" height="20" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="740" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#166534">Complete File</text>
  
  <!-- Progress tracking below -->
  <rect x="30" y="260" width="840" height="100" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="450" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b">Progress Tracking</text>
  
  <!-- Progress bars -->
  <rect x="60" y="305" width="200" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="160" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#475569">Per-Chunk</text>
  <rect x="80" y="330" width="160" height="8" rx="2" fill="#e2e8f0"/>
  <rect x="80" y="330" width="120" height="8" rx="2" fill="#22c55e"/>
  <text x="250" y="337" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">75%</text>
  
  <rect x="320" y="305" width="200" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="420" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#475569">Overall</text>
  <rect x="340" y="330" width="160" height="8" rx="2" fill="#e2e8f0"/>
  <rect x="340" y="330" width="100" height="8" rx="2" fill="#0284c7"/>
  <text x="510" y="337" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">62%</text>
  
  <rect x="580" y="305" width="270" height="40" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="715" y="320" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#475569">ETA Calculation</text>
  <text x="600" y="337" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Speed: 2.5 MB/s</text>
  <text x="720" y="337" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Remaining: 15s</text>
  
  <!-- Retry logic -->
  <rect x="30" y="380" width="400" height="140" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="230" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#991b1b">Retry Logic</text>
  
  <rect x="50" y="430" width="360" height="75" rx="6" fill="#ffffff" stroke="#fee2e2" stroke-width="1.5"/>
  <text x="70" y="455" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#991b1b">Exponential Backoff:</text>
  <text x="70" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Attempt 1: Fail → Wait 1s</text>
  <text x="70" y="492" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Attempt 2: Fail → Wait 2s</text>
  <text x="70" y="509" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">Attempt 3: Fail → Wait 4s → Give up</text>
  
  <!-- Resume capability -->
  <rect x="450" y="380" width="420" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="660" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#166534">Resume Capability</text>
  
  <rect x="470" y="430" width="380" height="75" rx="6" fill="#ffffff" stroke="#dcfce7" stroke-width="1.5"/>
  <text x="490" y="455" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#166534">After Connection Loss:</text>
  <text x="490" y="475" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">1. Query server for received chunks</text>
  <text x="490" y="492" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">2. Skip already uploaded chunks</text>
  <text x="490" y="509" text-anchor="start" font-family="system-ui, sans-serif" font-size="10" fill="#475569">3. Resume from first missing chunk</text>
  
  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow-blue-1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber-1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-amber-2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-amber-3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-amber-4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green-1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
