<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">Browser Storage Quota Breakdown</text>

  <!-- Total Disk -->
  <rect x="30" y="55" width="840" height="70" rx="8" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="35" y="60" width="130" height="24" rx="4" fill="#6d5bd0"/>
  <text x="100" y="77" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Total Disk</text>
  <text x="450" y="82" text-anchor="middle" font-size="13" fill="#1a1822">e.g., 500 GB total disk space</text>
  <text x="450" y="102" text-anchor="middle" font-size="11" fill="#6d5bd0">Browser allocates a percentage for all web storage</text>

  <!-- Arrow down -->
  <polygon points="450,128 440,138 460,138" fill="#6d5bd0"/>
  <line x1="450" y1="125" x2="450" y2="138" stroke="#6d5bd0" stroke-width="2"/>

  <!-- Browser's Share -->
  <rect x="80" y="142" width="740" height="65" rx="8" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <rect x="85" y="147" width="200" height="24" rx="4" fill="#6d5bd0" opacity="0.85"/>
  <text x="185" y="164" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Browser's Storage Pool</text>
  <text x="540" y="167" text-anchor="middle" font-size="11" fill="#1a1822">Chrome: ~60% of disk | Firefox: ~50% of disk | Safari: starts at ~1 GB, prompts for more</text>
  <text x="540" y="185" text-anchor="middle" font-size="10" fill="#6d5bd0">Shared across ALL origins the browser manages</text>

  <!-- Arrow down -->
  <polygon points="450,210 440,220 460,220" fill="#6d5bd0"/>
  <line x1="450" y1="207" x2="450" y2="220" stroke="#6d5bd0" stroke-width="2"/>

  <!-- Per-Origin Quota Box -->
  <rect x="30" y="225" width="520" height="260" rx="8" fill="white" stroke="#2f9d74" stroke-width="2"/>
  <rect x="35" y="230" width="250" height="24" rx="4" fill="#2f9d74"/>
  <text x="160" y="247" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Per-Origin Shared Quota Pool</text>
  <text x="290" y="270" text-anchor="middle" font-size="11" fill="#2f9d74" font-weight="600">navigator.storage.estimate() reports this pool</text>

  <!-- IndexedDB -->
  <rect x="50" y="288" width="145" height="55" rx="6" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="122" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">IndexedDB</text>
  <text x="122" y="328" text-anchor="middle" font-size="9" fill="#1a1822">Structured data</text>

  <!-- Cache API -->
  <rect x="210" y="288" width="145" height="55" rx="6" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="282" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">Cache API</text>
  <text x="282" y="328" text-anchor="middle" font-size="9" fill="#1a1822">Request/Response pairs</text>

  <!-- OPFS -->
  <rect x="370" y="288" width="160" height="55" rx="6" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="#6d5bd0">OPFS</text>
  <text x="450" y="328" text-anchor="middle" font-size="9" fill="#1a1822">Origin Private File System</text>

  <!-- Shared pool note -->
  <rect x="50" y="358" width="480" height="40" rx="6" fill="#2f9d74" opacity="0.1" stroke="#2f9d74" stroke-width="1"/>
  <text x="290" y="376" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">All three APIs draw from the SAME quota pool</text>
  <text x="290" y="390" text-anchor="middle" font-size="9" fill="#2f9d74">Writing to one reduces available space for the others</text>

  <!-- Usage bar visualization -->
  <rect x="50" y="410" width="480" height="20" rx="4" fill="#e0dce8"/>
  <rect x="50" y="410" width="180" height="20" rx="4" fill="#6d5bd0" opacity="0.7"/>
  <rect x="230" y="410" width="120" height="20" fill="#2f9d74" opacity="0.7"/>
  <rect x="350" y="410" width="60" height="20" fill="#d97843" opacity="0.7"/>
  <text x="140" y="424" text-anchor="middle" font-size="9" font-weight="bold" fill="white">IndexedDB</text>
  <text x="290" y="424" text-anchor="middle" font-size="9" font-weight="bold" fill="white">Cache API</text>
  <text x="380" y="424" text-anchor="middle" font-size="9" font-weight="bold" fill="white">OPFS</text>
  <text x="470" y="424" text-anchor="middle" font-size="9" fill="#1a1822">Free</text>

  <text x="290" y="462" text-anchor="middle" font-size="10" fill="#1a1822">{ quota: 300000000, usage: 120000000 }</text>
  <text x="290" y="476" text-anchor="middle" font-size="9" fill="#6d5bd0">navigator.storage.estimate() response</text>

  <!-- localStorage Separate Box -->
  <rect x="580" y="225" width="290" height="260" rx="8" fill="white" stroke="#d97843" stroke-width="2"/>
  <rect x="585" y="230" width="200" height="24" rx="4" fill="#d97843"/>
  <text x="685" y="247" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Separate Fixed Limit</text>

  <!-- localStorage -->
  <rect x="605" y="275" width="240" height="65" rx="6" fill="#edeaf5" stroke="#d97843" stroke-width="1.5"/>
  <text x="725" y="298" text-anchor="middle" font-size="13" font-weight="bold" fill="#d97843">localStorage</text>
  <text x="725" y="318" text-anchor="middle" font-size="11" fill="#1a1822">Fixed 5-10 MB per origin</text>

  <!-- sessionStorage -->
  <rect x="605" y="355" width="240" height="55" rx="6" fill="#edeaf5" stroke="#d97843" stroke-width="1.5"/>
  <text x="725" y="375" text-anchor="middle" font-size="13" font-weight="bold" fill="#d97843">sessionStorage</text>
  <text x="725" y="395" text-anchor="middle" font-size="11" fill="#1a1822">Fixed 5-10 MB per tab</text>

  <rect x="605" y="425" width="240" height="45" rx="6" fill="#d97843" opacity="0.1" stroke="#d97843" stroke-width="1"/>
  <text x="725" y="445" text-anchor="middle" font-size="10" fill="#d97843" font-weight="600">NOT part of origin quota pool</text>
  <text x="725" y="460" text-anchor="middle" font-size="9" fill="#d97843">Synchronous API, separate limits</text>
</svg>