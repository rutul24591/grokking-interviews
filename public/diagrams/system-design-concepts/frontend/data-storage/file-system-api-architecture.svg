<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1822">File System Access API — Two Access Paths</text>

  <!-- Divider line -->
  <line x1="450" y1="50" x2="450" y2="480" stroke="#c8c3d6" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- LEFT PATH: User's File System -->
  <rect x="30" y="50" width="400" height="30" rx="8" fill="#6d5bd0"/>
  <text x="230" y="70" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">User's File System (Picker APIs)</text>

  <!-- Step 1L: User Action -->
  <rect x="130" y="100" width="200" height="44" rx="8" fill="#6d5bd0" stroke="#5a4bb0" stroke-width="1.5"/>
  <text x="230" y="118" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">showOpenFilePicker()</text>
  <text x="230" y="134" text-anchor="middle" font-size="9" fill="#e8e4f3">showSaveFilePicker() / showDirectoryPicker()</text>

  <line x1="230" y1="144" x2="230" y2="168" stroke="#1a1822" stroke-width="1.5" marker-end="url(#fsArr)"/>

  <!-- Step 2L: Permission -->
  <rect x="130" y="168" width="200" height="44" rx="8" fill="#d97843" stroke="#c06a38" stroke-width="1.5"/>
  <text x="230" y="186" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Browser Permission Prompt</text>
  <text x="230" y="202" text-anchor="middle" font-size="9" fill="#fef3ec">User must grant access</text>

  <line x1="230" y1="212" x2="230" y2="236" stroke="#1a1822" stroke-width="1.5" marker-end="url(#fsArr)"/>

  <!-- Step 3L: Handle -->
  <rect x="130" y="236" width="200" height="44" rx="8" fill="#2f9d74" stroke="#278562" stroke-width="1.5"/>
  <text x="230" y="254" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">FileSystemFileHandle</text>
  <text x="230" y="270" text-anchor="middle" font-size="9" fill="#e6f5ef">or FileSystemDirectoryHandle</text>

  <line x1="230" y1="280" x2="230" y2="304" stroke="#1a1822" stroke-width="1.5" marker-end="url(#fsArr)"/>

  <!-- Step 4L: Read/Write -->
  <rect x="130" y="304" width="200" height="44" rx="8" fill="#6d5bd0" stroke="#5a4bb0" stroke-width="1.5"/>
  <text x="230" y="322" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Read / Write Real Files</text>
  <text x="230" y="338" text-anchor="middle" font-size="9" fill="#e8e4f3">getFile() / createWritable()</text>

  <!-- Left callout -->
  <rect x="60" y="370" width="340" height="50" rx="6" fill="#fff" stroke="#d97843" stroke-width="1.2"/>
  <text x="230" y="390" text-anchor="middle" font-size="10" fill="#d97843" font-weight="600">Accesses actual files on user's disk</text>
  <text x="230" y="406" text-anchor="middle" font-size="9" fill="#555">Requires user gesture + permission grant each session</text>

  <!-- Left icon label -->
  <rect x="60" y="440" width="340" height="36" rx="6" fill="#edeaf5" stroke="#6d5bd0" stroke-width="1"/>
  <text x="230" y="463" text-anchor="middle" font-size="10" fill="#6d5bd0" font-weight="600">Chromium-only (Chrome 86+, Edge, Opera)</text>

  <!-- RIGHT PATH: OPFS -->
  <rect x="470" y="50" width="400" height="30" rx="8" fill="#2f9d74"/>
  <text x="670" y="70" text-anchor="middle" font-size="13" fill="#fff" font-weight="700">Origin Private File System (OPFS)</text>

  <!-- Step 1R -->
  <rect x="570" y="100" width="200" height="44" rx="8" fill="#2f9d74" stroke="#278562" stroke-width="1.5"/>
  <text x="670" y="118" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">navigator.storage</text>
  <text x="670" y="134" text-anchor="middle" font-size="9" fill="#e6f5ef">.getDirectory()</text>

  <line x1="670" y1="144" x2="670" y2="168" stroke="#1a1822" stroke-width="1.5" marker-end="url(#fsArr)"/>

  <!-- Step 2R: No prompt -->
  <rect x="570" y="168" width="200" height="44" rx="8" fill="#2f9d74" stroke="#278562" stroke-width="1.5"/>
  <text x="670" y="186" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">No User Prompt Needed</text>
  <text x="670" y="202" text-anchor="middle" font-size="9" fill="#e6f5ef">Origin-scoped, automatic access</text>

  <line x1="670" y1="212" x2="670" y2="236" stroke="#1a1822" stroke-width="1.5" marker-end="url(#fsArr)"/>

  <!-- Step 3R: Virtual FS -->
  <rect x="570" y="236" width="200" height="44" rx="8" fill="#6d5bd0" stroke="#5a4bb0" stroke-width="1.5"/>
  <text x="670" y="254" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Sandboxed Virtual FS</text>
  <text x="670" y="270" text-anchor="middle" font-size="9" fill="#e8e4f3">Invisible to user, browser-managed</text>

  <line x1="670" y1="280" x2="670" y2="304" stroke="#1a1822" stroke-width="1.5" marker-end="url(#fsArr)"/>

  <!-- Step 4R: High Perf -->
  <rect x="570" y="304" width="200" height="44" rx="8" fill="#d97843" stroke="#c06a38" stroke-width="1.5"/>
  <text x="670" y="322" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">High-Performance I/O</text>
  <text x="670" y="338" text-anchor="middle" font-size="9" fill="#fef3ec">Sync access in Web Workers</text>

  <!-- Right callout -->
  <rect x="500" y="370" width="340" height="50" rx="6" fill="#fff" stroke="#2f9d74" stroke-width="1.2"/>
  <text x="670" y="390" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">Private to origin, not visible in OS file explorer</text>
  <text x="670" y="406" text-anchor="middle" font-size="9" fill="#555">Ideal for app data: SQLite DBs, caches, temp files</text>

  <!-- Right icon label -->
  <rect x="500" y="440" width="340" height="36" rx="6" fill="#edeaf5" stroke="#2f9d74" stroke-width="1"/>
  <text x="670" y="463" text-anchor="middle" font-size="10" fill="#2f9d74" font-weight="600">Cross-browser: Chrome, Firefox, Safari (partial)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="fsArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a1822"/>
    </marker>
  </defs>
</svg>