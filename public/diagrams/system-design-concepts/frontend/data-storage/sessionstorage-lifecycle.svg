<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">sessionStorage Lifecycle</text>

  <!-- Timeline axis -->
  <line x1="60" y1="100" x2="840" y2="100" stroke="#6d5bd0" stroke-width="2.5"/>
  <polygon points="840,95 855,100 840,105" fill="#6d5bd0"/>
  <text x="870" y="105" font-size="10" fill="#666">time</text>

  <!-- Step 1: Tab Opens -->
  <circle cx="100" cy="100" r="8" fill="#6d5bd0"/>
  <rect x="55" y="115" width="90" height="55" rx="8" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <text x="100" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="#6d5bd0">Tab Opens</text>
  <text x="100" y="150" text-anchor="middle" font-size="9" fill="#1a1822">Storage created</text>
  <text x="100" y="162" text-anchor="middle" font-size="9" fill="#666">(empty)</text>

  <!-- Step 2: Write data -->
  <circle cx="230" cy="100" r="8" fill="#6d5bd0"/>
  <rect x="180" y="115" width="100" height="55" rx="8" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <text x="230" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="#6d5bd0">Write Data</text>
  <text x="230" y="150" text-anchor="middle" font-size="9" fill="#1a1822">setItem() calls</text>
  <text x="230" y="162" text-anchor="middle" font-size="9" fill="#666">sync &amp; blocking</text>

  <!-- Step 3: Navigate within tab -->
  <circle cx="370" cy="100" r="8" fill="#2f9d74"/>
  <rect x="310" y="115" width="120" height="55" rx="8" fill="white" stroke="#2f9d74" stroke-width="2"/>
  <text x="370" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="#2f9d74">Navigate</text>
  <text x="370" y="150" text-anchor="middle" font-size="9" fill="#1a1822">/page-a to /page-b</text>
  <text x="370" y="162" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="600">Data persists!</text>

  <!-- Step 4: Refresh -->
  <circle cx="510" cy="100" r="8" fill="#2f9d74"/>
  <rect x="455" y="115" width="110" height="55" rx="8" fill="white" stroke="#2f9d74" stroke-width="2"/>
  <text x="510" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="#2f9d74">Refresh (F5)</text>
  <text x="510" y="150" text-anchor="middle" font-size="9" fill="#1a1822">Full page reload</text>
  <text x="510" y="162" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="600">Data persists!</text>

  <!-- Step 5: Crash recovery -->
  <circle cx="650" cy="100" r="8" fill="#d97843"/>
  <rect x="592" y="115" width="116" height="55" rx="8" fill="white" stroke="#d97843" stroke-width="2"/>
  <text x="650" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="#d97843">Crash/Restore</text>
  <text x="650" y="150" text-anchor="middle" font-size="9" fill="#1a1822">Browser recovers</text>
  <text x="650" y="162" text-anchor="middle" font-size="9" fill="#d97843" font-weight="600">Data restored!</text>

  <!-- Step 6: Tab closes -->
  <circle cx="800" cy="100" r="8" fill="#d44" />
  <rect x="745" y="115" width="110" height="55" rx="8" fill="white" stroke="#d44" stroke-width="2"/>
  <text x="800" y="135" text-anchor="middle" font-size="10" font-weight="bold" fill="#d44">Tab Closes</text>
  <text x="800" y="150" text-anchor="middle" font-size="9" fill="#1a1822">User closes tab</text>
  <text x="800" y="162" text-anchor="middle" font-size="9" fill="#d44" font-weight="600">Data destroyed</text>

  <!-- Persistence bar -->
  <rect x="80" y="195" width="700" height="20" rx="6" fill="#2f9d74" opacity="0.2"/>
  <rect x="80" y="195" width="700" height="20" rx="6" fill="none" stroke="#2f9d74" stroke-width="1.5"/>
  <text x="430" y="209" text-anchor="middle" font-size="10" font-weight="bold" fill="#2f9d74">Data Available</text>

  <rect x="780" y="195" width="50" height="20" rx="6" fill="#d44" opacity="0.15"/>
  <rect x="780" y="195" width="50" height="20" rx="6" fill="none" stroke="#d44" stroke-width="1.5"/>
  <text x="805" y="209" text-anchor="middle" font-size="8" font-weight="bold" fill="#d44">Gone</text>

  <!-- Duplicate tab scenario -->
  <text x="450" y="260" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1822">Duplicate Tab Scenario</text>

  <!-- Original tab -->
  <rect x="60" y="280" width="300" height="80" rx="8" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <text x="210" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#6d5bd0">Original Tab</text>
  <text x="210" y="325" text-anchor="middle" font-size="10" fill="#1a1822">sessionStorage: { step: "3", token: "abc" }</text>
  <text x="210" y="345" text-anchor="middle" font-size="10" fill="#666">Continues independently</text>

  <!-- Arrow for duplicate -->
  <line x1="360" y1="320" x2="530" y2="320" stroke="#d97843" stroke-width="2" marker-end="url(#arrOrange)"/>
  <text x="445" y="310" text-anchor="middle" font-size="10" font-weight="bold" fill="#d97843">Ctrl+Shift+T / Duplicate</text>
  <text x="445" y="340" text-anchor="middle" font-size="9" fill="#d97843">Snapshot copy at this moment</text>

  <!-- Duplicated tab -->
  <rect x="530" y="280" width="310" height="80" rx="8" fill="white" stroke="#d97843" stroke-width="2"/>
  <text x="685" y="305" text-anchor="middle" font-size="12" font-weight="bold" fill="#d97843">Duplicated Tab</text>
  <text x="685" y="325" text-anchor="middle" font-size="10" fill="#1a1822">sessionStorage: { step: "3", token: "abc" }</text>
  <text x="685" y="345" text-anchor="middle" font-size="10" fill="#d97843">Own copy -- changes don't propagate back</text>

  <!-- Key takeaways -->
  <rect x="60" y="390" width="780" height="95" rx="8" fill="white" stroke="#e0dce8" stroke-width="1"/>
  <text x="450" y="415" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1822">Key Takeaways</text>

  <circle cx="110" cy="440" r="5" fill="#2f9d74"/>
  <text x="125" y="444" font-size="11" fill="#1a1822">Navigation &amp; refresh within the same tab preserve data</text>

  <circle cx="110" cy="462" r="5" fill="#d97843"/>
  <text x="125" y="466" font-size="11" fill="#1a1822">Browser crash recovery restores sessionStorage (spec-defined behavior)</text>

  <circle cx="500" cy="440" r="5" fill="#d44"/>
  <text x="515" y="444" font-size="11" fill="#1a1822">Closing the tab is permanent deletion</text>

  <circle cx="500" cy="462" r="5" fill="#6d5bd0"/>
  <text x="515" y="466" font-size="11" fill="#1a1822">Duplicate tab creates a one-time snapshot</text>

  <defs>
    <marker id="arrOrange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#d97843"/></marker>
  </defs>
</svg>