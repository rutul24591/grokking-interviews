<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8" rx="8"/>

  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1822">Cookie Request-Response Flow</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#666">How cookies travel between browser and server on every request</text>

  <!-- Browser -->
  <rect x="50" y="80" width="240" height="380" rx="8" fill="white" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="50" y="80" width="240" height="36" rx="8" fill="#6d5bd0"/>
  <rect x="50" y="108" width="240" height="8" fill="#6d5bd0"/>
  <text x="170" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Browser</text>

  <!-- Cookie Jar -->
  <rect x="70" y="130" width="200" height="30" rx="6" fill="#edeaf5"/>
  <text x="170" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#6d5bd0">Cookie Jar</text>

  <rect x="80" y="170" width="180" height="22" rx="4" fill="white" stroke="#6d5bd0" stroke-width="1"/>
  <text x="90" y="185" font-size="9" fill="#1a1822">__Host-session=abc123</text>
  <rect x="80" y="196" width="180" height="22" rx="4" fill="white" stroke="#6d5bd0" stroke-width="1"/>
  <text x="90" y="211" font-size="9" fill="#1a1822">csrf_token=xyz789</text>
  <rect x="80" y="222" width="180" height="22" rx="4" fill="white" stroke="#6d5bd0" stroke-width="1"/>
  <text x="90" y="237" font-size="9" fill="#1a1822">theme=dark</text>

  <!-- Cookie Attributes Legend -->
  <rect x="70" y="260" width="200" height="110" rx="6" fill="#edeaf5"/>
  <text x="170" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Security Attributes</text>

  <circle cx="85" cy="296" r="5" fill="#2f9d74"/>
  <text x="96" y="300" font-size="9" fill="#1a1822">HttpOnly - JS cannot access</text>

  <circle cx="85" cy="316" r="5" fill="#2f9d74"/>
  <text x="96" y="320" font-size="9" fill="#1a1822">Secure - HTTPS only</text>

  <circle cx="85" cy="336" r="5" fill="#d97843"/>
  <text x="96" y="340" font-size="9" fill="#1a1822">SameSite - cross-site rules</text>

  <circle cx="85" cy="356" r="5" fill="#6d5bd0"/>
  <text x="96" y="360" font-size="9" fill="#1a1822">__Host- prefix - locked to host</text>

  <!-- document.cookie blocked -->
  <rect x="70" y="385" width="200" height="32" rx="6" fill="#fff0f0" stroke="#d94343" stroke-width="1"/>
  <text x="170" y="405" text-anchor="middle" font-size="9" fill="#d94343" font-weight="600">document.cookie BLOCKED (HttpOnly)</text>

  <!-- JS access note -->
  <rect x="70" y="422" width="200" height="28" rx="6" fill="#f0fff4" stroke="#2f9d74" stroke-width="1"/>
  <text x="170" y="440" text-anchor="middle" font-size="9" fill="#2f9d74" font-weight="600">csrf_token, theme: JS can read</text>

  <!-- Server -->
  <rect x="610" y="80" width="240" height="260" rx="8" fill="white" stroke="#2f9d74" stroke-width="2"/>
  <rect x="610" y="80" width="240" height="36" rx="8" fill="#2f9d74"/>
  <rect x="610" y="108" width="240" height="8" fill="#2f9d74"/>
  <text x="730" y="103" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Server</text>

  <rect x="630" y="130" width="200" height="30" rx="6" fill="#e6f7ef"/>
  <text x="730" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#2f9d74">Reads Cookie Header</text>

  <rect x="640" y="170" width="180" height="22" rx="4" fill="white" stroke="#2f9d74" stroke-width="1"/>
  <text x="650" y="185" font-size="9" fill="#1a1822">Validate session ID</text>
  <rect x="640" y="196" width="180" height="22" rx="4" fill="white" stroke="#2f9d74" stroke-width="1"/>
  <text x="650" y="211" font-size="9" fill="#1a1822">Check CSRF token</text>
  <rect x="640" y="222" width="180" height="22" rx="4" fill="white" stroke="#2f9d74" stroke-width="1"/>
  <text x="650" y="237" font-size="9" fill="#1a1822">Apply personalization</text>

  <!-- Set-Cookie Response -->
  <rect x="630" y="260" width="200" height="30" rx="6" fill="#e6f7ef"/>
  <text x="730" y="280" text-anchor="middle" font-size="11" font-weight="600" fill="#2f9d74">Sends Set-Cookie Header</text>

  <rect x="640" y="296" width="180" height="30" rx="4" fill="white" stroke="#2f9d74" stroke-width="1"/>
  <text x="650" y="310" font-size="8" fill="#1a1822">Set-Cookie: __Host-session=abc;</text>
  <text x="650" y="322" font-size="8" fill="#1a1822">Secure; HttpOnly; SameSite=Lax</text>

  <!-- Arrow 1: Request with Cookie header -->
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6d5bd0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2f9d74"/>
    </marker>
  </defs>

  <!-- Request arrow -->
  <line x1="290" y1="170" x2="608" y2="170" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <rect x="350" y="145" width="200" height="24" rx="4" fill="#edeaf5"/>
  <text x="450" y="161" text-anchor="middle" font-size="10" font-weight="600" fill="#6d5bd0">Cookie: session=abc; csrf=xyz</text>
  <text x="450" y="138" text-anchor="middle" font-size="9" fill="#666">Every request (automatic)</text>

  <!-- Response arrow -->
  <line x1="608" y1="310" x2="290" y2="310" stroke="#2f9d74" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="350" y="290" width="200" height="20" rx="4" fill="#e6f7ef"/>
  <text x="450" y="304" text-anchor="middle" font-size="10" font-weight="600" fill="#2f9d74">Set-Cookie: ... (if updating)</text>

  <!-- Step labels -->
  <circle cx="320" cy="170" r="12" fill="#6d5bd0"/>
  <text x="320" y="174" text-anchor="middle" font-size="10" font-weight="bold" fill="white">1</text>

  <circle cx="320" cy="310" r="12" fill="#2f9d74"/>
  <text x="320" y="314" text-anchor="middle" font-size="10" font-weight="bold" fill="white">2</text>

  <!-- Bottom explanation -->
  <rect x="400" y="370" width="460" height="100" rx="8" fill="white" stroke="#d97843" stroke-width="1.5"/>
  <text x="420" y="392" font-size="11" font-weight="bold" fill="#d97843">Key Insight</text>
  <text x="420" y="410" font-size="10" fill="#1a1822">Cookies are the ONLY storage mechanism automatically</text>
  <text x="420" y="425" font-size="10" fill="#1a1822">sent with every HTTP request. This makes them essential</text>
  <text x="420" y="440" font-size="10" fill="#1a1822">for server-readable state (auth, CSRF), but also a</text>
  <text x="420" y="455" font-size="10" fill="#1a1822">bandwidth concern -- every byte in cookies multiplies</text>
  <text x="420" y="470" font-size="10" fill="#1a1822">across all subresource requests to the same domain.</text>
</svg>
