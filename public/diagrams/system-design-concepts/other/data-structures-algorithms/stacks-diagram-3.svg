<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .dark-bg { fill: #1a1a2e; }
      .box { fill: #e8f0fe; stroke: #4a6cf7; stroke-width: 2; }
      .dark-box { fill: #252545; stroke: #6b8aff; stroke-width: 2; }
      .box-highlight { fill: #4a6cf7; }
      .dark-box-highlight { fill: #6b8aff; }
      .box-pop { fill: #fef3c7; stroke: #d69e2e; stroke-width: 2; }
      .dark-box-pop { fill: #3e3520; stroke: #ecc94b; stroke-width: 2; }
      .box-result { fill: #e6fffa; stroke: #38a169; stroke-width: 2; }
      .dark-box-result { fill: #1e3a2f; stroke: #48bb78; stroke-width: 2; }
      .title { font-size: 18px; font-weight: 700; fill: #1a1a2e; }
      .dark-title { font-size: 18px; font-weight: 700; fill: #ffffff; }
      .label { font-size: 13px; font-weight: 600; fill: #2d3748; }
      .dark-label { font-size: 13px; font-weight: 600; fill: #e2e8f0; }
      .sublabel { font-size: 11px; font-weight: 400; fill: #718096; }
      .dark-sublabel { font-size: 11px; font-weight: 400; fill: #a0aec0; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .dark-arrow { stroke: #a0aec0; stroke-width: 2; fill: none; marker-end: url(#dark-arrowhead); }
      .arrow-green { stroke: #38a169; stroke-width: 2.5; fill: none; marker-end: url(#arrowGreen); }
      .dark-arrow-green { stroke: #48bb78; stroke-width: 2.5; fill: none; marker-end: url(#dark-arrowGreen); }
      .arrow-orange { stroke: #d69e2e; stroke-width: 2.5; fill: none; marker-end: url(#arrowOrange); }
      .dark-arrow-orange { stroke: #ecc94b; stroke-width: 2.5; fill: none; marker-end: url(#dark-arrowOrange); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568" />
    </marker>
    <marker id="dark-arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a0aec0" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38a169" />
    </marker>
    <marker id="dark-arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#48bb78" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d69e2e" />
    </marker>
    <marker id="dark-arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ecc94b" />
    </marker>
  </defs>

  <rect class="bg" width="900" height="520" rx="8" />
  <rect class="dark-bg" width="900" height="520" rx="8" style="display:none" />

  <text class="title" x="450" y="32" text-anchor="middle">Monotonic Stack: Next Greater Element Pattern</text>
  <text class="dark-title" x="450" y="32" text-anchor="middle">Monotonic Stack: Next Greater Element Pattern</text>

  <!-- Input array -->
  <text class="label" x="140" y="70" text-anchor="middle">Input: [2, 7, 3, 5, 4, 6, 8]</text>
  <text class="dark-label" x="140" y="70" text-anchor="middle" style="display:none">Input: [2, 7, 3, 5, 4, 6, 8]</text>

  <!-- Input array visualization -->
  <rect class="box" x="20" y="82" width="40" height="32" rx="4" />
  <rect class="dark-box" x="20" y="82" width="40" height="32" rx="4" style="display:none" />
  <text class="label" x="40" y="103" text-anchor="middle">2</text>
  <text class="dark-label" x="40" y="103" text-anchor="middle" style="display:none">2</text>

  <rect class="box" x="65" y="82" width="40" height="32" rx="4" />
  <rect class="dark-box" x="65" y="82" width="40" height="32" rx="4" style="display:none" />
  <text class="label" x="85" y="103" text-anchor="middle">7</text>
  <text class="dark-label" x="85" y="103" text-anchor="middle" style="display:none">7</text>

  <rect class="box" x="110" y="82" width="40" height="32" rx="4" />
  <rect class="dark-box" x="110" y="82" width="40" height="32" rx="4" style="display:none" />
  <text class="label" x="130" y="103" text-anchor="middle">3</text>
  <text class="dark-label" x="130" y="103" text-anchor="middle" style="display:none">3</text>

  <rect class="box" x="155" y="82" width="40" height="32" rx="4" />
  <rect class="dark-box" x="155" y="82" width="40" height="32" rx="4" style="display:none" />
  <text class="label" x="175" y="103" text-anchor="middle">5</text>
  <text class="dark-label" x="175" y="103" text-anchor="middle" style="display:none">5</text>

  <rect class="box" x="200" y="82" width="40" height="32" rx="4" />
  <rect class="dark-box" x="200" y="82" width="40" height="32" rx="4" style="display:none" />
  <text class="label" x="220" y="103" text-anchor="middle">4</text>
  <text class="dark-label" x="220" y="103" text-anchor="middle" style="display:none">4</text>

  <rect class="box" x="245" y="82" width="40" height="32" rx="4" />
  <rect class="dark-box" x="245" y="82" width="40" height="32" rx="4" style="display:none" />
  <text class="label" x="265" y="103" text-anchor="middle">6</text>
  <text class="dark-label" x="265" y="103" text-anchor="middle" style="display:none">6</text>

  <rect class="box" x="290" y="82" width="40" height="32" rx="4" />
  <rect class="dark-box" x="290" y="82" width="40" height="32" rx="4" style="display:none" />
  <text class="label" x="310" y="103" text-anchor="middle">8</text>
  <text class="dark-label" x="310" y="103" text-anchor="middle" style="display:none">8</text>

  <!-- Step-by-step trace -->
  <text class="label" x="450" y="70" text-anchor="middle">Algorithm Trace (maintain decreasing monotonic stack)</text>
  <text class="dark-label" x="450" y="70" text-anchor="middle" style="display:none">Algorithm Trace (maintain decreasing monotonic stack)</text>

  <!-- Step 1: Process 2 -->
  <text class="sublabel" x="320" y="145" font-size="11">Push 2: stack=[2]</text>
  <text class="dark-sublabel" x="320" y="145" font-size="11" style="display:none">Push 2: stack=[2]</text>
  <rect class="box" x="380" y="130" width="50" height="30" rx="4" />
  <rect class="dark-box" x="380" y="130" width="50" height="30" rx="4" style="display:none" />
  <text class="label" x="405" y="150" text-anchor="middle">2</text>
  <text class="dark-label" x="405" y="150" text-anchor="middle" style="display:none">2</text>

  <!-- Step 2: Process 7 -->
  <text class="sublabel" x="320" y="200" font-size="11">7 &gt; 2: pop 2, res[2]=7</text>
  <text class="dark-sublabel" x="320" y="200" font-size="11" style="display:none">7 &gt; 2: pop 2, res[2]=7</text>
  <rect class="box-pop" x="380" y="175" width="50" height="30" rx="4" />
  <rect class="dark-box-pop" x="380" y="175" width="50" height="30" rx="4" style="display:none" />
  <text class="label" x="405" y="195" text-anchor="middle">2</text>
  <text class="dark-label" x="405" y="195" text-anchor="middle" style="display:none">2</text>
  <path class="arrow-orange" d="M 435 190 L 480 190" />
  <path class="dark-arrow-orange" d="M 435 190 L 480 190" style="display:none" />
  <rect class="box-result" x="485" y="175" width="50" height="30" rx="4" />
  <rect class="dark-box-result" x="485" y="175" width="50" height="30" rx="4" style="display:none" />
  <text class="label" x="510" y="195" text-anchor="middle">7</text>
  <text class="dark-label" x="510" y="195" text-anchor="middle" style="display:none">7</text>
  <text class="sublabel" x="540" y="195" font-size="10">NGE of 2</text>
  <text class="dark-sublabel" x="540" y="195" font-size="10" style="display:none">NGE of 2</text>

  <!-- Step 3: Process 3, 5 -->
  <text class="sublabel" x="320" y="250" font-size="11">Push 7,3: stack=[7,3]</text>
  <text class="dark-sublabel" x="320" y="250" font-size="11" style="display:none">Push 7,3: stack=[7,3]</text>
  <rect class="box" x="380" y="225" width="50" height="30" rx="4" />
  <rect class="dark-box" x="380" y="225" width="50" height="30" rx="4" style="display:none" />
  <text class="label" x="405" y="245" text-anchor="middle">3</text>
  <text class="dark-label" x="405" y="245" text-anchor="middle" style="display:none">3</text>
  <rect class="box" x="380" y="255" width="50" height="30" rx="4" />
  <rect class="dark-box" x="380" y="255" width="50" height="30" rx="4" style="display:none" />
  <text class="label" x="405" y="275" text-anchor="middle">7</text>
  <text class="dark-label" x="405" y="275" text-anchor="middle" style="display:none">7</text>

  <!-- Step 4: Process 5 -->
  <text class="sublabel" x="320" y="310" font-size="11">5 &gt; 3: pop 3, res[3]=5</text>
  <text class="dark-sublabel" x="320" y="310" font-size="11" style="display:none">5 &gt; 3: pop 3, res[3]=5</text>
  <rect class="box-pop" x="380" y="290" width="50" height="30" rx="4" />
  <rect class="dark-box-pop" x="380" y="290" width="50" height="30" rx="4" style="display:none" />
  <text class="label" x="405" y="310" text-anchor="middle">3</text>
  <text class="dark-label" x="405" y="310" text-anchor="middle" style="display:none">3</text>
  <path class="arrow-orange" d="M 435 305 L 480 305" />
  <path class="dark-arrow-orange" d="M 435 305 L 480 305" style="display:none" />
  <rect class="box-result" x="485" y="290" width="50" height="30" rx="4" />
  <rect class="dark-box-result" x="485" y="290" width="50" height="30" rx="4" style="display:none" />
  <text class="label" x="510" y="310" text-anchor="middle">5</text>
  <text class="dark-label" x="510" y="310" text-anchor="middle" style="display:none">5</text>
  <text class="sublabel" x="540" y="310" font-size="10">NGE of 3</text>
  <text class="dark-sublabel" x="540" y="310" font-size="10" style="display:none">NGE of 3</text>

  <!-- Step 5: Final stack state -->
  <text class="sublabel" x="320" y="365" font-size="11">Push 4,5: stack=[7,5,4]</text>
  <text class="dark-sublabel" x="320" y="365" font-size="11" style="display:none">Push 4,5: stack=[7,5,4]</text>
  <rect class="box" x="380" y="345" width="50" height="30" rx="4" />
  <rect class="dark-box" x="380" y="345" width="50" height="30" rx="4" style="display:none" />
  <text class="label" x="405" y="365" text-anchor="middle">4</text>
  <text class="dark-label" x="405" y="365" text-anchor="middle" style="display:none">4</text>
  <rect class="box" x="380" y="375" width="50" height="30" rx="4" />
  <rect class="dark-box" x="380" y="375" width="50" height="30" rx="4" style="display:none" />
  <text class="label" x="405" y="395" text-anchor="middle">5</text>
  <text class="dark-label" x="405" y="395" text-anchor="middle" style="display:none">5</text>
  <rect class="box" x="380" y="405" width="50" height="30" rx="4" />
  <rect class="dark-box" x="380" y="405" width="50" height="30" rx="4" style="display:none" />
  <text class="label" x="405" y="425" text-anchor="middle">7</text>
  <text class="dark-label" x="405" y="425" text-anchor="middle" style="display:none">7</text>

  <!-- Right side: Final result -->
  <text class="label" x="680" y="70" text-anchor="middle">Result: Next Greater Elements</text>
  <text class="dark-label" x="680" y="70" text-anchor="middle" style="display:none">Result: Next Greater Elements</text>

  <!-- Result table -->
  <rect class="box" x="580" y="85" width="200" height="32" rx="4" />
  <rect class="dark-box" x="580" y="85" width="200" height="32" rx="4" style="display:none" />
  <text class="label" x="600" y="106" font-size="11">Element</text>
  <text class="dark-label" x="600" y="106" font-size="11" style="display:none">Element</text>
  <text class="label" x="700" y="106" text-anchor="middle" font-size="11">Next Greater</text>
  <text class="dark-label" x="700" y="106" text-anchor="middle" font-size="11" style="display:none">Next Greater</text>

  <rect class="box" x="580" y="120" width="200" height="28" rx="4" />
  <rect class="dark-box" x="580" y="120" width="200" height="28" rx="4" style="display:none" />
  <text class="sublabel" x="600" y="138" font-size="10">2</text>
  <text class="dark-sublabel" x="600" y="138" font-size="10" style="display:none">2</text>
  <text class="sublabel" x="700" y="138" text-anchor="middle" font-size="10">7</text>
  <text class="dark-sublabel" x="700" y="138" text-anchor="middle" font-size="10" style="display:none">7</text>

  <rect class="box" x="580" y="150" width="200" height="28" rx="4" />
  <rect class="dark-box" x="580" y="150" width="200" height="28" rx="4" style="display:none" />
  <text class="sublabel" x="600" y="168" font-size="10">7</text>
  <text class="dark-sublabel" x="600" y="168" font-size="10" style="display:none">7</text>
  <text class="sublabel" x="700" y="168" text-anchor="middle" font-size="10">8</text>
  <text class="dark-sublabel" x="700" y="168" text-anchor="middle" font-size="10" style="display:none">8</text>

  <rect class="box" x="580" y="180" width="200" height="28" rx="4" />
  <rect class="dark-box" x="580" y="180" width="200" height="28" rx="4" style="display:none" />
  <text class="sublabel" x="600" y="198" font-size="10">3</text>
  <text class="dark-sublabel" x="600" y="198" font-size="10" style="display:none">3</text>
  <text class="sublabel" x="700" y="198" text-anchor="middle" font-size="10">5</text>
  <text class="dark-sublabel" x="700" y="198" text-anchor="middle" font-size="10" style="display:none">5</text>

  <rect class="box" x="580" y="210" width="200" height="28" rx="4" />
  <rect class="dark-box" x="580" y="210" width="200" height="28" rx="4" style="display:none" />
  <text class="sublabel" x="600" y="228" font-size="10">5</text>
  <text class="dark-sublabel" x="600" y="228" font-size="10" style="display:none">5</text>
  <text class="sublabel" x="700" y="228" text-anchor="middle" font-size="10">6</text>
  <text class="dark-sublabel" x="700" y="228" text-anchor="middle" font-size="10" style="display:none">6</text>

  <rect class="box" x="580" y="240" width="200" height="28" rx="4" />
  <rect class="dark-box" x="580" y="240" width="200" height="28" rx="4" style="display:none" />
  <text class="sublabel" x="600" y="258" font-size="10">4</text>
  <text class="dark-sublabel" x="600" y="258" font-size="10" style="display:none">4</text>
  <text class="sublabel" x="700" y="258" text-anchor="middle" font-size="10">6</text>
  <text class="dark-sublabel" x="700" y="258" text-anchor="middle" font-size="10" style="display:none">6</text>

  <rect class="box" x="580" y="270" width="200" height="28" rx="4" />
  <rect class="dark-box" x="580" y="270" width="200" height="28" rx="4" style="display:none" />
  <text class="sublabel" x="600" y="288" font-size="10">6</text>
  <text class="dark-sublabel" x="600" y="288" font-size="10" style="display:none">6</text>
  <text class="sublabel" x="700" y="288" text-anchor="middle" font-size="10">8</text>
  <text class="dark-sublabel" x="700" y="288" text-anchor="middle" font-size="10" style="display:none">8</text>

  <rect class="box" x="580" y="300" width="200" height="28" rx="4" />
  <rect class="dark-box" x="580" y="300" width="200" height="28" rx="4" style="display:none" />
  <text class="sublabel" x="600" y="318" font-size="10">8</text>
  <text class="dark-sublabel" x="600" y="318" font-size="10" style="display:none">8</text>
  <text class="sublabel" x="700" y="318" text-anchor="middle" font-size="10">-1 (none)</text>
  <text class="dark-sublabel" x="700" y="318" text-anchor="middle" font-size="10" style="display:none">-1 (none)</text>

  <!-- Complexity annotation -->
  <rect class="box" x="580" y="350" width="200" height="80" rx="8" fill="#f0f4ff" stroke="#4a6cf7" stroke-width="2" />
  <rect class="dark-box" x="580" y="350" width="200" height="80" rx="8" fill="#252545" stroke="#6b8aff" stroke-width="2" style="display:none" />
  <text class="label" x="680" y="378" text-anchor="middle">Time Complexity</text>
  <text class="dark-label" x="680" y="378" text-anchor="middle" style="display:none">Time Complexity</text>
  <text class="sublabel" x="680" y="398" text-anchor="middle">O(n) — each element</text>
  <text class="dark-sublabel" x="680" y="398" text-anchor="middle" style="display:none">O(n) — each element</text>
  <text class="sublabel" x="680" y="416" text-anchor="middle">pushed &amp; popped once</text>
  <text class="dark-sublabel" x="680" y="416" text-anchor="middle" style="display:none">pushed &amp; popped once</text>

  <!-- Bottom: Key insight -->
  <rect class="box" x="30" y="440" width="520" height="65" rx="8" fill="#f0f4ff" stroke="#4a6cf7" stroke-width="2" />
  <rect class="dark-box" x="30" y="440" width="520" height="65" rx="8" fill="#252545" stroke="#6b8aff" stroke-width="2" style="display:none" />
  <text class="label" x="290" y="465" text-anchor="middle">Key Insight: Monotonic Stack</text>
  <text class="dark-label" x="290" y="465" text-anchor="middle" style="display:none">Key Insight: Monotonic Stack</text>
  <text class="sublabel" x="290" y="485" text-anchor="middle">Maintain elements in monotonic order. When a new element</text>
  <text class="dark-sublabel" x="290" y="485" text-anchor="middle" style="display:none">Maintain elements in monotonic order. When a new element</text>
  <text class="sublabel" x="290" y="502" text-anchor="middle">violates the invariant, pop until invariant is restored. Each pop resolves a query.</text>
  <text class="dark-sublabel" x="290" y="502" text-anchor="middle" style="display:none">violates the invariant, pop until invariant is restored. Each pop resolves a query.</text>

  <style>
    @media (prefers-color-scheme: dark) {
      .bg { display: none; }
      .dark-bg { display: block; }
      .box { display: none; }
      .dark-box { display: block; }
      .box-highlight { display: none; }
      .dark-box-highlight { display: block; }
      .box-pop { display: none; }
      .dark-box-pop { display: block; }
      .box-result { display: none; }
      .dark-box-result { display: block; }
      .title { display: none; }
      .dark-title { display: block; }
      .label { display: none; }
      .dark-label { display: block; }
      .sublabel { display: none; }
      .dark-sublabel { display: block; }
      .arrow { display: none; }
      .dark-arrow { display: block; }
      .arrow-green { display: none; }
      .dark-arrow-green { display: block; }
      .arrow-orange { display: none; }
      .dark-arrow-orange { display: block; }
    }
  </style>
</svg>
