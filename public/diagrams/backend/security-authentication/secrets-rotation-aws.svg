<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" role="img" aria-labelledby="title desc">
  <title id="title">Secrets Rotation Workflow</title>
  <desc id="desc">AWS Secrets Manager automated rotation workflow showing new secret creation, overlap window, and old secret revocation</desc>
  
  <!-- Background -->
  <rect width="800" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Automated Secrets Rotation Workflow</text>
  
  <!-- Secrets Manager -->
  <rect x="50" y="70" width="200" height="100" rx="8" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #d97706)" stroke-width="3"/>
  <text x="150" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">AWS Secrets</text>
  <text x="150" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Manager</text>
  <text x="150" y="145" text-anchor="middle" font-size="10" fill="white">Current: v2</text>
  <text x="150" y="160" text-anchor="middle" font-size="10" fill="white">Previous: v1</text>
  
  <!-- Lambda Rotation Function -->
  <rect x="300" y="70" width="200" height="100" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="400" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Rotation Lambda</text>
  <text x="400" y="125" text-anchor="middle" font-size="10" fill="white">(Managed/Custom)</text>
  <text x="400" y="145" text-anchor="middle" font-size="10" fill="white">4-Step Rotation:</text>
  <text x="400" y="160" text-anchor="middle" font-size="9" fill="white">Create → Set → Test → Finish</text>
  
  <!-- Target Database/Service -->
  <rect x="550" y="70" width="200" height="100" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="650" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Target Service</text>
  <text x="650" y="125" text-anchor="middle" font-size="10" fill="white">(RDS/API/Queue)</text>
  <text x="650" y="145" text-anchor="middle" font-size="10" fill="white">Accepts: v1, v2</text>
  <text x="650" y="160" text-anchor="middle" font-size="10" fill="white">(Overlap Window)</text>
  
  <!-- Rotation Steps -->
  <rect x="50" y="200" width="700" height="200" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="400" y="225" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Rotation Steps (Atomic with Rollback)</text>
  
  <!-- Step 1 -->
  <rect x="70" y="240" width="150" height="140" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="145" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b">Step 1: Create</text>
  <text x="145" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Lambda generates</text>
  <text x="145" y="305" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">new secret (v3)</text>
  <text x="145" y="320" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Stores in Secrets</text>
  <text x="145" y="335" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Manager as AWSCURRENT=false</text>
  <text x="145" y="355" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981" font-weight="bold">✓ New secret created</text>
  
  <!-- Step 2 -->
  <rect x="240" y="240" width="150" height="140" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="315" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b">Step 2: Set</text>
  <text x="315" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Lambda updates</text>
  <text x="315" y="305" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">target service</text>
  <text x="315" y="320" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">with new secret</text>
  <text x="315" y="335" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">RDS: ALTER USER</text>
  <text x="315" y="355" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981" font-weight="bold">✓ Service accepts v3</text>
  
  <!-- Step 3 -->
  <rect x="410" y="240" width="150" height="140" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="485" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b">Step 3: Test</text>
  <text x="485" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Lambda connects</text>
  <text x="485" y="305" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">using new secret</text>
  <text x="485" y="320" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Validates access</text>
  <text x="485" y="335" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Test query succeeds</text>
  <text x="485" y="355" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981" font-weight="bold">✓ v3 validated</text>
  
  <!-- Step 4 -->
  <rect x="580" y="240" width="150" height="140" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="655" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b">Step 4: Finish</text>
  <text x="655" y="290" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Mark v3 as</text>
  <text x="655" y="305" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">AWSCURRENT</text>
  <text x="655" y="320" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">Mark v2 as</text>
  <text x="655" y="335" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">AWSPREVIOUS</text>
  <text x="655" y="355" text-anchor="middle" font-size="9" fill="var(--text-theme, #10b981" font-weight="bold">✓ Rotation complete</text>
  
  <!-- Arrows between steps -->
  <defs>
    <marker id="arrowStep" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #8b5cf6)"/>
    </marker>
  </defs>
  
  <line x1="220" y1="310" x2="240" y2="310" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrowStep)"/>
  <line x1="390" y1="310" x2="410" y2="310" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrowStep)"/>
  <line x1="560" y1="310" x2="580" y2="310" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrowStep)"/>
  
  <!-- Overlap Window Timeline -->
  <rect x="50" y="420" width="700" height="110" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="400" y="442" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Overlap Window Strategy</text>
  
  <!-- Timeline -->
  <line x1="100" y1="470" x2="700" y2="470" stroke="var(--text-theme, #64748b)" stroke-width="2"/>
  
  <!-- v2 Active Period -->
  <rect x="100" y="455" width="250" height="30" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="225" y="475" text-anchor="middle" font-size="10" fill="white">v2 ACTIVE</text>
  
  <!-- Overlap Period -->
  <rect x="350" y="455" width="150" height="30" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #d97706)" stroke-width="1"/>
  <text x="425" y="475" text-anchor="middle" font-size="10" fill="white">OVERLAP</text>
  <text x="425" y="490" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">v2+v3 valid</text>
  
  <!-- v3 Active Period -->
  <rect x="500" y="455" width="200" height="30" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="600" y="475" text-anchor="middle" font-size="10" fill="white">v3 ACTIVE</text>
  
  <!-- Time markers -->
  <text x="100" y="515" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">T0</text>
  <text x="350" y="515" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">T1: v3 created</text>
  <text x="500" y="515" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">T2: v2 revoked</text>
  
  <!-- Best Practices -->
  <rect x="550" y="90" width="200" height="80" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="650" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b">Best Practices</text>
  <text x="650" y="128" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Overlap: 5-15 minutes</text>
  <text x="650" y="143" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Automatic retry on failure</text>
  <text x="650" y="158" text-anchor="start" font-size="9" fill="var(--text-theme, #64748b">• Alert on rotation failures</text>
</svg>
