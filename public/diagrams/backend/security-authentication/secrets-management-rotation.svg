<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700" role="img" aria-labelledby="title desc">
  <title id="title">Secrets Management and Rotation</title>
  <desc id="desc">Secrets management architecture showing secure storage, access patterns, and automated rotation workflows</desc>
  
  <!-- Background -->
  <rect width="950" height="700" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="var(--text-theme, #1e293b)">Secrets Management and Rotation</text>
  <text x="475" y="60" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Secure storage, access, and automated rotation of sensitive credentials</text>
  
  <!-- What are Secrets Section -->
  <rect x="30" y="80" width="890" height="90" rx="8" fill="var(--bg-panel-hover, #fef2f2)" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="475" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #b91c1c">What Needs to Be Protected?</text>
  
  <rect x="50" y="120" width="130" height="40" rx="4" fill="white" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="115" y="145" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">API Keys</text>
  
  <rect x="195" y="120" width="130" height="40" rx="4" fill="white" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="260" y="145" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">Database Passwords</text>
  
  <rect x="340" y="120" width="130" height="40" rx="4" fill="white" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="405" y="145" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">TLS Certificates</text>
  
  <rect x="485" y="120" width="130" height="40" rx="4" fill="white" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="550" y="145" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">Encryption Keys</text>
  
  <rect x="630" y="120" width="130" height="40" rx="4" fill="white" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="695" y="145" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">OAuth Secrets</text>
  
  <rect x="775" y="120" width="130" height="40" rx="4" fill="white" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="840" y="145" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">SSH Keys</text>
  
  <!-- Secrets Manager Architecture -->
  <rect x="30" y="185" width="570" height="320" rx="8" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="315" y="210" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #059669">Secrets Manager Architecture</text>
  
  <!-- Applications -->
  <rect x="50" y="230" width="140" height="100" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="120" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Applications</text>
  <text x="120" y="285" text-anchor="middle" font-size="9" fill="#bfdbfe">• Web Services</text>
  <text x="120" y="300" text-anchor="middle" font-size="9" fill="#bfdbfe">• Lambda/Functions</text>
  <text x="120" y="315" text-anchor="middle" font-size="9" fill="#bfdbfe">• CI/CD Pipelines</text>
  
  <!-- Arrow -->
  <line x1="190" y1="280" x2="235" y2="280" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="212" y="270" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Request</text>
  
  <!-- Secrets Manager -->
  <rect x="240" y="230" width="180" height="100" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="330" y="260" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Secrets Manager</text>
  <text x="330" y="280" text-anchor="middle" font-size="10" fill="#6ee7b7">AWS/Azure/GCP/Vault</text>
  <text x="330" y="300" text-anchor="middle" font-size="9" fill="#6ee7b7">• Encrypted storage</text>
  <text x="330" y="315" text-anchor="middle" font-size="9" fill="#6ee7b7">• Access control</text>
  
  <!-- Arrow -->
  <line x1="420" y1="280" x2="465" y2="280" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="442" y="270" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">Returns</text>
  
  <!-- Encrypted Secrets -->
  <rect x="470" y="230" width="110" height="100" rx="6" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="525" y="265" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Encrypted</text>
  <text x="525" y="285" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Secrets</text>
  <text x="525" y="305" text-anchor="middle" font-size="9" fill="#c4b5fd">KMS/HSM</text>
  <text x="525" y="320" text-anchor="middle" font-size="9" fill="#c4b5fd">Encryption</text>
  
  <!-- Access Flow -->
  <rect x="50" y="350" width="530" height="140" rx="6" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="315" y="375" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #059669">Secret Access Flow</text>
  
  <!-- Step 1 -->
  <circle cx="100" cy="420" r="30" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="100" y="415" text-anchor="middle" font-size="10" font-weight="bold" fill="white">1. App</text>
  <text x="100" y="430" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Requests</text>
  
  <!-- Arrow -->
  <line x1="130" y1="420" x2="170" y2="420" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2 -->
  <circle cx="210" cy="420" r="30" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="210" y="415" text-anchor="middle" font-size="10" font-weight="bold" fill="white">2. IAM</text>
  <text x="210" y="430" text-anchor="middle" font-size="10" font-weight="bold" fill="white">AuthZ</text>
  
  <!-- Arrow -->
  <line x1="240" y1="420" x2="280" y2="420" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3 -->
  <circle cx="320" cy="420" r="30" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="320" y="415" text-anchor="middle" font-size="10" font-weight="bold" fill="white">3. Fetch</text>
  <text x="320" y="430" text-anchor="middle" font-size="10" font-weight="bold" fill="white">&amp; Decrypt</text>
  
  <!-- Arrow -->
  <line x1="350" y1="420" x2="390" y2="420" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4 -->
  <circle cx="430" cy="420" r="30" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="430" y="415" text-anchor="middle" font-size="10" font-weight="bold" fill="white">4. Return</text>
  <text x="430" y="430" text-anchor="middle" font-size="10" font-weight="bold" fill="white">to App</text>
  
  <!-- Arrow -->
  <line x1="460" y1="420" x2="500" y2="420" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 5 -->
  <rect x="505" y="390" width="60" height="60" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="535" y="415" text-anchor="middle" font-size="9" font-weight="bold" fill="white">App</text>
  <text x="535" y="430" text-anchor="middle" font-size="9" font-weight="bold" fill="white">Uses</text>
  <text x="535" y="445" text-anchor="middle" font-size="9" fill="#bfdbfe">Secret</text>
  
  <!-- Rotation Workflow -->
  <rect x="615" y="185" width="305" height="320" rx="8" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="767" y="210" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #b45309">Automated Rotation Workflow</text>
  
  <!-- Rotation Steps -->
  <rect x="630" y="230" width="275" height="260" rx="6" fill="white" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  
  <!-- Step 1 -->
  <rect x="645" y="245" width="245" height="50" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="767" y="265" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309">1. Generate New Secret</text>
  <text x="767" y="282" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Lambda/Function creates new credential</text>
  
  <!-- Arrow -->
  <line x1="767" y1="295" x2="767" y2="310" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 2 -->
  <rect x="645" y="310" width="245" height="50" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="767" y="330" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309">2. Store New Version</text>
  <text x="767" y="347" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Both old and new versions available</text>
  
  <!-- Arrow -->
  <line x1="767" y1="360" x2="767" y2="375" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 3 -->
  <rect x="645" y="375" width="245" height="50" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="767" y="395" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309">3. Update Dependent Services</text>
  <text x="767" y="412" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Notify apps or rotate database password</text>
  
  <!-- Arrow -->
  <line x1="767" y1="425" x2="767" y2="440" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Step 4 -->
  <rect x="645" y="440" width="245" height="50" rx="4" fill="var(--bg-panel-soft, #d1fae5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="767" y="460" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #059669">4. Delete Old Version</text>
  <text x="767" y="477" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">After grace period (e.g., 24 hours)</text>
  
  <!-- Best Practices -->
  <rect x="30" y="520" width="890" height="160" rx="8" fill="var(--bg-panel-hover, #f0fdf4)" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="475" y="545" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #059669">Secrets Management Best Practices</text>
  
  <!-- Practice 1 -->
  <rect x="50" y="560" width="270" height="110" rx="6" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="185" y="585" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #059669">Never Hardcode Secrets</text>
  
  <text x="185" y="605" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✗ No secrets in code/repos</text>
  <text x="185" y="620" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✗ No secrets in environment vars</text>
  <text x="185" y="635" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Use secrets manager SDK</text>
  <text x="185" y="650" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Use IAM roles for access</text>
  
  <!-- Practice 2 -->
  <rect x="340" y="560" width="270" height="110" rx="6" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="475" y="585" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #059669">Enable Automatic Rotation</text>
  
  <text x="475" y="605" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Rotate every 30-90 days</text>
  <text x="475" y="620" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Use managed rotation (AWS)</text>
  <text x="475" y="635" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Monitor rotation failures</text>
  <text x="475" y="650" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Test rotation in staging first</text>
  
  <!-- Practice 3 -->
  <rect x="630" y="560" width="270" height="110" rx="6" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="765" y="585" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #059669">Audit and Monitor Access</text>
  
  <text x="765" y="605" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Log all secret access</text>
  <text x="765" y="620" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Alert on unusual patterns</text>
  <text x="765" y="635" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Review access policies regularly</text>
  <text x="765" y="650" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">✓ Implement least privilege</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
