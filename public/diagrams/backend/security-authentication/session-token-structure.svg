<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Session Token Structure</title>
  <desc id="desc">Session token structure showing session ID, user data, security flags, and storage options</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Session Token Structure</text>
  
  <!-- Session Token -->
  <rect x="50" y="70" width="340" height="200" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="220" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Session Token Components</text>
  
  <!-- Session ID -->
  <rect x="70" y="120" width="300" height="40" rx="4" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="220" y="140" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b">Session ID (256-bit random)</text>
  <text x="220" y="155" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b" font-family="monospace">sess_abc123xyz789...</text>
  
  <!-- User Data -->
  <rect x="70" y="170" width="300" height="40" rx="4" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="220" y="190" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b">User Data Reference</text>
  <text x="220" y="205" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">user_id, roles, permissions</text>
  
  <!-- Metadata -->
  <rect x="70" y="220" width="300" height="40" rx="4" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="220" y="240" text-anchor="middle" font-size="9" font-weight="bold" fill="var(--text-theme, #1e293b">Metadata</text>
  <text x="220" y="255" text-anchor="middle" font-size="8" fill="var(--text-theme, #64748b">created_at, last_access, IP, user-agent</text>
  
  <!-- Security Flags -->
  <rect x="50" y="300" width="340" height="120" rx="8" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="220" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Cookie Security Flags</text>
  
  <rect x="70" y="340" width="140" height="35" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="140" y="362" text-anchor="middle" font-size="9" fill="white">HttpOnly</text>
  
  <rect x="220" y="340" width="140" height="35" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="290" y="362" text-anchor="middle" font-size="9" fill="white">Secure</text>
  
  <rect x="70" y="385" width="140" height="35" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="140" y="407" text-anchor="middle" font-size="9" fill="white">SameSite=Strict</text>
  
  <rect x="220" y="385" width="140" height="35" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="290" y="407" text-anchor="middle" font-size="9" fill="white">Path=/</text>
  
  <!-- Session Storage Options -->
  <rect x="430" y="70" width="320" height="180" rx="8" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="590" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b">Session Storage Options</text>
  
  <!-- Server-side -->
  <rect x="450" y="120" width="280" height="55" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="590" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Server-Side (Recommended)</text>
  <text x="590" y="165" text-anchor="middle" font-size="9" fill="white">Redis, Memcached, Database</text>
  
  <!-- Client-side -->
  <rect x="450" y="190" width="280" height="55" rx="6" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #d97706)" stroke-width="2"/>
  <text x="590" y="215" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Client-Side (JWT)</text>
  <text x="590" y="235" text-anchor="middle" font-size="9" fill="white">Signed token with claims</text>
  
  <!-- Comparison -->
  <rect x="450" y="260" width="280" height="60" rx="6" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="590" y="282" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Server-side: Easy invalidation, more storage</text>
  <text x="590" y="297" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Client-side: Stateless, harder to revoke</text>
  
  <!-- Session Attack Vectors -->
  <rect x="430" y="300" width="320" height="180" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #dc2626)" stroke-width="2"/>
  <text x="590" y="325" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #dc2626">Session Attack Vectors</text>
  
  <rect x="450" y="340" width="280" height="30" rx="4" fill="var(--bg-theme, #dc2626)" stroke="var(--border-theme, #991b1b)" stroke-width="1"/>
  <text x="590" y="360" text-anchor="middle" font-size="9" fill="white">✗ Session Fixation: Regenerate on login</text>
  
  <rect x="450" y="380" width="280" height="30" rx="4" fill="var(--bg-theme, #dc2626)" stroke="var(--border-theme, #991b1b)" stroke-width="1"/>
  <text x="590" y="400" text-anchor="middle" font-size="9" fill="white">✗ Session Hijacking: Use HTTPS, rotate</text>
  
  <rect x="450" y="420" width="280" height="30" rx="4" fill="var(--bg-theme, #dc2626)" stroke="var(--border-theme, #991b1b)" stroke-width="1"/>
  <text x="590" y="440" text-anchor="middle" font-size="9" fill="white">✗ XSS Cookie Theft: HttpOnly flag</text>
  
  <rect x="450" y="460" width="280" height="30" rx="4" fill="var(--bg-theme, #dc2626)" stroke="var(--border-theme, #991b1b)" stroke-width="1"/>
  <text x="590" y="480" text-anchor="middle" font-size="9" fill="white">✗ CSRF: SameSite + CSRF tokens</text>
</svg>
