<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700" role="img" aria-labelledby="title desc">
  <title id="title">TLS/HTTPS Connection and Certificate Chain</title>
  <desc id="desc">Comprehensive visualization of TLS handshake, HTTPS connection summary, and certificate chain validation</desc>
  
  <!-- Background -->
  <rect width="950" height="700" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="var(--text-theme, #1e293b)">TLS/HTTPS Connection &amp; Certificate Chain</text>
  <text x="475" y="60" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Secure connection establishment and trust validation</text>
  
  <!-- TLS Handshake Simplified -->
  <rect x="30" y="80" width="570" height="280" rx="8" fill="var(--bg-panel-hover, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="315" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #1e40af">TLS 1.3 Handshake (1-RTT)</text>
  
  <!-- Client Hello -->
  <rect x="50" y="125" width="220" height="100" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="160" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Client Hello</text>
  
  <rect x="65" y="170" width="190" height="45" rx="4" fill="var(--bg-panel-soft, #dbeafe)" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="160" y="190" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">• Supported TLS versions</text>
  <text x="160" y="205" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">• Cipher suites offered</text>
  <text x="160" y="220" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">• Key share (DH public)</text>
  
  <!-- Arrow -->
  <line x1="270" y1="175" x2="305" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="287" y="165" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b">Step 1</text>
  
  <!-- Server Hello -->
  <rect x="310" y="125" width="220" height="100" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="420" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Server Hello + Cert</text>
  
  <rect x="325" y="170" width="190" height="45" rx="4" fill="var(--bg-panel-soft, #d1fae5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="420" y="190" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">• Selected cipher suite</text>
  <text x="420" y="205" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">• Server key share</text>
  <text x="420" y="220" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">• Certificate chain</text>
  
  <!-- Arrow -->
  <line x1="530" y1="175" x2="565" y2="175" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="547" y="165" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b">Step 2</text>
  
  <!-- Key Derivation -->
  <rect x="50" y="240" width="220" height="100" rx="6" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="160" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Key Derivation</text>
  
  <rect x="65" y="285" width="190" height="45" rx="4" fill="var(--bg-panel-soft, #f5f3ff)" stroke="var(--border-theme, #c4b5fd)" stroke-width="1"/>
  <text x="160" y="305" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">• Both compute shared secret</text>
  <text x="160" y="320" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">• HKDF derives keys</text>
  <text x="160" y="335" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">• Encryption keys ready</text>
  
  <!-- Arrow -->
  <line x1="270" y1="290" x2="305" y2="290" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="287" y="280" text-anchor="middle" font-size="8" fill="var(--text-theme, #1e293b">Step 3</text>
  
  <!-- Finished -->
  <rect x="310" y="240" width="220" height="100" rx="6" fill="var(--bg-theme, #06b6d4)" stroke="var(--border-theme, #0891b2)" stroke-width="2"/>
  <text x="420" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Finished (Encrypted)</text>
  
  <rect x="325" y="285" width="190" height="45" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #67e8f9)" stroke-width="1"/>
  <text x="420" y="305" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">• Encrypted handshake done</text>
  <text x="420" y="320" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">• Secure channel established</text>
  <text x="420" y="335" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">• Application data can flow</text>
  
  <!-- Certificate Chain -->
  <rect x="615" y="80" width="305" height="280" rx="8" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="767" y="105" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #b45309">X.509 Certificate Chain</text>
  
  <!-- Leaf Certificate -->
  <rect x="630" y="125" width="275" height="60" rx="4" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="767" y="150" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Leaf Certificate</text>
  <text x="767" y="170" text-anchor="middle" font-size="9" fill="#bfdbfe">example.com (issued by Intermediate)</text>
  
  <!-- Arrow -->
  <line x1="767" y1="185" x2="767" y2="200" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="777" y="195" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b">signed by</text>
  
  <!-- Intermediate CA -->
  <rect x="630" y="205" width="275" height="60" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="767" y="230" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Intermediate CA</text>
  <text x="767" y="250" text-anchor="middle" font-size="9" fill="#c4b5fd">Let's Encrypt R3 (issued by Root)</text>
  
  <!-- Arrow -->
  <line x1="767" y1="265" x2="767" y2="280" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="777" y="275" text-anchor="start" font-size="8" fill="var(--text-theme, #64748b">signed by</text>
  
  <!-- Root CA -->
  <rect x="630" y="285" width="275" height="60" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="767" y="310" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Root CA (Trusted)</text>
  <text x="767" y="330" text-anchor="middle" font-size="9" fill="#6ee7b7">ISRG Root X1 (self-signed, in trust store)</text>
  
  <!-- HTTPS Best Practices -->
  <rect x="30" y="375" width="890" height="160" rx="8" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="475" y="400" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #059669">HTTPS Implementation Best Practices</text>
  
  <rect x="50" y="420" width="260" height="105" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="180" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #059669">TLS Configuration</text>
  
  <text x="65" y="465" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ TLS 1.3 only (disable 1.0/1.1)</text>
  <text x="65" y="480" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Strong cipher suites (AEAD)</text>
  <text x="65" y="495" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Perfect Forward Secrecy (PFS)</text>
  <text x="65" y="510" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ HSTS with preload</text>
  <text x="65" y="525" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ OCSP Stapling enabled</text>
  
  <rect x="325" y="420" width="260" height="105" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="455" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #059669">Certificate Management</text>
  
  <text x="340" y="465" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Use Let's Encrypt / ACME</text>
  <text x="340" y="480" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Auto-renewal (30 days before)</text>
  <text x="340" y="495" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Monitor expiration</text>
  <text x="340" y="510" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ Use ECC certificates (smaller)</text>
  <text x="340" y="525" text-anchor="start" font-size="9" fill="var(--text-theme, #1e293b">✓ SAN certificates for multiple domains</text>
  
  <rect x="600" y="420" width="300" height="105" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="750" y="445" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #059669">Common Issues</text>
  
  <text x="615" y="465" text-anchor="start" font-size="9" fill="var(--text-theme, #ef4444">✗ Mixed content (HTTP resources)</text>
  <text x="615" y="480" text-anchor="start" font-size="9" fill="var(--text-theme, #ef4444">✗ Expired certificates</text>
  <text x="615" y="495" text-anchor="start" font-size="9" fill="var(--text-theme, #ef4444">✗ Wrong domain on certificate</text>
  <text x="615" y="510" text-anchor="start" font-size="9" fill="var(--text-theme, #ef4444">✗ Incomplete certificate chain</text>
  <text x="615" y="525" text-anchor="start" font-size="9" fill="var(--text-theme, #ef4444">✗ Weak cipher suites enabled</text>
  
  <!-- HTTP vs HTTPS -->
  <rect x="30" y="550" width="570" height="130" rx="8" fill="var(--bg-panel-hover, #fef2f2)" stroke="var(--border-theme, #ef4444)" stroke-width="2"/>
  <text x="315" y="575" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #b91c1c">HTTP vs HTTPS</text>
  
  <rect x="50" y="590" width="250" height="80" rx="4" fill="white" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="175" y="615" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b91c1c">✗ HTTP (Port 80)</text>
  
  <text x="65" y="635" text-anchor="start" font-size="8" fill="var(--text-theme, #1e293b">• Plain text transmission</text>
  <text x="65" y="650" text-anchor="start" font-size="8" fill="var(--text-theme, #1e293b">• Vulnerable to MITM attacks</text>
  <text x="65" y="665" text-anchor="start" font-size="8" fill="var(--text-theme, #1e293b">• No identity verification</text>
  
  <rect x="320" y="590" width="250" height="80" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="445" y="615" text-anchor="middle" font-size="11" font-weight="bold" fill="white">✓ HTTPS (Port 443)</text>
  
  <text x="335" y="635" text-anchor="start" font-size="8" fill="white">• Encrypted transmission (TLS)</text>
  <text x="335" y="650" text-anchor="start" font-size="8" fill="white">• Protects against eavesdropping</text>
  <text x="335" y="665" text-anchor="start" font-size="8" fill="white">• Server identity verified</text>
  
  <!-- Redirect HTTP to HTTPS -->
  <rect x="615" y="550" width="305" height="130" rx="8" fill="var(--bg-panel-soft, #f0fdf4)" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="767" y="575" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #059669">HTTP to HTTPS Redirect</text>
  
  <rect x="630" y="590" width="275" height="80" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="767" y="615" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b">Always redirect HTTP → HTTPS</text>
  
  <text x="645" y="635" text-anchor="start" font-size="8" fill="var(--text-theme, #1e293b" font-family="monospace">HTTP 301 Moved Permanently</text>
  <text x="645" y="650" text-anchor="start" font-size="8" fill="var(--text-theme, #1e293b" font-family="monospace">Location: https://example.com</text>
  <text x="645" y="665" text-anchor="start" font-size="8" fill="var(--text-theme, #1e293b">Use 301 (permanent) not 302</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
