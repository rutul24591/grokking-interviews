<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" role="img" aria-labelledby="title desc">
  <title id="title">TLS 1.3 Handshake Flow</title>
  <desc id="desc">TLS 1.3 handshake sequence showing key exchange, certificate validation, and secure channel establishment</desc>
  
  <!-- Background -->
  <rect width="800" height="550" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">TLS 1.3 Handshake Sequence</text>
  
  <!-- Client Column -->
  <rect x="50" y="70" width="180" height="60" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="140" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Client</text>
  <text x="140" y="115" text-anchor="middle" font-size="11" fill="white">(Browser)</text>
  
  <!-- Server Column -->
  <rect x="570" y="70" width="180" height="60" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="660" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Server</text>
  <text x="660" y="115" text-anchor="middle" font-size="11" fill="white">(Web Server)</text>
  
  <!-- Timeline vertical lines -->
  <line x1="140" y1="130" x2="140" y2="450" stroke="var(--text-theme, #3b82f6)" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="660" y1="130" x2="660" y2="450" stroke="var(--text-theme, #10b981)" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Message Arrows -->
  <defs>
    <marker id="arrowClientToServer" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
    <marker id="arrowServerToClient" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
  
  <!-- Round 1: Client Hello -->
  <line x1="140" y1="150" x2="660" y2="150" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowClientToServer)"/>
  <rect x="160" y="135" width="200" height="30" rx="4" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="260" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b)">1. Client Hello</text>
  <text x="400" y="175" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Cipher suites, key share, SNI</text>
  
  <!-- Round 1: Server Hello -->
  <line x1="660" y1="200" x2="140" y2="200" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrowServerToClient)"/>
  <rect x="440" y="185" width="200" height="30" rx="4" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="540" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b)">2. Server Hello</text>
  <text x="400" y="225" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Selected cipher, key share</text>
  
  <!-- Server Parameters -->
  <line x1="660" y1="250" x2="140" y2="250" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrowServerToClient)"/>
  <rect x="440" y="235" width="200" height="30" rx="4" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="540" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b)">3. Server Parameters</text>
  <text x="400" y="275" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Extensions, random</text>
  
  <!-- Certificate -->
  <line x1="660" y1="300" x2="140" y2="300" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrowServerToClient)"/>
  <rect x="440" y="285" width="200" height="30" rx="4" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #d97706)" stroke-width="1"/>
  <text x="540" y="305" text-anchor="middle" font-size="11" font-weight="bold" fill="white">4. Certificate</text>
  <text x="400" y="325" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Server cert chain</text>
  
  <!-- Certificate Verify -->
  <line x1="660" y1="350" x2="140" y2="350" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrowServerToClient)"/>
  <rect x="440" y="335" width="200" height="30" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #7c3aed)" stroke-width="1"/>
  <text x="540" y="355" text-anchor="middle" font-size="11" font-weight="bold" fill="white">5. Certificate Verify</text>
  <text x="400" y="375" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Signature proof</text>
  
  <!-- Finished (Server) -->
  <line x1="660" y1="400" x2="140" y2="400" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrowServerToClient)"/>
  <rect x="440" y="385" width="200" height="30" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="540" y="405" text-anchor="middle" font-size="11" font-weight="bold" fill="white">6. Server Finished</text>
  <text x="400" y="425" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Handshake MAC</text>
  
  <!-- Finished (Client) -->
  <line x1="140" y1="450" x2="660" y2="450" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowClientToServer)"/>
  <rect x="160" y="435" width="200" height="30" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="260" y="455" text-anchor="middle" font-size="11" font-weight="bold" fill="white">7. Client Finished</text>
  <text x="400" y="475" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Handshake complete</text>
  
  <!-- Secure Channel Established -->
  <rect x="250" y="490" width="300" height="40" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="400" y="515" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🔒 Secure Channel Established</text>
  
  <!-- Key Information Box -->
  <rect x="550" y="140" width="200" height="100" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="650" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b)">TLS 1.3 Improvements</text>
  <text x="650" y="180" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">• 1-RTT handshake (faster)</text>
  <text x="650" y="195" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">• 0-RTT resumption option</text>
  <text x="650" y="210" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">• Removed weak algorithms</text>
  <text x="650" y="225" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">• Forward secrecy mandatory</text>
</svg>
