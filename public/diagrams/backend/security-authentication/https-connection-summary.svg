<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">HTTPS Connection Summary</title>
  <desc id="desc">HTTPS connection overview showing TLS-secured HTTP connection between client and server with encryption layers</desc>
  
  <!-- Background -->
  <rect width="800" height="600" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">HTTPS Connection Overview</text>
  
  <!-- Client Side -->
  <rect x="50" y="70" width="200" height="120" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="150" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Client</text>
  <text x="150" y="125" text-anchor="middle" font-size="11" fill="white">Browser / App</text>
  <text x="150" y="150" text-anchor="middle" font-size="10" fill="white">HTTP Client</text>
  <text x="150" y="170" text-anchor="middle" font-size="10" fill="white">TLS Layer</text>
  
  <!-- Server Side -->
  <rect x="550" y="70" width="200" height="120" rx="8" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="650" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Server</text>
  <text x="650" y="125" text-anchor="middle" font-size="11" fill="white">Web Server</text>
  <text x="650" y="150" text-anchor="middle" font-size="10" fill="white">TLS Layer</text>
  <text x="650" y="170" text-anchor="middle" font-size="10" fill="white">HTTP Handler</text>
  
  <!-- TLS Connection -->
  <rect x="280" y="70" width="240" height="120" rx="8" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b)">TLS Encrypted Channel</text>
  
  <!-- Encryption visualization -->
  <g transform="translate(320, 110)">
    <rect x="0" y="0" width="20" height="20" rx="3" fill="var(--text-theme, #8b5cf6)" opacity="0.6"/>
    <rect x="25" y="0" width="20" height="20" rx="3" fill="var(--text-theme, #8b5cf6)" opacity="0.6"/>
    <rect x="50" y="0" width="20" height="20" rx="3" fill="var(--text-theme, #8b5cf6)" opacity="0.6"/>
    <rect x="75" y="0" width="20" height="20" rx="3" fill="var(--text-theme, #8b5cf6)" opacity="0.6"/>
    <rect x="100" y="0" width="20" height="20" rx="3" fill="var(--text-theme, #8b5cf6)" opacity="0.6"/>
    <rect x="125" y="0" width="20" height="20" rx="3" fill="var(--text-theme, #8b5cf6)" opacity="0.6"/>
  </g>
  <text x="400" y="165" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Encrypted Data Stream</text>
  
  <!-- Connection Arrows -->
  <defs>
    <marker id="arrowSecure" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
  </defs>
  
  <!-- HTTP to HTTPS Redirect -->
  <rect x="250" y="220" width="300" height="80" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="400" y="245" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b)">HTTP → HTTPS Redirect</text>
  <text x="400" y="270" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Port 80 (HTTP) automatically redirects</text>
  <text x="400" y="288" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">to Port 443 (HTTPS) for security</text>
  
  <!-- Lock Icon -->
  <path d="M 380 235 L 380 250 A 10 10 0 0 0 400 250 L 400 235 Z" fill="var(--text-theme, #10b981)"/>
  <rect x="383" y="242" width="14" height="10" rx="2" fill="var(--text-theme, #10b981)"/>
  
  <!-- TLS Handshake Section -->
  <rect x="50" y="330" width="700" height="140" rx="8" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="400" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">TLS Handshake Process</text>
  
  <!-- Handshake Steps -->
  <g transform="translate(70, 375)">
    <!-- Step 1 -->
    <rect x="0" y="0" width="120" height="50" rx="6" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
    <text x="60" y="25" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">1. Client Hello</text>
    <text x="60" y="42" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Cipher suites</text>
    
    <!-- Arrow -->
    <line x1="125" y1="25" x2="145" y2="25" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowSecure)"/>
    
    <!-- Step 2 -->
    <rect x="150" y="0" width="120" height="50" rx="6" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
    <text x="210" y="20" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">2. Server Hello</text>
    <text x="210" y="37" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Certificate + Key</text>
    
    <!-- Arrow -->
    <line x1="275" y1="25" x2="295" y2="25" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowSecure)"/>
    
    <!-- Step 3 -->
    <rect x="300" y="0" width="120" height="50" rx="6" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
    <text x="360" y="20" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">3. Key Exchange</text>
    <text x="360" y="37" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Shared secret</text>
    
    <!-- Arrow -->
    <line x1="425" y1="25" x2="445" y2="25" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowSecure)"/>
    
    <!-- Step 4 -->
    <rect x="450" y="0" width="120" height="50" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
    <text x="510" y="25" text-anchor="middle" font-size="10" font-weight="bold" fill="white">4. Secure Channel</text>
    <text x="510" y="42" text-anchor="middle" font-size="9" fill="white">Encrypted</text>
  </g>
  
  <!-- Security Features -->
  <rect x="50" y="500" width="340" height="90" rx="8" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="220" y="522" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b)">Security Features</text>
  <text x="220" y="542" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">✓ Encryption (AES-GCM, ChaCha20)</text>
  <text x="220" y="560" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">✓ Authentication (Certificates)</text>
  <text x="220" y="578" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">✓ Integrity (HMAC, AEAD)</text>
  
  <!-- Best Practices -->
  <rect x="410" y="500" width="340" height="90" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="580" y="522" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b)">Best Practices</text>
  <text x="580" y="542" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">• Enforce HTTPS redirect (HSTS)</text>
  <text x="580" y="560" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">• Use TLS 1.3 (disable old versions)</text>
  <text x="580" y="578" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">• Monitor certificate expiration</text>
</svg>
