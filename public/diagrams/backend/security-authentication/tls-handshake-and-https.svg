<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 750" role="img" aria-labelledby="title desc">
  <title id="title">TLS Handshake and HTTPS Security</title>
  <desc id="desc">Comprehensive visualization of TLS 1.3 handshake flow, certificate chain validation, and HTTPS secure connection establishment</desc>
  
  <!-- Background -->
  <rect width="950" height="750" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="475" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="var(--text-theme, #1e293b)">TLS Handshake and HTTPS Security</text>
  <text x="475" y="60" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">How TLS 1.3 establishes secure encrypted connections</text>
  
  <!-- TLS 1.3 Handshake Section -->
  <rect x="30" y="80" width="890" height="320" rx="8" fill="var(--bg-panel-hover, #eff6ff)" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <text x="475" y="108" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e40af)">TLS 1.3 Handshake Flow (1-RTT)</text>
  
  <!-- Client -->
  <rect x="60" y="135" width="150" height="80" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="135" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Client</text>
  <text x="135" y="190" text-anchor="middle" font-size="11" fill="#bfdbfe">Browser/App</text>
  
  <!-- Server -->
  <rect x="740" y="135" width="150" height="80" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="815" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Server</text>
  <text x="815" y="190" text-anchor="middle" font-size="11" fill="#6ee7b7">Web Server</text>
  
  <!-- Handshake Steps -->
  <!-- Step 1: Client Hello -->
  <line x1="210" y1="175" x2="740" y2="175" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="475" y="165" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e40af)">1. Client Hello</text>
  <rect x="350" y="180" width="250" height="35" rx="4" fill="white" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="475" y="195" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Supported versions, cipher suites</text>
  <text x="475" y="208" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Key share (DH), SNI, ALPN</text>
  
  <!-- Step 2: Server Hello + Cert + Finished -->
  <line x1="740" y1="250" x2="210" y2="250" stroke="var(--text-theme, #10b981)" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="475" y="240" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #059669)">2. Server Hello + Certificate + Finished</text>
  <rect x="350" y="255" width="250" height="50" rx="4" fill="white" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="475" y="270" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Selected cipher, server key share</text>
  <text x="475" y="283" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Certificate chain, Certificate Verify</text>
  <text x="475" y="296" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Finished (encrypted)</text>
  
  <!-- Step 3: Client Finished -->
  <line x1="210" y1="335" x2="740" y2="335" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="475" y="325" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e40af)">3. Client Finished</text>
  <rect x="350" y="340" width="250" height="35" rx="4" fill="white" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="475" y="355" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Finished (encrypted)</text>
  <text x="475" y="368" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Secure channel established</text>
  
  <!-- Key Exchange Box -->
  <rect x="60" y="240" width="150" height="110" rx="6" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="135" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #b45309)">Key Derivation</text>
  <text x="135" y="285" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Shared secret from</text>
  <text x="135" y="298" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Diffie-Hellman exchange</text>
  <text x="135" y="315" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">HKDF derives:</text>
  <text x="135" y="330" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">• Encryption keys</text>
  <text x="135" y="343" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">• MAC keys</text>
  
  <!-- Server Side Box -->
  <rect x="740" y="240" width="150" height="110" rx="6" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="815" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #059669)">Server Actions</text>
  <text x="815" y="285" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">• Validate client hello</text>
  <text x="815" y="298" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">• Send certificate</text>
  <text x="815" y="315" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">• Sign key exchange</text>
  <text x="815" y="330" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">• Derive same keys</text>
  <text x="815" y="343" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">• Verify finished</text>
  
  <!-- Cipher Suites -->
  <rect x="250" y="415" width="450" height="70" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="475" y="438" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b)">TLS 1.3 Cipher Suites (AEAD Only)</text>
  <text x="475" y="458" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)" font-family="monospace">TLS_AES_256_GCM_SHA384 | TLS_CHACHA20_POLY1305_SHA256 | TLS_AES_128_GCM_SHA256</text>
  <text x="475" y="475" text-anchor="middle" font-size="9" fill="var(--text-theme, #059669)">✓ Authenticated Encryption (AEAD) only - no CBC, no RC4, no MD5</text>
  
  <!-- Certificate Chain Section -->
  <rect x="30" y="415" width="890" height="315" rx="8" fill="var(--bg-panel-soft, #f0fdf4)" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <text x="475" y="443" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #059669)">X.509 Certificate Chain Validation</text>
  
  <!-- Certificate Chain Visualization -->
  <!-- End Entity Cert -->
  <rect x="80" y="470" width="200" height="90" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="180" y="495" text-anchor="middle" font-size="12" font-weight="bold" fill="white">End Entity Certificate</text>
  <text x="180" y="515" text-anchor="middle" font-size="9" fill="#bfdbfe">Subject: example.com</text>
  <text x="180" y="530" text-anchor="middle" font-size="9" fill="#bfdbfe">Issuer: Intermediate CA</text>
  <text x="180" y="545" text-anchor="middle" font-size="9" fill="#bfdbfe">Valid: 2024-2025</text>
  <text x="180" y="560" text-anchor="middle" font-size="9" fill="#fcd34d">🔒 Public Key</text>
  
  <!-- Arrow -->
  <line x1="280" y1="515" x2="310" y2="515" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="295" y="505" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">signed by</text>
  
  <!-- Intermediate CA -->
  <rect x="320" y="470" width="200" height="90" rx="6" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="420" y="495" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Intermediate CA</text>
  <text x="420" y="515" text-anchor="middle" font-size="9" fill="#c4b5fd">Subject: Intermediate CA</text>
  <text x="420" y="530" text-anchor="middle" font-size="9" fill="#c4b5fd">Issuer: Root CA</text>
  <text x="420" y="545" text-anchor="middle" font-size="9" fill="#c4b5fd">CA: TRUE</text>
  <text x="420" y="560" text-anchor="middle" font-size="9" fill="#fcd34d">🔒 Public Key</text>
  
  <!-- Arrow -->
  <line x1="520" y1="515" x2="550" y2="515" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="535" y="505" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">signed by</text>
  
  <!-- Root CA -->
  <rect x="560" y="470" width="200" height="90" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="660" y="495" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Root CA (Trusted)</text>
  <text x="660" y="515" text-anchor="middle" font-size="9" fill="#6ee7b7">Subject: Root CA</text>
  <text x="660" y="530" text-anchor="middle" font-size="9" fill="#6ee7b7">Issuer: Self-signed</text>
  <text x="660" y="545" text-anchor="middle" font-size="9" fill="#6ee7b7">CA: TRUE</text>
  <text x="660" y="560" text-anchor="middle" font-size="9" fill="#fcd34d">🔒 Public Key</text>
  
  <!-- Trust Anchor -->
  <rect x="780" y="470" width="120" height="90" rx="6" fill="var(--bg-panel-hover, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="840" y="495" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #b45309)">Trust Store</text>
  <text x="840" y="515" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Browser/OS</text>
  <text x="840" y="530" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">pre-installed</text>
  <text x="840" y="545" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">root certificates</text>
  <text x="840" y="560" text-anchor="middle" font-size="9" fill="var(--text-theme, #b45309)">✓ Trusted</text>
  
  <!-- Validation Steps -->
  <rect x="80" y="580" width="820" height="135" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="490" y="605" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Certificate Validation Steps</text>
  
  <!-- Step 1 -->
  <rect x="100" y="620" width="180" height="80" rx="4" fill="var(--bg-panel-soft, #fee2e2)" stroke="var(--border-theme, #fca5a5)" stroke-width="1"/>
  <text x="190" y="640" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b91c1c)">1. Chain Building</text>
  <text x="190" y="657" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Verify each cert is</text>
  <text x="190" y="670" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">signed by next in chain</text>
  <text x="190" y="687" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">to trusted root</text>
  
  <!-- Step 2 -->
  <rect x="295" y="620" width="180" height="80" rx="4" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="385" y="640" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #b45309)">2. Validity Period</text>
  <text x="385" y="657" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Check notBefore and</text>
  <text x="385" y="670" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">notAfter dates</text>
  <text x="385" y="687" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444)">✗ Expired = Reject</text>
  
  <!-- Step 3 -->
  <rect x="490" y="620" width="180" height="80" rx="4" fill="var(--bg-panel-soft, #dbeafe)" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="580" y="640" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e40af)">3. Revocation Check</text>
  <text x="580" y="657" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">CRL or OCSP check</text>
  <text x="580" y="670" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Certificate not revoked</text>
  <text x="580" y="687" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">OCSP Stapling preferred</text>
  
  <!-- Step 4 -->
  <rect x="685" y="620" width="180" height="80" rx="4" fill="var(--bg-panel-soft, #ecfdf5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="775" y="640" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #059669)">4. Hostname Match</text>
  <text x="775" y="657" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">CN or SAN matches</text>
  <text x="775" y="670" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">requested hostname</text>
  <text x="775" y="687" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444)">✗ Mismatch = Reject</text>
  
  <!-- HTTPS Connection Summary -->
  <rect x="30" y="740" width="890" height="90" rx="6" fill="var(--bg-panel-hover, #faf5ff)" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <text x="475" y="765" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #6d28d9)">HTTPS = HTTP over TLS (Secure Channel)</text>
  
  <rect x="50" y="775" width="200" height="45" rx="4" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="150" y="795" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">🔐 Confidentiality</text>
  <text x="150" y="812" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">AES-256-GCM encryption</text>
  
  <rect x="265" y="775" width="200" height="45" rx="4" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="365" y="795" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">✓ Integrity</text>
  <text x="365" y="812" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">MAC prevents tampering</text>
  
  <rect x="480" y="775" width="200" height="45" rx="4" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="580" y="795" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">🏷️ Authentication</text>
  <text x="580" y="812" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Server identity verified</text>
  
  <rect x="695" y="775" width="200" height="45" rx="4" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="795" y="795" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">🔑 Forward Secrecy</text>
  <text x="795" y="812" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Ephemeral keys (DHE)</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #10b981)"/>
    </marker>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
