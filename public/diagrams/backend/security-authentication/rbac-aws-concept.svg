<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">RBAC Role-Based Access Control</title>
  <desc id="desc">RBAC concept diagram showing roles mapping to permissions and resources with user-role assignments</desc>
  
  <!-- Background -->
  <rect width="800" height="500" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">RBAC: Role-Based Access Control</text>
  
  <!-- Users Column -->
  <rect x="50" y="70" width="180" height="280" rx="8" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="140" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Users</text>
  
  <!-- User Items -->
  <rect x="70" y="110" width="140" height="40" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="140" y="135" text-anchor="middle" font-size="11" fill="white">Alice (Admin)</text>
  
  <rect x="70" y="160" width="140" height="40" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="140" y="185" text-anchor="middle" font-size="11" fill="white">Bob (Developer)</text>
  
  <rect x="70" y="210" width="140" height="40" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="140" y="235" text-anchor="middle" font-size="11" fill="white">Carol (Viewer)</text>
  
  <rect x="70" y="260" width="140" height="40" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="1"/>
  <text x="140" y="285" text-anchor="middle" font-size="11" fill="white">Dave (Operator)</text>
  
  <rect x="70" y="310" width="140" height="30" rx="6" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="140" y="330" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">+ More users...</text>
  
  <!-- Roles Column -->
  <rect x="280" y="70" width="240" height="280" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Roles</text>
  
  <!-- Role Items -->
  <rect x="300" y="110" width="200" height="50" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #4c1d95)" stroke-width="2"/>
  <text x="400" y="130" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b)">Admin</text>
  <text x="400" y="148" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Full system access</text>
  
  <rect x="300" y="170" width="200" height="50" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #4c1d95)" stroke-width="2"/>
  <text x="400" y="190" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b)">Developer</text>
  <text x="400" y="208" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Read + Write resources</text>
  
  <rect x="300" y="230" width="200" height="50" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #4c1d95)" stroke-width="2"/>
  <text x="400" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b)">Viewer</text>
  <text x="400" y="268" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Read-only access</text>
  
  <rect x="300" y="290" width="200" height="50" rx="6" fill="var(--bg-panel, #f8fafc)" stroke="var(--border-theme, #4c1d95)" stroke-width="2"/>
  <text x="400" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b)">Operator</text>
  <text x="400" y="328" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Operational tasks</text>
  
  <!-- Resources Column -->
  <rect x="570" y="70" width="180" height="280" rx="8" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="660" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Resources</text>
  
  <!-- Resource Items -->
  <rect x="590" y="110" width="140" height="35" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="660" y="132" text-anchor="middle" font-size="10" fill="white">Database</text>
  
  <rect x="590" y="155" width="140" height="35" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="660" y="177" text-anchor="middle" font-size="10" fill="white">API Endpoints</text>
  
  <rect x="590" y="200" width="140" height="35" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="660" y="222" text-anchor="middle" font-size="10" fill="white">Storage</text>
  
  <rect x="590" y="245" width="140" height="35" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="660" y="267" text-anchor="middle" font-size="10" fill="white">Admin Console</text>
  
  <rect x="590" y="290" width="140" height="35" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="660" y="312" text-anchor="middle" font-size="10" fill="white">Logs &amp; Metrics</text>
  
  <rect x="590" y="335" width="140" height="15" rx="6" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="660" y="347" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b">+ More...</text>
  
  <!-- Connection Arrows -->
  <defs>
    <marker id="arrowAssign" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #3b82f6)"/>
    </marker>
    <marker id="arrowPermit" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #8b5cf6)"/>
    </marker>
  </defs>
  
  <!-- User to Role assignments -->
  <line x1="230" y1="130" x2="280" y2="135" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowAssign)"/>
  <line x1="230" y1="180" x2="280" y2="195" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowAssign)"/>
  <line x1="230" y1="230" x2="280" y2="255" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowAssign)"/>
  <line x1="230" y1="280" x2="280" y2="315" stroke="var(--text-theme, #3b82f6)" stroke-width="2" marker-end="url(#arrowAssign)"/>
  
  <text x="255" y="125" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Assigned</text>
  
  <!-- Role to Resource permissions -->
  <line x1="520" y1="135" x2="570" y2="130" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrowPermit)"/>
  <line x1="520" y1="195" x2="570" y2="155" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrowPermit)"/>
  <line x1="520" y1="255" x2="570" y2="200" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrowPermit)"/>
  <line x1="520" y1="315" x2="570" y2="245" stroke="var(--text-theme, #8b5cf6)" stroke-width="2" marker-end="url(#arrowPermit)"/>
  
  <text x="545" y="180" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Permissions</text>
  
  <!-- Permission Matrix -->
  <rect x="50" y="370" width="700" height="120" rx="8" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="400" y="395" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Permission Matrix</text>
  
  <!-- Matrix Header -->
  <rect x="70" y="405" width="120" height="25" rx="3" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="130" y="422" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">Role</text>
  
  <rect x="190" y="405" width="120" height="25" rx="3" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="250" y="422" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">Database</text>
  
  <rect x="310" y="405" width="120" height="25" rx="3" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="370" y="422" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">API</text>
  
  <rect x="430" y="405" width="120" height="25" rx="3" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="490" y="422" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">Storage</text>
  
  <rect x="550" y="405" width="120" height="25" rx="3" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="610" y="422" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">Admin</text>
  
  <rect x="670" y="405" width="70" height="25" rx="3" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="705" y="422" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b">Logs</text>
  
  <!-- Matrix Rows -->
  <rect x="70" y="430" width="120" height="25" rx="3" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="130" y="447" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">Admin</text>
  
  <rect x="190" y="430" width="120" height="25" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="250" y="447" text-anchor="middle" font-size="10" fill="white">✓ RW</text>
  
  <rect x="310" y="430" width="120" height="25" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="370" y="447" text-anchor="middle" font-size="10" fill="white">✓ RW</text>
  
  <rect x="430" y="430" width="120" height="25" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="490" y="447" text-anchor="middle" font-size="10" fill="white">✓ RW</text>
  
  <rect x="550" y="430" width="120" height="25" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="610" y="447" text-anchor="middle" font-size="10" fill="white">✓ Full</text>
  
  <rect x="670" y="430" width="70" height="25" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="705" y="447" text-anchor="middle" font-size="10" fill="white">✓ RW</text>
  
  <!-- Developer Row -->
  <rect x="70" y="455" width="120" height="25" rx="3" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="130" y="472" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b">Developer</text>
  
  <rect x="190" y="455" width="120" height="25" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="250" y="472" text-anchor="middle" font-size="10" fill="white">✓ RW</text>
  
  <rect x="310" y="455" width="120" height="25" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="370" y="472" text-anchor="middle" font-size="10" fill="white">✓ RW</text>
  
  <rect x="430" y="455" width="120" height="25" rx="3" fill="var(--bg-theme, #fbbf24)" stroke="var(--border-theme, #d97706)" stroke-width="1"/>
  <text x="490" y="472" text-anchor="middle" font-size="10" fill="white">✓ R</text>
  
  <rect x="550" y="455" width="120" height="25" rx="3" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="610" y="472" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b">✗</text>
  
  <rect x="670" y="455" width="70" height="25" rx="3" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="705" y="472" text-anchor="middle" font-size="10" fill="white">✓ R</text>
</svg>
