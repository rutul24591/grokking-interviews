<svg xmlns="http://www.w3.org/2000/svg" width="900" height="320" viewBox="0 0 900 320">
  <rect width="100%" height="100%" fill="#ffffff" />
  <style>
    text { font-family: 'Sora', Arial, sans-serif; fill: #1f2937; }
    .box { fill: #f8fafc; stroke: #cbd5f5; stroke-width: 2; rx: 12; }
    .title { font-size: 20px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 600; }
    .small { font-size: 14px; fill: #475569; }
    .line { stroke: #94a3b8; stroke-width: 2.5; }
  </style>
  <text x="450" y="40" text-anchor="middle" class="title">OSI 7-Layer Model</text>
  <rect class="box" x="120" y="90" width="200" height="80" />
  <rect class="box" x="350" y="90" width="200" height="80" />
  <rect class="box" x="580" y="90" width="200" height="80" />
  <text x="220" y="135" text-anchor="middle" class="label">Application</text>
  <text x="450" y="135" text-anchor="middle" class="label">Transport</text>
  <text x="680" y="135" text-anchor="middle" class="label">Network</text>
  <line class="line" x1="320" y1="130" x2="350" y2="130" />
  <line class="line" x1="550" y1="130" x2="580" y2="130" />
  <text x="450" y="260" text-anchor="middle" class="small">Backend Fundamentals Diagram</text>
</svg>
