<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f8fafc" />
  <text x="40" y="50" font-family="Arial" font-size="20" fill="#0f172a">Request Coalescing</text>

  <rect x="80" y="100" width="260" height="70" rx="12" fill="#e2e8f0" stroke="#94a3b8" />
  <text x="140" y="142" font-family="Arial" font-size="14" fill="#0f172a">Many Requests</text>

  <rect x="420" y="100" width="220" height="70" rx="12" fill="#dbeafe" stroke="#60a5fa" />
  <text x="455" y="142" font-family="Arial" font-size="14" fill="#0f172a">Singleflight</text>

  <rect x="700" y="100" width="180" height="70" rx="12" fill="#fee2e2" stroke="#fca5a5" />
  <text x="740" y="142" font-family="Arial" font-size="14" fill="#0f172a">Database</text>

  <line x1="340" y1="135" x2="420" y2="135" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="640" y1="135" x2="700" y2="135" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

  <rect x="80" y="230" width="800" height="110" rx="12" fill="#f1f5f9" stroke="#cbd5f5" />
  <text x="110" y="265" font-family="Arial" font-size="14" fill="#0f172a">Only one request performs the load, others await the same promise.</text>
  <text x="110" y="290" font-family="Arial" font-size="14" fill="#0f172a">This prevents duplicate DB calls during cache misses.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#475569" />
    </marker>
  </defs>
</svg>
