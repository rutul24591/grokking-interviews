<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420">
  <rect width="960" height="420" fill="#f8fafc" />
  <text x="40" y="50" font-family="Arial" font-size="20" fill="#0f172a">HTTP Cache Participants</text>

  <rect x="60" y="110" width="180" height="70" rx="12" fill="#e2e8f0" stroke="#94a3b8" />
  <text x="100" y="150" font-family="Arial" font-size="14" fill="#0f172a">Browser Cache</text>

  <rect x="300" y="110" width="180" height="70" rx="12" fill="#dbeafe" stroke="#60a5fa" />
