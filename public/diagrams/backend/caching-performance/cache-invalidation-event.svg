<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="70" font-size="28" font-family="Arial" fill="#0f172a">Event-Driven Invalidation</text>
  <rect x="80" y="140" width="300" height="120" rx="12" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="110" y="190" font-size="18" font-family="Arial" fill="#0f172a">Database Write</text>
  <text x="110" y="220" font-size="14" font-family="Arial" fill="#475569">Update product 123</text>
  <rect x="450" y="140" width="300" height="120" rx="12" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="480" y="190" font-size="18" font-family="Arial" fill="#0f172a">Event Bus</text>
  <text x="480" y="220" font-size="14" font-family="Arial" fill="#475569">product.updated</text>
  <rect x="820" y="140" width="300" height="120" rx="12" fill="#dcfce7" stroke="#22c55e"/>
  <text x="850" y="190" font-size="18" font-family="Arial" fill="#0f172a">Cache Invalidator</text>
  <text x="850" y="220" font-size="14" font-family="Arial" fill="#475569">Del keys / tags</text>
  <line x1="380" y1="200" x2="450" y2="200" stroke="#94a3b8" stroke-width="4"/>
  <line x1="750" y1="200" x2="820" y2="200" stroke="#94a3b8" stroke-width="4"/>
  <rect x="300" y="340" width="600" height="160" rx="12" fill="#f1f5f9" stroke="#cbd5f5"/>
  <text x="330" y="385" font-size="16" font-family="Arial" fill="#0f172a">Keys invalidated:</text>
  <text x="330" y="415" font-size="16" font-family="Arial" fill="#0f172a">product:v1:123</text>
  <text x="330" y="445" font-size="16" font-family="Arial" fill="#0f172a">product:price:v1:123</text>
  <text x="330" y="475" font-size="16" font-family="Arial" fill="#0f172a">category:top:v1:electronics</text>
  <text x="80" y="560" font-size="16" font-family="Arial" fill="#475569">Event-driven invalidation improves freshness but adds complexity and dependencies.</text>
</svg>
