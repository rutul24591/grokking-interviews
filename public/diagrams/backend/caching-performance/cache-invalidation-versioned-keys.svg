<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="70" font-size="28" font-family="Arial" fill="#0f172a">Versioned Keys (Cache Busting)</text>
  <rect x="80" y="140" width="420" height="140" rx="12" fill="#e2e8f0" stroke="#94a3b8"/>
  <text x="110" y="185" font-size="18" font-family="Arial" fill="#0f172a">Version Store</text>
  <text x="110" y="220" font-size="16" font-family="Arial" fill="#475569">product:version = 42</text>
  <rect x="620" y="140" width="480" height="140" rx="12" fill="#dcfce7" stroke="#22c55e"/>
  <text x="650" y="185" font-size="18" font-family="Arial" fill="#0f172a">Cache Key</text>
  <text x="650" y="220" font-size="16" font-family="Arial" fill="#475569">product:v42:123</text>
  <line x1="500" y1="210" x2="620" y2="210" stroke="#94a3b8" stroke-width="4"/>
  <rect x="80" y="340" width="1020" height="160" rx="12" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="110" y="385" font-size="16" font-family="Arial" fill="#0f172a">On update:</text>
  <text x="110" y="415" font-size="16" font-family="Arial" fill="#0f172a">1) increment version to 43</text>
  <text x="110" y="445" font-size="16" font-family="Arial" fill="#0f172a">2) new reads use product:v43:123</text>
  <text x="110" y="475" font-size="16" font-family="Arial" fill="#0f172a">3) old keys expire naturally (no delete storm)</text>
  <text x="80" y="560" font-size="16" font-family="Arial" fill="#475569">Versioned keys avoid mass deletion and simplify rollbacks.</text>
</svg>
