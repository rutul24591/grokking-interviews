<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#f8fafc"/>
  <text x="60" y="70" font-size="28" font-family="Arial" fill="#0f172a">Replication and Read Routing</text>
  <rect x="80" y="140" width="300" height="140" rx="12" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="110" y="195" font-size="18" font-family="Arial" fill="#0f172a">Primary Cache Node</text>
  <text x="110" y="225" font-size="14" font-family="Arial" fill="#475569">Writes + authoritative</text>
  <rect x="520" y="110" width="260" height="110" rx="12" fill="#dcfce7" stroke="#22c55e"/>
  <text x="550" y="165" font-size="16" font-family="Arial" fill="#0f172a">Replica 1</text>
  <rect x="520" y="250" width="260" height="110" rx="12" fill="#dcfce7" stroke="#22c55e"/>
  <text x="550" y="305" font-size="16" font-family="Arial" fill="#0f172a">Replica 2</text>
  <line x1="380" y1="190" x2="520" y2="165" stroke="#94a3b8" stroke-width="4"/>
  <line x1="380" y1="210" x2="520" y2="305" stroke="#94a3b8" stroke-width="4"/>
  <rect x="860" y="140" width="280" height="140" rx="12" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="890" y="195" font-size="16" font-family="Arial" fill="#0f172a">Client Read</text>
  <text x="890" y="225" font-size="14" font-family="Arial" fill="#475569">Route to replica</text>
  <line x1="780" y1="165" x2="860" y2="195" stroke="#94a3b8" stroke-width="4"/>
  <line x1="780" y1="305" x2="860" y2="225" stroke="#94a3b8" stroke-width="4"/>
  <text x="60" y="520" font-size="16" font-family="Arial" fill="#475569">Replication increases read throughput but can introduce lag and stale reads.</text>
</svg>
