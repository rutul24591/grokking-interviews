<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">Distributed Locks Architecture</title>
  <desc id="desc">Diagram showing multiple clients acquiring locks from a central lock service to coordinate access to shared resources</desc>
  
  <!-- Background -->
  <rect width="800" height="400" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">Distributed Locks Architecture</text>
  
  <!-- Lock Service Box -->
  <rect x="300" y="150" width="200" height="100" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="400" y="195" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Lock Service</text>
  <text x="400" y="215" text-anchor="middle" font-size="11" fill="white">Acquire/Release Locks</text>
  
  <!-- Client 1 -->
  <rect x="50" y="80" width="140" height="60" rx="6" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="120" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b)">Client 1</text>
  <text x="120" y="125" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Worker Node</text>
  
  <!-- Client 2 -->
  <rect x="50" y="260" width="140" height="60" rx="6" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="120" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b)">Client 2</text>
  <text x="120" y="305" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Worker Node</text>
  
  <!-- Client 3 -->
  <rect x="610" y="80" width="140" height="60" rx="6" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="680" y="105" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b)">Client 3</text>
  <text x="680" y="125" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Worker Node</text>
  
  <!-- Client 4 -->
  <rect x="610" y="260" width="140" height="60" rx="6" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="680" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b)">Client 4</text>
  <text x="680" y="305" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Worker Node</text>
  
  <!-- Arrows from clients to lock service -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
  
  <!-- Arrow Client 1 to Lock Service -->
  <line x1="190" y1="110" x2="295" y2="180" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="230" y="140" font-size="10" fill="var(--text-theme, #64748b)">Acquire</text>
  
  <!-- Arrow Lock Service to Client 1 -->
  <line x1="295" y1="200" x2="190" y2="130" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="230" y="170" font-size="10" fill="var(--text-theme, #64748b)">Granted</text>
  
  <!-- Arrow Client 2 to Lock Service -->
  <line x1="190" y1="290" x2="295" y2="230" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="230" y="265" font-size="10" fill="var(--text-theme, #64748b)">Acquire</text>
  
  <!-- Arrow Lock Service to Client 2 -->
  <line x1="295" y1="220" x2="190" y2="300" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="230" y="215" font-size="10" fill="var(--text-theme, #64748b)">Wait</text>
  
  <!-- Arrow Client 3 to Lock Service -->
  <line x1="610" y1="110" x2="505" y2="180" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="570" y="140" font-size="10" fill="var(--text-theme, #64748b)">Acquire</text>
  
  <!-- Arrow Lock Service to Client 3 -->
  <line x1="505" y1="200" x2="610" y2="130" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="570" y="170" font-size="10" fill="var(--text-theme, #64748b)">Granted</text>
  
  <!-- Arrow Client 4 to Lock Service -->
  <line x1="610" y1="290" x2="505" y2="230" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="570" y="265" font-size="10" fill="var(--text-theme, #64748b)">Release</text>
  
  <!-- Shared Resource Box -->
  <rect x="300" y="320" width="200" height="60" rx="6" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="400" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="var(--text-theme, #1e293b)">Shared Resource</text>
  <text x="400" y="365" text-anchor="middle" font-size="11" fill="var(--text-theme, #64748b)">Database / File / Queue</text>
  
  <!-- Arrow from Lock Service to Resource -->
  <line x1="400" y1="250" x2="400" y2="315" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="410" y="285" font-size="10" fill="var(--text-theme, #64748b)">Controls</text>
  <text x="410" y="300" font-size="10" fill="var(--text-theme, #64748b)">Access</text>
</svg>
