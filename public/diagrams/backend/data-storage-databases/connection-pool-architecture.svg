<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Connection Pool Architecture</title>
  <desc id="desc">Diagram showing JDBC connection pool architecture with application, connection pool, and database interactions</desc>
  
  <!-- Background -->
  <rect width="800" height="450" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="var(--text-theme, #1e293b)">JDBC Connection Pool Architecture</text>
  
  <!-- Application Layer -->
  <rect x="50" y="70" width="250" height="80" rx="8" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="175" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Application</text>
  <text x="175" y="125" text-anchor="middle" font-size="11" fill="white">Request Handler</text>
  <text x="175" y="140" text-anchor="middle" font-size="10" fill="white">(Web Service / Microservice)</text>
  
  <!-- Connection Pool Layer -->
  <rect x="275" y="70" width="250" height="120" rx="8" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #64748b)" stroke-width="2"/>
  <text x="400" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Connection Pool</text>
  
  <!-- Pool Connections -->
  <rect x="295" y="110" width="210" height="25" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="400" y="127" text-anchor="middle" font-size="11" fill="white">Active Connections (In Use)</text>
  
  <rect x="295" y="140" width="210" height="25" rx="4" fill="var(--bg-panel-hover, #94a3b8)" stroke="var(--border-theme, #64748b)" stroke-width="1"/>
  <text x="400" y="157" text-anchor="middle" font-size="11" fill="white">Idle Connections (Available)</text>
  
  <text x="400" y="180" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Pool Size: Fixed | Timeout: Configured</text>
  
  <!-- Database Layer -->
  <rect x="500" y="70" width="250" height="80" rx="8" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="625" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Database</text>
  <text x="625" y="125" text-anchor="middle" font-size="11" fill="white">Connection Handler</text>
  <text x="625" y="140" text-anchor="middle" font-size="10" fill="white">(Max Connections: N)</text>
  
  <!-- Flow Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
  
  <!-- Request Flow -->
  <line x1="300" y1="110" x2="275" y2="110" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="285" y="105" font-size="9" fill="var(--text-theme, #64748b)">1. Borrow</text>
  
  <line x1="525" y1="110" x2="500" y2="110" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="510" y="105" font-size="9" fill="var(--text-theme, #64748b)">2. Execute</text>
  
  <line x1="275" y1="130" x2="300" y2="130" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="285" y="125" font-size="9" fill="var(--text-theme, #64748b)">3. Return</text>
  
  <!-- Lifecycle Diagram Below -->
  <rect x="50" y="220" width="700" height="210" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="400" y="250" text-anchor="middle" font-size="14" font-weight="bold" fill="var(--text-theme, #1e293b)">Connection Lifecycle</text>
  
  <!-- Lifecycle States -->
  <circle cx="150" cy="320" r="40" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="150" y="315" text-anchor="middle" font-size="10" fill="white">Pool</text>
  <text x="150" y="330" text-anchor="middle" font-size="10" fill="white">Created</text>
  
  <circle cx="300" cy="320" r="40" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="300" y="315" text-anchor="middle" font-size="10" fill="white">Active</text>
  <text x="300" y="330" text-anchor="middle" font-size="10" fill="white">In Use</text>
  
  <circle cx="450" cy="320" r="40" fill="var(--bg-panel-hover, #94a3b8)" stroke="var(--border-theme, #64748b)" stroke-width="2"/>
  <text x="450" y="315" text-anchor="middle" font-size="10" fill="white">Idle</text>
  <text x="450" y="330" text-anchor="middle" font-size="10" fill="white">Available</text>
  
  <circle cx="600" cy="320" r="40" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="2"/>
  <text x="600" y="315" text-anchor="middle" font-size="10" fill="white">Pool</text>
  <text x="600" y="330" text-anchor="middle" font-size="10" fill="white">Closed</text>
  
  <!-- Lifecycle Arrows -->
  <line x1="190" y1="320" x2="260" y2="320" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="225" y="310" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Borrow</text>
  
  <line x1="340" y1="320" x2="410" y2="320" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="375" y="310" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Return</text>
  
  <line x1="490" y1="320" x2="560" y2="320" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="525" y="310" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Timeout/</text>
  <text x="525" y="345" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Shutdown</text>
  
  <!-- Return arrow from Idle to Active -->
  <path d="M 450 280 Q 450 240 300 240 Q 260 240 260 280" stroke="var(--text-theme, #64748b)" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="375" y="255" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Reuse</text>
  
  <!-- Key Metrics -->
  <rect x="50" y="380" width="220" height="40" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="160" y="400" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">Key Metrics:</text>
  <text x="160" y="415" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Pool utilization, wait time</text>
  
  <rect x="290" y="380" width="220" height="40" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="400" y="400" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">Common Risks:</text>
  <text x="400" y="415" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Pool exhaustion, leaks</text>
  
  <rect x="530" y="380" width="220" height="40" rx="6" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="1"/>
  <text x="640" y="400" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">Best Practices:</text>
  <text x="640" y="415" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Size pools, set timeouts</text>
</svg>
