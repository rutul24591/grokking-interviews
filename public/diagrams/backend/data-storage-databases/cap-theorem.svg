<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" role="img" aria-labelledby="title desc">
  <title id="title">CAP Theorem Triangle</title>
  <desc id="desc">CAP theorem triangle showing the trade-off between Consistency, Availability, and Partition Tolerance in distributed systems</desc>
  
  <!-- Background -->
  <rect width="600" height="500" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="300" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="var(--text-theme, #1e293b)">CAP Theorem</text>
  <text x="300" y="65" text-anchor="middle" font-size="12" fill="var(--text-theme, #64748b)">Choose 2 out of 3 during partitions</text>
  
  <!-- Triangle -->
  <defs>
    <linearGradient id="triangleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:var(--bg-theme, #3b82f6);stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:var(--bg-theme, #8b5cf6);stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  
  <polygon points="300,100 150,400 450,400" fill="url(#triangleGradient)" stroke="var(--border-theme, #64748b)" stroke-width="3"/>
  
  <!-- Vertices -->
  <!-- Top: Consistency -->
  <circle cx="300" cy="100" r="50" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="3"/>
  <text x="300" y="95" text-anchor="middle" font-size="16" font-weight="bold" fill="white">C</text>
  <text x="300" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b)">Consistency</text>
  <text x="300" y="182" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Latest write</text>
  <text x="300" y="195" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">visible to all</text>
  
  <!-- Bottom Left: Availability -->
  <circle cx="150" cy="400" r="50" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="3"/>
  <text x="150" y="405" text-anchor="middle" font-size="16" font-weight="bold" fill="white">A</text>
  <text x="150" y="475" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b)">Availability</text>
  <text x="150" y="492" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">Every request</text>
  <text x="150" y="505" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">gets response</text>
  
  <!-- Bottom Right: Partition Tolerance -->
  <circle cx="450" cy="400" r="50" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="3"/>
  <text x="450" y="405" text-anchor="middle" font-size="16" font-weight="bold" fill="white">P</text>
  <text x="450" y="475" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b)">Partition</text>
  <text x="450" y="492" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b)">Tolerance</text>
  <text x="450" y="508" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">System works</text>
  <text x="450" y="520" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">despite failures</text>
  
  <!-- System Examples on Edges -->
  <!-- CP Systems -->
  <rect x="200" y="230" width="140" height="50" rx="6" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="270" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b)">CP Systems</text>
  <text x="270" y="268" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">MongoDB, HBase, Redis</text>
  
  <!-- AP Systems -->
  <rect x="240" y="340" width="140" height="50" rx="6" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #94a3b8)" stroke-width="2"/>
  <text x="310" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b)">AP Systems</text>
  <text x="310" y="378" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Cassandra, DynamoDB</text>
  
  <!-- CA Systems (theoretical) -->
  <rect x="320" y="230" width="140" height="50" rx="6" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="390" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #1e293b)">CA Systems</text>
  <text x="390" y="268" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Traditional RDBMS</text>
  <text x="390" y="280" text-anchor="middle" font-size="8" fill="var(--text-theme, #94a3b8)">(Not in distributed)</text>
  
  <!-- Partition Indicator -->
  <rect x="50" y="220" width="90" height="60" rx="6" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="2"/>
  <text x="95" y="245" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Network</text>
  <text x="95" y="262" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Partition</text>
  
  <path d="M 140 250 L 160 250" stroke="var(--text-theme, #ef4444)" stroke-width="3" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #ef4444)"/>
    </marker>
  </defs>
  
  <!-- Key Insight Box -->
  <rect x="50" y="300" width="200" height="80" rx="8" fill="white" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="150" y="325" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b)">Key Insight</text>
  <text x="150" y="345" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">During network partitions,</text>
  <text x="150" y="360" text-anchor="middle" font-size="10" fill="var(--text-theme, #64748b)">you must choose:</text>
  <text x="150" y="375" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">Consistency OR Availability</text>
</svg>
