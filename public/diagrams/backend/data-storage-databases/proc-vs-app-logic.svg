<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420">
  <rect width="920" height="420" fill="#f8fafc"/>
  <rect x="30" y="30" width="860" height="360" rx="18" fill="#ffffff" stroke="#d7dbe2"/>
  <text x="60" y="70" font-family="Inter, Arial, sans-serif" font-size="20" fill="#1f2937">Procedure vs App Logic</text>

  <rect x="90" y="120" width="320" height="220" rx="14" fill="#e2e8f0" stroke="#cbd5f5"/>
  <text x="130" y="150" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">App Logic</text>
  <text x="120" y="190" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Flexible deployments</text>
  <text x="120" y="215" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">More network round trips</text>
  <text x="120" y="240" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Easier testing</text>

  <rect x="510" y="120" width="320" height="220" rx="14" fill="#c7d2fe" stroke="#8b9cf6"/>
  <text x="550" y="150" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1f2937">Stored Logic</text>
  <text x="540" y="190" font-family="Inter, Arial, sans-serif" font-size="12" fill="#1f2937">Fewer round trips</text>
  <text x="540" y="215" font-family="Inter, Arial, sans-serif" font-size="12" fill="#1f2937">Stronger DB coupling</text>
  <text x="540" y="240" font-family="Inter, Arial, sans-serif" font-size="12" fill="#1f2937">Harder migrations</text>
</svg>
