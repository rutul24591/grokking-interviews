<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-labelledby="title desc">
  <title id="title">ACID Properties - Database Transaction Guarantees</title>
  <desc id="desc">Comprehensive visualization of ACID (Atomicity, Consistency, Isolation, Durability) properties with examples and implementation details</desc>
  
  <!-- Background -->
  <rect width="900" height="700" fill="var(--bg-panel, #f8fafc)"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="var(--text-theme, #1e293b)">ACID Properties</text>
  <text x="450" y="60" text-anchor="middle" font-size="13" fill="var(--text-theme, #64748b)">Database Transaction Guarantees for Data Integrity</text>
  
  <!-- ACID Quadrant -->
  <!-- Atomicity -->
  <rect x="30" y="85" width="270" height="200" rx="8" fill="white" stroke="var(--border-theme, #3b82f6)" stroke-width="2"/>
  <rect x="30" y="85" width="270" height="35" rx="8" fill="var(--bg-theme, #3b82f6)"/>
  <text x="165" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="white">A - Atomicity</text>
  
  <text x="165" y="145" text-anchor="middle" font-size="11" fill="var(--text-theme, #1e293b)">"All or Nothing"</text>
  
  <!-- Atomicity Example -->
  <rect x="50" y="155" width="230" height="115" rx="6" fill="var(--bg-panel-hover, #eff6ff)" stroke="var(--border-theme, #93c5fd)" stroke-width="1"/>
  <text x="165" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">Bank Transfer Example:</text>
  
  <rect x="60" y="185" width="210" height="35" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="165" y="200" text-anchor="middle" font-size="9" fill="white">✓ Debit $100 from Account A</text>
  <text x="165" y="213" text-anchor="middle" font-size="9" fill="white">✓ Credit $100 to Account B</text>
  
  <rect x="60" y="225" width="210" height="35" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="165" y="240" text-anchor="middle" font-size="9" fill="white">✗ If credit fails →</text>
  <text x="165" y="253" text-anchor="middle" font-size="9" fill="white">  Debit is ROLLED BACK</text>
  
  <text x="165" y="275" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Implementation: Write-ahead log,</text>
  <text x="165" y="288" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">commit/rollback semantics</text>
  
  <!-- Consistency -->
  <rect x="315" y="85" width="270" height="200" rx="8" fill="white" stroke="var(--border-theme, #10b981)" stroke-width="2"/>
  <rect x="315" y="85" width="270" height="35" rx="8" fill="var(--bg-theme, #10b981)"/>
  <text x="450" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="white">C - Consistency</text>
  
  <text x="450" y="145" text-anchor="middle" font-size="11" fill="var(--text-theme, #1e293b)">"Valid State → Valid State"</text>
  
  <!-- Consistency Example -->
  <rect x="335" y="155" width="230" height="115" rx="6" fill="var(--bg-panel-hover, #ecfdf5)" stroke="var(--border-theme, #6ee7b7)" stroke-width="1"/>
  <text x="450" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">Invariant Enforcement:</text>
  
  <rect x="345" y="185" width="210" height="35" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="450" y="200" text-anchor="middle" font-size="9" fill="white">✓ Account balance ≥ 0</text>
  <text x="450" y="213" text-anchor="middle" font-size="9" fill="white">✓ Foreign key constraints</text>
  
  <rect x="345" y="225" width="210" height="35" rx="4" fill="var(--bg-theme, #ef4444)" stroke="var(--border-theme, #b91c1c)" stroke-width="1"/>
  <text x="450" y="240" text-anchor="middle" font-size="9" fill="white">✗ Violates constraint →</text>
  <text x="450" y="253" text-anchor="middle" font-size="9" fill="white">  Transaction ABORTED</text>
  
  <text x="450" y="275" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Implementation: Constraints,</text>
  <text x="450" y="288" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">triggers, cascades</text>
  
  <!-- Isolation -->
  <rect x="600" y="85" width="270" height="200" rx="8" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <rect x="600" y="85" width="270" height="35" rx="8" fill="var(--bg-theme, #f59e0b)"/>
  <text x="735" y="110" text-anchor="middle" font-size="16" font-weight="bold" fill="white">I - Isolation</text>
  
  <text x="735" y="145" text-anchor="middle" font-size="11" fill="var(--text-theme, #1e293b)">"Concurrent ≠ Interfering"</text>
  
  <!-- Isolation Levels -->
  <rect x="620" y="155" width="230" height="115" rx="6" fill="var(--bg-panel-hover, #fffbeb)" stroke="var(--border-theme, #fcd34d)" stroke-width="1"/>
  <text x="735" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">Isolation Levels:</text>
  
  <rect x="630" y="185" width="210" height="25" rx="3" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="202" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Read Uncommitted (lowest)</text>
  
  <rect x="630" y="213" width="210" height="25" rx="3" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="230" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Read Committed</text>
  
  <rect x="630" y="241" width="210" height="25" rx="3" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="735" y="258" text-anchor="middle" font-size="9" fill="var(--text-theme, #1e293b)">Repeatable Read</text>
  
  <rect x="630" y="269" width="210" height="25" rx="3" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="1"/>
  <text x="735" y="286" text-anchor="middle" font-size="9" fill="white">Serializable (highest)</text>
  
  <!-- Durability -->
  <rect x="30" y="300" width="270" height="200" rx="8" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="2"/>
  <rect x="30" y="300" width="270" height="35" rx="8" fill="var(--bg-theme, #8b5cf6)"/>
  <text x="165" y="325" text-anchor="middle" font-size="16" font-weight="bold" fill="white">D - Durability</text>
  
  <text x="165" y="360" text-anchor="middle" font-size="11" fill="var(--text-theme, #1e293b)">"Committed = Permanent"</text>
  
  <!-- Durability Example -->
  <rect x="50" y="370" width="230" height="115" rx="6" fill="var(--bg-panel-hover, #f5f3ff)" stroke="var(--border-theme, #c4b5fd)" stroke-width="1"/>
  <text x="165" y="390" text-anchor="middle" font-size="10" font-weight="bold" fill="var(--text-theme, #1e293b)">Crash Recovery:</text>
  
  <rect x="60" y="400" width="210" height="35" rx="4" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="1"/>
  <text x="165" y="415" text-anchor="middle" font-size="9" fill="white">✓ Transaction committed</text>
  <text x="165" y="428" text-anchor="middle" font-size="9" fill="white">✓ Power failure occurs</text>
  
  <rect x="60" y="440" width="210" height="35" rx="4" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="1"/>
  <text x="165" y="455" text-anchor="middle" font-size="9" fill="white">✓ After restart:</text>
  <text x="165" y="468" text-anchor="middle" font-size="9" fill="white">  Data persists via WAL</text>
  
  <text x="165" y="490" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Implementation: Write-ahead log,</text>
  <text x="165" y="503" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">checkpoints, replication</text>
  
  <!-- Transaction Lifecycle -->
  <rect x="315" y="300" width="555" height="200" rx="8" fill="var(--bg-panel-hover, #f1f5f9)" stroke="var(--border-theme, #cbd5e1)" stroke-width="2"/>
  <text x="592" y="325" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #1e293b)">Transaction Lifecycle with WAL</text>
  
  <!-- Lifecycle Flow -->
  <rect x="335" y="345" width="100" height="60" rx="6" fill="var(--bg-theme, #3b82f6)" stroke="var(--border-theme, #1e40af)" stroke-width="2"/>
  <text x="385" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="white">BEGIN</text>
  <text x="385" y="388" text-anchor="middle" font-size="10" fill="#bfdbfe">Transaction</text>
  
  <line x1="435" y1="375" x2="455" y2="375" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="460" y="345" width="100" height="60" rx="6" fill="var(--bg-theme, #f59e0b)" stroke="var(--border-theme, #b45309)" stroke-width="2"/>
  <text x="510" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="white">EXECUTE</text>
  <text x="510" y="388" text-anchor="middle" font-size="10" fill="#fcd34d">Write to WAL</text>
  
  <line x1="560" y1="375" x2="580" y2="375" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="585" y="345" width="100" height="60" rx="6" fill="var(--bg-theme, #10b981)" stroke="var(--border-theme, #059669)" stroke-width="2"/>
  <text x="635" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="white">COMMIT</text>
  <text x="635" y="388" text-anchor="middle" font-size="10" fill="#6ee7b7">Flush WAL</text>
  
  <line x1="685" y1="375" x2="705" y2="375" stroke="var(--text-theme, #64748b)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <rect x="710" y="345" width="140" height="60" rx="6" fill="var(--bg-theme, #8b5cf6)" stroke="var(--border-theme, #6d28d9)" stroke-width="2"/>
  <text x="780" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PERSIST</text>
  <text x="780" y="388" text-anchor="middle" font-size="10" fill="#c4b5fd">Data written</text>
  
  <!-- WAL Detail -->
  <rect x="335" y="420" width="520" height="70" rx="6" fill="white" stroke="var(--border-theme, #94a3b8)" stroke-width="1"/>
  <text x="595" y="440" text-anchor="middle" font-size="12" font-weight="bold" fill="var(--text-theme, #1e293b)">Write-Ahead Log (WAL)</text>
  
  <rect x="350" y="450" width="490" height="30" rx="3" fill="var(--bg-panel-soft, #e2e8f0)" stroke="var(--border-theme, #64748b)" stroke-width="1"/>
  <text x="595" y="470" text-anchor="middle" font-size="10" fill="var(--text-theme, #1e293b)">[LSN:100] BEGIN | [LSN:101] UPDATE accounts SET bal=900 | [LSN:102] COMMIT</text>
  
  <!-- Common Anomalies -->
  <rect x="315" y="515" width="555" height="175" rx="8" fill="var(--bg-panel-soft, #fef3c7)" stroke="var(--border-theme, #f59e0b)" stroke-width="2"/>
  <text x="592" y="540" text-anchor="middle" font-size="16" font-weight="bold" fill="var(--text-theme, #b45309)">Concurrency Anomalies (Without Proper Isolation)</text>
  
  <!-- Anomaly 1 -->
  <rect x="335" y="555" width="165" height="120" rx="6" fill="white" stroke="var(--border-theme, #ef4444)" stroke-width="1"/>
  <text x="417" y="575" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #ef4444)">Dirty Read</text>
  <text x="417" y="595" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">T1 reads uncommitted</text>
  <text x="417" y="608" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">data from T2</text>
  <text x="417" y="628" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444)">✗ T2 rolls back</text>
  <text x="417" y="641" text-anchor="middle" font-size="9" fill="var(--text-theme, #ef4444)">→ T1 has bad data</text>
  <text x="417" y="661" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Prevented: Read</text>
  <text x="417" y="674" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Committed+</text>
  
  <!-- Anomaly 2 -->
  <rect x="515" y="555" width="165" height="120" rx="6" fill="white" stroke="var(--border-theme, #f59e0b)" stroke-width="1"/>
  <text x="597" y="575" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #f59e0b)">Non-Repeatable</text>
  <text x="597" y="588" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #f59e0b)">Read</text>
  <text x="597" y="608" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">T1 reads X twice,</text>
  <text x="597" y="621" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">T2 modifies X</text>
  <text x="597" y="641" text-anchor="middle" font-size="9" fill="var(--text-theme, #f59e0b)">✗ Different values</text>
  <text x="597" y="661" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Prevented:</text>
  <text x="597" y="674" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Repeatable Read+</text>
  
  <!-- Anomaly 3 -->
  <rect x="695" y="555" width="165" height="120" rx="6" fill="white" stroke="var(--border-theme, #8b5cf6)" stroke-width="1"/>
  <text x="777" y="575" text-anchor="middle" font-size="11" font-weight="bold" fill="var(--text-theme, #8b5cf6)">Phantom Read</text>
  <text x="777" y="595" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">T1 queries range twice,</text>
  <text x="777" y="608" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">T2 inserts new row</text>
  <text x="777" y="628" text-anchor="middle" font-size="9" fill="var(--text-theme, #8b5cf6)">✗ Different row count</text>
  <text x="777" y="648" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Prevented:</text>
  <text x="777" y="661" text-anchor="middle" font-size="9" fill="var(--text-theme, #64748b)">Serializable</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="var(--text-theme, #64748b)"/>
    </marker>
  </defs>
</svg>
