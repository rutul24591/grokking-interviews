<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="40" y="50" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">ACID Properties</text>

  <rect x="60" y="100" width="200" height="90" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="90" y="145" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">Atomicity</text>
  <text x="90" y="165" font-family="Arial, sans-serif" font-size="12" fill="#334155">All or nothing</text>

  <rect x="280" y="100" width="200" height="90" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="310" y="145" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">Consistency</text>
  <text x="310" y="165" font-family="Arial, sans-serif" font-size="12" fill="#334155">Valid state only</text>

  <rect x="500" y="100" width="200" height="90" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="535" y="145" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">Isolation</text>
  <text x="535" y="165" font-family="Arial, sans-serif" font-size="12" fill="#334155">No interference</text>

  <rect x="720" y="100" width="200" height="90" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="750" y="145" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">Durability</text>
  <text x="750" y="165" font-family="Arial, sans-serif" font-size="12" fill="#334155">Survives crashes</text>
</svg>
