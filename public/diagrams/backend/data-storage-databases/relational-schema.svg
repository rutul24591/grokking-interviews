<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="40" y="50" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">Relational Schema Example</text>

  <rect x="60" y="90" width="260" height="170" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">users</text>
  <text x="80" y="150" font-family="Arial, sans-serif" font-size="14" fill="#334155">id (PK)</text>
  <text x="80" y="170" font-family="Arial, sans-serif" font-size="14" fill="#334155">email</text>
  <text x="80" y="190" font-family="Arial, sans-serif" font-size="14" fill="#334155">created_at</text>

  <rect x="360" y="90" width="260" height="170" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="380" y="120" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">orders</text>
  <text x="380" y="150" font-family="Arial, sans-serif" font-size="14" fill="#334155">id (PK)</text>
  <text x="380" y="170" font-family="Arial, sans-serif" font-size="14" fill="#334155">user_id (FK)</text>
  <text x="380" y="190" font-family="Arial, sans-serif" font-size="14" fill="#334155">status</text>

  <rect x="660" y="90" width="240" height="170" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="680" y="120" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">order_items</text>
  <text x="680" y="150" font-family="Arial, sans-serif" font-size="14" fill="#334155">id (PK)</text>
  <text x="680" y="170" font-family="Arial, sans-serif" font-size="14" fill="#334155">order_id (FK)</text>
  <text x="680" y="190" font-family="Arial, sans-serif" font-size="14" fill="#334155">sku, qty</text>

  <line x1="320" y1="150" x2="360" y2="150" stroke="#64748b" stroke-width="2"/>
  <polygon points="360,150 352,145 352,155" fill="#64748b"/>

  <line x1="620" y1="150" x2="660" y2="150" stroke="#64748b" stroke-width="2"/>
  <polygon points="660,150 652,145 652,155" fill="#64748b"/>

  <text x="330" y="140" font-family="Arial, sans-serif" font-size="12" fill="#64748b">1:N</text>
  <text x="630" y="140" font-family="Arial, sans-serif" font-size="12" fill="#64748b">1:N</text>
</svg>
