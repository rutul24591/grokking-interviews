  <text x="110" y="316" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155">Overloaded shard</text>

  <path d="M420 230 L500 230" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
