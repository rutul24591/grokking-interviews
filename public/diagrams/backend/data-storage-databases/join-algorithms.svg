<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="40" y="50" font-family="Arial, sans-serif" font-size="24" fill="#0f172a">Join Algorithms (Conceptual)</text>

  <rect x="60" y="100" width="240" height="80" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="90" y="145" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">Nested Loop</text>
  <text x="90" y="165" font-family="Arial, sans-serif" font-size="12" fill="#334155">Best for small + indexed</text>

  <rect x="360" y="100" width="240" height="80" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="145" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">Hash Join</text>
  <text x="400" y="165" font-family="Arial, sans-serif" font-size="12" fill="#334155">Best for large sets</text>

  <rect x="660" y="100" width="240" height="80" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="690" y="145" font-family="Arial, sans-serif" font-size="16" fill="#0f172a">Merge Join</text>
  <text x="690" y="165" font-family="Arial, sans-serif" font-size="12" fill="#334155">Best for sorted inputs</text>
</svg>
