<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Cross-Tab State Synchronization Architecture</text>
  
  <!-- Tabs -->
  <rect x="40" y="70" width="160" height="100" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="120" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Tab A</text>
  <text x="120" y="120" font-size="10" text-anchor="middle" fill="#666666">Local Store</text>
  <text x="120" y="140" font-size="10" text-anchor="middle" fill="#666666">State Changes → Broadcast</text>
  <text x="120" y="160" font-size="10" font-weight="bold" text-anchor="middle" fill="#4caf50">★ Leader</text>
  
  <rect x="260" y="70" width="160" height="100" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="340" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Tab B</text>
  <text x="340" y="120" font-size="10" text-anchor="middle" fill="#666666">Local Store</text>
  <text x="340" y="140" font-size="10" text-anchor="middle" fill="#666666">Receive → Apply</text>
  <text x="340" y="160" font-size="10" text-anchor="middle" fill="#666666">Heartbeat Monitor</text>
  
  <rect x="480" y="70" width="160" height="100" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="560" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Tab C</text>
  <text x="560" y="120" font-size="10" text-anchor="middle" fill="#666666">Local Store</text>
  <text x="560" y="140" font-size="10" text-anchor="middle" fill="#666666">Receive → Apply</text>
  <text x="560" y="160" font-size="10" text-anchor="middle" fill="#666666">Heartbeat Monitor</text>
  
  <!-- BroadcastChannel (center) -->
  <ellipse cx="400" cy="280" rx="140" ry="50" fill="#fff3e0" stroke="#ffcc80" stroke-width="2.5"/>
  <text x="400" y="275" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">BroadcastChannel</text>
  <text x="400" y="298" font-size="11" text-anchor="middle" fill="#666666">Low Latency (~10ms)</text>
  <text x="400" y="318" font-size="11" text-anchor="middle" fill="#666666">Same-Origin Only</text>
  
  <!-- Arrows from tabs to BroadcastChannel -->
  <line x1="120" y1="170" x2="330" y2="260" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="170" x2="400" y2="230" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="170" x2="470" y2="260" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Conflict Resolver (bottom left) -->
  <rect x="40" y="380" width="220" height="100" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="150" y="410" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Conflict Resolver</text>
  <text x="150" y="435" font-size="10" text-anchor="middle" fill="#666666">Lamport Timestamps</text>
  <text x="150" y="455" font-size="10" text-anchor="middle" fill="#666666">Last-Write-Wins</text>
  <text x="150" y="475" font-size="10" text-anchor="middle" fill="#666666">Field-Level Merge</text>
  
  <!-- Leader Election (bottom center) -->
  <rect x="300" y="380" width="200" height="100" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="410" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Leader Election</text>
  <text x="400" y="435" font-size="10" text-anchor="middle" fill="#666666">localStorage Claim</text>
  <text x="400" y="455" font-size="10" text-anchor="middle" fill="#666666">Heartbeat (2s interval)</text>
  <text x="400" y="475" font-size="10" text-anchor="middle" fill="#666666">Re-elect on Timeout</text>
  
  <!-- Tab Registry (bottom right) -->
  <rect x="540" y="380" width="220" height="100" rx="8" fill="#bbdefb" stroke="#90caf9" stroke-width="2"/>
  <text x="650" y="410" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Tab Registry</text>
  <text x="650" y="435" font-size="10" text-anchor="middle" fill="#666666">Register on Mount</text>
  <text x="650" y="455" font-size="10" text-anchor="middle" fill="#666666">Deregister on Unload</text>
  <text x="650" y="475" font-size="10" text-anchor="middle" fill="#666666">Track Active Tabs</text>
  
  <!-- Fallback -->
  <rect x="40" y="520" width="720" height="60" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="545" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Fallback: localStorage Events (if BroadcastChannel unsupported)</text>
  <text x="400" y="568" font-size="11" text-anchor="middle" fill="#666666">Write to shared key → storage event on other tabs → ~50ms latency</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
