<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Transient vs Persistent State Architecture</text>
  
  <!-- State Classification (left) -->
  <rect x="40" y="70" width="220" height="280" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="150" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">State Classification</text>
  
  <rect x="55" y="115" width="190" height="60" rx="6" fill="#bbdefb"/>
  <text x="150" y="135" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Transient</text>
  <text x="150" y="155" font-size="10" text-anchor="middle" fill="#666666">Loading, modals, scroll</text>
  <text x="150" y="172" font-size="10" text-anchor="middle" fill="#666666">useState, no persistence</text>
  
  <rect x="55" y="185" width="190" height="60" rx="6" fill="#c8e6c9"/>
  <text x="150" y="205" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Session</text>
  <text x="150" y="225" font-size="10" text-anchor="middle" fill="#666666">Form drafts, filters</text>
  <text x="150" y="242" font-size="10" text-anchor="middle" fill="#666666">sessionStorage, tab-scoped</text>
  
  <rect x="55" y="255" width="190" height="60" rx="6" fill="#e1bee7"/>
  <text x="150" y="275" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Persistent</text>
  <text x="150" y="295" font-size="10" text-anchor="middle" fill="#666666">Theme, preferences</text>
  <text x="150" y="312" font-size="10" text-anchor="middle" fill="#666666">localStorage/IndexedDB</text>
  
  <!-- Persistence Pipeline (center) -->
  <rect x="300" y="70" width="220" height="280" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="410" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Persistence Pipeline</text>
  
  <rect x="315" y="115" width="190" height="45" rx="6" fill="#ffe0b2"/>
  <text x="410" y="143" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">1. Select Persistent Fields</text>
  
  <rect x="315" y="170" width="190" height="45" rx="6" fill="#ffe0b2"/>
  <text x="410" y="198" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">2. Encrypt Sensitive Data</text>
  
  <rect x="315" y="225" width="190" height="45" rx="6" fill="#ffe0b2"/>
  <text x="410" y="253" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">3. Write to Backend</text>
  
  <rect x="315" y="280" width="190" height="45" rx="6" fill="#ffe0b2"/>
  <text x="410" y="308" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">4. Debounce (2s interval)</text>
  
  <!-- Rehydration (right) -->
  <rect x="560" y="70" width="200" height="280" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="660" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Rehydration Engine</text>
  
  <rect x="575" y="115" width="170" height="45" rx="6" fill="#a5d6a7"/>
  <text x="660" y="143" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">1. Read from Storage</text>
  
  <rect x="575" y="170" width="170" height="45" rx="6" fill="#a5d6a7"/>
  <text x="660" y="198" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">2. Decrypt + Validate</text>
  
  <rect x="575" y="225" width="170" height="45" rx="6" fill="#a5d6a7"/>
  <text x="660" y="253" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">3. Migrate Version</text>
  
  <rect x="575" y="280" width="170" height="45" rx="6" fill="#a5d6a7"/>
  <text x="660" y="308" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">4. Merge with Defaults</text>
  
  <!-- Storage Backends (bottom) -->
  <rect x="40" y="380" width="720" height="100" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="410" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Storage Backend Selection</text>
  
  <rect x="60" y="430" width="160" height="40" rx="6" fill="#bbdefb"/>
  <text x="140" y="455" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">localStorage</text>
  <text x="140" y="472" font-size="9" text-anchor="middle" fill="#666666">&lt;5MB, sync</text>
  
  <rect x="260" y="430" width="160" height="40" rx="6" fill="#bbdefb"/>
  <text x="340" y="455" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">IndexedDB</text>
  <text x="340" y="472" font-size="9" text-anchor="middle" fill="#666666">Large data, async</text>
  
  <rect x="460" y="430" width="160" height="40" rx="6" fill="#bbdefb"/>
  <text x="540" y="455" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">sessionStorage</text>
  <text x="540" y="472" font-size="9" text-anchor="middle" fill="#666666">Tab-scoped</text>
  
  <rect x="660" y="430" width="80" height="40" rx="6" fill="#bbdefb"/>
  <text x="700" y="455" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Memory</text>
  <text x="700" y="472" font-size="9" text-anchor="middle" fill="#666666">Transient</text>
  
  <!-- Key Decisions (bottom) -->
  <rect x="40" y="500" width="720" height="80" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="400" y="530" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Key Decisions</text>
  <text x="400" y="555" font-size="11" text-anchor="middle" fill="#666666">Classify at definition time | Auto-save with debounce | Version migration | Quota management | Never persist tokens/PII</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
