<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">API Versioning & Frontend Contract Management</text>
  
  <!-- API Response (left) -->
  <rect x="40" y="70" width="160" height="120" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="120" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">API Response</text>
  <text x="120" y="125" font-size="10" text-anchor="middle" fill="#666666">Header: X-API-Version: 2.1</text>
  <text x="120" y="145" font-size="10" text-anchor="middle" fill="#666666">Body: API-specific shape</text>
  <text x="120" y="165" font-size="10" text-anchor="middle" fill="#666666">v1, v2, v3 supported</text>
  <text x="120" y="185" font-size="10" text-anchor="middle" fill="#666666">ETag for caching</text>
  
  <!-- Version Detector (center-left) -->
  <rect x="240" y="70" width="160" height="120" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="320" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Version Detector</text>
  <text x="320" y="125" font-size="10" text-anchor="middle" fill="#666666">Extract version from header</text>
  <text x="320" y="145" font-size="10" text-anchor="middle" fill="#666666">Map to adapter</text>
  <text x="320" y="165" font-size="10" text-anchor="middle" fill="#666666">Fallback to oldest</text>
  
  <!-- Adapter Registry (center) -->
  <rect x="440" y="70" width="160" height="120" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="520" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Adapter Registry</text>
  <text x="520" y="125" font-size="10" text-anchor="middle" fill="#666666">v1 Adapter</text>
  <text x="520" y="145" font-size="10" text-anchor="middle" fill="#666666">v2 Adapter</text>
  <text x="520" y="165" font-size="10" text-anchor="middle" fill="#666666">v3 Adapter</text>
  <text x="520" y="185" font-size="10" text-anchor="middle" fill="#666666">Deprecation warnings</text>
  
  <!-- Schema Validator (center-right) -->
  <rect x="640" y="70" width="130" height="120" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="705" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Schema Validator</text>
  <text x="705" y="125" font-size="10" text-anchor="middle" fill="#666666">Zod schemas</text>
  <text x="705" y="145" font-size="10" text-anchor="middle" fill="#666666">Validate output</text>
  <text x="705" y="165" font-size="10" text-anchor="middle" fill="#666666">Reject invalid</text>
  
  <!-- Arrows between top modules -->
  <line x1="200" y1="130" x2="240" y2="130" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="130" x2="440" y2="130" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="130" x2="640" y2="130" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Canonical Data (center) -->
  <rect x="240" y="240" width="320" height="80" rx="8" fill="#bbdefb" stroke="#90caf9" stroke-width="2.5"/>
  <text x="400" y="270" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Canonical Frontend Schema</text>
  <text x="400" y="295" font-size="11" text-anchor="middle" fill="#666666">Unified data model regardless of API version</text>
  <text x="400" y="315" font-size="11" text-anchor="middle" fill="#666666">All adapters transform to this schema</text>
  
  <!-- Breaking Change Detector (bottom left) -->
  <rect x="40" y="380" width="220" height="180" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="150" y="410" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Breaking Change Detector</text>
  <text x="150" y="435" font-size="10" text-anchor="middle" fill="#666666">CI Tool: Compare OpenAPI specs</text>
  <text x="150" y="455" font-size="10" text-anchor="middle" fill="#666666">Detects: Field removals</text>
  <text x="150" y="475" font-size="10" text-anchor="middle" fill="#666666">Detects: Type changes</text>
  <text x="150" y="495" font-size="10" text-anchor="middle" fill="#666666">Detects: Required additions</text>
  <text x="150" y="515" font-size="10" text-anchor="middle" fill="#666666">Blocks deploy without migration</text>
  <text x="150" y="535" font-size="10" text-anchor="middle" fill="#666666">v1 → v2 comparison report</text>
  
  <!-- Deployment Strategy (bottom right) -->
  <rect x="300" y="380" width="460" height="180" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="530" y="410" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Two-Phase Deployment Strategy</text>
  
  <rect x="320" y="430" width="200" height="50" rx="6" fill="#c8e6c9"/>
  <text x="420" y="450" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Phase 1: Backend</text>
  <text x="420" y="470" font-size="9" text-anchor="middle" fill="#666666">Add v2, keep v1</text>
  
  <rect x="560" y="430" width="200" height="50" rx="6" fill="#fff3e0"/>
  <text x="660" y="450" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Phase 2: Frontend</text>
  <text x="660" y="470" font-size="9" text-anchor="middle" fill="#666666">Deploy v2 adapter</text>
  
  <rect x="320" y="495" width="440" height="50" rx="6" fill="#e1bee7"/>
  <text x="540" y="515" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Phase 3: Deprecate v1 (after 0% traffic confirmed)</text>
  <text x="540" y="535" font-size="9" text-anchor="middle" fill="#666666">Remove v1 from backend, remove v1 adapter from frontend</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
