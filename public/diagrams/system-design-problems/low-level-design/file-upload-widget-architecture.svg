<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" fill="none" font-family="system-ui, sans-serif">
  <rect width="700" height="280" fill="transparent"/>

  <!-- User Action -->
  <rect x="30" y="100" width="130" height="80" rx="8" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="95" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">User Action</text>
  <text x="50" y="158" font-size="11" fill="#3b82f6">select files / drag-drop</text>

  <line x1="160" y1="140" x2="240" y2="140" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Store -->
  <rect x="240" y="70" width="180" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="330" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Upload Store</text>
  <text x="260" y="125" font-size="11" fill="#92400e">• files: Map&lt;id, File&gt;</text>
  <text x="260" y="145" font-size="11" fill="#92400e">• queue: string[]</text>
  <text x="260" y="165" font-size="11" fill="#92400e">• concurrency: number</text>
  <text x="260" y="190" font-size="10" fill="#b45309">addFiles, startUpload, cancel</text>

  <line x1="420" y1="140" x2="500" y2="140" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Chunk Manager -->
  <rect x="500" y="100" width="170" height="80" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="585" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b">Chunk Manager</text>
  <text x="520" y="155" font-size="11" fill="#991b1b">split → upload → retry</text>
  <text x="520" y="172" font-size="10" fill="#b91c1c">IndexedDB persistence</text>

  <line x1="585" y1="180" x2="585" y2="230" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Server -->
  <rect x="500" y="230" width="170" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="585" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Server / S3</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
