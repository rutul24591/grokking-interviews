<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="800" height="320" fill="transparent"/>

  <!-- Toast API Box -->
  <rect x="40" y="120" width="160" height="80" rx="8" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="150" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Toast API</text>
  <text x="120" y="172" text-anchor="middle" font-size="11" font-weight="normal" fill="#3b82f6">toast.success()</text>
  <text x="120" y="188" text-anchor="middle" font-size="11" font-weight="normal" fill="#3b82f6">toast.error()</text>

  <!-- Arrow: API → Store -->
  <line x1="200" y1="160" x2="290" y2="160" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="245" y="150" text-anchor="middle" font-size="10" fill="#6b7280">addToast()</text>

  <!-- Zustand Store Box -->
  <rect x="290" y="80" width="220" height="160" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="400" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Zustand Store</text>
  <text x="310" y="140" font-size="11" fill="#92400e">• toasts: Toast[]</text>
  <text x="310" y="160" font-size="11" fill="#92400e">• timers: Map&lt;id, Timer&gt;</text>
  <text x="310" y="180" font-size="11" fill="#92400e">• visibleLimit: 3</text>
  <text x="310" y="210" font-size="11" fill="#92400e">Actions:</text>
  <text x="330" y="228" font-size="10" fill="#b45309">addToast, dismissToast</text>
  <text x="330" y="244" font-size="10" fill="#b45309">pauseTimer, resumeTimer</text>

  <!-- Arrow: Store → Container -->
  <line x1="510" y1="160" x2="600" y2="160" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="555" y="150" text-anchor="middle" font-size="10" fill="#6b7280">subscribe</text>

  <!-- ToastContainer Box -->
  <rect x="600" y="100" width="170" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="685" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">ToastContainer</text>
  <text x="620" y="158" font-size="11" fill="#166534">• Portal to body</text>
  <text x="620" y="178" font-size="11" fill="#166534">• Renders visible</text>
  <text x="640" y="194" font-size="11" fill="#166534">toasts (slice 0..3)</text>
  <text x="620" y="214" font-size="11" fill="#166534">• SSR-safe mount</text>

  <!-- Arrow: Container → ToastItems -->
  <line x1="685" y1="220" x2="685" y2="260" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrowhead)"/>

  <!-- ToastItem Box -->
  <rect x="600" y="260" width="170" height="50" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
  <text x="685" y="290" text-anchor="middle" font-size="13" font-weight="bold" fill="#6b21a8">ToastItem × N</text>

  <!-- Feedback Arrow: dismiss -->
  <path d="M 600 140 Q 520 100 400 90" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#arrowhead)"/>
  <text x="500" y="85" text-anchor="middle" font-size="10" fill="#6b7280">dismiss → clear timer</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
