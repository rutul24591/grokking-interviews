<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Pagination State Management Architecture</text>
  
  <!-- Pagination Types (top) -->
  <rect x="40" y="70" width="220" height="140" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="150" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Cursor-Based</text>
  <text x="150" y="125" font-size="10" text-anchor="middle" fill="#666666">{ cursor, items[], hasNext }</text>
  <text x="150" y="145" font-size="10" text-anchor="middle" fill="#666666">Forward-only, append items</text>
  <text x="150" y="165" font-size="10" text-anchor="middle" fill="#666666">GraphQL style, infinite scroll</text>
  <text x="150" y="185" font-size="10" text-anchor="middle" fill="#666666">No random page access</text>
  
  <rect x="290" y="70" width="220" height="140" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="400" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Offset-Based</text>
  <text x="400" y="125" font-size="10" text-anchor="middle" fill="#666666">{ page, pageSize, total }</text>
  <text x="400" y="145" font-size="10" text-anchor="middle" fill="#666666">Random page access</text>
  <text x="400" y="165" font-size="10" text-anchor="middle" fill="#666666">Numbered pages</text>
  <text x="400" y="185" font-size="10" text-anchor="middle" fill="#666666">Pages by number cache</text>
  
  <rect x="540" y="70" width="220" height="140" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="650" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Infinite Scroll</text>
  <text x="650" y="125" font-size="10" text-anchor="middle" fill="#666666">Merged continuous list</text>
  <text x="650" y="145" font-size="10" text-anchor="middle" fill="#666666">Sentinel detection</text>
  <text x="650" y="165" font-size="10" text-anchor="middle" fill="#666666">Auto-fetch on scroll</text>
  <text x="650" y="185" font-size="10" text-anchor="middle" fill="#666666">Dedup by ID on merge</text>
  
  <!-- Item Merger (center) -->
  <rect x="40" y="250" width="360" height="120" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="220" y="280" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Item Merger + Deduplication</text>
  <text x="220" y="305" font-size="11" text-anchor="middle" fill="#666666">New page items → Merge with existing list</text>
  <text x="220" y="325" font-size="11" text-anchor="middle" fill="#666666">Deduplicate by ID (overlap between pages)</text>
  <text x="220" y="345" font-size="11" text-anchor="middle" fill="#666666">O(n + m) merge complexity</text>
  <text x="220" y="365" font-size="11" text-anchor="middle" fill="#666666">Handle server-inserted items before cached</text>
  
  <!-- Cache Manager (right) -->
  <rect x="440" y="250" width="320" height="120" rx="8" fill="#bbdefb" stroke="#90caf9" stroke-width="2"/>
  <text x="600" y="280" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Pagination Cache Manager</text>
  <text x="600" y="305" font-size="11" text-anchor="middle" fill="#666666">Cache by query + pagination params</text>
  <text x="600" y="325" font-size="11" text-anchor="middle" fill="#666666">Invalidate on mutations</text>
  <text x="600" y="345" font-size="11" text-anchor="middle" fill="#666666">SWR for cached pages</text>
  <text x="600" y="365" font-size="11" text-anchor="middle" fill="#666666">LRU eviction (max 20 pages)</text>
  
  <!-- React Integration (bottom) -->
  <rect x="40" y="410" width="720" height="80" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="440" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">React Hook: usePagination</text>
  <text x="400" y="465" font-size="11" text-anchor="middle" fill="#666666">Returns: items[], isLoading, hasNextPage, fetchNext(), goToPage(), refetch()</text>
  <text x="400" y="485" font-size="11" text-anchor="middle" fill="#666666">Transparent pagination type to component</text>
  
  <!-- Key Edge Cases (bottom) -->
  <rect x="40" y="510" width="720" height="70" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="400" y="540" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Edge Cases</text>
  <text x="400" y="565" font-size="11" text-anchor="middle" fill="#666666">Item deleted → refetch all cached pages | Insert shifts pages → mark stale | Real-time prepends → "X new items" banner</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
