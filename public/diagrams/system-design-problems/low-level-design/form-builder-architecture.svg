<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300" fill="none" font-family="system-ui, sans-serif">
  <rect width="700" height="300" fill="transparent"/>

  <rect x="30" y="110" width="130" height="80" rx="8" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="95" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Form Schema</text>
  <text x="50" y="170" font-size="11" fill="#3b82f6">JSON field definitions</text>

  <line x1="160" y1="150" x2="240" y2="150" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="240" y="70" width="190" height="160" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="335" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Form Store</text>
  <text x="260" y="125" font-size="11" fill="#92400e">• fields: Map&lt;id, Field&gt;</text>
  <text x="260" y="145" font-size="11" fill="#92400e">• steps: Step[]</text>
  <text x="260" y="165" font-size="11" fill="#92400e">• currentStep: number</text>
  <text x="260" y="185" font-size="11" fill="#92400e">• conditions: Rule[]</text>
  <text x="260" y="215" font-size="10" fill="#b45309">validate, next, prev, submit</text>

  <line x1="430" y1="150" x2="510" y2="150" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="510" y="90" width="160" height="120" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">Validation Engine</text>
  <text x="530" y="145" font-size="11" fill="#166534">• sync validators</text>
  <text x="530" y="165" font-size="11" fill="#166534">• async validators</text>
  <text x="530" y="185" font-size="11" fill="#166534">• cross-field rules</text>
  <text x="530" y="205" font-size="10" fill="#15803d">AbortController cancel</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
