<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" fill="none" font-family="system-ui, sans-serif">
  <rect width="700" height="260" fill="transparent"/>

  <rect x="30" y="90" width="130" height="80" rx="8" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="95" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">User Action</text>
  <text x="50" y="148" font-size="11" fill="#3b82f6">sort/filter/page</text>

  <line x1="160" y1="130" x2="240" y2="130" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="240" y="60" width="190" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="335" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Table Store</text>
  <text x="260" y="115" font-size="11" fill="#92400e">• data: T[]</text>
  <text x="260" y="135" font-size="11" fill="#92400e">• sort: Column | null</text>
  <text x="260" y="155" font-size="11" fill="#92400e">• filters: Filter[]</text>
  <text x="260" y="175" font-size="11" fill="#92400e">• pagination: PageState</text>
  <text x="260" y="195" font-size="10" fill="#b45309">sort, filter, paginate, select</text>

  <line x1="430" y1="130" x2="510" y2="130" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="510" y="80" width="160" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">Virtualized Grid</text>
  <text x="530" y="135" font-size="11" fill="#166534">• visible rows</text>
  <text x="530" y="155" font-size="11" fill="#166534">• overscan buffer</text>
  <text x="530" y="175" font-size="10" fill="#15803d">ResizeObserver sync</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
