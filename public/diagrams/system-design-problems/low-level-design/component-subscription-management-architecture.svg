<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Component Subscription Management Flow</text>
  
  <!-- Store (center top) -->
  <rect x="250" y="60" width="300" height="80" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2.5"/>
  <text x="400" y="90" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Global Store</text>
  <text x="400" y="115" font-size="11" text-anchor="middle" fill="#666666">State: { user, posts, comments, settings }</text>
  <text x="400" y="132" font-size="10" text-anchor="middle" fill="#666666">Notification Batcher (Microtask Queue)</text>
  
  <!-- Subscription Registry (left) -->
  <rect x="40" y="180" width="200" height="140" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="140" y="210" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Subscription Registry</text>
  <text x="140" y="235" font-size="10" text-anchor="middle" fill="#666666">Sub 1: selector A → Component A</text>
  <text x="140" y="255" font-size="10" text-anchor="middle" fill="#666666">Sub 2: selector B → Component B</text>
  <text x="140" y="275" font-size="10" text-anchor="middle" fill="#666666">Sub N: selector N → Component N</text>
  <text x="140" y="300" font-size="10" text-anchor="middle" fill="#666666">Cached Results for Object.is</text>
  
  <!-- Equality Functions (right) -->
  <rect x="560" y="180" width="200" height="140" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="660" y="210" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Equality Functions</text>
  <text x="660" y="235" font-size="10" text-anchor="middle" fill="#666666">referenceEqual (Object.is)</text>
  <text x="660" y="255" font-size="10" text-anchor="middle" fill="#666666">shallowEqual (top-level keys)</text>
  <text x="660" y="275" font-size="10" text-anchor="middle" fill="#666666">deepEqual (recursive)</text>
  <text x="660" y="300" font-size="10" text-anchor="middle" fill="#666666">Configurable per subscription</text>
  
  <!-- Selector Validator (bottom left) -->
  <rect x="40" y="360" width="220" height="100" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="150" y="390" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Selector Validator</text>
  <text x="150" y="415" font-size="10" text-anchor="middle" fill="#666666">Detects unstable references</text>
  <text x="150" y="435" font-size="10" text-anchor="middle" fill="#666666">Logs warning with source location</text>
  <text x="150" y="455" font-size="10" text-anchor="middle" fill="#666666">Dev-only module</text>
  
  <!-- React Components (bottom center) -->
  <rect x="300" y="360" width="200" height="100" rx="8" fill="#bbdefb" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="390" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">React Components</text>
  <text x="400" y="415" font-size="10" text-anchor="middle" fill="#666666">useSubscription hook</text>
  <text x="400" y="435" font-size="10" text-anchor="middle" fill="#666666">useSyncExternalStore</text>
  <text x="400" y="455" font-size="10" text-anchor="middle" fill="#666666">Unsubscribe on unmount</text>
  
  <!-- Debugger (bottom right) -->
  <rect x="540" y="360" width="220" height="100" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="650" y="390" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Subscription Debugger</text>
  <text x="650" y="415" font-size="10" text-anchor="middle" fill="#666666">Active subscriptions list</text>
  <text x="650" y="435" font-size="10" text-anchor="middle" fill="#666666">Last notification time</text>
  <text x="650" y="455" font-size="10" text-anchor="middle" fill="#666666">Re-render count per sub</text>
  
  <!-- Notification Flow (bottom) -->
  <rect x="40" y="500" width="720" height="80" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="530" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Notification Flow</text>
  <text x="400" y="555" font-size="11" text-anchor="middle" fill="#666666">State Change → Evaluate Selectors → Object.is Check → Queue Changed Subs → Batch Flush → React Re-renders</text>
  <text x="400" y="575" font-size="10" text-anchor="middle" fill="#666666">O(k) where k = matching subscribers, NOT O(n) total components</text>
  
  <!-- Arrows -->
  <line x1="250" y1="100" x2="240" y2="250" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="550" y1="100" x2="560" y2="250" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="140" x2="400" y2="360" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="140" y1="320" x2="150" y2="360" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="660" y1="320" x2="650" y2="360" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
