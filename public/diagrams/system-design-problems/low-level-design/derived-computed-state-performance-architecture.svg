<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Derived State Memoization Pipeline</text>
  
  <!-- Raw State (left) -->
  <rect x="40" y="80" width="160" height="120" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="120" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Raw State</text>
  <text x="120" y="135" font-size="10" text-anchor="middle" fill="#666666">items: Item[]</text>
  <text x="120" y="155" font-size="10" text-anchor="middle" fill="#666666">filters: Filter[]</text>
  <text x="120" y="175" font-size="10" text-anchor="middle" fill="#666666">userId: string</text>
  
  <!-- Input Selectors (center-left) -->
  <rect x="240" y="80" width="160" height="120" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="320" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Input Selectors</text>
  <text x="320" y="135" font-size="10" text-anchor="middle" fill="#666666">selectItems(state)</text>
  <text x="320" y="155" font-size="10" text-anchor="middle" fill="#666666">selectFilters(state)</text>
  <text x="320" y="175" font-size="10" text-anchor="middle" fill="#666666">O(1) - Direct Access</text>
  
  <!-- Memoization Layer (center) -->
  <rect x="440" y="80" width="160" height="120" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="520" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Memoization</text>
  <text x="520" y="135" font-size="10" text-anchor="middle" fill="#666666">Cache Inputs + Output</text>
  <text x="520" y="155" font-size="10" text-anchor="middle" fill="#666666">Object.is Comparison</text>
  <text x="520" y="175" font-size="10" text-anchor="middle" fill="#666666">Cache Hit: O(1)</text>
  
  <!-- Result Function (center-right) -->
  <rect x="640" y="80" width="130" height="120" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="705" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Result Fn</text>
  <text x="705" y="135" font-size="10" text-anchor="middle" fill="#666666">Filter + Transform</text>
  <text x="705" y="155" font-size="10" text-anchor="middle" fill="#666666">O(n) - Recompute</text>
  <text x="705" y="175" font-size="10" text-anchor="middle" fill="#666666">Cache New Output</text>
  
  <!-- Arrows between top layers -->
  <line x1="200" y1="140" x2="240" y2="140" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="140" x2="440" y2="140" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="140" x2="640" y2="140" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Computed Pipeline (bottom) -->
  <text x="400" y="250" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Multi-Stage Computed Pipeline</text>
  
  <rect x="40" y="280" width="160" height="60" rx="8" fill="#ffe0b2"/>
  <text x="120" y="305" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Computed A</text>
  <text x="120" y="325" font-size="10" text-anchor="middle" fill="#666666">Filter Items</text>
  
  <rect x="240" y="280" width="160" height="60" rx="8" fill="#c8e6c9"/>
  <text x="320" y="305" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Computed B</text>
  <text x="320" y="325" font-size="10" text-anchor="middle" fill="#666666">Sort + Paginate</text>
  
  <rect x="440" y="280" width="160" height="60" rx="8" fill="#e1bee7"/>
  <text x="520" y="305" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Computed C</text>
  <text x="520" y="325" font-size="10" text-anchor="middle" fill="#666666">Aggregate Stats</text>
  
  <rect x="640" y="280" width="130" height="60" rx="8" fill="#bbdefb"/>
  <text x="705" y="305" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Component</text>
  <text x="705" y="325" font-size="10" text-anchor="middle" fill="#666666">Consume Result</text>
  
  <!-- Arrows between pipeline -->
  <line x1="200" y1="310" x2="240" y2="310" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="400" y1="310" x2="440" y2="310" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="600" y1="310" x2="640" y2="310" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Parameterized Selectors -->
  <rect x="40" y="380" width="360" height="180" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="220" y="410" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Parameterized Selectors</text>
  <text x="220" y="435" font-size="11" text-anchor="middle" fill="#666666">Factory creates memoized selector per parameter</text>
  <text x="220" y="460" font-size="11" text-anchor="middle" fill="#666666">LRU Cache (max 50 parameters per selector)</text>
  <text x="220" y="485" font-size="11" text-anchor="middle" fill="#666666">Evicts least-used parameters when full</text>
  <text x="220" y="510" font-size="11" text-anchor="middle" fill="#666666">Example: selectByStatus('active'), selectByStatus('completed')</text>
  <text x="220" y="535" font-size="11" text-anchor="middle" fill="#666666">Each parameter has independent memoization cache</text>
  
  <!-- Expensive Calculation Cache -->
  <rect x="440" y="380" width="330" height="180" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="605" y="410" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Expensive Calculation Cache</text>
  <text x="605" y="435" font-size="11" text-anchor="middle" fill="#666666">Caches results taking &gt;16ms (frame budget)</text>
  <text x="605" y="460" font-size="11" text-anchor="middle" fill="#666666">LRU Eviction (max 100 entries)</text>
  <text x="605" y="485" font-size="11" text-anchor="middle" fill="#666666">TTL-based expiration (5 min default)</text>
  <text x="605" y="510" font-size="11" text-anchor="middle" fill="#666666">Key: Input hash → Cached result</text>
  <text x="605" y="535" font-size="11" text-anchor="middle" fill="#666666">Hit: O(1) | Miss: O(n) compute + cache</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
