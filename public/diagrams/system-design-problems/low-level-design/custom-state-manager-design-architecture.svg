<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Custom State Manager Architecture</text>
  
  <!-- Store Core (center) -->
  <rect x="280" y="60" width="240" height="80" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2.5"/>
  <text x="400" y="88" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Store Core</text>
  <text x="400" y="108" font-size="11" text-anchor="middle" fill="#666666">getState, setState, subscribe</text>
  <text x="400" y="125" font-size="11" text-anchor="middle" fill="#666666">Observable State Container</text>
  
  <!-- Middleware Pipeline (left) -->
  <rect x="50" y="180" width="200" height="140" rx="8" fill="#f3e5f5" stroke="#ce93d8" stroke-width="2"/>
  <text x="150" y="205" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Middleware Pipeline</text>
  
  <rect x="65" y="220" width="170" height="28" rx="4" fill="#e1bee7"/>
  <text x="150" y="239" font-size="11" text-anchor="middle" fill="#1a1a1a">1. Logger</text>
  
  <rect x="65" y="253" width="170" height="28" rx="4" fill="#e1bee7"/>
  <text x="150" y="272" font-size="11" text-anchor="middle" fill="#1a1a1a">2. Validator (Zod)</text>
  
  <rect x="65" y="286" width="170" height="28" rx="4" fill="#e1bee7"/>
  <text x="150" y="305" font-size="11" text-anchor="middle" fill="#1a1a1a">3. Persister</text>
  
  <!-- Arrow from Middleware to Store Core -->
  <line x1="250" y1="250" x2="280" y2="120" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="235" y="180" font-size="10" fill="#666666" transform="rotate(-60, 235, 180)">setState</text>
  
  <!-- Subscription Manager (right) -->
  <rect x="550" y="180" width="200" height="140" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="650" y="205" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Subscription Manager</text>
  
  <rect x="565" y="220" width="170" height="28" rx="4" fill="#c8e6c9"/>
  <text x="650" y="239" font-size="11" text-anchor="middle" fill="#1a1a1a">Sub 1: selector → notify</text>
  
  <rect x="565" y="253" width="170" height="28" rx="4" fill="#c8e6c9"/>
  <text x="650" y="272" font-size="11" text-anchor="middle" fill="#1a1a1a">Sub 2: selector → notify</text>
  
  <rect x="565" y="286" width="170" height="28" rx="4" fill="#c8e6c9"/>
  <text x="650" y="305" font-size="11" text-anchor="middle" fill="#1a1a1a">Sub N: selector → notify</text>
  
  <!-- Arrow from Store Core to Subscriptions -->
  <line x1="520" y1="120" x2="550" y2="250" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="565" y="180" font-size="10" fill="#666666" transform="rotate(60, 565, 180)">notify</text>
  
  <!-- React Components (bottom) -->
  <rect x="100" y="380" width="180" height="100" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="190" y="408" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">React Components</text>
  <text x="190" y="430" font-size="11" text-anchor="middle" fill="#666666">useMyStore(store, selector)</text>
  <text x="190" y="448" font-size="11" text-anchor="middle" fill="#666666">Subscribe &amp; Re-render</text>
  <text x="190" y="466" font-size="10" text-anchor="middle" fill="#666666">Component A, B, C...</text>
  
  <!-- Batch Manager (bottom left) -->
  <rect x="30" y="510" width="160" height="60" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="110" y="535" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Batch Manager</text>
  <text x="110" y="555" font-size="10" text-anchor="middle" fill="#666666">Queue &amp; Merge Updates</text>
  
  <!-- DevTools (bottom right) -->
  <rect x="610" y="510" width="160" height="60" rx="8" fill="#e0f2f1" stroke="#80cbc4" stroke-width="2"/>
  <text x="690" y="535" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">DevTools Adapter</text>
  <text x="690" y="555" font-size="10" text-anchor="middle" fill="#666666">Redux DevTools Protocol</text>
  
  <!-- Arrows from React to Store -->
  <line x1="190" y1="380" x2="350" y2="140" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="320" x2="650" y2="380" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="665" y="355" font-size="10" fill="#666666">Listeners</text>
  
  <!-- Data flow labels -->
  <text x="310" y="195" font-size="11" font-weight="bold" fill="#1a1a1a">State Update Flow →</text>
  <text x="350" y="300" font-size="11" font-weight="bold" fill="#1a1a1a">← Notification Flow</text>
  
  <!-- Legend -->
  <rect x="300" y="520" width="260" height="60" rx="6" fill="#f9f9f9" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="315" y="532" width="20" height="12" rx="2" fill="#e3f2fd"/>
  <text x="340" y="542" font-size="10" fill="#1a1a1a">Core Store</text>
  <rect x="420" y="532" width="20" height="12" rx="2" fill="#f3e5f5"/>
  <text x="445" y="542" font-size="10" fill="#1a1a1a">Middleware</text>
  <rect x="315" y="552" width="20" height="12" rx="2" fill="#e8f5e9"/>
  <text x="340" y="562" font-size="10" fill="#1a1a1a">Subscriptions</text>
  <rect x="420" y="552" width="20" height="12" rx="2" fill="#fff3e0"/>
  <text x="445" y="562" font-size="10" fill="#1a1a1a">React Integration</text>
  <rect x="530" y="552" width="20" height="12" rx="2" fill="#ffebee"/>
  <text x="555" y="562" font-size="10" fill="#1a1a1a">Batch/DevTools</text>
</svg>
