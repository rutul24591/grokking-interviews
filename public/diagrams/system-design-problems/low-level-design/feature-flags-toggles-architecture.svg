<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Feature Flag Evaluation Pipeline</text>
  
  <!-- Remote Config (left) -->
  <rect x="40" y="80" width="160" height="100" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="120" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Remote Config</text>
  <text x="120" y="135" font-size="10" text-anchor="middle" fill="#666666">Server API</text>
  <text x="120" y="155" font-size="10" text-anchor="middle" fill="#666666">Flag Definitions</text>
  <text x="120" y="175" font-size="10" text-anchor="middle" fill="#666666">Poll every 5 min</text>
  
  <!-- Flag Store (center) -->
  <rect x="240" y="80" width="200" height="100" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="340" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Flag Store</text>
  <text x="340" y="135" font-size="10" text-anchor="middle" fill="#666666">Zustand Store</text>
  <text x="340" y="155" font-size="10" text-anchor="middle" fill="#666666">Cached Flags + TTL</text>
  <text x="340" y="175" font-size="10" text-anchor="middle" fill="#666666">Offline Fallback</text>
  
  <!-- Flag Evaluator (right) -->
  <rect x="480" y="80" width="280" height="100" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="620" y="110" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Flag Evaluator</text>
  <text x="620" y="135" font-size="10" text-anchor="middle" fill="#666666">Dependencies → Targeting → Hash</text>
  <text x="620" y="155" font-size="10" text-anchor="middle" fill="#666666">User Match → Segment → % Rollout</text>
  <text x="620" y="175" font-size="10" text-anchor="middle" fill="#666666">Returns: boolean | variant</text>
  
  <!-- Percentage Hasher (below evaluator) -->
  <rect x="480" y="210" width="280" height="80" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="620" y="240" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Percentage Hasher</text>
  <text x="620" y="265" font-size="10" text-anchor="middle" fill="#666666">hash(userId + flagKey) % 100</text>
  <text x="620" y="285" font-size="10" text-anchor="middle" fill="#666666">Consistent: same user = same result</text>
  
  <!-- React Components (bottom) -->
  <rect x="40" y="340" width="720" height="120" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="400" y="370" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">React Integration</text>
  
  <rect x="60" y="390" width="140" height="50" rx="6" fill="#bbdefb"/>
  <text x="130" y="410" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">useFeatureFlag</text>
  <text x="130" y="430" font-size="9" text-anchor="middle" fill="#666666">Returns: boolean</text>
  
  <rect x="240" y="390" width="140" height="50" rx="6" fill="#bbdefb"/>
  <text x="310" y="410" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">useFeatureVariant</text>
  <text x="310" y="430" font-size="9" text-anchor="middle" fill="#666666">Returns: variant string</text>
  
  <rect x="420" y="390" width="140" height="50" rx="6" fill="#bbdefb"/>
  <text x="490" y="410" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">useFlagsLoading</text>
  <text x="490" y="430" font-size="9" text-anchor="middle" fill="#666666">Returns: loading state</text>
  
  <rect x="600" y="390" width="140" height="50" rx="6" fill="#bbdefb"/>
  <text x="670" y="410" font-size="11" font-weight="bold" text-anchor="middle" fill="#1a1a1a">FlagProvider</text>
  <text x="670" y="430" font-size="9" text-anchor="middle" fill="#666666">Fetches + caches</text>
  
  <!-- Arrows -->
  <line x1="200" y1="130" x2="240" y2="130" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="440" y1="130" x2="480" y2="130" stroke="#666666" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="180" x2="620" y2="210" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="180" x2="340" y2="340" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <!-- Evaluation Flow (bottom) -->
  <rect x="40" y="480" width="720" height="100" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="400" y="510" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Evaluation Flow</text>
  <text x="400" y="535" font-size="11" text-anchor="middle" fill="#666666">1. Check dependencies (all must be enabled)</text>
  <text x="400" y="555" font-size="11" text-anchor="middle" fill="#666666">2. Check targeting rules (user match → segment match → percentage hash)</text>
  <text x="400" y="575" font-size="11" text-anchor="middle" fill="#666666">3. Return result, cache per session, invalidate on config refresh</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
