<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Monorepo Store Boundaries Architecture</text>
  
  <!-- Packages -->
  <rect x="40" y="70" width="160" height="120" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="120" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Auth Package</text>
  <text x="120" y="125" font-size="10" text-anchor="middle" fill="#666666">Private Store</text>
  <text x="120" y="145" font-size="10" text-anchor="middle" fill="#666666">IAuthProvider Adapter</text>
  <text x="120" y="165" font-size="10" text-anchor="middle" fill="#666666">Exports: Contract Only</text>
  <text x="120" y="185" font-size="10" text-anchor="middle" fill="#666666">Not: Direct Store</text>
  
  <rect x="240" y="70" width="160" height="120" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="320" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Dashboard Pkg</text>
  <text x="320" y="125" font-size="10" text-anchor="middle" fill="#666666">Private Store</text>
  <text x="320" y="145" font-size="10" text-anchor="middle" fill="#666666">IDashboardAdapter</text>
  <text x="320" y="165" font-size="10" text-anchor="middle" fill="#666666">Reads via Contract</text>
  <text x="320" y="185" font-size="10" text-anchor="middle" fill="#666666">Emits Events</text>
  
  <rect x="440" y="70" width="160" height="120" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="520" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Settings Pkg</text>
  <text x="520" y="125" font-size="10" text-anchor="middle" fill="#666666">Private Store</text>
  <text x="520" y="145" font-size="10" text-anchor="middle" fill="#666666">ISettingsAdapter</text>
  <text x="520" y="165" font-size="10" text-anchor="middle" fill="#666666">Event Bus Listener</text>
  <text x="520" y="185" font-size="10" text-anchor="middle" fill="#666666">No Direct Imports</text>
  
  <rect x="640" y="70" width="120" height="120" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="700" y="100" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Analytics</text>
  <text x="700" y="125" font-size="10" text-anchor="middle" fill="#666666">Private Store</text>
  <text x="700" y="145" font-size="10" text-anchor="middle" fill="#666666">IAnalyticsAdapter</text>
  <text x="700" y="165" font-size="10" text-anchor="middle" fill="#666666">Event Consumer</text>
  
  <!-- Contracts Package (center) -->
  <rect x="40" y="230" width="340" height="140" rx="8" fill="#ffebee" stroke="#ef9a9a" stroke-width="2"/>
  <text x="210" y="260" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Contracts Package</text>
  <text x="210" y="285" font-size="11" text-anchor="middle" fill="#666666">TypeScript Interfaces Only</text>
  <text x="210" y="310" font-size="11" text-anchor="middle" fill="#666666">IAuthProvider, IDashboardReader, ISettingsWriter</text>
  <text x="210" y="335" font-size="11" text-anchor="middle" fill="#666666">No Implementation - Only Types</text>
  <text x="210" y="360" font-size="11" text-anchor="middle" fill="#666666">Versioned: v1, v2, breaking change detection</text>
  
  <!-- Event Bus (right) -->
  <rect x="420" y="230" width="340" height="140" rx="8" fill="#e0f2f1" stroke="#80cbc4" stroke-width="2"/>
  <text x="590" y="260" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Event Bus Package</text>
  <text x="590" y="285" font-size="11" text-anchor="middle" fill="#666666">Typed Events: user:*, dashboard:*</text>
  <text x="590" y="310" font-size="11" text-anchor="middle" fill="#666666">Namespace Isolation</text>
  <text x="590" y="335" font-size="11" text-anchor="middle" fill="#666666">Rate Limiting per Event Type</text>
  <text x="590" y="360" font-size="11" text-anchor="middle" fill="#666666">Schema Validation (Zod)</text>
  
  <!-- Bridge Package (bottom) -->
  <rect x="40" y="410" width="340" height="120" rx="8" fill="#bbdefb" stroke="#90caf9" stroke-width="2"/>
  <text x="210" y="440" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Bridge Package</text>
  <text x="210" y="465" font-size="11" text-anchor="middle" fill="#666666">Connects Micro-Frontends</text>
  <text x="210" y="485" font-size="11" text-anchor="middle" fill="#666666">Shared State: Auth, Theme, Locale</text>
  <text x="210" y="505" font-size="11" text-anchor="middle" fill="#666666">Each MFE Registers → Receives Scoped API</text>
  <text x="210" y="525" font-size="11" text-anchor="middle" fill="#666666">No Direct Cross-MFE State Access</text>
  
  <!-- ESLint Boundary Enforcer (bottom right) -->
  <rect x="420" y="410" width="340" height="120" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="590" y="440" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">ESLint Boundary Plugin</text>
  <text x="590" y="465" font-size="11" text-anchor="middle" fill="#666666">Blocks Cross-Package Store Imports</text>
  <text x="590" y="485" font-size="11" text-anchor="middle" fill="#666666">Allows: Contract + Event Bus Imports</text>
  <text x="590" y="505" font-size="11" text-anchor="middle" fill="#666666">CI Integration: Blocks PRs on Violation</text>
  <text x="590" y="525" font-size="11" text-anchor="middle" fill="#666666">Enforces Architecture at Build Time</text>
  
  <!-- Arrows -->
  <line x1="120" y1="190" x2="120" y2="230" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="320" y1="190" x2="320" y2="230" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="190" x2="590" y2="230" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="190" x2="700" y2="230" stroke="#666666" stroke-width="1.5" marker-end="url(#arrow)"/>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
