<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" fill="none" font-family="system-ui, sans-serif">
  <rect width="800" height="280" fill="transparent"/>

  <!-- User Input -->
  <rect x="30" y="100" width="140" height="80" rx="8" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="100" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">User Input</text>
  <text x="100" y="158" text-anchor="middle" font-size="11" fill="#3b82f6">onChange, debounce</text>

  <!-- Arrow -->
  <line x1="170" y1="140" x2="260" y2="140" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="215" y="130" text-anchor="middle" font-size="10" fill="#6b7280">debounced</text>

  <!-- Cache Check -->
  <rect x="260" y="100" width="140" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="330" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Cache Check</text>
  <text x="280" y="158" font-size="11" fill="#92400e">Map.get(query)</text>
  <text x="280" y="174" font-size="10" fill="#b45309">Hit → return cached</text>

  <!-- Arrow: Hit -->
  <path d="M 330 180 Q 330 240 400 240" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="370" y="230" font-size="10" fill="#22c55e">cache hit</text>

  <!-- Arrow: Miss → API -->
  <line x1="400" y1="140" x2="490" y2="140" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="445" y="130" text-anchor="middle" font-size="10" fill="#6b7280">miss</text>

  <!-- API Fetch -->
  <rect x="490" y="100" width="140" height="80" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="560" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#991b1b">API Fetch</text>
  <text x="510" y="158" font-size="11" fill="#991b1b">AbortController</text>
  <text x="510" y="174" font-size="10" fill="#b91c1c">stale response discard</text>

  <!-- Arrow: API → Results -->
  <line x1="560" y1="180" x2="560" y2="230" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Results -->
  <rect x="490" y="230" width="140" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="560" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">Suggestions</text>

  <!-- Arrow: Results → Dropdown -->
  <line x1="630" y1="140" x2="720" y2="140" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Dropdown -->
  <rect x="720" y="100" width="70" height="80" rx="8" fill="#f3e8ff" stroke="#a855f7" stroke-width="2"/>
  <text x="755" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#6b21a8">Dropdown</text>
  <text x="735" y="158" font-size="10" fill="#6b21a8">highlight</text>
  <text x="735" y="174" font-size="10" fill="#6b21a8">keyboard</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
