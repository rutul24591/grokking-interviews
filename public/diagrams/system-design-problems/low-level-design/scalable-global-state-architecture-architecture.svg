<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9c27b0"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Multi-Store Global State Architecture</text>
  
  <!-- Core Store (center top) -->
  <rect x="300" y="55" width="200" height="90" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2.5"/>
  <text x="400" y="80" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">CoreStore</text>
  <text x="400" y="98" font-size="10" text-anchor="middle" fill="#666666">Auth User, Locale, Feature Flags</text>
  <text x="400" y="113" font-size="10" font-weight="bold" text-anchor="middle" fill="#e65100">Shared Kernel State</text>
  
  <!-- Event Bus (center) -->
  <ellipse cx="400" cy="280" rx="120" ry="40" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="2"/>
  <text x="400" y="276" font-size="14" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Event Bus</text>
  <text x="400" y="294" font-size="10" text-anchor="middle" fill="#666666">Typed, Rate-Limited</text>
  
  <!-- Domain Stores -->
  <!-- User Store -->
  <rect x="50" y="180" width="140" height="70" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="120" y="205" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">UserStore</text>
  <text x="120" y="225" font-size="10" text-anchor="middle" fill="#666666">Profile, Preferences</text>
  <line x1="190" y1="215" x2="280" y2="260" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowhead-gray)"/>
  <line x1="120" y1="250" x2="120" y2="400" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowhead-gray)"/>
  
  <!-- Dashboard Store -->
  <rect x="220" y="400" width="140" height="70" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="290" y="425" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">DashboardStore</text>
  <text x="290" y="445" font-size="10" text-anchor="middle" fill="#666666">Widgets, Layout</text>
  <line x1="290" y1="400" x2="350" y2="315" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowhead-gray)"/>
  
  <!-- Analytics Store -->
  <rect x="420" y="400" width="140" height="70" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="490" y="425" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">AnalyticsStore</text>
  <text x="490" y="445" font-size="10" text-anchor="middle" fill="#666666">Metrics, Reports</text>
  <line x1="490" y1="400" x2="450" y2="315" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowhead-gray)"/>
  
  <!-- Notification Store -->
  <rect x="610" y="180" width="140" height="70" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="680" y="205" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">NotificationStore</text>
  <text x="680" y="225" font-size="10" text-anchor="middle" fill="#666666">Alerts, Inbox</text>
  <line x1="610" y1="215" x2="520" y2="260" stroke="#666666" stroke-width="1.5" marker-end="url(#arrowhead-gray)"/>
  
  <!-- Billing Store -->
  <rect x="50" y="470" width="140" height="70" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="120" y="495" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">BillingStore</text>
  <text x="120" y="515" font-size="10" text-anchor="middle" fill="#666666">Plans, Payments</text>
  
  <!-- Settings Store -->
  <rect x="610" y="470" width="140" height="70" rx="8" fill="#e1bee7" stroke="#ce93d8" stroke-width="2"/>
  <text x="680" y="495" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a1a">SettingsStore</text>
  <text x="680" y="515" font-size="10" text-anchor="middle" fill="#666666">App Config</text>
  
  <!-- Arrows from CoreStore to all domain stores -->
  <line x1="350" y1="130" x2="170" y2="190" stroke="#e65100" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead-purple)"/>
  <line x1="450" y1="130" x2="630" y2="190" stroke="#e65100" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead-purple)"/>
  <line x1="400" y1="145" x2="400" y2="400" stroke="#e65100" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowhead-purple)"/>
  
  <!-- Event flow labels -->
  <text x="220" y="230" font-size="9" fill="#666666">user:updated</text>
  <text x="560" y="230" font-size="9" fill="#666666">notification:new</text>
  
  <!-- Component Layer (bottom) -->
  <rect x="220" y="545" width="360" height="40" rx="6" fill="#bbdefb" stroke="#90caf9" stroke-width="2"/>
  <text x="400" y="570" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Components compose data from multiple stores at query time</text>
  
  <!-- Legend -->
  <rect x="50" y="55" width="210" height="70" rx="6" fill="#f9f9f9" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="65" y1="73" x2="95" y2="73" stroke="#e65100" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="105" y="77" font-size="10" fill="#1a1a1a">CoreStore read access</text>
  <line x1="65" y1="93" x2="95" y2="93" stroke="#666666" stroke-width="2" marker-end="url(#arrowhead-gray)"/>
  <text x="105" y="97" font-size="10" fill="#1a1a1a">Event bus communication</text>
  <rect x="65" y="107" width="30" height="12" rx="2" fill="#e1bee7"/>
  <text x="105" y="117" font-size="10" fill="#1a1a1a">Domain Store</text>
</svg>
