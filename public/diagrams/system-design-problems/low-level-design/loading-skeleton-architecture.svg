<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" fill="none" font-family="system-ui, sans-serif">
  <rect width="600" height="220" fill="transparent"/>

  <rect x="30" y="70" width="130" height="80" rx="8" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="95" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Loading State</text>
  <text x="50" y="128" font-size="11" fill="#3b82f6">isLoading + delay</text>

  <line x1="160" y1="110" x2="240" y2="110" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="240" y="70" width="160" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="320" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">SkeletonWrapper</text>
  <text x="260" y="130" font-size="11" fill="#92400e">delay threshold</text>
  <text x="260" y="148" font-size="10" fill="#b45309">show/hide based on timing</text>

  <line x1="400" y1="110" x2="470" y2="110" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="470" y="50" width="100" height="60" rx="6" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="520" y="85" text-anchor="middle" font-size="11" font-weight="bold" fill="#4b5563">Skeleton</text>

  <rect x="470" y="120" width="100" height="60" rx="6" fill="#e5e7eb" stroke="#9ca3af" stroke-width="1.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="520" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#4b5563">Skeleton</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
