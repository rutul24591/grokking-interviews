<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" fill="none" font-family="system-ui, sans-serif">
  <rect width="700" height="260" fill="transparent"/>

  <rect x="30" y="90" width="130" height="80" rx="8" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="95" y="125" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Gallery Grid</text>
  <text x="50" y="148" font-size="11" fill="#3b82f6">lazy loaded thumbnails</text>

  <line x1="160" y1="130" x2="240" y2="130" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="240" y="70" width="180" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="330" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Gallery Store</text>
  <text x="260" y="125" font-size="11" fill="#92400e">• images: GalleryImage[]</text>
  <text x="260" y="145" font-size="11" fill="#92400e">• currentIndex: number</text>
  <text x="260" y="165" font-size="11" fill="#92400e">• zoom: ZoomState</text>
  <text x="260" y="185" font-size="10" fill="#b45309">next, prev, goTo, setZoom</text>

  <line x1="420" y1="130" x2="500" y2="130" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="500" y="80" width="170" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="585" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">Lightbox</text>
  <text x="520" y="135" font-size="11" fill="#166534">• Portal rendering</text>
  <text x="520" y="155" font-size="11" fill="#166534">• pinch-to-zoom</text>
  <text x="520" y="175" font-size="10" fill="#15803d">swipe, keyboard, focus trap</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
