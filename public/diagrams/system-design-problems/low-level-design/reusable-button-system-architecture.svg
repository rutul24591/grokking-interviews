<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" fill="none" font-family="system-ui, sans-serif">
  <rect width="700" height="280" fill="transparent"/>

  <rect x="30" y="100" width="130" height="80" rx="8" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="95" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">User Click</text>
  <text x="50" y="158" font-size="11" fill="#3b82f6">variant / size</text>

  <line x1="160" y1="140" x2="240" y2="140" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="240" y="70" width="190" height="140" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="335" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Style Resolver</text>
  <text x="260" y="125" font-size="11" fill="#92400e">• variant → class map</text>
  <text x="260" y="145" font-size="11" fill="#92400e">• size → padding/font map</text>
  <text x="260" y="165" font-size="11" fill="#92400e">• state → hover/active map</text>
  <text x="260" y="195" font-size="10" fill="#b45309">getButtonClasses()</text>

  <line x1="430" y1="140" x2="510" y2="140" stroke="#6b7280" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="510" y="90" width="160" height="100" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="590" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">Button Component</text>
  <text x="530" y="145" font-size="11" fill="#166534">• polymorphic (as prop)</text>
  <text x="530" y="165" font-size="11" fill="#166534">• loading state</text>
  <text x="530" y="185" font-size="10" fill="#15803d">ripple animation</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
