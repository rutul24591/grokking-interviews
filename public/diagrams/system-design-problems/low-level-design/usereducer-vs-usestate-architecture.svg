<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a1a">useReducer vs useState Decision Framework</text>
  
  <!-- Decision Tree (left) -->
  <rect x="40" y="70" width="340" height="400" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="2"/>
  <text x="210" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Decision Criteria</text>
  
  <rect x="60" y="120" width="300" height="50" rx="6" fill="#c8e6c9"/>
  <text x="210" y="140" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">useState</text>
  <text x="210" y="158" font-size="10" text-anchor="middle" fill="#666666">1-2 independent fields, simple setters</text>
  
  <rect x="60" y="190" width="300" height="50" rx="6" fill="#fff3e0"/>
  <text x="210" y="210" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Evaluate Further</text>
  <text x="210" y="228" font-size="10" text-anchor="middle" fill="#666666">3+ fields, some related updates</text>
  
  <rect x="60" y="260" width="300" height="50" rx="6" fill="#e1bee7"/>
  <text x="210" y="280" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">useReducer</text>
  <text x="210" y="298" font-size="10" text-anchor="middle" fill="#666666">Multi-step transitions, validation, testability</text>
  
  <rect x="60" y="330" width="300" height="50" rx="6" fill="#bbdefb"/>
  <text x="210" y="350" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">State Machine (XState)</text>
  <text x="210" y="368" font-size="10" text-anchor="middle" fill="#666666">Strict transition rules, visualization needed</text>
  
  <rect x="60" y="400" width="300" height="50" rx="6" fill="#ffebee"/>
  <text x="210" y="420" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a">External Store (Zustand/Redux)</text>
  <text x="210" y="438" font-size="10" text-anchor="middle" fill="#666666">Cross-component, persistence, DevTools</text>
  
  <!-- Trade-offs (right) -->
  <rect x="420" y="70" width="340" height="200" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="2"/>
  <text x="590" y="100" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Trade-offs</text>
  
  <text x="440" y="130" font-size="11" fill="#1a1a1a">useState: Less boilerplate, harder to test logic</text>
  <text x="440" y="155" font-size="11" fill="#1a1a1a">useReducer: More boilerplate, pure testable logic</text>
  <text x="440" y="180" font-size="11" fill="#1a1a1a">State Machine: Strict rules, visualization, heavier</text>
  <text x="440" y="205" font-size="11" fill="#1a1a1a">External Store: Shared state, persistence, complex</text>
  <text x="440" y="230" font-size="11" fill="#1a1a1a">useEffect: Anti-pattern for state logic, avoid</text>
  <text x="440" y="255" font-size="11" fill="#1a1a1a">Context + useState: Good for subtree, not complex</text>
  
  <!-- Complexity Thresholds (bottom right) -->
  <rect x="420" y="290" width="340" height="180" rx="8" fill="#c8e6c9" stroke="#a5d6a7" stroke-width="2"/>
  <text x="590" y="320" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Complexity Thresholds</text>
  
  <text x="440" y="350" font-size="11" fill="#1a1a1a">Low: 1-2 fields, independent → useState</text>
  <text x="440" y="375" font-size="11" fill="#1a1a1a">Medium: 3-5 fields, some transitions → useReducer</text>
  <text x="440" y="400" font-size="11" fill="#1a1a1a">High: 5+ fields, strict rules → State Machine</text>
  <text x="440" y="425" font-size="11" fill="#1a1a1a">Shared: Cross-component → External Store</text>
  <text x="440" y="450" font-size="11" fill="#1a1a1a">Async: API calls → Never in reducer, use effects</text>
  
  <!-- Testing Benefits (bottom) -->
  <rect x="40" y="490" width="720" height="90" rx="8" fill="#fff3e0" stroke="#ffcc80" stroke-width="2"/>
  <text x="400" y="520" font-size="16" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Testing Advantage of useReducer</text>
  <text x="400" y="545" font-size="11" text-anchor="middle" fill="#666666">Reducer is a pure function: given (state, action) → assert nextState</text>
  <text x="400" y="565" font-size="11" text-anchor="middle" fill="#666666">No component rendering needed for state logic tests. Fast, reliable, comprehensive coverage.</text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666"/>
    </marker>
  </defs>
</svg>
