<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Bitmask DP and Subset Enumeration</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Bitmask as a set</text>
  <text x="60" y="115" font-size="11">For n ≤ 20, an int can encode the entire subset of {0..n-1}</text>
  <text x="60" y="135" font-size="11">dp[mask] = best result over the subset represented by mask</text>
  <text x="60" y="155" font-size="11">Transition: iterate over bits in mask, remove a bit, look up dp[mask ^ bit]</text>
  <text x="60" y="180" font-size="11" font-weight="700">Total state count: 2^n. Common in TSP, assignment, set-cover.</text>
  <text x="60" y="200" font-size="11">For n = 20: 2^20 ≈ 10^6 — feasible. For n = 25: 2^25 ≈ 3*10^7 borderline.</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">Submask enumeration</text>
  <text x="60" y="335" font-size="11">Iterate every subset of mask in O(3^n) total work across all masks:</text>
  <text x="60" y="365" font-size="11">  for mask in 0..(1&lt;&lt;n)-1:</text>
  <text x="60" y="385" font-size="11">    s = mask</text>
  <text x="60" y="405" font-size="11">    while s &gt; 0:</text>
  <text x="60" y="425" font-size="11">      // process s as a submask of mask</text>
  <text x="60" y="445" font-size="11">      s = (s - 1) &amp; mask</text>
  <text x="60" y="465" font-size="11" fill="#4caf50" font-weight="700">Used for partitioning DP problems where each mask splits in two.</text>
</svg>
