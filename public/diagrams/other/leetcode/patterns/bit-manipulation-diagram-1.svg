<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Bit Manipulation Toolkit</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Core operations</text>
  <text x="60" y="115" font-size="11">• AND (&amp;), OR (|), XOR (^), NOT (~), shift (&lt;&lt;, &gt;&gt;)</text>
  <text x="60" y="135" font-size="11">• Set bit i: x | (1 &lt;&lt; i)</text>
  <text x="60" y="155" font-size="11">• Clear bit i: x &amp; ~(1 &lt;&lt; i)</text>
  <text x="60" y="175" font-size="11">• Toggle bit i: x ^ (1 &lt;&lt; i)</text>
  <text x="60" y="195" font-size="11">• Test bit i: (x &gt;&gt; i) &amp; 1</text>
  <text x="60" y="225" font-size="11">• Lowest set bit: x &amp; -x. Clear lowest set bit: x &amp; (x - 1).</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">Identities and tricks</text>
  <text x="60" y="335" font-size="11">• x ^ x = 0   x ^ 0 = x   XOR is associative and commutative</text>
  <text x="60" y="355" font-size="11">• x &amp; (x - 1) clears lowest set bit — useful for popcount</text>
  <text x="60" y="375" font-size="11">• x is a power of two iff x &gt; 0 and (x &amp; (x - 1)) == 0</text>
  <text x="60" y="395" font-size="11">• Subset enumeration: for s = mask; s != 0; s = (s - 1) &amp; mask</text>
  <text x="60" y="415" font-size="11">• Brian Kernighan&apos;s popcount: count = 0; while x: x &amp;= x-1; count++</text>
  <text x="60" y="435" font-size="11">• Right shift sign — &gt;&gt; in Java is arithmetic; &gt;&gt;&gt; is logical</text>
  <text x="60" y="465" font-size="11" fill="#4caf50" font-weight="700">XOR is the duplicate-detector and the in-place swapper.</text>
</svg>
