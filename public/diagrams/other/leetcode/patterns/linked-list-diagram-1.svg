<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Linked List — Pointer Surgery 101</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Core techniques</text>
  <text x="60" y="115" font-size="11">• Dummy head — eliminates the &quot;is this the head?&quot; branch on every insert / delete</text>
  <text x="60" y="135" font-size="11">• Two pointers — fast / slow for cycle, middle, k-th from end</text>
  <text x="60" y="155" font-size="11">• Iterative reversal — prev / curr / next triple-step</text>
  <text x="60" y="175" font-size="11">• Splice — connect (a.next = c; c.prev = a) without re-traversal</text>
  <text x="60" y="195" font-size="11">• Recursion — natural for sub-list operations, beware stack depth</text>
  <text x="60" y="225" font-size="11" font-weight="700">Operation costs: head insert/delete O(1); index access O(n); search O(n).</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">Dummy-head template</text>
  <text x="60" y="335" font-size="11" font-family="monospace">dummy = Node(0); dummy.next = head</text>
  <text x="60" y="355" font-size="11" font-family="monospace">curr = dummy</text>
  <text x="60" y="375" font-size="11" font-family="monospace">while curr.next:</text>
  <text x="60" y="395" font-size="11" font-family="monospace">  if should_remove(curr.next): curr.next = curr.next.next</text>
  <text x="60" y="415" font-size="11" font-family="monospace">  else: curr = curr.next</text>
  <text x="60" y="435" font-size="11" font-family="monospace">return dummy.next</text>
  <text x="60" y="465" font-size="11" fill="#4caf50" font-weight="700">Always start with a dummy when the head itself might change.</text>
</svg>
