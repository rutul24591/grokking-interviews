<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Recursion vs. Iteration</text>

  <rect x="40" y="60" width="400" height="395" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Recursion wins</text>
  <text x="60" y="115" font-size="11">• Trees, graphs — call stack mirrors structure</text>
  <text x="60" y="135" font-size="11">• Divide-and-conquer — natural split / combine</text>
  <text x="60" y="155" font-size="11">• Inductive proofs of correctness</text>
  <text x="60" y="175" font-size="11">• Backtracking with branch state</text>
  <text x="60" y="200" font-size="11">Code reads like the problem statement.</text>
  <text x="60" y="220" font-size="11">Easier to reason about correctness via</text>
  <text x="60" y="240" font-size="11">structural induction.</text>
  <text x="60" y="275" font-size="11" font-weight="700">Cost: stack memory O(depth)</text>
  <text x="60" y="305" font-size="11">Default Python depth limit: 1000.</text>
  <text x="60" y="325" font-size="11">JVM thread stack typically 512 KB.</text>
  <text x="60" y="365" font-size="11" fill="#cc4444" font-weight="700">Pitfall: deep recursion</text>
  <text x="60" y="385" font-size="11" fill="#cc4444">on n = 100k blows the stack.</text>
  <text x="60" y="425" font-size="11">Convert to iterative with explicit stack.</text>

  <rect x="460" y="60" width="400" height="395" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="480" y="88" font-size="13" font-weight="700" fill="#4caf50">Iteration wins</text>
  <text x="480" y="115" font-size="11">• Linear traversal of arrays / lists</text>
  <text x="480" y="135" font-size="11">• Tail-recursive shapes (loop equivalent)</text>
  <text x="480" y="155" font-size="11">• Performance-critical code</text>
  <text x="480" y="175" font-size="11">• Constant-space requirements</text>
  <text x="480" y="200" font-size="11">No call overhead per step.</text>
  <text x="480" y="220" font-size="11">No stack-overflow risk.</text>
  <text x="480" y="240" font-size="11">Easier to inline by the compiler.</text>
  <text x="480" y="275" font-size="11" font-weight="700">Cost: more imperative state</text>
  <text x="480" y="305" font-size="11">Loop variables, counters, sentinels</text>
  <text x="480" y="325" font-size="11">that mirror the recursion variables.</text>
  <text x="480" y="365" font-size="11" fill="#cc4444" font-weight="700">Pitfall: mishandled invariants</text>
  <text x="480" y="385" font-size="11" fill="#cc4444">in the loop body silently corrupt state.</text>
  <text x="480" y="425" font-size="11">Recursion makes invariants explicit.</text>
</svg>
