<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Canonical Queue Leetcode Problems</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">BFS / level-order</text>
  <text x="60" y="115" font-size="11">• 102. Binary Tree Level Order Traversal — base template</text>
  <text x="60" y="135" font-size="11">• 199. Binary Tree Right Side View — last node per level</text>
  <text x="60" y="155" font-size="11">• 994. Rotting Oranges — multi-source BFS</text>
  <text x="60" y="175" font-size="11">• 286. Walls and Gates — multi-source BFS from gates</text>
  <text x="60" y="195" font-size="11">• 127. Word Ladder — BFS over word-graph</text>
  <text x="60" y="225" font-size="11">• 1091. Shortest Path in Binary Matrix — 8-direction BFS</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">Queue / deque design</text>
  <text x="60" y="335" font-size="11">• 622. Design Circular Queue — fixed-size ring buffer</text>
  <text x="60" y="355" font-size="11">• 641. Design Circular Deque — both-end variant</text>
  <text x="60" y="375" font-size="11">• 933. Number of Recent Calls — sliding-window queue</text>
  <text x="60" y="395" font-size="11">• 225. Implement Stack using Queues</text>
  <text x="60" y="415" font-size="11">• 207 / 210. Course Schedule — Kahn topological sort</text>
  <text x="60" y="435" font-size="11">• 269. Alien Dictionary — Kahn over derived edges</text>
  <text x="60" y="460" font-size="11" fill="#4caf50" font-weight="700">If the question reads &quot;shortest&quot; or &quot;level&quot; on an unweighted graph: BFS.</text>
</svg>
