<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Canonical Binary-Search Leetcode Problems</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">On sorted arrays</text>
  <text x="60" y="112" font-size="11">• 704. Binary Search — base template</text>
  <text x="60" y="132" font-size="11">• 35. Search Insert Position — lower_bound</text>
  <text x="60" y="152" font-size="11">• 34. Find First and Last Position — two passes (lower_bound, upper_bound)</text>
  <text x="60" y="172" font-size="11">• 33. Search in Rotated Sorted Array — half is always sorted</text>
  <text x="60" y="192" font-size="11">• 153. Find Minimum in Rotated Sorted Array — find pivot</text>
  <text x="60" y="212" font-size="11">• 162. Find Peak Element — neighbours-monotone trick</text>
  <text x="60" y="232" font-size="11">• 4. Median of Two Sorted Arrays — partition trick (hard)</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="305" font-size="13" font-weight="700" fill="#4caf50">Parametric / answer-binary-search</text>
  <text x="60" y="330" font-size="11">• 875. Koko Eating Bananas — min hourly eat rate</text>
  <text x="60" y="350" font-size="11">• 1011. Capacity to Ship Packages in D Days</text>
  <text x="60" y="370" font-size="11">• 410. Split Array Largest Sum</text>
  <text x="60" y="390" font-size="11">• 1283. Find the Smallest Divisor Given a Threshold</text>
  <text x="60" y="410" font-size="11">• 778. Swim in Rising Water (binary search + BFS / union-find)</text>
  <text x="60" y="430" font-size="11">• 1631. Path with Minimum Effort (binary search + BFS)</text>
  <text x="60" y="455" font-size="11" fill="#4caf50" font-weight="700">Recognition: monotone predicate over an integer or real range.</text>
</svg>
