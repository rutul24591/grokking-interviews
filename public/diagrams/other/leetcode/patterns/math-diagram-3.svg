<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Canonical Math Leetcode Problems</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Number theory and digit manipulation</text>
  <text x="60" y="115" font-size="11">• 7. Reverse Integer — overflow handling on 32-bit boundary</text>
  <text x="60" y="135" font-size="11">• 9. Palindrome Number — without converting to string</text>
  <text x="60" y="155" font-size="11">• 50. Pow(x, n) — fast exponentiation, handle negative exponent</text>
  <text x="60" y="175" font-size="11">• 204. Count Primes — sieve of Eratosthenes</text>
  <text x="60" y="195" font-size="11">• 263 / 264. Ugly Number / II — factorisation by 2, 3, 5</text>
  <text x="60" y="225" font-size="11">• 172. Factorial Trailing Zeroes — count factors of 5</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">Combinatorics, geometry, randomisation</text>
  <text x="60" y="335" font-size="11">• 62. Unique Paths — combinatorics or DP</text>
  <text x="60" y="355" font-size="11">• 89. Gray Code — bit manipulation, k XOR (k &gt;&gt; 1)</text>
  <text x="60" y="375" font-size="11">• 149. Max Points on a Line — slope (dy/dx) by GCD-reduced pair</text>
  <text x="60" y="395" font-size="11">• 528. Random Pick with Weight — prefix sum + binary search</text>
  <text x="60" y="415" font-size="11">• 470. Rand10() from Rand7() — rejection sampling</text>
  <text x="60" y="435" font-size="11">• 365. Water and Jug — Bezout: solvable iff target is multiple of gcd(x, y)</text>
  <text x="60" y="465" font-size="11" fill="#4caf50" font-weight="700">Math problems reward closed-form thinking over brute force.</text>
</svg>
