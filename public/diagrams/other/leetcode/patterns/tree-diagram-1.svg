<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Tree — Recursive Decomposition</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Three traversal orders</text>
  <text x="60" y="115" font-size="11">• Pre-order (root, left, right) — clone, serialise, prefix expressions</text>
  <text x="60" y="135" font-size="11">• In-order (left, root, right) — sorted output of a BST</text>
  <text x="60" y="155" font-size="11">• Post-order (left, right, root) — bottom-up aggregation, deletion</text>
  <text x="60" y="175" font-size="11">• Level-order (queue) — distance, view, breadth concerns</text>
  <text x="60" y="205" font-size="11" font-weight="700">Two algorithmic strategies:</text>
  <text x="60" y="225" font-size="11">Top-down (carry state into recursion) vs. bottom-up (return aggregates).</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">Bottom-up template</text>
  <text x="60" y="335" font-size="11" font-family="monospace">def helper(node):</text>
  <text x="60" y="355" font-size="11" font-family="monospace">  if node is null: return base case</text>
  <text x="60" y="375" font-size="11" font-family="monospace">  l = helper(node.left)</text>
  <text x="60" y="395" font-size="11" font-family="monospace">  r = helper(node.right)</text>
  <text x="60" y="415" font-size="11" font-family="monospace">  combine l, r, node.val ⟹ return aggregate</text>
  <text x="60" y="450" font-size="11" fill="#4caf50" font-weight="700">Most tree problems map to one of: pre, in, post, level, or bottom-up combine.</text>
</svg>
