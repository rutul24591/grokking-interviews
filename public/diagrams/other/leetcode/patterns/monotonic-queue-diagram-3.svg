<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Canonical Monotonic-Queue Leetcode Problems</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Sliding window aggregation</text>
  <text x="60" y="115" font-size="11">• 239. Sliding Window Maximum — base template</text>
  <text x="60" y="135" font-size="11">• 1438. Longest Subarray with Absolute Diff &lt;= Limit — two deques (max + min)</text>
  <text x="60" y="155" font-size="11">• 862. Shortest Subarray with Sum at Least K — prefix sum + monotonic deque</text>
  <text x="60" y="175" font-size="11">• 918. Maximum Sum Circular Subarray — Kadane + min-deque</text>
  <text x="60" y="195" font-size="11">• 1696. Jump Game VI — DP + monotonic queue</text>
  <text x="60" y="225" font-size="11">• 1499. Max Value of Equation — deque on (y − x) form</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">Where it shows up</text>
  <text x="60" y="335" font-size="11">• Sliding-window max / min — the namesake</text>
  <text x="60" y="355" font-size="11">• DP transitions where dp[i] = best of dp[i − k..i − 1] + a[i]</text>
  <text x="60" y="375" font-size="11">• Constraint-bounded subarrays (max − min &lt;= limit)</text>
  <text x="60" y="395" font-size="11">• Prefix-sum subarray queries with bounded length</text>
  <text x="60" y="415" font-size="11">• Anywhere a sliding-min / max is needed in O(n) without log overhead</text>
  <text x="60" y="450" font-size="11" fill="#4caf50" font-weight="700">If you reach for a heap inside a sliding window, try a monotonic deque first.</text>
</svg>
