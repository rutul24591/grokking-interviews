<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Queue Variants</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Variants</text>
  <text x="60" y="115" font-size="11">• Deque (double-ended) — push / pop at both ends. Sliding window, palindrome checks.</text>
  <text x="60" y="135" font-size="11">• Monotonic queue — deque with order invariant. Sliding-window max / min in O(n).</text>
  <text x="60" y="155" font-size="11">• Priority queue (heap) — order by priority, not insertion time. Dijkstra, top-k.</text>
  <text x="60" y="175" font-size="11">• Circular buffer — fixed-size queue with wrap-around indices. Cache-friendly.</text>
  <text x="60" y="195" font-size="11">• Two-stack queue — amortised O(1) per op using LIFO substrate.</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">Level-order tree traversal</text>
  <text x="60" y="335" font-size="11" font-family="monospace">queue = [root]; result = []</text>
  <text x="60" y="355" font-size="11" font-family="monospace">while queue:</text>
  <text x="60" y="375" font-size="11" font-family="monospace">  level_size = len(queue); level = []</text>
  <text x="60" y="395" font-size="11" font-family="monospace">  for _ in range(level_size):</text>
  <text x="60" y="415" font-size="11" font-family="monospace">    n = queue.pop_front(); level.append(n.val)</text>
  <text x="60" y="435" font-size="11" font-family="monospace">    push children if non-null</text>
  <text x="60" y="465" font-size="11" fill="#4caf50" font-weight="700">Snapshotting len(queue) per iteration delineates levels cleanly.</text>
</svg>
