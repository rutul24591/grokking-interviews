<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Monotonic Queue — Sliding Window Max in O(n)</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Definition</text>
  <text x="60" y="115" font-size="11">A deque maintained in monotone order (decreasing for max, increasing for min).</text>
  <text x="60" y="135" font-size="11">On push back: evict back-elements that violate the order.</text>
  <text x="60" y="155" font-size="11">On window slide: evict front-element if its index falls out of the window.</text>
  <text x="60" y="180" font-size="11" font-weight="700">Invariant:</text>
  <text x="60" y="200" font-size="11">Front is always the maximum (or minimum) of the current window.</text>
  <text x="60" y="225" font-size="11">Each element pushed once, popped once ⟹ O(n) total.</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">Sliding window maximum template</text>
  <text x="60" y="335" font-size="11" font-family="monospace">deque of indices, A-values decreasing from front to back:</text>
  <text x="60" y="355" font-size="11" font-family="monospace">for i in 0..n − 1:</text>
  <text x="60" y="375" font-size="11" font-family="monospace">  while deque non-empty and A[deque.back()] &lt;= A[i]: deque.pop_back()</text>
  <text x="60" y="395" font-size="11" font-family="monospace">  deque.push_back(i)</text>
  <text x="60" y="415" font-size="11" font-family="monospace">  if deque.front() &lt;= i − k: deque.pop_front()</text>
  <text x="60" y="435" font-size="11" font-family="monospace">  if i &gt;= k − 1: result.append(A[deque.front()])</text>
  <text x="60" y="465" font-size="11" fill="#4caf50" font-weight="700">Recognition: max / min in a sliding window of fixed or variable size.</text>
</svg>
