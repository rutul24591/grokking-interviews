<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Largest Rectangle in Histogram — Walkthrough</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Idea</text>
  <text x="60" y="115" font-size="11">Each bar is the smallest in some maximal rectangle. The width is bounded by</text>
  <text x="60" y="135" font-size="11">the previous-smaller index on the left and the next-smaller index on the right.</text>
  <text x="60" y="160" font-size="11" font-weight="700">Algorithm:</text>
  <text x="60" y="180" font-size="11">Maintain stack of indices with strictly increasing heights.</text>
  <text x="60" y="200" font-size="11">When the next bar breaks the order, pop and compute area = h * (i − stack.top() − 1).</text>
  <text x="60" y="225" font-size="11">After the input ends, treat sentinel height 0 to flush the stack.</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">Trace: heights = [2, 1, 5, 6, 2, 3]</text>
  <text x="60" y="335" font-size="11" font-family="monospace">i=0 push 0          stack=[0]</text>
  <text x="60" y="355" font-size="11" font-family="monospace">i=1 pop 0 area 2*1  stack=[1]</text>
  <text x="60" y="375" font-size="11" font-family="monospace">i=2,3 push          stack=[1,2,3]</text>
  <text x="60" y="395" font-size="11" font-family="monospace">i=4 pop 3 area 6*1; pop 2 area 5*2  stack=[1,4]</text>
  <text x="60" y="415" font-size="11" font-family="monospace">i=5 push            stack=[1,4,5]</text>
  <text x="60" y="435" font-size="11" font-family="monospace">flush: pop 5 (3*1), pop 4 (2*4), pop 1 (1*6=6) — answer = 10</text>
  <text x="60" y="465" font-size="11" fill="#4caf50" font-weight="700">Each index pushed and popped once ⟹ O(n).</text>
</svg>
