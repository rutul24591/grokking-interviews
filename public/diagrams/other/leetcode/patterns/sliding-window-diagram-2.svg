<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Sliding-Window Templates</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">Variable window — longest with property P</text>
  <text x="60" y="112" font-size="11" font-family="monospace">L = 0; best = 0; state = empty</text>
  <text x="60" y="132" font-size="11" font-family="monospace">for R in 0..n-1:</text>
  <text x="60" y="152" font-size="11" font-family="monospace">  add A[R] to state</text>
  <text x="60" y="172" font-size="11" font-family="monospace">  while not P(state):</text>
  <text x="60" y="192" font-size="11" font-family="monospace">    remove A[L] from state; L += 1</text>
  <text x="60" y="212" font-size="11" font-family="monospace">  best = max(best, R - L + 1)</text>
  <text x="60" y="240" font-size="11" font-weight="700">Window contents always satisfy P. R moves n times; L moves ≤ n times — total O(n).</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="305" font-size="13" font-weight="700" fill="#4caf50">Variable window — shortest with property Q</text>
  <text x="60" y="330" font-size="11" font-family="monospace">L = 0; best = ∞; state = empty</text>
  <text x="60" y="350" font-size="11" font-family="monospace">for R in 0..n-1:</text>
  <text x="60" y="370" font-size="11" font-family="monospace">  add A[R] to state</text>
  <text x="60" y="390" font-size="11" font-family="monospace">  while Q(state):                  # window still valid</text>
  <text x="60" y="410" font-size="11" font-family="monospace">    best = min(best, R - L + 1); remove A[L]; L += 1</text>
  <text x="60" y="445" font-size="11" fill="#cc4444" font-weight="700">Trap: order of &quot;record best&quot; vs &quot;shrink&quot; differs between longest and shortest forms.</text>
</svg>
