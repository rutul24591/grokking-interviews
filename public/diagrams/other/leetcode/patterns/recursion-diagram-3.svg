<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Canonical Recursion Leetcode Problems</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Pure recursion</text>
  <text x="60" y="115" font-size="11">• 509. Fibonacci Number — direct recursion or DP</text>
  <text x="60" y="135" font-size="11">• 70. Climbing Stairs — recursion + memoisation = Fibonacci</text>
  <text x="60" y="155" font-size="11">• 779. K-th Symbol in Grammar — recursive parity</text>
  <text x="60" y="175" font-size="11">• 50. Pow(x, n) — divide-and-conquer recursion</text>
  <text x="60" y="195" font-size="11">• 24. Swap Nodes in Pairs — pair-wise list recursion</text>
  <text x="60" y="225" font-size="11">• 206. Reverse Linked List — recursion or iteration</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">Recursion as substrate</text>
  <text x="60" y="335" font-size="11">• 104. Maximum Depth of Binary Tree — DFS post-order</text>
  <text x="60" y="355" font-size="11">• 226. Invert Binary Tree — recurse left and right, swap</text>
  <text x="60" y="375" font-size="11">• 110. Balanced Binary Tree — recursive height + balance check</text>
  <text x="60" y="395" font-size="11">• 124. Binary Tree Maximum Path Sum — recursive with shared state</text>
  <text x="60" y="415" font-size="11">• 95. Unique Binary Search Trees II — recursive enumeration</text>
  <text x="60" y="435" font-size="11">• 322. Coin Change — top-down memoised recursion (DP)</text>
  <text x="60" y="465" font-size="11" fill="#4caf50" font-weight="700">Recursion is the default for trees, divide-and-conquer, and induction.</text>
</svg>
