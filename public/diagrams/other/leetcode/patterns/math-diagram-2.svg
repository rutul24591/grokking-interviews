<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Modular Arithmetic and Fast Exponentiation</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Modular identities</text>
  <text x="60" y="115" font-size="11">(a + b) mod m = ((a mod m) + (b mod m)) mod m</text>
  <text x="60" y="135" font-size="11">(a * b) mod m = ((a mod m) * (b mod m)) mod m</text>
  <text x="60" y="155" font-size="11">(a^n) mod m via fast exponentiation</text>
  <text x="60" y="175" font-size="11">Subtraction: ((a - b) mod m + m) mod m to keep result non-negative</text>
  <text x="60" y="200" font-size="11">Division: multiply by modular inverse — only when m is prime (Fermat) or coprime</text>
  <text x="60" y="225" font-size="11">Modulus 1e9+7 is the standard for counting problems — fits in 64-bit multiplications.</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">Fast power — O(log n)</text>
  <text x="60" y="335" font-size="11">power(base, exp, mod):</text>
  <text x="60" y="355" font-size="11">  result = 1; base = base mod mod</text>
  <text x="60" y="375" font-size="11">  while exp &gt; 0:</text>
  <text x="60" y="395" font-size="11">    if exp is odd: result = (result * base) mod mod</text>
  <text x="60" y="415" font-size="11">    base = (base * base) mod mod</text>
  <text x="60" y="435" font-size="11">    exp = exp / 2 (integer division)</text>
  <text x="60" y="465" font-size="11" fill="#4caf50" font-weight="700">Modular inverse: power(a, m-2, m) when m is prime.</text>
</svg>
