<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Prefix Sum — Range Queries in O(1)</text>

  <rect x="40" y="60" width="820" height="180" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Definition</text>
  <text x="60" y="115" font-size="11">Given array A of length n, define P[0] = 0 and P[i] = A[0] + A[1] + ... + A[i − 1].</text>
  <text x="60" y="135" font-size="11">P has length n + 1. Compute it once in O(n) with a single forward pass.</text>
  <text x="60" y="160" font-size="11" font-weight="700">Range-sum identity:</text>
  <text x="60" y="180" font-size="11">sum(A[l..r]) = P[r + 1] − P[l]</text>
  <text x="60" y="210" font-size="11">After the O(n) preprocessing, every range-sum query is answered in O(1).</text>

  <rect x="40" y="260" width="820" height="215" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="288" font-size="13" font-weight="700" fill="#4caf50">Worked example</text>
  <text x="60" y="315" font-size="11" font-family="monospace">A   = [ 3,  1,  4,  1,  5,  9,  2,  6 ]</text>
  <text x="60" y="335" font-size="11" font-family="monospace">P   = [ 0,  3,  4,  8,  9, 14, 23, 25, 31 ]</text>
  <text x="60" y="365" font-size="11">sum(A[2..5]) = 4 + 1 + 5 + 9 = 19   →   P[6] − P[2] = 23 − 4 = 19 ✓</text>
  <text x="60" y="395" font-size="11">Use the (n + 1)-length convention so empty prefix P[0] = 0 makes the formula uniform —</text>
  <text x="60" y="415" font-size="11">no special case for queries that start at index 0.</text>
  <text x="60" y="450" font-size="11" fill="#4caf50" font-weight="700">Recognition: many range-sum queries on a static array ⟹ build P once, query in O(1).</text>
</svg>
