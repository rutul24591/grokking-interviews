<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Stack Variants and Pairings</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Two-stack patterns</text>
  <text x="60" y="115" font-size="11">• Min-stack — pair every value with the running min</text>
  <text x="60" y="135" font-size="11">• Queue from two stacks — in-stack and out-stack, lazy transfer</text>
  <text x="60" y="155" font-size="11">• Expression evaluation — values stack and operators stack</text>
  <text x="60" y="175" font-size="11">• Stock-span / nearest-greater — monotonic stack (separate article)</text>
  <text x="60" y="195" font-size="11">• Backtracking iteration — frame stack of (state, next-choice-index)</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">Iterative DFS template</text>
  <text x="60" y="335" font-size="11">push initial node onto stack</text>
  <text x="60" y="355" font-size="11">while stack non-empty:</text>
  <text x="60" y="375" font-size="11">  pop u; if visited continue; mark visited; process u</text>
  <text x="60" y="395" font-size="11">  push neighbours of u in reverse desired order</text>
  <text x="60" y="425" font-size="11">Pre-order = push children right-to-left. Post-order = mark-on-second-visit.</text>
  <text x="60" y="455" font-size="11" fill="#4caf50" font-weight="700">Same recursion, explicit frame — avoids stack-overflow on deep trees.</text>
</svg>
