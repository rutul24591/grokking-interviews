<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Queue — FIFO and Its Algorithmic Roles</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">When a queue fits</text>
  <text x="60" y="115" font-size="11">• Breadth-first search — explore by distance, level by level</text>
  <text x="60" y="135" font-size="11">• Level-order tree traversal — visit by depth</text>
  <text x="60" y="155" font-size="11">• Topological sort (Kahn) — process zero-indegree nodes</text>
  <text x="60" y="175" font-size="11">• Sliding window aggregation — deque (with monotonic discipline)</text>
  <text x="60" y="195" font-size="11">• Producer / consumer scheduling — task buffering</text>
  <text x="60" y="225" font-size="11" font-weight="700">Operations: enqueue (push back), dequeue (pop front), peek front — all O(1).</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">BFS template</text>
  <text x="60" y="335" font-size="11" font-family="monospace">queue.push(start); visited.add(start)</text>
  <text x="60" y="355" font-size="11" font-family="monospace">while queue non-empty:</text>
  <text x="60" y="375" font-size="11" font-family="monospace">  u = queue.pop_front(); process(u)</text>
  <text x="60" y="395" font-size="11" font-family="monospace">  for v in neighbours(u):</text>
  <text x="60" y="415" font-size="11" font-family="monospace">    if v not visited: visited.add(v); queue.push(v)</text>
  <text x="60" y="450" font-size="11" fill="#4caf50" font-weight="700">FIFO ⟹ shortest path on unweighted graph (each edge weight 1).</text>
</svg>
