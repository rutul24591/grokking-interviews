<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Sub-Range Reversal and k-Group</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="88" font-size="13" font-weight="700" fill="#6d5bd0">Reverse between m and n (92)</text>
  <text x="60" y="115" font-size="11">Use a dummy head. Walk prev to position m − 1.</text>
  <text x="60" y="135" font-size="11">Then reverse the next n − m + 1 nodes using the triple-step,</text>
  <text x="60" y="155" font-size="11">tracking the original sub-list head as connector for the right boundary.</text>
  <text x="60" y="180" font-size="11" font-weight="700">After reversal:</text>
  <text x="60" y="200" font-size="11">prev_outer.next.next = next_outer  // tail of reversed sub-list</text>
  <text x="60" y="220" font-size="11">prev_outer.next = new_head_of_reversed_sub_list</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="308" font-size="13" font-weight="700" fill="#4caf50">Reverse in groups of k (25)</text>
  <text x="60" y="335" font-size="11">Repeat: count k nodes from current position. If fewer than k remain, leave as-is.</text>
  <text x="60" y="355" font-size="11">Otherwise reverse the k-block using the triple-step;</text>
  <text x="60" y="375" font-size="11">connect previous block&apos;s tail to new k-block head;</text>
  <text x="60" y="395" font-size="11">advance to next block.</text>
  <text x="60" y="425" font-size="11">Total work O(n). The reversal block is O(k); n / k blocks ⟹ O(n).</text>
  <text x="60" y="460" font-size="11" fill="#4caf50" font-weight="700">All sub-range / group variants are wrappers around the triple-step core.</text>
</svg>
