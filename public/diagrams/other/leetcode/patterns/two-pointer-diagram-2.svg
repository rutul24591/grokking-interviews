<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Two-Pointer Templates &amp; Decision Flow</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">Convergent template (sorted-array sum)</text>
  <text x="60" y="112" font-size="11">  L = 0; R = n - 1</text>
  <text x="60" y="132" font-size="11">  while L &lt; R:</text>
  <text x="60" y="152" font-size="11">    s = A[L] + A[R]</text>
  <text x="60" y="172" font-size="11">    if s == target: record; L++; R--; skip duplicates</text>
  <text x="60" y="192" font-size="11">    elif s &lt; target: L++</text>
  <text x="60" y="212" font-size="11">    else: R--</text>
  <text x="60" y="240" font-size="11" font-weight="700">Why monotone choice is safe: if s &lt; target, every pair (L, k&lt;R) has even smaller sum.</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="305" font-size="13" font-weight="700" fill="#4caf50">Recognition signals</text>
  <text x="60" y="330" font-size="11">• Sorted array + pair / triple condition → convergent two-pointer</text>
  <text x="60" y="350" font-size="11">• In-place compaction, partition, dedup → parallel two-pointer (slow/fast)</text>
  <text x="60" y="370" font-size="11">• Palindrome / mirror check → convergent on string</text>
  <text x="60" y="390" font-size="11">• &quot;Find longest / smallest subarray with property X&quot; → sliding-window (related)</text>
  <text x="60" y="410" font-size="11">• Cycle / midpoint of linked list → fast &amp; slow pointers (Floyd)</text>
  <text x="60" y="445" font-size="11" fill="#cc4444" font-weight="700">Anti-pattern: don&apos;t use two-pointer on unsorted arrays unless you sort first (and order doesn&apos;t matter).</text>
</svg>
