<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
    .axis { stroke: #333333; stroke-width: 1; }
    .dark .axis { stroke: #cccccc; }
    .grid { stroke: #e5e7eb; stroke-width: 0.5; }
    .dark .grid { stroke: #333355; }
    .dot-closed { fill: #7c3aed; }
    .dot-open { fill: #2563eb; }
    .dot-moe { fill: #059669; }
    .region-1 { fill: #ede9fe; opacity: 0.3; }
    .dark .region-1 { fill: #2e1065; opacity: 0.4; }
    .region-2 { fill: #dbeafe; opacity: 0.3; }
    .dark .region-2 { fill: #1e3a5f; opacity: 0.4; }
    .region-3 { fill: #d1fae5; opacity: 0.3; }
    .dark .region-3 { fill: #064e3b; opacity: 0.4; }
    .legend-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 400; fill: #333333; }
    .dark .legend-text { fill: #cccccc; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">LLM Model Selection Trade-offs</text>

  <!-- Axes -->
  <line class="axis" x1="80" y1="420" x2="820" y2="420"/>
  <line class="axis" x1="80" y1="70" x2="80" y2="420"/>
  <text class="label" x="450" y="470" text-anchor="middle">Capability / Reasoning Quality</text>
  <text class="label" x="30" y="250" text-anchor="middle" transform="rotate(-90,30,250)">Cost &amp; Complexity</text>

  <!-- Grid lines -->
  <line class="grid" x1="80" y1="330" x2="820" y2="330"/>
  <line class="grid" x1="80" y1="240" x2="820" y2="240"/>
  <line class="grid" x1="80" y1="150" x2="820" y2="150"/>
  <line class="grid" x1="265" y1="70" x2="265" y2="420"/>
  <line class="grid" x1="450" y1="70" x2="450" y2="420"/>
  <line class="grid" x1="635" y1="70" x2="635" y2="420"/>

  <!-- Y-axis labels -->
  <text class="sublabel" x="70" y="425" text-anchor="end">Low</text>
  <text class="sublabel" x="70" y="335" text-anchor="end">Medium</text>
  <text class="sublabel" x="70" y="245" text-anchor="end">High</text>
  <text class="sublabel" x="70" y="155" text-anchor="end">Very High</text>

  <!-- X-axis labels -->
  <text class="sublabel" x="170" y="445" text-anchor="middle">Basic Tasks</text>
  <text class="sublabel" x="355" y="445" text-anchor="middle">Moderate</text>
  <text class="sublabel" x="540" y="445" text-anchor="middle">Complex</text>
  <text class="sublabel" x="725" y="445" text-anchor="middle">State-of-the-Art</text>

  <!-- Region 1: Small/Cheap models -->
  <rect class="region-1" x="100" y="300" width="200" height="110" rx="12"/>
  <text class="label" x="200" y="330" text-anchor="middle">Small Models (7-13B)</text>
  <text class="sublabel" x="200" y="350" text-anchor="middle">Classification, extraction</text>
  <text class="sublabel" x="200" y="368" text-anchor="middle">Self-hostable, low cost</text>
  <text class="sublabel" x="200" y="386" text-anchor="middle">Fast inference, low latency</text>

  <!-- Region 2: Mid-tier models -->
  <rect class="region-2" x="300" y="200" width="230" height="140" rx="12"/>
  <text class="label" x="415" y="230" text-anchor="middle">Mid-Tier Models (70-175B)</text>
  <text class="sublabel" x="415" y="250" text-anchor="middle">Summarization, analysis</text>
  <text class="sublabel" x="415" y="268" text-anchor="middle">Balanced cost/performance</text>
  <text class="sublabel" x="415" y="286" text-anchor="middle">API or self-hosted</text>
  <text class="sublabel" x="415" y="304" text-anchor="middle">Moderate reasoning ability</text>

  <!-- Region 3: Large models -->
  <rect class="region-3" x="540" y="100" width="260" height="180" rx="12"/>
  <text class="label" x="670" y="130" text-anchor="middle">Frontier Models (SOTA)</text>
  <text class="sublabel" x="670" y="150" text-anchor="middle">Complex reasoning, coding</text>
  <text class="sublabel" x="670" y="168" text-anchor="middle">API only, high cost</text>
  <text class="sublabel" x="670" y="186" text-anchor="middle">Best capability &amp; safety</text>
  <text class="sublabel" x="670" y="204" text-anchor="middle">Vendor lock-in risk</text>
  <text class="sublabel" x="670" y="222" text-anchor="middle">Rate limits apply</text>

  <!-- Model dots -->
  <circle class="dot-open" cx="180" cy="360" r="8"/>
  <text class="legend-text" x="180" y="385" text-anchor="middle">Llama 3 8B</text>

  <circle class="dot-open" cx="240" cy="340" r="8"/>
  <text class="legend-text" x="240" y="365" text-anchor="middle">Mistral 7B</text>

  <circle class="dot-moe" cx="370" cy="290" r="8"/>
  <text class="legend-text" x="370" y="315" text-anchor="middle">Mixtral 8x7B</text>

  <circle class="dot-closed" cx="480" cy="250" r="8"/>
  <text class="legend-text" x="480" y="275" text-anchor="middle">Claude Sonnet</text>

  <circle class="dot-closed" cx="650" cy="160" r="8"/>
  <text class="legend-text" x="650" y="185" text-anchor="middle">GPT-4 / Claude Opus</text>

  <!-- Legend -->
  <rect x="620" y="340" width="260" height="100" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="750" y="365" text-anchor="middle">Legend</text>
  <circle class="dot-open" cx="650" cy="390" r="6"/>
  <text class="legend-text" x="665" y="394">Open-weight (self-hostable)</text>
  <circle class="dot-closed" cx="650" cy="415" r="6"/>
  <text class="legend-text" x="665" y="419">Closed (API only)</text>
  <circle class="dot-moe" cx="650" cy="440" r="6"/>
  <text class="legend-text" x="665" y="444">Mixture-of-Experts</text>
</svg>