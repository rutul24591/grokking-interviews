<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 8; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .s-single { stroke: #7c3aed; }
    .dark .s-single { fill: #2e1065; stroke: #a78bfa; }
    .s-multi { stroke: #059669; }
    .dark .s-multi { fill: #064e3b; stroke: #34d399; }
    .s-hier { stroke: #2563eb; }
    .dark .s-hier { fill: #1e3a5f; stroke: #60a5fa; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Skill Routing Strategies</text>

  <!-- Single Agent -->
  <text class="label" x="150" y="80" text-anchor="middle" fill="#7c3aed">Single-Agent Selection</text>
  <rect class="box s-single" x="50" y="100" width="200" height="150"/>
  <text class="label" x="150" y="125" text-anchor="middle">Agent</text>
  <rect class="detail-box" x="65" y="140" width="170" height="95"/>
  <text class="sublabel" x="75" y="158">Skills: [A, B, C, D, E]</text>
  <text class="sublabel" x="75" y="176">Request: "Do X"</text>
  <text class="sublabel" x="75" y="194">LLM selects: B</text>
  <text class="sublabel" x="75" y="212">Executes: B</text>
  <text class="sublabel" x="75" y="230">Returns: result</text>

  <text class="sublabel" x="150" y="280" text-anchor="middle">Simple, fast, but limited to ~15 skills</text>

  <!-- Multi-Agent -->
  <text class="label" x="450" y="80" text-anchor="middle" fill="#059669">Multi-Agent Delegation</text>
  <rect class="box s-multi" x="340" y="100" width="220" height="60"/>
  <text class="label" x="450" y="120" text-anchor="middle">Router Agent</text>
  <rect class="detail-box" x="355" y="130" width="190" height="20"/>
  <text class="sublabel" x="365" y="144">Classifies request, picks agent</text>

  <path class="arrow" d="M450 160 L450 195"/>
  <polygon points="450,195 445,185 455,185" fill="#6366f1"/>

  <rect class="box s-multi" x="340" y="200" width="70" height="50"/>
  <text class="sublabel" x="375" y="220" text-anchor="middle">Agent A</text>
  <text class="sublabel" x="375" y="235" text-anchor="middle">[A,B]</text>

  <rect class="box s-multi" x="415" y="200" width="70" height="50"/>
  <text class="sublabel" x="450" y="220" text-anchor="middle">Agent B</text>
  <text class="sublabel" x="450" y="235" text-anchor="middle">[C,D]</text>

  <rect class="box s-multi" x="490" y="200" width="70" height="50"/>
  <text class="sublabel" x="525" y="220" text-anchor="middle">Agent C</text>
  <text class="sublabel" x="525" y="235" text-anchor="middle">[E,F]</text>

  <text class="sublabel" x="450" y="280" text-anchor="middle">Scalable, parallel, but coordination overhead</text>

  <!-- Hierarchical -->
  <text class="label" x="750" y="80" text-anchor="middle" fill="#2563eb">Hierarchical Routing</text>
  <rect class="box s-hier" x="650" y="100" width="200" height="50"/>
  <text class="label" x="750" y="120" text-anchor="middle">Supervisor</text>
  <rect class="detail-box" x="665" y="125" width="170" height="18"/>
  <text class="sublabel" x="675" y="138">Selects category first</text>

  <path class="arrow" d="M750 150 L750 180"/>
  <polygon points="750,180 745,170 755,170" fill="#6366f1"/>

  <rect class="box s-hier" x="650" y="185" width="90" height="45"/>
  <text class="sublabel" x="695" y="203" text-anchor="middle">Category 1</text>
  <text class="sublabel" x="695" y="218" text-anchor="middle">[Skills A,B,C]</text>

  <rect class="box s-hier" x="750" y="185" width="90" height="45"/>
  <text class="sublabel" x="795" y="203" text-anchor="middle">Category 2</text>
  <text class="sublabel" x="795" y="218" text-anchor="middle">[Skills D,E,F]</text>

  <path class="arrow" d="M750 230 L750 260"/>
  <polygon points="750,260 745,250 755,250" fill="#6366f1"/>

  <rect class="box s-hier" x="670" y="265" width="160" height="25"/>
  <text class="sublabel" x="750" y="282" text-anchor="middle">Selects skill within category</text>

  <text class="sublabel" x="750" y="320" text-anchor="middle">Two-stage: scales to 50+ skills</text>

  <!-- Comparison at bottom -->
  <rect x="30" y="360" width="840" height="120" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="450" y="385" text-anchor="middle">Strategy Comparison</text>

  <text class="sublabel" x="50" y="408"><tspan font-weight="700">Single-Agent:</tspan> Best for 5-15 skills. Simple to implement, easy to debug. No coordination overhead. Degrades with more skills.</text>
  <text class="sublabel" x="50" y="428"><tspan font-weight="700">Multi-Agent:</tspan> Best for 20-50+ skills. Each agent specializes in a domain. Enables parallel execution. Adds routing complexity and latency.</text>
  <text class="sublabel" x="50" y="448"><tspan font-weight="700">Hierarchical:</tspan> Best for 30-100+ skills. Two-stage selection keeps per-stage options manageable. Scales gracefully. Requires category design.</text>
  <text class="sublabel" x="50" y="468"><tspan font-weight="700">Recommendation:</tspan> Start single-agent, move to hierarchical when skill count exceeds 15, consider multi-agent when parallel execution provides meaningful speedup.</text>
</svg>