<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 1.5; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Embedding Training Pipeline — Contrastive Learning</text>

  <!-- Training data -->
  <rect class="box" x="30" y="80" width="180" height="90"/>
  <text class="label" x="120" y="105" text-anchor="middle">Training Data</text>
  <rect class="detail-box" x="45" y="115" width="150" height="40"/>
  <text class="sublabel" x="55" y="133">Query-document pairs</text>
  <text class="sublabel" x="55" y="148">(query, positive, negatives)</text>

  <path class="arrow" d="M210 125 L250 125"/>

  <!-- Encoder -->
  <rect class="box" x="260" y="80" width="180" height="90"/>
  <text class="label" x="350" y="105" text-anchor="middle">Encoder (BERT)</text>
  <rect class="detail-box" x="275" y="115" width="150" height="40"/>
  <text class="sublabel" x="285" y="133">Shared encoder for all inputs</text>
  <text class="sublabel" x="285" y="148">Output: d-dimensional vector</text>

  <path class="arrow" d="M440 125 L480 125"/>

  <!-- Embeddings -->
  <rect class="box" x="490" y="70" width="120" height="50"/>
  <text class="label" x="550" y="90" text-anchor="middle" fill="#7c3aed">Query Vector</text>
  <rect class="box" x="490" y="130" width="120" height="50"/>
  <text class="label" x="550" y="150" text-anchor="middle" fill="#059669">Positive Vector</text>
  <rect class="box" x="640" y="100" width="120" height="50"/>
  <text class="label" x="700" y="120" text-anchor="middle" fill="#dc2626">Negative Vectors</text>

  <!-- Loss computation -->
  <path d="M610 95 L630 100" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <path d="M610 155 L630 125" fill="none" stroke="#6366f1" stroke-width="1.5"/>

  <rect class="box" x="630" y="200" width="240" height="80" stroke="#d97706"/>
  <text class="label" x="750" y="225" text-anchor="middle" fill="#d97706">InfoNCE Loss</text>
  <rect class="detail-box" x="645" y="235" width="210" height="35"/>
  <text class="sublabel" x="655" y="253">Maximize: sim(query, positive)</text>
  <text class="sublabel" x="655" y="268">Minimize: sim(query, negative_i)</text>

  <!-- Optimization -->
  <path class="arrow" d="M750 280 L750 330"/>

  <rect class="box" x="630" y="335" width="240" height="80" stroke="#2563eb"/>
  <text class="label" x="750" y="360" text-anchor="middle" fill="#2563eb">Gradient Descent</text>
  <rect class="detail-box" x="645" y="370" width="210" height="35"/>
  <text class="sublabel" x="655" y="388">Update encoder weights</text>
  <text class="sublabel" x="655" y="403">Repeat for all training pairs</text>

  <!-- Hard negative mining -->
  <rect x="30" y="220" width="400" height="260" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="230" y="245" text-anchor="middle">Hard Negative Mining</text>
  <text class="sublabel" x="50" y="270">Easy negatives: random documents (already far from query)</text>
  <text class="sublabel" x="50" y="290">Hard negatives: documents that look similar but aren't relevant</text>
  <text class="sublabel" x="50" y="310">• Same topic but different intent</text>
  <text class="sublabel" x="50" y="328">• Shared keywords but different meaning</text>
  <text class="sublabel" x="50" y="348">Hard negatives force the model to learn</text>
  <text class="sublabel" x="50" y="366">fine-grained semantic distinctions</text>
  <text class="sublabel" x="50" y="388">Strategy: mine negatives that score high</text>
  <text class="sublabel" x="50" y="406">under current model but are labeled negative</text>
  <text class="sublabel" x="50" y="430" font-weight="700">In-batch negatives: use other queries' positives as negatives</text>
  <text class="sublabel" x="50" y="450" font-weight="700">Cross-batch negatives: maintain a queue of recent embeddings</text>
  <text class="sublabel" x="50" y="470" font-weight="700">BM25 negatives: top BM25 results that aren't labeled positive</text>

  <!-- Training loop -->
  <path d="M630 375 L480 375 L480 125 L440 125" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3"/>
  <text class="sublabel" x="555" y="370" text-anchor="middle" fill="#6366f1" font-weight="700">Training Loop</text>
</svg>