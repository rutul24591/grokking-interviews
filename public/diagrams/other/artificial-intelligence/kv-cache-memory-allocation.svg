<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 1.5; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">KV Cache Memory Allocation — The Hidden GPU Memory Consumer</text>

  <!-- GPU Memory breakdown -->
  <rect x="30" y="70" width="400" height="400" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="230" y="95" text-anchor="middle">GPU Memory Breakdown (A100 80GB)</text>

  <!-- Model weights -->
  <rect x="50" y="110" width="360" height="100" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text class="sublabel" x="70" y="135" font-weight="700" fill="#7c3aed">Model Weights (FP16)</text>
  <text class="sublabel" x="70" y="155">70B params × 2 bytes = 140 GB</text>
  <text class="sublabel" x="70" y="175">Requires: 2x A100 (tensor parallelism)</text>
  <text class="sublabel" x="70" y="195">Or: 1x A100 with INT4 (35 GB)</text>
  <rect x="50" y="110" width="360" height="100" rx="4" fill="#ede9fe" opacity="0.3"/>
  <text class="sublabel" x="380" y="165" text-anchor="middle" font-weight="700" font-size="14">140 GB</text>

  <!-- KV Cache -->
  <rect x="50" y="220" width="360" height="100" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text class="sublabel" x="70" y="245" font-weight="700" fill="#2563eb">KV Cache (per concurrent request)</text>
  <text class="sublabel" x="70" y="265">2 × layers × heads × head_dim × seq_len × 2 bytes</text>
  <text class="sublabel" x="70" y="285">80 × 64 × 128 × 128K × 2 = ~33 GB per request</text>
  <text class="sublabel" x="70" y="305">With paged attention: ~20 GB per request</text>
  <rect x="50" y="220" width="360" height="100" rx="4" fill="#dbeafe" opacity="0.3"/>
  <text class="sublabel" x="380" y="275" text-anchor="middle" font-weight="700" font-size="14">20-33 GB</text>

  <!-- Activation memory -->
  <rect x="50" y="330" width="360" height="60" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text class="sublabel" x="70" y="350" font-weight="700" fill="#059669">Activation Memory (temporary)</text>
  <text class="sublabel" x="70" y="370">Intermediate tensors during forward pass</text>
  <text class="sublabel" x="70" y="385">~5-10 GB (released after computation)</text>
  <rect x="50" y="330" width="360" height="60" rx="4" fill="#d1fae5" opacity="0.3"/>
  <text class="sublabel" x="380" y="365" text-anchor="middle" font-weight="700" font-size="14">~8 GB</text>

  <!-- Capacity calculation -->
  <rect x="460" y="70" width="410" height="200" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text class="label" x="665" y="95" text-anchor="middle" fill="#dc2626">The OOM Problem</text>
  <text class="sublabel" x="480" y="120">Scenario: 70B model (INT4 = 35GB) on 1x A100 (80GB)</text>
  <text class="sublabel" x="480" y="140">Available for KV cache: 80 - 35 - 8 = 37 GB</text>
  <text class="sublabel" x="480" y="160">At 128K context: 37 / 20 = <tspan font-weight="700">1.8 concurrent requests</tspan></text>
  <text class="sublabel" x="480" y="180">At 8K context: 37 / 1.25 = <tspan font-weight="700">29 concurrent requests</tspan></text>
  <text class="sublabel" x="480" y="205" font-weight="700">Context length is the primary limiter of serving capacity!</text>
  <text class="sublabel" x="480" y="225">Long context → fewer concurrent requests → lower throughput</text>
  <text class="sublabel" x="480" y="245">Solution: PagedAttention (vLLM) reduces fragmentation by 4x</text>

  <!-- Mitigation strategies -->
  <rect x="460" y="290" width="410" height="180" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="label" x="665" y="315" text-anchor="middle" fill="#059669">KV Cache Optimization Strategies</text>

  <text class="sublabel" x="480" y="340"><tspan font-weight="700">1. PagedAttention (vLLM):</tspan> Non-contiguous memory blocks, 4x less fragmentation</text>
  <text class="sublabel" x="480" y="358"><tspan font-weight="700">2. KV Cache Quantization:</tspan> INT8 (2x savings) or INT4 (4x savings) with &lt;1% quality loss</text>
  <text class="sublabel" x="480" y="376"><tspan font-weight="700">3. Cache Eviction:</tspan> Drop least-attended tokens when memory is full (~2% quality loss)</text>
  <text class="sublabel" x="480" y="394"><tspan font-weight="700">4. Prefix Caching:</tspan> Reuse KV cache for common prefixes (system prompts, shared context)</text>
  <text class="sublabel" x="480" y="412"><tspan font-weight="700">5. Chunked Prefill:</tspan> Process long contexts in chunks to bound peak memory</text>
  <text class="sublabel" x="480" y="435" font-weight="700">Combined effect: 4-8x more concurrent requests at same context length</text>
</svg>