<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .dot { r: 5; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Embedding Vector Space</text>

  <!-- 2D projection of embedding space -->
  <text class="label" x="225" y="80" text-anchor="middle">2D Projection of Semantic Space</text>

  <!-- Axes -->
  <line x1="60" y1="420" x2="390" y2="420" stroke="#ccc" stroke-width="1"/>
  <line x1="60" y1="100" x2="60" y2="420" stroke="#ccc" stroke-width="1"/>
  <text class="sublabel" x="225" y="445" text-anchor="middle">Dimension 1</text>
  <text class="sublabel" x="25" y="260" text-anchor="middle" transform="rotate(-90,25,260)">Dimension 2</text>

  <!-- Animal cluster -->
  <circle cx="150" cy="180" r="40" fill="#7c3aed" opacity="0.1"/>
  <circle cx="140" cy="170" class="dot" fill="#7c3aed"/><text class="sublabel" x="150" y="165" fill="#7c3aed">dog</text>
  <circle cx="160" cy="190" class="dot" fill="#7c3aed"/><text class="sublabel" x="170" y="195" fill="#7c3aed">puppy</text>
  <circle cx="130" cy="200" class="dot" fill="#7c3aed"/><text class="sublabel" x="100" y="215" fill="#7c3aed">cat</text>

  <!-- Royalty cluster -->
  <circle cx="300" cy="150" r="40" fill="#2563eb" opacity="0.1"/>
  <circle cx="290" cy="140" class="dot" fill="#2563eb"/><text class="sublabel" x="280" y="135" fill="#2563eb">king</text>
  <circle cx="310" cy="160" class="dot" fill="#2563eb"/><text class="sublabel" x="320" y="165" fill="#2563eb">queen</text>
  <circle cx="280" cy="170" class="dot" fill="#2563eb"/><text class="sublabel" x="250" y="185" fill="#2563eb">prince</text>

  <!-- Furniture cluster -->
  <circle cx="200" cy="350" r="40" fill="#059669" opacity="0.1"/>
  <circle cx="190" cy="340" class="dot" fill="#059669"/><text class="sublabel" x="170" y="335" fill="#059669">table</text>
  <circle cx="210" cy="360" class="dot" fill="#059669"/><text class="sublabel" x="220" y="365" fill="#059669">chair</text>
  <circle cx="180" cy="370" class="dot" fill="#059669"/><text class="sublabel" x="140" y="385" fill="#059669">desk</text>

  <!-- Semantic direction arrow -->
  <line x1="290" y1="140" x2="310" y2="160" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text class="sublabel" x="315" y="145" fill="#dc2626" font-weight="700">gender direction</text>

  <!-- Similarity illustration -->
  <text class="label" x="650" y="80" text-anchor="middle">Cosine Similarity Examples</text>

  <rect x="480" y="100" width="380" height="380" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <text class="sublabel" x="500" y="130"><tspan font-weight="700">king ↔ queen:</tspan> cos = 0.87 (very similar)</text>
  <text class="sublabel" x="500" y="155"><tspan font-weight="700">dog ↔ puppy:</tspan> cos = 0.82 (very similar)</text>
  <text class="sublabel" x="500" y="180"><tspan font-weight="700">king ↔ dog:</tspan> cos = 0.15 (somewhat related — both living)</text>
  <text class="sublabel" x="500" y="205"><tspan font-weight="700">table ↔ king:</tspan> cos = -0.05 (unrelated)</text>
  <text class="sublabel" x="500" y="230"><tspan font-weight="700">table ↔ chair:</tspan> cos = 0.78 (very similar — both furniture)</text>

  <text class="sublabel" x="500" y="270" font-weight="700">Key Properties:</text>
  <text class="sublabel" x="500" y="290">• Similar meaning → close vectors (high cosine)</text>
  <text class="sublabel" x="500" y="308">• Semantic relationships preserved as vector offsets</text>
  <text class="sublabel" x="500" y="326">• king - man + woman ≈ queen (vector arithmetic)</text>
  <text class="sublabel" x="500" y="344">• Unrelated concepts → orthogonal vectors (cos ≈ 0)</text>
  <text class="sublabel" x="500" y="362">• Opposite concepts → opposite vectors (cos ≈ -1)</text>
  <text class="sublabel" x="500" y="380">• Cosine range: -1 (opposite) to 1 (identical)</text>
  <text class="sublabel" x="500" y="400">• Threshold: &gt;0.7 = similar, &gt;0.5 = related, &lt;0.3 = unrelated</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>
</svg>