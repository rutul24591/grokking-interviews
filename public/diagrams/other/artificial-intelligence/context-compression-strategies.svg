<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .s-before { stroke: #dc2626; }
    .dark .s-before { fill: #450a0a; stroke: #f87171; }
    .s-after { stroke: #059669; }
    .dark .s-after { fill: #064e3b; stroke: #34d399; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Context Compression Strategies</text>

  <!-- Strategy 1: Summarization -->
  <text class="label" x="112" y="75" text-anchor="middle" fill="#7c3aed">Summarization</text>
  <rect x="30" y="90" width="165" height="60" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text class="sublabel" x="40" y="110">Original: 10,000 tokens</text>
  <text class="sublabel" x="40" y="128">(Full document text)</text>
  <path class="arrow" d="M112 150 L112 175"/>
  <polygon points="112,175 107,165 117,165" fill="#6366f1"/>
  <rect x="30" y="180" width="165" height="50" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="sublabel" x="40" y="200">Summary: 500 tokens</text>
  <text class="sublabel" x="40" y="218">(Key points only)</text>
  <text class="sublabel" x="112" y="250" text-anchor="middle">95% reduction, some detail loss</text>

  <!-- Strategy 2: Selective Retention -->
  <text class="label" x="337" y="75" text-anchor="middle" fill="#2563eb">Selective Retention</text>
  <rect x="240" y="90" width="195" height="70" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text class="sublabel" x="250" y="110">Doc 1 (relevance: 0.95) → KEEP</text>
  <text class="sublabel" x="250" y="128">Doc 2 (relevance: 0.82) → KEEP</text>
  <text class="sublabel" x="250" y="146">Doc 3 (relevance: 0.35) → DROP</text>
  <path class="arrow" d="M337 160 L337 185"/>
  <rect x="255" y="190" width="165" height="50" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="sublabel" x="265" y="210">Keep: 6,200 tokens</text>
  <text class="sublabel" x="265" y="228">(Only high-relevance docs)</text>
  <text class="sublabel" x="337" y="250" text-anchor="middle">Preserves quality, discards noise</text>

  <!-- Strategy 3: Embedding-based Filtering -->
  <text class="label" x="562" y="75" text-anchor="middle" fill="#059669">Embedding Filter</text>
  <rect x="460" y="90" width="205" height="70" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="sublabel" x="470" y="110">Query: "revenue Q3"</text>
  <text class="sublabel" x="470" y="128">Chunk 1: sim=0.92 → KEEP</text>
  <text class="sublabel" x="470" y="146">Chunk 2: sim=0.15 → DROP</text>
  <path class="arrow" d="M562 160 L562 185"/>
  <rect x="478" y="190" width="170" height="50" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="sublabel" x="488" y="210">Filtered: 3,400 tokens</text>
  <text class="sublabel" x="488" y="228">(Only relevant chunks)</text>
  <text class="sublabel" x="562" y="250" text-anchor="middle">Semantic filtering, fast</text>

  <!-- Strategy 4: LLM-driven Compression -->
  <text class="label" x="787" y="75" text-anchor="middle" fill="#d97706">LLM Compression</text>
  <rect x="690" y="90" width="195" height="70" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text class="sublabel" x="700" y="110">Prompt: "Extract info about"</text>
  <text class="sublabel" x="700" y="128">revenue, margins, growth"</text>
  <text class="sublabel" x="700" y="146">from this 10K token doc</text>
  <path class="arrow" d="M787 160 L787 185"/>
  <rect x="705" y="190" width="165" height="50" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="sublabel" x="715" y="210">Compressed: 800 tokens</text>
  <text class="sublabel" x="715" y="228">(Targeted extraction)</text>
  <text class="sublabel" x="787" y="250" text-anchor="middle">Best quality, costs LLM call</text>

  <!-- Comparison at bottom -->
  <rect x="20" y="290" width="860" height="190" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="450" y="315" text-anchor="middle">Strategy Comparison (10K token document → compressed)</text>

  <text class="sublabel" x="40" y="340"><tspan font-weight="700">Strategy</tspan></text>
  <text class="sublabel" x="200" y="340"><tspan font-weight="700">Output Size</tspan></text>
  <text class="sublabel" x="360" y="340"><tspan font-weight="700">Quality</tspan></text>
  <text class="sublabel" x="520" y="340"><tspan font-weight="700">Cost</tspan></text>
  <text class="sublabel" x="660" y="340"><tspan font-weight="700">Speed</tspan></text>
  <text class="sublabel" x="780" y="340"><tspan font-weight="700">Best For</tspan></text>

  <line x1="40" y1="350" x2="860" y2="350" stroke="#dee2e6" stroke-width="0.5"/>

  <text class="sublabel" x="40" y="370">Summarization</text>
  <text class="sublabel" x="200" y="370">5-10% of original</text>
  <text class="sublabel" x="360" y="370">Medium</text>
  <text class="sublabel" x="520" y="370">1 LLM call</text>
  <text class="sublabel" x="660" y="370">Medium</text>
  <text class="sublabel" x="780" y="370">General overview</text>

  <text class="sublabel" x="40" y="395">Selective</text>
  <text class="sublabel" x="200" y="395">30-60% of original</text>
  <text class="sublabel" x="360" y="395">High</text>
  <text class="sublabel" x="520" y="395">Free (scoring)</text>
  <text class="sublabel" x="660" y="395">Fast</text>
  <text class="sublabel" x="780" y="395">RAG retrieval results</text>

  <text class="sublabel" x="40" y="420">Embedding filter</text>
  <text class="sublabel" x="200" y="420">20-40% of original</text>
  <text class="sublabel" x="360" y="420">High</text>
  <text class="sublabel" x="520" y="420">Embedding API</text>
  <text class="sublabel" x="660" y="420">Fast</text>
  <text class="sublabel" x="780" y="420">Semantic relevance</text>

  <text class="sublabel" x="40" y="445">LLM compression</text>
  <text class="sublabel" x="200" y="445">5-15% of original</text>
  <text class="sublabel" x="360" y="445">Very High</text>
  <text class="sublabel" x="520" y="445">1 LLM call</text>
  <text class="sublabel" x="660" y="445">Slow</text>
  <text class="sublabel" x="780" y="445">Critical documents</text>

  <text class="sublabel" x="40" y="470" font-weight="700">Recommendation:</text>
  <text class="sublabel" x="180" y="470">Use selective retention + embedding filter for most cases. Add LLM compression for critical/high-value contexts.</text>
</svg>