<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 1.5; }
    .bar { rx: 3; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">AI Cost Tracking Architecture</text>

  <!-- Token counting -->
  <rect class="box" x="30" y="80" width="260" height="120" stroke="#7c3aed"/>
  <text class="label" x="160" y="105" text-anchor="middle" fill="#7c3aed">1. Per-Request Token Counting</text>
  <rect class="detail-box" x="45" y="115" width="230" height="70"/>
  <text class="sublabel" x="55" y="133">Input tokens: counted via model tokenizer</text>
  <text class="sublabel" x="55" y="151">Output tokens: counted from response</text>
  <text class="sublabel" x="55" y="169">Model used: gpt-4, claude-3, etc.</text>
  <text class="sublabel" x="55" y="187">Timestamp, user_id, feature_id logged</text>

  <path class="arrow" d="M290 140 L330 140"/>

  <!-- Cost calculation -->
  <rect class="box" x="340" y="80" width="260" height="120" stroke="#2563eb"/>
  <text class="label" x="470" y="105" text-anchor="middle" fill="#2563eb">2. Cost Calculation</text>
  <rect class="detail-box" x="355" y="115" width="230" height="70"/>
  <text class="sublabel" x="365" y="133">input_cost = input_tokens × price_per_1M_input</text>
  <text class="sublabel" x="365" y="151">output_cost = output_tokens × price_per_1M_output</text>
  <text class="sublabel" x="365" y="169">Pricing table updated from provider API</text>
  <text class="sublabel" x="365" y="187">Total = input_cost + output_cost</text>

  <path class="arrow" d="M600 140 L640 140"/>

  <!-- Aggregation -->
  <rect class="box" x="650" y="80" width="220" height="120" stroke="#059669"/>
  <text class="label" x="760" y="105" text-anchor="middle" fill="#059669">3. Aggregation</text>
  <rect class="detail-box" x="665" y="115" width="190" height="70"/>
  <text class="sublabel" x="675" y="133">By feature: customer_support, code_gen</text>
  <text class="sublabel" x="675" y="151">By user: per-user cost allocation</text>
  <text class="sublabel" x="675" y="169">By time: hourly, daily, monthly totals</text>
  <text class="sublabel" x="675" y="187">By model: GPT-4 vs Claude vs Llama</text>

  <!-- Cost breakdown -->
  <text class="label" x="450" y="240" text-anchor="middle">Cost Breakdown by Model (Today)</text>
  <rect class="meter-bg" x="50" y="260" width="800" height="20" fill="#e5e7eb"/>
  <rect class="bar" x="50" y="260" width="400" height="20" fill="#7c3aed"/>
  <rect class="bar" x="450" y="260" width="240" height="20" fill="#2563eb"/>
  <rect class="bar" x="690" y="260" width="80" height="20" fill="#059669"/>
  <text class="sublabel" x="250" y="275" text-anchor="middle" fill="white" font-weight="700">GPT-4: $38.40 (60%)</text>
  <text class="sublabel" x="570" y="275" text-anchor="middle" fill="white" font-weight="700">Claude: $19.20 (30%)</text>
  <text class="sublabel" x="730" y="275" text-anchor="middle" fill="white" font-weight="700">Llama: $6.40 (10%)</text>

  <!-- Alerts -->
  <text class="label" x="450" y="320" text-anchor="middle">Anomaly Detection &amp; Alerting</text>
  <rect x="50" y="340" width="380" height="140" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text class="sublabel" x="70" y="365" font-weight="700" fill="#dc2626">Alert Triggers:</text>
  <text class="sublabel" x="70" y="388">• Cost spike: 3x normal hourly rate → Page on-call</text>
  <text class="sublabel" x="70" y="406">• Budget exceeded: projected monthly &gt; $3K → Email team</text>
  <text class="sublabel" x="70" y="424">• Per-user anomaly: 10x normal usage → Rate limit user</text>
  <text class="sublabel" x="70" y="442">• Model price change: provider increases prices → Notify</text>
  <text class="sublabel" x="70" y="460">• Unexpected token growth: avg tokens/request &gt; 2x → Investigate</text>

  <rect x="460" y="340" width="390" height="140" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="sublabel" x="480" y="365" font-weight="700" fill="#059669">Optimization Recommendations:</text>
  <text class="sublabel" x="480" y="388">• Feature X uses GPT-4 for simple tasks → switch to smaller model</text>
  <text class="sublabel" x="480" y="406">• 25% of requests are identical → implement response caching</text>
  <text class="sublabel" x="480" y="424">• Avg output length 2x target → add max_tokens limit</text>
  <text class="sublabel" x="480" y="442">• Prompts with examples cost 3x more → reduce few-shot count</text>
  <text class="sublabel" x="480" y="460">• Batch similar requests → reduce API call overhead by 40%</text>
</svg>