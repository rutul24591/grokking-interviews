<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
    .box { fill: #ffffff; stroke-width: 2; rx: 8; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .b-init { stroke: #7c3aed; }
    .dark .b-init { fill: #2e1065; stroke: #a78bfa; }
    .b-discover { stroke: #2563eb; }
    .dark .b-discover { fill: #1e3a5f; stroke: #60a5fa; }
    .b-call { stroke: #059669; }
    .dark .b-call { fill: #064e3b; stroke: #34d399; }
    .b-result { stroke: #d97706; }
    .dark .b-result { fill: #451a03; stroke: #fbbf24; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">MCP Resource Discovery Flow</text>

  <!-- Two columns: Host and Server -->
  <text class="label" x="225" y="80" text-anchor="middle" fill="#7c3aed">MCP Host</text>
  <text class="label" x="675" y="80" text-anchor="middle" fill="#059669">MCP Server</text>
  <line x1="450" y1="65" x2="450" y2="470" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- Step 1: Initialize -->
  <rect class="box b-init" x="60" y="100" width="330" height="45"/>
  <text class="label" x="225" y="128" text-anchor="middle">1. initialize {protocolVersion, capabilities}</text>
  <path class="arrow" d="M390 122 L510 122"/>
  <polygon points="510,122 502,117 502,127" fill="#6366f1"/>

  <rect class="box b-init" x="510" y="160" width="330" height="45"/>
  <text class="label" x="675" y="188" text-anchor="middle">2. Response {serverInfo, capabilities}</text>
  <path class="arrow" d="M510 182 L390 182"/>
  <polygon points="390,182 398,177 398,187" fill="#6366f1"/>

  <rect class="box b-init" x="60" y="220" width="330" height="35"/>
  <text class="label" x="225" y="242" text-anchor="middle">3. initialized (notification)</text>
  <path class="arrow" d="M390 237 L510 237"/>
  <polygon points="510,237 502,232 502,242" fill="#6366f1"/>

  <!-- Step 4: Discovery -->
  <rect class="box b-discover" x="60" y="275" width="330" height="35"/>
  <text class="label" x="225" y="297" text-anchor="middle">4. resources/list</text>
  <path class="arrow" d="M390 292 L510 292"/>
  <polygon points="510,292 502,287 502,297" fill="#6366f1"/>

  <rect class="box b-discover" x="510" y="320" width="330" height="35"/>
  <text class="label" x="675" y="342" text-anchor="middle">5. Response: [{uri, name, mimeType}]</text>
  <path class="arrow" d="M510 337 L390 337"/>
  <polygon points="390,337 398,332 398,342" fill="#6366f1"/>

  <rect class="box b-discover" x="60" y="365" width="330" height="35"/>
  <text class="label" x="225" y="387" text-anchor="middle">6. tools/list</text>
  <path class="arrow" d="M390 382 L510 382"/>
  <polygon points="510,382 502,377 502,387" fill="#6366f1"/>

  <rect class="box b-discover" x="510" y="410" width="330" height="35"/>
  <text class="label" x="675" y="432" text-anchor="middle">7. Response: [{name, description, schema}]</text>
  <path class="arrow" d="M510 427 L390 427"/>
  <polygon points="390,427 398,422 398,432" fill="#6366f1"/>

  <!-- Annotations -->
  <rect x="60" y="460" width="780" height="30" rx="4" fill="#f0f9ff" stroke="#0284c7" stroke-width="1"/>
  <text class="sublabel" x="450" y="480" text-anchor="middle">After discovery: Host aggregates all tools/resources and presents them to the LLM as available tools</text>
</svg>