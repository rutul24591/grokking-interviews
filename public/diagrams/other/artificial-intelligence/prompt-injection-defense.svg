<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .c-input { stroke: #7c3aed; }
    .dark .c-input { fill: #2e1065; stroke: #a78bfa; }
    .c-prompt { stroke: #2563eb; }
    .dark .c-prompt { fill: #1e3a5f; stroke: #60a5fa; }
    .c-output { stroke: #059669; }
    .dark .c-output { fill: #064e3b; stroke: #34d399; }
    .c-mon { stroke: #d97706; }
    .dark .c-mon { fill: #451a03; stroke: #fbbf24; }
    .c-incident { stroke: #dc2626; }
    .dark .c-incident { fill: #450a0a; stroke: #f87171; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
    .shield { fill: #059669; opacity: 0.2; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Prompt Injection Defense Layers</text>

  <!-- Main pipeline with shields -->
  <rect class="box c-input" x="30" y="80" width="160" height="70"/>
  <text class="label" x="110" y="105" text-anchor="middle">Input</text>
  <text class="sublabel" x="110" y="125" text-anchor="middle">User input</text>

  <!-- Shield 1 -->
  <rect class="box" x="195" y="75" width="80" height="80" stroke="#059669" stroke-dasharray="4,3"/>
  <text class="sublabel" x="235" y="105" text-anchor="middle" font-weight="700" fill="#059669">Layer 1</text>
  <text class="sublabel" x="235" y="120" text-anchor="middle">Input Scan</text>
  <text class="sublabel" x="235" y="135" text-anchor="middle">Pattern match</text>
  <text class="sublabel" x="235" y="150" text-anchor="middle">PII redact</text>

  <path class="arrow" d="M275 115 L310 115"/>

  <rect class="box c-prompt" x="315" y="80" width="160" height="70"/>
  <text class="label" x="395" y="105" text-anchor="middle">Prompt Build</text>
  <text class="sublabel" x="395" y="125" text-anchor="middle">System + user</text>

  <!-- Shield 2 -->
  <rect class="box" x="480" y="75" width="80" height="80" stroke="#059669" stroke-dasharray="4,3"/>
  <text class="sublabel" x="520" y="105" text-anchor="middle" font-weight="700" fill="#059669">Layer 2</text>
  <text class="sublabel" x="520" y="120" text-anchor="middle">Structural</text>
  <text class="sublabel" x="520" y="135" text-anchor="middle">Separation</text>

  <path class="arrow" d="M560 115 L595 115"/>

  <rect class="box" x="600" y="80" width="120" height="70"/>
  <text class="label" x="660" y="105" text-anchor="middle">LLM</text>
  <text class="sublabel" x="660" y="125" text-anchor="middle">Model call</text>

  <!-- Shield 3 -->
  <rect class="box" x="725" y="75" width="80" height="80" stroke="#059669" stroke-dasharray="4,3"/>
  <text class="sublabel" x="765" y="105" text-anchor="middle" font-weight="700" fill="#059669">Layer 3</text>
  <text class="sublabel" x="765" y="120" text-anchor="middle">Output</text>
  <text class="sublabel" x="765" y="135" text-anchor="middle">Filter</text>
  <text class="sublabel" x="765" y="150" text-anchor="middle">DLP scan</text>

  <path class="arrow" d="M805 115 L830 115"/>

  <rect class="box c-output" x="835" y="80" width="55" height="70"/>
  <text class="label" x="862" y="115" text-anchor="middle">User</text>

  <!-- Monitoring layer -->
  <rect class="box c-mon" x="30" y="200" width="860" height="120"/>
  <text class="label" x="450" y="225" text-anchor="middle">Layer 4: Real-Time Monitoring</text>
  <rect class="detail-box" x="50" y="240" width="240" height="65"/>
  <text class="sublabel" x="65" y="260">Metrics: injection attempts, error rates</text>
  <text class="sublabel" x="65" y="278">Anomaly detection: unusual patterns</text>
  <text class="sublabel" x="65" y="296">Alerts: threshold breaches → PagerDuty</text>

  <rect class="detail-box" x="320" y="240" width="240" height="65"/>
  <text class="sublabel" x="335" y="260">Audit log: every input, output, tool call</text>
  <text class="sublabel" x="335" y="278">Session traces for forensic analysis</text>
  <text class="sublabel" x="335" y="296">Compliance reporting (SOX, GDPR, HIPAA)</text>

  <rect class="detail-box" x="590" y="240" width="280" height="65"/>
  <text class="sublabel" x="605" y="260">Rate limiting: per-user, per-endpoint</text>
  <text class="sublabel" x="605" y="278">Circuit breaker: auto-disable on attack spike</text>
  <text class="sublabel" x="605" y="296">Quarantine: block suspicious user sessions</text>

  <!-- Incident Response -->
  <rect class="box c-incident" x="30" y="350" width="860" height="130"/>
  <text class="label" x="450" y="375" text-anchor="middle">Layer 5: Incident Response</text>

  <rect class="detail-box" x="50" y="390" width="160" height="75"/>
  <text class="sublabel" x="65" y="410"><tspan font-weight="700">1. Detection</tspan></text>
  <text class="sublabel" x="65" y="428">Monitor alerts</text>
  <text class="sublabel" x="65" y="446">User reports</text>
  <text class="sublabel" x="65" y="464">Automated scans</text>

  <rect class="detail-box" x="230" y="390" width="160" height="75"/>
  <text class="sublabel" x="245" y="410"><tspan font-weight="700">2. Containment</tspan></text>
  <text class="sublabel" x="245" y="428">Block endpoint</text>
  <text class="sublabel" x="245" y="446">Suspend session</text>
  <text class="sublabel" x="245" y="464">Revoke permissions</text>

  <rect class="detail-box" x="410" y="390" width="160" height="75"/>
  <text class="sublabel" x="425" y="410"><tspan font-weight="700">3. Analysis</tspan></text>
  <text class="sublabel" x="425" y="428">Forensic trace</text>
  <text class="sublabel" x="425" y="446">Attack vector</text>
  <text class="sublabel" x="425" y="464">Impact assessment</text>

  <rect class="detail-box" x="590" y="390" width="160" height="75"/>
  <text class="sublabel" x="605" y="410"><tspan font-weight="700">4. Remediation</tspan></text>
  <text class="sublabel" x="605" y="428">Fix vulnerability</text>
  <text class="sublabel" x="605" y="446">Deploy defenses</text>
  <text class="sublabel" x="605" y="464">Test against attack</text>

  <rect class="detail-box" x="770" y="390" width="110" height="75"/>
  <text class="sublabel" x="785" y="410"><tspan font-weight="700">5. Learn</tspan></text>
  <text class="sublabel" x="785" y="428">Post-mortem</text>
  <text class="sublabel" x="785" y="446">Update rules</text>
  <text class="sublabel" x="785" y="464">Share findings</text>
</svg>