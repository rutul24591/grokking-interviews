<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
    .loop-arrow { fill: none; stroke: #f59e0b; stroke-width: 2.5; }
    .box-goal { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 8; }
    .dark .box-goal { fill: #2e1065; stroke: #a78bfa; }
    .box-llm { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .dark .box-llm { fill: #1e3a5f; stroke: #60a5fa; }
    .box-tool { fill: #d1fae5; stroke: #059669; stroke-width: 2; rx: 8; }
    .dark .box-tool { fill: #064e3b; stroke: #34d399; }
    .box-observe { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
    .dark .box-observe { fill: #451a03; stroke: #fbbf24; }
    .box-output { fill: #fce7f3; stroke: #db2777; stroke-width: 2; rx: 8; }
    .dark .box-output { fill: #500724; stroke: #f472b6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .decision { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; }
    .dark .decision { fill: #450a0a; stroke: #f87171; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Agent Loop Architecture</text>

  <!-- Goal Input -->
  <rect class="box-goal" x="350" y="65" width="200" height="55"/>
  <text class="label" x="450" y="97" text-anchor="middle">Goal Input</text>

  <path class="arrow" d="M450 120 L450 155"/>
  <polygon points="450,155 445,145 455,145" fill="#6366f1"/>

  <!-- LLM Reasoning -->
  <rect class="box-llm" x="350" y="160" width="200" height="70"/>
  <text class="label" x="450" y="185" text-anchor="middle">LLM Reasoning</text>
  <rect class="detail-box" x="365" y="195" width="170" height="25"/>
  <text class="sublabel" x="375" y="212">Think: analyze state, plan next step</text>

  <path class="arrow" d="M450 230 L450 265"/>
  <polygon points="450,265 445,255 455,255" fill="#6366f1"/>

  <!-- Action Decision -->
  <polygon class="decision" points="450,275 560,310 450,345 340,310"/>
  <text class="label" x="450" y="315" text-anchor="middle">Done?</text>

  <!-- Yes -> Output -->
  <path class="arrow" d="M560 310 L620 310 L620 285"/>
  <polygon points="620,285 615,295 625,295" fill="#6366f1"/>
  <text class="sublabel" x="590" y="300" fill="#059669" font-weight="700">Yes</text>

  <rect class="box-output" x="630" y="240" width="180" height="90"/>
  <text class="label" x="720" y="270" text-anchor="middle">Final Output</text>
  <rect class="detail-box" x="645" y="285" width="150" height="35"/>
  <text class="sublabel" x="655" y="302">Response to user</text>
  <text class="sublabel" x="655" y="315">or escalate</text>

  <!-- No -> Tool Execution -->
  <path class="arrow" d="M450 345 L450 380"/>
  <polygon points="450,380 445,370 455,370" fill="#6366f1"/>
  <text class="sublabel" x="470" y="365" fill="#dc2626" font-weight="700">No</text>

  <rect class="box-tool" x="350" y="385" width="200" height="50"/>
  <text class="label" x="450" y="415" text-anchor="middle">Execute Tool</text>

  <!-- Loop back arrow -->
  <path class="loop-arrow" d="M350 410 L290 410 L290 195 L340 195"/>
  <polygon points="340,195 332,190 332,200" fill="#f59e0b"/>

  <!-- Observation (on the loop) -->
  <rect class="box-observe" x="200" y="260" width="80" height="60" rx="6"/>
  <text class="label" x="240" y="285" text-anchor="middle">Observe</text>
  <text class="sublabel" x="240" y="303" text-anchor="middle">Result</text>

  <text class="sublabel" x="290" y="300" font-weight="700" fill="#f59e0b">Feedback Loop</text>

  <!-- Guards annotation -->
  <rect x="20" y="160" width="160" height="170" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="100" y="185" text-anchor="middle">Safety Guards</text>
  <text class="sublabel" x="35" y="208">Iteration limit (10-20)</text>
  <text class="sublabel" x="35" y="226">Token budget cap</text>
  <text class="sublabel" x="35" y="244">Time limit</text>
  <text class="sublabel" x="35" y="262">Tool permissions</text>
  <text class="sublabel" x="35" y="280">Loop detection</text>
  <text class="sublabel" x="35" y="298">Human escalation</text>
  <text class="sublabel" x="35" y="316">Context management</text>
</svg>