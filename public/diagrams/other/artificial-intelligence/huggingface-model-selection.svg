<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 1.5; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Hugging Face Ecosystem — Model Selection Decision Tree</text>

  <!-- Decision tree -->
  <text class="label" x="450" y="85" text-anchor="middle">Model Selection Decision Tree</text>

  <!-- Root question -->
  <rect class="box" x="300" y="100" width="300" height="50" stroke="#7c3aed"/>
  <text class="label" x="450" y="130" text-anchor="middle" fill="#7c3aed">Need self-hosting or data privacy?</text>

  <!-- Yes path -->
  <path d="M350 150 L200 200" fill="none" stroke="#059669" stroke-width="2"/>
  <text class="sublabel" x="250" y="175" fill="#059669" font-weight="700">Yes</text>

  <!-- No path -->
  <path d="M550 150 L700 200" fill="none" stroke="#2563eb" stroke-width="2"/>
  <text class="sublabel" x="650" y="175" fill="#2563eb" font-weight="700">No</text>

  <!-- Self-hosted path -->
  <rect class="box" x="50" y="205" width="300" height="50" stroke="#059669"/>
  <text class="label" x="200" y="235" text-anchor="middle" fill="#059669">Open-Source Models</text>

  <!-- Open-source sub-questions -->
  <path d="M200 255 L200 290" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <rect class="box" x="80" y="295" width="240" height="45" stroke="#2563eb"/>
  <text class="label" x="200" y="323" text-anchor="middle" fill="#2563eb">GPU budget &lt; 2x A100?</text>

  <path d="M140 340 L100 380" fill="none" stroke="#059669" stroke-width="1.5"/>
  <text class="sublabel" x="105" y="360" fill="#059669" font-weight="700">Yes</text>
  <path d="M260 340 L300 380" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  <text class="sublabel" x="295" y="360" fill="#2563eb" font-weight="700">No</text>

  <rect class="box" x="20" y="385" width="160" height="45" stroke="#059669"/>
  <text class="label" x="100" y="413" text-anchor="middle" fill="#059669">Llama 3 8B / Mistral 7B</text>

  <rect class="box" x="220" y="385" width="180" height="45" stroke="#059669"/>
  <text class="label" x="310" y="413" text-anchor="middle" fill="#059669">Llama 3 70B / Mixtral</text>

  <!-- API path -->
  <rect class="box" x="550" y="205" width="300" height="50" stroke="#2563eb"/>
  <text class="label" x="700" y="235" text-anchor="middle" fill="#2563eb">API-Based Models</text>

  <path d="M700 255 L700 290" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <rect class="box" x="580" y="295" width="240" height="45" stroke="#2563eb"/>
  <text class="label" x="700" y="323" text-anchor="middle" fill="#2563eb">Highest quality needed?</text>

  <path d="M640 340 L600 380" fill="none" stroke="#059669" stroke-width="1.5"/>
  <text class="sublabel" x="605" y="360" fill="#059669" font-weight="700">Yes</text>
  <path d="M760 340 L800 380" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  <text class="sublabel" x="795" y="360" fill="#2563eb" font-weight="700">No</text>

  <rect class="box" x="500" y="385" width="200" height="45" stroke="#059669"/>
  <text class="label" x="600" y="413" text-anchor="middle" fill="#059669">GPT-4o / Claude 3.5 Opus</text>

  <rect class="box" x="720" y="385" width="160" height="45" stroke="#2563eb"/>
  <text class="label" x="800" y="413" text-anchor="middle" fill="#2563eb">GPT-4o-mini / Haiku</text>

  <!-- Model comparison -->
  <rect x="30" y="450" width="840" height="40" rx="6" fill="#f0f9ff" stroke="#0284c7" stroke-width="1"/>
  <text class="sublabel" x="450" y="475" text-anchor="middle" font-weight="700">Key factors: capability, latency, cost, privacy, customization, rate limits, data residency</text>
</svg>