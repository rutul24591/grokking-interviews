<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .c-ft { stroke: #7c3aed; }
    .dark .c-ft { fill: #2e1065; stroke: #a78bfa; }
    .c-rag { stroke: #2563eb; }
    .dark .c-rag { fill: #1e3a5f; stroke: #60a5fa; }
    .c-hybrid { stroke: #059669; }
    .dark .c-hybrid { fill: #064e3b; stroke: #34d399; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Hybrid Fine-Tuning + RAG Architecture</text>

  <!-- User Input -->
  <rect class="box" x="350" y="60" width="200" height="45"/>
  <text class="label" x="450" y="88" text-anchor="middle">User Query</text>

  <path class="arrow" d="M450 105 L450 140"/>

  <!-- Parallel paths -->
  <path d="M450 140 L200 140 L200 180" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <path d="M450 140 L700 140 L700 180" fill="none" stroke="#6366f1" stroke-width="1.5"/>

  <!-- RAG path -->
  <rect class="box c-rag" x="50" y="185" width="300" height="100"/>
  <text class="label" x="200" y="210" text-anchor="middle" fill="#2563eb">RAG Pipeline (Knowledge)</text>
  <rect class="detail-box" x="65" y="220" width="270" height="50"/>
  <text class="sublabel" x="75" y="238">Retrieve relevant documents from vector DB</text>
  <text class="sublabel" x="75" y="256">Provides: facts, current info, confidential data</text>

  <!-- Fine-tuning path -->
  <rect class="box c-ft" x="550" y="185" width="300" height="100"/>
  <text class="label" x="700" y="210" text-anchor="middle" fill="#7c3aed">Fine-Tuned Model (Behavior)</text>
  <rect class="detail-box" x="565" y="220" width="270" height="50"/>
  <text class="sublabel" x="575" y="238">LoRA adapter provides domain behavior</text>
  <text class="sublabel" x="575" y="256">Provides: format, tone, reasoning patterns</text>

  <!-- Arrows to combine -->
  <path d="M200 285 L200 330 L450 330" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <path d="M700 285 L700 330 L450 330" fill="none" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Combined prompt -->
  <rect class="box c-hybrid" x="300" y="340" width="300" height="80"/>
  <text class="label" x="450" y="365" text-anchor="middle" fill="#059669">Combined Prompt</text>
  <rect class="detail-box" x="315" y="375" width="270" height="35"/>
  <text class="sublabel" x="325" y="393">System: fine-tuned behavior + Retrieved: RAG context</text>

  <path class="arrow" d="M450 420 L450 450"/>

  <!-- Output -->
  <rect class="box" x="350" y="455" width="200" height="35"/>
  <text class="label" x="450" y="478" text-anchor="middle">Grounded, On-Brand Response</text>

  <!-- Annotations -->
  <rect x="30" y="60" width="280" height="90" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text class="label" x="170" y="85" text-anchor="middle">What Fine-Tuning Provides</text>
  <text class="sublabel" x="45" y="105">• Consistent response format</text>
  <text class="sublabel" x="45" y="120">• Domain-specific tone and style</text>
  <text class="sublabel" x="45" y="135">• Reasoning patterns and structure</text>

  <rect x="590" y="60" width="280" height="90" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text class="label" x="730" y="85" text-anchor="middle">What RAG Provides</text>
  <text class="sublabel" x="605" y="105">• Current, up-to-date information</text>
  <text class="sublabel" x="605" y="120">• Source citations and attribution</text>
  <text class="sublabel" x="605" y="135">• Access-controlled confidential data</text>
</svg>