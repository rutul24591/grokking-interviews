<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 8; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .s-task { stroke: #7c3aed; }
    .dark .s-task { fill: #2e1065; stroke: #a78bfa; }
    .s-agent1 { stroke: #2563eb; }
    .dark .s-agent1 { fill: #1e3a5f; stroke: #60a5fa; }
    .s-agent2 { stroke: #059669; }
    .dark .s-agent2 { fill: #064e3b; stroke: #34d399; }
    .s-agent3 { stroke: #d97706; }
    .dark .s-agent3 { fill: #451a03; stroke: #fbbf24; }
    .s-judge { stroke: #dc2626; }
    .dark .s-judge { fill: #450a0a; stroke: #f87171; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 1.5; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Debate and Consensus Pattern</text>

  <!-- Task -->
  <rect class="box s-task" x="350" y="65" width="200" height="45"/>
  <text class="label" x="450" y="93" text-anchor="middle">Task / Question</text>

  <!-- Fan out to agents -->
  <path d="M400 110 L200 155" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M450 110 L450 155" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M500 110 L700 155" fill="none" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Independent Agents -->
  <rect class="box s-agent1" x="80" y="160" width="160" height="70"/>
  <text class="label" x="160" y="185" text-anchor="middle">Agent 1 (GPT-4)</text>
  <rect class="detail-box" x="95" y="195" width="130" height="25"/>
  <text class="sublabel" x="105" y="212">Independent analysis</text>

  <rect class="box s-agent2" x="370" y="160" width="160" height="70"/>
  <text class="label" x="450" y="185" text-anchor="middle">Agent 2 (Claude)</text>
  <rect class="detail-box" x="385" y="195" width="130" height="25"/>
  <text class="sublabel" x="395" y="212">Independent analysis</text>

  <rect class="box s-agent3" x="660" y="160" width="160" height="70"/>
  <text class="label" x="740" y="185" text-anchor="middle">Agent 3 (Gemini)</text>
  <rect class="detail-box" x="675" y="195" width="130" height="25"/>
  <text class="sublabel" x="685" y="212">Independent analysis</text>

  <!-- Answers -->
  <rect x="100" y="250" width="120" height="55" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text class="sublabel" x="160" y="268" text-anchor="middle">Answer A</text>
  <text class="sublabel" x="160" y="285" text-anchor="middle" fill="#2563eb" font-weight="700">"X is correct"</text>
  <text class="sublabel" x="160" y="300" text-anchor="middle">Confidence: 0.9</text>

  <rect x="390" y="250" width="120" height="55" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text class="sublabel" x="450" y="268" text-anchor="middle">Answer B</text>
  <text class="sublabel" x="450" y="285" text-anchor="middle" fill="#2563eb" font-weight="700">"X is correct"</text>
  <text class="sublabel" x="450" y="300" text-anchor="middle">Confidence: 0.85</text>

  <rect x="680" y="250" width="120" height="55" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text class="sublabel" x="740" y="268" text-anchor="middle">Answer C</text>
  <text class="sublabel" x="740" y="285" text-anchor="middle" fill="#d97706" font-weight="700">"Y is correct"</text>
  <text class="sublabel" x="740" y="300" text-anchor="middle">Confidence: 0.7</text>

  <!-- Arrows to judge -->
  <path d="M160 305 L160 370 L450 370" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <path d="M450 305 L450 370" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <path d="M740 305 L740 370 L450 370" fill="none" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Judge -->
  <rect class="box s-judge" x="350" y="375" width="200" height="70"/>
  <text class="label" x="450" y="400" text-anchor="middle">Judge Agent</text>
  <rect class="detail-box" x="365" y="410" width="170" height="25"/>
  <text class="sublabel" x="375" y="427">2 agree → consensus</text>

  <!-- Final -->
  <path class="arrow" d="M450 445 L450 470"/>
  <polygon points="450,470 445,460 455,460" fill="#6366f1"/>

  <!-- Consensus annotation -->
  <rect x="580" y="375" width="280" height="70" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="label" x="720" y="398" text-anchor="middle">Consensus Detection</text>
  <text class="sublabel" x="595" y="418">Agent 1 &amp; Agent 2 agree: Answer A</text>
  <text class="sublabel" x="595" y="433">Agent 3 disagrees: Answer C</text>
  <text class="sublabel" x="595" y="448" fill="#059669" font-weight="700">→ Final: Answer A (2/3 consensus)</text>
</svg>