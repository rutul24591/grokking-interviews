<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
    .bar { rx: 3; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">A/B Testing Models in Production</text>

  <!-- Traffic split -->
  <rect class="box" x="350" y="60" width="200" height="50"/>
  <text class="label" x="450" y="90" text-anchor="middle">Production Traffic</text>

  <path d="M420 110 L200 160" fill="none" stroke="#7c3aed" stroke-width="2"/>
  <path d="M480 110 L700 160" fill="none" stroke="#2563eb" stroke-width="2"/>

  <!-- Variant A -->
  <rect class="box" x="50" y="165" width="300" height="100" stroke="#7c3aed"/>
  <text class="label" x="200" y="190" text-anchor="middle" fill="#7c3aed">Variant A (Control): Current Model</text>
  <rect class="detail-box" x="65" y="200" width="270" height="50"/>
  <text class="sublabel" x="75" y="218">Model: GPT-4 | Prompt v2.3 | temp=0.7</text>
  <text class="sublabel" x="75" y="236">Traffic: 90% | Duration: 2 weeks</text>

  <!-- Variant B -->
  <rect class="box" x="550" y="165" width="300" height="100" stroke="#2563eb"/>
  <text class="label" x="700" y="190" text-anchor="middle" fill="#2563eb">Variant B (Treatment): New Model</text>
  <rect class="detail-box" x="565" y="200" width="270" height="50"/>
  <text class="sublabel" x="575" y="218">Model: Claude 3.5 | Prompt v2.4 | temp=0.7</text>
  <text class="sublabel" x="575" y="236">Traffic: 10% | Duration: 2 weeks</text>

  <!-- Metrics collection -->
  <path d="M200 265 L200 310 L450 310" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <path d="M700 265 L700 310 L450 310" fill="none" stroke="#6366f1" stroke-width="1.5"/>

  <rect x="300" y="315" width="300" height="60" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text class="label" x="450" y="340" text-anchor="middle">Metrics Collection &amp; Analysis</text>
  <text class="sublabel" x="315" y="360">User satisfaction, re-query rate, task completion, LLM-as-judge scores</text>

  <!-- Results -->
  <path class="arrow" d="M450 375 L450 410"/>

  <rect x="100" y="415" width="340" height="70" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text class="label" x="270" y="440" text-anchor="middle" fill="#059669">Variant B Wins ✓</text>
  <text class="sublabel" x="115" y="458">Satisfaction: 4.5 vs 4.1 (p&lt;0.01)</text>
  <text class="sublabel" x="115" y="473">Re-query rate: 8% vs 15% (significant)</text>

  <rect x="460" y="415" width="340" height="70" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="630" y="440" text-anchor="middle">Next: Gradual Rollout</text>
  <text class="sublabel" x="475" y="458">10% → 25% → 50% → 100%</text>
  <text class="sublabel" x="475" y="473">Monitor quality at each stage</text>
</svg>