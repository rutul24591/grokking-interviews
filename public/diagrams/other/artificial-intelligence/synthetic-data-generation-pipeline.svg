<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Synthetic Data Generation Pipeline</text>

  <!-- Step 1: Topic Specification -->
  <rect class="box" x="30" y="80" width="160" height="100"/>
  <text class="label" x="110" y="105" text-anchor="middle">1. Specification</text>
  <rect class="detail-box" x="45" y="115" width="130" height="50"/>
  <text class="sublabel" x="55" y="133">Topic, format, difficulty</text>
  <text class="sublabel" x="55" y="150">Expected output schema</text>
  <text class="sublabel" x="55" y="167">Number of examples</text>

  <path class="arrow" d="M190 130 L220 130"/>

  <!-- Step 2: LLM Generation -->
  <rect class="box" x="230" y="80" width="160" height="100"/>
  <text class="label" x="310" y="105" text-anchor="middle">2. LLM Generation</text>
  <rect class="detail-box" x="245" y="115" width="130" height="50"/>
  <text class="sublabel" x="255" y="133">LLM generates examples</text>
  <text class="sublabel" x="255" y="150">Following specification</text>
  <text class="sublabel" x="255" y="167">Diverse, high-quality prompts</text>

  <path class="arrow" d="M390 130 L420 130"/>

  <!-- Step 3: Automated Validation -->
  <rect class="box" x="430" y="80" width="180" height="100"/>
  <text class="label" x="520" y="105" text-anchor="middle">3. Automated Validation</text>
  <rect class="detail-box" x="445" y="115" width="150" height="50"/>
  <text class="sublabel" x="455" y="133">Format validation (schema)</text>
  <text class="sublabel" x="455" y="150">Factual consistency check</text>
  <text class="sublabel" x="455" y="167">Duplicate detection</text>

  <path class="arrow" d="M610 130 L640 130"/>

  <!-- Step 4: Human Review -->
  <rect class="box" x="650" y="80" width="160" height="100"/>
  <text class="label" x="730" y="105" text-anchor="middle">4. Human Review</text>
  <rect class="detail-box" x="665" y="115" width="130" height="50"/>
  <text class="sublabel" x="675" y="133">Expert reviews sample</text>
  <text class="sublabel" x="675" y="150">Quality scoring</text>
  <text class="sublabel" x="675" y="167">Corrects errors</text>

  <path class="arrow" d="M810 130 L840 130 L840 210 L790 210"/>

  <!-- Output -->
  <rect class="box" x="620" y="215" width="190" height="60"/>
  <text class="label" x="715" y="240" text-anchor="middle">Training Dataset</text>
  <rect class="detail-box" x="635" y="250" width="160" height="18"/>
  <text class="sublabel" x="645" y="263">Versioned, quality-tracked</text>

  <!-- Feedback loop to specification -->
  <path d="M620 245 L310 245 L310 180" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text class="sublabel" x="450" y="240" text-anchor="middle" fill="#f59e0b" font-weight="700">Feedback: improve specification based on review findings</text>

  <!-- Quality metrics -->
  <rect x="30" y="300" width="550" height="180" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="305" y="325" text-anchor="middle">Synthetic Data Quality Controls</text>
  <text class="sublabel" x="50" y="350"><tspan font-weight="700">Format validation:</tspan> Schema compliance, required fields present</text>
  <text class="sublabel" x="50" y="368"><tspan font-weight="700">Factual consistency:</tspan> Cross-reference with trusted knowledge base</text>
  <text class="sublabel" x="50" y="386"><tspan font-weight="700">Diversity check:</tspan> Embedding-based clustering to ensure variety</text>
  <text class="sublabel" x="50" y="404"><tspan font-weight="700">Bias detection:</tspan> Check for systematic patterns that don't exist in real data</text>
  <text class="sublabel" x="50" y="422"><tspan font-weight="700">Expert review:</tspan> Human scores 10-20% sample, calibrates automated scores</text>
  <text class="sublabel" x="50" y="440"><tspan font-weight="700">Against real data:</tspan> Compare synthetic distribution with real distribution</text>
  <text class="sublabel" x="50" y="458"><tspan font-weight="700">Model training test:</tspan> Train on synthetic, evaluate on real data performance</text>

  <!-- Best practices -->
  <rect x="610" y="300" width="260" height="180" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="label" x="740" y="325" text-anchor="middle">Best Practices</text>
  <text class="sublabel" x="625" y="350">• Supplement real data, don't replace</text>
  <text class="sublabel" x="625" y="368">• Validate against hold-out real data</text>
  <text class="sublabel" x="625" y="386">• Track generating model version</text>
  <text class="sublabel" x="625" y="404">• Monitor for generator bias</text>
  <text class="sublabel" x="625" y="422">• Use diverse generator prompts</text>
  <text class="sublabel" x="625" y="440">• Include edge cases explicitly</text>
  <text class="sublabel" x="625" y="458">• Regular quality audits</text>
</svg>