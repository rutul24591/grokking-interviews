<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 1.5; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Agent Orchestration — Supervisor Workflow</text>

  <!-- Input -->
  <rect class="box" x="350" y="60" width="200" height="45"/>
  <text class="label" x="450" y="88" text-anchor="middle">User Goal</text>

  <path class="arrow" d="M450 105 L450 140"/>

  <!-- Supervisor -->
  <rect class="box" x="350" y="145" width="200" height="70" stroke="#7c3aed"/>
  <text class="label" x="450" y="170" text-anchor="middle" fill="#7c3aed">Supervisor Agent</text>
  <rect class="detail-box" x="365" y="180" width="170" height="25"/>
  <text class="sublabel" x="375" y="197">Decompose goal → assign tasks</text>

  <!-- Fan out to workers -->
  <path d="M400 215 L150 280" fill="none" stroke="#6366f1" stroke-width="2"/>
  <path d="M450 215 L450 280" fill="none" stroke="#6366f1" stroke-width="2"/>
  <path d="M500 215 L750 280" fill="none" stroke="#6366f1" stroke-width="2"/>

  <!-- Worker 1 -->
  <rect class="box" x="50" y="285" width="200" height="80" stroke="#2563eb"/>
  <text class="label" x="150" y="310" text-anchor="middle" fill="#2563eb">Research Agent</text>
  <rect class="detail-box" x="65" y="320" width="170" height="35"/>
  <text class="sublabel" x="75" y="338">Web search, document retrieval</text>
  <text class="sublabel" x="75" y="353">Output: findings summary</text>

  <!-- Worker 2 -->
  <rect class="box" x="350" y="285" width="200" height="80" stroke="#059669"/>
  <text class="label" x="450" y="310" text-anchor="middle" fill="#059669">Analysis Agent</text>
  <rect class="detail-box" x="365" y="320" width="170" height="35"/>
  <text class="sublabel" x="375" y="338">Data analysis, pattern detection</text>
  <text class="sublabel" x="375" y="353">Output: insights report</text>

  <!-- Worker 3 -->
  <rect class="box" x="650" y="285" width="200" height="80" stroke="#d97706"/>
  <text class="label" x="750" y="310" text-anchor="middle" fill="#d97706">Writing Agent</text>
  <rect class="detail-box" x="665" y="320" width="170" height="35"/>
  <text class="sublabel" x="675" y="338">Draft generation, formatting</text>
  <text class="sublabel" x="675" y="353">Output: final document</text>

  <!-- Results back to supervisor -->
  <path d="M150 365 L150 410 L450 410" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <path d="M450 365 L450 410" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <path d="M750 365 L750 410 L450 410" fill="none" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Supervisor processes results -->
  <rect class="box" x="350" y="415" width="200" height="55" stroke="#ec4899"/>
  <text class="label" x="450" y="440" text-anchor="middle" fill="#ec4899">Synthesize &amp; Validate</text>
  <rect class="detail-box" x="365" y="445" width="170" height="18"/>
  <text class="sublabel" x="375" y="458">Combine results, quality check</text>

  <!-- Output -->
  <path class="arrow" d="M450 470 L450 485"/>
  <rect class="box" x="350" y="488" width="200" height="0" stroke="#6366f1"/>
</svg>