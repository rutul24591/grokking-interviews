<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 1.5; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Model Versioning Strategy</text>

  <!-- Version timeline -->
  <text class="label" x="450" y="80" text-anchor="middle">Model Version Timeline</text>
  <line x1="100" y1="100" x2="800" y2="100" stroke="#6366f1" stroke-width="2"/>

  <!-- Version nodes -->
  <circle cx="150" cy="100" r="15" fill="#7c3aed"/>
  <text class="sublabel" x="150" y="105" text-anchor="middle" fill="white" font-weight="700" font-size="9">v1</text>
  <text class="sublabel" x="150" y="130" text-anchor="middle">GPT-4</text>
  <text class="sublabel" x="150" y="145" text-anchor="middle">Prompt v1.0</text>

  <circle cx="300" cy="100" r="15" fill="#2563eb"/>
  <text class="sublabel" x="300" y="105" text-anchor="middle" fill="white" font-weight="700" font-size="9">v2</text>
  <text class="sublabel" x="300" y="130" text-anchor="middle">GPT-4</text>
  <text class="sublabel" x="300" y="145" text-anchor="middle">Prompt v2.3</text>

  <circle cx="450" cy="100" r="15" fill="#059669"/>
  <text class="sublabel" x="450" y="105" text-anchor="middle" fill="white" font-weight="700" font-size="9">v3</text>
  <text class="sublabel" x="450" y="130" text-anchor="middle">Claude 3</text>
  <text class="sublabel" x="450" y="145" text-anchor="middle">Prompt v2.4</text>

  <circle cx="600" cy="100" r="15" fill="#d97706"/>
  <text class="sublabel" x="600" y="105" text-anchor="middle" fill="white" font-weight="700" font-size="9">v4</text>
  <text class="sublabel" x="600" y="130" text-anchor="middle">Claude 3.5</text>
  <text class="sublabel" x="600" y="145" text-anchor="middle">Prompt v2.4 + LoRA</text>

  <circle cx="750" cy="100" r="15" fill="#dc2626"/>
  <text class="sublabel" x="750" y="105" text-anchor="middle" fill="white" font-weight="700" font-size="9">v5</text>
  <text class="sublabel" x="750" y="130" text-anchor="middle">Claude 3.5</text>
  <text class="sublabel" x="750" y="145" text-anchor="middle">Prompt v3.0 + LoRA</text>

  <!-- Traffic routing -->
  <rect x="30" y="200" width="840" height="120" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="450" y="225" text-anchor="middle">Traffic Routing Configuration</text>

  <rect x="50" y="240" width="240" height="65" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="sublabel" x="65" y="260" font-weight="700">Production (95%): v4</text>
  <text class="sublabel" x="65" y="278">Claude 3.5 + Prompt v2.4 + LoRA</text>
  <text class="sublabel" x="65" y="296">Quality: 94% | Latency: 1.1s</text>

  <rect x="320" y="240" width="240" height="65" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text class="sublabel" x="335" y="260" font-weight="700">Canary (5%): v5</text>
  <text class="sublabel" x="335" y="278">Claude 3.5 + Prompt v3.0 + LoRA</text>
  <text class="sublabel" x="335" y="296">Monitoring: quality, latency, cost</text>

  <rect x="590" y="240" width="260" height="65" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="sublabel" x="605" y="260" font-weight="700">Previous (loaded, ready): v3</text>
  <text class="sublabel" x="605" y="278">Claude 3 + Prompt v2.4</text>
  <text class="sublabel" x="605" y="296">Instant rollback target</text>

  <!-- Version components -->
  <rect x="30" y="350" width="840" height="130" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="1"/>
  <text class="label" x="450" y="375" text-anchor="middle">Version Identifier Components</text>

  <text class="sublabel" x="50" y="400"><tspan font-weight="700">model_id:</tspan> claude-3.5-sonnet</text>
  <text class="sublabel" x="50" y="420"><tspan font-weight="700">model_revision:</tspan> 2024-03-15 (commit hash)</text>
  <text class="sublabel" x="50" y="440"><tspan font-weight="700">adapter_hash:</tspan> a1b2c3d (LoRA adapter)</text>
  <text class="sublabel" x="50" y="460"><tspan font-weight="700">prompt_version:</tspan> v2.4 (Git-tracked prompt template)</text>
  <text class="sublabel" x="500" y="400"><tspan font-weight="700">Full version ID:</tspan></text>
  <text class="sublabel" x="500" y="420" font-family="monospace">claude-3.5-sonnet#2024-03-15</text>
  <text class="sublabel" x="500" y="440" font-family="monospace">+a1b2c3d+prompt-v2.4</text>
  <text class="sublabel" x="500" y="460">Every change tracked, every deploy reproducible</text>
</svg>