<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
    .token { fill: #7c3aed; opacity: 0.8; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Streaming Response Architecture</text>

  <!-- Client -->
  <rect class="box" x="30" y="80" width="180" height="100"/>
  <text class="label" x="120" y="105" text-anchor="middle">Client (Browser/App)</text>
  <rect class="detail-box" x="45" y="115" width="150" height="50"/>
  <text class="sublabel" x="55" y="133">Opens SSE/WebSocket connection</text>
  <text class="sublabel" x="55" y="150">Renders tokens as received</text>
  <text class="sublabel" x="55" y="167">Handles reconnect on failure</text>

  <!-- Arrow to server -->
  <path class="arrow" d="M210 130 L310 130"/>
  <text class="sublabel" x="260" y="125" text-anchor="middle" fill="#6366f1" font-weight="700">Request</text>

  <!-- Server -->
  <rect class="box" x="320" y="80" width="200" height="100"/>
  <text class="label" x="420" y="105" text-anchor="middle">Application Server</text>
  <rect class="detail-box" x="335" y="115" width="170" height="50"/>
  <text class="sublabel" x="345" y="133">Constructs prompt</text>
  <text class="sublabel" x="345" y="150">Streams tokens from model</text>
  <text class="sublabel" x="345" y="167">Forwards to client via SSE</text>

  <!-- Arrow to model -->
  <path class="arrow" d="M520 130 L620 130"/>
  <text class="sublabel" x="570" y="125" text-anchor="middle" fill="#6366f1" font-weight="700">API call</text>

  <!-- Model -->
  <rect class="box" x="630" y="80" width="200" height="100"/>
  <text class="label" x="730" y="105" text-anchor="middle">LLM Provider</text>
  <rect class="detail-box" x="645" y="115" width="170" height="50"/>
  <text class="sublabel" x="655" y="133">Processes prompt (prefill)</text>
  <text class="sublabel" x="655" y="150">Generates tokens (decode)</text>
  <text class="sublabel" x="655" y="167">Streams tokens back</text>

  <!-- Token streaming visualization -->
  <text class="label" x="450" y="230" text-anchor="middle">Token Streaming Timeline</text>

  <!-- Timeline -->
  <rect x="50" y="250" width="800" height="200" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <!-- Phase 1: Request -->
  <rect x="70" y="270" width="80" height="30" rx="4" fill="#e5e7eb"/>
  <text class="sublabel" x="110" y="290" text-anchor="middle">Request</text>
  <text class="sublabel" x="110" y="305" text-anchor="middle">50-100ms</text>

  <!-- Phase 2: Prefill -->
  <rect x="160" y="270" width="200" height="30" rx="4" fill="#7c3aed" opacity="0.3"/>
  <text class="sublabel" x="260" y="290" text-anchor="middle">Prefill (process context)</text>
  <text class="sublabel" x="260" y="305" text-anchor="middle">200ms-5s</text>

  <!-- Phase 3: First token (TTFT) -->
  <circle cx="370" cy="285" r="12" fill="#059669"/>
  <text class="sublabel" x="370" y="289" text-anchor="middle" fill="white" font-weight="700" font-size="9">TTFT</text>

  <!-- Phase 4: Token streaming -->
  <rect x="395" y="270" width="400" height="30" rx="4" fill="#059669" opacity="0.3"/>
  <text class="sublabel" x="595" y="290" text-anchor="middle">Token Streaming (10-50 tokens/second)</text>
  <text class="sublabel" x="595" y="305" text-anchor="middle">User sees content appearing in real-time</text>

  <!-- Token dots -->
  <circle cx="410" cy="340" r="6" class="token"/>
  <circle cx="435" cy="340" r="6" class="token"/>
  <circle cx="460" cy="340" r="6" class="token"/>
  <circle cx="485" cy="340" r="6" class="token"/>
  <circle cx="510" cy="340" r="6" class="token"/>
  <circle cx="535" cy="340" r="6" class="token"/>
  <circle cx="560" cy="340" r="6" class="token"/>
  <circle cx="585" cy="340" r="6" class="token"/>
  <circle cx="610" cy="340" r="6" class="token"/>
  <circle cx="635" cy="340" r="6" class="token"/>
  <circle cx="660" cy="340" r="6" class="token"/>
  <circle cx="685" cy="340" r="6" class="token"/>
  <circle cx="710" cy="340" r="6" class="token"/>
  <circle cx="735" cy="340" r="6" class="token"/>
  <circle cx="760" cy="340" r="6" class="token"/>
  <circle cx="785" cy="340" r="6" class="token"/>

  <text class="sublabel" x="600" y="370" text-anchor="middle">Each token rendered immediately as received — perceived latency = TTFT, not total time</text>

  <!-- Comparison -->
  <rect x="70" y="395" width="360" height="40" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text class="sublabel" x="250" y="420" text-anchor="middle" fill="#dc2626"><tspan font-weight="700">Without streaming:</tspan> User waits 5-15s for complete response</text>

  <rect x="470" y="395" width="360" height="40" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="sublabel" x="650" y="420" text-anchor="middle" fill="#059669"><tspan font-weight="700">With streaming:</tspan> User sees first token in 500ms-2s</text>
</svg>