<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 1.5; }
    .bar { rx: 3; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Fine-Tuning vs RAG — Cost Crossover Analysis</text>

  <!-- Cost curves -->
  <text class="label" x="225" y="80" text-anchor="middle">Cost vs Request Volume</text>

  <!-- Axes -->
  <line x1="80" y1="100" x2="80" y2="380" stroke="#333" stroke-width="1"/>
  <line x1="80" y1="380" x2="370" y2="380" stroke="#333" stroke-width="1"/>
  <text class="sublabel" x="225" y="400" text-anchor="middle">Monthly Request Volume (millions)</text>
  <text class="sublabel" x="30" y="240" text-anchor="middle" transform="rotate(-90,30,240)">Monthly Cost ($K)</text>

  <!-- Y-axis labels -->
  <text class="sublabel" x="70" y="380" text-anchor="end">$0</text>
  <text class="sublabel" x="70" y="310" text-anchor="end">$5</text>
  <text class="sublabel" x="70" y="240" text-anchor="end">$10</text>
  <text class="sublabel" x="70" y="170" text-anchor="end">$15</text>
  <text class="sublabel" x="70" y="100" text-anchor="end">$20</text>

  <!-- X-axis labels -->
  <text class="sublabel" x="80" y="395" text-anchor="middle">0</text>
  <text class="sublabel" x="153" y="395" text-anchor="middle">5</text>
  <text class="sublabel" x="226" y="395" text-anchor="middle">10</text>
  <text class="sublabel" x="300" y="395" text-anchor="middle">15</text>
  <text class="sublabel" x="370" y="395" text-anchor="middle">20</text>

  <!-- Grid lines -->
  <line x1="80" y1="310" x2="370" y2="310" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="80" y1="240" x2="370" y2="240" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="80" y1="170" x2="370" y2="170" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="80" y1="100" x2="370" y2="100" stroke="#e5e7eb" stroke-width="0.5"/>

  <!-- RAG cost line (starts low, grows linearly) -->
  <path d="M80 380 L370 100" fill="none" stroke="#2563eb" stroke-width="3"/>
  <text class="sublabel" x="340" y="115" fill="#2563eb" font-weight="700">RAG</text>

  <!-- Fine-tuning cost line (starts high with training cost, grows slowly) -->
  <path d="M80 240 L370 200" fill="none" stroke="#7c3aed" stroke-width="3"/>
  <text class="sublabel" x="340" y="190" fill="#7c3aed" font-weight="700">Fine-Tuning</text>

  <!-- Crossover point -->
  <circle cx="190" cy="270" r="6" fill="#dc2626"/>
  <line x1="190" y1="270" x2="190" y2="380" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>
  <text class="sublabel" x="190" y="395" text-anchor="middle" fill="#dc2626" font-weight="700">Crossover</text>
  <rect x="140" y="240" width="100" height="25" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text class="sublabel" x="190" y="257" text-anchor="middle" fill="#dc2626" font-weight="700">~7M requests</text>

  <!-- TCO breakdown -->
  <rect x="420" y="80" width="450" height="400" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="645" y="105" text-anchor="middle">Total Cost of Ownership Breakdown</text>

  <text class="sublabel" x="440" y="130"><tspan font-weight="700">RAG Costs (per month at 10M requests):</tspan></text>
  <text class="sublabel" x="460" y="150">• API costs (input + output tokens): $8,500/mo</text>
  <text class="sublabel" x="460" y="168">• Vector DB hosting: $500/mo</text>
  <text class="sublabel" x="460" y="186">• Embedding API calls: $500/mo</text>
  <text class="sublabel" x="460" y="204">• <tspan font-weight="700">Total: $9,500/mo ($114K/year)</tspan></text>

  <text class="sublabel" x="440" y="235"><tspan font-weight="700">Fine-Tuning Costs (per month at 10M requests):</tspan></text>
  <text class="sublabel" x="460" y="255">• Training (one-time, amortized): $2,000/mo</text>
  <text class="sublabel" x="460" y="273">• GPU serving infrastructure: $3,000/mo</text>
  <text class="sublabel" x="460" y="291">• ML engineering overhead: $1,500/mo</text>
  <text class="sublabel" x="460" y="309">• <tspan font-weight="700">Total: $6,500/mo ($78K/year)</tspan></text>

  <text class="sublabel" x="440" y="340"><tspan font-weight="700">Crossover Analysis:</tspan></text>
  <text class="sublabel" x="460" y="360">• Below 7M requests/mo: RAG is cheaper</text>
  <text class="sublabel" x="460" y="378">• Above 7M requests/mo: Fine-tuning is cheaper</text>
  <text class="sublabel" x="460" y="396">• At 20M requests: Fine-tuning saves $60K/year</text>
  <text class="sublabel" x="460" y="414">• At 50M requests: Fine-tuning saves $200K/year</text>
  <text class="sublabel" x="460" y="435"><tspan font-weight="700">Note: Crossover shifts with API pricing changes, model size, and retrieval infrastructure costs</tspan></text>
</svg>