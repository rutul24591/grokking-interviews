<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 1.5; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">AI Application Architecture — Multi-Provider Failover</text>

  <!-- Request flow -->
  <text class="label" x="450" y="85" text-anchor="middle">Provider Abstraction Layer with Failover</text>

  <!-- Client request -->
  <rect class="box" x="350" y="110" width="200" height="45"/>
  <text class="label" x="450" y="138" text-anchor="middle">Application Request</text>

  <path class="arrow" d="M450 155 L450 190"/>

  <!-- Provider router -->
  <rect class="box" x="350" y="195" width="200" height="60" stroke="#7c3aed"/>
  <text class="label" x="450" y="215" text-anchor="middle" fill="#7c3aed">Provider Router</text>
  <rect class="detail-box" x="365" y="222" width="170" height="25"/>
  <text class="sublabel" x="375" y="239">Health check, cost, latency</text>

  <!-- Primary provider -->
  <path d="M400 255 L200 310" fill="none" stroke="#059669" stroke-width="2"/>
  <text class="sublabel" x="280" y="280" fill="#059669" font-weight="700">Primary</text>

  <!-- Fallback 1 -->
  <path d="M450 255 L450 310" fill="none" stroke="#d97706" stroke-width="2"/>
  <text class="sublabel" x="465" y="280" fill="#d97706" font-weight="700">Fallback 1</text>

  <!-- Fallback 2 -->
  <path d="M500 255 L700 310" fill="none" stroke="#dc2626" stroke-width="2"/>
  <text class="sublabel" x="620" y="280" fill="#dc2626" font-weight="700">Fallback 2</text>

  <!-- Primary provider -->
  <rect class="box" x="80" y="315" width="240" height="70" stroke="#059669"/>
  <text class="label" x="200" y="340" text-anchor="middle" fill="#059669">OpenAI (GPT-4)</text>
  <rect class="detail-box" x="95" y="350" width="210" height="25"/>
  <text class="sublabel" x="105" y="367">Best quality, primary choice</text>

  <!-- Fallback 1 -->
  <rect class="box" x="330" y="315" width="240" height="70" stroke="#d97706"/>
  <text class="label" x="450" y="340" text-anchor="middle" fill="#d97706">Anthropic (Claude)</text>
  <rect class="detail-box" x="345" y="350" width="210" height="25"/>
  <text class="sublabel" x="355" y="367">Alternative if OpenAI down</text>

  <!-- Fallback 2 -->
  <rect class="box" x="580" y="315" width="240" height="70" stroke="#dc2626"/>
  <text class="label" x="700" y="340" text-anchor="middle" fill="#dc2626">Self-Hosted (Llama 3)</text>
  <rect class="detail-box" x="595" y="350" width="210" height="25"/>
  <text class="sublabel" x="605" y="367">Last resort, no API dependency</text>

  <!-- Failover logic -->
  <rect x="30" y="415" width="400" height="70" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="sublabel" x="50" y="440"><tspan font-weight="700">Failover Triggers:</tspan> Rate limit exceeded, timeout, API error, cost spike</text>
  <text class="sublabel" x="50" y="460"><tspan font-weight="700">Response Time:</tspan> &lt;1s for health check, &lt;5s for fallback switch</text>
  <text class="sublabel" x="50" y="480"><tspan font-weight="700">Consistency:</tspan> Prompt templates work across all providers</text>

  <!-- Benefits -->
  <rect x="460" y="415" width="410" height="70" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="sublabel" x="480" y="440"><tspan font-weight="700">Benefits:</tspan> 99.99% uptime, cost optimization, no vendor lock-in</text>
  <text class="sublabel" x="480" y="460"><tspan font-weight="700">Trade-off:</tspan> Prompt portability limits, per-provider tuning needed</text>
  <text class="sublabel" x="480" y="480"><tspan font-weight="700">Pattern:</tspan> Circuit breaker + provider-agnostic interface</text>
</svg>