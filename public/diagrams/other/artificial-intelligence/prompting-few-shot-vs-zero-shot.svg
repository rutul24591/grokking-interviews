<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" fill="none">
  <rect width="900" height="520" rx="8" fill="#f9fafb"/>

  <text x="450" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#111827">Zero-Shot vs. Few-Shot Prompting</text>
  <text x="450" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6b7280">How demonstrations transform the model&apos;s understanding of a task</text>

  <!-- Left side: Zero-Shot -->
  <rect x="30" y="80" width="400" height="410" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <text x="230" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#dc2626">Zero-Shot Prompting</text>
  <text x="230" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">No examples — instruction only</text>

  <!-- Zero-shot prompt box -->
  <rect x="50" y="148" width="360" height="120" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="65" y="168" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#374151">System:</text>
  <text x="120" y="168" font-family="system-ui, sans-serif" font-size="11" fill="#374151">You are a text classifier.</text>
  <text x="65" y="190" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#374151">User:</text>
  <text x="115" y="190" font-family="system-ui, sans-serif" font-size="11" fill="#374151">Classify this review: &quot;The product arrived</text>
  <text x="65" y="208" font-family="system-ui, sans-serif" font-size="11" fill="#374151">late but works fine now. Packaging was poor.</text>
  <text x="65" y="226" font-family="system-ui, sans-serif" font-size="11" fill="#374151">Is this positive, negative, or neutral?&quot;</text>
  <text x="65" y="252" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#6366f1">Assistant:</text>
  <text x="145" y="252" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" font-style="italic">Output varies — model interprets</text>
  <text x="145" y="265" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" font-style="italic">task from instruction alone</text>

  <!-- Zero-shot issues -->
  <rect x="50" y="290" width="360" height="180" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="65" y="312" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#dc2626">Characteristics</text>
  <text x="65" y="335" font-family="system-ui, sans-serif" font-size="11" fill="#374151">Highest output variance across identical queries</text>
  <text x="65" y="355" font-family="system-ui, sans-serif" font-size="11" fill="#374151">Lowest token consumption — fastest and cheapest</text>
  <text x="65" y="375" font-family="system-ui, sans-serif" font-size="11" fill="#374151">No format enforcement — output structure inconsistent</text>
  <text x="65" y="395" font-family="system-ui, sans-serif" font-size="11" fill="#374151">Works well for common tasks seen during pre-training</text>
  <text x="65" y="415" font-family="system-ui, sans-serif" font-size="11" fill="#374151">Fails on domain-specific or novel task patterns</text>
  <text x="65" y="435" font-family="system-ui, sans-serif" font-size="11" fill="#374151">Sensitive to minor wording changes in instruction</text>
  <text x="65" y="455" font-family="system-ui, sans-serif" font-size="11" fill="#374151">No demonstration of edge-case handling</text>

  <!-- Right side: Few-Shot -->
  <rect x="470" y="80" width="400" height="410" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
  <text x="670" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#16a34a">Few-Shot Prompting</text>
  <text x="670" y="128" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280">With demonstrations — pattern established</text>

  <!-- Few-shot prompt box -->
  <rect x="490" y="148" width="360" height="200" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
  <text x="505" y="168" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#374151">System:</text>
  <text x="560" y="168" font-family="system-ui, sans-serif" font-size="11" fill="#374151">You are a text classifier.</text>
  <text x="505" y="188" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#059669">Example 1:</text>
  <text x="580" y="188" font-family="system-ui, sans-serif" font-size="10" fill="#374151">&quot;Love this product!&quot; -&gt; POSITIVE</text>
  <text x="505" y="208" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#059669">Example 2:</text>
  <text x="580" y="208" font-family="system-ui, sans-serif" font-size="10" fill="#374151">&quot;Broke after one day&quot; -&gt; NEGATIVE</text>
  <text x="505" y="228" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#059669">Example 3:</text>
  <text x="580" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#374151">&quot;It works, nothing special&quot; -&gt; NEUTRAL</text>
  <text x="505" y="252" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#374151">User:</text>
  <text x="545" y="252" font-family="system-ui, sans-serif" font-size="11" fill="#374151">&quot;Arrived late but works fine.&quot;</text>
  <text x="505" y="278" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#6366f1">Assistant:</text>
  <text x="575" y="278" font-family="system-ui, sans-serif" font-size="10" fill="#111827" font-weight="bold">NEUTRAL</text>
  <text x="505" y="300" font-family="system-ui, sans-serif" font-size="10" fill="#059669" font-weight="bold">Consistent format, low variance</text>
  <text x="505" y="315" font-family="system-ui, sans-serif" font-size="10" fill="#059669" font-weight="bold">Clear output pattern from demos</text>

  <!-- Few-shot benefits -->
  <rect x="490" y="360" width="360" height="110" rx="8" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="505" y="382" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#16a34a">Characteristics</text>
  <text x="505" y="405" font-family="system-ui, sans-serif" font-size="11" fill="#374151">Low output variance — consistent format</text>
  <text x="505" y="425" font-family="system-ui, sans-serif" font-size="11" fill="#374151">Higher token cost — each example adds tokens</text>
  <text x="505" y="445" font-family="system-ui, sans-serif" font-size="11" fill="#374151">Format enforcement through demonstration</text>
  <text x="505" y="465" font-family="system-ui, sans-serif" font-size="11" fill="#374151">Requires curation and maintenance of demo sets</text>

  <!-- Comparison arrow in middle -->
  <rect x="430" y="260" width="40" height="40" rx="20" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="450" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#6b7280">&#x2192;</text>

  <!-- Key insight box at bottom -->
  <rect x="180" y="500" width="540" height="0" rx="0" fill="none" stroke="none"/>
</svg>
