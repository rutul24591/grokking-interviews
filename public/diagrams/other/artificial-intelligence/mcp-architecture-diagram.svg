<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
    .box-host { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 8; }
    .dark .box-host { fill: #2e1065; stroke: #a78bfa; }
    .box-protocol { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
    .dark .box-protocol { fill: #451a03; stroke: #fbbf24; }
    .box-server { fill: #d1fae5; stroke: #059669; stroke-width: 2; rx: 8; }
    .dark .box-server { fill: #064e3b; stroke: #34d399; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">MCP Architecture</text>

  <!-- Host -->
  <rect class="box-host" x="30" y="80" width="220" height="340"/>
  <text class="label" x="140" y="110" text-anchor="middle">MCP Host</text>
  <rect class="detail-box" x="45" y="125" width="190" height="35"/>
  <text class="sublabel" x="55" y="145">Claude Desktop / IDE Plugin</text>
  <rect class="detail-box" x="45" y="170" width="190" height="50"/>
  <text class="sublabel" x="55" y="190">Connects to MCP servers</text>
  <text class="sublabel" x="55" y="208">Discovers capabilities</text>
  <rect class="detail-box" x="45" y="230" width="190" height="50"/>
  <text class="sublabel" x="55" y="250">Routes tool calls to servers</text>
  <text class="sublabel" x="55" y="268">Returns results to LLM</text>
  <rect class="detail-box" x="45" y="290" width="190" height="50"/>
  <text class="sublabel" x="55" y="310">Manages tool list for LLM</text>
  <text class="sublabel" x="55" y="328">Handles errors &amp; retries</text>
  <rect class="detail-box" x="45" y="350" width="190" height="35"/>
  <text class="sublabel" x="55" y="370">LLM (GPT-4, Claude, etc.)</text>

  <!-- Protocol -->
  <rect class="box-protocol" x="290" y="180" width="320" height="140"/>
  <text class="label" x="450" y="210" text-anchor="middle">MCP Protocol (JSON-RPC)</text>
  <rect class="detail-box" x="305" y="225" width="290" height="80"/>
  <text class="sublabel" x="320" y="245">resources/list, resources/read</text>
  <text class="sublabel" x="320" y="265">tools/list, tools/call</text>
  <text class="sublabel" x="320" y="285">prompts/list, prompts/get</text>
  <text class="sublabel" x="320" y="305">initialize, initialized, ping</text>

  <text class="sublabel" x="450" y="340" text-anchor="middle">Transport: stdio (local) or HTTP/SSE (remote)</text>

  <!-- Servers -->
  <rect class="box-server" x="650" y="70" width="220" height="100"/>
  <text class="label" x="760" y="95" text-anchor="middle">MCP Server 1</text>
  <rect class="detail-box" x="665" y="110" width="190" height="45"/>
  <text class="sublabel" x="675" y="128">Database connector</text>
  <text class="sublabel" x="675" y="145">Resources: db tables</text>

  <rect class="box-server" x="650" y="195" width="220" height="100"/>
  <text class="label" x="760" y="220" text-anchor="middle">MCP Server 2</text>
  <rect class="detail-box" x="665" y="235" width="190" height="45"/>
  <text class="sublabel" x="675" y="253">File system access</text>
  <text class="sublabel" x="675" y="270">Resources: files, dirs</text>

  <rect class="box-server" x="650" y="320" width="220" height="100"/>
  <text class="label" x="760" y="345" text-anchor="middle">MCP Server 3</text>
  <rect class="detail-box" x="665" y="360" width="190" height="45"/>
  <text class="sublabel" x="675" y="378">Web search API</text>
  <text class="sublabel" x="675" y="395">Tools: search, fetch</text>

  <!-- Arrows -->
  <path class="arrow" d="M250 250 L290 250"/>
  <polygon points="290,250 282,245 282,255" fill="#6366f1"/>

  <path class="arrow" d="M610 120 L650 120"/>
  <polygon points="650,120 642,115 642,125" fill="#6366f1"/>
  <path class="arrow" d="M610 250 L650 250"/>
  <polygon points="650,250 642,245 642,255" fill="#6366f1"/>
  <path class="arrow" d="M610 370 L650 370"/>
  <polygon points="650,370 642,365 642,375" fill="#6366f1"/>

  <!-- Annotations -->
  <text class="sublabel" x="450" y="460" text-anchor="middle" font-weight="700" fill="#6366f1">One protocol, any host, any server — composable AI tool ecosystem</text>
</svg>