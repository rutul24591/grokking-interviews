<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .s-prim { stroke: #7c3aed; }
    .dark .s-prim { fill: #2e1065; stroke: #a78bfa; }
    .s-comp { stroke: #2563eb; }
    .dark .s-comp { fill: #1e3a5f; stroke: #60a5fa; }
    .s-domain { stroke: #059669; }
    .dark .s-domain { fill: #064e3b; stroke: #34d399; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Skill Composition Hierarchy</text>

  <!-- Level 1: Primitive Skills -->
  <text class="label" x="450" y="80" text-anchor="middle" fill="#7c3aed">Level 1: Primitive Skills (Tool Calls)</text>
  <rect class="box s-prim" x="30" y="100" width="120" height="40"/>
  <text class="sublabel" x="90" y="125" text-anchor="middle">query_db()</text>
  <rect class="box s-prim" x="170" y="100" width="120" height="40"/>
  <text class="sublabel" x="230" y="125" text-anchor="middle">format_json()</text>
  <rect class="box s-prim" x="310" y="100" width="120" height="40"/>
  <text class="sublabel" x="370" y="125" text-anchor="middle">generate_chart()</text>
  <rect class="box s-prim" x="450" y="100" width="120" height="40"/>
  <text class="sublabel" x="510" y="125" text-anchor="middle">send_email()</text>
  <rect class="box s-prim" x="590" y="100" width="120" height="40"/>
  <text class="sublabel" x="650" y="125" text-anchor="middle">run_tests()</text>
  <rect class="box s-prim" x="730" y="100" width="120" height="40"/>
  <text class="sublabel" x="790" y="125" text-anchor="middle">deploy()</text>

  <!-- Arrows from primitive to composite -->
  <path d="M90 140 L90 220 L200 220" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M230 140 L230 220 L200 220" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M370 140 L370 220 L200 220" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M510 140 L510 220 L200 220" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M650 140 L650 220 L650 220" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M790 140 L790 220 L650 220" fill="none" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Level 2: Composite Skills -->
  <text class="label" x="450" y="240" text-anchor="middle" fill="#2563eb">Level 2: Composite Skills (Orchestrated Workflows)</text>
  <rect class="box s-comp" x="60" y="260" width="280" height="50"/>
  <text class="label" x="200" y="280" text-anchor="middle">generate_report()</text>
  <text class="sublabel" x="75" y="300">query_db → format_json → generate_chart → send_email</text>

  <rect class="box s-comp" x="510" y="260" width="280" height="50"/>
  <text class="label" x="650" y="280" text-anchor="middle">deploy_application()</text>
  <text class="sublabel" x="525" y="300">run_tests → deploy → run_smoke_tests</text>

  <!-- Arrows from composite to domain -->
  <path d="M200 310 L200 380 L450 380" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  <path d="M650 310 L650 380 L450 380" fill="none" stroke="#2563eb" stroke-width="1.5"/>

  <!-- Level 3: Domain Skills -->
  <text class="label" x="450" y="400" text-anchor="middle" fill="#059669">Level 3: Domain Skills (End-to-End Capabilities)</text>
  <rect class="box s-domain" x="310" y="415" width="280" height="55"/>
  <text class="label" x="450" y="435" text-anchor="middle">operations_assistant()</text>
  <text class="sublabel" x="325" y="455">generate_report | deploy_application | monitor | troubleshoot</text>

  <!-- Left annotation -->
  <text class="label" x="15" y="200" font-size="10" fill="#999" font-weight="700" transform="rotate(-90,15,200)">Abstraction →</text>
</svg>