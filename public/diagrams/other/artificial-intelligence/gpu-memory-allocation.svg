<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 1.5; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">GPU Memory Allocation for Model Serving</text>

  <!-- Single GPU memory layout -->
  <text class="label" x="225" y="80" text-anchor="middle">Single A100 80GB — Memory Layout</text>

  <rect x="30" y="100" width="390" height="350" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

  <!-- Model weights -->
  <rect x="50" y="120" width="350" height="80" rx="4" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text class="sublabel" x="70" y="145" font-weight="700" fill="#7c3aed">Model Weights (INT4 Quantized)</text>
  <text class="sublabel" x="70" y="165">70B params × 0.5 bytes = 35 GB</text>
  <text class="sublabel" x="70" y="185">Tensor parallelism: split across 2 GPUs</text>
  <text class="sublabel" x="360" y="165" text-anchor="end" font-weight="700" font-size="14">35 GB</text>

  <!-- KV Cache -->
  <rect x="50" y="210" width="350" height="100" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text class="sublabel" x="70" y="235" font-weight="700" fill="#2563eb">KV Cache (per concurrent request)</text>
  <text class="sublabel" x="70" y="255">8K context: ~1.25 GB/request</text>
  <text class="sublabel" x="70" y="275">32K context: ~5 GB/request</text>
  <text class="sublabel" x="70" y="295">128K context: ~20 GB/request</text>
  <text class="sublabel" x="360" y="265" text-anchor="end" font-weight="700" font-size="14">1-20 GB</text>

  <!-- Activations -->
  <rect x="50" y="320" width="350" height="50" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="sublabel" x="70" y="340" font-weight="700" fill="#059669">Activations (temporary)</text>
  <text class="sublabel" x="70" y="358">~5-8 GB during forward pass</text>
  <text class="sublabel" x="360" y="349" text-anchor="end" font-weight="700" font-size="14">~8 GB</text>

  <!-- Concurrent request capacity -->
  <rect x="50" y="380" width="350" height="55" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text class="sublabel" x="70" y="400" font-weight="700" fill="#d97706">Concurrent Request Capacity</text>
  <text class="sublabel" x="70" y="420">Available: 80 - 35 - 8 = 37 GB → at 8K context: 29 requests</text>
  <text class="sublabel" x="360" y="420" text-anchor="end" font-weight="700" font-size="14">29 req</text>

  <!-- Multi-GPU serving -->
  <text class="label" x="675" y="80" text-anchor="middle">Multi-GPU Serving Architecture</text>

  <!-- GPU 0 -->
  <rect x="460" y="100" width="190" height="150" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="sublabel" x="555" y="120" text-anchor="middle" font-weight="700">GPU 0 (A100)</text>
  <rect x="475" y="130" width="160" height="30" rx="3" fill="#ede9fe"/>
  <text class="sublabel" x="555" y="149" text-anchor="middle">Weights (half)</text>
  <rect x="475" y="170" width="160" height="30" rx="3" fill="#dbeafe"/>
  <text class="sublabel" x="555" y="189" text-anchor="middle">KV Cache</text>
  <rect x="475" y="210" width="160" height="30" rx="3" fill="#d1fae5"/>
  <text class="sublabel" x="555" y="229" text-anchor="middle">Activations</text>

  <!-- GPU 1 -->
  <rect x="670" y="100" width="190" height="150" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="sublabel" x="765" y="120" text-anchor="middle" font-weight="700">GPU 1 (A100)</text>
  <rect x="685" y="130" width="160" height="30" rx="3" fill="#ede9fe"/>
  <text class="sublabel" x="765" y="149" text-anchor="middle">Weights (half)</text>
  <rect x="685" y="170" width="160" height="30" rx="3" fill="#dbeafe"/>
  <text class="sublabel" x="765" y="189" text-anchor="middle">KV Cache</text>
  <rect x="685" y="210" width="160" height="30" rx="3" fill="#d1fae5"/>
  <text class="sublabel" x="765" y="229" text-anchor="middle">Activations</text>

  <!-- NVLink -->
  <rect x="650" y="150" width="20" height="60" rx="4" fill="#7c3aed"/>
  <text class="sublabel" x="660" y="185" text-anchor="middle" fill="white" font-weight="700" font-size="8">NV</text>

  <!-- Throughput comparison -->
  <rect x="460" y="280" width="400" height="190" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="1"/>
  <text class="label" x="660" y="305" text-anchor="middle">Throughput by Quantization Level</text>

  <text class="sublabel" x="480" y="330" font-weight="700">Config</text>
  <text class="sublabel" x="580" y="330" font-weight="700">VRAM</text>
  <text class="sublabel" x="680" y="330" font-weight="700">Max req/s</text>
  <text class="sublabel" x="780" y="330" font-weight="700">Quality</text>

  <text class="sublabel" x="480" y="355">FP16 (no quant)</text>
  <text class="sublabel" x="580" y="355">140 GB</text>
  <text class="sublabel" x="680" y="355">~8</text>
  <text class="sublabel" x="780" y="355">100%</text>

  <text class="sublabel" x="480" y="380">INT8</text>
  <text class="sublabel" x="580" y="380">70 GB</text>
  <text class="sublabel" x="680" y="380">~15</text>
  <text class="sublabel" x="780" y="380">~99%</text>

  <text class="sublabel" x="480" y="405">INT4 (GGUF)</text>
  <text class="sublabel" x="580" y="405">35 GB</text>
  <text class="sublabel" x="680" y="405">~29</text>
  <text class="sublabel" x="780" y="405">~97%</text>

  <text class="sublabel" x="480" y="430">FP8 (emerging)</text>
  <text class="sublabel" x="580" y="430">70 GB</text>
  <text class="sublabel" x="680" y="430">~18</text>
  <text class="sublabel" x="780" y="430">~99.5%</text>

  <text class="sublabel" x="660" y="460" text-anchor="middle" font-weight="700">INT4 doubles throughput vs FP16 with &lt;3% quality loss</text>
</svg>