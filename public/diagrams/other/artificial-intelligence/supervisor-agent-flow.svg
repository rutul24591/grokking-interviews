<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .c-super { stroke: #7c3aed; }
    .dark .c-super { fill: #2e1065; stroke: #a78bfa; }
    .c-spec { stroke: #059669; }
    .dark .c-spec { fill: #064e3b; stroke: #34d399; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 1.5; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Supervisor Agent Flow</text>

  <!-- Supervisor -->
  <rect class="box c-super" x="350" y="60" width="200" height="60"/>
  <text class="label" x="450" y="85" text-anchor="middle">Supervisor Agent</text>
  <rect class="detail-box" x="365" y="95" width="170" height="18"/>
  <text class="sublabel" x="375" y="108">Receives goal, plans, delegates</text>

  <!-- Arrows down to specialists -->
  <path d="M380 120 L130 180" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M420 120 L290 180" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M480 120 L610 180" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M520 120 L770 180" fill="none" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Specialists -->
  <rect class="box c-spec" x="50" y="185" width="160" height="70"/>
  <text class="label" x="130" y="210" text-anchor="middle">Research Agent</text>
  <rect class="detail-box" x="65" y="220" width="130" height="25"/>
  <text class="sublabel" x="75" y="237">Task: Gather data</text>

  <rect class="box c-spec" x="230" y="185" width="160" height="70"/>
  <text class="label" x="310" y="210" text-anchor="middle">Analysis Agent</text>
  <rect class="detail-box" x="245" y="220" width="130" height="25"/>
  <text class="sublabel" x="255" y="237">Task: Analyze data</text>

  <rect class="box c-spec" x="550" y="185" width="160" height="70"/>
  <text class="label" x="630" y="210" text-anchor="middle">Review Agent</text>
  <rect class="detail-box" x="565" y="220" width="130" height="25"/>
  <text class="sublabel" x="575" y="237">Task: Verify quality</text>

  <rect class="box c-spec" x="700" y="185" width="160" height="70"/>
  <text class="label" x="780" y="210" text-anchor="middle">Writer Agent</text>
  <rect class="detail-box" x="715" y="220" width="130" height="25"/>
  <text class="sublabel" x="725" y="237">Task: Write report</text>

  <!-- Results flowing back -->
  <path d="M130 255 L130 320 L450 320" fill="none" stroke="#059669" stroke-width="1.5"/>
  <path d="M310 255 L310 300 L450 300" fill="none" stroke="#059669" stroke-width="1.5"/>
  <path d="M630 255 L630 300 L450 300" fill="none" stroke="#059669" stroke-width="1.5"/>
  <path d="M780 255 L780 320 L450 320" fill="none" stroke="#059669" stroke-width="1.5"/>

  <!-- Synthesis -->
  <rect class="box c-super" x="350" y="330" width="200" height="60"/>
  <text class="label" x="450" y="355" text-anchor="middle">Synthesis &amp; Validation</text>
  <rect class="detail-box" x="365" y="365" width="170" height="18"/>
  <text class="sublabel" x="375" y="378">Combine results, check quality</text>

  <path class="arrow" d="M450 390 L450 430"/>
  <polygon points="450,430 445,420 455,420" fill="#6366f1"/>

  <!-- Output -->
  <rect x="350" y="435" width="200" height="45" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text class="label" x="450" y="463" text-anchor="middle">Final Output to User</text>

  <!-- Annotations -->
  <rect x="20" y="300" width="130" height="170" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="85" y="325" text-anchor="middle">Supervisor Role</text>
  <text class="sublabel" x="30" y="348">1. Receive goal</text>
  <text class="sublabel" x="30" y="366">2. Decompose into tasks</text>
  <text class="sublabel" x="30" y="384">3. Assign to specialists</text>
  <text class="sublabel" x="30" y="402">4. Monitor progress</text>
  <text class="sublabel" x="30" y="420">5. Handle failures</text>
  <text class="sublabel" x="30" y="438">6. Combine results</text>
  <text class="sublabel" x="30" y="456">7. Validate &amp; deliver</text>
</svg>