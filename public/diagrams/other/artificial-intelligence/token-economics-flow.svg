<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
    .box-input { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 8; }
    .dark .box-input { fill: #2e1065; stroke: #a78bfa; }
    .box-tokenize { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .dark .box-tokenize { fill: #1e3a5f; stroke: #60a5fa; }
    .box-cost { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
    .dark .box-cost { fill: #451a03; stroke: #fbbf24; }
    .box-optimize { fill: #d1fae5; stroke: #059669; stroke-width: 2; rx: 8; }
    .dark .box-optimize { fill: #064e3b; stroke: #34d399; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .cost-red { fill: #dc2626; font-weight: 700; }
    .savings-green { fill: #059669; font-weight: 700; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Token Economics &amp; Cost Flow</text>

  <!-- Flow: Input Text -> Tokenize -> Count -> Cost -->
  <rect class="box-input" x="20" y="70" width="180" height="100"/>
  <text class="label" x="110" y="100" text-anchor="middle">Input Text</text>
  <rect class="detail-box" x="35" y="115" width="150" height="45"/>
  <text class="sublabel" x="45" y="133">System prompt + context</text>
  <text class="sublabel" x="45" y="150">User message</text>

  <path class="arrow" d="M200 120 L240 120"/>
  <polygon points="240,120 232,115 232,125" fill="#6366f1"/>

  <rect class="box-tokenize" x="250" y="70" width="180" height="100"/>
  <text class="label" x="340" y="100" text-anchor="middle">Tokenization</text>
  <rect class="detail-box" x="265" y="115" width="150" height="45"/>
  <text class="sublabel" x="275" y="133">BPE / WordPiece / SP</text>
  <text class="sublabel" x="275" y="150">Exact tokenizer matters</text>

  <path class="arrow" d="M430 120 L470 120"/>
  <polygon points="470,120 462,115 462,125" fill="#6366f1"/>

  <rect class="box-cost" x="480" y="70" width="180" height="100"/>
  <text class="label" x="570" y="100" text-anchor="middle">Token Count &amp; Cost</text>
  <rect class="detail-box" x="495" y="115" width="150" height="45"/>
  <text class="sublabel" x="505" y="133">Input: N tokens × $X/M</text>
  <text class="sublabel" x="505" y="150">Output: M tokens × $Y/M</text>

  <path class="arrow" d="M660 120 L700 120"/>
  <polygon points="700,120 692,115 692,125" fill="#6366f1"/>

  <rect class="box-optimize" x="710" y="70" width="170" height="100"/>
  <text class="label" x="795" y="100" text-anchor="middle">Optimization</text>
  <rect class="detail-box" x="725" y="115" width="140" height="45"/>
  <text class="sublabel" x="735" y="133">Prompt compression</text>
  <text class="sublabel" x="735" y="150">Response caching</text>

  <!-- Bottom: Cost breakdown -->
  <rect x="20" y="210" width="860" height="270" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="450" y="240" text-anchor="middle">Token Cost Breakdown per 1M Tokens (2024 Pricing)</text>

  <!-- GPT-4o -->
  <rect x="40" y="260" width="260" height="80" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text class="label" x="170" y="285" text-anchor="middle">GPT-4o</text>
  <text class="sublabel" x="60" y="305">Input: $2.50/M tokens</text>
  <text class="sublabel" x="60" y="325">Output: $10.00/M tokens</text>

  <!-- Claude Sonnet -->
  <rect x="320" y="260" width="260" height="80" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text class="label" x="450" y="285" text-anchor="middle">Claude 3.5 Sonnet</text>
  <text class="sublabel" x="340" y="305">Input: $3.00/M tokens</text>
  <text class="sublabel" x="340" y="325">Output: $15.00/M tokens</text>

  <!-- Llama 3 70B -->
  <rect x="600" y="260" width="260" height="80" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text class="label" x="730" y="285" text-anchor="middle">Llama 3 70B (API)</text>
  <text class="sublabel" x="620" y="305">Input: $0.90/M tokens</text>
  <text class="sublabel" x="620" y="325">Output: $0.90/M tokens</text>

  <!-- Optimization impact -->
  <rect x="40" y="370" width="820" height="90" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="label" x="450" y="395" text-anchor="middle">Optimization Impact — Example: 10K requests/day, avg 2K tokens/request</text>
  <text class="sublabel" x="60" y="420">Without optimization: 20M tokens/day x $2.50/M = </text>
  <text x="420" y="420">
    <tspan class="cost-red">$50.00/day = $18,250/year</tspan>
  </text>
  <text class="sublabel" x="60" y="445">With 40% token reduction: 12M tokens/day x $2.50/M = </text>
  <text x="420" y="445">
    <tspan class="savings-green">$30.00/day = $10,950/year (Save $7,300)</tspan>
  </text>
</svg>