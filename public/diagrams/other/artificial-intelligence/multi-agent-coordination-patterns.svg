<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 1.5; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Multi-Agent Coordination Patterns</text>

  <!-- Supervisor pattern -->
  <text class="label" x="150" y="85" text-anchor="middle" fill="#7c3aed">Supervisor Pattern</text>
  <rect x="30" y="100" width="240" height="180" rx="8" fill="#f8f9fa" stroke="#7c3aed" stroke-width="1"/>
  <!-- Supervisor node -->
  <rect x="80" y="115" width="100" height="35" rx="4" fill="#ede9fe" stroke="#7c3aed"/>
  <text class="sublabel" x="130" y="137" text-anchor="middle" font-weight="700">Supervisor</text>
  <!-- Worker nodes -->
  <path d="M100 150 L50 190" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M130 150 L130 190" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M160 150 L210 190" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="20" y="195" width="60" height="30" rx="3" fill="#dbeafe" stroke="#2563eb"/>
  <text class="sublabel" x="50" y="214" text-anchor="middle">Worker 1</text>
  <rect x="100" y="195" width="60" height="30" rx="3" fill="#d1fae5" stroke="#059669"/>
  <text class="sublabel" x="130" y="214" text-anchor="middle">Worker 2</text>
  <rect x="180" y="195" width="60" height="30" rx="3" fill="#fef3c7" stroke="#d97706"/>
  <text class="sublabel" x="210" y="214" text-anchor="middle">Worker 3</text>
  <!-- Results back up -->
  <path d="M50 225 L50 250 L130 250 L130 240" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M130 225 L130 240" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M210 225 L210 250 L130 250" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,2"/>
  <text class="sublabel" x="150" y="275" text-anchor="middle">Centralized control, single point</text>

  <!-- Consensus pattern -->
  <text class="label" x="450" y="85" text-anchor="middle" fill="#2563eb">Consensus Pattern</text>
  <rect x="330" y="100" width="240" height="180" rx="8" fill="#f8f9fa" stroke="#2563eb" stroke-width="1"/>
  <!-- Triangle of agents -->
  <rect x="380" y="115" width="60" height="30" rx="3" fill="#ede9fe" stroke="#7c3aed"/>
  <text class="sublabel" x="410" y="134" text-anchor="middle" font-weight="700">Agent A</text>
  <rect x="470" y="115" width="60" height="30" rx="3" fill="#d1fae5" stroke="#059669"/>
  <text class="sublabel" x="500" y="134" text-anchor="middle" font-weight="700">Agent B</text>
  <rect x="425" y="170" width="60" height="30" rx="3" fill="#fef3c7" stroke="#d97706"/>
  <text class="sublabel" x="455" y="189" text-anchor="middle" font-weight="700">Agent C</text>
  <!-- Communication links -->
  <path d="M440 145 L455 170" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  <path d="M470 145 L485 170" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  <path d="M440 130 L470 130" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  <text class="sublabel" x="450" y="225" text-anchor="middle">All agents → vote → majority wins</text>
  <text class="sublabel" x="450" y="245" text-anchor="middle">Higher accuracy, more cost</text>
  <text class="sublabel" x="450" y="270" text-anchor="middle">3x LLM calls, 2-of-3 agreement</text>

  <!-- Debate pattern -->
  <text class="label" x="750" y="85" text-anchor="middle" fill="#059669">Debate Pattern</text>
  <rect x="630" y="100" width="240" height="180" rx="8" fill="#f8f9fa" stroke="#059669" stroke-width="1"/>
  <!-- Debate structure -->
  <rect x="660" y="115" width="80" height="30" rx="3" fill="#fee2e2" stroke="#dc2626"/>
  <text class="sublabel" x="700" y="134" text-anchor="middle" font-weight="700">Proposer</text>
  <rect x="760" y="115" width="80" height="30" rx="3" fill="#dbeafe" stroke="#2563eb"/>
  <text class="sublabel" x="800" y="134" text-anchor="middle" font-weight="700">Critic</text>
  <path d="M740 130 L760 130" fill="none" stroke="#059669" stroke-width="2"/>
  <path d="M760 135 L740 135" fill="none" stroke="#059669" stroke-width="2"/>
  <text class="sublabel" x="750" y="170" text-anchor="middle" font-size="9">Round 1: propose → critique</text>
  <path d="M740 175 L760 175" fill="none" stroke="#059669" stroke-width="2"/>
  <path d="M760 180 L740 180" fill="none" stroke="#059669" stroke-width="2"/>
  <text class="sublabel" x="750" y="200" text-anchor="middle" font-size="9">Round 2: revise → critique</text>
  <path d="M740 220 L760 220" fill="none" stroke="#059669" stroke-width="2"/>
  <path d="M760 225 L740 225" fill="none" stroke="#059669" stroke-width="2"/>
  <text class="sublabel" x="750" y="245" text-anchor="middle" font-size="9">Round 3: final → verdict</text>
  <rect x="680" y="255" width="100" height="20" rx="3" fill="#d1fae5" stroke="#059669"/>
  <text class="sublabel" x="730" y="269" text-anchor="middle" font-weight="700">Judge → Output</text>

  <!-- Comparison table -->
  <rect x="30" y="310" width="840" height="170" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="450" y="335" text-anchor="middle">Pattern Comparison</text>

  <text class="sublabel" x="50" y="360"><tspan font-weight="700">Supervisor:</tspan> Best for complex workflows with clear task decomposition</text>
  <text class="sublabel" x="50" y="378">• Cost: 1x LLM calls | Quality: Depends on supervisor | Speed: Sequential</text>

  <text class="sublabel" x="50" y="400"><tspan font-weight="700">Consensus:</tspan> Best for high-stakes decisions requiring maximum accuracy</text>
  <text class="sublabel" x="50" y="418">• Cost: 3-5x LLM calls | Quality: Highest | Speed: Parallel (fastest)</text>

  <text class="sublabel" x="50" y="440"><tspan font-weight="700">Debate:</tspan> Best for complex reasoning where adversarial thinking helps</text>
  <text class="sublabel" x="50" y="458">• Cost: 2x per round | Quality: Very High | Speed: Sequential rounds</text>
  <text class="sublabel" x="450" y="475" text-anchor="middle" font-weight="700">Recommendation: Start with Supervisor, add Consensus for critical decisions, use Debate for complex reasoning tasks</text>
</svg>