<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .c-req { stroke: #7c3aed; }
    .dark .c-req { fill: #2e1065; stroke: #a78bfa; }
    .c-grant { stroke: #059669; }
    .dark .c-grant { fill: #064e3b; stroke: #34d399; }
    .c-deny { stroke: #dc2626; }
    .dark .c-deny { fill: #450a0a; stroke: #f87171; }
    .c-active { stroke: #2563eb; }
    .dark .c-active { fill: #1e3a5f; stroke: #60a5fa; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
    .check { fill: #059669; }
    .cross { fill: #dc2626; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Plug-In Capability Negotiation</text>

  <!-- Step 1: Plug-in declares -->
  <rect class="box c-req" x="30" y="80" width="260" height="140"/>
  <text class="label" x="160" y="105" text-anchor="middle">1. Plug-In Declares Permissions</text>
  <rect class="detail-box" x="45" y="115" width="230" height="90"/>
  <text class="sublabel" x="55" y="133">Manifest requests:</text>
  <text class="sublabel" x="55" y="153">✓ Read database (read-only)</text>
  <text class="sublabel" x="55" y="173">✓ Send emails (templated only)</text>
  <text class="sublabel" x="55" y="193">✓ Web search (allowlisted APIs)</text>
  <text class="sublabel" x="55" y="213">✗ Execute arbitrary code</text>

  <path class="arrow" d="M290 150 L340 150"/>
  <polygon points="340,150 332,145 332,155" fill="#6366f1"/>

  <!-- Step 2: User reviews -->
  <rect class="box" x="350" y="80" width="200" height="140" stroke="#d97706"/>
  <text class="label" x="450" y="105" text-anchor="middle">2. User Reviews</text>
  <rect class="detail-box" x="365" y="115" width="170" height="90"/>
  <text class="sublabel" x="375" y="133">Permission prompt shown:</text>
  <text class="sublabel" x="375" y="153">"GitHub Plugin wants:"</text>
  <text class="sublabel" x="375" y="173">☑ Read your repositories</text>
  <text class="sublabel" x="375" y="193">☑ Create issues on your behalf</text>
  <text class="sublabel" x="375" y="213">☐ Delete repositories</text>

  <path class="arrow" d="M550 150 L600 150"/>
  <polygon points="600,150 592,145 592,155" fill="#6366f1"/>

  <!-- Step 3: Grant/Deny -->
  <rect class="box c-grant" x="610" y="80" width="120" height="65"/>
  <text class="label" x="670" y="105" text-anchor="middle">Granted</text>
  <rect class="detail-box" x="625" y="115" width="90" height="20"/>
  <text class="sublabel" x="635" y="129">Read repos ✓</text>

  <rect class="box c-deny" x="610" y="155" width="120" height="65"/>
  <text class="label" x="670" y="180" text-anchor="middle">Denied</text>
  <rect class="detail-box" x="625" y="190" width="90" height="20"/>
  <text class="sublabel" x="635" y="204">Delete repos ✗</text>

  <path d="M670 145 L670 260 L560 260" fill="none" stroke="#059669" stroke-width="1.5"/>
  <path d="M670 220 L670 260 L560 260" fill="none" stroke="#dc2626" stroke-width="1.5"/>

  <!-- Step 4: Activated with granted perms only -->
  <rect class="box c-active" x="350" y="270" width="200" height="100"/>
  <text class="label" x="450" y="295" text-anchor="middle">3. Activated with Granted Perms</text>
  <rect class="detail-box" x="365" y="305" width="170" height="50"/>
  <text class="sublabel" x="375" y="323">Active permissions:</text>
  <text class="sublabel" x="375" y="343">✓ Read repos, Create issues</text>

  <!-- Result annotation -->
  <rect x="30" y="270" width="290" height="100" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="label" x="175" y="295" text-anchor="middle">Result: Principle of Least Privilege</text>
  <text class="sublabel" x="45" y="318">Plug-in runs with ONLY granted permissions</text>
  <text class="sublabel" x="45" y="336">Denied permissions enforced at execution time</text>
  <text class="sublabel" x="45" y="354">If plug-in attempts denied operation → blocked + logged</text>

  <!-- Right side: Permission tiers -->
  <rect x="600" y="270" width="270" height="200" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="735" y="295" text-anchor="middle">Permission Tiers</text>

  <rect x="615" y="310" width="240" height="45" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="sublabel" x="630" y="328"><tspan font-weight="700">Core (trusted):</tspan> No sandboxing needed</text>
  <text class="sublabel" x="630" y="343">Host team plug-ins, fully audited</text>

  <rect x="615" y="365" width="240" height="45" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text class="sublabel" x="630" y="383"><tspan font-weight="700">Verified (semi-trusted):</tspan> Light sandboxing</text>
  <text class="sublabel" x="630" y="398">Known publishers, automated audit</text>

  <rect x="615" y="420" width="240" height="45" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text class="sublabel" x="630" y="438"><tspan font-weight="700">Community (untrusted):</tspan> Full sandboxing</text>
  <text class="sublabel" x="630" y="453">Any publisher, strict permissions</text>
</svg>