<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .c-pre { stroke: #7c3aed; }
    .dark .c-pre { fill: #2e1065; stroke: #a78bfa; }
    .c-post { stroke: #2563eb; }
    .dark .c-post { fill: #1e3a5f; stroke: #60a5fa; }
    .c-human { stroke: #059669; }
    .dark .c-human { fill: #064e3b; stroke: #34d399; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
    .loop { fill: none; stroke: #f59e0b; stroke-width: 2; stroke-dasharray: 6,3; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">Evaluation Loop Architecture</text>

  <!-- Pre-output checks -->
  <rect class="box c-pre" x="30" y="80" width="260" height="200"/>
  <text class="label" x="160" y="105" text-anchor="middle">Pre-Output Evaluation</text>
  <rect class="detail-box" x="45" y="115" width="230" height="30"/>
  <text class="sublabel" x="55" y="133">Runs on EVERY output before delivery</text>

  <rect class="detail-box" x="45" y="155" width="230" height="110"/>
  <text class="sublabel" x="55" y="173">1. Format Validation (JSON schema)</text>
  <text class="sublabel" x="55" y="191">   Pass: Continue → Fail: Retry with fix prompt</text>
  <text class="sublabel" x="55" y="209">2. Safety Check (content filter)</text>
  <text class="sublabel" x="55" y="227">   Pass: Continue → Fail: Block + escalate</text>
  <text class="sublabel" x="55" y="245">3. Factual Check (RAG cross-reference)</text>
  <text class="sublabel" x="55" y="263">   Pass: Continue → Fail: Flag uncertainty</text>

  <path class="arrow" d="M290 180 L340 180"/>
  <polygon points="340,180 332,175 332,185" fill="#6366f1"/>

  <!-- Output -->
  <rect class="box c-post" x="350" y="100" width="220" height="160"/>
  <text class="label" x="460" y="125" text-anchor="middle">Output Delivery</text>
  <rect class="detail-box" x="365" y="135" width="190" height="110"/>
  <text class="sublabel" x="375" y="153">Formatted response to user</text>
  <text class="sublabel" x="375" y="171">+ Source citations if RAG</text>
  <text class="sublabel" x="375" y="189">+ Confidence score</text>
  <text class="sublabel" x="375" y="207">+ Feedback mechanism (thumbs)</text>
  <text class="sublabel" x="375" y="225">Logged for monitoring</text>

  <path class="arrow" d="M570 180 L620 180"/>
  <polygon points="620,180 612,175 612,185" fill="#6366f1"/>

  <!-- Post-output monitoring -->
  <rect class="box c-human" x="630" y="80" width="240" height="200"/>
  <text class="label" x="750" y="105" text-anchor="middle">Post-Output Monitoring</text>
  <rect class="detail-box" x="645" y="115" width="210" height="30"/>
  <text class="sublabel" x="655" y="133">Continuous collection and analysis</text>

  <rect class="detail-box" x="645" y="155" width="210" height="110"/>
  <text class="sublabel" x="655" y="173">User feedback (thumbs up/down)</text>
  <text class="sublabel" x="655" y="191">Re-query rate (follow-up within 30s)</text>
  <text class="sublabel" x="655" y="209">Human edit distance (corrections)</text>
  <text class="sublabel" x="655" y="227">Escalation rate (human takeover)</text>
  <text class="sublabel" x="655" y="245">Aggregated hourly → dashboard alerts</text>

  <!-- Feedback loop back -->
  <path class="loop" d="M750 280 L750 370 L160 370 L160 280"/>
  <polygon points="160,280 155,290 165,290" fill="#f59e0b"/>

  <!-- Continuous optimization box -->
  <rect x="310" y="330" width="340" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text class="label" x="480" y="355" text-anchor="middle">Continuous Optimization Cycle</text>
  <rect class="detail-box" x="325" y="365" width="310" height="35"/>
  <text class="sublabel" x="335" y="383">Feedback → Benchmark update → Prompt/model tuning → Deploy → Monitor</text>

  <!-- Alert thresholds -->
  <rect x="30" y="440" width="840" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text class="sublabel" x="450" y="465" text-anchor="middle" font-weight="700">Alert Triggers: Satisfaction drops below 80% → investigate. Below 70% → rollback. Error rate above 5% → circuit breaker.</text>
</svg>