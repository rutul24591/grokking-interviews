<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .c-app { stroke: #7c3aed; }
    .dark .c-app { fill: #2e1065; stroke: #a78bfa; }
    .c-model { stroke: #2563eb; }
    .dark .c-model { fill: #1e3a5f; stroke: #60a5fa; }
    .c-user { stroke: #059669; }
    .dark .c-user { fill: #064e3b; stroke: #34d399; }
    .c-infra { stroke: #d97706; }
    .dark .c-infra { fill: #451a03; stroke: #fbbf24; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 1.5; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">AI Observability Telemetry Pipeline</text>

  <!-- Four telemetry sources -->
  <rect class="box c-app" x="30" y="80" width="190" height="100"/>
  <text class="label" x="125" y="105" text-anchor="middle">Application Telemetry</text>
  <rect class="detail-box" x="45" y="115" width="160" height="50"/>
  <text class="sublabel" x="55" y="133">Prompts, responses, tool calls</text>
  <text class="sublabel" x="55" y="150">Error types, retry counts</text>
  <text class="sublabel" x="55" y="167">Session IDs, user context</text>

  <rect class="box c-model" x="250" y="80" width="190" height="100"/>
  <text class="label" x="345" y="105" text-anchor="middle">Model Telemetry</text>
  <rect class="detail-box" x="265" y="115" width="160" height="50"/>
  <text class="sublabel" x="275" y="133">Input/output token counts</text>
  <text class="sublabel" x="275" y="150">Latency (TTFT, total)</text>
  <text class="sublabel" x="275" y="167">Temperature, model version</text>

  <rect class="box c-user" x="470" y="80" width="190" height="100"/>
  <text class="label" x="565" y="105" text-anchor="middle">User Telemetry</text>
  <rect class="detail-box" x="485" y="115" width="160" height="50"/>
  <text class="sublabel" x="495" y="133">Thumbs up/down, ratings</text>
  <text class="sublabel" x="495" y="150">Re-query rate, session length</text>
  <text class="sublabel" x="495" y="167">Edit distance, acceptance rate</text>

  <rect class="box c-infra" x="690" y="80" width="180" height="100"/>
  <text class="label" x="780" y="105" text-anchor="middle">Infra Telemetry</text>
  <rect class="detail-box" x="700" y="115" width="160" height="50"/>
  <text class="sublabel" x="710" y="133">GPU utilization, memory</text>
  <text class="sublabel" x="710" y="150">Network latency, queue depth</text>
  <text class="sublabel" x="710" y="167">Error rates, availability</text>

  <!-- Arrows to processing layer -->
  <path d="M125 180 L125 230 L450 230" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <path d="M345 180 L345 230 L450 230" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <path d="M565 180 L565 230 L450 230" fill="none" stroke="#6366f1" stroke-width="1.5"/>
  <path d="M780 180 L780 230 L450 230" fill="none" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Processing layer -->
  <rect x="30" y="240" width="840" height="80" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text class="label" x="450" y="265" text-anchor="middle">Processing Layer — Aggregation, Enrichment, Storage</text>
  <text class="sublabel" x="100" y="285">Cost calculation (tokens × pricing)</text>
  <text class="sublabel" x="350" y="285">Quality scoring (LLM-as-judge)</text>
  <text class="sublabel" x="600" y="285">Trace correlation (OpenTelemetry)</text>
  <text class="sublabel" x="100" y="305">Metric aggregation (hourly, daily)</text>
  <text class="sublabel" x="350" y="305">Drift detection (statistical tests)</text>
  <text class="sublabel" x="600" y="305">Indexing for fast queries</text>

  <!-- Analysis layer -->
  <path d="M450 320 L450 360"/>
  <rect x="30" y="370" width="270" height="110" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1"/>
  <text class="label" x="165" y="395" text-anchor="middle">Dashboards</text>
  <text class="sublabel" x="45" y="415">Real-time quality metrics</text>
  <text class="sublabel" x="45" y="433">Cost trends and breakdowns</text>
  <text class="sublabel" x="45" y="451">Latency percentiles</text>
  <text class="sublabel" x="45" y="469">User satisfaction trends</text>

  <rect x="315" y="370" width="270" height="110" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text class="label" x="450" y="395" text-anchor="middle">Alerting</text>
  <text class="sublabel" x="330" y="415">Quality drops below threshold</text>
  <text class="sublabel" x="330" y="433">Cost spike detected</text>
  <text class="sublabel" x="330" y="451">Error rate exceeds SLA</text>
  <text class="sublabel" x="330" y="469">Injection attempt spike</text>

  <rect x="600" y="370" width="270" height="110" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text class="label" x="735" y="395" text-anchor="middle">Analytical Queries</text>
  <text class="sublabel" x="615" y="415">Trace exploration and debugging</text>
  <text class="sublabel" x="615" y="433">Root cause analysis</text>
  <text class="sublabel" x="615" y="451">Cost optimization opportunities</text>
  <text class="sublabel" x="615" y="469">Quality regression analysis</text>
</svg>