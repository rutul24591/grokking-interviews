<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
    .box-pretrain { fill: #ede9fe; stroke: #7c3aed; stroke-width: 2; rx: 8; }
    .dark .box-pretrain { fill: #2e1065; stroke: #a78bfa; }
    .box-sft { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 8; }
    .dark .box-sft { fill: #1e3a5f; stroke: #60a5fa; }
    .box-rlhf { fill: #d1fae5; stroke: #059669; stroke-width: 2; rx: 8; }
    .dark .box-rlhf { fill: #064e3b; stroke: #34d399; }
    .box-output { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 8; }
    .dark .box-output { fill: #451a03; stroke: #fbbf24; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">LLM Training Pipeline</text>

  <!-- Phase 1: Pre-training -->
  <rect class="box-pretrain" x="30" y="70" width="250" height="180"/>
  <text class="label" x="155" y="100" text-anchor="middle">Phase 1: Pre-Training</text>
  <rect class="detail-box" x="50" y="115" width="210" height="120"/>
  <text class="sublabel" x="60" y="138">Objective: Next-token prediction</text>
  <text class="sublabel" x="60" y="158">Data: Raw text (web, books, code)</text>
  <text class="sublabel" x="60" y="178">Scale: Trillions of tokens</text>
  <text class="sublabel" x="60" y="198">Compute: Thousands of GPUs</text>
  <text class="sublabel" x="60" y="218">Duration: Months</text>

  <!-- Arrow 1 to 2 -->
  <path class="arrow" d="M290 160 L330 160 L330 160 L350 160"/>
  <polygon points="350,160 340,155 340,165" fill="#6366f1"/>

  <!-- Phase 2: SFT -->
  <rect class="box-sft" x="360" y="70" width="250" height="180"/>
  <text class="label" x="485" y="100" text-anchor="middle">Phase 2: Supervised Fine-Tuning</text>
  <rect class="detail-box" x="380" y="115" width="210" height="120"/>
  <text class="sublabel" x="390" y="138">Objective: Instruction following</text>
  <text class="sublabel" x="390" y="158">Data: Instruction-response pairs</text>
  <text class="sublabel" x="390" y="178">Scale: Millions of examples</text>
  <text class="sublabel" x="390" y="198">Compute: Hundreds of GPUs</text>
  <text class="sublabel" x="390" y="218">Duration: Days to weeks</text>

  <!-- Arrow 2 to 3 -->
  <path class="arrow" d="M620 160 L660 160 L660 160 L680 160"/>
  <polygon points="680,160 670,155 670,165" fill="#6366f1"/>

  <!-- Phase 3: RLHF/DPO -->
  <rect class="box-rlhf" x="690" y="70" width="180" height="180"/>
  <text class="label" x="780" y="100" text-anchor="middle">Phase 3: Alignment</text>
  <rect class="detail-box" x="700" y="115" width="160" height="120"/>
  <text class="sublabel" x="710" y="138">RLHF or DPO</text>
  <text class="sublabel" x="710" y="158">Data: Human preferences</text>
  <text class="sublabel" x="710" y="178">Goal: Helpfulness</text>
  <text class="sublabel" x="710" y="198">Goal: Harmlessness</text>
  <text class="sublabel" x="710" y="218">Goal: Honesty</text>

  <!-- Output box -->
  <rect class="box-output" x="280" y="300" width="340" height="170"/>
  <text class="label" x="450" y="330" text-anchor="middle">Aligned LLM</text>
  <rect class="detail-box" x="300" y="345" width="300" height="110"/>
  <text class="sublabel" x="315" y="368">Capabilities: Language understanding</text>
  <text class="sublabel" x="315" y="388">Capabilities: Reasoning &amp; problem-solving</text>
  <text class="sublabel" x="315" y="408">Capabilities: Code generation</text>
  <text class="sublabel" x="315" y="428">Capabilities: Knowledge retrieval</text>
  <text class="sublabel" x="315" y="448">Behavior: Instruction-following &amp; safe</text>

  <!-- Arrows from phases to output -->
  <path class="arrow" d="M155 250 L155 280 L450 280 L450 300"/>
  <polygon points="450,300 445,290 455,290" fill="#6366f1"/>
  <path class="arrow" d="M485 250 L485 300"/>
  <polygon points="485,300 480,290 490,290" fill="#6366f1"/>
  <path class="arrow" d="M780 250 L780 280 L450 280 L450 300"/>
  <polygon points="450,300 445,290 455,290" fill="#6366f1"/>
</svg>