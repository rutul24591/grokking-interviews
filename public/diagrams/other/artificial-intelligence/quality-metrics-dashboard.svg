<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .bar { rx: 3; }
    .meter-bg { fill: #e5e7eb; rx: 3; }
    .dark .meter-bg { fill: #333355; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">AI Quality Metrics Dashboard</text>

  <!-- Accuracy over time -->
  <text class="label" x="225" y="80" text-anchor="middle">Accuracy Trend</text>
  <!-- Simple line chart representation -->
  <path d="M60 120 L120 115 L180 118 L240 110 L300 105 L360 108 L390 100" fill="none" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="60" cy="120" r="3" fill="#7c3aed"/>
  <circle cx="120" cy="115" r="3" fill="#7c3aed"/>
  <circle cx="180" cy="118" r="3" fill="#7c3aed"/>
  <circle cx="240" cy="110" r="3" fill="#7c3aed"/>
  <circle cx="300" cy="105" r="3" fill="#7c3aed"/>
  <circle cx="360" cy="108" r="3" fill="#7c3aed"/>
  <circle cx="390" cy="100" r="3" fill="#7c3aed"/>
  <text class="sublabel" x="60" y="135">Week 1</text>
  <text class="sublabel" x="360" y="135">Week 7</text>
  <text class="sublabel" x="60" y="150">92% → 96% improving</text>
  <line x1="60" y1="155" x2="390" y2="155" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/>
  <text class="sublabel" x="390" y="155" fill="#dc2626">90% threshold</text>

  <!-- Completeness -->
  <text class="label" x="675" y="80" text-anchor="middle">Completeness Score</text>
  <rect class="meter-bg" x="500" y="100" width="350" height="20"/>
  <rect class="bar" x="500" y="100" width="315" height="20" fill="#2563eb"/>
  <text class="sublabel" x="860" y="115" text-anchor="end" fill="#2563eb" font-weight="700">90%</text>

  <!-- Helpfulness -->
  <text class="label" x="675" y="150" text-anchor="middle">Helpfulness (User Ratings)</text>
  <rect class="meter-bg" x="500" y="170" width="350" height="20"/>
  <rect class="bar" x="500" y="170" width="298" height="20" fill="#059669"/>
  <text class="sublabel" x="860" y="185" text-anchor="end" fill="#059669" font-weight="700">85%</text>

  <!-- Safety -->
  <text class="label" x="675" y="220" text-anchor="middle">Safety Compliance</text>
  <rect class="meter-bg" x="500" y="240" width="350" height="20"/>
  <rect class="bar" x="500" y="240" width="347" height="20" fill="#059669"/>
  <text class="sublabel" x="860" y="255" text-anchor="end" fill="#059669" font-weight="700">99.2%</text>

  <!-- Consistency -->
  <text class="label" x="675" y="290" text-anchor="middle">Consistency (Std Dev)</text>
  <rect class="meter-bg" x="500" y="310" width="350" height="20"/>
  <rect class="bar" x="500" y="310" width="280" height="20" fill="#d97706"/>
  <text class="sublabel" x="860" y="325" text-anchor="end" fill="#d97706" font-weight="700">σ=0.08</text>

  <!-- Bottom: Key metrics summary -->
  <rect x="30" y="200" width="430" height="280" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="245" y="225" text-anchor="middle">Key Performance Indicators</text>

  <text class="sublabel" x="50" y="255"><tspan font-weight="700">Latency (p50):</tspan> 1.2s | <tspan font-weight="700">p95:</tspan> 3.5s | <tspan font-weight="700">p99:</tspan> 8.2s</text>
  <text class="sublabel" x="50" y="280"><tspan font-weight="700">Error Rate:</tspan> 1.2% (target: &lt;2%)</text>
  <text class="sublabel" x="50" y="305"><tspan font-weight="700">Cost/Request:</tspan> $0.0042 (↓12% vs last week)</text>
  <text class="sublabel" x="50" y="330"><tspan font-weight="700">User Satisfaction:</tspan> 4.2/5.0 (↑0.3 vs last month)</text>
  <text class="sublabel" x="50" y="355"><tspan font-weight="700">Hallucination Rate:</tspan> 2.1% (target: &lt;3%)</text>
  <text class="sublabel" x="50" y="380"><tspan font-weight="700">Injection Attempts:</tspan> 23 blocked today</text>
  <text class="sublabel" x="50" y="405"><tspan font-weight="700">Active Models:</tspan> GPT-4 (60%), Claude (30%), Llama (10%)</text>
  <text class="sublabel" x="50" y="430"><tspan font-weight="700">Total Requests Today:</tspan> 15,234</text>
  <text class="sublabel" x="50" y="455"><tspan font-weight="700">Daily Cost:</tspan> $64.01 (budget: $100/day)</text>
  <text class="sublabel" x="50" y="475" fill="#059669" font-weight="700">All metrics within acceptable range ✓</text>
</svg>