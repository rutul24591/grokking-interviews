<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .c-primary { stroke: #7c3aed; }
    .c-retry { stroke: #2563eb; }
    .c-switch { stroke: #059669; }
    .c-cache { stroke: #d97706; }
    .c-human { stroke: #dc2626; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 2; }
    .fail { fill: none; stroke: #dc2626; stroke-width: 1.5; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">AI Fallback Strategy Flow</text>

  <!-- Primary model -->
  <rect class="box c-primary" x="350" y="60" width="200" height="60"/>
  <text class="label" x="450" y="85" text-anchor="middle">Primary Model Call</text>
  <rect class="detail-box" x="365" y="95" width="170" height="18"/>
  <text class="sublabel" x="375" y="108">Best quality, highest cost</text>

  <path class="arrow" d="M450 120 L450 160"/>
  <polygon points="450,160 445,150 455,150" fill="#6366f1"/>

  <!-- Validation -->
  <rect class="box" x="350" y="165" width="200" height="50"/>
  <text class="label" x="450" y="185" text-anchor="middle">Output Validation</text>
  <rect class="detail-box" x="365" y="192" width="170" height="18"/>
  <text class="sublabel" x="375" y="205">Format, safety, quality check</text>

  <!-- Success path -->
  <path class="arrow" d="M550 190 L630 190 L630 430 L570 430"/>
  <polygon points="570,430 578,425 578,435" fill="#059669"/>
  <text class="sublabel" x="600" y="185" fill="#059669" font-weight="700">Pass</text>

  <!-- Fail path 1: Retry -->
  <path class="fail" d="M350 190 L270 190 L270 270 L330 270"/>
  <polygon points="330,270 338,265 338,275" fill="#dc2626"/>
  <text class="sublabel" x="300" y="185" fill="#dc2626" font-weight="700">Fail → Retry</text>

  <rect class="box c-retry" x="30" y="250" width="260" height="70"/>
  <text class="label" x="160" y="275" text-anchor="middle">Retry (3x with backoff)</text>
  <rect class="detail-box" x="45" y="285" width="230" height="25"/>
  <text class="sublabel" x="55" y="302">Exponential backoff + jitter, same model</text>

  <!-- Fail path 2: Switch model -->
  <path class="fail" d="M160 320 L160 370 L330 370"/>
  <polygon points="330,370 322,365 322,375" fill="#dc2626"/>
  <text class="sublabel" x="240" y="365" fill="#dc2626" font-weight="700">Fail → Switch</text>

  <rect class="box c-switch" x="340" y="340" width="240" height="70"/>
  <text class="label" x="460" y="365" text-anchor="middle">Switch to Alternative Model</text>
  <rect class="detail-box" x="355" y="375" width="210" height="25"/>
  <text class="sublabel" x="365" y="392">Smaller/faster model, different provider</text>

  <!-- Fail path 3: Cached response -->
  <path class="fail" d="M460 410 L460 440 L570 440"/>
  <polygon points="570,440 562,435 562,445" fill="#dc2626"/>
  <text class="sublabel" x="510" y="435" fill="#dc2626" font-weight="700">Fail → Cache</text>

  <rect class="box c-cache" x="580" y="340" width="240" height="70"/>
  <text class="label" x="700" y="365" text-anchor="middle">Return Cached Response</text>
  <rect class="detail-box" x="595" y="375" width="210" height="25"/>
  <text class="sublabel" x="605" y="392">Similar recent response, with staleness note</text>

  <!-- Fail path 4: Human escalation -->
  <path class="fail" d="M700 410 L700 460"/>
  <polygon points="700,460 695,450 705,450" fill="#dc2626"/>

  <rect class="box c-human" x="580" y="465" width="240" height="35"/>
  <text class="label" x="700" y="488" text-anchor="middle">Escalate to Human Review</text>

  <!-- Final output -->
  <rect x="640" y="410" width="230" height="35" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text class="label" x="755" y="433" text-anchor="middle">Final Output to User</text>
</svg>