<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="100%" height="100%">
  <style>
    .bg { fill: #ffffff; }
    .dark .bg { fill: #1a1a2e; }
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 22px; font-weight: 700; fill: #1a1a2e; }
    .dark .title { fill: #e0e0e0; }
    .label { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #1a1a2e; }
    .dark .label { fill: #e0e0e0; }
    .sublabel { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; font-weight: 400; fill: #555555; }
    .dark .sublabel { fill: #aaaaaa; }
    .box { fill: #ffffff; stroke-width: 2; rx: 6; }
    .detail-box { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; rx: 4; }
    .dark .detail-box { fill: #2a2a3e; stroke: #444466; }
    .c-host { stroke: #7c3aed; }
    .dark .c-host { fill: #2e1065; stroke: #a78bfa; }
    .c-plugin { stroke: #059669; }
    .dark .c-plugin { fill: #064e3b; stroke: #34d399; }
    .arrow { fill: none; stroke: #6366f1; stroke-width: 1.5; }
  </style>
  <rect class="bg" width="900" height="500"/>
  <text class="title" x="450" y="40" text-anchor="middle">AI Plug-In Architecture Overview</text>

  <!-- Host System -->
  <rect class="box c-host" x="30" y="80" width="260" height="340"/>
  <text class="label" x="160" y="105" text-anchor="middle">Host AI System</text>

  <rect class="detail-box" x="45" y="115" width="230" height="45"/>
  <text class="sublabel" x="55" y="133">LLM + Tool Catalog</text>
  <text class="sublabel" x="55" y="150">Registered tools from all plug-ins</text>

  <rect class="detail-box" x="45" y="170" width="230" height="45"/>
  <text class="sublabel" x="55" y="188">Tool Router</text>
  <text class="sublabel" x="55" y="205">Maps LLM tool calls to plug-ins</text>

  <rect class="detail-box" x="45" y="225" width="230" height="45"/>
  <text class="sublabel" x="55" y="243">Input/Output Validator</text>
  <text class="sublabel" x="55" y="260">Schema checks before/after execution</text>

  <rect class="detail-box" x="45" y="280" width="230" height="45"/>
  <text class="sublabel" x="55" y="298">Permission Manager</text>
  <text class="sublabel" x="55" y="315">Enforces granted permissions</text>

  <rect class="detail-box" x="45" y="335" width="230" height="45"/>
  <text class="sublabel" x="55" y="353">Plug-In Registry</text>
  <text class="sublabel" x="55" y="370">Catalog, versions, compatibility</text>

  <!-- Arrows to plug-ins -->
  <path class="arrow" d="M290 140 L370 140"/>
  <path class="arrow" d="M290 220 L370 220"/>
  <path class="arrow" d="M290 300 L370 300"/>
  <path class="arrow" d="M290 370 L370 370"/>

  <!-- Plug-in 1 -->
  <rect class="box c-plugin" x="380" y="80" width="230" height="100"/>
  <text class="label" x="495" y="105" text-anchor="middle">Plug-In: GitHub</text>
  <rect class="detail-box" x="395" y="115" width="200" height="50"/>
  <text class="sublabel" x="405" y="133">Tools: search_repos, create_issue</text>
  <text class="sublabel" x="405" y="150">Perms: read repos, write issues</text>

  <!-- Plug-in 2 -->
  <rect class="box c-plugin" x="380" y="200" width="230" height="100"/>
  <text class="label" x="495" y="225" text-anchor="middle">Plug-In: Database</text>
  <rect class="detail-box" x="395" y="235" width="200" height="50"/>
  <text class="sublabel" x="405" y="253">Tools: query_table, export_csv</text>
  <text class="sublabel" x="405" y="270">Perms: read-only DB access</text>

  <!-- Plug-in 3 -->
  <rect class="box c-plugin" x="380" y="320" width="230" height="100"/>
  <text class="label" x="495" y="345" text-anchor="middle">Plug-In: Web Search</text>
  <rect class="detail-box" x="395" y="355" width="200" height="50"/>
  <text class="sublabel" x="405" y="373">Tools: search_web, fetch_url</text>
  <text class="sublabel" x="405" y="390">Perms: network access (allowlist)</text>

  <!-- Flow labels -->
  <text class="sublabel" x="300" y="135" fill="#6366f1" font-weight="700">Tool call</text>
  <text class="sublabel" x="300" y="215" fill="#6366f1" font-weight="700">Tool call</text>
  <text class="sublabel" x="300" y="295" fill="#6366f1" font-weight="700">Tool call</text>
  <text class="sublabel" x="300" y="365" fill="#6366f1" font-weight="700">Tool call</text>

  <!-- Return arrows -->
  <path d="M380 170 L290 170" fill="none" stroke="#059669" stroke-width="1.5"/>
  <path d="M380 290 L290 290" fill="none" stroke="#059669" stroke-width="1.5"/>
  <path d="M380 410 L290 410 L290 380" fill="none" stroke="#059669" stroke-width="1.5"/>

  <text class="sublabel" x="300" y="165" fill="#059669" font-weight="700">Result</text>
  <text class="sublabel" x="300" y="285" fill="#059669" font-weight="700">Result</text>
  <text class="sublabel" x="300" y="405" fill="#059669" font-weight="700">Result</text>

  <!-- Right annotations -->
  <rect x="640" y="80" width="230" height="340" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text class="label" x="755" y="105" text-anchor="middle">Plug-In Lifecycle</text>

  <text class="sublabel" x="660" y="135"><tspan font-weight="700">1. Discovery:</tspan> Scan registry/filesystem</text>
  <text class="sublabel" x="660" y="155"><tspan font-weight="700">2. Validation:</tspan> Check compatibility</text>
  <text class="sublabel" x="660" y="175"><tspan font-weight="700">3. Installation:</tspan> Download and place</text>
  <text class="sublabel" x="660" y="195"><tspan font-weight="700">4. Permission grant:</tspan> User approves</text>
  <text class="sublabel" x="660" y="215"><tspan font-weight="700">5. Activation:</tspan> Load + sandbox</text>
  <text class="sublabel" x="660" y="235"><tspan font-weight="700">6. Execution:</tspan> LLM calls tools</text>
  <text class="sublabel" x="660" y="255"><tspan font-weight="700">7. Deactivation:</tspan> Unload + cleanup</text>

  <text class="sublabel" x="660" y="295" font-weight="700">Key Properties:</text>
  <text class="sublabel" x="660" y="315">Self-contained extension</text>
  <text class="sublabel" x="660" y="335">Declared capabilities (manifest)</text>
  <text class="sublabel" x="660" y="355">Isolated execution (sandbox)</text>
  <text class="sublabel" x="660" y="375">Permission-gated access</text>
  <text class="sublabel" x="660" y="395">LLM-discoverable tools</text>
</svg>