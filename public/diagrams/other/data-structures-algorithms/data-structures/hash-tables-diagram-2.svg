<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Chaining versus open addressing collision resolution showing how collisions are stored in two strategies</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Collision Resolution: Chaining vs Open Addressing</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Same key-set, same hash — two different strategies for placing collided entries</text>

  <defs>
    <marker id="arrHT2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1822"/>
    </marker>
  </defs>

  <!-- Chaining -->
  <rect x="30" y="85" width="410" height="385" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="30" y="85" width="410" height="30" rx="10" fill="#4caf50"/>
  <text x="235" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Chaining (Java HashMap pre-8)</text>

  <!-- Bucket array with chains -->
  <g font-family="ui-monospace, monospace">
    <rect x="50" y="135" width="60" height="36" fill="#ffffff" stroke="#1a1822"/>
    <text x="80" y="158" text-anchor="middle" font-size="11" fill="#1a1822">[0]</text>

    <rect x="50" y="175" width="60" height="36" fill="#ffffff" stroke="#1a1822"/>
    <text x="80" y="198" text-anchor="middle" font-size="11" fill="#1a1822">[1]</text>
    <rect x="130" y="175" width="60" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="160" y="198" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">bob</text>
    <rect x="210" y="175" width="60" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="240" y="198" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">eve</text>
    <line x1="110" y1="193" x2="128" y2="193" stroke="#1a1822" marker-end="url(#arrHT2)"/>
    <line x1="190" y1="193" x2="208" y2="193" stroke="#1a1822" marker-end="url(#arrHT2)"/>

    <rect x="50" y="215" width="60" height="36" fill="#ffffff" stroke="#1a1822"/>
    <text x="80" y="238" text-anchor="middle" font-size="11" fill="#1a1822">[2]</text>

    <rect x="50" y="255" width="60" height="36" fill="#ffffff" stroke="#1a1822"/>
    <text x="80" y="278" text-anchor="middle" font-size="11" fill="#1a1822">[3]</text>
    <rect x="130" y="255" width="60" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="160" y="278" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">alice</text>
    <line x1="110" y1="273" x2="128" y2="273" stroke="#1a1822" marker-end="url(#arrHT2)"/>

    <rect x="50" y="295" width="60" height="36" fill="#ffffff" stroke="#1a1822"/>
    <text x="80" y="318" text-anchor="middle" font-size="11" fill="#1a1822">[4]</text>
    <rect x="130" y="295" width="60" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="160" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">charlie</text>
    <rect x="210" y="295" width="60" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="240" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">dana</text>
    <rect x="290" y="295" width="60" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="320" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">frank</text>
    <line x1="110" y1="313" x2="128" y2="313" stroke="#1a1822" marker-end="url(#arrHT2)"/>
    <line x1="190" y1="313" x2="208" y2="313" stroke="#1a1822" marker-end="url(#arrHT2)"/>
    <line x1="270" y1="313" x2="288" y2="313" stroke="#1a1822" marker-end="url(#arrHT2)"/>

    <rect x="50" y="335" width="60" height="36" fill="#ffffff" stroke="#1a1822"/>
    <text x="80" y="358" text-anchor="middle" font-size="11" fill="#1a1822">[5]</text>
  </g>

  <text x="50" y="398" font-size="11" font-weight="700" fill="#1a1822">Properties</text>
  <text x="50" y="414" font-size="10" fill="#1a1822">• Each bucket = head of a chain</text>
  <text x="50" y="430" font-size="10" fill="#1a1822">• Tolerates load factor &gt; 1</text>
  <text x="50" y="446" font-size="10" fill="#1a1822">• Chain walk = cache-unfriendly pointer chase</text>
  <text x="50" y="462" font-size="10" fill="#cc4444">• Adversarial hash → long chain → O(n) per op</text>

  <!-- Open Addressing -->
  <rect x="460" y="85" width="410" height="385" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="460" y="85" width="410" height="30" rx="10" fill="#6d5bd0"/>
  <text x="665" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Open addressing (Rust / Python / Go)</text>

  <g font-family="ui-monospace, monospace">
    <rect x="500" y="135" width="100" height="36" fill="#ffffff" stroke="#1a1822"/>
    <text x="485" y="158" text-anchor="end" font-size="11" fill="#1a1822">[0]</text>

    <rect x="500" y="175" width="100" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="485" y="198" text-anchor="end" font-size="11" fill="#1a1822">[1]</text>
    <text x="550" y="198" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">bob</text>

    <rect x="500" y="215" width="100" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="485" y="238" text-anchor="end" font-size="11" fill="#1a1822">[2]</text>
    <text x="550" y="238" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">eve</text>
    <text x="610" y="235" font-size="10" fill="#6d5bd0" opacity="0.85">← probed +1 from [1]</text>

    <rect x="500" y="255" width="100" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="485" y="278" text-anchor="end" font-size="11" fill="#1a1822">[3]</text>
    <text x="550" y="278" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">alice</text>

    <rect x="500" y="295" width="100" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="485" y="318" text-anchor="end" font-size="11" fill="#1a1822">[4]</text>
    <text x="550" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">charlie</text>

    <rect x="500" y="335" width="100" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="485" y="358" text-anchor="end" font-size="11" fill="#1a1822">[5]</text>
    <text x="550" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">dana</text>
    <text x="610" y="355" font-size="10" fill="#6d5bd0" opacity="0.85">← probed +1 from [4]</text>

    <rect x="500" y="375" width="100" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="485" y="398" text-anchor="end" font-size="11" fill="#1a1822">[6]</text>
    <text x="550" y="398" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">frank</text>
    <text x="610" y="395" font-size="10" fill="#6d5bd0" opacity="0.85">← probed +2 from [4]</text>
  </g>

  <text x="475" y="434" font-size="11" font-weight="700" fill="#1a1822">Properties</text>
  <text x="475" y="450" font-size="10" fill="#1a1822">• All entries live in the bucket array</text>
  <text x="475" y="466" font-size="10" fill="#1a1822">• Probing: linear / quadratic / double hash</text>
</svg>
