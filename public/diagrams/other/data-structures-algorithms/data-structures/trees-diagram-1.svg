<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Binary tree anatomy showing root internal nodes leaves depth and height with parent child relationships</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Binary Tree Anatomy</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Root at top, leaves at bottom; height = longest root-to-leaf path</text>

  <!-- Tree edges -->
  <line x1="300" y1="115" x2="200" y2="175" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="300" y1="115" x2="400" y2="175" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="200" y1="215" x2="130" y2="275" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="200" y1="215" x2="260" y2="275" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="400" y1="215" x2="340" y2="275" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="400" y1="215" x2="470" y2="275" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="260" y1="315" x2="260" y2="375" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="470" y1="315" x2="470" y2="375" stroke="#1a1822" stroke-width="1.5"/>

  <!-- Root -->
  <circle cx="300" cy="95" r="25" fill="#cc4444" stroke="#1a1822" stroke-width="1.5"/>
  <text x="300" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">50</text>

  <!-- Level 1 -->
  <circle cx="200" cy="195" r="25" fill="#6d5bd0" stroke="#1a1822" stroke-width="1.5"/>
  <text x="200" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">30</text>
  <circle cx="400" cy="195" r="25" fill="#6d5bd0" stroke="#1a1822" stroke-width="1.5"/>
  <text x="400" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">70</text>

  <!-- Level 2 -->
  <circle cx="130" cy="295" r="22" fill="#4caf50" stroke="#1a1822"/>
  <text x="130" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">20</text>

  <circle cx="260" cy="295" r="22" fill="#a89bec" stroke="#1a1822"/>
  <text x="260" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">40</text>

  <circle cx="340" cy="295" r="22" fill="#4caf50" stroke="#1a1822"/>
  <text x="340" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">60</text>

  <circle cx="470" cy="295" r="22" fill="#a89bec" stroke="#1a1822"/>
  <text x="470" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">80</text>

  <!-- Level 3 -->
  <circle cx="260" cy="395" r="20" fill="#4caf50" stroke="#1a1822"/>
  <text x="260" y="400" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">45</text>

  <circle cx="470" cy="395" r="20" fill="#4caf50" stroke="#1a1822"/>
  <text x="470" y="400" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">90</text>

  <!-- Depth/height guides -->
  <line x1="550" y1="95" x2="550" y2="395" stroke="#1a1822" stroke-width="1" opacity="0.3"/>
  <line x1="545" y1="95" x2="555" y2="95" stroke="#1a1822" stroke-width="1" opacity="0.5"/>
  <line x1="545" y1="195" x2="555" y2="195" stroke="#1a1822" stroke-width="1" opacity="0.5"/>
  <line x1="545" y1="295" x2="555" y2="295" stroke="#1a1822" stroke-width="1" opacity="0.5"/>
  <line x1="545" y1="395" x2="555" y2="395" stroke="#1a1822" stroke-width="1" opacity="0.5"/>

  <text x="565" y="100" font-size="10" fill="#1a1822">depth 0 (root)</text>
  <text x="565" y="200" font-size="10" fill="#1a1822">depth 1</text>
  <text x="565" y="300" font-size="10" fill="#1a1822">depth 2</text>
  <text x="565" y="400" font-size="10" fill="#1a1822">depth 3 (height of tree)</text>

  <!-- Legend -->
  <rect x="50" y="430" width="800" height="55" rx="8" fill="#ffffff" stroke="#1a1822"/>
  <circle cx="75" cy="457" r="10" fill="#cc4444"/>
  <text x="90" y="462" font-size="11" fill="#1a1822">root</text>
  <circle cx="160" cy="457" r="10" fill="#6d5bd0"/>
  <text x="175" y="462" font-size="11" fill="#1a1822">internal (has children)</text>
  <circle cx="340" cy="457" r="10" fill="#4caf50"/>
  <text x="355" y="462" font-size="11" fill="#1a1822">leaf (no children)</text>
  <circle cx="490" cy="457" r="10" fill="#a89bec"/>
  <text x="505" y="462" font-size="11" fill="#1a1822">internal with one child (partially filled)</text>

  <!-- Sidebar: BST invariant -->
  <rect x="670" y="95" width="210" height="300" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="670" y="95" width="210" height="28" rx="10" fill="#6d5bd0"/>
  <text x="775" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">BST invariant</text>
  <text x="685" y="142" font-size="11" fill="#1a1822">For every node X:</text>
  <text x="685" y="162" font-size="11" fill="#1a1822">  all keys in left subtree</text>
  <text x="685" y="178" font-size="11" fill="#1a1822">  &lt; X.key &lt;</text>
  <text x="685" y="194" font-size="11" fill="#1a1822">  all keys in right subtree</text>

  <text x="685" y="225" font-size="11" font-weight="700" fill="#1a1822">Consequences</text>
  <text x="685" y="245" font-size="10" fill="#1a1822">• Search is O(h)</text>
  <text x="685" y="263" font-size="10" fill="#1a1822">• In-order = sorted keys</text>
  <text x="685" y="281" font-size="10" fill="#1a1822">• Min = leftmost; max = rightmost</text>
  <text x="685" y="299" font-size="10" fill="#1a1822">• Successor / predecessor O(h)</text>

  <text x="685" y="325" font-size="11" font-weight="700" fill="#cc4444">Height matters</text>
  <text x="685" y="343" font-size="10" fill="#1a1822">Balanced: h ≈ log₂ n</text>
  <text x="685" y="361" font-size="10" fill="#1a1822">Degenerate: h = n − 1</text>
  <text x="685" y="379" font-size="10" fill="#1a1822">Self-balancing keeps h ≤ 2 log n</text>
</svg>
