<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Binary heap array layout showing parent child index arithmetic and the implicit complete tree shape</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Binary Heap: Implicit Array Layout</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">A complete binary tree stored in a flat array — index arithmetic replaces pointers</text>

  <!-- Tree -->
  <text x="225" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Min-heap tree view</text>

  <line x1="225" y1="115" x2="125" y2="180" stroke="#1a1822"/>
  <line x1="225" y1="115" x2="325" y2="180" stroke="#1a1822"/>
  <line x1="125" y1="210" x2="75" y2="275" stroke="#1a1822"/>
  <line x1="125" y1="210" x2="175" y2="275" stroke="#1a1822"/>
  <line x1="325" y1="210" x2="275" y2="275" stroke="#1a1822"/>
  <line x1="325" y1="210" x2="375" y2="275" stroke="#1a1822"/>

  <circle cx="225" cy="105" r="25" fill="#cc4444" stroke="#1a1822" stroke-width="1.5"/>
  <text x="225" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
  <text x="265" y="105" font-size="10" fill="#1a1822" opacity="0.6">[0] root / min</text>

  <circle cx="125" cy="200" r="22" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="125" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">5</text>
  <text x="80" y="203" text-anchor="end" font-size="10" fill="#1a1822" opacity="0.6">[1]</text>

  <circle cx="325" cy="200" r="22" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="325" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">4</text>
  <text x="370" y="203" font-size="10" fill="#1a1822" opacity="0.6">[2]</text>

  <circle cx="75" cy="295" r="20" fill="#a89bec" stroke="#1a1822"/>
  <text x="75" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">9</text>
  <text x="45" y="298" text-anchor="end" font-size="10" fill="#1a1822" opacity="0.6">[3]</text>

  <circle cx="175" cy="295" r="20" fill="#a89bec" stroke="#1a1822"/>
  <text x="175" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">7</text>
  <text x="205" y="298" font-size="10" fill="#1a1822" opacity="0.6">[4]</text>

  <circle cx="275" cy="295" r="20" fill="#a89bec" stroke="#1a1822"/>
  <text x="275" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">8</text>
  <text x="245" y="298" text-anchor="end" font-size="10" fill="#1a1822" opacity="0.6">[5]</text>

  <circle cx="375" cy="295" r="20" fill="#a89bec" stroke="#1a1822"/>
  <text x="375" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">6</text>
  <text x="405" y="298" font-size="10" fill="#1a1822" opacity="0.6">[6]</text>

  <!-- Array view -->
  <text x="680" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Array storage</text>

  <g font-family="ui-monospace, monospace">
    <rect x="500" y="110" width="50" height="48" fill="#cc4444" stroke="#1a1822"/>
    <text x="525" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">2</text>
    <text x="525" y="175" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.6">[0]</text>

    <rect x="550" y="110" width="50" height="48" fill="#6d5bd0" stroke="#1a1822"/>
    <text x="575" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">5</text>
    <text x="575" y="175" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.6">[1]</text>

    <rect x="600" y="110" width="50" height="48" fill="#6d5bd0" stroke="#1a1822"/>
    <text x="625" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">4</text>
    <text x="625" y="175" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.6">[2]</text>

    <rect x="650" y="110" width="50" height="48" fill="#a89bec" stroke="#1a1822"/>
    <text x="675" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">9</text>
    <text x="675" y="175" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.6">[3]</text>

    <rect x="700" y="110" width="50" height="48" fill="#a89bec" stroke="#1a1822"/>
    <text x="725" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">7</text>
    <text x="725" y="175" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.6">[4]</text>

    <rect x="750" y="110" width="50" height="48" fill="#a89bec" stroke="#1a1822"/>
    <text x="775" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">8</text>
    <text x="775" y="175" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.6">[5]</text>

    <rect x="800" y="110" width="50" height="48" fill="#a89bec" stroke="#1a1822"/>
    <text x="825" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">6</text>
    <text x="825" y="175" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.6">[6]</text>
  </g>

  <!-- Index arithmetic panel -->
  <rect x="500" y="220" width="360" height="130" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="500" y="220" width="360" height="28" rx="10" fill="#6d5bd0"/>
  <text x="680" y="239" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Index arithmetic (no pointers)</text>
  <text x="515" y="268" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">parent(i)      = (i − 1) / 2</text>
  <text x="515" y="288" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">leftChild(i)   = 2i + 1</text>
  <text x="515" y="308" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">rightChild(i)  = 2i + 2</text>
  <text x="515" y="334" font-size="10" fill="#1a1822" opacity="0.7">Example: parent(4) = 1 (value 5), children(1) = {3,4} (values 9,7)</text>

  <!-- Properties -->
  <rect x="60" y="360" width="800" height="130" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="60" y="360" width="800" height="28" rx="10" fill="#4caf50"/>
  <text x="460" y="379" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Properties</text>
  <text x="75" y="408" font-size="11" fill="#1a1822"><tspan font-weight="700">Heap order:</tspan> parent ≤ children everywhere (min-heap) — root is the global minimum</text>
  <text x="75" y="428" font-size="11" fill="#1a1822"><tspan font-weight="700">Complete tree:</tspan> every level full except the last, which fills left to right → enables implicit array layout</text>
  <text x="75" y="448" font-size="11" fill="#1a1822"><tspan font-weight="700">Height:</tspan> always ⌊log₂ n⌋ — operations stay O(log n) without any rebalancing</text>
  <text x="75" y="468" font-size="11" fill="#1a1822"><tspan font-weight="700">Memory:</tspan> pointer-free; pure array with cache-friendly sequential layout</text>
</svg>
