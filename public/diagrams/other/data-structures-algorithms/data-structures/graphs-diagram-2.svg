<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Adjacency list versus adjacency matrix representation comparison for graph storage</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Adjacency List vs Adjacency Matrix</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Sparse vs dense storage trade-offs for the same graph</text>

  <!-- Source graph -->
  <text x="160" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Graph (5 vertices, 5 edges)</text>
  <line x1="100" y1="160" x2="220" y2="160" stroke="#1a1822"/>
  <line x1="100" y1="160" x2="100" y2="260" stroke="#1a1822"/>
  <line x1="220" y1="160" x2="160" y2="260" stroke="#1a1822"/>
  <line x1="220" y1="160" x2="280" y2="260" stroke="#1a1822"/>
  <line x1="100" y1="260" x2="160" y2="260" stroke="#1a1822"/>
  <circle cx="100" cy="160" r="20" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="100" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">0</text>
  <circle cx="220" cy="160" r="20" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="220" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
  <circle cx="100" cy="260" r="20" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="100" y="265" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2</text>
  <circle cx="160" cy="260" r="20" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="160" y="265" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>
  <circle cx="280" cy="260" r="20" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="280" y="265" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">4</text>

  <!-- Adjacency list -->
  <text x="500" y="90" font-size="13" font-weight="700" fill="#1a1822">Adjacency List — O(V + E) space</text>
  <g font-family="ui-monospace, monospace" font-size="12">
    <text x="380" y="120" fill="#1a1822">0:</text>
    <rect x="410" y="105" width="30" height="22" fill="#d7c9f5" stroke="#1a1822"/>
    <text x="425" y="121" text-anchor="middle" fill="#1a1822">1</text>
    <rect x="445" y="105" width="30" height="22" fill="#d7c9f5" stroke="#1a1822"/>
    <text x="460" y="121" text-anchor="middle" fill="#1a1822">2</text>

    <text x="380" y="155" fill="#1a1822">1:</text>
    <rect x="410" y="140" width="30" height="22" fill="#d7c9f5" stroke="#1a1822"/>
    <text x="425" y="156" text-anchor="middle" fill="#1a1822">0</text>
    <rect x="445" y="140" width="30" height="22" fill="#d7c9f5" stroke="#1a1822"/>
    <text x="460" y="156" text-anchor="middle" fill="#1a1822">3</text>
    <rect x="480" y="140" width="30" height="22" fill="#d7c9f5" stroke="#1a1822"/>
    <text x="495" y="156" text-anchor="middle" fill="#1a1822">4</text>

    <text x="380" y="190" fill="#1a1822">2:</text>
    <rect x="410" y="175" width="30" height="22" fill="#d7c9f5" stroke="#1a1822"/>
    <text x="425" y="191" text-anchor="middle" fill="#1a1822">0</text>
    <rect x="445" y="175" width="30" height="22" fill="#d7c9f5" stroke="#1a1822"/>
    <text x="460" y="191" text-anchor="middle" fill="#1a1822">3</text>

    <text x="380" y="225" fill="#1a1822">3:</text>
    <rect x="410" y="210" width="30" height="22" fill="#d7c9f5" stroke="#1a1822"/>
    <text x="425" y="226" text-anchor="middle" fill="#1a1822">1</text>
    <rect x="445" y="210" width="30" height="22" fill="#d7c9f5" stroke="#1a1822"/>
    <text x="460" y="226" text-anchor="middle" fill="#1a1822">2</text>

    <text x="380" y="260" fill="#1a1822">4:</text>
    <rect x="410" y="245" width="30" height="22" fill="#d7c9f5" stroke="#1a1822"/>
    <text x="425" y="261" text-anchor="middle" fill="#1a1822">1</text>
  </g>
  <text x="380" y="295" font-size="10" fill="#1a1822" opacity="0.7">Iterate neighbors of v: O(deg(v))</text>
  <text x="380" y="310" font-size="10" fill="#1a1822" opacity="0.7">Edge exists check: O(deg(v))</text>

  <!-- Adjacency matrix -->
  <text x="730" y="90" font-size="13" font-weight="700" fill="#1a1822">Adjacency Matrix — O(V²)</text>
  <g font-family="ui-monospace, monospace" font-size="11">
    <text x="640" y="125" font-size="10" fill="#1a1822" opacity="0.6">  0 1 2 3 4</text>
    <text x="620" y="150" fill="#1a1822">0</text>
    <text x="620" y="175" fill="#1a1822">1</text>
    <text x="620" y="200" fill="#1a1822">2</text>
    <text x="620" y="225" fill="#1a1822">3</text>
    <text x="620" y="250" fill="#1a1822">4</text>
  </g>
  <g font-family="ui-monospace, monospace" font-size="11" text-anchor="middle">
    <!-- row 0 -->
    <rect x="645" y="135" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="656" y="151" fill="#1a1822">0</text>
    <rect x="667" y="135" width="22" height="22" fill="#cc4444" stroke="#1a1822"/><text x="678" y="151" fill="#ffffff">1</text>
    <rect x="689" y="135" width="22" height="22" fill="#cc4444" stroke="#1a1822"/><text x="700" y="151" fill="#ffffff">1</text>
    <rect x="711" y="135" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="722" y="151" fill="#1a1822">0</text>
    <rect x="733" y="135" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="744" y="151" fill="#1a1822">0</text>
    <!-- row 1 -->
    <rect x="645" y="160" width="22" height="22" fill="#cc4444" stroke="#1a1822"/><text x="656" y="176" fill="#ffffff">1</text>
    <rect x="667" y="160" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="678" y="176" fill="#1a1822">0</text>
    <rect x="689" y="160" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="700" y="176" fill="#1a1822">0</text>
    <rect x="711" y="160" width="22" height="22" fill="#cc4444" stroke="#1a1822"/><text x="722" y="176" fill="#ffffff">1</text>
    <rect x="733" y="160" width="22" height="22" fill="#cc4444" stroke="#1a1822"/><text x="744" y="176" fill="#ffffff">1</text>
    <!-- row 2 -->
    <rect x="645" y="185" width="22" height="22" fill="#cc4444" stroke="#1a1822"/><text x="656" y="201" fill="#ffffff">1</text>
    <rect x="667" y="185" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="678" y="201" fill="#1a1822">0</text>
    <rect x="689" y="185" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="700" y="201" fill="#1a1822">0</text>
    <rect x="711" y="185" width="22" height="22" fill="#cc4444" stroke="#1a1822"/><text x="722" y="201" fill="#ffffff">1</text>
    <rect x="733" y="185" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="744" y="201" fill="#1a1822">0</text>
    <!-- row 3 -->
    <rect x="645" y="210" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="656" y="226" fill="#1a1822">0</text>
    <rect x="667" y="210" width="22" height="22" fill="#cc4444" stroke="#1a1822"/><text x="678" y="226" fill="#ffffff">1</text>
    <rect x="689" y="210" width="22" height="22" fill="#cc4444" stroke="#1a1822"/><text x="700" y="226" fill="#ffffff">1</text>
    <rect x="711" y="210" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="722" y="226" fill="#1a1822">0</text>
    <rect x="733" y="210" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="744" y="226" fill="#1a1822">0</text>
    <!-- row 4 -->
    <rect x="645" y="235" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="656" y="251" fill="#1a1822">0</text>
    <rect x="667" y="235" width="22" height="22" fill="#cc4444" stroke="#1a1822"/><text x="678" y="251" fill="#ffffff">1</text>
    <rect x="689" y="235" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="700" y="251" fill="#1a1822">0</text>
    <rect x="711" y="235" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="722" y="251" fill="#1a1822">0</text>
    <rect x="733" y="235" width="22" height="22" fill="#ffffff" stroke="#1a1822"/><text x="744" y="251" fill="#1a1822">0</text>
  </g>
  <text x="700" y="295" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">Edge exists: O(1)</text>
  <text x="700" y="310" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">Iterate neighbors: O(V) (always)</text>

  <!-- Comparison -->
  <rect x="60" y="345" width="800" height="140" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="60" y="345" width="800" height="28" rx="10" fill="#4caf50"/>
  <text x="460" y="364" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">When to use which</text>
  <text x="75" y="393" font-size="11" fill="#1a1822"><tspan font-weight="700">Adjacency list (sparse):</tspan> default for most real-world graphs (social, web, road) — E ≪ V². BFS/DFS run in O(V+E)</text>
  <text x="75" y="413" font-size="11" fill="#1a1822"><tspan font-weight="700">Adjacency matrix (dense):</tspan> when E ≈ V², or you need O(1) edge lookups, or you want matrix algebra (PageRank, transitive closure)</text>
  <text x="75" y="433" font-size="11" fill="#1a1822"><tspan font-weight="700">Edge list:</tspan> third option — just a flat array of (u, v, w). Compact for Kruskal&apos;s MST (sort edges by weight)</text>
  <text x="75" y="453" font-size="11" fill="#1a1822"><tspan font-weight="700">CSR (Compressed Sparse Row):</tspan> packed adjacency-list variant — best cache locality, used by graph libraries (NetworkX, igraph)</text>
  <text x="75" y="473" font-size="11" fill="#1a1822"><tspan font-weight="700">Memory:</tspan> matrix wastes 99%+ for sparse graphs. A 1M-vertex social graph as matrix = 1TB; as list = ~100MB</text>
</svg>
