<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>BFS versus DFS traversal frontier comparison showing queue versus stack ordering</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">BFS vs DFS: Frontier Discipline</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Same graph, same start node — queue vs stack changes everything</text>

  <!-- BFS -->
  <text x="225" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">BFS — Queue (FIFO) → level-by-level</text>
  <line x1="225" y1="115" x2="150" y2="180" stroke="#1a1822"/>
  <line x1="225" y1="115" x2="300" y2="180" stroke="#1a1822"/>
  <line x1="150" y1="200" x2="100" y2="265" stroke="#1a1822"/>
  <line x1="150" y1="200" x2="200" y2="265" stroke="#1a1822"/>
  <line x1="300" y1="200" x2="300" y2="265" stroke="#1a1822"/>

  <circle cx="225" cy="105" r="20" fill="#cc4444" stroke="#1a1822"/>
  <text x="225" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">A:1</text>
  <circle cx="150" cy="190" r="20" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="150" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">B:2</text>
  <circle cx="300" cy="190" r="20" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="300" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">C:3</text>
  <circle cx="100" cy="275" r="20" fill="#a89bec" stroke="#1a1822"/>
  <text x="100" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">D:4</text>
  <circle cx="200" cy="275" r="20" fill="#a89bec" stroke="#1a1822"/>
  <text x="200" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">E:5</text>
  <circle cx="300" cy="275" r="20" fill="#a89bec" stroke="#1a1822"/>
  <text x="300" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">F:6</text>

  <text x="225" y="320" text-anchor="middle" font-size="11" fill="#1a1822" font-family="ui-monospace, monospace">Visit order: A → B → C → D → E → F</text>

  <!-- DFS -->
  <text x="675" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#cc4444">DFS — Stack (LIFO) → depth-first</text>
  <line x1="675" y1="115" x2="600" y2="180" stroke="#1a1822"/>
  <line x1="675" y1="115" x2="750" y2="180" stroke="#1a1822"/>
  <line x1="600" y1="200" x2="550" y2="265" stroke="#1a1822"/>
  <line x1="600" y1="200" x2="650" y2="265" stroke="#1a1822"/>
  <line x1="750" y1="200" x2="750" y2="265" stroke="#1a1822"/>

  <circle cx="675" cy="105" r="20" fill="#cc4444" stroke="#1a1822"/>
  <text x="675" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">A:1</text>
  <circle cx="600" cy="190" r="20" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="600" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">B:2</text>
  <circle cx="750" cy="190" r="20" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="750" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">C:5</text>
  <circle cx="550" cy="275" r="20" fill="#a89bec" stroke="#1a1822"/>
  <text x="550" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">D:3</text>
  <circle cx="650" cy="275" r="20" fill="#a89bec" stroke="#1a1822"/>
  <text x="650" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">E:4</text>
  <circle cx="750" cy="275" r="20" fill="#a89bec" stroke="#1a1822"/>
  <text x="750" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">F:6</text>

  <text x="675" y="320" text-anchor="middle" font-size="11" fill="#1a1822" font-family="ui-monospace, monospace">Visit order: A → B → D → E → C → F</text>

  <!-- Use cases -->
  <rect x="60" y="345" width="800" height="140" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="60" y="345" width="800" height="28" rx="10" fill="#6d5bd0"/>
  <text x="460" y="364" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">When each strategy wins</text>
  <text x="75" y="393" font-size="11" fill="#1a1822"><tspan font-weight="700">BFS:</tspan> shortest path (unweighted), level/distance queries, web crawling within depth bound, social degree-of-separation</text>
  <text x="75" y="413" font-size="11" fill="#1a1822"><tspan font-weight="700">DFS:</tspan> cycle detection, topological sort, strongly connected components, maze/backtracking, AST traversal</text>
  <text x="75" y="433" font-size="11" fill="#1a1822"><tspan font-weight="700">Memory:</tspan> BFS frontier can blow up on wide graphs (whole level in queue); DFS uses O(depth) stack — risky on deep graphs</text>
  <text x="75" y="453" font-size="11" fill="#1a1822"><tspan font-weight="700">Iterative DFS:</tspan> use explicit stack to avoid recursion limit on deep graphs (Node.js default ~10k frames)</text>
  <text x="75" y="473" font-size="11" fill="#1a1822"><tspan font-weight="700">Bidirectional BFS:</tspan> search from source and target simultaneously — meets in the middle, often √-faster</text>
</svg>
