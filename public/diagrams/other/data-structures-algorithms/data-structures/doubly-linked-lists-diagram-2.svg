<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Doubly linked list arbitrary node deletion showing four pointer updates to splice a node out</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">O(1) Arbitrary Node Deletion</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Given only a direct reference to the doomed node, four pointer updates excise it without scanning</text>

  <defs>
    <marker id="arrDLL2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1822"/>
    </marker>
    <marker id="arrDLL2green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4caf50"/>
    </marker>
  </defs>

  <!-- Before -->
  <text x="60" y="90" font-size="13" font-weight="700" fill="#1a1822">Before</text>
  <rect x="100" y="105" width="130" height="60" rx="6" fill="#ffffff" stroke="#1a1822"/>
  <text x="165" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">P (prev)</text>
  <text x="165" y="148" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#1a1822">val=11</text>

  <rect x="380" y="105" width="130" height="60" rx="6" fill="#ffebee" stroke="#cc4444" stroke-width="2.5"/>
  <text x="445" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">X (remove)</text>
  <text x="445" y="148" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#1a1822">val=42</text>

  <rect x="660" y="105" width="130" height="60" rx="6" fill="#ffffff" stroke="#1a1822"/>
  <text x="725" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">S (next)</text>
  <text x="725" y="148" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#1a1822">val=93</text>

  <!-- Forward arrows -->
  <path d="M 230 120 Q 305 85 380 120" stroke="#1a1822" stroke-width="1.5" fill="none" marker-end="url(#arrDLL2)"/>
  <path d="M 510 120 Q 585 85 660 120" stroke="#1a1822" stroke-width="1.5" fill="none" marker-end="url(#arrDLL2)"/>
  <!-- Back arrows -->
  <path d="M 380 150 Q 305 185 230 150" stroke="#cc4444" stroke-width="1.5" fill="none" marker-end="url(#arrDLL2)"/>
  <path d="M 660 150 Q 585 185 510 150" stroke="#cc4444" stroke-width="1.5" fill="none" marker-end="url(#arrDLL2)"/>

  <!-- After -->
  <text x="60" y="245" font-size="13" font-weight="700" fill="#1a1822">After</text>
  <rect x="180" y="260" width="130" height="60" rx="6" fill="#ffffff" stroke="#1a1822"/>
  <text x="245" y="283" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">P (prev)</text>
  <text x="245" y="303" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#1a1822">val=11</text>

  <rect x="580" y="260" width="130" height="60" rx="6" fill="#ffffff" stroke="#1a1822"/>
  <text x="645" y="283" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1822">S (next)</text>
  <text x="645" y="303" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#1a1822">val=93</text>

  <!-- New forward arrow -->
  <path d="M 310 275 Q 445 235 580 275" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrDLL2green)"/>
  <text x="445" y="230" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">P.next = S</text>
  <!-- New back arrow -->
  <path d="M 580 305 Q 445 340 310 305" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrDLL2green)"/>
  <text x="445" y="360" text-anchor="middle" font-size="11" font-weight="600" fill="#4caf50">S.prev = P</text>

  <!-- X excised annotation -->
  <rect x="380" y="380" width="130" height="40" rx="6" fill="#f5f5f5" stroke="#cc4444" stroke-dasharray="4,3"/>
  <text x="445" y="405" text-anchor="middle" font-size="11" font-style="italic" fill="#cc4444">X.prev = X.next = ∅</text>

  <!-- Four-step code -->
  <rect x="40" y="440" width="820" height="50" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="55" y="460" font-size="11" font-weight="700" fill="#1a1822">Four-step O(1) removal:</text>
  <text x="55" y="478" font-size="11" font-family="ui-monospace, monospace" fill="#6d5bd0">X.prev.next = X.next   ·   X.next.prev = X.prev   ·   X.prev = null   ·   X.next = null</text>

  <!-- Sidebar: contrast with singly linked -->
  <text x="445" y="410" font-size="10" text-anchor="middle" fill="#1a1822" opacity="0.7">With only a forward pointer, recovering P would need a full O(n) scan from head.</text>
</svg>
