<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Skip list multi level linked list with express lanes at higher levels and full ordered list at level zero</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Skip List: Stacked Linked Lists with Express Lanes</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Higher levels skip more nodes; level 0 is the full ordered list — search descends like a probabilistic balanced tree</text>

  <defs>
    <marker id="arrSL1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1822"/>
    </marker>
  </defs>

  <!-- Level 3 -->
  <text x="40" y="100" font-size="11" font-weight="700" fill="#6d5bd0">L3</text>
  <line x1="80" y1="95" x2="320" y2="95" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrSL1)"/>
  <line x1="350" y1="95" x2="780" y2="95" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrSL1)"/>
  <rect x="60" y="80" width="30" height="30" fill="#1a1822" stroke="#1a1822"/>
  <text x="75" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">·</text>
  <rect x="320" y="80" width="30" height="30" fill="#cc4444" stroke="#1a1822"/>
  <text x="335" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">17</text>
  <rect x="780" y="80" width="40" height="30" fill="#a89bec" stroke="#1a1822"/>
  <text x="800" y="100" text-anchor="middle" font-size="9" fill="#ffffff">NIL</text>

  <!-- Level 2 -->
  <text x="40" y="160" font-size="11" font-weight="700" fill="#6d5bd0">L2</text>
  <line x1="80" y1="155" x2="200" y2="155" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrSL1)"/>
  <line x1="230" y1="155" x2="320" y2="155" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrSL1)"/>
  <line x1="350" y1="155" x2="540" y2="155" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrSL1)"/>
  <line x1="570" y1="155" x2="780" y2="155" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrSL1)"/>
  <rect x="60" y="140" width="30" height="30" fill="#1a1822"/>
  <rect x="200" y="140" width="30" height="30" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="215" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">9</text>
  <rect x="320" y="140" width="30" height="30" fill="#cc4444" stroke="#1a1822"/>
  <text x="335" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">17</text>
  <rect x="540" y="140" width="30" height="30" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="555" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">28</text>
  <rect x="780" y="140" width="40" height="30" fill="#a89bec" stroke="#1a1822"/>
  <text x="800" y="160" text-anchor="middle" font-size="9" fill="#ffffff">NIL</text>

  <!-- Level 1 -->
  <text x="40" y="220" font-size="11" font-weight="700" fill="#6d5bd0">L1</text>
  <line x1="80" y1="215" x2="140" y2="215" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrSL1)"/>
  <line x1="170" y1="215" x2="200" y2="215" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrSL1)"/>
  <line x1="230" y1="215" x2="320" y2="215" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrSL1)"/>
  <line x1="350" y1="215" x2="450" y2="215" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrSL1)"/>
  <line x1="480" y1="215" x2="540" y2="215" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrSL1)"/>
  <line x1="570" y1="215" x2="660" y2="215" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrSL1)"/>
  <line x1="690" y1="215" x2="780" y2="215" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arrSL1)"/>
  <rect x="60" y="200" width="30" height="30" fill="#1a1822"/>
  <rect x="140" y="200" width="30" height="30" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="155" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">3</text>
  <rect x="200" y="200" width="30" height="30" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="215" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">9</text>
  <rect x="320" y="200" width="30" height="30" fill="#cc4444" stroke="#1a1822"/>
  <text x="335" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">17</text>
  <rect x="450" y="200" width="30" height="30" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="465" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">22</text>
  <rect x="540" y="200" width="30" height="30" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="555" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">28</text>
  <rect x="660" y="200" width="30" height="30" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="675" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">35</text>
  <rect x="780" y="200" width="40" height="30" fill="#a89bec" stroke="#1a1822"/>

  <!-- Level 0 -->
  <text x="40" y="280" font-size="11" font-weight="700" fill="#1a1822">L0</text>
  <line x1="80" y1="275" x2="100" y2="275" stroke="#1a1822" marker-end="url(#arrSL1)"/>
  <line x1="130" y1="275" x2="140" y2="275" stroke="#1a1822" marker-end="url(#arrSL1)"/>
  <line x1="170" y1="275" x2="200" y2="275" stroke="#1a1822" marker-end="url(#arrSL1)"/>
  <line x1="230" y1="275" x2="260" y2="275" stroke="#1a1822" marker-end="url(#arrSL1)"/>
  <line x1="290" y1="275" x2="320" y2="275" stroke="#1a1822" marker-end="url(#arrSL1)"/>
  <line x1="350" y1="275" x2="390" y2="275" stroke="#1a1822" marker-end="url(#arrSL1)"/>
  <line x1="420" y1="275" x2="450" y2="275" stroke="#1a1822" marker-end="url(#arrSL1)"/>
  <line x1="480" y1="275" x2="510" y2="275" stroke="#1a1822" marker-end="url(#arrSL1)"/>
  <line x1="540" y1="275" x2="600" y2="275" stroke="#1a1822" marker-end="url(#arrSL1)"/>
  <line x1="630" y1="275" x2="660" y2="275" stroke="#1a1822" marker-end="url(#arrSL1)"/>
  <line x1="690" y1="275" x2="720" y2="275" stroke="#1a1822" marker-end="url(#arrSL1)"/>
  <line x1="750" y1="275" x2="780" y2="275" stroke="#1a1822" marker-end="url(#arrSL1)"/>

  <rect x="60" y="260" width="30" height="30" fill="#1a1822"/>
  <text x="100" y="280" text-anchor="middle" font-size="10" fill="#1a1822">1</text>
  <text x="130" y="280" text-anchor="middle" font-size="10" fill="#1a1822">3</text>
  <text x="170" y="280" text-anchor="middle" font-size="10" fill="#1a1822">5</text>
  <text x="200" y="280" text-anchor="middle" font-size="10" fill="#1a1822">9</text>
  <text x="260" y="280" text-anchor="middle" font-size="10" fill="#1a1822">12</text>
  <text x="290" y="280" text-anchor="middle" font-size="10" fill="#1a1822">14</text>
  <rect x="320" y="260" width="30" height="30" fill="#cc4444" stroke="#1a1822"/>
  <text x="335" y="280" text-anchor="middle" font-size="10" fill="#ffffff">17</text>
  <text x="390" y="280" text-anchor="middle" font-size="10" fill="#1a1822">19</text>
  <text x="420" y="280" text-anchor="middle" font-size="10" fill="#1a1822">20</text>
  <text x="465" y="280" text-anchor="middle" font-size="10" fill="#1a1822">22</text>
  <text x="510" y="280" text-anchor="middle" font-size="10" fill="#1a1822">25</text>
  <text x="555" y="280" text-anchor="middle" font-size="10" fill="#1a1822">28</text>
  <text x="600" y="280" text-anchor="middle" font-size="10" fill="#1a1822">30</text>
  <text x="630" y="280" text-anchor="middle" font-size="10" fill="#1a1822">32</text>
  <text x="675" y="280" text-anchor="middle" font-size="10" fill="#1a1822">35</text>
  <text x="720" y="280" text-anchor="middle" font-size="10" fill="#1a1822">38</text>
  <text x="750" y="280" text-anchor="middle" font-size="10" fill="#1a1822">42</text>
  <rect x="780" y="260" width="40" height="30" fill="#a89bec" stroke="#1a1822"/>

  <!-- Properties box -->
  <rect x="60" y="335" width="780" height="150" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="60" y="335" width="780" height="28" rx="10" fill="#6d5bd0"/>
  <text x="450" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">How search works (find 17)</text>
  <text x="75" y="383" font-size="11" fill="#1a1822">1. Start at top-left (head, level 3). Walk right until next-key &gt; target or NIL → drop one level</text>
  <text x="75" y="402" font-size="11" fill="#1a1822">2. At L3: head → 17, found at top level. Done in 2 hops on this small example</text>
  <text x="75" y="421" font-size="11" fill="#1a1822">3. Each level promotion happens with probability 1/2 → expected log₂(n) levels</text>
  <text x="75" y="440" font-size="11" fill="#1a1822"><tspan font-weight="700">Expected search:</tspan> O(log n) — same as a balanced BST, no rotations needed</text>
  <text x="75" y="460" font-size="11" fill="#1a1822"><tspan font-weight="700">Space:</tspan> expected 2n nodes total (geometric distribution sums to 2)</text>
  <text x="75" y="478" font-size="11" fill="#1a1822"><tspan font-weight="700">Concurrency:</tspan> simple lock-free implementation possible — used by Redis sorted sets and Java&apos;s ConcurrentSkipListMap</text>
</svg>
