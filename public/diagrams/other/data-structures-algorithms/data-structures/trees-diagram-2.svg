<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>BST operations insert search delete with before and after states preserving the BST invariant</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">BST Operations: Search, Insert, Delete</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Each operation walks from root comparing keys, exploiting the ordering invariant</text>

  <!-- SEARCH 40 -->
  <text x="150" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Search(40)</text>

  <line x1="150" y1="110" x2="95" y2="160" stroke="#cc4444" stroke-width="2.5"/>
  <line x1="150" y1="110" x2="205" y2="160" stroke="#1a1822" stroke-width="0.8" opacity="0.3"/>

  <line x1="95" y1="180" x2="65" y2="230" stroke="#1a1822" stroke-width="0.8" opacity="0.3"/>
  <line x1="95" y1="180" x2="130" y2="230" stroke="#cc4444" stroke-width="2.5"/>

  <circle cx="150" cy="100" r="18" fill="#ffffff" stroke="#1a1822"/>
  <text x="150" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">50</text>

  <circle cx="95" cy="170" r="18" fill="#ffffff" stroke="#1a1822"/>
  <text x="95" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">30</text>

  <circle cx="205" cy="170" r="18" fill="#ffffff" stroke="#1a1822"/>
  <text x="205" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">70</text>

  <circle cx="65" cy="240" r="18" fill="#ffffff" stroke="#1a1822"/>
  <text x="65" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">20</text>

  <circle cx="130" cy="240" r="18" fill="#cc4444" stroke="#1a1822" stroke-width="2.5"/>
  <text x="130" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">40</text>

  <text x="150" y="290" text-anchor="middle" font-size="10" fill="#6d5bd0" opacity="0.85">50→30→40   (3 steps, O(log n))</text>

  <!-- INSERT 45 -->
  <text x="430" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Insert(45)</text>

  <line x1="430" y1="110" x2="375" y2="160" stroke="#1a1822" stroke-width="0.8" opacity="0.3"/>
  <line x1="430" y1="110" x2="485" y2="160" stroke="#1a1822" stroke-width="0.8" opacity="0.3"/>
  <line x1="375" y1="180" x2="345" y2="230" stroke="#1a1822" stroke-width="0.8" opacity="0.3"/>
  <line x1="375" y1="180" x2="410" y2="230" stroke="#cc4444" stroke-width="2.5" stroke-dasharray="3,3"/>
  <line x1="410" y1="250" x2="430" y2="270" stroke="#4caf50" stroke-width="2.5"/>

  <circle cx="430" cy="100" r="18" fill="#ffffff" stroke="#1a1822"/>
  <text x="430" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">50</text>
  <circle cx="375" cy="170" r="18" fill="#ffffff" stroke="#1a1822"/>
  <text x="375" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">30</text>
  <circle cx="485" cy="170" r="18" fill="#ffffff" stroke="#1a1822"/>
  <text x="485" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">70</text>
  <circle cx="345" cy="240" r="18" fill="#ffffff" stroke="#1a1822"/>
  <text x="345" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">20</text>
  <circle cx="410" cy="240" r="18" fill="#ffffff" stroke="#1a1822"/>
  <text x="410" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">40</text>
  <circle cx="432" cy="283" r="18" fill="#4caf50" stroke="#1a1822" stroke-width="2.5"/>
  <text x="432" y="288" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">45</text>

  <text x="430" y="320" text-anchor="middle" font-size="10" fill="#4caf50" opacity="0.85">Walk to null position, attach leaf</text>

  <!-- DELETE 30 (two children) -->
  <text x="720" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Delete(30) — two children case</text>

  <line x1="720" y1="110" x2="670" y2="160" stroke="#1a1822" stroke-width="0.8" opacity="0.3"/>
  <line x1="720" y1="110" x2="770" y2="160" stroke="#1a1822" stroke-width="0.8" opacity="0.3"/>
  <line x1="670" y1="180" x2="640" y2="230" stroke="#1a1822" stroke-width="0.8" opacity="0.3"/>
  <line x1="670" y1="180" x2="705" y2="230" stroke="#1a1822" stroke-width="0.8" opacity="0.3"/>

  <circle cx="720" cy="100" r="18" fill="#ffffff" stroke="#1a1822"/>
  <text x="720" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">50</text>
  <circle cx="670" cy="170" r="18" fill="#cc4444" stroke="#1a1822" stroke-width="2.5"/>
  <text x="670" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">30</text>
  <circle cx="770" cy="170" r="18" fill="#ffffff" stroke="#1a1822"/>
  <text x="770" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">70</text>
  <circle cx="640" cy="240" r="18" fill="#ffffff" stroke="#1a1822"/>
  <text x="640" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">20</text>
  <circle cx="705" cy="240" r="18" fill="#4caf50" stroke="#1a1822" stroke-width="2"/>
  <text x="705" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">40</text>

  <text x="720" y="290" text-anchor="middle" font-size="10" fill="#cc4444">Find in-order successor (40)</text>
  <text x="720" y="306" text-anchor="middle" font-size="10" fill="#6d5bd0">Copy successor&apos;s key into 30</text>
  <text x="720" y="322" text-anchor="middle" font-size="10" fill="#6d5bd0">Delete successor (zero-or-one-child)</text>

  <!-- Rules / bottom -->
  <rect x="40" y="360" width="820" height="120" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="40" y="360" width="820" height="28" rx="10" fill="#6d5bd0"/>
  <text x="450" y="379" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Operation rules (preserve BST invariant)</text>

  <text x="55" y="405" font-size="11" font-weight="700" fill="#1a1822">Search(k):</text>
  <text x="55" y="423" font-size="11" fill="#1a1822">Compare k with root; recurse left if k &lt; root.key, right if k &gt; root.key, stop on equality.</text>

  <text x="55" y="445" font-size="11" font-weight="700" fill="#1a1822">Insert(k):</text>
  <text x="55" y="463" font-size="11" fill="#1a1822">Search for k; if not found, attach a new leaf where search fell off. Rebalance on the way back up.</text>

  <text x="480" y="405" font-size="11" font-weight="700" fill="#1a1822">Delete(k) — three cases:</text>
  <text x="480" y="423" font-size="11" fill="#1a1822">1. No children → remove</text>
  <text x="480" y="441" font-size="11" fill="#1a1822">2. One child → splice in</text>
  <text x="480" y="459" font-size="11" fill="#1a1822">3. Two children → swap w/ successor, delete</text>
</svg>
