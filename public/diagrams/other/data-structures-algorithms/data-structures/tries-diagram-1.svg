<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Trie prefix tree storing words car cat cab dog with shared prefix nodes and end-of-word markers</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Trie: Prefix Tree Structure</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Storing {"{"}car, cat, cab, dog{"}"} — shared prefixes collapse into shared paths from the root</text>

  <!-- edges -->
  <line x1="450" y1="100" x2="320" y2="170" stroke="#1a1822"/>
  <line x1="450" y1="100" x2="600" y2="170" stroke="#1a1822"/>
  <line x1="320" y1="190" x2="320" y2="260" stroke="#1a1822"/>
  <line x1="600" y1="190" x2="600" y2="260" stroke="#1a1822"/>
  <line x1="320" y1="280" x2="220" y2="350" stroke="#1a1822"/>
  <line x1="320" y1="280" x2="320" y2="350" stroke="#1a1822"/>
  <line x1="320" y1="280" x2="420" y2="350" stroke="#1a1822"/>
  <line x1="600" y1="280" x2="600" y2="350" stroke="#1a1822"/>

  <!-- root -->
  <circle cx="450" cy="90" r="22" fill="#1a1822" stroke="#1a1822"/>
  <text x="450" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">·</text>
  <text x="490" y="90" font-size="10" fill="#1a1822" opacity="0.6">root</text>

  <!-- c -->
  <circle cx="320" cy="180" r="22" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="320" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">c</text>

  <!-- d -->
  <circle cx="600" cy="180" r="22" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="600" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">d</text>

  <!-- ca -->
  <circle cx="320" cy="270" r="22" fill="#a89bec" stroke="#1a1822"/>
  <text x="320" y="275" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">a</text>

  <!-- do -->
  <circle cx="600" cy="270" r="22" fill="#a89bec" stroke="#1a1822"/>
  <text x="600" y="275" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">o</text>

  <!-- cab cat car -->
  <circle cx="220" cy="360" r="22" fill="#cc4444" stroke="#1a1822" stroke-width="2"/>
  <text x="220" y="365" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">b★</text>
  <text x="220" y="400" text-anchor="middle" font-size="10" fill="#1a1822">cab</text>

  <circle cx="320" cy="360" r="22" fill="#cc4444" stroke="#1a1822" stroke-width="2"/>
  <text x="320" y="365" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">t★</text>
  <text x="320" y="400" text-anchor="middle" font-size="10" fill="#1a1822">cat</text>

  <circle cx="420" cy="360" r="22" fill="#cc4444" stroke="#1a1822" stroke-width="2"/>
  <text x="420" y="365" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">r★</text>
  <text x="420" y="400" text-anchor="middle" font-size="10" fill="#1a1822">car</text>

  <!-- dog -->
  <circle cx="600" cy="360" r="22" fill="#cc4444" stroke="#1a1822" stroke-width="2"/>
  <text x="600" y="365" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">g★</text>
  <text x="600" y="400" text-anchor="middle" font-size="10" fill="#1a1822">dog</text>

  <!-- legend -->
  <rect x="60" y="430" width="800" height="55" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="75" y="452" font-size="11" fill="#1a1822"><tspan font-weight="700">★ end-of-word marker</tspan> — without it, prefixes can&apos;t be distinguished from full keys (e.g., &quot;car&quot; vs &quot;cart&quot;)</text>
  <text x="75" y="472" font-size="11" fill="#1a1822"><tspan font-weight="700">Shared prefix &quot;ca&quot;</tspan> — single path serves cab/cat/car. Three keys, one shared prefix subtree → space saved as the alphabet of stored keys grows.</text>
</svg>
