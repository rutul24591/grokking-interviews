<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Bloom filter inserting an element by hashing it with k independent functions and setting k bits</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Bloom Filter: k Hashes → k Bits</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Insert sets k bits; query checks all k bits — any zero means definitely not present</text>

  <defs>
    <marker id="arrBF1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- Element -->
  <rect x="60" y="120" width="120" height="40" rx="8" fill="#cc4444" stroke="#1a1822"/>
  <text x="120" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">"apple"</text>

  <!-- Hash functions -->
  <rect x="240" y="80" width="120" height="32" rx="6" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="300" y="101" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">h₁(x)</text>
  <rect x="240" y="124" width="120" height="32" rx="6" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="300" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">h₂(x)</text>
  <rect x="240" y="168" width="120" height="32" rx="6" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="300" y="189" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">h₃(x)</text>

  <line x1="180" y1="140" x2="240" y2="96" stroke="#1a1822" marker-end="url(#arrBF1)"/>
  <line x1="180" y1="140" x2="240" y2="140" stroke="#1a1822" marker-end="url(#arrBF1)"/>
  <line x1="180" y1="140" x2="240" y2="184" stroke="#1a1822" marker-end="url(#arrBF1)"/>

  <text x="395" y="100" font-family="ui-monospace, monospace" font-size="12" fill="#1a1822">→ 2</text>
  <text x="395" y="144" font-family="ui-monospace, monospace" font-size="12" fill="#1a1822">→ 7</text>
  <text x="395" y="188" font-family="ui-monospace, monospace" font-size="12" fill="#1a1822">→ 11</text>

  <!-- Bit array -->
  <text x="640" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Bit array (m = 16)</text>
  <g font-family="ui-monospace, monospace" font-size="11">
    <g>
      <!-- 16 cells -->
      <rect x="460" y="120" width="30" height="30" fill="#ffffff" stroke="#1a1822"/><text x="475" y="139" text-anchor="middle" fill="#1a1822">0</text>
      <rect x="490" y="120" width="30" height="30" fill="#ffffff" stroke="#1a1822"/><text x="505" y="139" text-anchor="middle" fill="#1a1822">0</text>
      <rect x="520" y="120" width="30" height="30" fill="#cc4444" stroke="#1a1822"/><text x="535" y="139" text-anchor="middle" fill="#ffffff">1</text>
      <rect x="550" y="120" width="30" height="30" fill="#ffffff" stroke="#1a1822"/><text x="565" y="139" text-anchor="middle" fill="#1a1822">0</text>
      <rect x="580" y="120" width="30" height="30" fill="#ffffff" stroke="#1a1822"/><text x="595" y="139" text-anchor="middle" fill="#1a1822">0</text>
      <rect x="610" y="120" width="30" height="30" fill="#ffffff" stroke="#1a1822"/><text x="625" y="139" text-anchor="middle" fill="#1a1822">0</text>
      <rect x="640" y="120" width="30" height="30" fill="#ffffff" stroke="#1a1822"/><text x="655" y="139" text-anchor="middle" fill="#1a1822">0</text>
      <rect x="670" y="120" width="30" height="30" fill="#cc4444" stroke="#1a1822"/><text x="685" y="139" text-anchor="middle" fill="#ffffff">1</text>
      <rect x="700" y="120" width="30" height="30" fill="#ffffff" stroke="#1a1822"/><text x="715" y="139" text-anchor="middle" fill="#1a1822">0</text>
      <rect x="730" y="120" width="30" height="30" fill="#ffffff" stroke="#1a1822"/><text x="745" y="139" text-anchor="middle" fill="#1a1822">0</text>
      <rect x="760" y="120" width="30" height="30" fill="#ffffff" stroke="#1a1822"/><text x="775" y="139" text-anchor="middle" fill="#1a1822">0</text>
      <rect x="790" y="120" width="30" height="30" fill="#cc4444" stroke="#1a1822"/><text x="805" y="139" text-anchor="middle" fill="#ffffff">1</text>
      <rect x="820" y="120" width="30" height="30" fill="#ffffff" stroke="#1a1822"/><text x="835" y="139" text-anchor="middle" fill="#1a1822">0</text>
    </g>
    <text x="475" y="170" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">0</text>
    <text x="535" y="170" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">2</text>
    <text x="685" y="170" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">7</text>
    <text x="805" y="170" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">11</text>
  </g>

  <!-- Query -->
  <text x="450" y="240" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Query semantics</text>
  <rect x="60" y="260" width="380" height="100" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <text x="250" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#4caf50">contains(x) → true</text>
  <text x="75" y="310" font-size="11" fill="#1a1822">All k bits at h₁(x), h₂(x), h₃(x) are set.</text>
  <text x="75" y="328" font-size="11" fill="#1a1822">Verdict: <tspan font-weight="700">probably present</tspan> (false positive possible)</text>
  <text x="75" y="346" font-size="11" fill="#1a1822" opacity="0.7">Two unrelated keys may collectively have set those bits.</text>

  <rect x="460" y="260" width="380" height="100" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <text x="650" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#cc4444">contains(x) → false</text>
  <text x="475" y="310" font-size="11" fill="#1a1822">At least one of the k bits is zero.</text>
  <text x="475" y="328" font-size="11" fill="#1a1822">Verdict: <tspan font-weight="700">definitely absent</tspan> (no false negatives)</text>
  <text x="475" y="346" font-size="11" fill="#1a1822" opacity="0.7">Insert would have set that bit. It&apos;s zero → never inserted.</text>

  <!-- Properties -->
  <rect x="60" y="380" width="780" height="105" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="60" y="380" width="780" height="28" rx="10" fill="#6d5bd0"/>
  <text x="450" y="399" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Key properties</text>
  <text x="75" y="428" font-size="11" fill="#1a1822"><tspan font-weight="700">No false negatives:</tspan> if x was inserted, contains(x) returns true (those k bits were definitely set)</text>
  <text x="75" y="446" font-size="11" fill="#1a1822"><tspan font-weight="700">False positives possible:</tspan> bits set by other inserts may collectively answer yes for an absent key</text>
  <text x="75" y="464" font-size="11" fill="#1a1822"><tspan font-weight="700">No deletes:</tspan> clearing a bit may break some other key&apos;s membership (counting Bloom filters fix this)</text>
  <text x="75" y="478" font-size="11" fill="#1a1822"><tspan font-weight="700">Space:</tspan> ~10 bits per element gives ~1% false-positive rate — orders of magnitude smaller than a hash set</text>
</svg>
