<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Merkle tree hashing leaves into pairs upward to a single root hash</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Merkle Tree: Bottom-Up Hash Aggregation</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Each internal node = hash(left || right); root commits to all leaves with a single 32-byte digest</text>

  <!-- Root -->
  <rect x="380" y="90" width="140" height="40" rx="8" fill="#cc4444" stroke="#1a1822"/>
  <text x="450" y="115" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">root = H(H12 || H34)</text>

  <!-- Level 1 -->
  <rect x="200" y="180" width="140" height="40" rx="8" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="270" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">H12 = H(H1 || H2)</text>
  <rect x="560" y="180" width="140" height="40" rx="8" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="630" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">H34 = H(H3 || H4)</text>

  <line x1="340" y1="200" x2="410" y2="130" stroke="#1a1822" stroke-width="2"/>
  <line x1="560" y1="200" x2="490" y2="130" stroke="#1a1822" stroke-width="2"/>

  <!-- Level 0 (leaf hashes) -->
  <rect x="100" y="270" width="100" height="40" rx="8" fill="#a89bec" stroke="#1a1822"/>
  <text x="150" y="295" text-anchor="middle" font-size="11" fill="#ffffff">H1 = H(B1)</text>
  <rect x="240" y="270" width="100" height="40" rx="8" fill="#a89bec" stroke="#1a1822"/>
  <text x="290" y="295" text-anchor="middle" font-size="11" fill="#ffffff">H2 = H(B2)</text>
  <rect x="560" y="270" width="100" height="40" rx="8" fill="#a89bec" stroke="#1a1822"/>
  <text x="610" y="295" text-anchor="middle" font-size="11" fill="#ffffff">H3 = H(B3)</text>
  <rect x="700" y="270" width="100" height="40" rx="8" fill="#a89bec" stroke="#1a1822"/>
  <text x="750" y="295" text-anchor="middle" font-size="11" fill="#ffffff">H4 = H(B4)</text>

  <line x1="200" y1="290" x2="240" y2="220" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="290" y1="270" x2="290" y2="220" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="610" y1="270" x2="610" y2="220" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="700" y1="290" x2="660" y2="220" stroke="#1a1822" stroke-width="1.5"/>

  <!-- Data blocks -->
  <rect x="100" y="350" width="100" height="35" rx="6" fill="#ffffff" stroke="#1a1822"/>
  <text x="150" y="372" text-anchor="middle" font-size="11" fill="#1a1822">Block B1</text>
  <rect x="240" y="350" width="100" height="35" rx="6" fill="#ffffff" stroke="#1a1822"/>
  <text x="290" y="372" text-anchor="middle" font-size="11" fill="#1a1822">Block B2</text>
  <rect x="560" y="350" width="100" height="35" rx="6" fill="#ffffff" stroke="#1a1822"/>
  <text x="610" y="372" text-anchor="middle" font-size="11" fill="#1a1822">Block B3</text>
  <rect x="700" y="350" width="100" height="35" rx="6" fill="#ffffff" stroke="#1a1822"/>
  <text x="750" y="372" text-anchor="middle" font-size="11" fill="#1a1822">Block B4</text>

  <line x1="150" y1="350" x2="150" y2="310" stroke="#1a1822" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="290" y1="350" x2="290" y2="310" stroke="#1a1822" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="610" y1="350" x2="610" y2="310" stroke="#1a1822" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="750" y1="350" x2="750" y2="310" stroke="#1a1822" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Footer -->
  <rect x="60" y="410" width="780" height="75" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="75" y="430" font-size="11" font-weight="700" fill="#1a1822">Properties:</text>
  <text x="75" y="448" font-size="11" fill="#1a1822">• Tampering with any leaf changes its hash, propagating up — root mismatch detects corruption with one comparison</text>
  <text x="75" y="464" font-size="11" fill="#1a1822">• Hash function H is collision-resistant (SHA-256 in Bitcoin, Blake3 in modern systems) — typically 32-byte digests</text>
  <text x="75" y="480" font-size="11" fill="#1a1822">• Odd leaf counts: duplicate the last leaf (Bitcoin) or carry it up unchanged (RFC 6962 Certificate Transparency)</text>
</svg>
