<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Bounded versus unbounded queue behavior under upstream slowdown with backpressure signaling</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Bounded vs Unbounded Queue Under Slowdown</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Bounded queues apply backpressure; unbounded queues convert slowdowns into memory growth</text>

  <defs>
    <marker id="arrQ3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1822"/>
    </marker>
  </defs>

  <!-- Bounded scenario -->
  <rect x="30" y="80" width="410" height="380" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="30" y="80" width="410" height="32" rx="10" fill="#4caf50"/>
  <text x="235" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Bounded queue — healthy system</text>

  <!-- Producer -->
  <rect x="50" y="135" width="90" height="50" rx="6" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="95" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Producer</text>
  <text x="95" y="175" text-anchor="middle" font-size="9" fill="#ffffff">blocks or retries</text>

  <!-- Queue (mostly full) -->
  <rect x="160" y="135" width="180" height="50" rx="4" fill="#ffffff" stroke="#1a1822"/>
  <g>
    <rect x="165" y="140" width="18" height="40" fill="#a89bec"/>
    <rect x="183" y="140" width="18" height="40" fill="#a89bec"/>
    <rect x="201" y="140" width="18" height="40" fill="#a89bec"/>
    <rect x="219" y="140" width="18" height="40" fill="#a89bec"/>
    <rect x="237" y="140" width="18" height="40" fill="#a89bec"/>
    <rect x="255" y="140" width="18" height="40" fill="#a89bec"/>
    <rect x="273" y="140" width="18" height="40" fill="#a89bec"/>
    <rect x="291" y="140" width="18" height="40" fill="#a89bec"/>
    <rect x="309" y="140" width="18" height="40" fill="#ffffff" stroke="#1a1822" stroke-dasharray="3,2"/>
  </g>
  <text x="250" y="205" text-anchor="middle" font-size="10" fill="#1a1822">cap = 9, depth = 8 (near full)</text>

  <!-- Consumer (slow) -->
  <rect x="360" y="135" width="70" height="50" rx="6" fill="#cc4444" stroke="#1a1822"/>
  <text x="395" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Slow</text>
  <text x="395" y="173" text-anchor="middle" font-size="9" fill="#ffffff">consumer</text>

  <line x1="140" y1="160" x2="160" y2="160" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrQ3)"/>
  <line x1="340" y1="160" x2="360" y2="160" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrQ3)"/>

  <!-- Backpressure signal (dashed return) -->
  <path d="M 160 135 Q 100 100 95 135" stroke="#cc4444" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrQ3)"/>
  <text x="120" y="93" font-size="10" font-weight="700" fill="#cc4444">backpressure</text>

  <!-- Outcomes -->
  <text x="50" y="240" font-size="12" font-weight="700" fill="#1a1822">Outcomes under sustained slowdown:</text>
  <text x="50" y="262" font-size="11" fill="#1a1822">• Queue fills to capacity, stops growing</text>
  <text x="50" y="280" font-size="11" fill="#1a1822">• enqueue() blocks, retries, or returns error</text>
  <text x="50" y="298" font-size="11" fill="#1a1822">• Producer slows — signal propagates upstream</text>
  <text x="50" y="316" font-size="11" fill="#1a1822">• Memory footprint bounded — no OOM</text>

  <rect x="50" y="340" width="370" height="100" rx="6" fill="#e8f5e9"/>
  <text x="65" y="362" font-size="11" font-weight="700" fill="#1a1822">Overflow policies:</text>
  <text x="65" y="381" font-size="10" fill="#1a1822">• Block: producer waits (classic blocking queue)</text>
  <text x="65" y="397" font-size="10" fill="#1a1822">• Drop-oldest: new messages always accepted</text>
  <text x="65" y="413" font-size="10" fill="#1a1822">• Drop-newest: old messages preserved</text>
  <text x="65" y="429" font-size="10" fill="#1a1822">• Reject: return error to caller immediately</text>

  <!-- Unbounded scenario -->
  <rect x="460" y="80" width="410" height="380" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="460" y="80" width="410" height="32" rx="10" fill="#cc4444"/>
  <text x="665" y="101" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Unbounded queue — hidden OOM</text>

  <rect x="480" y="135" width="90" height="50" rx="6" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="525" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">Producer</text>
  <text x="525" y="175" text-anchor="middle" font-size="9" fill="#ffffff">unblocked</text>

  <rect x="590" y="135" width="200" height="50" rx="4" fill="#ffffff" stroke="#1a1822"/>
  <g>
    <rect x="595" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="605" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="615" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="625" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="635" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="645" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="655" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="665" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="675" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="685" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="695" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="705" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="715" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="725" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="735" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="745" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="755" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="765" y="140" width="10" height="40" fill="#cc4444"/>
    <rect x="775" y="140" width="10" height="40" fill="#cc4444"/>
  </g>
  <text x="690" y="205" text-anchor="middle" font-size="10" fill="#1a1822">depth = ∞ (growing unboundedly)</text>

  <line x1="570" y1="160" x2="588" y2="160" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrQ3)"/>

  <text x="480" y="240" font-size="12" font-weight="700" fill="#1a1822">Outcomes under sustained slowdown:</text>
  <text x="480" y="262" font-size="11" fill="#1a1822">• Queue keeps growing, depth unbounded</text>
  <text x="480" y="280" font-size="11" fill="#1a1822">• No signal to producer; accepts all enqueues</text>
  <text x="480" y="298" font-size="11" fill="#1a1822">• Memory grows monotonically</text>
  <text x="480" y="316" font-size="11" font-weight="700" fill="#cc4444">• Eventually: OOM → process killed → incident</text>

  <rect x="480" y="340" width="370" height="100" rx="6" fill="#ffebee"/>
  <text x="495" y="362" font-size="11" font-weight="700" fill="#1a1822">Incident pattern (production):</text>
  <text x="495" y="381" font-size="10" fill="#1a1822">1. Downstream slows (db lock, GC pause, net)</text>
  <text x="495" y="397" font-size="10" fill="#1a1822">2. Queue fills, process RSS climbs</text>
  <text x="495" y="413" font-size="10" fill="#1a1822">3. Alarms fire late; kernel OOMs first</text>
  <text x="495" y="429" font-size="10" fill="#cc4444">4. Cascading failure as upstream retries</text>
</svg>
