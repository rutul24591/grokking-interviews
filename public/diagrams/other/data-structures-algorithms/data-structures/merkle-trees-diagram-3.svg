<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Merkle tree synchronization comparing two trees by walking root downward and only descending into mismatched subtrees</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Anti-Entropy Sync: Diff Two Trees Top-Down</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Cassandra/Dynamo replicas exchange Merkle trees; only mismatched subtrees descend, isolating divergent keys</text>

  <!-- Replica A -->
  <text x="220" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Replica A</text>
  <rect x="170" y="105" width="100" height="32" rx="6" fill="#cc4444" stroke="#1a1822"/>
  <text x="220" y="126" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">root: aa11</text>

  <rect x="100" y="170" width="80" height="32" rx="6" fill="#a89bec" stroke="#1a1822"/>
  <text x="140" y="191" text-anchor="middle" font-size="11" fill="#ffffff">L: bb22</text>
  <rect x="260" y="170" width="80" height="32" rx="6" fill="#cc4444" stroke="#1a1822"/>
  <text x="300" y="191" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">R: cc33</text>

  <line x1="180" y1="186" x2="200" y2="137" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="260" y1="186" x2="240" y2="137" stroke="#1a1822" stroke-width="1.5"/>

  <rect x="60" y="235" width="60" height="28" rx="6" fill="#dddddd" stroke="#1a1822"/>
  <text x="90" y="254" text-anchor="middle" font-size="10" fill="#1a1822">k1: x</text>
  <rect x="130" y="235" width="60" height="28" rx="6" fill="#dddddd" stroke="#1a1822"/>
  <text x="160" y="254" text-anchor="middle" font-size="10" fill="#1a1822">k2: y</text>
  <rect x="240" y="235" width="60" height="28" rx="6" fill="#dddddd" stroke="#1a1822"/>
  <text x="270" y="254" text-anchor="middle" font-size="10" fill="#1a1822">k3: z</text>
  <rect x="310" y="235" width="60" height="28" rx="6" fill="#4caf50" stroke="#1a1822"/>
  <text x="340" y="254" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">k4: NEW</text>

  <!-- Replica B -->
  <text x="680" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Replica B</text>
  <rect x="630" y="105" width="100" height="32" rx="6" fill="#cc4444" stroke="#1a1822"/>
  <text x="680" y="126" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">root: aa99</text>

  <rect x="560" y="170" width="80" height="32" rx="6" fill="#a89bec" stroke="#1a1822"/>
  <text x="600" y="191" text-anchor="middle" font-size="11" fill="#ffffff">L: bb22</text>
  <rect x="720" y="170" width="80" height="32" rx="6" fill="#cc4444" stroke="#1a1822"/>
  <text x="760" y="191" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">R: cc88</text>

  <line x1="640" y1="186" x2="660" y2="137" stroke="#1a1822" stroke-width="1.5"/>
  <line x1="720" y1="186" x2="700" y2="137" stroke="#1a1822" stroke-width="1.5"/>

  <rect x="520" y="235" width="60" height="28" rx="6" fill="#dddddd" stroke="#1a1822"/>
  <text x="550" y="254" text-anchor="middle" font-size="10" fill="#1a1822">k1: x</text>
  <rect x="590" y="235" width="60" height="28" rx="6" fill="#dddddd" stroke="#1a1822"/>
  <text x="620" y="254" text-anchor="middle" font-size="10" fill="#1a1822">k2: y</text>
  <rect x="700" y="235" width="60" height="28" rx="6" fill="#dddddd" stroke="#1a1822"/>
  <text x="730" y="254" text-anchor="middle" font-size="10" fill="#1a1822">k3: z</text>
  <rect x="770" y="235" width="60" height="28" rx="6" fill="#dddddd" stroke="#1a1822"/>
  <text x="800" y="254" text-anchor="middle" font-size="10" fill="#1a1822">(empty)</text>

  <!-- Diff arrow -->
  <line x1="380" y1="120" x2="620" y2="120" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="500" y="115" text-anchor="middle" font-size="11" fill="#6d5bd0">root mismatch → descend</text>

  <line x1="350" y1="186" x2="555" y2="186" stroke="#4caf50" stroke-width="2"/>
  <text x="450" y="180" text-anchor="middle" font-size="10" fill="#4caf50">L matches: skip subtree</text>

  <line x1="350" y1="245" x2="510" y2="245" stroke="#cc4444" stroke-width="2"/>
  <text x="430" y="262" text-anchor="middle" font-size="10" fill="#cc4444">R diverges → repair k4</text>

  <!-- Footer -->
  <rect x="60" y="320" width="780" height="160" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="60" y="320" width="780" height="28" rx="10" fill="#6d5bd0"/>
  <text x="450" y="339" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Why Merkle sync wins for replication</text>
  <text x="75" y="368" font-size="11" fill="#1a1822">• Bandwidth O(d log n) where d = number of differing keys — equal replicas exchange just the root hash (O(1))</text>
  <text x="75" y="386" font-size="11" fill="#1a1822">• No need to ship every key/value to compare; mismatched paths point straight at the repair set</text>
  <text x="75" y="404" font-size="11" fill="#1a1822">• Tree built periodically per token range; nodes cache it between repair sessions to amortize cost</text>
  <text x="75" y="430" font-size="11" fill="#1a1822"><tspan font-weight="700">Production:</tspan> Cassandra <tspan font-family="ui-monospace, monospace">nodetool repair</tspan>, DynamoDB internal anti-entropy, ZFS send/recv, rsync's rolling checksum (variant)</text>
  <text x="75" y="450" font-size="11" fill="#1a1822" opacity="0.7"><tspan font-weight="700">Caveat:</tspan> imbalanced trees give worst-case linear diff — Cassandra splits ranges into subranges and builds one tree per subrange to bound work</text>
  <text x="75" y="470" font-size="11" fill="#1a1822" opacity="0.7"><tspan font-weight="700">Variant:</tspan> Merkle Patricia tries (Ethereum) interleave key prefixes with hashing — proofs against a state root authenticate any account</text>
</svg>
