<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>LRU cache architecture with hash map keys mapping to nodes in a doubly linked recency list</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">LRU Cache: Hash Map + Doubly Linked List</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Hash map gives O(1) lookup; recency list gives O(1) promotion to head and O(1) tail eviction</text>

  <defs>
    <marker id="arrLRU" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1822"/>
    </marker>
    <marker id="arrLRUred" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#cc4444"/>
    </marker>
  </defs>

  <!-- Hash Map -->
  <rect x="40" y="80" width="200" height="280" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="40" y="80" width="200" height="30" rx="10" fill="#4caf50"/>
  <text x="140" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Hash Map (key → node)</text>

  <g font-family="ui-monospace, monospace">
    <rect x="55" y="125" width="80" height="30" fill="#e8f5e9" stroke="#1a1822"/>
    <text x="95" y="145" text-anchor="middle" font-size="11" fill="#1a1822">&quot;user:1&quot;</text>
    <rect x="155" y="125" width="70" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="190" y="145" text-anchor="middle" font-size="11" fill="#1a1822">→ ●</text>

    <rect x="55" y="165" width="80" height="30" fill="#e8f5e9" stroke="#1a1822"/>
    <text x="95" y="185" text-anchor="middle" font-size="11" fill="#1a1822">&quot;user:7&quot;</text>
    <rect x="155" y="165" width="70" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="190" y="185" text-anchor="middle" font-size="11" fill="#1a1822">→ ●</text>

    <rect x="55" y="205" width="80" height="30" fill="#e8f5e9" stroke="#1a1822"/>
    <text x="95" y="225" text-anchor="middle" font-size="11" fill="#1a1822">&quot;user:3&quot;</text>
    <rect x="155" y="205" width="70" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="190" y="225" text-anchor="middle" font-size="11" fill="#1a1822">→ ●</text>

    <rect x="55" y="245" width="80" height="30" fill="#e8f5e9" stroke="#1a1822"/>
    <text x="95" y="265" text-anchor="middle" font-size="11" fill="#1a1822">&quot;user:5&quot;</text>
    <rect x="155" y="245" width="70" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="190" y="265" text-anchor="middle" font-size="11" fill="#1a1822">→ ●</text>
  </g>

  <text x="140" y="305" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.7">O(1) lookup</text>
  <text x="140" y="330" text-anchor="middle" font-size="10" fill="#1a1822">Values are pointers into</text>
  <text x="140" y="345" text-anchor="middle" font-size="10" fill="#1a1822">the recency list →</text>

  <!-- Recency list -->
  <text x="280" y="100" font-size="13" font-weight="700" fill="#6d5bd0">Doubly Linked Recency List</text>
  <text x="280" y="118" font-size="10" fill="#1a1822" opacity="0.7">MRU (most recently used) at head, LRU at tail</text>

  <!-- Head sentinel -->
  <rect x="280" y="180" width="60" height="50" rx="6" fill="#cc4444" stroke="#1a1822"/>
  <text x="310" y="200" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">HEAD</text>
  <text x="310" y="218" text-anchor="middle" font-size="9" fill="#ffffff">MRU</text>

  <!-- Node user:5 (MRU) -->
  <rect x="360" y="180" width="90" height="50" rx="6" fill="#ffffff" stroke="#1a1822"/>
  <text x="405" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">user:5</text>
  <text x="405" y="218" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.7">newest</text>

  <!-- Node user:3 -->
  <rect x="470" y="180" width="90" height="50" rx="6" fill="#ffffff" stroke="#1a1822"/>
  <text x="515" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">user:3</text>

  <!-- Node user:7 -->
  <rect x="580" y="180" width="90" height="50" rx="6" fill="#ffffff" stroke="#1a1822"/>
  <text x="625" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">user:7</text>

  <!-- Node user:1 (LRU) -->
  <rect x="690" y="180" width="90" height="50" rx="6" fill="#ffebee" stroke="#cc4444" stroke-width="2"/>
  <text x="735" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">user:1</text>
  <text x="735" y="218" text-anchor="middle" font-size="9" fill="#cc4444" opacity="0.8">LRU (next evict)</text>

  <!-- Tail sentinel -->
  <rect x="800" y="180" width="60" height="50" rx="6" fill="#cc4444" stroke="#1a1822"/>
  <text x="830" y="200" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">TAIL</text>
  <text x="830" y="218" text-anchor="middle" font-size="9" fill="#ffffff">sentinel</text>

  <!-- Forward arrows -->
  <line x1="340" y1="200" x2="358" y2="200" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrLRU)"/>
  <line x1="450" y1="200" x2="468" y2="200" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrLRU)"/>
  <line x1="560" y1="200" x2="578" y2="200" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrLRU)"/>
  <line x1="670" y1="200" x2="688" y2="200" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrLRU)"/>
  <line x1="780" y1="200" x2="798" y2="200" stroke="#1a1822" stroke-width="1.5" marker-end="url(#arrLRU)"/>

  <!-- Back arrows -->
  <line x1="358" y1="215" x2="340" y2="215" stroke="#cc4444" stroke-width="1.5" marker-end="url(#arrLRUred)"/>
  <line x1="468" y1="215" x2="450" y2="215" stroke="#cc4444" stroke-width="1.5" marker-end="url(#arrLRUred)"/>
  <line x1="578" y1="215" x2="560" y2="215" stroke="#cc4444" stroke-width="1.5" marker-end="url(#arrLRUred)"/>
  <line x1="688" y1="215" x2="670" y2="215" stroke="#cc4444" stroke-width="1.5" marker-end="url(#arrLRUred)"/>
  <line x1="798" y1="215" x2="780" y2="215" stroke="#cc4444" stroke-width="1.5" marker-end="url(#arrLRUred)"/>

  <!-- Hash map → list links (dashed) -->
  <path d="M 225 140 Q 500 150 625 185" stroke="#4caf50" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
  <path d="M 225 180 Q 500 165 515 185" stroke="#4caf50" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
  <path d="M 225 220 Q 500 230 735 185" stroke="#4caf50" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
  <path d="M 225 260 Q 500 290 405 185" stroke="#4caf50" stroke-width="1" fill="none" stroke-dasharray="3,3"/>

  <!-- Operations -->
  <rect x="40" y="380" width="400" height="100" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="40" y="380" width="400" height="28" rx="10" fill="#6d5bd0"/>
  <text x="240" y="399" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">get(key)</text>
  <text x="55" y="425" font-size="11" fill="#1a1822">1. node = map.get(key)       — O(1)</text>
  <text x="55" y="443" font-size="11" fill="#1a1822">2. remove node from list     — O(1) via prev/next</text>
  <text x="55" y="461" font-size="11" fill="#1a1822">3. insert node at head       — O(1)</text>

  <rect x="460" y="380" width="400" height="100" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="460" y="380" width="400" height="28" rx="10" fill="#cc4444"/>
  <text x="660" y="399" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">put(key, val) when full</text>
  <text x="475" y="425" font-size="11" fill="#1a1822">1. victim = TAIL.prev        — O(1)</text>
  <text x="475" y="443" font-size="11" fill="#1a1822">2. remove victim from list   — O(1)</text>
  <text x="475" y="461" font-size="11" fill="#1a1822">3. map.delete(victim.key)    — O(1)</text>
</svg>
