<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>K-way merge using a min-heap extracting the smallest front element from each sorted stream</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">K-Way Merge with a Size-K Min-Heap</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Merge K sorted streams in O(n log K) by pulling the smallest front through a heap</text>

  <defs>
    <marker id="arrHP3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1822"/>
    </marker>
  </defs>

  <!-- K sorted streams -->
  <text x="120" y="85" font-size="13" font-weight="700" fill="#1a1822">4 sorted streams</text>

  <g font-family="ui-monospace, monospace">
    <text x="40" y="120" font-size="11" fill="#1a1822">A:</text>
    <rect x="60" y="105" width="40" height="30" fill="#d7c9f5" stroke="#1a1822"/>
    <text x="80" y="125" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="100" y="105" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="120" y="125" text-anchor="middle" font-size="12" fill="#1a1822">4</text>
    <rect x="140" y="105" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="160" y="125" text-anchor="middle" font-size="12" fill="#1a1822">7</text>
    <rect x="180" y="105" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="200" y="125" text-anchor="middle" font-size="12" fill="#1a1822">12</text>

    <text x="40" y="170" font-size="11" fill="#1a1822">B:</text>
    <rect x="60" y="155" width="40" height="30" fill="#d7c9f5" stroke="#1a1822"/>
    <text x="80" y="175" text-anchor="middle" font-size="12" fill="#1a1822">2</text>
    <rect x="100" y="155" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="120" y="175" text-anchor="middle" font-size="12" fill="#1a1822">5</text>
    <rect x="140" y="155" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="160" y="175" text-anchor="middle" font-size="12" fill="#1a1822">9</text>

    <text x="40" y="220" font-size="11" fill="#1a1822">C:</text>
    <rect x="60" y="205" width="40" height="30" fill="#d7c9f5" stroke="#1a1822"/>
    <text x="80" y="225" text-anchor="middle" font-size="12" fill="#1a1822">3</text>
    <rect x="100" y="205" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="120" y="225" text-anchor="middle" font-size="12" fill="#1a1822">6</text>
    <rect x="140" y="205" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="160" y="225" text-anchor="middle" font-size="12" fill="#1a1822">11</text>

    <text x="40" y="270" font-size="11" fill="#1a1822">D:</text>
    <rect x="60" y="255" width="40" height="30" fill="#d7c9f5" stroke="#1a1822"/>
    <text x="80" y="275" text-anchor="middle" font-size="12" fill="#1a1822">8</text>
    <rect x="100" y="255" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="120" y="275" text-anchor="middle" font-size="12" fill="#1a1822">10</text>
  </g>

  <text x="120" y="305" font-size="10" fill="#1a1822" opacity="0.7">Shaded = front element (in heap)</text>

  <!-- Heap -->
  <text x="450" y="85" font-size="13" font-weight="700" fill="#1a1822">Min-heap (size K = 4)</text>

  <line x1="450" y1="115" x2="400" y2="160" stroke="#1a1822"/>
  <line x1="450" y1="115" x2="500" y2="160" stroke="#1a1822"/>
  <line x1="400" y1="180" x2="370" y2="225" stroke="#1a1822"/>

  <circle cx="450" cy="105" r="22" fill="#cc4444" stroke="#1a1822"/>
  <text x="450" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
  <text x="480" y="108" font-size="9" fill="#1a1822" opacity="0.6">(from A)</text>

  <circle cx="400" cy="170" r="20" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="400" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2</text>
  <text x="360" y="173" text-anchor="end" font-size="9" fill="#1a1822" opacity="0.6">(B)</text>

  <circle cx="500" cy="170" r="20" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="500" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>
  <text x="540" y="173" font-size="9" fill="#1a1822" opacity="0.6">(C)</text>

  <circle cx="370" cy="235" r="18" fill="#a89bec" stroke="#1a1822"/>
  <text x="370" y="240" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">8</text>
  <text x="330" y="238" text-anchor="end" font-size="9" fill="#1a1822" opacity="0.6">(D)</text>

  <text x="450" y="280" text-anchor="middle" font-size="11" fill="#1a1822">Each heap entry also tracks which stream it came from</text>
  <text x="450" y="296" text-anchor="middle" font-size="11" fill="#1a1822">(needed to know where to pull the next element)</text>

  <!-- Output -->
  <text x="770" y="85" font-size="13" font-weight="700" fill="#1a1822">Output</text>

  <g font-family="ui-monospace, monospace">
    <rect x="680" y="105" width="40" height="30" fill="#4caf50" stroke="#1a1822"/>
    <text x="700" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
    <rect x="720" y="105" width="40" height="30" fill="#4caf50" stroke="#1a1822"/>
    <text x="740" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2</text>
    <rect x="760" y="105" width="40" height="30" fill="#4caf50" stroke="#1a1822"/>
    <text x="780" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>
    <rect x="800" y="105" width="40" height="30" fill="#ffffff" stroke="#1a1822" stroke-dasharray="3,2"/>
    <text x="820" y="125" text-anchor="middle" font-size="12" fill="#1a1822">?</text>
  </g>
  <text x="770" y="155" font-size="10" fill="#1a1822" opacity="0.7">Extracted so far</text>

  <!-- Algorithm -->
  <rect x="60" y="340" width="800" height="140" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="60" y="340" width="800" height="28" rx="10" fill="#6d5bd0"/>
  <text x="460" y="359" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Algorithm</text>
  <text x="75" y="388" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">1. Initialize: push the head of each stream into the heap, tagged with its stream id</text>
  <text x="75" y="406" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">2. Loop: (value, streamId) = heap.extractMin(); emit value</text>
  <text x="75" y="424" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">3.        if streams[streamId].hasNext(): heap.push((streams[streamId].next(), streamId))</text>
  <text x="75" y="442" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">4. Until heap is empty</text>
  <text x="75" y="470" font-size="11" fill="#1a1822"><tspan font-weight="700">Total cost:</tspan> n elements × O(log K) per heap op = O(n log K) — optimal for k-way merge</text>
</svg>
