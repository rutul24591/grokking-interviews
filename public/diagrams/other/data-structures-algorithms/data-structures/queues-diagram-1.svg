<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>FIFO queue showing enqueue at tail and dequeue at head preserving insertion order</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">FIFO: Enqueue at Tail, Dequeue at Head</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Elements leave in arrival order; the queue absorbs producer-consumer rate mismatch</text>

  <defs>
    <marker id="arrQ1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1822"/>
    </marker>
    <marker id="arrQ1g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4caf50"/>
    </marker>
    <marker id="arrQ1r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#cc4444"/>
    </marker>
  </defs>

  <!-- Producer -->
  <rect x="40" y="170" width="110" height="70" rx="8" fill="#4caf50" stroke="#1a1822" stroke-width="1.5"/>
  <text x="95" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Producer</text>
  <text x="95" y="220" text-anchor="middle" font-size="10" fill="#ffffff">enqueue(x)</text>

  <!-- Queue body -->
  <rect x="195" y="155" width="510" height="100" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Queue (FIFO)</text>

  <!-- Slots in queue -->
  <g>
    <rect x="210" y="175" width="75" height="60" fill="#a89bec" stroke="#1a1822"/>
    <text x="247" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">M₁</text>
    <text x="247" y="225" text-anchor="middle" font-size="9" fill="#ffffff">arrived 1st</text>

    <rect x="285" y="175" width="75" height="60" fill="#a89bec" stroke="#1a1822"/>
    <text x="322" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">M₂</text>
    <text x="322" y="225" text-anchor="middle" font-size="9" fill="#ffffff">2nd</text>

    <rect x="360" y="175" width="75" height="60" fill="#a89bec" stroke="#1a1822"/>
    <text x="397" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">M₃</text>

    <rect x="435" y="175" width="75" height="60" fill="#a89bec" stroke="#1a1822"/>
    <text x="472" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">M₄</text>

    <rect x="510" y="175" width="75" height="60" fill="#a89bec" stroke="#1a1822"/>
    <text x="547" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">M₅</text>

    <rect x="585" y="175" width="75" height="60" fill="#a89bec" stroke="#1a1822"/>
    <text x="622" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">M₆</text>
    <text x="622" y="225" text-anchor="middle" font-size="9" fill="#ffffff">newest</text>
  </g>

  <!-- Head/tail markers -->
  <text x="247" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#cc4444">head</text>
  <line x1="247" y1="245" x2="247" y2="260" stroke="#cc4444" stroke-width="2"/>

  <text x="622" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf50">tail</text>
  <line x1="622" y1="245" x2="622" y2="260" stroke="#4caf50" stroke-width="2"/>

  <!-- Consumer -->
  <rect x="750" y="170" width="110" height="70" rx="8" fill="#cc4444" stroke="#1a1822" stroke-width="1.5"/>
  <text x="805" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Consumer</text>
  <text x="805" y="220" text-anchor="middle" font-size="10" fill="#ffffff">dequeue()</text>

  <!-- Flow arrows -->
  <line x1="150" y1="205" x2="195" y2="205" stroke="#4caf50" stroke-width="2.5" marker-end="url(#arrQ1g)"/>
  <line x1="705" y1="205" x2="748" y2="205" stroke="#cc4444" stroke-width="2.5" marker-end="url(#arrQ1r)"/>

  <!-- Timeline -->
  <text x="60" y="320" font-size="13" font-weight="700" fill="#1a1822">Ordering invariant</text>
  <text x="60" y="342" font-size="11" fill="#1a1822">M₁ arrived first, so M₁ departs first. Insertion-order is preserved across arbitrary enqueue/dequeue interleavings.</text>

  <rect x="60" y="365" width="390" height="110" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="1.5"/>
  <rect x="60" y="365" width="390" height="28" rx="10" fill="#4caf50"/>
  <text x="255" y="384" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Rate decoupling</text>
  <text x="75" y="410" font-size="11" fill="#1a1822">Producer bursts (100/s) + Consumer steady (50/s)</text>
  <text x="75" y="428" font-size="11" fill="#1a1822">→ queue depth grows until burst subsides</text>
  <text x="75" y="446" font-size="11" fill="#1a1822">→ consumer drains in steady FIFO order</text>
  <text x="75" y="464" font-size="11" font-weight="700" fill="#4caf50">Queue absorbs mismatch up to capacity</text>

  <rect x="470" y="365" width="390" height="110" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="1.5"/>
  <rect x="470" y="365" width="390" height="28" rx="10" fill="#cc4444"/>
  <text x="665" y="384" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Unbounded risk</text>
  <text x="485" y="410" font-size="11" fill="#1a1822">If consumer stalls and queue is unbounded:</text>
  <text x="485" y="428" font-size="11" fill="#1a1822">• Memory grows monotonically</text>
  <text x="485" y="446" font-size="11" fill="#1a1822">• No upstream signal to slow down</text>
  <text x="485" y="464" font-size="11" font-weight="700" fill="#cc4444">→ eventual OOM, process killed</text>
</svg>
