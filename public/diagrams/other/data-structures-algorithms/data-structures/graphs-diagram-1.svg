<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Graph variants directed undirected and weighted shown side by side</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Graph Variants: Directed, Undirected, Weighted</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Edge semantics determine which algorithms apply and what invariants hold</text>

  <defs>
    <marker id="arrG1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1822"/>
    </marker>
  </defs>

  <!-- Undirected -->
  <text x="160" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Undirected</text>
  <line x1="100" y1="160" x2="220" y2="160" stroke="#1a1822" stroke-width="2"/>
  <line x1="100" y1="160" x2="160" y2="260" stroke="#1a1822" stroke-width="2"/>
  <line x1="220" y1="160" x2="160" y2="260" stroke="#1a1822" stroke-width="2"/>
  <circle cx="100" cy="160" r="22" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="100" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">A</text>
  <circle cx="220" cy="160" r="22" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="220" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">B</text>
  <circle cx="160" cy="260" r="22" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="160" y="265" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">C</text>
  <text x="160" y="320" text-anchor="middle" font-size="11" fill="#1a1822">Edges symmetric: (A,B) = (B,A)</text>
  <text x="160" y="338" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">Friendship, road network</text>

  <!-- Directed -->
  <text x="450" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Directed</text>
  <line x1="395" y1="160" x2="500" y2="160" stroke="#1a1822" stroke-width="2" marker-end="url(#arrG1)"/>
  <line x1="510" y1="180" x2="455" y2="245" stroke="#1a1822" stroke-width="2" marker-end="url(#arrG1)"/>
  <line x1="445" y1="245" x2="395" y2="180" stroke="#1a1822" stroke-width="2" marker-end="url(#arrG1)"/>
  <circle cx="390" cy="160" r="22" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="390" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">A</text>
  <circle cx="510" cy="160" r="22" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="510" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">B</text>
  <circle cx="450" cy="260" r="22" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="450" y="265" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">C</text>
  <text x="450" y="320" text-anchor="middle" font-size="11" fill="#1a1822">Edges asymmetric: A→B ≠ B→A</text>
  <text x="450" y="338" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">Twitter follow, dependency DAG</text>

  <!-- Weighted -->
  <text x="740" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Weighted</text>
  <line x1="680" y1="160" x2="800" y2="160" stroke="#1a1822" stroke-width="2"/>
  <line x1="680" y1="160" x2="740" y2="260" stroke="#1a1822" stroke-width="2"/>
  <line x1="800" y1="160" x2="740" y2="260" stroke="#1a1822" stroke-width="2"/>
  <text x="740" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#cc4444">5</text>
  <text x="690" y="220" text-anchor="end" font-size="11" font-weight="700" fill="#cc4444">3</text>
  <text x="790" y="220" font-size="11" font-weight="700" fill="#cc4444">7</text>
  <circle cx="680" cy="160" r="22" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="680" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">A</text>
  <circle cx="800" cy="160" r="22" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="800" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">B</text>
  <circle cx="740" cy="260" r="22" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="740" y="265" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">C</text>
  <text x="740" y="320" text-anchor="middle" font-size="11" fill="#1a1822">Each edge has cost / capacity</text>
  <text x="740" y="338" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">Shortest path, max flow</text>

  <!-- Properties panel -->
  <rect x="60" y="370" width="800" height="115" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="60" y="370" width="800" height="28" rx="10" fill="#6d5bd0"/>
  <text x="460" y="389" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Algorithm applicability depends on edge semantics</text>
  <text x="75" y="418" font-size="11" fill="#1a1822"><tspan font-weight="700">Cycle detection:</tspan> undirected → DFS + visited; directed → DFS + recursion stack (different invariant)</text>
  <text x="75" y="438" font-size="11" fill="#1a1822"><tspan font-weight="700">Shortest path:</tspan> unweighted → BFS (O(V+E)); non-negative weights → Dijkstra; negative weights → Bellman-Ford</text>
  <text x="75" y="458" font-size="11" fill="#1a1822"><tspan font-weight="700">Topological sort:</tspan> only defined on DAGs (directed acyclic graphs)</text>
  <text x="75" y="478" font-size="11" fill="#1a1822"><tspan font-weight="700">Connectivity:</tspan> undirected → connected components; directed → strongly connected components (Tarjan/Kosaraju)</text>
</svg>
