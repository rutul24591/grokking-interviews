<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>AVL tree rotation example showing left rotation rebalancing after unbalanced insert</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">AVL Rotation: Rebalancing After Insert</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">A single left rotation restores balance when right subtree becomes too heavy</text>

  <!-- BEFORE (unbalanced) -->
  <text x="200" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#cc4444">Before: balance factor = −2 (unbalanced)</text>

  <line x1="200" y1="120" x2="200" y2="170" stroke="#1a1822"/>
  <line x1="200" y1="210" x2="200" y2="260" stroke="#1a1822"/>
  <line x1="200" y1="300" x2="200" y2="350" stroke="#1a1822"/>

  <circle cx="200" cy="105" r="25" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="200" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">A</text>
  <text x="245" y="109" font-size="10" fill="#cc4444">bf = −2</text>

  <circle cx="200" cy="195" r="25" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="200" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">B</text>
  <text x="245" y="199" font-size="10" fill="#cc4444">bf = −1</text>

  <circle cx="200" cy="285" r="25" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="200" y="290" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">C</text>

  <circle cx="200" cy="375" r="22" fill="#4caf50" stroke="#1a1822" stroke-width="2"/>
  <text x="200" y="380" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">D</text>
  <text x="235" y="380" font-size="10" fill="#4caf50" opacity="0.85">new</text>

  <text x="200" y="425" text-anchor="middle" font-size="11" fill="#1a1822">Right-skewed after inserting D</text>
  <text x="200" y="443" text-anchor="middle" font-size="11" fill="#1a1822">height on right = 3, left = 0</text>

  <!-- arrow -->
  <line x1="310" y1="250" x2="460" y2="250" stroke="#1a1822" stroke-width="2.5" marker-end="url(#arrTR3)"/>
  <defs>
    <marker id="arrTR3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1822"/>
    </marker>
  </defs>
  <text x="385" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">left-rotate(A)</text>

  <!-- AFTER (balanced) -->
  <text x="680" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">After: balance factor = 0 (balanced)</text>

  <line x1="680" y1="175" x2="600" y2="235" stroke="#1a1822"/>
  <line x1="680" y1="175" x2="760" y2="235" stroke="#1a1822"/>
  <line x1="760" y1="275" x2="760" y2="335" stroke="#1a1822"/>

  <circle cx="680" cy="160" r="25" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="680" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">B</text>
  <text x="720" y="150" font-size="10" fill="#4caf50">new root</text>

  <circle cx="600" cy="260" r="25" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="600" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">A</text>

  <circle cx="760" cy="260" r="25" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="760" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">C</text>

  <circle cx="760" cy="360" r="22" fill="#4caf50" stroke="#1a1822"/>
  <text x="760" y="365" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">D</text>

  <text x="680" y="425" text-anchor="middle" font-size="11" fill="#1a1822">B is promoted, A becomes B&apos;s left child</text>
  <text x="680" y="443" text-anchor="middle" font-size="11" fill="#1a1822">Height drops to 2; BST order preserved</text>

  <!-- Bottom explanation -->
  <rect x="40" y="460" width="820" height="30" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="450" y="479" text-anchor="middle" font-size="11" fill="#1a1822">Rotation preserves BST ordering (A &lt; B &lt; C &lt; D) while reducing tree height — a local 4-pointer operation in O(1)</text>
</svg>
