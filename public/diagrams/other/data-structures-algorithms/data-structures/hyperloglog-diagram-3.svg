<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>HyperLogLog accuracy versus register count showing standard error decreasing as one over square root of m</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Accuracy vs Memory: Standard Error ≈ 1.04 / √m</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Doubling registers halves error; Redis defaults to m = 16384 → ~0.81% error in 12KB</text>

  <!-- chart axes -->
  <line x1="100" y1="380" x2="800" y2="380" stroke="#1a1822" stroke-width="2"/>
  <line x1="100" y1="100" x2="100" y2="380" stroke="#1a1822" stroke-width="2"/>

  <!-- y-axis -->
  <text x="90" y="105" text-anchor="end" font-size="10" fill="#1a1822">25%</text>
  <text x="90" y="160" text-anchor="end" font-size="10" fill="#1a1822">10%</text>
  <text x="90" y="215" text-anchor="end" font-size="10" fill="#1a1822">5%</text>
  <text x="90" y="270" text-anchor="end" font-size="10" fill="#1a1822">2%</text>
  <text x="90" y="325" text-anchor="end" font-size="10" fill="#1a1822">1%</text>
  <text x="90" y="378" text-anchor="end" font-size="10" fill="#1a1822">0.5%</text>

  <!-- x-axis (m, log scale labels) -->
  <text x="100" y="400" text-anchor="middle" font-size="10" fill="#1a1822">16</text>
  <text x="200" y="400" text-anchor="middle" font-size="10" fill="#1a1822">64</text>
  <text x="300" y="400" text-anchor="middle" font-size="10" fill="#1a1822">256</text>
  <text x="400" y="400" text-anchor="middle" font-size="10" fill="#1a1822">1024</text>
  <text x="500" y="400" text-anchor="middle" font-size="10" fill="#1a1822">4096</text>
  <text x="600" y="400" text-anchor="middle" font-size="10" fill="#1a1822">16384</text>
  <text x="700" y="400" text-anchor="middle" font-size="10" fill="#1a1822">65536</text>
  <text x="800" y="400" text-anchor="middle" font-size="10" fill="#1a1822">262144</text>

  <text x="450" y="425" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822">m (number of registers, log scale)</text>
  <text x="40" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1822" transform="rotate(-90 40 240)">standard error</text>

  <!-- curve: SE ≈ 1.04/sqrt(m) -->
  <path d="M 100,118 L 200,170 L 300,222 L 400,265 L 500,300 L 600,328 L 700,352 L 800,372" stroke="#6d5bd0" stroke-width="3" fill="none"/>

  <!-- annotations -->
  <circle cx="600" cy="328" r="6" fill="#cc4444" stroke="#1a1822"/>
  <text x="615" y="323" font-size="11" font-weight="700" fill="#cc4444">Redis default: m=16384, ~0.81% error</text>
  <text x="615" y="340" font-size="10" fill="#1a1822" opacity="0.7">12KB per HLL — counts up to 2⁶⁴ uniques</text>

  <circle cx="300" cy="222" r="6" fill="#a89bec" stroke="#1a1822"/>
  <text x="315" y="217" font-size="11" fill="#1a1822">m=256: ~6.5% error, 192 bytes</text>

  <circle cx="700" cy="352" r="6" fill="#4caf50" stroke="#1a1822"/>
  <text x="685" y="345" text-anchor="end" font-size="11" font-weight="700" fill="#4caf50">m=65536: ~0.41% error, 48KB</text>

  <!-- table -->
  <rect x="60" y="445" width="780" height="45" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="75" y="465" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">SE ≈ 1.04/√m | m=2ᵖ | 6 bits/register | mergeable element-wise (max) → distributed COUNT(DISTINCT) at zero coordination cost</text>
  <text x="75" y="481" font-size="10" fill="#1a1822" opacity="0.7">HyperLogLog++ (Google 2013) adds sparse representation for low cardinalities and bias correction tables for tighter accuracy</text>
</svg>
