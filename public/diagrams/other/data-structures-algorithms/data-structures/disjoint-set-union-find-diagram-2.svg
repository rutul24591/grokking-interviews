<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Union by rank attaching the shorter tree under the taller root to keep height bounded</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Union by Rank: Keep the Shorter Tree Underneath</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Attach the lower-rank root under the higher-rank root → tree height stays O(log n)</text>

  <defs>
    <marker id="arrUF2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1822"/>
    </marker>
  </defs>

  <!-- BEFORE -->
  <text x="225" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Before union(A, B)</text>

  <!-- A: rank 2 -->
  <text x="120" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">A (rank 2)</text>
  <line x1="100" y1="220" x2="115" y2="145" stroke="#1a1822" marker-end="url(#arrUF2)"/>
  <line x1="140" y1="220" x2="125" y2="145" stroke="#1a1822" marker-end="url(#arrUF2)"/>
  <line x1="80" y1="305" x2="95" y2="240" stroke="#1a1822" marker-end="url(#arrUF2)"/>
  <circle cx="120" cy="130" r="20" fill="#cc4444" stroke="#1a1822"/>
  <text x="120" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">A</text>
  <circle cx="95" cy="230" r="18" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="95" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">x</text>
  <circle cx="150" cy="230" r="18" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="150" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">y</text>
  <circle cx="75" cy="320" r="16" fill="#a89bec" stroke="#1a1822"/>
  <text x="75" y="325" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">z</text>

  <!-- B: rank 1 -->
  <text x="320" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">B (rank 1)</text>
  <line x1="305" y1="220" x2="315" y2="150" stroke="#1a1822" marker-end="url(#arrUF2)"/>
  <line x1="335" y1="220" x2="325" y2="150" stroke="#1a1822" marker-end="url(#arrUF2)"/>
  <circle cx="320" cy="135" r="20" fill="#cc4444" stroke="#1a1822"/>
  <text x="320" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">B</text>
  <circle cx="300" cy="230" r="18" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="300" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">p</text>
  <circle cx="345" cy="230" r="18" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="345" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">q</text>

  <!-- Arrow -->
  <line x1="430" y1="220" x2="540" y2="220" stroke="#1a1822" stroke-width="2.5" marker-end="url(#arrUF2)"/>
  <text x="485" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#6d5bd0">union by rank</text>

  <!-- AFTER -->
  <text x="700" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">After: B&apos;s root re-parents to A (rank 2 absorbs rank 1)</text>

  <line x1="630" y1="220" x2="690" y2="145" stroke="#1a1822" marker-end="url(#arrUF2)"/>
  <line x1="700" y1="220" x2="700" y2="155" stroke="#1a1822" marker-end="url(#arrUF2)"/>
  <line x1="780" y1="220" x2="715" y2="148" stroke="#1a1822" marker-end="url(#arrUF2)"/>
  <line x1="615" y1="305" x2="625" y2="240" stroke="#1a1822" marker-end="url(#arrUF2)"/>
  <line x1="765" y1="305" x2="775" y2="240" stroke="#1a1822" marker-end="url(#arrUF2)"/>
  <line x1="800" y1="305" x2="785" y2="240" stroke="#1a1822" marker-end="url(#arrUF2)"/>

  <circle cx="700" cy="130" r="22" fill="#cc4444" stroke="#1a1822" stroke-width="2"/>
  <text x="700" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">A</text>
  <text x="730" y="118" font-size="10" fill="#4caf50">rank 2</text>

  <circle cx="625" cy="230" r="18" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="625" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">x</text>
  <circle cx="700" cy="240" r="18" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="700" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">y</text>
  <circle cx="785" cy="230" r="18" fill="#a89bec" stroke="#1a1822" stroke-dasharray="3,2"/>
  <text x="785" y="235" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">B</text>

  <circle cx="610" cy="320" r="16" fill="#a89bec" stroke="#1a1822"/>
  <text x="610" y="325" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">z</text>
  <circle cx="760" cy="320" r="16" fill="#a89bec" stroke="#1a1822" stroke-dasharray="3,2"/>
  <text x="760" y="325" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">p</text>
  <circle cx="810" cy="320" r="16" fill="#a89bec" stroke="#1a1822" stroke-dasharray="3,2"/>
  <text x="810" y="325" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">q</text>

  <text x="700" y="370" text-anchor="middle" font-size="11" fill="#1a1822">Height stays 2 — no growth because rank(A) &gt; rank(B)</text>

  <!-- Rule -->
  <rect x="60" y="395" width="800" height="90" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="60" y="395" width="800" height="28" rx="10" fill="#6d5bd0"/>
  <text x="460" y="414" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Union-by-rank rules</text>
  <text x="75" y="442" font-size="11" fill="#1a1822">If <tspan font-family="ui-monospace, monospace">rank(A) &gt; rank(B)</tspan>: parent[B] = A. If <tspan font-family="ui-monospace, monospace">rank(A) &lt; rank(B)</tspan>: parent[A] = B. If equal: pick either, increment the new root&apos;s rank.</text>
  <text x="75" y="462" font-size="11" fill="#1a1822">Rank is an upper bound on tree height (not exact, since path compression flattens trees but doesn&apos;t update ranks).</text>
  <text x="75" y="478" font-size="11" fill="#1a1822" opacity="0.7">Combined with path compression, every operation runs in O(α(n)) amortized — α is the inverse Ackermann, ≤ 4 for any practical n.</text>
</svg>
