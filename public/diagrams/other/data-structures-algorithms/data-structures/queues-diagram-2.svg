<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Circular buffer ring showing head and tail indices wrapping around a fixed size array</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Circular Buffer (Ring Buffer)</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Head and tail indices advance and wrap modulo capacity — power-of-two sizes reduce modulo to a bitmask</text>

  <!-- Ring visualization -->
  <g transform="translate(220 260)">
    <circle cx="0" cy="0" r="150" fill="none" stroke="#1a1822" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- 8 slots arranged on ring: start top, clockwise -->
    <!-- slot 0 top -->
    <g transform="translate(0 -150)">
      <circle r="28" fill="#ffffff" stroke="#1a1822"/>
      <text y="-40" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">[0]</text>
      <text y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822"></text>
    </g>
    <!-- slot 1 top-right -->
    <g transform="translate(106 -106)">
      <circle r="28" fill="#a89bec" stroke="#1a1822"/>
      <text y="-40" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">[1]</text>
      <text y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">M₁</text>
    </g>
    <!-- slot 2 right -->
    <g transform="translate(150 0)">
      <circle r="28" fill="#a89bec" stroke="#1a1822"/>
      <text x="42" y="5" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">[2]</text>
      <text y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">M₂</text>
    </g>
    <!-- slot 3 bottom-right -->
    <g transform="translate(106 106)">
      <circle r="28" fill="#a89bec" stroke="#1a1822"/>
      <text x="38" y="38" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">[3]</text>
      <text y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">M₃</text>
    </g>
    <!-- slot 4 bottom -->
    <g transform="translate(0 150)">
      <circle r="28" fill="#a89bec" stroke="#1a1822"/>
      <text y="48" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">[4]</text>
      <text y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">M₄</text>
    </g>
    <!-- slot 5 bottom-left -->
    <g transform="translate(-106 106)">
      <circle r="28" fill="#ffffff" stroke="#1a1822"/>
      <text x="-38" y="38" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">[5]</text>
    </g>
    <!-- slot 6 left -->
    <g transform="translate(-150 0)">
      <circle r="28" fill="#ffffff" stroke="#1a1822"/>
      <text x="-42" y="5" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">[6]</text>
    </g>
    <!-- slot 7 top-left -->
    <g transform="translate(-106 -106)">
      <circle r="28" fill="#ffffff" stroke="#1a1822"/>
      <text x="-38" y="-38" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">[7]</text>
    </g>
  </g>

  <!-- Head/tail annotations -->
  <!-- head at slot 1 -->
  <text x="370" y="140" font-size="11" font-weight="700" fill="#cc4444">head → [1] (dequeue side)</text>
  <line x1="360" y1="148" x2="330" y2="160" stroke="#cc4444" stroke-width="1.5"/>

  <!-- tail at slot 5 -->
  <text x="370" y="390" font-size="11" font-weight="700" fill="#4caf50">tail → [5] (next enqueue slot)</text>
  <line x1="360" y1="382" x2="130" y2="370" stroke="#4caf50" stroke-width="1.5"/>

  <!-- arrow indicating direction -->
  <path d="M 320 260 A 100 100 0 0 1 220 160" fill="none" stroke="#6d5bd0" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="285" y="195" font-size="10" fill="#6d5bd0" opacity="0.9">advance direction</text>

  <!-- Pseudocode panels -->
  <rect x="490" y="90" width="380" height="170" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="490" y="90" width="380" height="28" rx="10" fill="#4caf50"/>
  <text x="680" y="109" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">enqueue(x)</text>
  <text x="505" y="138" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">if (tail - head) === cap: return FULL</text>
  <text x="505" y="158" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">buf[tail &amp; (cap - 1)] = x</text>
  <text x="505" y="178" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">tail = tail + 1</text>
  <text x="505" y="215" font-size="11" fill="#1a1822" opacity="0.7">Power-of-two capacity → `&amp; (cap - 1)` replaces</text>
  <text x="505" y="233" font-size="11" fill="#1a1822" opacity="0.7">`% cap` — single AND vs division.</text>

  <rect x="490" y="280" width="380" height="170" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="490" y="280" width="380" height="28" rx="10" fill="#cc4444"/>
  <text x="680" y="299" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">dequeue()</text>
  <text x="505" y="328" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">if head === tail: return EMPTY</text>
  <text x="505" y="348" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">x = buf[head &amp; (cap - 1)]</text>
  <text x="505" y="368" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">buf[head &amp; (cap - 1)] = null   // GC</text>
  <text x="505" y="388" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">head = head + 1; return x</text>
  <text x="505" y="420" font-size="11" fill="#1a1822" opacity="0.7">Monotonic head/tail never wrap; difference</text>
  <text x="505" y="438" font-size="11" fill="#1a1822" opacity="0.7">gives depth. 64-bit counters ≈ never overflow.</text>
</svg>
