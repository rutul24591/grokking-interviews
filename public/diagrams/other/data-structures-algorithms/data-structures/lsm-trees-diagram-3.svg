<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>LSM tree read path showing query checking MemTable then descending levels with Bloom filter short-circuit</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Read Path: MemTable → Bloom-Guarded SSTable Descent</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">A point lookup checks each level in newest-first order, using Bloom filters to skip files that can&apos;t contain the key</text>

  <!-- Query -->
  <rect x="40" y="90" width="120" height="36" rx="8" fill="#cc4444" stroke="#1a1822"/>
  <text x="100" y="113" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">GET(&quot;user42&quot;)</text>

  <!-- Step 1 MemTable -->
  <line x1="160" y1="108" x2="220" y2="108" stroke="#1a1822" stroke-width="2"/>
  <polygon points="218,103 228,108 218,113" fill="#1a1822"/>

  <rect x="230" y="80" width="180" height="56" rx="8" fill="#a89bec" stroke="#1a1822"/>
  <text x="320" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1. MemTable</text>
  <text x="320" y="118" text-anchor="middle" font-size="10" fill="#ffffff">in-memory skip list</text>
  <text x="320" y="130" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">miss → descend</text>

  <line x1="410" y1="108" x2="450" y2="108" stroke="#1a1822" stroke-width="2"/>
  <polygon points="448,103 458,108 448,113" fill="#1a1822"/>

  <rect x="460" y="80" width="180" height="56" rx="8" fill="#a89bec" stroke="#1a1822"/>
  <text x="550" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2. Immutable MemTable</text>
  <text x="550" y="118" text-anchor="middle" font-size="10" fill="#ffffff">awaiting flush</text>
  <text x="550" y="130" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.8">miss → descend</text>

  <!-- L0 -->
  <text x="80" y="180" font-size="11" font-weight="700" fill="#1a1822">L0:</text>
  <g>
    <rect x="115" y="170" width="100" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="165" y="186" text-anchor="middle" font-size="10" fill="#ffffff">SST 1 [bloom]</text>
    <text x="165" y="200" text-anchor="middle" font-size="9" fill="#ffffff">miss</text>

    <rect x="225" y="170" width="100" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="275" y="186" text-anchor="middle" font-size="10" fill="#ffffff">SST 2 [bloom]</text>
    <text x="275" y="200" text-anchor="middle" font-size="9" fill="#ffffff">miss</text>

    <rect x="335" y="170" width="100" height="36" fill="#cc4444" stroke="#1a1822"/>
    <text x="385" y="186" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">SST 3 [bloom]</text>
    <text x="385" y="200" text-anchor="middle" font-size="9" font-weight="700" fill="#ffffff">may contain</text>

    <rect x="445" y="170" width="100" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="495" y="186" text-anchor="middle" font-size="10" fill="#ffffff">SST 4 [bloom]</text>
    <text x="495" y="200" text-anchor="middle" font-size="9" fill="#ffffff">miss</text>
  </g>
  <text x="565" y="190" font-size="10" fill="#1a1822" opacity="0.7">L0 SSTs may overlap → check all</text>

  <!-- Down to SST 3 -->
  <line x1="385" y1="206" x2="385" y2="240" stroke="#cc4444" stroke-width="2"/>
  <polygon points="380,238 385,248 390,238" fill="#cc4444"/>

  <!-- SST 3 expansion -->
  <rect x="280" y="250" width="220" height="100" rx="8" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <text x="390" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">SST 3 internals</text>
  <rect x="290" y="278" width="200" height="14" fill="#a89bec" stroke="#1a1822"/>
  <text x="295" y="289" font-size="9" fill="#ffffff">data block (k=&quot;user40..49&quot;)</text>
  <rect x="290" y="294" width="200" height="14" fill="#dddddd" stroke="#1a1822"/>
  <text x="295" y="305" font-size="9" fill="#1a1822">data block (k=&quot;user50..59&quot;)</text>
  <rect x="290" y="310" width="200" height="14" fill="#dddddd" stroke="#1a1822"/>
  <text x="295" y="321" font-size="9" fill="#1a1822">data block (k=&quot;user60..69&quot;)</text>
  <rect x="290" y="326" width="200" height="14" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="295" y="337" font-size="9" fill="#ffffff">index → block offsets</text>

  <!-- L1 -->
  <text x="80" y="385" font-size="11" font-weight="700" fill="#1a1822">L1:</text>
  <rect x="115" y="375" width="120" height="24" fill="#dddddd" stroke="#1a1822"/>
  <text x="175" y="391" text-anchor="middle" font-size="9" fill="#1a1822">[a-h] (skipped)</text>
  <rect x="240" y="375" width="120" height="24" fill="#dddddd" stroke="#1a1822"/>
  <text x="300" y="391" text-anchor="middle" font-size="9" fill="#1a1822">[i-p] (skipped)</text>
  <rect x="365" y="375" width="120" height="24" fill="#a89bec" stroke="#1a1822"/>
  <text x="425" y="391" text-anchor="middle" font-size="9" fill="#ffffff">[user01..user99]</text>
  <text x="500" y="391" font-size="10" fill="#1a1822" opacity="0.7">— L1 not consulted (already found in L0)</text>

  <!-- Footer -->
  <rect x="60" y="415" width="780" height="70" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="75" y="435" font-size="11" font-weight="700" fill="#1a1822">Read amplification mitigations:</text>
  <text x="75" y="453" font-size="10" fill="#1a1822">• Bloom filter per SST (~10 bits/key, &lt;1% FP) — vast majority of negative checks short-circuit before disk I/O</text>
  <text x="75" y="471" font-size="10" fill="#1a1822">• Block cache holds hot data blocks; LSM levels &lt; L_max often fully cached • prefix Bloom filters extend to range scans</text>
</svg>
