<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Count min sketch versus exact counter comparison showing sketch overestimate within bounded error</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Sketch vs Exact: When the Approximation Wins</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Tiny memory, bounded error — the trade-off that powers Twitter trending and DDoS detection</text>

  <!-- Bar chart compare -->
  <text x="225" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Heavy hitters: sketch vs truth</text>

  <!-- axes -->
  <line x1="80" y1="280" x2="380" y2="280" stroke="#1a1822" stroke-width="2"/>
  <line x1="80" y1="120" x2="80" y2="280" stroke="#1a1822" stroke-width="2"/>

  <!-- bars: 5 keys -->
  <g>
    <rect x="100" y="135" width="20" height="145" fill="#4caf50" stroke="#1a1822"/>
    <rect x="120" y="130" width="20" height="150" fill="#cc4444" stroke="#1a1822"/>
    <text x="120" y="295" text-anchor="middle" font-size="10" fill="#1a1822">user42</text>

    <rect x="160" y="190" width="20" height="90" fill="#4caf50" stroke="#1a1822"/>
    <rect x="180" y="183" width="20" height="97" fill="#cc4444" stroke="#1a1822"/>
    <text x="180" y="295" text-anchor="middle" font-size="10" fill="#1a1822">user88</text>

    <rect x="220" y="220" width="20" height="60" fill="#4caf50" stroke="#1a1822"/>
    <rect x="240" y="210" width="20" height="70" fill="#cc4444" stroke="#1a1822"/>
    <text x="240" y="295" text-anchor="middle" font-size="10" fill="#1a1822">user13</text>

    <rect x="280" y="250" width="20" height="30" fill="#4caf50" stroke="#1a1822"/>
    <rect x="300" y="245" width="20" height="35" fill="#cc4444" stroke="#1a1822"/>
    <text x="300" y="295" text-anchor="middle" font-size="10" fill="#1a1822">user07</text>

    <rect x="340" y="265" width="20" height="15" fill="#4caf50" stroke="#1a1822"/>
    <rect x="360" y="260" width="20" height="20" fill="#cc4444" stroke="#1a1822"/>
    <text x="360" y="295" text-anchor="middle" font-size="10" fill="#1a1822">user99</text>
  </g>

  <text x="50" y="125" font-size="10" fill="#1a1822" opacity="0.6">100K</text>

  <!-- legend -->
  <rect x="100" y="320" width="14" height="14" fill="#4caf50" stroke="#1a1822"/>
  <text x="120" y="332" font-size="11" fill="#1a1822">true count (hash map)</text>
  <rect x="240" y="320" width="14" height="14" fill="#cc4444" stroke="#1a1822"/>
  <text x="260" y="332" font-size="11" fill="#1a1822">sketch estimate (always ≥ true)</text>

  <!-- comparison -->
  <rect x="440" y="100" width="400" height="330" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="440" y="100" width="400" height="28" rx="10" fill="#6d5bd0"/>
  <text x="640" y="119" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Memory comparison</text>

  <text x="455" y="150" font-size="12" font-weight="700" fill="#1a1822">Tracking 100M unique keys</text>

  <text x="455" y="180" font-size="11" fill="#1a1822">Exact hash map (string→int):</text>
  <text x="465" y="200" font-size="11" font-family="ui-monospace, monospace" fill="#cc4444">~5 GB (50 bytes/entry: key + value + overhead)</text>

  <text x="455" y="230" font-size="11" fill="#1a1822">Count-min sketch (ε=0.0001, δ=0.01):</text>
  <text x="465" y="250" font-size="11" font-family="ui-monospace, monospace" fill="#4caf50">~5 MB total — 1000× smaller</text>

  <text x="455" y="285" font-size="11" font-weight="700" fill="#1a1822">Trade-off you accept:</text>
  <text x="455" y="305" font-size="11" fill="#1a1822">• Estimates are upper bounds (no underestimate)</text>
  <text x="455" y="325" font-size="11" fill="#1a1822">• Error within 0.01% × total stream weight</text>
  <text x="455" y="345" font-size="11" fill="#1a1822">• Cannot enumerate keys (sketch ≠ inverted index)</text>
  <text x="455" y="365" font-size="11" fill="#1a1822">• Cannot decrement (use Count-Min-Mean-Min for that)</text>

  <text x="455" y="400" font-size="11" font-weight="700" fill="#4caf50">When to choose:</text>
  <text x="455" y="418" font-size="11" fill="#1a1822">High-cardinality streams where heavy-hitters matter</text>
</svg>
