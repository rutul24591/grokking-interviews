<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Hash table resize and rehash lifecycle doubling the backing array and redistributing entries</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Resize &amp; Rehash Lifecycle</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Crossing the load-factor threshold doubles capacity and redistributes entries with the new modulus</text>

  <defs>
    <marker id="arrHT3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1822"/>
    </marker>
  </defs>

  <!-- Before (cap = 4) -->
  <text x="140" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Before: cap = 4, n = 3, α = 0.75</text>

  <g font-family="ui-monospace, monospace">
    <rect x="60" y="110" width="160" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="80" y="132" font-size="11" fill="#ffffff" font-weight="600">[0]</text>
    <text x="165" y="132" text-anchor="middle" font-size="11" fill="#ffffff">alice → 17</text>

    <rect x="60" y="150" width="160" height="36" fill="#ffffff" stroke="#1a1822"/>
    <text x="80" y="172" font-size="11" fill="#1a1822" font-weight="600">[1]</text>

    <rect x="60" y="190" width="160" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="80" y="212" font-size="11" fill="#ffffff" font-weight="600">[2]</text>
    <text x="165" y="212" text-anchor="middle" font-size="11" fill="#ffffff">bob → 22</text>

    <rect x="60" y="230" width="160" height="36" fill="#a89bec" stroke="#1a1822"/>
    <text x="80" y="252" font-size="11" fill="#ffffff" font-weight="600">[3]</text>
    <text x="165" y="252" text-anchor="middle" font-size="11" fill="#ffffff">charlie → 33</text>
  </g>

  <text x="140" y="285" text-anchor="middle" font-size="11" fill="#cc4444" font-weight="700">Inserting &quot;dana&quot; pushes α over threshold →</text>

  <!-- Arrow to after -->
  <line x1="245" y1="195" x2="325" y2="195" stroke="#1a1822" stroke-width="2" marker-end="url(#arrHT3)"/>
  <text x="285" y="183" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">rehash</text>

  <!-- After (cap = 8) -->
  <text x="530" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">After: cap = 8, n = 4, α = 0.5</text>

  <g font-family="ui-monospace, monospace">
    <rect x="350" y="110" width="180" height="32" fill="#a89bec" stroke="#1a1822"/>
    <text x="370" y="130" font-size="11" fill="#ffffff" font-weight="600">[0]</text>
    <text x="445" y="130" text-anchor="middle" font-size="11" fill="#ffffff">alice → 17</text>

    <rect x="350" y="146" width="180" height="32" fill="#ffffff" stroke="#1a1822"/>
    <text x="370" y="166" font-size="11" fill="#1a1822" font-weight="600">[1]</text>

    <rect x="350" y="182" width="180" height="32" fill="#a89bec" stroke="#1a1822"/>
    <text x="370" y="202" font-size="11" fill="#ffffff" font-weight="600">[2]</text>
    <text x="445" y="202" text-anchor="middle" font-size="11" fill="#ffffff">dana → 40</text>

    <rect x="350" y="218" width="180" height="32" fill="#ffffff" stroke="#1a1822"/>
    <text x="370" y="238" font-size="11" fill="#1a1822" font-weight="600">[3]</text>

    <rect x="350" y="254" width="180" height="32" fill="#ffffff" stroke="#1a1822"/>
    <text x="370" y="274" font-size="11" fill="#1a1822" font-weight="600">[4]</text>

    <rect x="350" y="290" width="180" height="32" fill="#a89bec" stroke="#1a1822"/>
    <text x="370" y="310" font-size="11" fill="#ffffff" font-weight="600">[5]</text>
    <text x="445" y="310" text-anchor="middle" font-size="11" fill="#ffffff">charlie → 33</text>

    <rect x="350" y="326" width="180" height="32" fill="#a89bec" stroke="#1a1822"/>
    <text x="370" y="346" font-size="11" fill="#ffffff" font-weight="600">[6]</text>
    <text x="445" y="346" text-anchor="middle" font-size="11" fill="#ffffff">bob → 22</text>

    <rect x="350" y="362" width="180" height="32" fill="#ffffff" stroke="#1a1822"/>
    <text x="370" y="382" font-size="11" fill="#1a1822" font-weight="600">[7]</text>
  </g>

  <!-- Explanation sidebar -->
  <rect x="580" y="110" width="290" height="270" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="580" y="110" width="290" height="28" rx="10" fill="#6d5bd0"/>
  <text x="725" y="129" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">What happens on resize</text>

  <text x="595" y="158" font-size="11" fill="#1a1822">1. Allocate new bucket array, 2× size</text>
  <text x="595" y="178" font-size="11" fill="#1a1822">2. Walk old array; for each entry:</text>
  <text x="605" y="196" font-size="11" fill="#1a1822">bucket = hash(key) mod newCap</text>
  <text x="605" y="214" font-size="11" fill="#1a1822">insert into new table</text>
  <text x="595" y="234" font-size="11" fill="#1a1822">3. Release old array</text>

  <text x="595" y="262" font-size="11" font-weight="700" fill="#1a1822">Cost</text>
  <text x="595" y="280" font-size="11" fill="#1a1822">• One-time O(n)</text>
  <text x="595" y="298" font-size="11" fill="#1a1822">• Amortized O(1) across n inserts</text>

  <text x="595" y="326" font-size="11" font-weight="700" fill="#cc4444">Latency spike mitigation</text>
  <text x="595" y="344" font-size="10" fill="#1a1822">Redis: incremental rehash — move 1</text>
  <text x="595" y="360" font-size="10" fill="#1a1822">bucket per op, both tables live.</text>
  <text x="595" y="376" font-size="10" fill="#1a1822">Never a single n-sized stall.</text>

  <!-- Bottom commentary -->
  <rect x="60" y="410" width="810" height="70" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="1.5"/>
  <text x="75" y="432" font-size="11" font-weight="700" fill="#1a1822">Bucket indices change on resize</text>
  <text x="75" y="452" font-size="11" fill="#1a1822">alice hash = 17 → cap 4: 17 mod 4 = 1 (was in [0] due to collision) → cap 8: 17 mod 8 = 1 → actually 0 after full rehash</text>
  <text x="75" y="470" font-size="11" fill="#1a1822">The modulus changes, so entries land at (possibly) different buckets. Never iterate across a resize without restarting.</text>
</svg>
