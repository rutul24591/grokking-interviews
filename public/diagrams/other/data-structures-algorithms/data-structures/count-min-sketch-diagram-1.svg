<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Count min sketch two dimensional counter array with d hash functions and width w</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Count-Min Sketch: 2D Counter Grid (d × w)</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">d hash functions, each indexing into its own row of w counters — increment all d on update</text>

  <defs>
    <marker id="arrCM1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6d5bd0"/>
    </marker>
  </defs>

  <!-- key -->
  <rect x="50" y="240" width="100" height="40" rx="8" fill="#cc4444" stroke="#1a1822"/>
  <text x="100" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">"user42"</text>

  <!-- hash functions -->
  <rect x="180" y="120" width="80" height="30" rx="6" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="220" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">h₁</text>
  <rect x="180" y="180" width="80" height="30" rx="6" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="220" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">h₂</text>
  <rect x="180" y="240" width="80" height="30" rx="6" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="220" y="260" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">h₃</text>
  <rect x="180" y="300" width="80" height="30" rx="6" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="220" y="320" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">h₄</text>

  <line x1="150" y1="260" x2="180" y2="135" stroke="#1a1822" marker-end="url(#arrCM1)"/>
  <line x1="150" y1="260" x2="180" y2="195" stroke="#1a1822" marker-end="url(#arrCM1)"/>
  <line x1="150" y1="260" x2="180" y2="255" stroke="#1a1822" marker-end="url(#arrCM1)"/>
  <line x1="150" y1="260" x2="180" y2="315" stroke="#1a1822" marker-end="url(#arrCM1)"/>

  <text x="270" y="140" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">→ col 2</text>
  <text x="270" y="200" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">→ col 5</text>
  <text x="270" y="260" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">→ col 1</text>
  <text x="270" y="320" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">→ col 4</text>

  <!-- 2D grid -->
  <text x="600" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Counter array (d=4 rows × w=8 cols)</text>
  <g font-family="ui-monospace, monospace" font-size="10">
    <text x="370" y="135" fill="#1a1822" opacity="0.6">d=1</text>
    <text x="370" y="195" fill="#1a1822" opacity="0.6">d=2</text>
    <text x="370" y="255" fill="#1a1822" opacity="0.6">d=3</text>
    <text x="370" y="315" fill="#1a1822" opacity="0.6">d=4</text>

    <!-- row 1 -->
    <rect x="400" y="120" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="420" y="140" text-anchor="middle" fill="#1a1822">3</text>
    <rect x="440" y="120" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="460" y="140" text-anchor="middle" fill="#1a1822">7</text>
    <rect x="480" y="120" width="40" height="30" fill="#cc4444" stroke="#1a1822"/><text x="500" y="140" text-anchor="middle" fill="#ffffff">9</text>
    <rect x="520" y="120" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="540" y="140" text-anchor="middle" fill="#1a1822">2</text>
    <rect x="560" y="120" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="580" y="140" text-anchor="middle" fill="#1a1822">5</text>
    <rect x="600" y="120" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="620" y="140" text-anchor="middle" fill="#1a1822">1</text>
    <rect x="640" y="120" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="660" y="140" text-anchor="middle" fill="#1a1822">4</text>
    <rect x="680" y="120" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="700" y="140" text-anchor="middle" fill="#1a1822">0</text>
    <!-- row 2 -->
    <rect x="400" y="180" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="420" y="200" text-anchor="middle" fill="#1a1822">2</text>
    <rect x="440" y="180" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="460" y="200" text-anchor="middle" fill="#1a1822">8</text>
    <rect x="480" y="180" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="500" y="200" text-anchor="middle" fill="#1a1822">1</text>
    <rect x="520" y="180" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="540" y="200" text-anchor="middle" fill="#1a1822">6</text>
    <rect x="560" y="180" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="580" y="200" text-anchor="middle" fill="#1a1822">3</text>
    <rect x="600" y="180" width="40" height="30" fill="#cc4444" stroke="#1a1822"/><text x="620" y="200" text-anchor="middle" fill="#ffffff">12</text>
    <rect x="640" y="180" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="660" y="200" text-anchor="middle" fill="#1a1822">7</text>
    <rect x="680" y="180" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="700" y="200" text-anchor="middle" fill="#1a1822">2</text>
    <!-- row 3 -->
    <rect x="400" y="240" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="420" y="260" text-anchor="middle" fill="#1a1822">5</text>
    <rect x="440" y="240" width="40" height="30" fill="#cc4444" stroke="#1a1822"/><text x="460" y="260" text-anchor="middle" fill="#ffffff">9</text>
    <rect x="480" y="240" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="500" y="260" text-anchor="middle" fill="#1a1822">3</text>
    <rect x="520" y="240" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="540" y="260" text-anchor="middle" fill="#1a1822">1</text>
    <rect x="560" y="240" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="580" y="260" text-anchor="middle" fill="#1a1822">7</text>
    <rect x="600" y="240" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="620" y="260" text-anchor="middle" fill="#1a1822">4</text>
    <rect x="640" y="240" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="660" y="260" text-anchor="middle" fill="#1a1822">2</text>
    <rect x="680" y="240" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="700" y="260" text-anchor="middle" fill="#1a1822">6</text>
    <!-- row 4 -->
    <rect x="400" y="300" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="420" y="320" text-anchor="middle" fill="#1a1822">1</text>
    <rect x="440" y="300" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="460" y="320" text-anchor="middle" fill="#1a1822">3</text>
    <rect x="480" y="300" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="500" y="320" text-anchor="middle" fill="#1a1822">8</text>
    <rect x="520" y="300" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="540" y="320" text-anchor="middle" fill="#1a1822">2</text>
    <rect x="560" y="300" width="40" height="30" fill="#cc4444" stroke="#1a1822"/><text x="580" y="320" text-anchor="middle" fill="#ffffff">11</text>
    <rect x="600" y="300" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="620" y="320" text-anchor="middle" fill="#1a1822">4</text>
    <rect x="640" y="300" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="660" y="320" text-anchor="middle" fill="#1a1822">7</text>
    <rect x="680" y="300" width="40" height="30" fill="#ffffff" stroke="#1a1822"/><text x="700" y="320" text-anchor="middle" fill="#1a1822">1</text>
  </g>

  <text x="540" y="365" text-anchor="middle" font-size="11" fill="#1a1822">Update: increment all 4 red cells. Query: return min(9, 12, 9, 11) = <tspan font-weight="700" fill="#cc4444">9</tspan></text>

  <!-- Properties -->
  <rect x="60" y="385" width="780" height="100" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="60" y="385" width="780" height="28" rx="10" fill="#6d5bd0"/>
  <text x="450" y="404" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Why min?</text>
  <text x="75" y="432" font-size="11" fill="#1a1822">Each row&apos;s counter is an over-estimate — collisions from other keys only inflate the value. Therefore the true count ≤ each row&apos;s reading.</text>
  <text x="75" y="450" font-size="11" fill="#1a1822">Taking the minimum across rows gives the tightest upper bound. With high probability the bound is within ε·N of the true count.</text>
  <text x="75" y="468" font-size="11" fill="#1a1822" opacity="0.7">Sizing for ε accuracy at confidence δ: w = ⌈e/ε⌉, d = ⌈ln(1/δ)⌉ — typically d=4-8, w=2K-1M counters</text>
</svg>
