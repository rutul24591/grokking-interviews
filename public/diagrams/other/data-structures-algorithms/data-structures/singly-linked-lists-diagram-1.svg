<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Singly linked list node structure showing value and next pointer fields with head and tail pointer topology</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Singly Linked List: Node Topology</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Each node holds a value and a single next pointer; list is addressed by a head reference</text>

  <defs>
    <marker id="arrLL1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1822"/>
    </marker>
  </defs>

  <!-- Head pointer -->
  <rect x="40" y="145" width="80" height="60" rx="6" fill="#cc4444" stroke="#1a1822" stroke-width="1.5"/>
  <text x="80" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">head</text>
  <text x="80" y="189" text-anchor="middle" font-size="10" fill="#ffffff">(entry point)</text>

  <!-- Node 1 -->
  <rect x="180" y="145" width="120" height="60" rx="6" fill="#ffffff" stroke="#1a1822" stroke-width="1.5"/>
  <rect x="180" y="145" width="70" height="60" fill="#e8dffa" stroke="#1a1822" stroke-width="1.5"/>
  <text x="215" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">value</text>
  <text x="215" y="188" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#1a1822">42</text>
  <text x="275" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">next</text>
  <circle cx="275" cy="188" r="4" fill="#1a1822"/>

  <!-- Node 2 -->
  <rect x="360" y="145" width="120" height="60" rx="6" fill="#ffffff" stroke="#1a1822" stroke-width="1.5"/>
  <rect x="360" y="145" width="70" height="60" fill="#e8dffa" stroke="#1a1822" stroke-width="1.5"/>
  <text x="395" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">value</text>
  <text x="395" y="188" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#1a1822">17</text>
  <text x="455" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">next</text>
  <circle cx="455" cy="188" r="4" fill="#1a1822"/>

  <!-- Node 3 -->
  <rect x="540" y="145" width="120" height="60" rx="6" fill="#ffffff" stroke="#1a1822" stroke-width="1.5"/>
  <rect x="540" y="145" width="70" height="60" fill="#e8dffa" stroke="#1a1822" stroke-width="1.5"/>
  <text x="575" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">value</text>
  <text x="575" y="188" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#1a1822">93</text>
  <text x="635" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">next</text>
  <circle cx="635" cy="188" r="4" fill="#1a1822"/>

  <!-- Node 4 -->
  <rect x="720" y="145" width="120" height="60" rx="6" fill="#ffffff" stroke="#1a1822" stroke-width="1.5"/>
  <rect x="720" y="145" width="70" height="60" fill="#e8dffa" stroke="#1a1822" stroke-width="1.5"/>
  <text x="755" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">value</text>
  <text x="755" y="188" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#1a1822">5</text>
  <text x="815" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">next</text>
  <text x="815" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#cc4444">∅</text>

  <!-- Arrows -->
  <line x1="120" y1="175" x2="178" y2="175" stroke="#1a1822" stroke-width="2" marker-end="url(#arrLL1)"/>
  <line x1="275" y1="188" x2="358" y2="175" stroke="#1a1822" stroke-width="2" marker-end="url(#arrLL1)"/>
  <line x1="455" y1="188" x2="538" y2="175" stroke="#1a1822" stroke-width="2" marker-end="url(#arrLL1)"/>
  <line x1="635" y1="188" x2="718" y2="175" stroke="#1a1822" stroke-width="2" marker-end="url(#arrLL1)"/>

  <!-- Addresses (heap fragmentation illustration) -->
  <text x="240" y="230" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">0x7A30</text>
  <text x="420" y="230" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">0x9C18 (far away)</text>
  <text x="600" y="230" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">0x4F80</text>
  <text x="780" y="230" text-anchor="middle" font-size="9" fill="#1a1822" opacity="0.6">0xB240</text>

  <!-- Callouts -->
  <rect x="40" y="280" width="395" height="190" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="40" y="280" width="395" height="28" rx="10" fill="#6d5bd0"/>
  <text x="237" y="299" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Bare list (head-only)</text>
  <text x="55" y="325" font-size="11" fill="#1a1822">• O(1) prepend at head</text>
  <text x="55" y="343" font-size="11" fill="#1a1822">• O(n) append — must walk to tail</text>
  <text x="55" y="361" font-size="11" fill="#1a1822">• O(n) search, O(n) random access</text>
  <text x="55" y="379" font-size="11" fill="#1a1822">• Each node an independent heap alloc</text>
  <text x="55" y="407" font-size="11" font-weight="700" fill="#1a1822">Memory overhead per node:</text>
  <text x="55" y="425" font-size="11" fill="#1a1822">• 8 B pointer + payload</text>
  <text x="55" y="443" font-size="11" fill="#1a1822">• 16–24 B allocator header</text>
  <text x="55" y="461" font-size="11" fill="#cc4444">= 6–10× array memory for small values</text>

  <rect x="465" y="280" width="395" height="190" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="465" y="280" width="395" height="28" rx="10" fill="#4caf50"/>
  <text x="662" y="299" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">With tail pointer + sentinel head</text>
  <text x="480" y="325" font-size="11" fill="#1a1822">• O(1) append at tail, no full-list walk</text>
  <text x="480" y="343" font-size="11" fill="#1a1822">• Dummy head removes null-special-case</text>
  <text x="480" y="361" font-size="11" fill="#1a1822">• Uniform code path for insert/delete</text>
  <text x="480" y="379" font-size="11" fill="#1a1822">• Empty list is not &quot;null head&quot;</text>
  <text x="480" y="407" font-size="11" font-weight="700" fill="#1a1822">Structural invariants:</text>
  <text x="480" y="425" font-size="11" fill="#1a1822">• head != null (always points at dummy)</text>
  <text x="480" y="443" font-size="11" fill="#1a1822">• tail.next == null</text>
  <text x="480" y="461" font-size="11" fill="#4caf50">Pattern used in Linux kernel list_head</text>
</svg>
