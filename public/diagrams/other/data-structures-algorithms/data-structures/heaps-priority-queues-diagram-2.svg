<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Sift-up and sift-down heap operations showing element movement through tree levels to restore heap order</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Sift-Up &amp; Sift-Down</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Two primitives that restore heap order after insert and extract in O(log n)</text>

  <!-- SIFT-UP (insert 1) -->
  <rect x="30" y="80" width="410" height="370" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="30" y="80" width="410" height="30" rx="10" fill="#4caf50"/>
  <text x="235" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Sift-up (insert 1 into min-heap)</text>

  <!-- Step 1: append -->
  <text x="235" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Step 1: append to next slot</text>
  <g font-family="ui-monospace, monospace">
    <rect x="60" y="145" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="80" y="165" text-anchor="middle" font-size="12" fill="#1a1822">2</text>
    <rect x="100" y="145" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="120" y="165" text-anchor="middle" font-size="12" fill="#1a1822">5</text>
    <rect x="140" y="145" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="160" y="165" text-anchor="middle" font-size="12" fill="#1a1822">4</text>
    <rect x="180" y="145" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="200" y="165" text-anchor="middle" font-size="12" fill="#1a1822">9</text>
    <rect x="220" y="145" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="240" y="165" text-anchor="middle" font-size="12" fill="#1a1822">7</text>
    <rect x="260" y="145" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="280" y="165" text-anchor="middle" font-size="12" fill="#1a1822">8</text>
    <rect x="300" y="145" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="320" y="165" text-anchor="middle" font-size="12" fill="#1a1822">6</text>
    <rect x="340" y="145" width="40" height="30" fill="#4caf50" stroke="#1a1822" stroke-width="2"/>
    <text x="360" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
  </g>
  <text x="360" y="193" text-anchor="middle" font-size="10" fill="#4caf50" font-weight="700">new [7]</text>

  <!-- Step 2: compare with parent -->
  <text x="235" y="220" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Step 2: compare with parent (index 3 = 9), swap</text>
  <g font-family="ui-monospace, monospace">
    <rect x="60" y="230" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="80" y="250" text-anchor="middle" font-size="12" fill="#1a1822">2</text>
    <rect x="100" y="230" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="120" y="250" text-anchor="middle" font-size="12" fill="#1a1822">5</text>
    <rect x="140" y="230" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="160" y="250" text-anchor="middle" font-size="12" fill="#1a1822">4</text>
    <rect x="180" y="230" width="40" height="30" fill="#4caf50" stroke="#1a1822" stroke-width="2"/>
    <text x="200" y="250" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
    <rect x="220" y="230" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="240" y="250" text-anchor="middle" font-size="12" fill="#1a1822">7</text>
    <rect x="260" y="230" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="280" y="250" text-anchor="middle" font-size="12" fill="#1a1822">8</text>
    <rect x="300" y="230" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="320" y="250" text-anchor="middle" font-size="12" fill="#1a1822">6</text>
    <rect x="340" y="230" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="360" y="250" text-anchor="middle" font-size="12" fill="#1a1822">9</text>
  </g>

  <!-- Step 3: compare with index 1 (= 5) -->
  <text x="235" y="290" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Step 3: compare with parent (index 1 = 5), swap</text>
  <g font-family="ui-monospace, monospace">
    <rect x="60" y="300" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="80" y="320" text-anchor="middle" font-size="12" fill="#1a1822">2</text>
    <rect x="100" y="300" width="40" height="30" fill="#4caf50" stroke="#1a1822" stroke-width="2"/>
    <text x="120" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
    <rect x="140" y="300" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="160" y="320" text-anchor="middle" font-size="12" fill="#1a1822">4</text>
    <rect x="180" y="300" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="200" y="320" text-anchor="middle" font-size="12" fill="#1a1822">5</text>
  </g>

  <!-- Step 4 -->
  <text x="235" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Step 4: compare with root (index 0 = 2), swap</text>
  <g font-family="ui-monospace, monospace">
    <rect x="60" y="370" width="40" height="30" fill="#4caf50" stroke="#1a1822" stroke-width="2"/>
    <text x="80" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
    <rect x="100" y="370" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="120" y="390" text-anchor="middle" font-size="12" fill="#1a1822">2</text>
  </g>
  <text x="235" y="430" text-anchor="middle" font-size="11" fill="#4caf50" font-weight="700">Heap order restored — O(log n) swaps</text>

  <!-- SIFT-DOWN -->
  <rect x="460" y="80" width="410" height="370" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="460" y="80" width="410" height="30" rx="10" fill="#cc4444"/>
  <text x="665" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Sift-down (extract-min)</text>

  <text x="665" y="135" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Step 1: save root (=1), move last (=9) to root</text>
  <g font-family="ui-monospace, monospace">
    <rect x="490" y="145" width="40" height="30" fill="#cc4444" stroke="#1a1822" stroke-width="2"/>
    <text x="510" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">9</text>
    <rect x="530" y="145" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="550" y="165" text-anchor="middle" font-size="12" fill="#1a1822">2</text>
    <rect x="570" y="145" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="590" y="165" text-anchor="middle" font-size="12" fill="#1a1822">4</text>
    <rect x="610" y="145" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="630" y="165" text-anchor="middle" font-size="12" fill="#1a1822">5</text>
    <rect x="650" y="145" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="670" y="165" text-anchor="middle" font-size="12" fill="#1a1822">7</text>
    <rect x="690" y="145" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="710" y="165" text-anchor="middle" font-size="12" fill="#1a1822">8</text>
    <rect x="730" y="145" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="750" y="165" text-anchor="middle" font-size="12" fill="#1a1822">6</text>
  </g>

  <text x="665" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Step 2: compare with smaller child (2), swap</text>
  <g font-family="ui-monospace, monospace">
    <rect x="490" y="220" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="510" y="240" text-anchor="middle" font-size="12" fill="#1a1822">2</text>
    <rect x="530" y="220" width="40" height="30" fill="#cc4444" stroke="#1a1822" stroke-width="2"/>
    <text x="550" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">9</text>
    <rect x="570" y="220" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="590" y="240" text-anchor="middle" font-size="12" fill="#1a1822">4</text>
  </g>

  <text x="665" y="285" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Step 3: compare with smaller child (5), swap</text>
  <g font-family="ui-monospace, monospace">
    <rect x="530" y="295" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="550" y="315" text-anchor="middle" font-size="12" fill="#1a1822">5</text>
    <rect x="610" y="295" width="40" height="30" fill="#cc4444" stroke="#1a1822" stroke-width="2"/>
    <text x="630" y="315" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">9</text>
  </g>

  <text x="665" y="360" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1822">Step 4: leaf reached — heap order restored</text>
  <g font-family="ui-monospace, monospace">
    <rect x="490" y="370" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="510" y="390" text-anchor="middle" font-size="12" fill="#1a1822">2</text>
    <rect x="530" y="370" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="550" y="390" text-anchor="middle" font-size="12" fill="#1a1822">5</text>
    <rect x="570" y="370" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="590" y="390" text-anchor="middle" font-size="12" fill="#1a1822">4</text>
    <rect x="610" y="370" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="630" y="390" text-anchor="middle" font-size="12" fill="#1a1822">9</text>
    <rect x="650" y="370" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="670" y="390" text-anchor="middle" font-size="12" fill="#1a1822">7</text>
    <rect x="690" y="370" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="710" y="390" text-anchor="middle" font-size="12" fill="#1a1822">8</text>
    <rect x="730" y="370" width="40" height="30" fill="#ffffff" stroke="#1a1822"/>
    <text x="750" y="390" text-anchor="middle" font-size="12" fill="#1a1822">6</text>
  </g>
  <text x="665" y="430" text-anchor="middle" font-size="11" fill="#cc4444" font-weight="700">Returned 1; ready for next extract — O(log n)</text>
</svg>
