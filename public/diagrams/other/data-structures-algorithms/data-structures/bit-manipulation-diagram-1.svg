<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Truth tables for bitwise AND OR XOR NOT operators showing how individual bit positions combine</title>

  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Bitwise Operator Truth Tables</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Each operator applies bit-by-bit across operand positions — compiled to single CPU instructions</text>

  <!-- AND -->
  <rect x="50" y="85" width="190" height="180" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="50" y="85" width="190" height="30" rx="10" fill="#4caf50"/>
  <text x="145" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">AND (&amp;)</text>
  <text x="145" y="134" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.7">1 only if both inputs are 1</text>
  <text x="75" y="160" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">a  b  a &amp; b</text>
  <text x="75" y="180" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">0  0  0</text>
  <text x="75" y="198" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">0  1  0</text>
  <text x="75" y="216" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">1  0  0</text>
  <text x="75" y="234" font-size="11" font-family="ui-monospace, monospace" fill="#4caf50" font-weight="700">1  1  1</text>
  <text x="145" y="256" text-anchor="middle" font-size="10" font-style="italic" fill="#1a1822" opacity="0.7">Clear / extract / test</text>

  <!-- OR -->
  <rect x="260" y="85" width="190" height="180" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="260" y="85" width="190" height="30" rx="10" fill="#6d5bd0"/>
  <text x="355" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">OR (|)</text>
  <text x="355" y="134" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.7">1 if either input is 1</text>
  <text x="285" y="160" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">a  b  a | b</text>
  <text x="285" y="180" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">0  0  0</text>
  <text x="285" y="198" font-size="11" font-family="ui-monospace, monospace" fill="#6d5bd0" font-weight="700">0  1  1</text>
  <text x="285" y="216" font-size="11" font-family="ui-monospace, monospace" fill="#6d5bd0" font-weight="700">1  0  1</text>
  <text x="285" y="234" font-size="11" font-family="ui-monospace, monospace" fill="#6d5bd0" font-weight="700">1  1  1</text>
  <text x="355" y="256" text-anchor="middle" font-size="10" font-style="italic" fill="#1a1822" opacity="0.7">Set / union / add flag</text>

  <!-- XOR -->
  <rect x="470" y="85" width="190" height="180" rx="10" fill="#ffffff" stroke="#ff9800" stroke-width="2"/>
  <rect x="470" y="85" width="190" height="30" rx="10" fill="#ff9800"/>
  <text x="565" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">XOR (^)</text>
  <text x="565" y="134" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.7">1 if inputs differ</text>
  <text x="495" y="160" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">a  b  a ^ b</text>
  <text x="495" y="180" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">0  0  0</text>
  <text x="495" y="198" font-size="11" font-family="ui-monospace, monospace" fill="#ff9800" font-weight="700">0  1  1</text>
  <text x="495" y="216" font-size="11" font-family="ui-monospace, monospace" fill="#ff9800" font-weight="700">1  0  1</text>
  <text x="495" y="234" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">1  1  0</text>
  <text x="565" y="256" text-anchor="middle" font-size="10" font-style="italic" fill="#1a1822" opacity="0.7">Toggle / diff / parity</text>

  <!-- NOT -->
  <rect x="680" y="85" width="170" height="180" rx="10" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="680" y="85" width="170" height="30" rx="10" fill="#cc4444"/>
  <text x="765" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">NOT (~)</text>
  <text x="765" y="134" text-anchor="middle" font-size="11" fill="#1a1822" opacity="0.7">Flip every bit</text>
  <text x="705" y="170" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">a    ~a</text>
  <text x="705" y="195" font-size="11" font-family="ui-monospace, monospace" fill="#cc4444" font-weight="700">0    1</text>
  <text x="705" y="220" font-size="11" font-family="ui-monospace, monospace" fill="#cc4444" font-weight="700">1    0</text>
  <text x="765" y="256" text-anchor="middle" font-size="10" font-style="italic" fill="#1a1822" opacity="0.7">Mask / complement</text>

  <!-- Concrete example -->
  <text x="60" y="305" font-size="13" font-weight="700" fill="#1a1822">Worked example on 8-bit operands</text>

  <g font-family="ui-monospace, monospace">
    <text x="60" y="330" font-size="12" fill="#1a1822">a =</text>
    <rect x="110" y="320" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="120" y="335" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="130" y="320" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="140" y="335" text-anchor="middle" font-size="12" fill="#1a1822">0</text>
    <rect x="150" y="320" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="160" y="335" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="170" y="320" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="180" y="335" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="190" y="320" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="200" y="335" text-anchor="middle" font-size="12" fill="#1a1822">0</text>
    <rect x="210" y="320" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="220" y="335" text-anchor="middle" font-size="12" fill="#1a1822">0</text>
    <rect x="230" y="320" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="240" y="335" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="250" y="320" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="260" y="335" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <text x="285" y="335" font-size="11" fill="#1a1822" opacity="0.7">0xB3 / 179</text>

    <text x="60" y="360" font-size="12" fill="#1a1822">b =</text>
    <rect x="110" y="350" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="120" y="365" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="130" y="350" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="140" y="365" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="150" y="350" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="160" y="365" text-anchor="middle" font-size="12" fill="#1a1822">0</text>
    <rect x="170" y="350" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="180" y="365" text-anchor="middle" font-size="12" fill="#1a1822">0</text>
    <rect x="190" y="350" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="200" y="365" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="210" y="350" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="220" y="365" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="230" y="350" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="240" y="365" text-anchor="middle" font-size="12" fill="#1a1822">0</text>
    <rect x="250" y="350" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="260" y="365" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <text x="285" y="365" font-size="11" fill="#1a1822" opacity="0.7">0xCD / 205</text>

    <line x1="60" y1="378" x2="275" y2="378" stroke="#1a1822" stroke-width="1"/>

    <text x="60" y="400" font-size="12" fill="#4caf50">a&amp;b</text>
    <rect x="110" y="390" width="20" height="20" fill="#c8e6c9" stroke="#1a1822"/>
    <text x="120" y="405" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="130" y="390" width="20" height="20" fill="#c8e6c9" stroke="#1a1822"/>
    <text x="140" y="405" text-anchor="middle" font-size="12" fill="#1a1822">0</text>
    <rect x="150" y="390" width="20" height="20" fill="#c8e6c9" stroke="#1a1822"/>
    <text x="160" y="405" text-anchor="middle" font-size="12" fill="#1a1822">0</text>
    <rect x="170" y="390" width="20" height="20" fill="#c8e6c9" stroke="#1a1822"/>
    <text x="180" y="405" text-anchor="middle" font-size="12" fill="#1a1822">0</text>
    <rect x="190" y="390" width="20" height="20" fill="#c8e6c9" stroke="#1a1822"/>
    <text x="200" y="405" text-anchor="middle" font-size="12" fill="#1a1822">0</text>
    <rect x="210" y="390" width="20" height="20" fill="#c8e6c9" stroke="#1a1822"/>
    <text x="220" y="405" text-anchor="middle" font-size="12" fill="#1a1822">0</text>
    <rect x="230" y="390" width="20" height="20" fill="#c8e6c9" stroke="#1a1822"/>
    <text x="240" y="405" text-anchor="middle" font-size="12" fill="#1a1822">0</text>
    <rect x="250" y="390" width="20" height="20" fill="#c8e6c9" stroke="#1a1822"/>
    <text x="260" y="405" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <text x="285" y="405" font-size="11" fill="#1a1822" opacity="0.7">0x81 / 129</text>

    <text x="60" y="430" font-size="12" fill="#6d5bd0">a|b</text>
    <rect x="110" y="420" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="120" y="435" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="130" y="420" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="140" y="435" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="150" y="420" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="160" y="435" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="170" y="420" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="180" y="435" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="190" y="420" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="200" y="435" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="210" y="420" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="220" y="435" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="230" y="420" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="240" y="435" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="250" y="420" width="20" height="20" fill="#e8dffa" stroke="#1a1822"/>
    <text x="260" y="435" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <text x="285" y="435" font-size="11" fill="#1a1822" opacity="0.7">0xFF / 255</text>

    <text x="60" y="460" font-size="12" fill="#ff9800">a^b</text>
    <rect x="110" y="450" width="20" height="20" fill="#ffe0b2" stroke="#1a1822"/>
    <text x="120" y="465" text-anchor="middle" font-size="12" fill="#1a1822">0</text>
    <rect x="130" y="450" width="20" height="20" fill="#ffe0b2" stroke="#1a1822"/>
    <text x="140" y="465" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="150" y="450" width="20" height="20" fill="#ffe0b2" stroke="#1a1822"/>
    <text x="160" y="465" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="170" y="450" width="20" height="20" fill="#ffe0b2" stroke="#1a1822"/>
    <text x="180" y="465" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="190" y="450" width="20" height="20" fill="#ffe0b2" stroke="#1a1822"/>
    <text x="200" y="465" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="210" y="450" width="20" height="20" fill="#ffe0b2" stroke="#1a1822"/>
    <text x="220" y="465" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="230" y="450" width="20" height="20" fill="#ffe0b2" stroke="#1a1822"/>
    <text x="240" y="465" text-anchor="middle" font-size="12" fill="#1a1822">1</text>
    <rect x="250" y="450" width="20" height="20" fill="#ffe0b2" stroke="#1a1822"/>
    <text x="260" y="465" text-anchor="middle" font-size="12" fill="#1a1822">0</text>
    <text x="285" y="465" font-size="11" fill="#1a1822" opacity="0.7">0x7E / 126</text>
  </g>

  <!-- Shift tips -->
  <rect x="430" y="295" width="420" height="180" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="430" y="295" width="420" height="28" rx="10" fill="#6d5bd0"/>
  <text x="640" y="314" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Shifts &amp; canonical patterns</text>
  <text x="445" y="343" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">x &lt;&lt; n</text>
  <text x="555" y="343" font-size="11" fill="#1a1822">multiply by 2^n, shift bits left</text>
  <text x="445" y="363" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">x &gt;&gt; n</text>
  <text x="555" y="363" font-size="11" fill="#1a1822">divide by 2^n (arithmetic / sign-ext)</text>
  <text x="445" y="383" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">x &gt;&gt;&gt; n</text>
  <text x="555" y="383" font-size="11" fill="#1a1822">logical right shift (zero-fill)</text>
  <text x="445" y="412" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">x | (1 &lt;&lt; n)</text>
  <text x="585" y="412" font-size="11" fill="#1a1822">set bit n</text>
  <text x="445" y="432" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">x &amp; ~(1 &lt;&lt; n)</text>
  <text x="585" y="432" font-size="11" fill="#1a1822">clear bit n</text>
  <text x="445" y="452" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">x ^ (1 &lt;&lt; n)</text>
  <text x="585" y="452" font-size="11" fill="#1a1822">toggle bit n</text>
  <text x="445" y="471" font-size="11" font-family="ui-monospace, monospace" fill="#1a1822">(x &gt;&gt; n) &amp; 1</text>
  <text x="585" y="471" font-size="11" fill="#1a1822">read bit n</text>
</svg>
