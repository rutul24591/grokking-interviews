<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Call stack showing nested function frames with return addresses and local variables for recursive traversal</title>
  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">The Hardware Call Stack</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Every function invocation pushes a frame; return unwinds it; recursion maps directly onto LIFO</text>

  <!-- Stack frames -->
  <rect x="60" y="80" width="360" height="400" rx="8" fill="#ffffff" stroke="#1a1822" stroke-width="2"/>
  <text x="240" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1822">Call stack (grows downward)</text>
  <text x="240" y="122" text-anchor="middle" font-size="10" fill="#1a1822" opacity="0.7">during depth-first traversal of a tree</text>

  <!-- Frame: main -->
  <rect x="80" y="140" width="320" height="50" rx="4" fill="#e8dffa" stroke="#1a1822"/>
  <text x="95" y="160" font-size="11" font-weight="700" fill="#1a1822">main()</text>
  <text x="95" y="178" font-size="10" font-family="ui-monospace, monospace" fill="#1a1822">return = 0x0000     root</text>

  <!-- Frame: dfs(root) -->
  <rect x="80" y="200" width="320" height="55" rx="4" fill="#d7c9f5" stroke="#1a1822"/>
  <text x="95" y="220" font-size="11" font-weight="700" fill="#1a1822">dfs(root) — bottom</text>
  <text x="95" y="238" font-size="10" font-family="ui-monospace, monospace" fill="#1a1822">return = main+12</text>
  <text x="95" y="252" font-size="10" font-family="ui-monospace, monospace" fill="#1a1822">node = root, child = left</text>

  <!-- Frame: dfs(root.left) -->
  <rect x="80" y="265" width="320" height="55" rx="4" fill="#a89bec" stroke="#1a1822"/>
  <text x="95" y="285" font-size="11" font-weight="700" fill="#ffffff">dfs(root.left)</text>
  <text x="95" y="303" font-size="10" font-family="ui-monospace, monospace" fill="#ffffff">return = dfs+40</text>
  <text x="95" y="317" font-size="10" font-family="ui-monospace, monospace" fill="#ffffff">node = A, child = null</text>

  <!-- Frame: dfs(root.left.right) -->
  <rect x="80" y="330" width="320" height="55" rx="4" fill="#6d5bd0" stroke="#1a1822"/>
  <text x="95" y="350" font-size="11" font-weight="700" fill="#ffffff">dfs(A.right)</text>
  <text x="95" y="368" font-size="10" font-family="ui-monospace, monospace" fill="#ffffff">return = dfs+40</text>
  <text x="95" y="382" font-size="10" font-family="ui-monospace, monospace" fill="#ffffff">node = B, child = left</text>

  <!-- Currently-executing marker -->
  <rect x="80" y="395" width="320" height="55" rx="4" fill="#4caf50" stroke="#1a1822" stroke-width="2"/>
  <text x="95" y="415" font-size="11" font-weight="700" fill="#ffffff">dfs(B.left) ← top</text>
  <text x="95" y="433" font-size="10" font-family="ui-monospace, monospace" fill="#ffffff">return = dfs+40</text>
  <text x="95" y="447" font-size="10" font-family="ui-monospace, monospace" fill="#ffffff">node = C, child = null</text>

  <!-- Stack pointer -->
  <text x="430" y="427" font-size="11" font-weight="700" fill="#cc4444">← SP (stack ptr)</text>
  <text x="430" y="444" font-size="10" fill="#1a1822" opacity="0.7">grows toward lower addresses</text>

  <!-- Sidebar: limits and semantics -->
  <rect x="480" y="140" width="380" height="130" rx="8" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="480" y="140" width="380" height="28" rx="8" fill="#6d5bd0"/>
  <text x="670" y="159" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Stack-frame contents</text>
  <text x="495" y="185" font-size="11" fill="#1a1822">• Return address (where to go after RET)</text>
  <text x="495" y="203" font-size="11" fill="#1a1822">• Saved frame pointer (for stack walking)</text>
  <text x="495" y="221" font-size="11" fill="#1a1822">• Function parameters</text>
  <text x="495" y="239" font-size="11" fill="#1a1822">• Local variables</text>
  <text x="495" y="257" font-size="11" fill="#1a1822">• Spill slots for register pressure</text>

  <rect x="480" y="290" width="380" height="105" rx="8" fill="#ffffff" stroke="#cc4444" stroke-width="2"/>
  <rect x="480" y="290" width="380" height="28" rx="8" fill="#cc4444"/>
  <text x="670" y="309" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">Typical stack sizes</text>
  <text x="495" y="335" font-size="11" fill="#1a1822">Linux thread:   8 MB default</text>
  <text x="495" y="353" font-size="11" fill="#1a1822">Windows thread: 1 MB default</text>
  <text x="495" y="371" font-size="11" fill="#1a1822">Node worker:    512 KB (main larger)</text>
  <text x="495" y="389" font-size="11" fill="#1a1822">V8 JS:          ~10–20K frame ceiling</text>

  <rect x="480" y="415" width="380" height="65" rx="8" fill="#fff4e0" stroke="#ff9800" stroke-width="1.5"/>
  <text x="495" y="435" font-size="11" font-weight="700" fill="#1a1822">Stack overflow</text>
  <text x="495" y="453" font-size="11" fill="#1a1822">Recurse past the page limit → SIGSEGV</text>
  <text x="495" y="470" font-size="11" fill="#1a1822">(C/Rust) or RangeError (JS). Convert</text>
  <text x="595" y="470" font-size="11" font-weight="600" fill="#ff9800">deep recursion → explicit stack.</text>
</svg>
