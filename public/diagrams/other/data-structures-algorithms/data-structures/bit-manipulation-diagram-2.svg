<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <title>Canonical bit manipulation tricks: clearing the lowest set bit with n and n minus 1, isolating the lowest set bit, XOR swap</title>

  <rect width="900" height="500" rx="12" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1822">Canonical Bit Tricks</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822" opacity="0.7">Two-line identities that unlock fundamentally faster algorithms</text>

  <!-- Trick 1: n & (n-1) -->
  <rect x="40" y="80" width="410" height="180" rx="10" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
  <rect x="40" y="80" width="410" height="28" rx="10" fill="#4caf50"/>
  <text x="245" y="99" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">n &amp; (n − 1) → clears lowest set bit</text>

  <g font-family="ui-monospace, monospace">
    <text x="55" y="128" font-size="11" fill="#1a1822">n       =</text>
    <rect x="130" y="118" width="20" height="18" fill="#c8e6c9" stroke="#1a1822"/><text x="140" y="132" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="150" y="118" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="160" y="132" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="170" y="118" width="20" height="18" fill="#c8e6c9" stroke="#1a1822"/><text x="180" y="132" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="190" y="118" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="200" y="132" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="210" y="118" width="20" height="18" fill="#c8e6c9" stroke="#1a1822"/><text x="220" y="132" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="230" y="118" width="20" height="18" fill="#c8e6c9" stroke="#1a1822"/><text x="240" y="132" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="250" y="118" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="260" y="132" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="270" y="118" width="20" height="18" fill="#4caf50" stroke="#1a1822"/><text x="280" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">1</text>

    <text x="55" y="156" font-size="11" fill="#1a1822">n − 1   =</text>
    <rect x="130" y="146" width="20" height="18" fill="#c8e6c9" stroke="#1a1822"/><text x="140" y="160" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="150" y="146" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="160" y="160" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="170" y="146" width="20" height="18" fill="#c8e6c9" stroke="#1a1822"/><text x="180" y="160" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="190" y="146" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="200" y="160" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="210" y="146" width="20" height="18" fill="#c8e6c9" stroke="#1a1822"/><text x="220" y="160" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="230" y="146" width="20" height="18" fill="#c8e6c9" stroke="#1a1822"/><text x="240" y="160" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="250" y="146" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="260" y="160" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="270" y="146" width="20" height="18" fill="#cc4444" stroke="#1a1822"/><text x="280" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">0</text>

    <line x1="55" y1="173" x2="295" y2="173" stroke="#1a1822" stroke-width="1"/>

    <text x="55" y="190" font-size="11" fill="#4caf50" font-weight="700">result  =</text>
    <rect x="130" y="180" width="20" height="18" fill="#c8e6c9" stroke="#1a1822"/><text x="140" y="194" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="150" y="180" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="160" y="194" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="170" y="180" width="20" height="18" fill="#c8e6c9" stroke="#1a1822"/><text x="180" y="194" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="190" y="180" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="200" y="194" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="210" y="180" width="20" height="18" fill="#c8e6c9" stroke="#1a1822"/><text x="220" y="194" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="230" y="180" width="20" height="18" fill="#c8e6c9" stroke="#1a1822"/><text x="240" y="194" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="250" y="180" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="260" y="194" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="270" y="180" width="20" height="18" fill="#4caf50" stroke="#1a1822"/><text x="280" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">0</text>
  </g>
  <text x="245" y="224" text-anchor="middle" font-size="11" fill="#1a1822">Lowest bit turned off, everything else preserved.</text>
  <text x="245" y="242" text-anchor="middle" font-size="11" font-style="italic" fill="#4caf50">Kernighan&apos;s popcount: loop once per set bit</text>

  <!-- Trick 2: x & -x -->
  <rect x="470" y="80" width="410" height="180" rx="10" fill="#ffffff" stroke="#ff9800" stroke-width="2"/>
  <rect x="470" y="80" width="410" height="28" rx="10" fill="#ff9800"/>
  <text x="675" y="99" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">x &amp; −x → isolates lowest set bit</text>

  <g font-family="ui-monospace, monospace">
    <text x="485" y="128" font-size="11" fill="#1a1822">x       =</text>
    <rect x="560" y="118" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="570" y="132" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="580" y="118" width="20" height="18" fill="#ffe0b2" stroke="#1a1822"/><text x="590" y="132" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="600" y="118" width="20" height="18" fill="#ffe0b2" stroke="#1a1822"/><text x="610" y="132" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="620" y="118" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="630" y="132" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="640" y="118" width="20" height="18" fill="#ffe0b2" stroke="#1a1822"/><text x="650" y="132" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="660" y="118" width="20" height="18" fill="#ffe0b2" stroke="#1a1822"/><text x="670" y="132" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="680" y="118" width="20" height="18" fill="#ff9800" stroke="#1a1822"/><text x="690" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">1</text>
    <rect x="700" y="118" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="710" y="132" text-anchor="middle" font-size="11" fill="#1a1822">0</text>

    <text x="485" y="156" font-size="11" fill="#1a1822">−x      =</text>
    <rect x="560" y="146" width="20" height="18" fill="#ffe0b2" stroke="#1a1822"/><text x="570" y="160" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="580" y="146" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="590" y="160" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="600" y="146" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="610" y="160" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="620" y="146" width="20" height="18" fill="#ffe0b2" stroke="#1a1822"/><text x="630" y="160" text-anchor="middle" font-size="11" fill="#1a1822">1</text>
    <rect x="640" y="146" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="650" y="160" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="660" y="146" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="670" y="160" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="680" y="146" width="20" height="18" fill="#ff9800" stroke="#1a1822"/><text x="690" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">1</text>
    <rect x="700" y="146" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="710" y="160" text-anchor="middle" font-size="11" fill="#1a1822">0</text>

    <line x1="485" y1="173" x2="725" y2="173" stroke="#1a1822" stroke-width="1"/>

    <text x="485" y="190" font-size="11" fill="#ff9800" font-weight="700">result  =</text>
    <rect x="560" y="180" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="570" y="194" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="580" y="180" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="590" y="194" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="600" y="180" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="610" y="194" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="620" y="180" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="630" y="194" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="640" y="180" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="650" y="194" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="660" y="180" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="670" y="194" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
    <rect x="680" y="180" width="20" height="18" fill="#ff9800" stroke="#1a1822"/><text x="690" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#ffffff">1</text>
    <rect x="700" y="180" width="20" height="18" fill="#ffffff" stroke="#1a1822"/><text x="710" y="194" text-anchor="middle" font-size="11" fill="#1a1822">0</text>
  </g>
  <text x="675" y="224" text-anchor="middle" font-size="11" fill="#1a1822">Two&apos;s complement: −x = ~x + 1, which flips above the lowest 1 and keeps it.</text>
  <text x="675" y="242" text-anchor="middle" font-size="11" font-style="italic" fill="#ff9800">Used by Fenwick trees, bitmap iteration</text>

  <!-- Trick 3: XOR swap -->
  <rect x="40" y="285" width="840" height="190" rx="10" fill="#ffffff" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="40" y="285" width="840" height="28" rx="10" fill="#6d5bd0"/>
  <text x="460" y="304" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">XOR swap: x, y = y, x without a temporary</text>

  <g font-family="ui-monospace, monospace">
    <text x="60" y="340" font-size="12" font-weight="700" fill="#1a1822">Step 1: x ^= y</text>
    <text x="60" y="362" font-size="11" fill="#1a1822">before: x = a, y = b</text>
    <text x="60" y="380" font-size="11" fill="#6d5bd0">after:  x = a ^ b, y = b</text>

    <text x="285" y="340" font-size="12" font-weight="700" fill="#1a1822">Step 2: y ^= x</text>
    <text x="285" y="362" font-size="11" fill="#1a1822">x = a ^ b, y = b</text>
    <text x="285" y="380" font-size="11" fill="#6d5bd0">y = (a ^ b) ^ b = a</text>

    <text x="510" y="340" font-size="12" font-weight="700" fill="#1a1822">Step 3: x ^= y</text>
    <text x="510" y="362" font-size="11" fill="#1a1822">x = a ^ b, y = a</text>
    <text x="510" y="380" font-size="11" fill="#6d5bd0">x = (a ^ b) ^ a = b</text>
  </g>

  <text x="60" y="420" font-size="12" font-weight="700" fill="#1a1822">Why it works:</text>
  <text x="60" y="440" font-size="11" fill="#1a1822">XOR is self-inverse (x ^ x = 0) and commutative. Each step cancels one variable&apos;s contribution.</text>
  <text x="60" y="460" font-size="11" fill="#cc4444" font-weight="600">Warning: aliased references (x and y point to the same slot) zero out the value. Use a temp in modern code.</text>
</svg>
