<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Quickselect — Partition Once, Recurse Into One Side</text>
  <text x="450" y="54" text-anchor="middle" font-size="12">Find the k-th smallest in O(n) average. Unlike quicksort, recurse into only one half.</text>

  <rect x="40" y="80" width="820" height="110" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="105" font-size="13" font-weight="700" fill="#6d5bd0">Step 1 — Lomuto / Hoare partition around pivot p</text>
  <g transform="translate(60,125)" font-family="monospace" font-size="12">
    <rect x="0" y="0" width="40" height="30" fill="#a89bec" stroke="#6d5bd0"/><text x="20" y="20" text-anchor="middle">3</text>
    <rect x="40" y="0" width="40" height="30" fill="#a89bec" stroke="#6d5bd0"/><text x="60" y="20" text-anchor="middle">1</text>
    <rect x="80" y="0" width="40" height="30" fill="#a89bec" stroke="#6d5bd0"/><text x="100" y="20" text-anchor="middle">4</text>
    <rect x="120" y="0" width="40" height="30" fill="#a89bec" stroke="#6d5bd0"/><text x="140" y="20" text-anchor="middle">7</text>
    <rect x="160" y="0" width="40" height="30" fill="#cc4444" stroke="#1a1822"/><text x="180" y="20" text-anchor="middle" fill="#fff">5</text>
    <rect x="200" y="0" width="40" height="30" fill="#a89bec" stroke="#6d5bd0"/><text x="220" y="20" text-anchor="middle">2</text>
    <rect x="240" y="0" width="40" height="30" fill="#a89bec" stroke="#6d5bd0"/><text x="260" y="20" text-anchor="middle">9</text>
    <rect x="280" y="0" width="40" height="30" fill="#a89bec" stroke="#6d5bd0"/><text x="300" y="20" text-anchor="middle">6</text>
    <rect x="320" y="0" width="40" height="30" fill="#a89bec" stroke="#6d5bd0"/><text x="340" y="20" text-anchor="middle">8</text>
  </g>
  <text x="60" y="175" font-size="11" fill="#1a1822">Pivot = 5 (red). Scan once: &lt;5 goes left, &gt;5 right. After partition: [3 1 4 2] 5 [7 9 6 8].</text>

  <rect x="40" y="210" width="820" height="120" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="235" font-size="13" font-weight="700" fill="#4caf50">Step 2 — Recurse into the side that contains rank k</text>
  <text x="60" y="262" font-size="11" fill="#1a1822" font-family="monospace">pivotRank = 5 (4 elements left, pivot at index 4)</text>
  <text x="60" y="282" font-size="11" fill="#1a1822" font-family="monospace">if k == pivotRank:   return pivot</text>
  <text x="60" y="302" font-size="11" fill="#1a1822" font-family="monospace">elif k &lt; pivotRank:  quickselect(left, k)</text>
  <text x="60" y="320" font-size="11" fill="#1a1822" font-family="monospace">else:                quickselect(right, k − pivotRank)</text>

  <rect x="40" y="350" width="820" height="125" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="375" font-size="13" font-weight="700" fill="#6d5bd0">Complexity — one-sided recursion</text>
  <text x="60" y="400" font-size="11" fill="#1a1822">T(n) = T(n/2) + n on average → Σ n/2^i = 2n → Θ(n).</text>
  <text x="60" y="420" font-size="11" fill="#1a1822">T(n) = T(n−1) + n worst case (always-bad pivot) → Θ(n²).</text>
  <text x="60" y="440" font-size="11" fill="#1a1822">Randomized pivot gives E[T] = Θ(n) with high probability; variance small.</text>
  <text x="60" y="460" font-size="11" fill="#4caf50" font-weight="700">Key insight: quicksort sorts both sides (n log n); quickselect discards one.</text>
</svg>
