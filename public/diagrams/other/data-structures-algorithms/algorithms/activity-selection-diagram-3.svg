<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Variants — Weighted Intervals, Minimum Rooms, Erasure</text>

  <rect x="40" y="60" width="820" height="220" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="14" font-weight="700" fill="#6d5bd0">Problem family</text>
  <g font-size="11">
    <text x="60" y="115" font-weight="700">Variant</text>
    <text x="300" y="115" font-weight="700">Algorithm</text>
    <text x="620" y="115" font-weight="700">Complexity</text>

    <text x="60" y="138">Max non-overlapping activities</text>
    <text x="300" y="138">greedy earliest-finish</text>
    <text x="620" y="138">O(n log n)</text>

    <text x="60" y="160">Max weighted intervals</text>
    <text x="300" y="160">DP + binary search (NOT greedy)</text>
    <text x="620" y="160">O(n log n)</text>

    <text x="60" y="182">Min rooms for all meetings</text>
    <text x="300" y="182">sweep line / min-heap of end times</text>
    <text x="620" y="182">O(n log n)</text>

    <text x="60" y="204">Min arrows to burst balloons</text>
    <text x="300" y="204">greedy earliest-end + count gaps</text>
    <text x="620" y="204">O(n log n)</text>

    <text x="60" y="226">Min intervals to remove for non-overlap</text>
    <text x="300" y="226">activity selection, answer = n − |S|</text>
    <text x="620" y="226">O(n log n)</text>

    <text x="60" y="248">Interval partitioning (color each)</text>
    <text x="300" y="248">sort by start + min-heap of ends</text>
    <text x="620" y="248">O(n log n)</text>
  </g>

  <rect x="40" y="300" width="400" height="175" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="325" font-size="13" font-weight="700" fill="#4caf50">Min rooms via heap</text>
  <text x="60" y="352" font-size="11" fill="#1a1822" font-family="monospace">sort by start</text>
  <text x="60" y="370" font-size="11" fill="#1a1822" font-family="monospace">heap = []</text>
  <text x="60" y="388" font-size="11" fill="#1a1822" font-family="monospace">for (s, e) in intervals:</text>
  <text x="60" y="406" font-size="11" fill="#1a1822" font-family="monospace">  if heap and heap[0] &lt;= s:</text>
  <text x="60" y="424" font-size="11" fill="#1a1822" font-family="monospace">    heappop(heap)</text>
  <text x="60" y="442" font-size="11" fill="#1a1822" font-family="monospace">  heappush(heap, e)</text>
  <text x="60" y="462" font-size="11" fill="#1a1822" font-family="monospace">answer = len(heap)</text>

  <rect x="460" y="300" width="400" height="175" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="480" y="325" font-size="13" font-weight="700" fill="#6d5bd0">Weighted intervals (DP, not greedy)</text>
  <text x="480" y="352" font-size="11" fill="#1a1822" font-family="monospace">sort by finish</text>
  <text x="480" y="370" font-size="11" fill="#1a1822" font-family="monospace">for each i:</text>
  <text x="480" y="388" font-size="11" fill="#1a1822" font-family="monospace">  p[i] = largest j with finish[j]&lt;=start[i]</text>
  <text x="480" y="406" font-size="11" fill="#1a1822" font-family="monospace">dp[i] = max(dp[i-1],</text>
  <text x="480" y="424" font-size="11" fill="#1a1822" font-family="monospace">            dp[p[i]] + weight[i])</text>
  <text x="480" y="452" font-size="11" fill="#cc4444" font-weight="700">Greedy fails — a high-weight long interval can dominate two low-weight short ones.</text>
</svg>
