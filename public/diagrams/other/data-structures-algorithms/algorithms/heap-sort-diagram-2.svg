<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Binary Heap — Implicit Array Layout</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">Complete tree stored as flat array: no pointers, parent/child via index arithmetic.</text>

  <!-- Tree -->
  <g transform="translate(80,80)">
    <line x1="280" y1="25" x2="140" y2="75" stroke="#1a1822"/>
    <line x1="280" y1="25" x2="420" y2="75" stroke="#1a1822"/>
    <line x1="140" y1="85" x2="70" y2="135" stroke="#1a1822"/>
    <line x1="140" y1="85" x2="210" y2="135" stroke="#1a1822"/>
    <line x1="420" y1="85" x2="350" y2="135" stroke="#1a1822"/>
    <line x1="420" y1="85" x2="490" y2="135" stroke="#1a1822"/>
    <line x1="70" y1="145" x2="35" y2="195" stroke="#1a1822"/>
    <line x1="70" y1="145" x2="105" y2="195" stroke="#1a1822"/>

    <circle cx="280" cy="20" r="22" fill="#cc4444"/><text x="280" y="18" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">95</text>
    <text x="280" y="33" text-anchor="middle" fill="#fff" font-size="9">[0]</text>

    <circle cx="140" cy="80" r="20" fill="#6d5bd0"/><text x="140" y="78" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">72</text>
    <text x="140" y="92" text-anchor="middle" fill="#fff" font-size="9">[1]</text>

    <circle cx="420" cy="80" r="20" fill="#6d5bd0"/><text x="420" y="78" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">88</text>
    <text x="420" y="92" text-anchor="middle" fill="#fff" font-size="9">[2]</text>

    <circle cx="70" cy="140" r="18" fill="#a89bec"/><text x="70" y="138" text-anchor="middle" font-size="11">50</text>
    <text x="70" y="151" text-anchor="middle" font-size="9">[3]</text>

    <circle cx="210" cy="140" r="18" fill="#a89bec"/><text x="210" y="138" text-anchor="middle" font-size="11">68</text>
    <text x="210" y="151" text-anchor="middle" font-size="9">[4]</text>

    <circle cx="350" cy="140" r="18" fill="#a89bec"/><text x="350" y="138" text-anchor="middle" font-size="11">40</text>
    <text x="350" y="151" text-anchor="middle" font-size="9">[5]</text>

    <circle cx="490" cy="140" r="18" fill="#a89bec"/><text x="490" y="138" text-anchor="middle" font-size="11">75</text>
    <text x="490" y="151" text-anchor="middle" font-size="9">[6]</text>

    <circle cx="35" cy="200" r="15" fill="#a89bec"/><text x="35" y="199" text-anchor="middle" font-size="10">22</text>
    <text x="35" y="211" text-anchor="middle" font-size="8">[7]</text>

    <circle cx="105" cy="200" r="15" fill="#a89bec"/><text x="105" y="199" text-anchor="middle" font-size="10">41</text>
    <text x="105" y="211" text-anchor="middle" font-size="8">[8]</text>
  </g>

  <!-- Array -->
  <text x="60" y="340" font-size="13" font-weight="700" fill="#6d5bd0">Stored as flat array:</text>
  <g transform="translate(80,355)" font-size="12">
    <rect x="0" y="0" width="80" height="35" fill="#cc4444"/><text x="40" y="22" text-anchor="middle" fill="#fff" font-weight="700">95</text>
    <rect x="82" y="0" width="80" height="35" fill="#6d5bd0"/><text x="122" y="22" text-anchor="middle" fill="#fff" font-weight="700">72</text>
    <rect x="164" y="0" width="80" height="35" fill="#6d5bd0"/><text x="204" y="22" text-anchor="middle" fill="#fff" font-weight="700">88</text>
    <rect x="246" y="0" width="80" height="35" fill="#a89bec"/><text x="286" y="22" text-anchor="middle">50</text>
    <rect x="328" y="0" width="80" height="35" fill="#a89bec"/><text x="368" y="22" text-anchor="middle">68</text>
    <rect x="410" y="0" width="80" height="35" fill="#a89bec"/><text x="450" y="22" text-anchor="middle">40</text>
    <rect x="492" y="0" width="80" height="35" fill="#a89bec"/><text x="532" y="22" text-anchor="middle">75</text>
    <rect x="574" y="0" width="80" height="35" fill="#a89bec"/><text x="614" y="22" text-anchor="middle">22</text>
    <rect x="656" y="0" width="80" height="35" fill="#a89bec"/><text x="696" y="22" text-anchor="middle">41</text>

    <text x="40" y="52" text-anchor="middle" font-size="10">[0]</text>
    <text x="122" y="52" text-anchor="middle" font-size="10">[1]</text>
    <text x="204" y="52" text-anchor="middle" font-size="10">[2]</text>
    <text x="286" y="52" text-anchor="middle" font-size="10">[3]</text>
    <text x="368" y="52" text-anchor="middle" font-size="10">[4]</text>
    <text x="450" y="52" text-anchor="middle" font-size="10">[5]</text>
    <text x="532" y="52" text-anchor="middle" font-size="10">[6]</text>
    <text x="614" y="52" text-anchor="middle" font-size="10">[7]</text>
    <text x="696" y="52" text-anchor="middle" font-size="10">[8]</text>
  </g>

  <!-- Formula box -->
  <rect x="60" y="430" width="780" height="60" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="80" y="452" font-size="13" font-weight="700" fill="#6d5bd0">Index arithmetic (0-based):</text>
  <text x="80" y="473" font-size="12" fill="#1a1822">parent(i) = ⌊(i−1)/2⌋   •   left(i) = 2i + 1   •   right(i) = 2i + 2   •   heap property: arr[parent(i)] ≥ arr[i] for max-heap</text>
</svg>
