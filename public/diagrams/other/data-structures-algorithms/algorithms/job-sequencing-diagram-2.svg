<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Two Data-Structure Speedups — DSU and Min-Heap</text>

  <!-- DSU -->
  <rect x="40" y="60" width="400" height="210" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#4caf50">Union-Find (latest-free-slot query)</text>
  <text x="60" y="110" font-size="11" fill="#1a1822">parent[t] = latest free slot ≤ t (t if free).</text>
  <text x="60" y="135" font-size="11" fill="#1a1822" font-family="monospace">find(t):</text>
  <text x="60" y="153" font-size="11" fill="#1a1822" font-family="monospace">  if parent[t] == t: return t</text>
  <text x="60" y="171" font-size="11" fill="#1a1822" font-family="monospace">  return parent[t] = find(parent[t])</text>
  <text x="60" y="196" font-size="11" fill="#1a1822" font-family="monospace">assign(job):</text>
  <text x="60" y="214" font-size="11" fill="#1a1822" font-family="monospace">  t = find(job.deadline)</text>
  <text x="60" y="232" font-size="11" fill="#1a1822" font-family="monospace">  if t &gt; 0:</text>
  <text x="60" y="250" font-size="11" fill="#1a1822" font-family="monospace">    assign; parent[t] = t − 1</text>

  <!-- Heap -->
  <rect x="460" y="60" width="400" height="210" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="480" y="85" font-size="13" font-weight="700" fill="#6d5bd0">Min-heap (swap-weakest)</text>
  <text x="480" y="110" font-size="11" fill="#1a1822">Sort jobs by <em>deadline</em> ascending.</text>
  <text x="480" y="130" font-size="11" fill="#1a1822">Maintain a min-heap of profits</text>
  <text x="480" y="146" font-size="11" fill="#1a1822">of currently assigned jobs.</text>
  <text x="480" y="170" font-size="11" fill="#1a1822" font-family="monospace">for job in jobs sorted by deadline:</text>
  <text x="480" y="188" font-size="11" fill="#1a1822" font-family="monospace">  push profit</text>
  <text x="480" y="206" font-size="11" fill="#1a1822" font-family="monospace">  if len(heap) &gt; deadline:</text>
  <text x="480" y="224" font-size="11" fill="#1a1822" font-family="monospace">    pop the smallest profit</text>
  <text x="480" y="250" font-size="11" fill="#4caf50" font-weight="700">Complexity: O(n log n).</text>

  <!-- Comparison table -->
  <rect x="40" y="290" width="820" height="185" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="315" font-size="14" font-weight="700" fill="#6d5bd0">Complexity comparison</text>
  <g font-size="11">
    <text x="60" y="345" font-weight="700">Method</text>
    <text x="350" y="345" font-weight="700">Preprocessing</text>
    <text x="600" y="345" font-weight="700">Total</text>

    <text x="60" y="370">Naive scan slots</text>
    <text x="350" y="370">O(n log n) sort</text>
    <text x="600" y="370">O(n · d_max)</text>

    <text x="60" y="390">DSU on slots</text>
    <text x="350" y="390">O(n log n) sort + init</text>
    <text x="600" y="390">O(n log n · α(n))</text>

    <text x="60" y="410">Min-heap (swap-weakest)</text>
    <text x="350" y="410">O(n log n) sort by deadline</text>
    <text x="600" y="410">O(n log n)</text>

    <text x="60" y="430">Matroid intersection (weighted)</text>
    <text x="350" y="430">—</text>
    <text x="600" y="430">polynomial but slower constants</text>

    <text x="60" y="455" fill="#4caf50" font-weight="700">For interview: heap variant is the cleanest single-pass code.</text>
  </g>
</svg>
