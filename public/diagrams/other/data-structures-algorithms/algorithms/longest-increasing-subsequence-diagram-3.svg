<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">LIS Applications — Three Very Different Domains</text>

  <!-- Box stacking -->
  <rect x="40" y="70" width="260" height="190" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="170" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Russian Doll Envelopes</text>
  <!-- Nested rectangles -->
  <rect x="90" y="110" width="160" height="110" fill="none" stroke="#a89bec" stroke-width="2"/>
  <rect x="105" y="125" width="130" height="80" fill="none" stroke="#6d5bd0" stroke-width="2"/>
  <rect x="125" y="142" width="90" height="50" fill="none" stroke="#cc4444" stroke-width="2"/>
  <rect x="145" y="157" width="50" height="20" fill="none" stroke="#4caf50" stroke-width="2"/>
  <text x="170" y="240" text-anchor="middle" font-size="11" fill="#1a1822">Sort by w asc, h desc;</text>
  <text x="170" y="255" text-anchor="middle" font-size="11" fill="#1a1822">LIS on h = max nesting.</text>

  <!-- Chain alignment -->
  <rect x="320" y="70" width="260" height="190" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="450" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">DNA Chain Alignment</text>
  <!-- Two strands with seed matches -->
  <line x1="340" y1="130" x2="570" y2="130" stroke="#1a1822" stroke-width="2"/>
  <line x1="340" y1="210" x2="570" y2="210" stroke="#1a1822" stroke-width="2"/>
  <!-- Matches (crossing lines are invalid, chain = non-crossing subset) -->
  <line x1="360" y1="130" x2="390" y2="210" stroke="#4caf50" stroke-width="1.5"/>
  <line x1="400" y1="130" x2="430" y2="210" stroke="#4caf50" stroke-width="1.5"/>
  <line x1="450" y1="130" x2="420" y2="210" stroke="#cc4444" stroke-width="1.5" stroke-dasharray="3"/>
  <line x1="480" y1="130" x2="490" y2="210" stroke="#4caf50" stroke-width="1.5"/>
  <line x1="530" y1="130" x2="540" y2="210" stroke="#4caf50" stroke-width="1.5"/>
  <text x="450" y="245" text-anchor="middle" font-size="11" fill="#1a1822">Seeds with increasing positions</text>
  <text x="450" y="260" text-anchor="middle" font-size="11" fill="#1a1822">on both strands = LIS chain.</text>

  <!-- Young tableau -->
  <rect x="600" y="70" width="260" height="190" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="730" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#6d5bd0">Young Tableau (RSK)</text>
  <g transform="translate(640,115)" font-size="12">
    <rect x="0" y="0" width="30" height="30" fill="#e8e4f8" stroke="#6d5bd0"/><text x="15" y="20" text-anchor="middle">1</text>
    <rect x="30" y="0" width="30" height="30" fill="#e8e4f8" stroke="#6d5bd0"/><text x="45" y="20" text-anchor="middle">3</text>
    <rect x="60" y="0" width="30" height="30" fill="#e8e4f8" stroke="#6d5bd0"/><text x="75" y="20" text-anchor="middle">7</text>
    <rect x="90" y="0" width="30" height="30" fill="#e8e4f8" stroke="#6d5bd0"/><text x="105" y="20" text-anchor="middle">18</text>
    <rect x="0" y="30" width="30" height="30" fill="#a89bec" stroke="#6d5bd0"/><text x="15" y="50" text-anchor="middle">2</text>
    <rect x="30" y="30" width="30" height="30" fill="#a89bec" stroke="#6d5bd0"/><text x="45" y="50" text-anchor="middle">5</text>
    <rect x="60" y="30" width="30" height="30" fill="#a89bec" stroke="#6d5bd0"/><text x="75" y="50" text-anchor="middle">101</text>
    <rect x="0" y="60" width="30" height="30" fill="#cc4444" stroke="#6d5bd0"/><text x="15" y="80" text-anchor="middle" fill="#fff">9</text>
    <rect x="0" y="90" width="30" height="30" fill="#6d5bd0" stroke="#1a1822"/><text x="15" y="110" text-anchor="middle" fill="#fff">10</text>
  </g>
  <text x="730" y="248" text-anchor="middle" font-size="11" fill="#1a1822">First row length = LIS length.</text>

  <!-- Bottom: complexity summary -->
  <rect x="40" y="280" width="820" height="205" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="305" font-size="14" font-weight="700" fill="#6d5bd0">Summary: LIS variants and complexities</text>

  <g font-size="11">
    <text x="60" y="335" font-weight="700" fill="#1a1822">Variant</text>
    <text x="400" y="335" font-weight="700" fill="#1a1822">Best complexity</text>
    <text x="620" y="335" font-weight="700" fill="#1a1822">Technique</text>

    <text x="60" y="358">LIS length</text>
    <text x="400" y="358">Θ(n log n)</text>
    <text x="620" y="358">patience sort + binary search</text>

    <text x="60" y="378">LIS sequence</text>
    <text x="400" y="378">Θ(n log n)</text>
    <text x="620" y="378">patience sort + parent pointers</text>

    <text x="60" y="398">Count of LIS</text>
    <text x="400" y="398">Θ(n²) or Θ(n log n) w/ BIT</text>
    <text x="620" y="398">DP + count array</text>

    <text x="60" y="418">Weighted max chain</text>
    <text x="400" y="418">Θ(n log V)</text>
    <text x="620" y="418">segment tree indexed by value</text>

    <text x="60" y="438">Longest common increasing</text>
    <text x="400" y="438">Θ(nm)</text>
    <text x="620" y="438">combined LCS+LIS DP</text>

    <text x="60" y="458">Russian doll envelopes</text>
    <text x="400" y="458">Θ(n log n)</text>
    <text x="620" y="458">sort asc/desc + LIS</text>

    <text x="60" y="478">2D/3D box stacking</text>
    <text x="400" y="478">Θ(n² log n) or better</text>
    <text x="620" y="478">sort + LIS on secondary dim</text>
  </g>
</svg>
