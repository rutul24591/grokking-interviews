<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Pdqsort — Pattern-Defeating Quicksort Decision Flow</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#1a1822">Rust sort_unstable, Go sort (1.19+). Introsort + pattern detection + branchless partition.</text>

  <!-- Entry -->
  <rect x="380" y="75" width="140" height="38" fill="#6d5bd0" rx="6"/>
  <text x="450" y="98" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">sort(range)</text>

  <path d="M450 113 L450 140" stroke="#1a1822" marker-end="url(#pa)"/>

  <!-- Small range check -->
  <polygon points="450,140 560,175 450,210 340,175" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="170" text-anchor="middle" font-size="11" fill="#1a1822">range &lt; 24?</text>
  <text x="450" y="185" text-anchor="middle" font-size="10" fill="#1a1822">(small-array cutoff)</text>

  <path d="M340 175 L180 175" stroke="#1a1822" marker-end="url(#pa)"/>
  <text x="260" y="168" text-anchor="middle" font-size="10" fill="#4caf50" font-weight="700">yes</text>
  <rect x="60" y="155" width="120" height="40" fill="#4caf50" rx="4"/>
  <text x="120" y="178" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">insertion sort</text>

  <path d="M450 210 L450 235" stroke="#1a1822" marker-end="url(#pa)"/>
  <text x="470" y="225" font-size="10" fill="#1a1822">no</text>

  <!-- Pattern check -->
  <polygon points="450,235 580,270 450,305 320,270" fill="#fff" stroke="#6d5bd0" stroke-width="2"/>
  <text x="450" y="265" text-anchor="middle" font-size="11" fill="#1a1822">already sorted?</text>
  <text x="450" y="280" text-anchor="middle" font-size="10" fill="#1a1822">(pattern detection)</text>

  <path d="M580 270 L720 270" stroke="#1a1822" marker-end="url(#pa)"/>
  <text x="645" y="262" text-anchor="middle" font-size="10" fill="#4caf50" font-weight="700">yes → O(n)</text>
  <rect x="720" y="250" width="140" height="40" fill="#4caf50" rx="4"/>
  <text x="790" y="273" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">return</text>

  <path d="M450 305 L450 330" stroke="#1a1822" marker-end="url(#pa)"/>
  <text x="470" y="320" font-size="10" fill="#1a1822">no</text>

  <!-- Depth -->
  <polygon points="450,330 580,365 450,400 320,365" fill="#fff" stroke="#cc4444" stroke-width="2"/>
  <text x="450" y="360" text-anchor="middle" font-size="11" fill="#1a1822">depth &gt; 2⌊log n⌋?</text>
  <text x="450" y="375" text-anchor="middle" font-size="10" fill="#1a1822">(introsort limit)</text>

  <path d="M320 365 L180 365" stroke="#1a1822" marker-end="url(#pa)"/>
  <text x="250" y="358" text-anchor="middle" font-size="10" fill="#cc4444" font-weight="700">yes</text>
  <rect x="60" y="345" width="120" height="40" fill="#cc4444" rx="4"/>
  <text x="120" y="368" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">heap sort</text>

  <path d="M450 400 L450 425" stroke="#1a1822" marker-end="url(#pa)"/>
  <text x="470" y="415" font-size="10" fill="#1a1822">no</text>

  <!-- Partition -->
  <rect x="330" y="425" width="240" height="40" fill="#6d5bd0" rx="6"/>
  <text x="450" y="443" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">ninther pivot + 3-way partition</text>
  <text x="450" y="458" text-anchor="middle" fill="#fff" font-size="10">recurse on both sides</text>

  <!-- Side label -->
  <rect x="600" y="100" width="270" height="110" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="4"/>
  <text x="610" y="120" font-size="12" font-weight="700" fill="#6d5bd0">Bad-partition defense</text>
  <text x="610" y="140" font-size="11" fill="#1a1822">If smaller side &lt; range/8 repeatedly,</text>
  <text x="610" y="156" font-size="11" fill="#1a1822">shuffle pivot candidates to defeat</text>
  <text x="610" y="172" font-size="11" fill="#1a1822">adversarial patterns.</text>
  <text x="610" y="195" font-size="11" fill="#cc4444" font-weight="700">Guarantees O(n log n) in practice.</text>

  <defs><marker id="pa" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#1a1822"/></marker></defs>
</svg>
