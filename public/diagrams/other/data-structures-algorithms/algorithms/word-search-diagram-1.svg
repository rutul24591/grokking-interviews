<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Word Search — DFS on Grid with Backtracking</text>

  <rect x="40" y="60" width="380" height="380" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">Find &quot;ABCCED&quot; in grid</text>
  <g transform="translate(80,110)" font-size="22" font-weight="700">
    <rect x="0" y="0" width="60" height="60" fill="#a89bec" stroke="#1a1822" stroke-width="2"/><text x="30" y="40" text-anchor="middle">A</text>
    <rect x="60" y="0" width="60" height="60" fill="#a89bec" stroke="#1a1822" stroke-width="2"/><text x="90" y="40" text-anchor="middle">B</text>
    <rect x="120" y="0" width="60" height="60" fill="#a89bec" stroke="#1a1822" stroke-width="2"/><text x="150" y="40" text-anchor="middle">C</text>
    <rect x="180" y="0" width="60" height="60" fill="#fff" stroke="#1a1822" stroke-width="2"/><text x="210" y="40" text-anchor="middle">E</text>

    <rect x="0" y="60" width="60" height="60" fill="#fff" stroke="#1a1822" stroke-width="2"/><text x="30" y="100" text-anchor="middle">S</text>
    <rect x="60" y="60" width="60" height="60" fill="#fff" stroke="#1a1822" stroke-width="2"/><text x="90" y="100" text-anchor="middle">F</text>
    <rect x="120" y="60" width="60" height="60" fill="#a89bec" stroke="#1a1822" stroke-width="2"/><text x="150" y="100" text-anchor="middle">C</text>
    <rect x="180" y="60" width="60" height="60" fill="#a89bec" stroke="#1a1822" stroke-width="2"/><text x="210" y="100" text-anchor="middle">E</text>

    <rect x="0" y="120" width="60" height="60" fill="#fff" stroke="#1a1822" stroke-width="2"/><text x="30" y="160" text-anchor="middle">A</text>
    <rect x="60" y="120" width="60" height="60" fill="#fff" stroke="#1a1822" stroke-width="2"/><text x="90" y="160" text-anchor="middle">D</text>
    <rect x="120" y="120" width="60" height="60" fill="#a89bec" stroke="#1a1822" stroke-width="2"/><text x="150" y="160" text-anchor="middle">D</text>
    <rect x="180" y="120" width="60" height="60" fill="#fff" stroke="#1a1822" stroke-width="2"/><text x="210" y="160" text-anchor="middle">E</text>

    <path d="M 30 30 L 90 30 L 150 30 L 150 90 L 150 150 L 90 150" fill="none" stroke="#cc4444" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="60" y="320" font-size="11">Path: A(0,0) → B(0,1) → C(0,2) → C(1,2) → E(1,3) → D(2,2)</text>
  <text x="60" y="340" font-size="11">— wait: ABCCED needs (1,2)C → (2,2)D? Yes adjacent.</text>
  <text x="60" y="370" font-size="11" fill="#4caf50" font-weight="700">Found! 4-directional adjacency, no cell reused.</text>
  <text x="60" y="400" font-size="11">Mark visited on enter; unmark on backtrack so other paths can reuse it.</text>

  <rect x="440" y="60" width="420" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="460" y="85" font-size="13" font-weight="700" fill="#4caf50">DFS skeleton</text>
  <text x="460" y="112" font-size="11" font-family="monospace">dfs(r, c, k):</text>
  <text x="460" y="130" font-size="11" font-family="monospace">  if k == len(word): return true</text>
  <text x="460" y="148" font-size="11" font-family="monospace">  if out_of_bounds || visited[r][c]:</text>
  <text x="460" y="166" font-size="11" font-family="monospace">    return false</text>
  <text x="460" y="184" font-size="11" font-family="monospace">  if grid[r][c] != word[k]:</text>
  <text x="460" y="202" font-size="11" font-family="monospace">    return false</text>
  <text x="460" y="220" font-size="11" font-family="monospace">  visited[r][c] = true</text>
  <text x="460" y="238" font-size="11" font-family="monospace">  found = any 4-direction dfs(r±1/c±1, k+1)</text>
  <text x="460" y="256" font-size="11" font-family="monospace">  visited[r][c] = false</text>

  <rect x="440" y="275" width="420" height="165" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="460" y="300" font-size="13" font-weight="700" fill="#6d5bd0">Complexity</text>
  <text x="460" y="325" font-size="11">Cells: m·n.  Word length: L.</text>
  <text x="460" y="345" font-size="11">Worst case per start cell: 4 · 3^(L−1) (4 dirs first, 3 thereafter).</text>
  <text x="460" y="365" font-size="11" font-family="monospace">Time: O(m · n · 4 · 3^(L−1))</text>
  <text x="460" y="385" font-size="11" font-family="monospace">Space: O(L) recursion + O(m·n) visited</text>
  <text x="460" y="415" font-size="11" fill="#4caf50" font-weight="700">For L ≈ 10 and 10×10 grid: ~6 million ops, instant.</text>
</svg>
