<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">When Greedy Fails — And What to Reach for Instead</text>

  <rect x="40" y="60" width="400" height="205" fill="#fff" stroke="#cc4444" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#cc4444">Fails: greedy-choice violated</text>
  <text x="60" y="110" font-size="11" fill="#1a1822">Coin change {1, 3, 4}, amount 6:</text>
  <text x="60" y="128" font-size="11" fill="#1a1822" font-family="monospace">  greedy: 4+1+1 = 3 coins</text>
  <text x="60" y="146" font-size="11" fill="#1a1822" font-family="monospace">  optimal: 3+3  = 2 coins</text>
  <text x="60" y="170" font-size="11" fill="#1a1822">0/1 knapsack — sub-example above.</text>
  <text x="60" y="190" font-size="11" fill="#1a1822">Longest simple path (NP-hard).</text>
  <text x="60" y="210" font-size="11" fill="#1a1822">Graph coloring with fewest colors.</text>
  <text x="60" y="240" font-size="11" fill="#1a1822" font-weight="700">Fallback: DP, B&amp;B, or approximation.</text>

  <rect x="460" y="60" width="400" height="205" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="480" y="85" font-size="13" font-weight="700" fill="#4caf50">Matroid = greedy guaranteed optimal</text>
  <text x="480" y="110" font-size="11" fill="#1a1822">A matroid (E, I) is a set system</text>
  <text x="480" y="128" font-size="11" fill="#1a1822">where downward closure + exchange</text>
  <text x="480" y="146" font-size="11" fill="#1a1822">property hold. Maximum-weight</text>
  <text x="480" y="164" font-size="11" fill="#1a1822">independent set in a matroid is</text>
  <text x="480" y="182" font-size="11" fill="#1a1822">solved by greedy in polynomial time.</text>
  <text x="480" y="210" font-size="11" fill="#1a1822">MST = graphic matroid.</text>
  <text x="480" y="230" font-size="11" fill="#1a1822">Scheduling = transversal matroid.</text>
  <text x="480" y="250" font-size="11" fill="#6d5bd0" font-weight="700">If you can phrase as matroid: greedy is safe.</text>

  <rect x="40" y="285" width="820" height="190" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="310" font-size="14" font-weight="700" fill="#6d5bd0">Algorithm selection checklist</text>
  <text x="60" y="335" font-size="11" fill="#1a1822">1. Can I state a greedy rule? If yes, attempt an exchange-argument proof.</text>
  <text x="60" y="355" font-size="11" fill="#1a1822">2. Find a small counter-example before shipping. If greedy loses on n ≤ 10 → stop.</text>
  <text x="60" y="375" font-size="11" fill="#1a1822">3. If greedy fails: check for a matroid formulation — maybe a different rule works.</text>
  <text x="60" y="395" font-size="11" fill="#1a1822">4. Otherwise: DP (optimal substructure but not greedy-choice), or B&amp;B / approximation.</text>
  <text x="60" y="415" font-size="11" fill="#1a1822">5. For online problems: competitive ratio analysis — compare greedy to offline optimum.</text>
  <text x="60" y="445" font-size="11" fill="#4caf50" font-weight="700">Greedy wins when divisibility, matroid, or clear exchange — else use DP.</text>
</svg>
