<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Interpolation Search — Guess Position from Value</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">target = 93 in uniform array [10, 20, 30, 40, 50, 60, 70, 80, 85, 93, 100]. One probe finds it.</text>

  <!-- Array with values -->
  <g transform="translate(60,90)" font-size="11" font-family="monospace">
    <text x="30" y="-5" text-anchor="middle">i=0</text>
    <text x="102" y="-5" text-anchor="middle">1</text>
    <text x="174" y="-5" text-anchor="middle">2</text>
    <text x="246" y="-5" text-anchor="middle">3</text>
    <text x="318" y="-5" text-anchor="middle">4</text>
    <text x="390" y="-5" text-anchor="middle">5</text>
    <text x="462" y="-5" text-anchor="middle">6</text>
    <text x="534" y="-5" text-anchor="middle">7</text>
    <text x="606" y="-5" text-anchor="middle">8</text>
    <text x="678" y="-5" text-anchor="middle">9</text>
    <text x="750" y="-5" text-anchor="middle">10</text>
  </g>
  <g transform="translate(60,95)" font-size="13">
    <rect x="0" y="0" width="60" height="34" fill="#a89bec"/><text x="30" y="22" text-anchor="middle">10</text>
    <rect x="72" y="0" width="60" height="34" fill="#a89bec"/><text x="102" y="22" text-anchor="middle">20</text>
    <rect x="144" y="0" width="60" height="34" fill="#a89bec"/><text x="174" y="22" text-anchor="middle">30</text>
    <rect x="216" y="0" width="60" height="34" fill="#a89bec"/><text x="246" y="22" text-anchor="middle">40</text>
    <rect x="288" y="0" width="60" height="34" fill="#a89bec"/><text x="318" y="22" text-anchor="middle">50</text>
    <rect x="360" y="0" width="60" height="34" fill="#a89bec"/><text x="390" y="22" text-anchor="middle">60</text>
    <rect x="432" y="0" width="60" height="34" fill="#a89bec"/><text x="462" y="22" text-anchor="middle">70</text>
    <rect x="504" y="0" width="60" height="34" fill="#a89bec"/><text x="534" y="22" text-anchor="middle">80</text>
    <rect x="576" y="0" width="60" height="34" fill="#a89bec"/><text x="606" y="22" text-anchor="middle">85</text>
    <rect x="648" y="0" width="60" height="34" fill="#4caf50"/><text x="678" y="22" text-anchor="middle" fill="#fff" font-weight="700">93 ✓</text>
    <rect x="720" y="0" width="60" height="34" fill="#a89bec"/><text x="750" y="22" text-anchor="middle">100</text>
  </g>

  <!-- Computation -->
  <rect x="60" y="155" width="780" height="130" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="80" y="180" font-size="14" font-weight="700" fill="#6d5bd0">Probe formula</text>
  <text x="80" y="203" font-size="12" fill="#1a1822" font-family="monospace">pos = lo + (target − a[lo]) × (hi − lo) / (a[hi] − a[lo])</text>
  <text x="80" y="225" font-size="12" fill="#1a1822" font-family="monospace">    = 0  + (93 − 10)      × (10 − 0)  / (100 − 10)</text>
  <text x="80" y="247" font-size="12" fill="#1a1822" font-family="monospace">    = 83 × 10 / 90 = 9.22 → round down → 9</text>
  <text x="80" y="272" font-size="12" fill="#4caf50" font-weight="700">a[9] = 93 = target → return 9 (one probe!)</text>

  <!-- Comparison vs binary -->
  <rect x="60" y="300" width="780" height="185" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="80" y="323" font-size="14" font-weight="700" fill="#6d5bd0">Binary search on same array would take log₂(11) ≈ 4 probes</text>
  <text x="80" y="348" font-size="12" fill="#1a1822">mid=5 (60 &lt; 93) → lo=6; mid=8 (85 &lt; 93) → lo=9; mid=9 (93 ==) → found in 3 probes.</text>

  <text x="80" y="383" font-size="14" font-weight="700" fill="#6d5bd0">Complexity</text>
  <text x="80" y="405" font-size="12" fill="#1a1822"><tspan font-weight="700">Uniform distribution:</tspan> Θ(log log n) expected. For n=10⁹, ~5 probes.</text>
  <text x="80" y="425" font-size="12" fill="#cc4444"><tspan font-weight="700">Skewed distribution:</tspan> Θ(n) worst case. No guarantee without a fallback.</text>
  <text x="80" y="448" font-size="11" fill="#1a1822" font-style="italic">Defensive implementation: cap probe count at log n; fall back to binary search. Keeps Θ(log log n)</text>
  <text x="80" y="465" font-size="11" fill="#1a1822" font-style="italic">best case while bounding worst case at Θ(log n). Standard trick from introsort&rsquo;s playbook.</text>
</svg>
