<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Knapsack Family — Problem Map</text>

  <rect x="340" y="70" width="220" height="60" fill="#6d5bd0" rx="6"/>
  <text x="450" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Knapsack problem family</text>
  <text x="450" y="115" text-anchor="middle" font-size="11" fill="#fff">select subset under capacity</text>

  <!-- Branches -->
  <line x1="380" y1="130" x2="160" y2="175" stroke="#1a1822"/>
  <line x1="420" y1="130" x2="330" y2="175" stroke="#1a1822"/>
  <line x1="480" y1="130" x2="570" y2="175" stroke="#1a1822"/>
  <line x1="520" y1="130" x2="740" y2="175" stroke="#1a1822"/>

  <!-- Four children -->
  <rect x="60" y="175" width="200" height="110" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="160" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">0/1</text>
  <text x="160" y="218" text-anchor="middle" font-size="10">max value, each ≤ 1</text>
  <text x="160" y="235" text-anchor="middle" font-size="10" font-family="monospace">O(nW)</text>
  <text x="160" y="258" text-anchor="middle" font-size="10" fill="#4caf50">cargo, budgeting,</text>
  <text x="160" y="272" text-anchor="middle" font-size="10" fill="#4caf50">VM placement</text>

  <rect x="280" y="175" width="200" height="110" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="380" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Unbounded</text>
  <text x="380" y="218" text-anchor="middle" font-size="10">unlimited copies</text>
  <text x="380" y="235" text-anchor="middle" font-size="10" font-family="monospace">O(nW)</text>
  <text x="380" y="258" text-anchor="middle" font-size="10" fill="#4caf50">coin change,</text>
  <text x="380" y="272" text-anchor="middle" font-size="10" fill="#4caf50">cutting stock</text>

  <rect x="500" y="175" width="200" height="110" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="600" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Subset sum</text>
  <text x="600" y="218" text-anchor="middle" font-size="10">exact target</text>
  <text x="600" y="235" text-anchor="middle" font-size="10" font-family="monospace">O(nS)</text>
  <text x="600" y="258" text-anchor="middle" font-size="10" fill="#4caf50">partition,</text>
  <text x="600" y="272" text-anchor="middle" font-size="10" fill="#4caf50">expense split</text>

  <rect x="720" y="175" width="160" height="110" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="800" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Multi-dim</text>
  <text x="800" y="218" text-anchor="middle" font-size="10">k constraints</text>
  <text x="800" y="235" text-anchor="middle" font-size="10" font-family="monospace">O(n·∏Wᵢ)</text>
  <text x="800" y="258" text-anchor="middle" font-size="10" fill="#4caf50">bin packing</text>
  <text x="800" y="272" text-anchor="middle" font-size="10" fill="#4caf50">w/ memory+CPU</text>

  <!-- When DP fails -->
  <rect x="40" y="310" width="820" height="175" fill="#fff" stroke="#cc4444" stroke-width="2" rx="6"/>
  <text x="60" y="335" font-size="14" font-weight="700" fill="#cc4444">When DP fails — go elsewhere</text>
  <text x="60" y="360" font-size="12" fill="#1a1822"><tspan font-weight="700">W too large (W = 2⁶⁴ range):</tspan> DP has 2⁶⁴ states → infeasible.</text>
  <text x="60" y="378" font-size="11" fill="#1a1822">  → Meet-in-the-middle: O(n · 2^(n/2)) for n ≤ 40.</text>
  <text x="60" y="395" font-size="11" fill="#1a1822">  → FPTAS: scale values, get (1−ε) approximation in O(n²/ε).</text>
  <text x="60" y="418" font-size="12" fill="#1a1822"><tspan font-weight="700">Many constraints (k ≥ 3):</tspan> O(n · ∏Wᵢ) DP blows up.</text>
  <text x="60" y="435" font-size="11" fill="#1a1822">  → Integer linear programming (ILP) via Gurobi/CPLEX.</text>
  <text x="60" y="458" font-size="12" fill="#1a1822"><tspan font-weight="700">Fractional items allowed:</tspan> greedy O(n log n) by value/weight ratio — optimal for LP relaxation.</text>
  <text x="60" y="475" font-size="11" fill="#1a1822">  → Not the 0/1 answer! Use only if problem explicitly permits fractional items.</text>
</svg>
