<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Linear vs Binary — Where the Crossover Actually Is</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">Walltime on cache-resident sorted int arrays. Asymptotics mislead for small n.</text>

  <!-- Axes -->
  <line x1="100" y1="400" x2="820" y2="400" stroke="#1a1822" stroke-width="2"/>
  <line x1="100" y1="400" x2="100" y2="90" stroke="#1a1822" stroke-width="2"/>

  <!-- x labels -->
  <text x="140" y="420" text-anchor="middle" font-size="11" fill="#1a1822">8</text>
  <text x="240" y="420" text-anchor="middle" font-size="11" fill="#1a1822">32</text>
  <text x="340" y="420" text-anchor="middle" font-size="11" fill="#1a1822">64</text>
  <text x="440" y="420" text-anchor="middle" font-size="11" fill="#1a1822">256</text>
  <text x="540" y="420" text-anchor="middle" font-size="11" fill="#1a1822">1K</text>
  <text x="640" y="420" text-anchor="middle" font-size="11" fill="#1a1822">10K</text>
  <text x="740" y="420" text-anchor="middle" font-size="11" fill="#1a1822">100K</text>
  <text x="460" y="450" text-anchor="middle" font-size="12" fill="#1a1822">n (array size)</text>

  <!-- y labels -->
  <text x="90" y="400" text-anchor="end" font-size="11" fill="#1a1822">1ns</text>
  <text x="90" y="310" text-anchor="end" font-size="11" fill="#1a1822">10ns</text>
  <text x="90" y="220" text-anchor="end" font-size="11" fill="#1a1822">100ns</text>
  <text x="90" y="130" text-anchor="end" font-size="11" fill="#1a1822">1µs</text>

  <!-- Grid -->
  <line x1="100" y1="310" x2="820" y2="310" stroke="#1a1822" stroke-dasharray="2" opacity="0.3"/>
  <line x1="100" y1="220" x2="820" y2="220" stroke="#1a1822" stroke-dasharray="2" opacity="0.3"/>
  <line x1="100" y1="130" x2="820" y2="130" stroke="#1a1822" stroke-dasharray="2" opacity="0.3"/>
  <line x1="340" y1="400" x2="340" y2="90" stroke="#4caf50" stroke-dasharray="3" opacity="0.4"/>
  <text x="346" y="100" font-size="10" fill="#4caf50" font-weight="700">crossover ~64</text>

  <!-- Linear (SIMD) -->
  <path d="M140 390 L240 370 L340 340 L440 290 L540 240 L640 180 L740 120" stroke="#6d5bd0" stroke-width="3" fill="none"/>
  <circle cx="140" cy="390" r="4" fill="#6d5bd0"/>
  <circle cx="240" cy="370" r="4" fill="#6d5bd0"/>
  <circle cx="340" cy="340" r="4" fill="#6d5bd0"/>
  <circle cx="440" cy="290" r="4" fill="#6d5bd0"/>
  <circle cx="540" cy="240" r="4" fill="#6d5bd0"/>
  <circle cx="640" cy="180" r="4" fill="#6d5bd0"/>
  <circle cx="740" cy="120" r="4" fill="#6d5bd0"/>
  <text x="755" y="123" font-size="12" fill="#6d5bd0" font-weight="700">Linear (SIMD)</text>

  <!-- Binary -->
  <path d="M140 355 L240 340 L340 325 L440 305 L540 285 L640 260 L740 235" stroke="#cc4444" stroke-width="3" fill="none"/>
  <circle cx="140" cy="355" r="4" fill="#cc4444"/>
  <circle cx="240" cy="340" r="4" fill="#cc4444"/>
  <circle cx="340" cy="325" r="4" fill="#cc4444"/>
  <circle cx="440" cy="305" r="4" fill="#cc4444"/>
  <circle cx="540" cy="285" r="4" fill="#cc4444"/>
  <circle cx="640" cy="260" r="4" fill="#cc4444"/>
  <circle cx="740" cy="235" r="4" fill="#cc4444"/>
  <text x="755" y="238" font-size="12" fill="#cc4444" font-weight="700">Binary</text>

  <!-- Annotations -->
  <rect x="130" y="75" width="200" height="36" fill="#fff" stroke="#6d5bd0" rx="4"/>
  <text x="140" y="90" font-size="10" fill="#1a1822">Linear wins: branch pred +</text>
  <text x="140" y="103" font-size="10" fill="#1a1822">prefetcher + SIMD.</text>

  <rect x="580" y="75" width="220" height="36" fill="#fff" stroke="#cc4444" rx="4"/>
  <text x="590" y="90" font-size="10" fill="#1a1822">Binary wins: log n &lt; n·(SIMD throughput).</text>
  <text x="590" y="103" font-size="10" fill="#1a1822">Cache misses kill linear above L2.</text>

  <rect x="40" y="455" width="820" height="35" fill="#fff" stroke="#6d5bd0" stroke-width="1" rx="4"/>
  <text x="60" y="477" font-size="11" fill="#1a1822">Takeaway: for sorted data up to ~64 elements, prefer linear + SIMD. Beyond, build an index or use binary.</text>
</svg>
