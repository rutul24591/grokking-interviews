<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Exponential Search — Two-Phase Control Flow</text>

  <!-- Phase 1 -->
  <rect x="40" y="70" width="380" height="195" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="230" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Phase 1: Gallop (unbounded probing)</text>
  <text x="60" y="120" font-size="12" fill="#1a1822" font-family="monospace">if a[0] == t: return 0;</text>
  <text x="60" y="138" font-size="12" fill="#1a1822" font-family="monospace">i = 1;</text>
  <text x="60" y="156" font-size="12" fill="#1a1822" font-family="monospace">while i &lt; n and a[i] &lt;= t:</text>
  <text x="60" y="174" font-size="12" fill="#1a1822" font-family="monospace">    i *= 2;</text>
  <text x="60" y="205" font-size="11" fill="#1a1822">Invariant after loop: a[i/2] ≤ t and</text>
  <text x="60" y="222" font-size="11" fill="#1a1822">(i ≥ n or a[i] &gt; t).</text>
  <text x="60" y="250" font-size="11" font-weight="700" fill="#4caf50">Cost: ⌈log₂(p+1)⌉ probes</text>

  <!-- Phase 2 -->
  <rect x="480" y="70" width="380" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="670" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">Phase 2: Bounded binary search</text>
  <text x="500" y="120" font-size="12" fill="#1a1822" font-family="monospace">lo = i / 2;</text>
  <text x="500" y="138" font-size="12" fill="#1a1822" font-family="monospace">hi = min(i, n);</text>
  <text x="500" y="156" font-size="12" fill="#1a1822" font-family="monospace">return binary_search(a, lo, hi, t);</text>
  <text x="500" y="205" font-size="11" fill="#1a1822">Range size ≤ i/2 ≤ p, so binary</text>
  <text x="500" y="222" font-size="11" fill="#1a1822">search costs log₂(p) comparisons.</text>
  <text x="500" y="250" font-size="11" font-weight="700" fill="#4caf50">Cost: log₂(p) comparisons</text>

  <!-- Arrow -->
  <line x1="420" y1="160" x2="480" y2="160" stroke="#1a1822" stroke-width="2" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L8,5 L0,10 z" fill="#1a1822"/></marker></defs>

  <!-- Complexity comparison -->
  <rect x="40" y="285" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="310" font-size="14" font-weight="700" fill="#6d5bd0">Position-sensitive complexity</text>

  <g font-size="11">
    <text x="60" y="338" fill="#1a1822">Target at p=1:</text>
    <rect x="200" y="325" width="30" height="16" fill="#4caf50"/>
    <text x="240" y="338" fill="#1a1822">exponential: 2 probes · binary: ~log₂ n probes (say 20 for n=10⁶)</text>

    <text x="60" y="365" fill="#1a1822">Target at p=1000:</text>
    <rect x="200" y="352" width="60" height="16" fill="#6d5bd0"/>
    <text x="270" y="365" fill="#1a1822">exponential: ~20 probes · binary: ~20 probes (roughly equal)</text>

    <text x="60" y="392" fill="#1a1822">Target at p=n-1:</text>
    <rect x="200" y="379" width="120" height="16" fill="#cc4444"/>
    <text x="330" y="392" fill="#1a1822">exponential: ~40 probes (2 log n) · binary: ~20 probes (wins)</text>

    <text x="60" y="419" fill="#1a1822">n unknown / stream:</text>
    <rect x="200" y="406" width="60" height="16" fill="#4caf50"/>
    <text x="270" y="419" fill="#1a1822">exponential: only option. Binary requires known n.</text>
  </g>

  <text x="60" y="458" font-size="12" font-weight="700" fill="#cc4444">Rule of thumb</text>
  <text x="60" y="477" font-size="11" fill="#1a1822">Default to binary for known-size arrays with uniform targets. Use exponential for streams, unknown n, or skewed-near-start queries.</text>
</svg>
