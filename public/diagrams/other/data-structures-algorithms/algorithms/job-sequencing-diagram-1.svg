<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Job Sequencing with Deadlines — Greedy by Profit</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">Each job takes 1 unit. Earn profit only if finished by its deadline. Maximize total profit.</text>

  <!-- Input table -->
  <rect x="40" y="80" width="380" height="170" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="105" font-size="13" font-weight="700" fill="#6d5bd0">Jobs (sorted by profit desc)</text>
  <g font-size="11" font-family="monospace">
    <text x="60" y="130">id   deadline   profit</text>
    <text x="60" y="150">A    2          100</text>
    <text x="60" y="168">B    1          50</text>
    <text x="60" y="186">C    2          40</text>
    <text x="60" y="204">D    1          30</text>
    <text x="60" y="222">E    3          20</text>
  </g>

  <!-- Slots -->
  <rect x="440" y="80" width="420" height="170" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="460" y="105" font-size="13" font-weight="700" fill="#4caf50">Slot assignment (1-indexed time slots)</text>
  <g transform="translate(460,125)">
    <rect x="0" y="0" width="80" height="40" fill="#a89bec" stroke="#6d5bd0"/><text x="40" y="26" text-anchor="middle" font-weight="700">B</text>
    <rect x="80" y="0" width="80" height="40" fill="#a89bec" stroke="#6d5bd0"/><text x="120" y="26" text-anchor="middle" font-weight="700">A</text>
    <rect x="160" y="0" width="80" height="40" fill="#a89bec" stroke="#6d5bd0"/><text x="200" y="26" text-anchor="middle" font-weight="700">E</text>
    <text x="40" y="58" text-anchor="middle" font-size="10">slot 1</text>
    <text x="120" y="58" text-anchor="middle" font-size="10">slot 2</text>
    <text x="200" y="58" text-anchor="middle" font-size="10">slot 3</text>
  </g>
  <text x="460" y="210" font-size="11" fill="#1a1822">A → latest free slot ≤ 2 = slot 2.</text>
  <text x="460" y="228" font-size="11" fill="#1a1822">B → slot 1. C, D blocked. E → slot 3.</text>

  <!-- Algorithm -->
  <rect x="40" y="270" width="820" height="205" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="295" font-size="13" font-weight="700" fill="#6d5bd0">Algorithm</text>
  <text x="60" y="320" font-size="11" fill="#1a1822" font-family="monospace">sort jobs by profit descending</text>
  <text x="60" y="338" font-size="11" fill="#1a1822" font-family="monospace">slots = [free] * max_deadline</text>
  <text x="60" y="356" font-size="11" fill="#1a1822" font-family="monospace">for each job in sorted order:</text>
  <text x="60" y="374" font-size="11" fill="#1a1822" font-family="monospace">    for t = job.deadline down to 1:</text>
  <text x="60" y="392" font-size="11" fill="#1a1822" font-family="monospace">        if slots[t] is free:</text>
  <text x="60" y="410" font-size="11" fill="#1a1822" font-family="monospace">            assign job to slot t; break</text>
  <text x="60" y="437" font-size="11" fill="#1a1822">Total profit: 100 + 50 + 20 = 170. Naive scan O(n·d). DSU speeds up to O(n α(n)).</text>
  <text x="60" y="458" font-size="11" fill="#4caf50" font-weight="700">Sort once, assign greedily to latest free slot ≤ deadline.</text>
</svg>
