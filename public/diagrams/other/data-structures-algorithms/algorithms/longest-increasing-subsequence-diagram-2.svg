<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">LIS — O(n²) DP vs O(n log n) Patience Sort</text>

  <!-- O(n²) panel -->
  <rect x="40" y="70" width="400" height="220" fill="#fff" stroke="#cc4444" stroke-width="2" rx="6"/>
  <text x="240" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#cc4444">O(n²) DP</text>
  <text x="60" y="120" font-size="11" fill="#1a1822" font-family="monospace">dp = [1] * n</text>
  <text x="60" y="138" font-size="11" fill="#1a1822" font-family="monospace">for i in 0..n:</text>
  <text x="60" y="156" font-size="11" fill="#1a1822" font-family="monospace">    for j in 0..i:</text>
  <text x="60" y="174" font-size="11" fill="#1a1822" font-family="monospace">        if a[j] &lt; a[i]:</text>
  <text x="60" y="192" font-size="11" fill="#1a1822" font-family="monospace">            dp[i] = max(dp[i], dp[j]+1)</text>
  <text x="60" y="210" font-size="11" fill="#1a1822" font-family="monospace">return max(dp)</text>
  <text x="60" y="245" font-size="11" fill="#1a1822">Inner loop scans all j &lt; i for the max.</text>
  <text x="60" y="262" font-size="11" fill="#1a1822">n=10⁵ → 10¹⁰ ops → ~100 s.</text>
  <text x="60" y="280" font-size="11" fill="#4caf50" font-weight="700">✓ easy to write, easy to modify</text>

  <!-- O(n log n) panel -->
  <rect x="460" y="70" width="400" height="220" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="660" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">O(n log n) Patience Sort</text>
  <text x="480" y="120" font-size="11" fill="#1a1822" font-family="monospace">tails = []</text>
  <text x="480" y="138" font-size="11" fill="#1a1822" font-family="monospace">for x in a:</text>
  <text x="480" y="156" font-size="11" fill="#1a1822" font-family="monospace">    k = bisect_left(tails, x)</text>
  <text x="480" y="174" font-size="11" fill="#1a1822" font-family="monospace">    if k == len(tails):</text>
  <text x="480" y="192" font-size="11" fill="#1a1822" font-family="monospace">        tails.append(x)</text>
  <text x="480" y="210" font-size="11" fill="#1a1822" font-family="monospace">    else:</text>
  <text x="480" y="228" font-size="11" fill="#1a1822" font-family="monospace">        tails[k] = x</text>
  <text x="480" y="246" font-size="11" fill="#1a1822" font-family="monospace">return len(tails)</text>
  <text x="480" y="275" font-size="11" fill="#4caf50" font-weight="700">✓ n=10⁵ → ~10 ms (10⁴× faster)</text>

  <!-- Strict vs non-strict -->
  <rect x="40" y="310" width="820" height="175" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="335" font-size="14" font-weight="700" fill="#6d5bd0">Strict vs non-strict LIS — one bisect function call differs</text>

  <text x="60" y="365" font-size="11" fill="#1a1822"><tspan font-weight="700" fill="#6d5bd0">Strictly increasing:</tspan> a &lt; b required</text>
  <text x="60" y="383" font-size="11" fill="#1a1822" font-family="monospace">k = bisect_left(tails, x)   # lower_bound: first ≥ x</text>
  <text x="60" y="401" font-size="11" fill="#1a1822">  LIS of [3, 3, 3] = 1 (can’t reuse equal values)</text>

  <text x="60" y="432" font-size="11" fill="#1a1822"><tspan font-weight="700" fill="#6d5bd0">Non-strictly increasing:</tspan> a ≤ b allowed</text>
  <text x="60" y="450" font-size="11" fill="#1a1822" font-family="monospace">k = bisect_right(tails, x)  # upper_bound: first &gt; x</text>
  <text x="60" y="468" font-size="11" fill="#1a1822">  LIS of [3, 3, 3] = 3 (consecutive equals form a non-decreasing chain)</text>
</svg>
