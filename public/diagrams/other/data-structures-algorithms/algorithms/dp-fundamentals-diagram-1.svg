<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Overlapping Subproblems — Why Memoization Pays Off</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">fib(5) recursion tree. Nodes in red are recomputed; memoization caches them.</text>

  <!-- Tree: fib(5) -->
  <g font-size="11">
    <!-- Level 0 -->
    <circle cx="450" cy="95" r="20" fill="#6d5bd0"/><text x="450" y="99" text-anchor="middle" fill="#fff" font-weight="700">f(5)</text>

    <!-- Level 1 -->
    <line x1="450" y1="115" x2="320" y2="155" stroke="#1a1822"/>
    <line x1="450" y1="115" x2="580" y2="155" stroke="#1a1822"/>
    <circle cx="320" cy="175" r="20" fill="#6d5bd0"/><text x="320" y="179" text-anchor="middle" fill="#fff" font-weight="700">f(4)</text>
    <circle cx="580" cy="175" r="20" fill="#cc4444"/><text x="580" y="179" text-anchor="middle" fill="#fff" font-weight="700">f(3)</text>

    <!-- Level 2 -->
    <line x1="320" y1="195" x2="230" y2="235" stroke="#1a1822"/>
    <line x1="320" y1="195" x2="410" y2="235" stroke="#1a1822"/>
    <line x1="580" y1="195" x2="510" y2="235" stroke="#1a1822"/>
    <line x1="580" y1="195" x2="650" y2="235" stroke="#1a1822"/>
    <circle cx="230" cy="255" r="20" fill="#cc4444"/><text x="230" y="259" text-anchor="middle" fill="#fff" font-weight="700">f(3)</text>
    <circle cx="410" cy="255" r="20" fill="#cc4444"/><text x="410" y="259" text-anchor="middle" fill="#fff" font-weight="700">f(2)</text>
    <circle cx="510" cy="255" r="20" fill="#cc4444"/><text x="510" y="259" text-anchor="middle" fill="#fff" font-weight="700">f(2)</text>
    <circle cx="650" cy="255" r="20" fill="#a89bec"/><text x="650" y="259" text-anchor="middle" font-weight="700">f(1)</text>

    <!-- Level 3 (partial) -->
    <line x1="230" y1="275" x2="170" y2="315" stroke="#1a1822"/>
    <line x1="230" y1="275" x2="290" y2="315" stroke="#1a1822"/>
    <line x1="410" y1="275" x2="380" y2="315" stroke="#1a1822"/>
    <line x1="410" y1="275" x2="440" y2="315" stroke="#1a1822"/>
    <line x1="510" y1="275" x2="480" y2="315" stroke="#1a1822"/>
    <line x1="510" y1="275" x2="540" y2="315" stroke="#1a1822"/>
    <circle cx="170" cy="335" r="18" fill="#cc4444"/><text x="170" y="339" text-anchor="middle" fill="#fff" font-weight="700">f(2)</text>
    <circle cx="290" cy="335" r="18" fill="#a89bec"/><text x="290" y="339" text-anchor="middle" font-weight="700">f(1)</text>
    <circle cx="380" cy="335" r="18" fill="#a89bec"/><text x="380" y="339" text-anchor="middle" font-weight="700">f(1)</text>
    <circle cx="440" cy="335" r="18" fill="#a89bec"/><text x="440" y="339" text-anchor="middle" font-weight="700">f(0)</text>
    <circle cx="480" cy="335" r="18" fill="#a89bec"/><text x="480" y="339" text-anchor="middle" font-weight="700">f(1)</text>
    <circle cx="540" cy="335" r="18" fill="#a89bec"/><text x="540" y="339" text-anchor="middle" font-weight="700">f(0)</text>

    <line x1="170" y1="353" x2="140" y2="380" stroke="#1a1822"/>
    <line x1="170" y1="353" x2="200" y2="380" stroke="#1a1822"/>
    <circle cx="140" cy="393" r="14" fill="#a89bec"/><text x="140" y="397" text-anchor="middle" font-size="10" font-weight="700">f(1)</text>
    <circle cx="200" cy="393" r="14" fill="#a89bec"/><text x="200" y="397" text-anchor="middle" font-size="10" font-weight="700">f(0)</text>
  </g>

  <!-- Legend & analysis -->
  <rect x="40" y="420" width="820" height="65" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <circle cx="60" cy="438" r="8" fill="#cc4444"/>
  <text x="76" y="442" font-size="11" fill="#1a1822">= recomputed subproblem (f(3) ×2, f(2) ×3) — memoization eliminates these.</text>
  <text x="60" y="463" font-size="11" fill="#1a1822"><tspan font-weight="700">Naive:</tspan> O(φⁿ) ≈ O(1.618ⁿ) calls. For n=50 → ~2 billion calls.</text>
  <text x="60" y="479" font-size="11" fill="#4caf50" font-weight="700">Memoized: O(n) unique states × O(1) transition = O(n) time, O(n) space. For n=50 → 50 calls.</text>
</svg>
