<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">From Selection Sort to Heapsort to Tournament Trees</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#1a1822">Same outer loop (n extract-min steps). Progressively better inner structure.</text>

  <!-- Panel 1: linear scan -->
  <rect x="30" y="80" width="270" height="380" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="165" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">Selection Sort</text>
  <text x="165" y="125" text-anchor="middle" font-size="12" fill="#1a1822">Inner: linear scan, O(n)</text>
  <text x="50" y="155" font-size="12" fill="#1a1822">find-min: scan 8 cells</text>
  <g transform="translate(50,170)">
    <rect x="0" y="0" width="30" height="30" fill="#a89bec"/><text x="15" y="20" text-anchor="middle" font-size="11">8</text>
    <rect x="30" y="0" width="30" height="30" fill="#a89bec"/><text x="45" y="20" text-anchor="middle" font-size="11">3</text>
    <rect x="60" y="0" width="30" height="30" fill="#a89bec"/><text x="75" y="20" text-anchor="middle" font-size="11">5</text>
    <rect x="90" y="0" width="30" height="30" fill="#a89bec"/><text x="105" y="20" text-anchor="middle" font-size="11">1</text>
    <rect x="120" y="0" width="30" height="30" fill="#cc4444"/><text x="135" y="20" text-anchor="middle" fill="#fff" font-weight="700" font-size="11">0</text>
    <rect x="150" y="0" width="30" height="30" fill="#a89bec"/><text x="165" y="20" text-anchor="middle" font-size="11">7</text>
    <rect x="180" y="0" width="30" height="30" fill="#a89bec"/><text x="195" y="20" text-anchor="middle" font-size="11">4</text>
    <rect x="210" y="0" width="30" height="30" fill="#a89bec"/><text x="225" y="20" text-anchor="middle" font-size="11">2</text>
  </g>
  <text x="50" y="230" font-size="12" fill="#1a1822">Total: n passes × O(n) = O(n²)</text>
  <text x="50" y="250" font-size="12" fill="#1a1822">Swaps: n−1 (minimum)</text>
  <text x="50" y="280" font-size="12" fill="#1a1822" font-weight="700">Pros</text>
  <text x="50" y="298" font-size="11" fill="#1a1822">• Minimum swaps — best for flash</text>
  <text x="50" y="315" font-size="11" fill="#1a1822">• Simple inner loop</text>
  <text x="50" y="332" font-size="11" fill="#1a1822">• In-place, O(1) space</text>
  <text x="50" y="360" font-size="12" fill="#1a1822" font-weight="700">Cons</text>
  <text x="50" y="378" font-size="11" fill="#cc4444">• O(n²) even on sorted input</text>
  <text x="50" y="395" font-size="11" fill="#cc4444">• Not stable</text>
  <text x="50" y="412" font-size="11" fill="#cc4444">• Not adaptive</text>

  <!-- Panel 2: heap extract -->
  <rect x="315" y="80" width="270" height="380" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="450" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">Heapsort</text>
  <text x="450" y="125" text-anchor="middle" font-size="12" fill="#1a1822">Inner: heap extract-max, O(log n)</text>
  <g transform="translate(335,155)">
    <circle cx="115" cy="20" r="16" fill="#cc4444"/><text x="115" y="25" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">8</text>
    <circle cx="65" cy="70" r="16" fill="#a89bec"/><text x="65" y="75" text-anchor="middle" font-size="12">7</text>
    <circle cx="165" cy="70" r="16" fill="#a89bec"/><text x="165" y="75" text-anchor="middle" font-size="12">5</text>
    <circle cx="30" cy="115" r="12" fill="#a89bec"/><text x="30" y="119" text-anchor="middle" font-size="10">4</text>
    <circle cx="100" cy="115" r="12" fill="#a89bec"/><text x="100" y="119" text-anchor="middle" font-size="10">3</text>
    <circle cx="140" cy="115" r="12" fill="#a89bec"/><text x="140" y="119" text-anchor="middle" font-size="10">2</text>
    <circle cx="200" cy="115" r="12" fill="#a89bec"/><text x="200" y="119" text-anchor="middle" font-size="10">1</text>
    <line x1="115" y1="36" x2="65" y2="54" stroke="#1a1822"/>
    <line x1="115" y1="36" x2="165" y2="54" stroke="#1a1822"/>
    <line x1="65" y1="86" x2="30" y2="103" stroke="#1a1822"/>
    <line x1="65" y1="86" x2="100" y2="103" stroke="#1a1822"/>
    <line x1="165" y1="86" x2="140" y2="103" stroke="#1a1822"/>
    <line x1="165" y1="86" x2="200" y2="103" stroke="#1a1822"/>
  </g>
  <text x="335" y="300" font-size="12" fill="#1a1822">Extract-max → bubble down</text>
  <text x="335" y="318" font-size="12" fill="#1a1822">Total: n × O(log n) = O(n log n)</text>
  <text x="335" y="350" font-size="12" fill="#1a1822" font-weight="700">Key win</text>
  <text x="335" y="368" font-size="11" fill="#4caf50">• Worst-case O(n log n)</text>
  <text x="335" y="385" font-size="11" fill="#4caf50">• Still in-place, O(1) space</text>
  <text x="335" y="402" font-size="11" fill="#4caf50">• Selection-sort structure preserved</text>
  <text x="335" y="430" font-size="11" fill="#1a1822">Williams 1964 — explicit framing:</text>
  <text x="335" y="445" font-size="11" fill="#1a1822" font-style="italic">heap replaces linear scan.</text>

  <!-- Panel 3: tournament -->
  <rect x="600" y="80" width="270" height="380" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="735" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">Tournament Tree</text>
  <text x="735" y="125" text-anchor="middle" font-size="12" fill="#1a1822">Inner: replay path, O(log n)</text>
  <g transform="translate(620,150)">
    <circle cx="115" cy="10" r="16" fill="#cc4444"/><text x="115" y="15" text-anchor="middle" fill="#fff" font-weight="700" font-size="12">1</text>
    <circle cx="55" cy="55" r="14" fill="#a89bec"/><text x="55" y="60" text-anchor="middle" font-size="11">3</text>
    <circle cx="175" cy="55" r="14" fill="#a89bec"/><text x="175" y="60" text-anchor="middle" font-size="11">1</text>
    <rect x="10" y="95" width="28" height="24" fill="#a89bec"/><text x="24" y="113" text-anchor="middle" font-size="11">3</text>
    <rect x="60" y="95" width="28" height="24" fill="#a89bec"/><text x="74" y="113" text-anchor="middle" font-size="11">8</text>
    <rect x="130" y="95" width="28" height="24" fill="#a89bec"/><text x="144" y="113" text-anchor="middle" font-size="11">1</text>
    <rect x="180" y="95" width="28" height="24" fill="#a89bec"/><text x="194" y="113" text-anchor="middle" font-size="11">5</text>
    <line x1="115" y1="26" x2="55" y2="41" stroke="#1a1822"/>
    <line x1="115" y1="26" x2="175" y2="41" stroke="#1a1822"/>
    <line x1="55" y1="69" x2="24" y2="95" stroke="#1a1822"/>
    <line x1="55" y1="69" x2="74" y2="95" stroke="#1a1822"/>
    <line x1="175" y1="69" x2="144" y2="95" stroke="#1a1822"/>
    <line x1="175" y1="69" x2="194" y2="95" stroke="#1a1822"/>
  </g>
  <text x="620" y="290" font-size="12" fill="#1a1822">Winners propagate up;</text>
  <text x="620" y="307" font-size="12" fill="#1a1822">post-extract replays one path.</text>
  <text x="620" y="340" font-size="12" fill="#1a1822" font-weight="700">Use case</text>
  <text x="620" y="358" font-size="11" fill="#1a1822">• External k-way merge</text>
  <text x="620" y="375" font-size="11" fill="#1a1822">• Replacement selection</text>
  <text x="620" y="392" font-size="11" fill="#1a1822">• Database sort pipelines</text>
  <text x="620" y="420" font-size="11" fill="#1a1822" font-style="italic">PostgreSQL, Oracle external sort</text>
  <text x="620" y="435" font-size="11" fill="#1a1822" font-style="italic">use tournament trees.</text>
</svg>
