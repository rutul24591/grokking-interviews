<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Why Greedy Fails — And When It Doesn’t</text>

  <!-- Greedy fails -->
  <rect x="40" y="60" width="400" height="200" fill="#fff" stroke="#cc4444" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#cc4444">Counter-example: coins = {1, 3, 4}, amount = 6</text>
  <text x="60" y="115" font-size="11" fill="#1a1822">Greedy (take largest first):</text>
  <text x="60" y="135" font-size="11" fill="#1a1822" font-family="monospace">6 − 4 = 2 → 2 − 1 − 1 = 0   (3 coins: 4, 1, 1)</text>
  <text x="60" y="165" font-size="11" fill="#1a1822">DP (optimal):</text>
  <text x="60" y="185" font-size="11" fill="#1a1822" font-family="monospace">6 = 3 + 3                   (2 coins)</text>
  <text x="60" y="215" font-size="11" fill="#cc4444" font-weight="700">Greedy gets 3 coins, optimum is 2.</text>
  <text x="60" y="235" font-size="11" fill="#1a1822">Counter-example is small — always test this before shipping greedy.</text>

  <!-- Greedy works -->
  <rect x="460" y="60" width="400" height="200" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="480" y="85" font-size="13" font-weight="700" fill="#4caf50">When greedy IS optimal — “canonical” systems</text>
  <text x="480" y="108" font-size="11" fill="#1a1822">US coin system {1, 5, 10, 25} is canonical:</text>
  <text x="480" y="128" font-size="11" fill="#1a1822">greedy always matches DP.</text>
  <text x="480" y="155" font-size="11" fill="#1a1822">Matroid theory: greedy optimal iff the</text>
  <text x="480" y="171" font-size="11" fill="#1a1822">exchange property holds on all amounts.</text>
  <text x="480" y="198" font-size="11" fill="#1a1822">Pearson (2005) gave a polynomial test:</text>
  <text x="480" y="214" font-size="11" fill="#1a1822">check greedy vs DP on amounts up to</text>
  <text x="480" y="230" font-size="11" fill="#1a1822">c[n-1] + c[n-2] — if all agree, canonical.</text>

  <!-- BFS alternative -->
  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="305" font-size="13" font-weight="700" fill="#6d5bd0">Alternative view: BFS on the implicit graph</text>
  <text x="60" y="330" font-size="11" fill="#1a1822">Nodes = amounts 0..A. Edge from a to a+c for each coin c. Shortest path from 0 to A = min coins.</text>

  <g transform="translate(120,360)" font-size="11">
    <circle cx="0" cy="30" r="16" fill="#e8e4f8" stroke="#6d5bd0"/><text x="0" y="34" text-anchor="middle">0</text>
    <circle cx="120" cy="0" r="16" fill="#fff" stroke="#6d5bd0"/><text x="120" y="4" text-anchor="middle">1</text>
    <circle cx="120" cy="60" r="16" fill="#fff" stroke="#6d5bd0"/><text x="120" y="64" text-anchor="middle">2</text>
    <circle cx="240" cy="30" r="16" fill="#fff" stroke="#6d5bd0"/><text x="240" y="34" text-anchor="middle">5</text>
    <circle cx="360" cy="30" r="16" fill="#fff" stroke="#6d5bd0"/><text x="360" y="34" text-anchor="middle">10</text>
    <circle cx="480" cy="30" r="16" fill="#cc4444"/><text x="480" y="34" text-anchor="middle" fill="#fff">11</text>
    <line x1="16" y1="30" x2="104" y2="2" stroke="#6d5bd0"/>
    <line x1="16" y1="30" x2="104" y2="58" stroke="#6d5bd0"/>
    <line x1="16" y1="30" x2="224" y2="30" stroke="#4caf50" stroke-width="2"/>
    <line x1="256" y1="30" x2="344" y2="30" stroke="#4caf50" stroke-width="2"/>
    <line x1="376" y1="30" x2="464" y2="30" stroke="#4caf50" stroke-width="2"/>
    <text x="590" y="34" fill="#4caf50" font-weight="700">0 → 5 → 10 → 11 (3 hops)</text>
  </g>
  <text x="60" y="450" font-size="11" fill="#1a1822">BFS gives same answer as DP in O(A · |coins|). Useful when coins have unit weight but different structure.</text>
</svg>
