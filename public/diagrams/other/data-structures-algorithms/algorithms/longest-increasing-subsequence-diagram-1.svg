<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Patience Sort for LIS — [10, 9, 2, 5, 3, 7, 101, 18]</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">Each card goes on the leftmost pile whose top is ≥ card. Final pile count = LIS length.</text>

  <!-- Input -->
  <g transform="translate(60,80)" font-size="12">
    <text x="0" y="0" font-weight="700" fill="#6d5bd0">Input:</text>
    <rect x="60" y="-15" width="45" height="24" fill="#a89bec"/><text x="82" y="2" text-anchor="middle">10</text>
    <rect x="108" y="-15" width="45" height="24" fill="#a89bec"/><text x="130" y="2" text-anchor="middle">9</text>
    <rect x="156" y="-15" width="45" height="24" fill="#a89bec"/><text x="178" y="2" text-anchor="middle">2</text>
    <rect x="204" y="-15" width="45" height="24" fill="#a89bec"/><text x="226" y="2" text-anchor="middle">5</text>
    <rect x="252" y="-15" width="45" height="24" fill="#a89bec"/><text x="274" y="2" text-anchor="middle">3</text>
    <rect x="300" y="-15" width="45" height="24" fill="#a89bec"/><text x="322" y="2" text-anchor="middle">7</text>
    <rect x="348" y="-15" width="45" height="24" fill="#a89bec"/><text x="370" y="2" text-anchor="middle">101</text>
    <rect x="396" y="-15" width="45" height="24" fill="#a89bec"/><text x="418" y="2" text-anchor="middle">18</text>
  </g>

  <!-- Pile states -->
  <text x="60" y="125" font-size="12" font-weight="700" fill="#6d5bd0">After each card — tails array (smallest pile-tops):</text>

  <g font-size="11" font-family="monospace">
    <text x="60" y="150">10      → [10]</text>
    <text x="60" y="168">9       → [9]              (9 replaces 10 in pile 0)</text>
    <text x="60" y="186">2       → [2]              (2 replaces 9)</text>
    <text x="60" y="204">5       → [2, 5]           (5 &gt; 2, new pile)</text>
    <text x="60" y="222">3       → [2, 3]           (3 replaces 5)</text>
    <text x="60" y="240">7       → [2, 3, 7]        (7 &gt; 3, new pile)</text>
    <text x="60" y="258">101     → [2, 3, 7, 101]   (new pile)</text>
    <text x="60" y="276" fill="#4caf50" font-weight="700">18      → [2, 3, 7, 18]    (18 replaces 101)</text>
  </g>

  <!-- Final piles visualization -->
  <text x="60" y="310" font-size="12" font-weight="700" fill="#4caf50">Final piles (decreasing stacks). Count = 4 = LIS length.</text>

  <g transform="translate(60,320)" font-size="11">
    <!-- pile 0: 2, 3, 10, 9 wait these would be different. Actually cards below are original cards dropped on pile. -->
    <rect x="0" y="0" width="60" height="24" fill="#e8e4f8" stroke="#6d5bd0"/><text x="30" y="17" text-anchor="middle">10</text>
    <rect x="0" y="26" width="60" height="24" fill="#e8e4f8" stroke="#6d5bd0"/><text x="30" y="43" text-anchor="middle">9</text>
    <rect x="0" y="52" width="60" height="24" fill="#cc4444"/><text x="30" y="69" text-anchor="middle" fill="#fff" font-weight="700">2</text>
    <text x="30" y="95" text-anchor="middle" font-size="10" fill="#1a1822">pile 0</text>

    <rect x="80" y="0" width="60" height="24" fill="#e8e4f8" stroke="#6d5bd0"/><text x="110" y="17" text-anchor="middle">5</text>
    <rect x="80" y="26" width="60" height="24" fill="#cc4444"/><text x="110" y="43" text-anchor="middle" fill="#fff" font-weight="700">3</text>
    <text x="110" y="95" text-anchor="middle" font-size="10" fill="#1a1822">pile 1</text>

    <rect x="160" y="0" width="60" height="24" fill="#cc4444"/><text x="190" y="17" text-anchor="middle" fill="#fff" font-weight="700">7</text>
    <text x="190" y="95" text-anchor="middle" font-size="10" fill="#1a1822">pile 2</text>

    <rect x="240" y="0" width="60" height="24" fill="#e8e4f8" stroke="#6d5bd0"/><text x="270" y="17" text-anchor="middle">101</text>
    <rect x="240" y="26" width="60" height="24" fill="#cc4444"/><text x="270" y="43" text-anchor="middle" fill="#fff" font-weight="700">18</text>
    <text x="270" y="95" text-anchor="middle" font-size="10" fill="#1a1822">pile 3</text>
  </g>

  <text x="400" y="340" font-size="12" fill="#4caf50" font-weight="700">Top of each pile forms tails = [2, 3, 7, 18]</text>
  <text x="400" y="360" font-size="11" fill="#1a1822">One actual LIS: [2, 3, 7, 18] or [2, 3, 7, 101]</text>
  <text x="400" y="376" font-size="11" fill="#1a1822">— multiple LISs of same length may exist.</text>
  <text x="400" y="400" font-size="11" fill="#cc4444">Note: tails ≠ LIS! Parent pointers needed to recover sequence.</text>

  <rect x="40" y="430" width="820" height="55" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="453" font-size="12" font-weight="700" fill="#6d5bd0">Complexity: Θ(n log n) time, Θ(n) space</text>
  <text x="60" y="473" font-size="11" fill="#1a1822">Each card does one lower_bound (log n) in the tails array. Number of piles = LIS length.</text>
</svg>
