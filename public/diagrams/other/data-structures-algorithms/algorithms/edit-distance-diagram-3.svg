<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Edit Distance Applications Across Industries</text>

  <rect x="40" y="60" width="400" height="190" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">1. Spell check / autocorrect</text>
  <text x="60" y="108" font-size="11" fill="#1a1822">Query: "recieve" — find candidates</text>
  <text x="60" y="124" font-size="11" fill="#1a1822">with distance ≤ 2 from dictionary.</text>
  <text x="60" y="148" font-size="11" fill="#1a1822" font-family="monospace">recieve → receive  (sub i↔e, dist=2)</text>
  <text x="60" y="164" font-size="11" fill="#1a1822" font-family="monospace">recieve → relieve  (dist=2)</text>
  <text x="60" y="188" font-size="11" fill="#1a1822">Symspell / BK-trees prune candidate set</text>
  <text x="60" y="204" font-size="11" fill="#1a1822">to avoid full dict scan.</text>
  <text x="60" y="230" font-size="11" fill="#4caf50" font-weight="700">Aspell, Hunspell, Google "Did you mean".</text>

  <rect x="460" y="60" width="400" height="190" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="480" y="85" font-size="13" font-weight="700" fill="#6d5bd0">2. Bioinformatics alignment</text>
  <text x="480" y="108" font-size="11" fill="#1a1822">Needleman-Wunsch (global), Smith-</text>
  <text x="480" y="124" font-size="11" fill="#1a1822">Waterman (local) — generalize edit</text>
  <text x="480" y="140" font-size="11" fill="#1a1822">distance with substitution matrix.</text>
  <text x="480" y="164" font-size="11" fill="#1a1822" font-family="monospace">ACGT-TGCA</text>
  <text x="480" y="180" font-size="11" fill="#1a1822" font-family="monospace">AC-TGTGCA</text>
  <text x="480" y="204" font-size="11" fill="#1a1822">BLOSUM / PAM matrices assign</text>
  <text x="480" y="220" font-size="11" fill="#1a1822">biologically-meaningful sub costs.</text>
  <text x="480" y="240" font-size="11" fill="#4caf50" font-weight="700">BLAST, minimap2, ClustalW.</text>

  <rect x="40" y="270" width="400" height="190" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="295" font-size="13" font-weight="700" fill="#6d5bd0">3. Speech & NLP metrics</text>
  <text x="60" y="318" font-size="11" fill="#1a1822">WER (Word Error Rate) =</text>
  <text x="60" y="334" font-size="11" fill="#1a1822" font-family="monospace">  edit_distance(hyp, ref) / |ref|</text>
  <text x="60" y="358" font-size="11" fill="#1a1822">CER (Character Error Rate) uses chars.</text>
  <text x="60" y="380" font-size="11" fill="#1a1822">Standard metric for ASR, OCR, MT.</text>
  <text x="60" y="408" font-size="11" fill="#4caf50" font-weight="700">Used by: Whisper, DeepSpeech, SQuAD evals.</text>

  <rect x="460" y="270" width="400" height="190" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="480" y="295" font-size="13" font-weight="700" fill="#6d5bd0">4. Fuzzy search & dedup</text>
  <text x="480" y="318" font-size="11" fill="#1a1822">ElasticSearch fuzzy: edit distance on</text>
  <text x="480" y="334" font-size="11" fill="#1a1822">tokens (Levenshtein automaton, O(k·n)).</text>
  <text x="480" y="358" font-size="11" fill="#1a1822">Record linkage: "John Smith" vs</text>
  <text x="480" y="374" font-size="11" fill="#1a1822">"Jon Smyth" — merge near-duplicates.</text>
  <text x="480" y="398" font-size="11" fill="#1a1822">Git merge conflict resolution uses</text>
  <text x="480" y="414" font-size="11" fill="#1a1822">LCS-distance (edit w/o sub).</text>
  <text x="480" y="438" font-size="11" fill="#4caf50" font-weight="700">Elasticsearch, Lucene, dedup pipelines.</text>
</svg>
