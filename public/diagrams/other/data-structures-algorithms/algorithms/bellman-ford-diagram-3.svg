<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Bellman-Ford in Production</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">Real-world systems</text>
  <text x="60" y="112" font-size="11">• <tspan font-weight="700">Distance-vector routing protocols:</tspan> RIP, EIGRP, BGP path-vector — Bellman-Ford-style updates between routers.</text>
  <text x="60" y="132" font-size="11">• <tspan font-weight="700">Currency arbitrage detection:</tspan> negative cycle on -log(rate) graph = arbitrage.</text>
  <text x="60" y="152" font-size="11">• <tspan font-weight="700">Constraint solvers / difference constraints:</tspan> system Ax ≤ b reduces to shortest paths.</text>
  <text x="60" y="172" font-size="11">• <tspan font-weight="700">Min-cost flow:</tspan> Bellman-Ford finds negative-cost augmenting paths in cycle-canceling.</text>
  <text x="60" y="192" font-size="11">• <tspan font-weight="700">Job scheduling with deadlines and precedence:</tspan> longest path on DAG via -BF.</text>
  <text x="60" y="212" font-size="11">• <tspan font-weight="700">Stock trading strategies:</tspan> profit-maximizing path with negative reward edges.</text>
  <text x="60" y="232" font-size="11">• <tspan font-weight="700">Networking convergence:</tspan> RIP triggers Bellman-Ford passes on link-cost change.</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="305" font-size="13" font-weight="700" fill="#4caf50">Comparison cheat sheet</text>
  <text x="60" y="330" font-size="11">                         BFS         Dijkstra        Bellman-Ford     Floyd-Warshall</text>
  <text x="60" y="350" font-size="11">Edge weights:            unit        non-negative    any              any</text>
  <text x="60" y="370" font-size="11">Negative cycles:         N/A         no              detect           detect</text>
  <text x="60" y="390" font-size="11">Sources:                 single      single          single           all-pairs</text>
  <text x="60" y="410" font-size="11">Time:                    O(V+E)      O((V+E) log V)  O(V·E)           O(V³)</text>
  <text x="60" y="430" font-size="11">Space:                   O(V)        O(V)            O(V)             O(V²)</text>
  <text x="60" y="465" font-size="11" fill="#4caf50" font-weight="700">Pick by edge-weight constraint and source count, then optimize within the family.</text>
</svg>
