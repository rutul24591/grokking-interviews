<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Shell Sort — Gap Sequence 5, 3, 1 on [8, 3, 7, 1, 5, 9, 4, 2]</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#1a1822">Each pass h-sorts interleaved subsequences; earlier passes preserved by later ones.</text>

  <!-- Pass gap=5 -->
  <text x="40" y="100" font-size="14" font-weight="700" fill="#6d5bd0">Gap = 5</text>
  <text x="40" y="118" font-size="11" fill="#1a1822">subseq: {0,5},{1,6},{2,7}</text>
  <g transform="translate(220,85)">
    <rect x="0" y="0" width="60" height="35" fill="#cc4444"/><text x="30" y="22" text-anchor="middle" fill="#fff" font-weight="700">8</text>
    <rect x="62" y="0" width="60" height="35" fill="#a89bec"/><text x="92" y="22" text-anchor="middle">3</text>
    <rect x="124" y="0" width="60" height="35" fill="#a89bec"/><text x="154" y="22" text-anchor="middle">7</text>
    <rect x="186" y="0" width="60" height="35" fill="#a89bec"/><text x="216" y="22" text-anchor="middle">1</text>
    <rect x="248" y="0" width="60" height="35" fill="#a89bec"/><text x="278" y="22" text-anchor="middle">5</text>
    <rect x="310" y="0" width="60" height="35" fill="#cc4444"/><text x="340" y="22" text-anchor="middle" fill="#fff" font-weight="700">9</text>
    <rect x="372" y="0" width="60" height="35" fill="#a89bec"/><text x="402" y="22" text-anchor="middle">4</text>
    <rect x="434" y="0" width="60" height="35" fill="#a89bec"/><text x="464" y="22" text-anchor="middle">2</text>
    <path d="M30 40 Q200 70 340 40" stroke="#cc4444" fill="none" stroke-dasharray="3"/>
    <text x="520" y="25" font-size="12" fill="#1a1822">compare (0,5) → 8&lt;9 OK</text>
  </g>
  <text x="220" y="150" font-size="11" fill="#1a1822">result: [8, 3, 2, 1, 5, 9, 4, 7] (swap 7↔2, 3↔... depending on subseq)</text>

  <!-- Pass gap=3 -->
  <text x="40" y="200" font-size="14" font-weight="700" fill="#6d5bd0">Gap = 3</text>
  <text x="40" y="218" font-size="11" fill="#1a1822">subseq: {0,3,6},{1,4,7},{2,5}</text>
  <g transform="translate(220,185)">
    <rect x="0" y="0" width="60" height="35" fill="#6d5bd0"/><text x="30" y="22" text-anchor="middle" fill="#fff">2</text>
    <rect x="62" y="0" width="60" height="35" fill="#4caf50"/><text x="92" y="22" text-anchor="middle" fill="#fff">3</text>
    <rect x="124" y="0" width="60" height="35" fill="#a89bec"/><text x="154" y="22" text-anchor="middle">7</text>
    <rect x="186" y="0" width="60" height="35" fill="#6d5bd0"/><text x="216" y="22" text-anchor="middle" fill="#fff">1</text>
    <rect x="248" y="0" width="60" height="35" fill="#4caf50"/><text x="278" y="22" text-anchor="middle" fill="#fff">5</text>
    <rect x="310" y="0" width="60" height="35" fill="#a89bec"/><text x="340" y="22" text-anchor="middle">4</text>
    <rect x="372" y="0" width="60" height="35" fill="#6d5bd0"/><text x="402" y="22" text-anchor="middle" fill="#fff">8</text>
    <rect x="434" y="0" width="60" height="35" fill="#4caf50"/><text x="464" y="22" text-anchor="middle" fill="#fff">9</text>
    <path d="M30 40 Q120 60 216 40" stroke="#6d5bd0" fill="none" stroke-dasharray="3"/>
    <path d="M216 40 Q310 60 402 40" stroke="#6d5bd0" fill="none" stroke-dasharray="3"/>
    <path d="M92 45 Q180 65 278 45" stroke="#4caf50" fill="none" stroke-dasharray="3"/>
    <path d="M278 45 Q370 65 464 45" stroke="#4caf50" fill="none" stroke-dasharray="3"/>
  </g>
  <text x="220" y="248" font-size="11" fill="#1a1822">Two interleaved chains {0,3,6} (purple) and {1,4,7} (green) each insertion-sort separately.</text>

  <!-- Pass gap=1 -->
  <text x="40" y="300" font-size="14" font-weight="700" fill="#6d5bd0">Gap = 1</text>
  <text x="40" y="318" font-size="11" fill="#1a1822">plain insertion sort</text>
  <g transform="translate(220,285)">
    <rect x="0" y="0" width="60" height="35" fill="#4caf50"/><text x="30" y="22" text-anchor="middle" fill="#fff" font-weight="700">1</text>
    <rect x="62" y="0" width="60" height="35" fill="#4caf50"/><text x="92" y="22" text-anchor="middle" fill="#fff" font-weight="700">2</text>
    <rect x="124" y="0" width="60" height="35" fill="#4caf50"/><text x="154" y="22" text-anchor="middle" fill="#fff" font-weight="700">3</text>
    <rect x="186" y="0" width="60" height="35" fill="#4caf50"/><text x="216" y="22" text-anchor="middle" fill="#fff" font-weight="700">4</text>
    <rect x="248" y="0" width="60" height="35" fill="#4caf50"/><text x="278" y="22" text-anchor="middle" fill="#fff" font-weight="700">5</text>
    <rect x="310" y="0" width="60" height="35" fill="#4caf50"/><text x="340" y="22" text-anchor="middle" fill="#fff" font-weight="700">7</text>
    <rect x="372" y="0" width="60" height="35" fill="#4caf50"/><text x="402" y="22" text-anchor="middle" fill="#fff" font-weight="700">8</text>
    <rect x="434" y="0" width="60" height="35" fill="#4caf50"/><text x="464" y="22" text-anchor="middle" fill="#fff" font-weight="700">9</text>
  </g>
  <text x="220" y="345" font-size="11" fill="#1a1822">Only a few inversions remain — gap=1 pass is close to O(n) instead of O(n²).</text>

  <rect x="60" y="375" width="780" height="100" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="80" y="400" font-size="14" font-weight="700" fill="#6d5bd0">h-sortedness theorem (Knuth)</text>
  <text x="80" y="422" font-size="13" fill="#1a1822">If an array is k-sorted and you then h-sort it (h ≤ k), the array stays k-sorted.</text>
  <text x="80" y="442" font-size="13" fill="#1a1822">Consequence: later passes never undo earlier work — each pass strictly adds sortedness.</text>
  <text x="80" y="462" font-size="13" fill="#1a1822">By the time gap=1 runs, most inversions are gone; the final insertion-sort pass is near-linear.</text>
</svg>
