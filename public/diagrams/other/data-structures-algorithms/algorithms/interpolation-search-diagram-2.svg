<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Complexity Comparison — Search Algorithms at Scale</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">Probe count vs n. Interpolation wins on uniform data; degrades on skewed.</text>

  <!-- Axes -->
  <line x1="100" y1="400" x2="820" y2="400" stroke="#1a1822" stroke-width="2"/>
  <line x1="100" y1="400" x2="100" y2="90" stroke="#1a1822" stroke-width="2"/>

  <!-- x labels (log scale n) -->
  <text x="170" y="420" text-anchor="middle" font-size="11">10³</text>
  <text x="300" y="420" text-anchor="middle" font-size="11">10⁴</text>
  <text x="430" y="420" text-anchor="middle" font-size="11">10⁵</text>
  <text x="560" y="420" text-anchor="middle" font-size="11">10⁶</text>
  <text x="690" y="420" text-anchor="middle" font-size="11">10⁷</text>
  <text x="790" y="420" text-anchor="middle" font-size="11">10⁸</text>
  <text x="460" y="448" text-anchor="middle" font-size="12">n (array size, log scale)</text>

  <text x="90" y="400" text-anchor="end" font-size="11">0</text>
  <text x="90" y="340" text-anchor="end" font-size="11">10</text>
  <text x="90" y="280" text-anchor="end" font-size="11">20</text>
  <text x="90" y="220" text-anchor="end" font-size="11">30</text>
  <text x="90" y="160" text-anchor="end" font-size="11">40+</text>
  <text x="55" y="245" text-anchor="middle" font-size="12" transform="rotate(-90 55 245)">probes</text>

  <!-- Binary: log n -->
  <path d="M170 340 L300 322 L430 304 L560 286 L690 268 L790 254" stroke="#6d5bd0" stroke-width="3" fill="none"/>
  <text x="795" y="252" font-size="12" fill="#6d5bd0" font-weight="700">Binary O(log n)</text>

  <!-- Interpolation uniform: log log n -->
  <path d="M170 388 L300 386 L430 384 L560 382 L690 380 L790 378" stroke="#4caf50" stroke-width="3" fill="none"/>
  <text x="795" y="376" font-size="12" fill="#4caf50" font-weight="700">Interp (uniform) O(log log n)</text>

  <!-- Interpolation skewed: nearly O(n) -->
  <path d="M170 390 L300 350 L430 280 L560 200 L690 140 L790 100" stroke="#cc4444" stroke-width="3" fill="none" stroke-dasharray="5"/>
  <text x="705" y="110" font-size="12" fill="#cc4444" font-weight="700">Interp (skewed) → O(n)</text>

  <!-- Annotation boxes -->
  <rect x="130" y="75" width="260" height="36" fill="#fff" stroke="#4caf50" rx="4"/>
  <text x="140" y="90" font-size="10" fill="#1a1822">At n=10⁹ uniform: interp ~5 probes,</text>
  <text x="140" y="103" font-size="10" fill="#1a1822">binary ~30 probes → 6× speedup.</text>

  <rect x="440" y="75" width="360" height="36" fill="#fff" stroke="#cc4444" rx="4"/>
  <text x="450" y="90" font-size="10" fill="#1a1822">Skewed: interpolation creeps forward one index</text>
  <text x="450" y="103" font-size="10" fill="#1a1822">at a time. Without fallback, O(n) worst case.</text>

  <rect x="40" y="460" width="820" height="28" fill="#fff" stroke="#6d5bd0" rx="4"/>
  <text x="60" y="478" font-size="11" fill="#1a1822">Takeaway: interpolation is a specialist tool. Binary search is the stable default. Hash table beats both when sorted order isn’t needed.</text>
</svg>
