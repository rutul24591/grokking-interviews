<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Parametric Search — Binary Search the Answer</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">Min shipping capacity to deliver weights [3,2,2,4,1,4] in d=3 days. Predicate feasible(cap) is monotonic.</text>

  <!-- Monotone predicate bar -->
  <text x="60" y="90" font-size="12" font-weight="700" fill="#6d5bd0">Predicate: feasible(cap) — is d-day delivery possible with cap?</text>
  <g transform="translate(60,100)" font-size="11">
    <rect x="0" y="0" width="60" height="28" fill="#cc4444"/><text x="30" y="19" text-anchor="middle" fill="#fff">cap=4 ✗</text>
    <rect x="62" y="0" width="60" height="28" fill="#cc4444"/><text x="92" y="19" text-anchor="middle" fill="#fff">cap=5 ✗</text>
    <rect x="124" y="0" width="60" height="28" fill="#4caf50"/><text x="154" y="19" text-anchor="middle" fill="#fff">cap=6 ✓</text>
    <rect x="186" y="0" width="60" height="28" fill="#4caf50"/><text x="216" y="19" text-anchor="middle" fill="#fff">cap=7 ✓</text>
    <rect x="248" y="0" width="60" height="28" fill="#4caf50"/><text x="278" y="19" text-anchor="middle" fill="#fff">cap=8 ✓</text>
    <rect x="310" y="0" width="60" height="28" fill="#4caf50"/><text x="340" y="19" text-anchor="middle" fill="#fff">...16 ✓</text>
    <text x="385" y="19" fill="#1a1822" font-style="italic">once true, always true → monotone</text>
  </g>

  <!-- Search bounds -->
  <text x="60" y="165" font-size="12" font-weight="700" fill="#6d5bd0">Bounds: lo = max(weights) = 4, hi = sum(weights) = 16. Binary search the smallest cap where feasible.</text>

  <!-- Iter trace -->
  <g font-size="12" fill="#1a1822">
    <rect x="60" y="185" width="780" height="28" fill="#fff" stroke="#6d5bd0"/>
    <text x="75" y="203">iter 1 — lo=4 hi=16 mid=10 → feasible(10) = TRUE (splits [3,2,2,4,1,4] into {3,2,2}{4,1,4}) → hi = 10</text>
    <rect x="60" y="218" width="780" height="28" fill="#fff" stroke="#6d5bd0"/>
    <text x="75" y="236">iter 2 — lo=4 hi=10 mid=7 → feasible(7) = TRUE ({3,2}{2,4}{1,4} fits in 3 days) → hi = 7</text>
    <rect x="60" y="251" width="780" height="28" fill="#fff" stroke="#6d5bd0"/>
    <text x="75" y="269">iter 3 — lo=4 hi=7 mid=5 → feasible(5) = FALSE (4 days needed) → lo = 6</text>
    <rect x="60" y="284" width="780" height="28" fill="#fff" stroke="#6d5bd0"/>
    <text x="75" y="302">iter 4 — lo=6 hi=7 mid=6 → feasible(6) = TRUE ({3,2}{2,4}{1,4} → wait, {3,2}{2,4}{1,4}=6) → hi = 6</text>
    <rect x="60" y="317" width="780" height="28" fill="#4caf50"/>
    <text x="75" y="335" fill="#fff" font-weight="700">lo = hi = 6 → minimum capacity = 6. 4 iterations, log₂(12) comparisons.</text>
  </g>

  <!-- Pattern recipe -->
  <rect x="40" y="360" width="820" height="125" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="384" font-size="14" font-weight="700" fill="#6d5bd0">Pattern recipe</text>
  <text x="60" y="405" font-size="12" fill="#1a1822">1. Identify the answer range [lo, hi]. 2. Write feasible(x) — a greedy check, not a search.</text>
  <text x="60" y="423" font-size="12" fill="#1a1822">3. Prove monotonicity: larger x ⇒ easier to satisfy. 4. Binary search for the boundary.</text>
  <text x="60" y="445" font-size="12" font-weight="700" fill="#cc4444">Common applications:</text>
  <text x="60" y="463" font-size="11" fill="#1a1822">Koko eating bananas, split-array largest sum, allocate books, min days to make bouquets, kth smallest in</text>
  <text x="60" y="478" font-size="11" fill="#1a1822">sorted matrix, aggressive cows, median of two sorted arrays (binary-search the partition).</text>
</svg>
