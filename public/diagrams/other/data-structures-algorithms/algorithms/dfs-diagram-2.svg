<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">DFS Applications &amp; Patterns</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">Algorithms built on DFS</text>
  <text x="60" y="112" font-size="11">• <tspan font-weight="700">Topological sort:</tspan> reverse post-order yields a topological order on a DAG.</text>
  <text x="60" y="132" font-size="11">• <tspan font-weight="700">Cycle detection:</tspan> a back edge during DFS = cycle. Three-color marking for directed graphs.</text>
  <text x="60" y="152" font-size="11">• <tspan font-weight="700">Strongly Connected Components:</tspan> Tarjan's (one DFS) or Kosaraju (two DFS).</text>
  <text x="60" y="172" font-size="11">• <tspan font-weight="700">Articulation points / bridges:</tspan> low-link values via DFS tree.</text>
  <text x="60" y="192" font-size="11">• <tspan font-weight="700">Eulerian path / circuit:</tspan> Hierholzer's DFS-based stitch algorithm.</text>
  <text x="60" y="212" font-size="11">• <tspan font-weight="700">2-coloring / bipartite check:</tspan> DFS + alternate colors.</text>
  <text x="60" y="232" font-size="11">• <tspan font-weight="700">Backtracking algorithms:</tspan> DFS over implicit state-space tree.</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="305" font-size="13" font-weight="700" fill="#4caf50">Three-color marking for directed cycle detection</text>
  <text x="60" y="330" font-size="11">white: unvisited.   gray: on current DFS stack.   black: fully processed.</text>
  <text x="60" y="355" font-size="11" font-family="monospace">def dfs(u):</text>
  <text x="60" y="373" font-size="11" font-family="monospace">  color[u] = GRAY</text>
  <text x="60" y="391" font-size="11" font-family="monospace">  for v in adj[u]:</text>
  <text x="60" y="409" font-size="11" font-family="monospace">    if color[v] == GRAY: return CYCLE   # back edge</text>
  <text x="60" y="427" font-size="11" font-family="monospace">    if color[v] == WHITE: dfs(v)</text>
  <text x="60" y="445" font-size="11" font-family="monospace">  color[u] = BLACK</text>
  <text x="60" y="465" font-size="11" fill="#4caf50" font-weight="700">Black-on-stack edges are forward/cross — fine; gray-on-stack means ancestor → cycle.</text>
</svg>
