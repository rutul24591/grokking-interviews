<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Binary Search — Halve the Range at Each Step</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">target = 23; sorted array of 12 elements; 4 iterations (⌈log₂12⌉ = 4).</text>

  <!-- Indices row -->
  <g transform="translate(60,80)" font-size="11" font-family="monospace">
    <text x="30" y="-5" text-anchor="middle">0</text>
    <text x="92" y="-5" text-anchor="middle">1</text>
    <text x="154" y="-5" text-anchor="middle">2</text>
    <text x="216" y="-5" text-anchor="middle">3</text>
    <text x="278" y="-5" text-anchor="middle">4</text>
    <text x="340" y="-5" text-anchor="middle">5</text>
    <text x="402" y="-5" text-anchor="middle">6</text>
    <text x="464" y="-5" text-anchor="middle">7</text>
    <text x="526" y="-5" text-anchor="middle">8</text>
    <text x="588" y="-5" text-anchor="middle">9</text>
    <text x="650" y="-5" text-anchor="middle">10</text>
    <text x="712" y="-5" text-anchor="middle">11</text>
  </g>

  <!-- Iter 1 -->
  <text x="60" y="115" font-size="12" font-weight="700" fill="#6d5bd0">iter 1: lo=0 hi=12 mid=6 → arr[6]=31 &gt; 23 → hi=6</text>
  <g transform="translate(60,125)" font-size="12">
    <rect x="0" y="0" width="60" height="30" fill="#a89bec"/><text x="30" y="20" text-anchor="middle">2</text>
    <rect x="62" y="0" width="60" height="30" fill="#a89bec"/><text x="92" y="20" text-anchor="middle">5</text>
    <rect x="124" y="0" width="60" height="30" fill="#a89bec"/><text x="154" y="20" text-anchor="middle">8</text>
    <rect x="186" y="0" width="60" height="30" fill="#a89bec"/><text x="216" y="20" text-anchor="middle">12</text>
    <rect x="248" y="0" width="60" height="30" fill="#a89bec"/><text x="278" y="20" text-anchor="middle">16</text>
    <rect x="310" y="0" width="60" height="30" fill="#a89bec"/><text x="340" y="20" text-anchor="middle">23</text>
    <rect x="372" y="0" width="60" height="30" fill="#cc4444"/><text x="402" y="20" text-anchor="middle" fill="#fff" font-weight="700">31</text>
    <rect x="434" y="0" width="60" height="30" fill="#a89bec"/><text x="464" y="20" text-anchor="middle">38</text>
    <rect x="496" y="0" width="60" height="30" fill="#a89bec"/><text x="526" y="20" text-anchor="middle">45</text>
    <rect x="558" y="0" width="60" height="30" fill="#a89bec"/><text x="588" y="20" text-anchor="middle">52</text>
    <rect x="620" y="0" width="60" height="30" fill="#a89bec"/><text x="650" y="20" text-anchor="middle">60</text>
    <rect x="682" y="0" width="60" height="30" fill="#a89bec"/><text x="712" y="20" text-anchor="middle">71</text>
  </g>

  <!-- Iter 2 -->
  <text x="60" y="185" font-size="12" font-weight="700" fill="#6d5bd0">iter 2: lo=0 hi=6 mid=3 → arr[3]=12 &lt; 23 → lo=4</text>
  <g transform="translate(60,195)" font-size="12">
    <rect x="0" y="0" width="60" height="30" fill="#a89bec"/><text x="30" y="20" text-anchor="middle">2</text>
    <rect x="62" y="0" width="60" height="30" fill="#a89bec"/><text x="92" y="20" text-anchor="middle">5</text>
    <rect x="124" y="0" width="60" height="30" fill="#a89bec"/><text x="154" y="20" text-anchor="middle">8</text>
    <rect x="186" y="0" width="60" height="30" fill="#cc4444"/><text x="216" y="20" text-anchor="middle" fill="#fff" font-weight="700">12</text>
    <rect x="248" y="0" width="60" height="30" fill="#a89bec"/><text x="278" y="20" text-anchor="middle">16</text>
    <rect x="310" y="0" width="60" height="30" fill="#a89bec"/><text x="340" y="20" text-anchor="middle">23</text>
    <rect x="372" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/><text x="402" y="20" text-anchor="middle" fill="#888">31</text>
    <rect x="434" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
    <rect x="496" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
    <rect x="558" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
    <rect x="620" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
    <rect x="682" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
  </g>

  <!-- Iter 3 -->
  <text x="60" y="255" font-size="12" font-weight="700" fill="#6d5bd0">iter 3: lo=4 hi=6 mid=5 → arr[5]=23 == 23 → FOUND</text>
  <g transform="translate(60,265)" font-size="12">
    <rect x="0" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
    <rect x="62" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
    <rect x="124" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
    <rect x="186" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
    <rect x="248" y="0" width="60" height="30" fill="#a89bec"/><text x="278" y="20" text-anchor="middle">16</text>
    <rect x="310" y="0" width="60" height="30" fill="#4caf50"/><text x="340" y="20" text-anchor="middle" fill="#fff" font-weight="700">23 ✓</text>
    <rect x="372" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
    <rect x="434" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
    <rect x="496" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
    <rect x="558" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
    <rect x="620" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
    <rect x="682" y="0" width="60" height="30" fill="#e8e4f8" opacity="0.4"/>
  </g>

  <rect x="40" y="320" width="820" height="165" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="345" font-size="14" font-weight="700" fill="#6d5bd0">Complexity &amp; Requirements</text>
  <text x="60" y="370" font-size="12" fill="#1a1822"><tspan font-weight="700">Time:</tspan> Θ(log n) all cases. Comparisons ≤ ⌈log₂n⌉ + 1.</text>
  <text x="60" y="390" font-size="12" fill="#1a1822"><tspan font-weight="700">Space:</tspan> Θ(1) iterative, Θ(log n) recursive (stack).</text>
  <text x="60" y="410" font-size="12" fill="#1a1822"><tspan font-weight="700">Requires:</tspan> random access + sorted input. Fails silently on unsorted data.</text>
  <text x="60" y="435" font-size="12" fill="#cc4444" font-weight="700">Pitfalls:</text>
  <text x="60" y="453" font-size="11" fill="#1a1822">• integer overflow: use mid = lo + (hi−lo)/2, not (lo+hi)/2.</text>
  <text x="60" y="470" font-size="11" fill="#1a1822">• infinite loop: with condition lo &lt; hi, updates must be hi = mid and lo = mid + 1 (half-open).</text>
</svg>
