<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">0/1 vs Unbounded Knapsack — One Line of Code Differs</text>

  <!-- 0/1 panel -->
  <rect x="40" y="70" width="400" height="220" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="240" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">0/1 — each item at most once</text>
  <text x="60" y="125" font-size="12" fill="#1a1822" font-family="monospace">dp = [0] * (W+1)</text>
  <text x="60" y="143" font-size="12" fill="#1a1822" font-family="monospace">for i in 1..n:</text>
  <text x="60" y="161" font-size="12" fill="#cc4444" font-family="monospace" font-weight="700">    for w in W, W-1, ..., wᵢ:</text>
  <text x="60" y="179" font-size="12" fill="#1a1822" font-family="monospace">        dp[w] = max(dp[w],</text>
  <text x="60" y="197" font-size="12" fill="#1a1822" font-family="monospace">                    dp[w-wᵢ] + vᵢ)</text>
  <text x="60" y="225" font-size="11" fill="#1a1822">High→low ensures dp[w-wᵢ] still refers to</text>
  <text x="60" y="242" font-size="11" fill="#1a1822">the previous row — item not reused.</text>
  <text x="60" y="270" font-size="11" font-weight="700" fill="#4caf50">Semantic: take each item 0 or 1 times.</text>

  <!-- Unbounded panel -->
  <rect x="460" y="70" width="400" height="220" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="660" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">Unbounded — each item any times</text>
  <text x="480" y="125" font-size="12" fill="#1a1822" font-family="monospace">dp = [0] * (W+1)</text>
  <text x="480" y="143" font-size="12" fill="#1a1822" font-family="monospace">for i in 1..n:</text>
  <text x="480" y="161" font-size="12" fill="#4caf50" font-family="monospace" font-weight="700">    for w in wᵢ, wᵢ+1, ..., W:</text>
  <text x="480" y="179" font-size="12" fill="#1a1822" font-family="monospace">        dp[w] = max(dp[w],</text>
  <text x="480" y="197" font-size="12" fill="#1a1822" font-family="monospace">                    dp[w-wᵢ] + vᵢ)</text>
  <text x="480" y="225" font-size="11" fill="#1a1822">Low→high: dp[w-wᵢ] may already include</text>
  <text x="480" y="242" font-size="11" fill="#1a1822">item i — effectively reuses it.</text>
  <text x="480" y="270" font-size="11" font-weight="700" fill="#4caf50">Semantic: take each item any number of times.</text>

  <!-- Variants table -->
  <rect x="40" y="310" width="820" height="175" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="333" font-size="14" font-weight="700" fill="#6d5bd0">Knapsack variants at a glance</text>

  <line x1="40" y1="345" x2="860" y2="345" stroke="#6d5bd0" opacity="0.5"/>
  <g font-size="11">
    <text x="60" y="365" font-weight="700" fill="#1a1822">Variant</text>
    <text x="260" y="365" font-weight="700" fill="#1a1822">Constraint</text>
    <text x="520" y="365" font-weight="700" fill="#1a1822">State</text>
    <text x="720" y="365" font-weight="700" fill="#1a1822">Complexity</text>

    <text x="60" y="388">0/1 knapsack</text>
    <text x="260" y="388">each item ≤ 1</text>
    <text x="520" y="388">(i, w)</text>
    <text x="720" y="388">O(nW)</text>

    <text x="60" y="408">Unbounded</text>
    <text x="260" y="408">unlimited copies</text>
    <text x="520" y="408">(w)</text>
    <text x="720" y="408">O(nW)</text>

    <text x="60" y="428">Bounded (k copies)</text>
    <text x="260" y="428">≤ k of each</text>
    <text x="520" y="428">(i, w)</text>
    <text x="720" y="428">O(nW log k) bin grouping</text>

    <text x="60" y="448">Subset sum</text>
    <text x="260" y="448">sum = S exactly</text>
    <text x="520" y="448">(i, s)</text>
    <text x="720" y="448">O(nS)</text>

    <text x="60" y="468">2D knapsack</text>
    <text x="260" y="468">2 constraints</text>
    <text x="520" y="468">(i, w1, w2)</text>
    <text x="720" y="468">O(n·W₁·W₂)</text>
  </g>
</svg>
