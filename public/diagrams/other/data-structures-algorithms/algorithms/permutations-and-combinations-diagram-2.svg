<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Counting Identities &amp; Counts</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">Count formulas</text>
  <text x="60" y="112" font-size="12" font-family="monospace">P(n, k) = n! / (n − k)!     (k-permutations of n)</text>
  <text x="60" y="135" font-size="12" font-family="monospace">C(n, k) = n! / (k! · (n − k)!)    (k-combinations of n)</text>
  <text x="60" y="158" font-size="12" font-family="monospace">|2^S| = 2ⁿ                  (subsets of n-element set)</text>
  <text x="60" y="181" font-size="12" font-family="monospace">Multinomial: n! / (n₁! · n₂! · … · n_k!)   (with k buckets)</text>
  <text x="60" y="204" font-size="12" font-family="monospace">Catalan(n) = C(2n, n) / (n+1)              (balanced parentheses, BST count)</text>
  <text x="60" y="227" font-size="12" font-family="monospace">Bell(n) = sum of Stirling(n, k)             (set partitions)</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="305" font-size="13" font-weight="700" fill="#4caf50">Practical sizes</text>
  <g font-size="11">
    <text x="60" y="335" font-weight="700">n</text>
    <text x="200" y="335" font-weight="700">2ⁿ (subsets)</text>
    <text x="380" y="335" font-weight="700">n! (perms)</text>
    <text x="560" y="335" font-weight="700">C(n, n/2)</text>
    <text x="720" y="335" font-weight="700">n^n</text>

    <text x="60" y="358">10</text><text x="200" y="358">1 024</text>
    <text x="380" y="358">3 628 800</text><text x="560" y="358">252</text><text x="720" y="358">10¹⁰</text>

    <text x="60" y="378">15</text><text x="200" y="378">32 768</text>
    <text x="380" y="378">1.3 × 10¹²</text><text x="560" y="378">6 435</text><text x="720" y="378">≈10¹⁸</text>

    <text x="60" y="398">20</text><text x="200" y="398">10⁶</text>
    <text x="380" y="398">2.4 × 10¹⁸</text><text x="560" y="398">184 756</text>

    <text x="60" y="418">30</text><text x="200" y="418">10⁹</text>
    <text x="380" y="418">2.6 × 10³²</text><text x="560" y="418">155 M</text>

    <text x="60" y="442" fill="#cc4444">Permutations explode by n=15. Combinations C(n, n/2) tractable to n≈30.</text>
    <text x="60" y="462" fill="#4caf50">Bitmask DP (Held-Karp etc.) on subsets is feasible for n ≤ 22 (~10⁹ states).</text>
  </g>
</svg>
