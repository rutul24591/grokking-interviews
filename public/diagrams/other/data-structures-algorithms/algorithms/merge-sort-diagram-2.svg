<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">The Merge Step — Stable Two-Pointer with Ties-Go-Left</text>

  <text x="60" y="85" font-size="14" font-weight="700" fill="#6d5bd0">Left (sorted):</text>
  <g transform="translate(200,65)">
    <rect x="0" y="0" width="50" height="30" fill="#a89bec"/><text x="25" y="20" text-anchor="middle" font-size="12">2</text>
    <rect x="52" y="0" width="50" height="30" fill="#a89bec"/><text x="77" y="20" text-anchor="middle" font-size="12">4a</text>
    <rect x="104" y="0" width="50" height="30" fill="#a89bec"/><text x="129" y="20" text-anchor="middle" font-size="12">5</text>
    <rect x="156" y="0" width="50" height="30" fill="#a89bec"/><text x="181" y="20" text-anchor="middle" font-size="12">7</text>
  </g>
  <text x="450" y="85" font-size="14" font-weight="700" fill="#6d5bd0">Right (sorted):</text>
  <g transform="translate(600,65)">
    <rect x="0" y="0" width="50" height="30" fill="#a89bec"/><text x="25" y="20" text-anchor="middle" font-size="12">3</text>
    <rect x="52" y="0" width="50" height="30" fill="#a89bec"/><text x="77" y="20" text-anchor="middle" font-size="12">4b</text>
    <rect x="104" y="0" width="50" height="30" fill="#a89bec"/><text x="129" y="20" text-anchor="middle" font-size="12">6</text>
    <rect x="156" y="0" width="50" height="30" fill="#a89bec"/><text x="181" y="20" text-anchor="middle" font-size="12">9</text>
  </g>
  <text x="200" y="120" font-size="11" fill="#1a1822">(4a and 4b are equal keys from different original positions)</text>

  <!-- Merge steps -->
  <text x="60" y="160" font-size="13" font-weight="700" fill="#6d5bd0">Step-by-step</text>
  <g font-size="12" fill="#1a1822">
    <text x="80" y="185">1. compare L[0]=2 vs R[0]=3 → emit 2 (L advances)</text>
    <text x="80" y="205">2. compare L[1]=4a vs R[0]=3 → emit 3 (R advances)</text>
    <text x="80" y="225">3. compare L[1]=4a vs R[1]=4b → <tspan fill="#cc4444" font-weight="700">4a ≤ 4b → emit 4a</tspan> (L advances) ← ties go left</text>
    <text x="80" y="245">4. compare L[2]=5 vs R[1]=4b → emit 4b (R advances)</text>
    <text x="80" y="265">5. compare L[2]=5 vs R[2]=6 → emit 5 (L advances)</text>
    <text x="80" y="285">6. compare L[3]=7 vs R[2]=6 → emit 6 (R advances)</text>
    <text x="80" y="305">7. compare L[3]=7 vs R[3]=9 → emit 7 (L advances)</text>
    <text x="80" y="325">8. left exhausted → copy remainder [9]</text>
  </g>

  <text x="60" y="365" font-size="14" font-weight="700" fill="#4caf50">Output:</text>
  <g transform="translate(160,345)">
    <rect x="0" y="0" width="45" height="30" fill="#4caf50"/><text x="22" y="20" text-anchor="middle" fill="#fff" font-size="12">2</text>
    <rect x="47" y="0" width="45" height="30" fill="#4caf50"/><text x="69" y="20" text-anchor="middle" fill="#fff" font-size="12">3</text>
    <rect x="94" y="0" width="45" height="30" fill="#cc4444"/><text x="116" y="20" text-anchor="middle" fill="#fff" font-size="12">4a</text>
    <rect x="141" y="0" width="45" height="30" fill="#cc4444"/><text x="163" y="20" text-anchor="middle" fill="#fff" font-size="12">4b</text>
    <rect x="188" y="0" width="45" height="30" fill="#4caf50"/><text x="210" y="20" text-anchor="middle" fill="#fff" font-size="12">5</text>
    <rect x="235" y="0" width="45" height="30" fill="#4caf50"/><text x="257" y="20" text-anchor="middle" fill="#fff" font-size="12">6</text>
    <rect x="282" y="0" width="45" height="30" fill="#4caf50"/><text x="304" y="20" text-anchor="middle" fill="#fff" font-size="12">7</text>
    <rect x="329" y="0" width="45" height="30" fill="#4caf50"/><text x="351" y="20" text-anchor="middle" fill="#fff" font-size="12">9</text>
  </g>
  <text x="560" y="365" font-size="12" fill="#4caf50" font-weight="700">✓ stable: 4a before 4b</text>

  <rect x="60" y="400" width="780" height="90" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="80" y="425" font-size="14" font-weight="700" fill="#6d5bd0">Stability rule (the single line that matters)</text>
  <text x="80" y="448" font-size="13" fill="#1a1822">if (left[i] &lt;= right[j]) emit left[i]; else emit right[j];</text>
  <text x="80" y="468" font-size="13" fill="#1a1822">The &quot;≤&quot; on the left is what preserves stability — equal keys from left come out first.</text>
  <text x="80" y="485" font-size="13" fill="#cc4444">Change to &quot;&lt;&quot; (strict) and 4a/4b flip: stability silently lost.</text>
</svg>
