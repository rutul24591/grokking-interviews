<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Subtree DP — Max Independent Set on a Tree</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">Pick a maximum-weight set of nodes with no two adjacent. dp[u][0/1] = best in subtree(u), u not/taken.</text>

  <!-- Tree -->
  <g transform="translate(80,90)">
    <circle cx="350" cy="0" r="22" fill="#6d5bd0"/><text x="350" y="5" text-anchor="middle" fill="#fff" font-weight="700">10</text>
    <text x="350" y="-30" text-anchor="middle" font-size="10">root</text>

    <circle cx="200" cy="80" r="22" fill="#a89bec"/><text x="200" y="85" text-anchor="middle" font-weight="700">5</text>
    <circle cx="500" cy="80" r="22" fill="#a89bec"/><text x="500" y="85" text-anchor="middle" font-weight="700">6</text>

    <circle cx="100" cy="170" r="22" fill="#e8e4f8" stroke="#6d5bd0"/><text x="100" y="175" text-anchor="middle">3</text>
    <circle cx="300" cy="170" r="22" fill="#e8e4f8" stroke="#6d5bd0"/><text x="300" y="175" text-anchor="middle">8</text>
    <circle cx="440" cy="170" r="22" fill="#e8e4f8" stroke="#6d5bd0"/><text x="440" y="175" text-anchor="middle">2</text>
    <circle cx="580" cy="170" r="22" fill="#e8e4f8" stroke="#6d5bd0"/><text x="580" y="175" text-anchor="middle">4</text>

    <line x1="335" y1="18" x2="215" y2="62" stroke="#6d5bd0"/>
    <line x1="365" y1="18" x2="485" y2="62" stroke="#6d5bd0"/>
    <line x1="185" y1="98" x2="115" y2="152" stroke="#6d5bd0"/>
    <line x1="215" y1="98" x2="285" y2="152" stroke="#6d5bd0"/>
    <line x1="485" y1="98" x2="455" y2="152" stroke="#6d5bd0"/>
    <line x1="515" y1="98" x2="565" y2="152" stroke="#6d5bd0"/>
  </g>

  <!-- DP box -->
  <rect x="40" y="285" width="820" height="195" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="310" font-size="13" font-weight="700" fill="#6d5bd0">Recurrence — post-order (children before parent)</text>
  <text x="60" y="335" font-size="11" fill="#1a1822" font-family="monospace">dp[u][0] = Σ over children c of max(dp[c][0], dp[c][1])   # u not taken</text>
  <text x="60" y="355" font-size="11" fill="#1a1822" font-family="monospace">dp[u][1] = w[u] + Σ over children c of dp[c][0]          # u taken → c not taken</text>
  <text x="60" y="382" font-size="11" fill="#1a1822" font-weight="700">Leaf base case:</text>
  <text x="60" y="400" font-size="11" fill="#1a1822" font-family="monospace">  dp[leaf][0] = 0,  dp[leaf][1] = w[leaf]</text>
  <text x="60" y="427" font-size="11" fill="#1a1822" font-weight="700">Answer:</text>
  <text x="60" y="445" font-size="11" fill="#1a1822" font-family="monospace">  max(dp[root][0], dp[root][1])</text>
  <text x="60" y="468" font-size="11" fill="#4caf50" font-weight="700">Complexity: Θ(n) time, Θ(n) space (one DFS).</text>
</svg>
