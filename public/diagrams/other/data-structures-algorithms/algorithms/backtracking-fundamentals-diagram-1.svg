<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Backtracking — DFS on a State-Space Tree with Pruning</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">Template</text>
  <text x="60" y="112" font-size="11" font-family="monospace">backtrack(state):</text>
  <text x="60" y="130" font-size="11" font-family="monospace">  if is_solution(state): record(state); return</text>
  <text x="60" y="148" font-size="11" font-family="monospace">  for choice in candidates(state):</text>
  <text x="60" y="166" font-size="11" font-family="monospace">    if is_valid(state, choice):</text>
  <text x="60" y="184" font-size="11" font-family="monospace">      apply(state, choice)</text>
  <text x="60" y="202" font-size="11" font-family="monospace">      backtrack(state)</text>
  <text x="60" y="220" font-size="11" font-family="monospace">      undo(state, choice)   ← the &quot;back&quot; in backtracking</text>
  <text x="60" y="248" font-size="11" fill="#4caf50" font-weight="700">Choose → Explore → Unchoose. The undo step is what distinguishes BT from plain DFS.</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="305" font-size="13" font-weight="700" fill="#4caf50">State-space tree (subsets of {1,2,3})</text>
  <g transform="translate(450,330)"><circle r="14" fill="#a89bec" stroke="#6d5bd0"/><text text-anchor="middle" y="4" font-size="9">∅</text></g>
  <line x1="450" y1="344" x2="280" y2="380" stroke="#6d5bd0"/>
  <line x1="450" y1="344" x2="620" y2="380" stroke="#6d5bd0"/>
  <g transform="translate(280,390)"><circle r="14" fill="#a89bec" stroke="#6d5bd0"/><text text-anchor="middle" y="4" font-size="9">{1}</text></g>
  <g transform="translate(620,390)"><circle r="14" fill="#a89bec" stroke="#6d5bd0"/><text text-anchor="middle" y="4" font-size="9">∅</text></g>
  <line x1="280" y1="404" x2="180" y2="440" stroke="#6d5bd0"/>
  <line x1="280" y1="404" x2="380" y2="440" stroke="#6d5bd0"/>
  <line x1="620" y1="404" x2="520" y2="440" stroke="#6d5bd0"/>
  <line x1="620" y1="404" x2="720" y2="440" stroke="#6d5bd0"/>
  <g font-size="9">
    <text x="180" y="445" text-anchor="middle">{1,2}</text>
    <text x="380" y="445" text-anchor="middle">{1}</text>
    <text x="520" y="445" text-anchor="middle">{2}</text>
    <text x="720" y="445" text-anchor="middle">∅</text>
  </g>
  <text x="60" y="335" font-size="11">Each node = partial state.</text>
  <text x="60" y="355" font-size="11">Each edge = include / exclude</text>
  <text x="60" y="370" font-size="11">a candidate.</text>
  <text x="60" y="395" font-size="11">Pruning cuts subtrees that can't</text>
  <text x="60" y="410" font-size="11">extend to a solution.</text>
  <text x="60" y="440" font-size="11" fill="#cc4444">Without pruning: 2ⁿ leaves</text>
  <text x="60" y="455" font-size="11" fill="#4caf50">With smart pruning: often ≪ 2ⁿ</text>
</svg>
