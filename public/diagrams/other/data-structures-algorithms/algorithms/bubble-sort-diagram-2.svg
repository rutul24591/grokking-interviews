<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Bubble-Sort Family — Standard vs Cocktail Shaker vs Comb</text>

  <!-- Standard Bubble -->
  <rect x="40" y="70" width="260" height="180" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="170" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">Standard Bubble</text>
  <text x="60" y="120" font-size="12" fill="#1a1822">Direction: left → right only</text>
  <text x="60" y="140" font-size="12" fill="#1a1822">Gap: 1 (adjacent only)</text>
  <g transform="translate(60,160)">
    <rect x="0" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="15" y="20" text-anchor="middle" font-size="12">3</text>
    <rect x="32" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="47" y="20" text-anchor="middle" font-size="12">7</text>
    <rect x="64" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="79" y="20" text-anchor="middle" font-size="12">1</text>
    <rect x="96" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="111" y="20" text-anchor="middle" font-size="12">5</text>
    <rect x="128" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="143" y="20" text-anchor="middle" font-size="12">2</text>
    <path d="M0 45 L158 45" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr1)"/>
  </g>
  <text x="60" y="230" font-size="12" fill="#cc4444">Turtles (small tail) creep 1/pass</text>
  <text x="60" y="245" font-size="12" fill="#1a1822">O(n²) worst; O(n) best w/ flag</text>

  <!-- Cocktail Shaker -->
  <rect x="320" y="70" width="260" height="180" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="450" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">Cocktail Shaker</text>
  <text x="340" y="120" font-size="12" fill="#1a1822">Direction: alternates ↔</text>
  <text x="340" y="140" font-size="12" fill="#1a1822">Gap: 1 (adjacent only)</text>
  <g transform="translate(340,160)">
    <rect x="0" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="15" y="20" text-anchor="middle" font-size="12">3</text>
    <rect x="32" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="47" y="20" text-anchor="middle" font-size="12">7</text>
    <rect x="64" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="79" y="20" text-anchor="middle" font-size="12">1</text>
    <rect x="96" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="111" y="20" text-anchor="middle" font-size="12">5</text>
    <rect x="128" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="143" y="20" text-anchor="middle" font-size="12">2</text>
    <path d="M0 45 L158 45" stroke="#6d5bd0" stroke-width="2" marker-end="url(#arr1)"/>
    <path d="M158 55 L0 55" stroke="#4caf50" stroke-width="2" marker-end="url(#arr2)"/>
  </g>
  <text x="340" y="230" font-size="12" fill="#4caf50">Turtles escape on reverse pass</text>
  <text x="340" y="245" font-size="12" fill="#1a1822">O(n²) worst; ~½ constant factor</text>

  <!-- Comb Sort -->
  <rect x="600" y="70" width="260" height="180" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="730" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">Comb Sort</text>
  <text x="620" y="120" font-size="12" fill="#1a1822">Direction: left → right</text>
  <text x="620" y="140" font-size="12" fill="#1a1822">Gap: n/1.3 → ... → 1</text>
  <g transform="translate(620,160)">
    <rect x="0" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="15" y="20" text-anchor="middle" font-size="12">3</text>
    <rect x="32" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="47" y="20" text-anchor="middle" font-size="12">7</text>
    <rect x="64" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="79" y="20" text-anchor="middle" font-size="12">1</text>
    <rect x="96" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="111" y="20" text-anchor="middle" font-size="12">5</text>
    <rect x="128" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/><text x="143" y="20" text-anchor="middle" font-size="12">2</text>
    <path d="M15 48 Q80 70 143 48" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arr2)"/>
  </g>
  <text x="620" y="230" font-size="12" fill="#4caf50">Big gaps kill turtles fast</text>
  <text x="620" y="245" font-size="12" fill="#1a1822">Expected ~O(n log n) random</text>

  <!-- Odd-Even parallel -->
  <rect x="40" y="280" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="450" y="305" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">Odd-Even (Brick) Sort — Parallel Descendant</text>
  <text x="60" y="330" font-size="13" fill="#1a1822">Phase 1 (even pairs, all independent): compare (0,1) (2,3) (4,5) ... in parallel</text>
  <g transform="translate(60,340)">
    <rect x="0" y="0" width="30" height="30" fill="#4caf50" stroke="#1a1822"/><rect x="30" y="0" width="30" height="30" fill="#4caf50" stroke="#1a1822"/>
    <rect x="70" y="0" width="30" height="30" fill="#4caf50" stroke="#1a1822"/><rect x="100" y="0" width="30" height="30" fill="#4caf50" stroke="#1a1822"/>
    <rect x="140" y="0" width="30" height="30" fill="#4caf50" stroke="#1a1822"/><rect x="170" y="0" width="30" height="30" fill="#4caf50" stroke="#1a1822"/>
    <rect x="210" y="0" width="30" height="30" fill="#4caf50" stroke="#1a1822"/><rect x="240" y="0" width="30" height="30" fill="#4caf50" stroke="#1a1822"/>
    <text x="290" y="20" font-size="12" fill="#1a1822">↕ each pair → 1 clock on n/2 processors</text>
  </g>
  <text x="60" y="400" font-size="13" fill="#1a1822">Phase 2 (odd pairs, all independent): compare (1,2) (3,4) (5,6) ... in parallel</text>
  <g transform="translate(60,410)">
    <rect x="0" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/>
    <rect x="30" y="0" width="30" height="30" fill="#cc4444" stroke="#1a1822"/><rect x="60" y="0" width="30" height="30" fill="#cc4444" stroke="#1a1822"/>
    <rect x="100" y="0" width="30" height="30" fill="#cc4444" stroke="#1a1822"/><rect x="130" y="0" width="30" height="30" fill="#cc4444" stroke="#1a1822"/>
    <rect x="170" y="0" width="30" height="30" fill="#cc4444" stroke="#1a1822"/><rect x="200" y="0" width="30" height="30" fill="#cc4444" stroke="#1a1822"/>
    <rect x="240" y="0" width="30" height="30" fill="#a89bec" stroke="#1a1822"/>
    <text x="290" y="20" font-size="12" fill="#1a1822">→ total depth O(n), O(log² n) in bitonic</text>
  </g>
  <text x="60" y="470" font-size="12" fill="#1a1822" font-style="italic">Used on GPUs (CUB, Thrust) to sort fixed-size warp batches where branch-free compare-exchange wins.</text>

  <defs>
    <marker id="arr1" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6d5bd0"/></marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#4caf50"/></marker>
  </defs>
</svg>
