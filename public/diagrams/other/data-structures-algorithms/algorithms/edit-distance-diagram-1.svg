<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Edit Distance (Levenshtein) — "kitten" → "sitting"</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">Three operations: insert, delete, substitute. Each costs 1. Answer = dp[m][n].</text>

  <!-- DP table -->
  <g transform="translate(80,90)" font-size="12" font-family="monospace">
    <!-- header row -->
    <text x="0" y="0" font-weight="700" fill="#6d5bd0">""</text>
    <text x="60" y="0" text-anchor="middle" font-weight="700" fill="#6d5bd0">""</text>
    <text x="100" y="0" text-anchor="middle" font-weight="700" fill="#6d5bd0">s</text>
    <text x="140" y="0" text-anchor="middle" font-weight="700" fill="#6d5bd0">i</text>
    <text x="180" y="0" text-anchor="middle" font-weight="700" fill="#6d5bd0">t</text>
    <text x="220" y="0" text-anchor="middle" font-weight="700" fill="#6d5bd0">t</text>
    <text x="260" y="0" text-anchor="middle" font-weight="700" fill="#6d5bd0">i</text>
    <text x="300" y="0" text-anchor="middle" font-weight="700" fill="#6d5bd0">n</text>
    <text x="340" y="0" text-anchor="middle" font-weight="700" fill="#6d5bd0">g</text>

    <!-- rows: "", k, i, t, t, e, n -->
    <g transform="translate(0,25)"><text x="0" y="0" font-weight="700" fill="#6d5bd0">""</text>
      <rect x="40" y="-15" width="40" height="22" fill="#e8e4f8" stroke="#6d5bd0"/><text x="60" y="0" text-anchor="middle">0</text>
      <rect x="80" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="100" y="0" text-anchor="middle">1</text>
      <rect x="120" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="140" y="0" text-anchor="middle">2</text>
      <rect x="160" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="180" y="0" text-anchor="middle">3</text>
      <rect x="200" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="220" y="0" text-anchor="middle">4</text>
      <rect x="240" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="260" y="0" text-anchor="middle">5</text>
      <rect x="280" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="300" y="0" text-anchor="middle">6</text>
      <rect x="320" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="340" y="0" text-anchor="middle">7</text>
    </g>
    <g transform="translate(0,50)"><text x="0" y="0" font-weight="700" fill="#6d5bd0">k</text>
      <rect x="40" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="60" y="0" text-anchor="middle">1</text>
      <rect x="80" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="100" y="0" text-anchor="middle">1</text>
      <rect x="120" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="140" y="0" text-anchor="middle">2</text>
      <rect x="160" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="180" y="0" text-anchor="middle">3</text>
      <rect x="200" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="220" y="0" text-anchor="middle">4</text>
      <rect x="240" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="260" y="0" text-anchor="middle">5</text>
      <rect x="280" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="300" y="0" text-anchor="middle">6</text>
      <rect x="320" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="340" y="0" text-anchor="middle">7</text>
    </g>
    <g transform="translate(0,75)"><text x="0" y="0" font-weight="700" fill="#6d5bd0">i</text>
      <rect x="40" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="60" y="0" text-anchor="middle">2</text>
      <rect x="80" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="100" y="0" text-anchor="middle">2</text>
      <rect x="120" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="140" y="0" text-anchor="middle">1</text>
      <rect x="160" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="180" y="0" text-anchor="middle">2</text>
      <rect x="200" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="220" y="0" text-anchor="middle">3</text>
      <rect x="240" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="260" y="0" text-anchor="middle">4</text>
      <rect x="280" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="300" y="0" text-anchor="middle">5</text>
      <rect x="320" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="340" y="0" text-anchor="middle">6</text>
    </g>
    <g transform="translate(0,100)"><text x="0" y="0" font-weight="700" fill="#6d5bd0">t</text>
      <rect x="40" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="60" y="0" text-anchor="middle">3</text>
      <rect x="80" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="100" y="0" text-anchor="middle">3</text>
      <rect x="120" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="140" y="0" text-anchor="middle">2</text>
      <rect x="160" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="180" y="0" text-anchor="middle">1</text>
      <rect x="200" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="220" y="0" text-anchor="middle">2</text>
      <rect x="240" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="260" y="0" text-anchor="middle">3</text>
      <rect x="280" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="300" y="0" text-anchor="middle">4</text>
      <rect x="320" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="340" y="0" text-anchor="middle">5</text>
    </g>
    <g transform="translate(0,125)"><text x="0" y="0" font-weight="700" fill="#6d5bd0">t</text>
      <rect x="40" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="60" y="0" text-anchor="middle">4</text>
      <rect x="80" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="100" y="0" text-anchor="middle">4</text>
      <rect x="120" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="140" y="0" text-anchor="middle">3</text>
      <rect x="160" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="180" y="0" text-anchor="middle">2</text>
      <rect x="200" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="220" y="0" text-anchor="middle">1</text>
      <rect x="240" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="260" y="0" text-anchor="middle">2</text>
      <rect x="280" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="300" y="0" text-anchor="middle">3</text>
      <rect x="320" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="340" y="0" text-anchor="middle">4</text>
    </g>
    <g transform="translate(0,150)"><text x="0" y="0" font-weight="700" fill="#6d5bd0">e</text>
      <rect x="40" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="60" y="0" text-anchor="middle">5</text>
      <rect x="80" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="100" y="0" text-anchor="middle">5</text>
      <rect x="120" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="140" y="0" text-anchor="middle">4</text>
      <rect x="160" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="180" y="0" text-anchor="middle">3</text>
      <rect x="200" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="220" y="0" text-anchor="middle">2</text>
      <rect x="240" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="260" y="0" text-anchor="middle">2</text>
      <rect x="280" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="300" y="0" text-anchor="middle">3</text>
      <rect x="320" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="340" y="0" text-anchor="middle">4</text>
    </g>
    <g transform="translate(0,175)"><text x="0" y="0" font-weight="700" fill="#6d5bd0">n</text>
      <rect x="40" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="60" y="0" text-anchor="middle">6</text>
      <rect x="80" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="100" y="0" text-anchor="middle">6</text>
      <rect x="120" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="140" y="0" text-anchor="middle">5</text>
      <rect x="160" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="180" y="0" text-anchor="middle">4</text>
      <rect x="200" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="220" y="0" text-anchor="middle">3</text>
      <rect x="240" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="260" y="0" text-anchor="middle">3</text>
      <rect x="280" y="-15" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="300" y="0" text-anchor="middle">2</text>
      <rect x="320" y="-15" width="40" height="22" fill="#cc4444"/><text x="340" y="0" text-anchor="middle" fill="#fff" font-weight="700">3</text>
    </g>
  </g>

  <!-- Recurrence -->
  <rect x="500" y="310" width="360" height="160" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="520" y="335" font-size="13" font-weight="700" fill="#6d5bd0">Recurrence</text>
  <text x="520" y="360" font-size="11" fill="#1a1822" font-family="monospace">if a[i-1] == b[j-1]:</text>
  <text x="520" y="378" font-size="11" fill="#1a1822" font-family="monospace">  dp[i][j] = dp[i-1][j-1]</text>
  <text x="520" y="400" font-size="11" fill="#1a1822" font-family="monospace">else:</text>
  <text x="520" y="418" font-size="11" fill="#1a1822" font-family="monospace">  dp[i][j] = 1 + min(</text>
  <text x="520" y="436" font-size="11" fill="#1a1822" font-family="monospace">    dp[i-1][j],   # delete</text>
  <text x="520" y="454" font-size="11" fill="#1a1822" font-family="monospace">    dp[i][j-1],   # insert</text>
  <text x="520" y="472" font-size="11" fill="#1a1822" font-family="monospace">    dp[i-1][j-1]) # substitute</text>

  <text x="60" y="340" font-size="12" font-weight="700" fill="#cc4444">Answer dp[6][7] = 3</text>
  <text x="60" y="358" font-size="11" fill="#1a1822">k→s (sub), e→i (sub), +g (insert).</text>
</svg>
