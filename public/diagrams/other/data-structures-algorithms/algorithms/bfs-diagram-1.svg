<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Breadth-First Search — Layer-by-Layer Exploration</text>

  <rect x="40" y="60" width="420" height="380" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">BFS tree from source S</text>
  <g transform="translate(230,120)">
    <circle cx="0" cy="0" r="20" fill="#cc4444" stroke="#1a1822" stroke-width="2"/><text x="0" y="5" text-anchor="middle" fill="#fff" font-weight="700">S</text>
    <line x1="-10" y1="15" x2="-100" y2="55" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="0" y1="20" x2="0" y2="55" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="10" y1="15" x2="100" y2="55" stroke="#6d5bd0" stroke-width="2"/>
    <circle cx="-110" cy="80" r="18" fill="#a89bec" stroke="#1a1822"/><text x="-110" y="85" text-anchor="middle" font-weight="700">A</text>
    <circle cx="0" cy="80" r="18" fill="#a89bec" stroke="#1a1822"/><text x="0" y="85" text-anchor="middle" font-weight="700">B</text>
    <circle cx="110" cy="80" r="18" fill="#a89bec" stroke="#1a1822"/><text x="110" y="85" text-anchor="middle" font-weight="700">C</text>
    <text x="-160" y="85" font-size="11" fill="#4caf50">depth 1</text>

    <line x1="-110" y1="98" x2="-150" y2="155" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="-110" y1="98" x2="-70" y2="155" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="0" y1="98" x2="-20" y2="155" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="0" y1="98" x2="50" y2="155" stroke="#6d5bd0" stroke-width="2"/>
    <line x1="110" y1="98" x2="140" y2="155" stroke="#6d5bd0" stroke-width="2"/>
    <circle cx="-160" cy="180" r="16" fill="#fff" stroke="#1a1822"/><text x="-160" y="185" text-anchor="middle">D</text>
    <circle cx="-70" cy="180" r="16" fill="#fff" stroke="#1a1822"/><text x="-70" y="185" text-anchor="middle">E</text>
    <circle cx="-20" cy="180" r="16" fill="#fff" stroke="#1a1822"/><text x="-20" y="185" text-anchor="middle">F</text>
    <circle cx="50" cy="180" r="16" fill="#fff" stroke="#1a1822"/><text x="50" y="185" text-anchor="middle">G</text>
    <circle cx="140" cy="180" r="16" fill="#fff" stroke="#1a1822"/><text x="140" y="185" text-anchor="middle">H</text>
    <text x="-210" y="185" font-size="11" fill="#4caf50">depth 2</text>
  </g>
  <text x="60" y="345" font-size="11">Visit S, then all distance-1 nodes, then all distance-2, ...</text>
  <text x="60" y="365" font-size="11">Implemented with a FIFO queue: enqueue source, dequeue/explore, enqueue unvisited.</text>
  <text x="60" y="395" font-size="11" fill="#4caf50" font-weight="700">Output: shortest paths in unweighted graphs.</text>
  <text x="60" y="415" font-size="11">Time: O(V + E)   Space: O(V) for queue + visited.</text>

  <rect x="480" y="60" width="380" height="180" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="500" y="85" font-size="13" font-weight="700" fill="#4caf50">Algorithm</text>
  <text x="500" y="115" font-size="11" font-family="monospace">visited = {s}</text>
  <text x="500" y="133" font-size="11" font-family="monospace">queue = [s]</text>
  <text x="500" y="151" font-size="11" font-family="monospace">while queue:</text>
  <text x="500" y="169" font-size="11" font-family="monospace">  u = queue.popleft()</text>
  <text x="500" y="187" font-size="11" font-family="monospace">  for v in adj[u]:</text>
  <text x="500" y="205" font-size="11" font-family="monospace">    if v not in visited:</text>
  <text x="500" y="223" font-size="11" font-family="monospace">      visited.add(v)</text>
  <text x="500" y="241" font-size="11" font-family="monospace">      queue.append(v)</text>

  <rect x="480" y="260" width="380" height="180" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="500" y="285" font-size="13" font-weight="700" fill="#6d5bd0">Variants</text>
  <text x="500" y="310" font-size="11">• Multi-source BFS: enqueue many seeds.</text>
  <text x="500" y="330" font-size="11">• 0-1 BFS: deque with pushFront for 0-weight</text>
  <text x="500" y="348" font-size="11">  edges, pushBack for 1-weight. O(V + E).</text>
  <text x="500" y="370" font-size="11">• Bidirectional BFS: meet in middle, ~√ work.</text>
  <text x="500" y="390" font-size="11">• Dial's algorithm: bucket queue for small</text>
  <text x="500" y="408" font-size="11">  integer weights.</text>
  <text x="500" y="428" font-size="11">• Lazy deletion BFS for streaming graphs.</text>
</svg>
