<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Bubble Sort — Legitimate Niches vs Anti-Patterns</text>

  <!-- Decision tree -->
  <rect x="350" y="65" width="200" height="50" fill="#6d5bd0" stroke="#1a1822" rx="6"/>
  <text x="450" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Need to sort?</text>
  <text x="450" y="108" text-anchor="middle" font-size="12" fill="#fff">what context?</text>

  <!-- Branches -->
  <path d="M400 115 L120 170" stroke="#1a1822" fill="none" stroke-width="1.5"/>
  <path d="M450 115 L450 170" stroke="#1a1822" fill="none" stroke-width="1.5"/>
  <path d="M500 115 L780 170" stroke="#1a1822" fill="none" stroke-width="1.5"/>

  <!-- Production -->
  <rect x="40" y="170" width="220" height="90" fill="#cc4444" stroke="#1a1822" rx="6"/>
  <text x="150" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Production code</text>
  <text x="150" y="215" text-anchor="middle" font-size="12" fill="#fff">Tim Sort / Pdqsort / introsort</text>
  <text x="150" y="235" text-anchor="middle" font-size="12" fill="#fff">— never bubble sort —</text>
  <text x="150" y="252" text-anchor="middle" font-size="11" fill="#fff">O(n log n) worst case</text>

  <!-- Teaching -->
  <rect x="340" y="170" width="220" height="90" fill="#4caf50" stroke="#1a1822" rx="6"/>
  <text x="450" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Teaching / first sort</text>
  <text x="450" y="215" text-anchor="middle" font-size="12" fill="#fff">Establishes vocabulary:</text>
  <text x="450" y="232" text-anchor="middle" font-size="12" fill="#fff">passes, invariants,</text>
  <text x="450" y="248" text-anchor="middle" font-size="12" fill="#fff">stability, adaptiveness</text>

  <!-- Special niches -->
  <rect x="640" y="170" width="220" height="90" fill="#a89bec" stroke="#1a1822" rx="6"/>
  <text x="750" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1822">Parallel / embedded</text>
  <text x="750" y="215" text-anchor="middle" font-size="12" fill="#1a1822">Odd-even on GPU SIMT,</text>
  <text x="750" y="232" text-anchor="middle" font-size="12" fill="#1a1822">bitonic networks (CUB),</text>
  <text x="750" y="248" text-anchor="middle" font-size="12" fill="#1a1822">ROM-size-constrained MCUs</text>

  <!-- Performance table -->
  <rect x="80" y="290" width="740" height="180" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="450" y="315" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">Elementary Sort Comparison (n = 10,000 random integers)</text>
  <line x1="100" y1="335" x2="800" y2="335" stroke="#1a1822"/>
  <text x="120" y="355" font-size="13" font-weight="700" fill="#1a1822">Algorithm</text>
  <text x="320" y="355" font-size="13" font-weight="700" fill="#1a1822">Comparisons</text>
  <text x="500" y="355" font-size="13" font-weight="700" fill="#1a1822">Swaps/Shifts</text>
  <text x="680" y="355" font-size="13" font-weight="700" fill="#1a1822">Stable?</text>
  <line x1="100" y1="365" x2="800" y2="365" stroke="#1a1822"/>
  <text x="120" y="385" font-size="12" fill="#cc4444">Bubble (optimized)</text>
  <text x="320" y="385" font-size="12" fill="#1a1822">~2.5 × 10⁷</text>
  <text x="500" y="385" font-size="12" fill="#1a1822">~2.5 × 10⁷ swaps</text>
  <text x="680" y="385" font-size="12" fill="#4caf50">Yes</text>
  <text x="120" y="405" font-size="12" fill="#1a1822">Insertion</text>
  <text x="320" y="405" font-size="12" fill="#1a1822">~2.5 × 10⁷</text>
  <text x="500" y="405" font-size="12" fill="#1a1822">~1.25 × 10⁷ shifts</text>
  <text x="680" y="405" font-size="12" fill="#4caf50">Yes</text>
  <text x="120" y="425" font-size="12" fill="#1a1822">Selection</text>
  <text x="320" y="425" font-size="12" fill="#1a1822">~5 × 10⁷</text>
  <text x="500" y="425" font-size="12" fill="#1a1822">9,999 swaps</text>
  <text x="680" y="425" font-size="12" fill="#cc4444">No</text>
  <text x="120" y="445" font-size="12" fill="#4caf50">Merge (ref)</text>
  <text x="320" y="445" font-size="12" fill="#1a1822">~1.3 × 10⁵</text>
  <text x="500" y="445" font-size="12" fill="#1a1822">~1.3 × 10⁵ writes</text>
  <text x="680" y="445" font-size="12" fill="#4caf50">Yes</text>
  <text x="100" y="465" font-size="11" font-style="italic" fill="#1a1822">Bubble sort performs ~200× more work than merge sort at n=10k — the gap grows as n².</text>
</svg>
