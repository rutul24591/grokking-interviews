<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Held-Karp TSP — O(n² · 2ⁿ) DP over (visited-set, current-city)</text>

  <!-- State definition -->
  <rect x="40" y="60" width="820" height="115" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">State</text>
  <text x="60" y="108" font-size="11" fill="#1a1822" font-family="monospace">dp[mask][i] = min cost of a path starting at 0, visiting exactly the set `mask`, ending at city i.</text>
  <text x="60" y="128" font-size="11" fill="#1a1822">Base: dp[{0}][0] = 0.</text>
  <text x="60" y="148" font-size="11" fill="#1a1822" font-family="monospace">dp[mask][i] = min over j in mask\{i} of dp[mask \ {i}][j] + dist(j, i)</text>
  <text x="60" y="166" font-size="11" fill="#1a1822" font-family="monospace">answer = min over i ≠ 0 of dp[full][i] + dist(i, 0)</text>

  <!-- 4-city example -->
  <rect x="40" y="190" width="820" height="155" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="215" font-size="13" font-weight="700" fill="#6d5bd0">4 cities, starting at 0</text>
  <g transform="translate(150,240)">
    <circle cx="0" cy="40" r="20" fill="#6d5bd0"/><text x="0" y="45" text-anchor="middle" fill="#fff" font-weight="700">0</text>
    <circle cx="150" cy="0" r="20" fill="#a89bec"/><text x="150" y="5" text-anchor="middle" font-weight="700">1</text>
    <circle cx="300" cy="40" r="20" fill="#a89bec"/><text x="300" y="45" text-anchor="middle" font-weight="700">2</text>
    <circle cx="150" cy="80" r="20" fill="#a89bec"/><text x="150" y="85" text-anchor="middle" font-weight="700">3</text>
    <line x1="20" y1="40" x2="130" y2="5" stroke="#6d5bd0"/>
    <line x1="20" y1="40" x2="130" y2="75" stroke="#6d5bd0"/>
    <line x1="170" y1="0" x2="280" y2="35" stroke="#6d5bd0"/>
    <line x1="170" y1="80" x2="280" y2="45" stroke="#6d5bd0"/>
    <line x1="150" y1="20" x2="150" y2="60" stroke="#6d5bd0"/>
    <text x="60" y="15" font-size="10">10</text>
    <text x="60" y="75" font-size="10">15</text>
    <text x="230" y="15" font-size="10">25</text>
    <text x="230" y="75" font-size="10">30</text>
    <text x="160" y="45" font-size="10">35</text>

    <text x="430" y="20" font-size="11">dp[0001][0] = 0</text>
    <text x="430" y="38" font-size="11">dp[0011][1] = 10</text>
    <text x="430" y="56" font-size="11">dp[0101][2] = dp[0001][0] + 20 = 20</text>
    <text x="430" y="74" font-size="11">...</text>
    <text x="430" y="92" font-size="11" font-weight="700" fill="#4caf50">dp[1111][i] + dist(i, 0) → tour length</text>
  </g>

  <!-- Complexity -->
  <rect x="40" y="365" width="820" height="110" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="390" font-size="13" font-weight="700" fill="#4caf50">Complexity</text>
  <text x="60" y="415" font-size="11" fill="#1a1822">Time: Θ(n² · 2ⁿ) — for each of 2ⁿ masks, each of n end-cities, try n predecessors.</text>
  <text x="60" y="435" font-size="11" fill="#1a1822">Space: Θ(n · 2ⁿ) — stores dp table.</text>
  <text x="60" y="455" font-size="11" fill="#cc4444" font-weight="700">n=20 → ~400M ops, ~20M cells. Brute-force 20! ≈ 2.4·10¹⁸ — infeasible. DP is ~10⁸× faster.</text>
</svg>
