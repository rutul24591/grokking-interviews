<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Linear Search — Sequential Scan with Early Exit</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">target = 7; scan left→right, stop at first match.</text>

  <!-- Step 1 -->
  <text x="60" y="95" font-size="12" font-weight="700" fill="#6d5bd0">i=0:</text>
  <g transform="translate(120,80)" font-size="12">
    <rect x="0" y="0" width="50" height="30" fill="#cc4444"/><text x="25" y="20" text-anchor="middle" fill="#fff" font-weight="700">4</text>
    <rect x="52" y="0" width="50" height="30" fill="#a89bec"/><text x="77" y="20" text-anchor="middle">9</text>
    <rect x="104" y="0" width="50" height="30" fill="#a89bec"/><text x="129" y="20" text-anchor="middle">2</text>
    <rect x="156" y="0" width="50" height="30" fill="#a89bec"/><text x="181" y="20" text-anchor="middle">7</text>
    <rect x="208" y="0" width="50" height="30" fill="#a89bec"/><text x="233" y="20" text-anchor="middle">5</text>
    <rect x="260" y="0" width="50" height="30" fill="#a89bec"/><text x="285" y="20" text-anchor="middle">1</text>
    <rect x="312" y="0" width="50" height="30" fill="#a89bec"/><text x="337" y="20" text-anchor="middle">8</text>
  </g>
  <text x="490" y="100" font-size="11" fill="#1a1822">arr[0]=4 ≠ 7 → advance</text>

  <!-- Step 2 -->
  <text x="60" y="145" font-size="12" font-weight="700" fill="#6d5bd0">i=1:</text>
  <g transform="translate(120,130)" font-size="12">
    <rect x="0" y="0" width="50" height="30" fill="#a89bec"/><text x="25" y="20" text-anchor="middle">4</text>
    <rect x="52" y="0" width="50" height="30" fill="#cc4444"/><text x="77" y="20" text-anchor="middle" fill="#fff" font-weight="700">9</text>
    <rect x="104" y="0" width="50" height="30" fill="#a89bec"/><text x="129" y="20" text-anchor="middle">2</text>
    <rect x="156" y="0" width="50" height="30" fill="#a89bec"/><text x="181" y="20" text-anchor="middle">7</text>
    <rect x="208" y="0" width="50" height="30" fill="#a89bec"/><text x="233" y="20" text-anchor="middle">5</text>
    <rect x="260" y="0" width="50" height="30" fill="#a89bec"/><text x="285" y="20" text-anchor="middle">1</text>
    <rect x="312" y="0" width="50" height="30" fill="#a89bec"/><text x="337" y="20" text-anchor="middle">8</text>
  </g>
  <text x="490" y="150" font-size="11" fill="#1a1822">arr[1]=9 ≠ 7 → advance</text>

  <!-- Step 3 -->
  <text x="60" y="195" font-size="12" font-weight="700" fill="#6d5bd0">i=2:</text>
  <g transform="translate(120,180)" font-size="12">
    <rect x="0" y="0" width="50" height="30" fill="#a89bec"/><text x="25" y="20" text-anchor="middle">4</text>
    <rect x="52" y="0" width="50" height="30" fill="#a89bec"/><text x="77" y="20" text-anchor="middle">9</text>
    <rect x="104" y="0" width="50" height="30" fill="#cc4444"/><text x="129" y="20" text-anchor="middle" fill="#fff" font-weight="700">2</text>
    <rect x="156" y="0" width="50" height="30" fill="#a89bec"/><text x="181" y="20" text-anchor="middle">7</text>
    <rect x="208" y="0" width="50" height="30" fill="#a89bec"/><text x="233" y="20" text-anchor="middle">5</text>
    <rect x="260" y="0" width="50" height="30" fill="#a89bec"/><text x="285" y="20" text-anchor="middle">1</text>
    <rect x="312" y="0" width="50" height="30" fill="#a89bec"/><text x="337" y="20" text-anchor="middle">8</text>
  </g>
  <text x="490" y="200" font-size="11" fill="#1a1822">arr[2]=2 ≠ 7 → advance</text>

  <!-- Step 4: match -->
  <text x="60" y="245" font-size="12" font-weight="700" fill="#4caf50">i=3:</text>
  <g transform="translate(120,230)" font-size="12">
    <rect x="0" y="0" width="50" height="30" fill="#a89bec"/><text x="25" y="20" text-anchor="middle">4</text>
    <rect x="52" y="0" width="50" height="30" fill="#a89bec"/><text x="77" y="20" text-anchor="middle">9</text>
    <rect x="104" y="0" width="50" height="30" fill="#a89bec"/><text x="129" y="20" text-anchor="middle">2</text>
    <rect x="156" y="0" width="50" height="30" fill="#4caf50"/><text x="181" y="20" text-anchor="middle" fill="#fff" font-weight="700">7</text>
    <rect x="208" y="0" width="50" height="30" fill="#a89bec"/><text x="233" y="20" text-anchor="middle">5</text>
    <rect x="260" y="0" width="50" height="30" fill="#a89bec"/><text x="285" y="20" text-anchor="middle">1</text>
    <rect x="312" y="0" width="50" height="30" fill="#a89bec"/><text x="337" y="20" text-anchor="middle">8</text>
  </g>
  <text x="490" y="250" font-size="12" fill="#4caf50" font-weight="700">✓ arr[3]=7 matches → return 3</text>

  <!-- Complexity -->
  <rect x="40" y="290" width="820" height="195" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="315" font-size="14" font-weight="700" fill="#6d5bd0">Complexity &amp; Properties</text>
  <text x="60" y="340" font-size="12" fill="#1a1822"><tspan font-weight="700">Time:</tspan> Θ(n) worst/average, Θ(1) best (first element). Comparisons: n worst, n/2 expected for random target.</text>
  <text x="60" y="360" font-size="12" fill="#1a1822"><tspan font-weight="700">Space:</tspan> Θ(1) auxiliary. No preprocessing needed.</text>
  <text x="60" y="380" font-size="12" fill="#1a1822"><tspan font-weight="700">Works on:</tspan> any sequence — arrays, linked lists, streams, unsorted data.</text>
  <text x="60" y="405" font-size="12" fill="#4caf50" font-weight="700">Cache-optimal: sequential access, prefetcher-friendly, SIMD-vectorizable.</text>
  <text x="60" y="425" font-size="12" fill="#1a1822">On modern CPUs, linear scan saturates memory bandwidth (~10–50 GB/s) — often faster than binary</text>
  <text x="60" y="442" font-size="12" fill="#1a1822">search on arrays with n &lt; 64 due to branch prediction and prefetching.</text>
  <text x="60" y="472" font-size="11" fill="#cc4444" font-style="italic">Pitfall: using linear on large sorted data where binary trivially applies — O(Qn) vs O(Q log n).</text>
</svg>
