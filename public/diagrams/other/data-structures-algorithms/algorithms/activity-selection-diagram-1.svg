<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Activity Selection — Earliest Finishing Time Wins</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">Pick max non-overlapping activities. Sort by finish time; greedy take each compatible activity.</text>

  <!-- Timeline -->
  <line x1="60" y1="150" x2="840" y2="150" stroke="#1a1822" stroke-width="1"/>
  <g font-size="10" fill="#1a1822">
    <text x="60" y="170" text-anchor="middle">0</text>
    <text x="840" y="170" text-anchor="middle">14</text>
  </g>

  <!-- Activities sorted by finish time -->
  <g font-size="11">
    <rect x="120" y="95" width="90" height="18" fill="#4caf50"/><text x="165" y="108" text-anchor="middle" fill="#fff">A (1,4) ✓</text>
    <rect x="90" y="115" width="120" height="18" fill="#cc4444"/><text x="150" y="128" text-anchor="middle" fill="#fff">B (0,5)</text>
    <rect x="150" y="195" width="150" height="18" fill="#cc4444"/><text x="225" y="208" text-anchor="middle" fill="#fff">C (2,7)</text>
    <rect x="225" y="220" width="90" height="18" fill="#cc4444"/><text x="270" y="233" text-anchor="middle" fill="#fff">D (4,8)</text>
    <rect x="300" y="95" width="60" height="18" fill="#4caf50"/><text x="330" y="108" text-anchor="middle" fill="#fff">E (5,7) ✓</text>
    <rect x="360" y="245" width="120" height="18" fill="#cc4444"/><text x="420" y="258" text-anchor="middle" fill="#fff">F (3,11)</text>
    <rect x="450" y="115" width="90" height="18" fill="#4caf50"/><text x="495" y="128" text-anchor="middle" fill="#fff">G (8,11) ✓</text>
    <rect x="540" y="195" width="150" height="18" fill="#cc4444"/><text x="615" y="208" text-anchor="middle" fill="#fff">H (5,13)</text>
    <rect x="720" y="95" width="90" height="18" fill="#4caf50"/><text x="765" y="108" text-anchor="middle" fill="#fff">I (11,14) ✓</text>
  </g>

  <!-- Bottom summary -->
  <rect x="40" y="290" width="820" height="185" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="315" font-size="13" font-weight="700" fill="#6d5bd0">Algorithm</text>
  <text x="60" y="340" font-size="11" fill="#1a1822" font-family="monospace">sort activities by finish time</text>
  <text x="60" y="358" font-size="11" fill="#1a1822" font-family="monospace">last_end = -∞</text>
  <text x="60" y="376" font-size="11" fill="#1a1822" font-family="monospace">for each activity (s, f):</text>
  <text x="60" y="394" font-size="11" fill="#1a1822" font-family="monospace">    if s &gt;= last_end:</text>
  <text x="60" y="412" font-size="11" fill="#1a1822" font-family="monospace">        pick it; last_end = f</text>
  <text x="60" y="440" font-size="11" fill="#4caf50" font-weight="700">Selected: A, E, G, I — 4 activities (maximum).</text>
  <text x="60" y="460" font-size="11" fill="#1a1822">Complexity: O(n log n) sort, O(n) scan.</text>
</svg>
