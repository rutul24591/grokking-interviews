<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Ternary vs Golden-Section — Same Convergence, Fewer Evaluations</text>

  <!-- Ternary panel -->
  <rect x="40" y="70" width="400" height="260" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="240" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Ternary: 2 new probes per iteration</text>

  <g transform="translate(60,120)">
    <line x1="0" y1="30" x2="360" y2="30" stroke="#1a1822" stroke-width="2"/>
    <circle cx="0" cy="30" r="5" fill="#1a1822"/><text x="0" y="55" text-anchor="middle" font-size="10">lo</text>
    <circle cx="120" cy="30" r="5" fill="#cc4444"/><text x="120" y="55" text-anchor="middle" font-size="10" fill="#cc4444">m1</text>
    <circle cx="240" cy="30" r="5" fill="#cc4444"/><text x="240" y="55" text-anchor="middle" font-size="10" fill="#cc4444">m2</text>
    <circle cx="360" cy="30" r="5" fill="#1a1822"/><text x="360" y="55" text-anchor="middle" font-size="10">hi</text>
  </g>

  <g transform="translate(60,190)">
    <text x="0" y="10" font-size="11" fill="#1a1822">After narrowing to [m1, hi]:</text>
    <line x1="0" y1="30" x2="240" y2="30" stroke="#1a1822" stroke-width="2"/>
    <circle cx="0" cy="30" r="5" fill="#1a1822"/>
    <circle cx="80" cy="30" r="5" fill="#cc4444"/><text x="80" y="55" text-anchor="middle" font-size="10" fill="#cc4444">new m1</text>
    <circle cx="160" cy="30" r="5" fill="#cc4444"/><text x="160" y="55" text-anchor="middle" font-size="10" fill="#cc4444">new m2</text>
    <circle cx="240" cy="30" r="5" fill="#1a1822"/>
  </g>
  <text x="60" y="290" font-size="11" fill="#cc4444" font-weight="700">Both m1, m2 are fresh — 2 function evaluations per iter.</text>
  <text x="60" y="308" font-size="11" fill="#1a1822">Range shrinks to 2/3 each iter → log₃/₂ n iters.</text>

  <!-- Golden-section panel -->
  <rect x="460" y="70" width="400" height="260" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="660" y="95" text-anchor="middle" font-size="14" font-weight="700" fill="#4caf50">Golden-section: 1 new probe per iteration</text>

  <g transform="translate(480,120)">
    <line x1="0" y1="30" x2="360" y2="30" stroke="#1a1822" stroke-width="2"/>
    <circle cx="0" cy="30" r="5" fill="#1a1822"/><text x="0" y="55" text-anchor="middle" font-size="10">lo</text>
    <circle cx="138" cy="30" r="5" fill="#4caf50"/><text x="138" y="55" text-anchor="middle" font-size="10" fill="#4caf50">x1 (1−φ)</text>
    <circle cx="222" cy="30" r="5" fill="#4caf50"/><text x="222" y="55" text-anchor="middle" font-size="10" fill="#4caf50">x2 (φ)</text>
    <circle cx="360" cy="30" r="5" fill="#1a1822"/><text x="360" y="55" text-anchor="middle" font-size="10">hi</text>
  </g>

  <g transform="translate(480,190)">
    <text x="0" y="10" font-size="11" fill="#1a1822">After narrowing to [x1, hi]:</text>
    <line x1="0" y1="30" x2="222" y2="30" stroke="#1a1822" stroke-width="2"/>
    <circle cx="0" cy="30" r="5" fill="#1a1822"/>
    <circle cx="84" cy="30" r="5" fill="#a89bec"/><text x="84" y="55" text-anchor="middle" font-size="10" fill="#6d5bd0">reused x2!</text>
    <circle cx="138" cy="30" r="5" fill="#4caf50"/><text x="138" y="55" text-anchor="middle" font-size="10" fill="#4caf50">new x</text>
    <circle cx="222" cy="30" r="5" fill="#1a1822"/>
  </g>
  <text x="480" y="290" font-size="11" fill="#4caf50" font-weight="700">Only 1 fresh evaluation — golden ratio reuses the other.</text>
  <text x="480" y="308" font-size="11" fill="#1a1822">Range shrinks to φ ≈ 0.618 each iter → log₁/φ n iters.</text>

  <!-- Summary -->
  <rect x="40" y="350" width="820" height="135" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="375" font-size="14" font-weight="700" fill="#6d5bd0">Total evaluations to reach precision ε on range [0, n]</text>
  <text x="60" y="400" font-size="12" fill="#1a1822" font-family="monospace">Ternary:         2 · log₃/₂(n/ε) ≈ 3.42 · log₂(n/ε)</text>
  <text x="60" y="420" font-size="12" fill="#1a1822" font-family="monospace">Golden-section:  1 · log₁/φ(n/ε) ≈ 1.44 · log₂(n/ε)</text>
  <text x="60" y="448" font-size="12" fill="#4caf50" font-weight="700">Golden-section is ~2.4× faster. Use it for continuous optimization.</text>
  <text x="60" y="468" font-size="11" fill="#1a1822" font-style="italic">Ternary persists in teaching for its cleaner “trisect” intuition, but scipy/numpy use golden or Brent’s.</text>
</svg>
