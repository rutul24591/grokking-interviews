<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">N-Queens — Place N Queens on N×N Board, No Two Attacking</text>

  <rect x="40" y="60" width="380" height="380" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">A solution for n=8</text>
  <g transform="translate(60,100)">
    <g>
      <rect x="0" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/>
      <rect x="40" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/>
      <rect x="80" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/>
      <rect x="120" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/>
      <rect x="160" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/>
