      <rect x="240" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/>
      <rect x="280" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/>
    </g>
    <g transform="translate(0,40)">
      <rect x="0" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/>
      <rect x="40" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/>
      <rect x="80" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/>
      <rect x="120" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/>
      <rect x="160" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/>
      <rect x="200" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/>
      <rect x="240" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/>
      <rect x="280" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/>
    </g>
    <g transform="translate(0,80)">
      <rect x="0" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="40" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="80" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="120" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="160" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="200" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="240" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="280" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/>
    </g>
    <g transform="translate(0,120)">
      <rect x="0" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="40" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="80" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="120" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="160" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="200" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="240" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="280" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/>
    </g>
    <g transform="translate(0,160)">
      <rect x="0" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="40" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="80" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="120" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="160" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="200" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="240" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="280" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/>
    </g>
    <g transform="translate(0,200)">
      <rect x="0" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="40" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="80" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="120" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="160" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="200" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="240" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="280" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/>
    </g>
    <g transform="translate(0,240)">
      <rect x="0" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="40" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="80" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="120" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="160" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="200" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="240" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="280" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/>
    </g>
    <g transform="translate(0,280)">
      <rect x="0" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="40" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="80" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="120" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="160" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="200" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/><rect x="240" y="0" width="40" height="40" fill="#a89bec" stroke="#1a1822"/><rect x="280" y="0" width="40" height="40" fill="#fff" stroke="#1a1822"/>
