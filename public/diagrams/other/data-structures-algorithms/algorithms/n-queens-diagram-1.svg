    <g font-size="20" text-anchor="middle" font-weight="700" fill="#cc4444">
      <text x="20" y="28">♛</text>
      <text x="180" y="68">♛</text>
      <text x="300" y="108">♛</text>
      <text x="220" y="148">♛</text>
      <text x="60" y="188">♛</text>
      <text x="260" y="228">♛</text>
      <text x="100" y="268">♛</text>
      <text x="140" y="308">♛</text>
    </g>
  </g>

  <rect x="440" y="60" width="420" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="460" y="85" font-size="13" font-weight="700" fill="#4caf50">Constraints — three sets to track</text>
  <text x="460" y="115" font-size="11">• cols[c] = column c is occupied</text>
  <text x="460" y="135" font-size="11">• diag1[r − c + n − 1] = / diagonal occupied</text>
  <text x="460" y="155" font-size="11">• diag2[r + c] = \ diagonal occupied</text>
  <text x="460" y="180" font-size="11">Each row gets one queen → branching factor n.</text>
  <text x="460" y="200" font-size="11">A queen in (r, c) blocks (r, c), the / diagonal r−c,</text>
  <text x="460" y="218" font-size="11">and the \ diagonal r+c. Constant-time check via bitmasks.</text>
  <text x="460" y="244" font-size="11" font-weight="700" fill="#4caf50">Bitmask version uses 3 ints; runs to n≈32 in &lt;1s.</text>

  <rect x="440" y="275" width="420" height="165" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="460" y="300" font-size="13" font-weight="700" fill="#6d5bd0">Solution counts</text>
  <g font-size="11">
    <text x="460" y="325">n=4 → 2 solutions</text>
    <text x="460" y="345">n=6 → 4</text>
    <text x="460" y="365">n=8 → 92</text>
    <text x="460" y="385">n=10 → 724</text>
    <text x="460" y="405">n=12 → 14 200</text>
    <text x="460" y="425">n=27 → 234 907 967 154 122 528 (current record)</text>
  </g>
</svg>
