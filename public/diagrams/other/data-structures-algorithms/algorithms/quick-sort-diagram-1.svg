<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Quick Sort — Partition Around Pivot, Recurse Into Both Sides</text>

  <!-- Initial array -->
  <text x="60" y="80" font-size="13" font-weight="700" fill="#6d5bd0">Initial:</text>
  <g transform="translate(140,62)">
    <rect x="0" y="0" width="40" height="30" fill="#a89bec"/><text x="20" y="20" text-anchor="middle" font-size="12">7</text>
    <rect x="42" y="0" width="40" height="30" fill="#a89bec"/><text x="62" y="20" text-anchor="middle" font-size="12">2</text>
    <rect x="84" y="0" width="40" height="30" fill="#a89bec"/><text x="104" y="20" text-anchor="middle" font-size="12">8</text>
    <rect x="126" y="0" width="40" height="30" fill="#a89bec"/><text x="146" y="20" text-anchor="middle" font-size="12">5</text>
    <rect x="168" y="0" width="40" height="30" fill="#cc4444"/><text x="188" y="20" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">6</text>
    <rect x="210" y="0" width="40" height="30" fill="#a89bec"/><text x="230" y="20" text-anchor="middle" font-size="12">1</text>
    <rect x="252" y="0" width="40" height="30" fill="#a89bec"/><text x="272" y="20" text-anchor="middle" font-size="12">9</text>
    <rect x="294" y="0" width="40" height="30" fill="#a89bec"/><text x="314" y="20" text-anchor="middle" font-size="12">3</text>
    <rect x="336" y="0" width="40" height="30" fill="#a89bec"/><text x="356" y="20" text-anchor="middle" font-size="12">4</text>
  </g>
  <text x="540" y="80" font-size="12" fill="#1a1822">pivot = median-of-three(7, 6, 4) = 6</text>

  <!-- After partition -->
  <text x="60" y="135" font-size="13" font-weight="700" fill="#6d5bd0">After partition:</text>
  <g transform="translate(200,117)">
    <rect x="0" y="0" width="40" height="30" fill="#4caf50"/><text x="20" y="20" text-anchor="middle" fill="#fff" font-size="12">2</text>
    <rect x="42" y="0" width="40" height="30" fill="#4caf50"/><text x="62" y="20" text-anchor="middle" fill="#fff" font-size="12">5</text>
    <rect x="84" y="0" width="40" height="30" fill="#4caf50"/><text x="104" y="20" text-anchor="middle" fill="#fff" font-size="12">1</text>
    <rect x="126" y="0" width="40" height="30" fill="#4caf50"/><text x="146" y="20" text-anchor="middle" fill="#fff" font-size="12">3</text>
    <rect x="168" y="0" width="40" height="30" fill="#4caf50"/><text x="188" y="20" text-anchor="middle" fill="#fff" font-size="12">4</text>
    <rect x="210" y="0" width="40" height="30" fill="#cc4444"/><text x="230" y="20" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">6</text>
    <rect x="252" y="0" width="40" height="30" fill="#6d5bd0"/><text x="272" y="20" text-anchor="middle" fill="#fff" font-size="12">7</text>
    <rect x="294" y="0" width="40" height="30" fill="#6d5bd0"/><text x="314" y="20" text-anchor="middle" fill="#fff" font-size="12">8</text>
    <rect x="336" y="0" width="40" height="30" fill="#6d5bd0"/><text x="356" y="20" text-anchor="middle" fill="#fff" font-size="12">9</text>
  </g>
  <text x="200" y="170" font-size="11" fill="#4caf50" font-weight="700">&lt; 6 (5 elems)</text>
  <text x="410" y="170" font-size="11" fill="#cc4444" font-weight="700">pivot placed</text>
  <text x="495" y="170" font-size="11" fill="#6d5bd0" font-weight="700">&gt; 6 (3 elems)</text>

  <!-- Recurse arrows -->
  <path d="M220 150 L180 220" stroke="#1a1822" fill="none" marker-end="url(#qa)"/>
  <path d="M520 150 L640 220" stroke="#1a1822" fill="none" marker-end="url(#qa)"/>

  <!-- Left subproblem -->
  <rect x="80" y="220" width="220" height="70" fill="#fff" stroke="#4caf50" stroke-width="2" rx="4"/>
  <text x="190" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#4caf50">Recurse left [2,5,1,3,4]</text>
  <text x="100" y="260" font-size="11" fill="#1a1822">pivot = 3 → [1,2] | 3 | [5,4]</text>
  <text x="100" y="278" font-size="11" fill="#1a1822">then recurse each side…</text>

  <!-- Right subproblem -->
  <rect x="540" y="220" width="220" height="70" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="4"/>
  <text x="650" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#6d5bd0">Recurse right [7,8,9]</text>
  <text x="560" y="260" font-size="11" fill="#1a1822">pivot = 8 → [7] | 8 | [9]</text>
  <text x="560" y="278" font-size="11" fill="#1a1822">base cases (size ≤ 1)</text>

  <!-- Final -->
  <text x="60" y="330" font-size="13" font-weight="700" fill="#4caf50">Final sorted:</text>
  <g transform="translate(200,312)">
    <rect x="0" y="0" width="40" height="30" fill="#4caf50"/><text x="20" y="20" text-anchor="middle" fill="#fff" font-size="12">1</text>
    <rect x="42" y="0" width="40" height="30" fill="#4caf50"/><text x="62" y="20" text-anchor="middle" fill="#fff" font-size="12">2</text>
    <rect x="84" y="0" width="40" height="30" fill="#4caf50"/><text x="104" y="20" text-anchor="middle" fill="#fff" font-size="12">3</text>
    <rect x="126" y="0" width="40" height="30" fill="#4caf50"/><text x="146" y="20" text-anchor="middle" fill="#fff" font-size="12">4</text>
    <rect x="168" y="0" width="40" height="30" fill="#4caf50"/><text x="188" y="20" text-anchor="middle" fill="#fff" font-size="12">5</text>
    <rect x="210" y="0" width="40" height="30" fill="#4caf50"/><text x="230" y="20" text-anchor="middle" fill="#fff" font-size="12">6</text>
    <rect x="252" y="0" width="40" height="30" fill="#4caf50"/><text x="272" y="20" text-anchor="middle" fill="#fff" font-size="12">7</text>
    <rect x="294" y="0" width="40" height="30" fill="#4caf50"/><text x="314" y="20" text-anchor="middle" fill="#fff" font-size="12">8</text>
    <rect x="336" y="0" width="40" height="30" fill="#4caf50"/><text x="356" y="20" text-anchor="middle" fill="#fff" font-size="12">9</text>
  </g>

  <!-- Complexity box -->
  <rect x="60" y="370" width="780" height="115" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="80" y="393" font-size="14" font-weight="700" fill="#6d5bd0">Complexity</text>
  <text x="80" y="415" font-size="12" fill="#1a1822"><tspan font-weight="700">Best/avg:</tspan> Θ(n log n) — recursion depth log n × Θ(n) partition per level.</text>
  <text x="80" y="435" font-size="12" fill="#1a1822"><tspan font-weight="700">Worst:</tspan> Θ(n²) — pathological pivot (first/last element on sorted input) gives n-deep recursion.</text>
  <text x="80" y="455" font-size="12" fill="#1a1822"><tspan font-weight="700">Space:</tspan> O(log n) stack (with smaller-side recursion). In-place partition, unstable.</text>
  <text x="80" y="475" font-size="12" fill="#cc4444"><tspan font-weight="700">Defense:</tspan> median-of-three pivot, 3-way partition, introsort heapsort fallback at depth 2⌊log₂n⌋.</text>

  <defs><marker id="qa" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#1a1822"/></marker></defs>
</svg>
