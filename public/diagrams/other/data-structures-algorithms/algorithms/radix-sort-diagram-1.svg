<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">LSD Radix Sort — Digit-by-Digit, Least to Most Significant</text>

  <!-- Input -->
  <text x="60" y="75" font-size="13" font-weight="700" fill="#6d5bd0">Input (3-digit decimals):</text>
  <g transform="translate(60,85)" font-size="13" font-family="monospace">
    <rect x="0" y="0" width="55" height="28" fill="#a89bec"/><text x="27" y="19" text-anchor="middle">329</text>
    <rect x="57" y="0" width="55" height="28" fill="#a89bec"/><text x="84" y="19" text-anchor="middle">457</text>
    <rect x="114" y="0" width="55" height="28" fill="#a89bec"/><text x="141" y="19" text-anchor="middle">657</text>
    <rect x="171" y="0" width="55" height="28" fill="#a89bec"/><text x="198" y="19" text-anchor="middle">839</text>
    <rect x="228" y="0" width="55" height="28" fill="#a89bec"/><text x="255" y="19" text-anchor="middle">436</text>
    <rect x="285" y="0" width="55" height="28" fill="#a89bec"/><text x="312" y="19" text-anchor="middle">720</text>
    <rect x="342" y="0" width="55" height="28" fill="#a89bec"/><text x="369" y="19" text-anchor="middle">355</text>
  </g>

  <!-- Pass 1 -->
  <rect x="40" y="140" width="820" height="85" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="162" font-size="13" font-weight="700" fill="#6d5bd0">Pass 1: sort by ones digit (stable counting sort)</text>
  <g transform="translate(60,172)" font-size="13" font-family="monospace">
    <rect x="0" y="0" width="55" height="28" fill="#4caf50"/><text x="27" y="19" text-anchor="middle" fill="#fff">720</text>
    <rect x="57" y="0" width="55" height="28" fill="#4caf50"/><text x="84" y="19" text-anchor="middle" fill="#fff">355</text>
    <rect x="114" y="0" width="55" height="28" fill="#4caf50"/><text x="141" y="19" text-anchor="middle" fill="#fff">436</text>
    <rect x="171" y="0" width="55" height="28" fill="#4caf50"/><text x="198" y="19" text-anchor="middle" fill="#fff">457</text>
    <rect x="228" y="0" width="55" height="28" fill="#4caf50"/><text x="255" y="19" text-anchor="middle" fill="#fff">657</text>
    <rect x="285" y="0" width="55" height="28" fill="#4caf50"/><text x="312" y="19" text-anchor="middle" fill="#fff">329</text>
    <rect x="342" y="0" width="55" height="28" fill="#4caf50"/><text x="369" y="19" text-anchor="middle" fill="#fff">839</text>
  </g>

  <!-- Pass 2 -->
  <rect x="40" y="235" width="820" height="85" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="257" font-size="13" font-weight="700" fill="#6d5bd0">Pass 2: sort by tens digit (stable — preserves ones-digit order)</text>
  <g transform="translate(60,267)" font-size="13" font-family="monospace">
    <rect x="0" y="0" width="55" height="28" fill="#4caf50"/><text x="27" y="19" text-anchor="middle" fill="#fff">720</text>
    <rect x="57" y="0" width="55" height="28" fill="#4caf50"/><text x="84" y="19" text-anchor="middle" fill="#fff">329</text>
    <rect x="114" y="0" width="55" height="28" fill="#4caf50"/><text x="141" y="19" text-anchor="middle" fill="#fff">436</text>
    <rect x="171" y="0" width="55" height="28" fill="#4caf50"/><text x="198" y="19" text-anchor="middle" fill="#fff">839</text>
    <rect x="228" y="0" width="55" height="28" fill="#4caf50"/><text x="255" y="19" text-anchor="middle" fill="#fff">355</text>
    <rect x="285" y="0" width="55" height="28" fill="#4caf50"/><text x="312" y="19" text-anchor="middle" fill="#fff">457</text>
    <rect x="342" y="0" width="55" height="28" fill="#4caf50"/><text x="369" y="19" text-anchor="middle" fill="#fff">657</text>
  </g>

  <!-- Pass 3 -->
  <rect x="40" y="330" width="820" height="85" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="352" font-size="13" font-weight="700" fill="#4caf50">Pass 3: sort by hundreds digit → fully sorted</text>
  <g transform="translate(60,362)" font-size="13" font-family="monospace">
    <rect x="0" y="0" width="55" height="28" fill="#4caf50"/><text x="27" y="19" text-anchor="middle" fill="#fff">329</text>
    <rect x="57" y="0" width="55" height="28" fill="#4caf50"/><text x="84" y="19" text-anchor="middle" fill="#fff">355</text>
    <rect x="114" y="0" width="55" height="28" fill="#4caf50"/><text x="141" y="19" text-anchor="middle" fill="#fff">436</text>
    <rect x="171" y="0" width="55" height="28" fill="#4caf50"/><text x="198" y="19" text-anchor="middle" fill="#fff">457</text>
    <rect x="228" y="0" width="55" height="28" fill="#4caf50"/><text x="255" y="19" text-anchor="middle" fill="#fff">657</text>
    <rect x="285" y="0" width="55" height="28" fill="#4caf50"/><text x="312" y="19" text-anchor="middle" fill="#fff">720</text>
    <rect x="342" y="0" width="55" height="28" fill="#4caf50"/><text x="369" y="19" text-anchor="middle" fill="#fff">839</text>
  </g>

  <rect x="40" y="430" width="820" height="55" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="452" font-size="13" font-weight="700" fill="#6d5bd0">Why it works:</text>
  <text x="60" y="472" font-size="12" fill="#1a1822">Each pass is a stable counting sort. After d passes, higher digits dominate but lower-digit ordering is preserved within ties.</text>
</svg>
