<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Selection Sort — Legitimate Production Niches</text>

  <!-- Flash endurance -->
  <rect x="40" y="70" width="260" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="170" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">Flash Endurance</text>
  <g transform="translate(60,115)">
    <rect x="0" y="0" width="100" height="60" fill="#cc4444" stroke="#1a1822"/>
    <text x="50" y="30" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Mergesort</text>
    <text x="50" y="48" text-anchor="middle" fill="#fff" font-size="11">n log n writes</text>
    <rect x="120" y="0" width="100" height="60" fill="#4caf50" stroke="#1a1822"/>
    <text x="170" y="30" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Selection</text>
    <text x="170" y="48" text-anchor="middle" fill="#fff" font-size="11">n−1 writes</text>
  </g>
  <text x="60" y="200" font-size="12" fill="#1a1822">1 TB sort → ~30× fewer writes.</text>
  <text x="60" y="218" font-size="12" fill="#1a1822">Flash cells last 10k cycles —</text>
  <text x="60" y="236" font-size="12" fill="#1a1822">10× fewer writes → 10× longer life.</text>
  <text x="60" y="256" font-size="11" fill="#1a1822" font-style="italic">SSDs, embedded MCUs, IoT flash.</text>

  <!-- Tournament merge -->
  <rect x="320" y="70" width="260" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="450" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">External k-Way Merge</text>
  <g transform="translate(340,115)">
    <rect x="0" y="0" width="40" height="20" fill="#a89bec"/><text x="20" y="15" text-anchor="middle" font-size="10">run 1</text>
    <rect x="0" y="25" width="40" height="20" fill="#a89bec"/><text x="20" y="40" text-anchor="middle" font-size="10">run 2</text>
    <rect x="0" y="50" width="40" height="20" fill="#a89bec"/><text x="20" y="65" text-anchor="middle" font-size="10">run 3</text>
    <rect x="0" y="75" width="40" height="20" fill="#a89bec"/><text x="20" y="90" text-anchor="middle" font-size="10">run 4</text>
    <path d="M40 10 L80 40" stroke="#1a1822"/>
    <path d="M40 35 L80 50" stroke="#1a1822"/>
    <path d="M40 60 L80 60" stroke="#1a1822"/>
    <path d="M40 85 L80 70" stroke="#1a1822"/>
    <rect x="80" y="30" width="60" height="50" fill="#6d5bd0"/><text x="110" y="55" text-anchor="middle" fill="#fff" font-size="11">Tournament</text><text x="110" y="70" text-anchor="middle" fill="#fff" font-size="11">Tree</text>
    <path d="M140 55 L180 55" stroke="#1a1822" marker-end="url(#ar3)"/>
    <text x="190" y="58" font-size="11" fill="#1a1822">merged</text>
  </g>
  <text x="340" y="240" font-size="12" fill="#1a1822">DB sort spill → merge phase.</text>
  <text x="340" y="258" font-size="12" fill="#1a1822">PostgreSQL, Oracle, Spark.</text>

  <!-- Large records -->
  <rect x="600" y="70" width="260" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="730" y="95" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">Large Record Swaps</text>
  <g transform="translate(620,115)">
    <rect x="0" y="0" width="220" height="20" fill="#a89bec" stroke="#1a1822"/>
    <text x="110" y="15" text-anchor="middle" font-size="10">1 KB record</text>
    <rect x="0" y="25" width="220" height="20" fill="#a89bec" stroke="#1a1822"/>
    <text x="110" y="40" text-anchor="middle" font-size="10">1 KB record</text>
    <rect x="0" y="50" width="220" height="20" fill="#a89bec" stroke="#1a1822"/>
    <text x="110" y="65" text-anchor="middle" font-size="10">1 KB record</text>
  </g>
  <text x="620" y="210" font-size="12" fill="#1a1822">Each swap = 3×1024 B move.</text>
  <text x="620" y="228" font-size="12" fill="#1a1822">At n=1000, selection moves 3 MB;</text>
  <text x="620" y="246" font-size="12" fill="#1a1822">quicksort moves ~30 MB.</text>
  <text x="620" y="262" font-size="11" fill="#1a1822" font-style="italic">(when pointer indirection unavailable)</text>

  <!-- Decision chart -->
  <rect x="60" y="295" width="780" height="180" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="450" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#6d5bd0">When to Choose Selection Sort</text>
  <line x1="80" y1="340" x2="820" y2="340" stroke="#1a1822"/>
  <text x="100" y="360" font-size="12" fill="#1a1822" font-weight="700">Cost model</text>
  <text x="400" y="360" font-size="12" fill="#1a1822" font-weight="700">Winner</text>
  <text x="620" y="360" font-size="12" fill="#1a1822" font-weight="700">Rationale</text>
  <text x="100" y="385" font-size="12" fill="#1a1822">swap ≈ compare (int arrays)</text>
  <text x="400" y="385" font-size="12" fill="#cc4444">Tim Sort / Pdqsort</text>
  <text x="620" y="385" font-size="12" fill="#1a1822">O(n log n) dominates</text>
  <text x="100" y="405" font-size="12" fill="#1a1822">swap × 100 × compare</text>
  <text x="400" y="405" font-size="12" fill="#4caf50">Selection (n ≤ 1k)</text>
  <text x="620" y="405" font-size="12" fill="#1a1822">n−1 swaps dominates</text>
  <text x="100" y="425" font-size="12" fill="#1a1822">flash write-limited</text>
  <text x="400" y="425" font-size="12" fill="#4caf50">Selection or Heap</text>
  <text x="620" y="425" font-size="12" fill="#1a1822">write endurance</text>
  <text x="100" y="445" font-size="12" fill="#1a1822">need stability</text>
  <text x="400" y="445" font-size="12" fill="#cc4444">never Selection</text>
  <text x="620" y="445" font-size="12" fill="#1a1822">use Insertion/Merge</text>
  <text x="100" y="465" font-size="12" fill="#1a1822">worst-case O(n log n) + in-place</text>
  <text x="400" y="465" font-size="12" fill="#4caf50">Heapsort</text>
  <text x="620" y="465" font-size="12" fill="#1a1822">selection&apos;s descendant</text>

  <defs><marker id="ar3" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#1a1822"/></marker></defs>
</svg>
