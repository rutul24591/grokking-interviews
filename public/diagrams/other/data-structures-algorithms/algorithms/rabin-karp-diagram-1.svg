<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Rabin-Karp — Rolling Hash for Pattern Matching</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">Algorithm</text>
  <text x="60" y="115" font-size="11" font-family="monospace">hP = hash(P)</text>
  <text x="60" y="133" font-size="11" font-family="monospace">hT = hash(T[0..m-1])</text>
  <text x="60" y="151" font-size="11" font-family="monospace">for i in 0..n - m:</text>
  <text x="60" y="169" font-size="11" font-family="monospace">  if hT == hP and T[i..i+m] == P: report match</text>
  <text x="60" y="187" font-size="11" font-family="monospace">  if i &lt; n - m: hT = roll(hT, T[i], T[i+m])</text>
  <text x="60" y="215" font-size="11">Polynomial rolling hash:</text>
  <text x="60" y="235" font-size="11" font-family="monospace">  hash(s) = (s[0]·b^(m-1) + s[1]·b^(m-2) + ... + s[m-1]) mod p</text>
  <text x="60" y="255" font-size="11" font-family="monospace">  roll: hT = ((hT - s_old·b^(m-1)) · b + s_new) mod p</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="305" font-size="13" font-weight="700" fill="#4caf50">Complexity</text>
  <text x="60" y="330" font-size="11">• Preprocessing: O(m).  Search: O(n + m) expected, O(n·m) worst case.</text>
  <text x="60" y="350" font-size="11">• Worst case occurs under hash collisions — verify match via direct compare.</text>
  <text x="60" y="370" font-size="11">• Choose b ≈ alphabet size (or larger), p a large prime ~ 2^61 - 1 (Mersenne).</text>
  <text x="60" y="390" font-size="11">• Use 128-bit arithmetic or double-hashing (two independent hashes) for adversarial inputs.</text>
  <text x="60" y="410" font-size="11">• Roll cost: O(1) per shift — that's the whole trick.</text>
  <text x="60" y="430" font-size="11">• Memory: O(1) plus the pattern itself.</text>
  <text x="60" y="465" font-size="11" fill="#4caf50" font-weight="700">Win condition: multi-pattern same-length matching, 2D matching, fingerprinting.</text>
</svg>
