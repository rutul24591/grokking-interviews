<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Quickselect vs Heap-based Top-k</text>

  <rect x="40" y="60" width="820" height="220" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">Choosing between Quickselect and a Min-heap (top-k pattern)</text>
  <g font-size="11">
    <text x="60" y="115" font-weight="700">Criterion</text>
    <text x="320" y="115" font-weight="700">Quickselect</text>
    <text x="600" y="115" font-weight="700">Min-heap of size k</text>

    <text x="60" y="140">Time (avg)</text>
    <text x="320" y="140">Θ(n)</text>
    <text x="600" y="140">Θ(n log k)</text>

    <text x="60" y="162">Time (worst)</text>
    <text x="320" y="162">Θ(n²) random / Θ(n) MoM</text>
    <text x="600" y="162">Θ(n log k)</text>

    <text x="60" y="184">Space</text>
    <text x="320" y="184">O(1) in-place</text>
    <text x="600" y="184">O(k)</text>

    <text x="60" y="206">Streaming / infinite input</text>
    <text x="320" y="206">no (needs full array)</text>
    <text x="600" y="206">yes — process one at a time</text>

    <text x="60" y="228">Preserves input order</text>
    <text x="320" y="228">no (rearranges)</text>
    <text x="600" y="228">yes</text>

    <text x="60" y="250">Produces sorted top-k</text>
    <text x="320" y="250">extra O(k log k) sort after</text>
    <text x="600" y="250">extract-min k times</text>
  </g>

  <rect x="40" y="300" width="820" height="175" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="325" font-size="13" font-weight="700" fill="#4caf50">Production use of Quickselect</text>
  <text x="60" y="350" font-size="11">• C++ std::nth_element (introselect), Rust slice::select_nth_unstable, NumPy np.partition.</text>
  <text x="60" y="370" font-size="11">• Database ORDER BY ... LIMIT k when data fits in RAM — Postgres uses heap, DuckDB uses quickselect-ish.</text>
  <text x="60" y="390" font-size="11">• Feature engineering: compute the p99 latency of 10M events; quickselect is faster than sorting.</text>
  <text x="60" y="410" font-size="11">• Median-cut color quantization (GIF, PNG palette reduction).</text>
  <text x="60" y="430" font-size="11">• k-nearest neighbors: partition by distance instead of sorting when k is small vs n.</text>
  <text x="60" y="455" font-size="11" font-weight="700" fill="#4caf50">Heap wins for streaming; quickselect wins when you have the whole array and can mutate it.</text>
</svg>
