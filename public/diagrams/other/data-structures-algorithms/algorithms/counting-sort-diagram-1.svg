<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Counting Sort — Histogram, Prefix Sum, Reverse Placement</text>

  <!-- Input -->
  <text x="60" y="75" font-size="13" font-weight="700" fill="#6d5bd0">Input (keys ∈ [0,5]):</text>
  <g transform="translate(240,60)">
    <rect x="0" y="0" width="40" height="28" fill="#a89bec"/><text x="20" y="19" text-anchor="middle" font-size="12">2</text>
    <rect x="42" y="0" width="40" height="28" fill="#a89bec"/><text x="62" y="19" text-anchor="middle" font-size="12">5</text>
    <rect x="84" y="0" width="40" height="28" fill="#a89bec"/><text x="104" y="19" text-anchor="middle" font-size="12">3</text>
    <rect x="126" y="0" width="40" height="28" fill="#a89bec"/><text x="146" y="19" text-anchor="middle" font-size="12">0</text>
    <rect x="168" y="0" width="40" height="28" fill="#a89bec"/><text x="188" y="19" text-anchor="middle" font-size="12">2</text>
    <rect x="210" y="0" width="40" height="28" fill="#a89bec"/><text x="230" y="19" text-anchor="middle" font-size="12">3</text>
    <rect x="252" y="0" width="40" height="28" fill="#a89bec"/><text x="272" y="19" text-anchor="middle" font-size="12">0</text>
    <rect x="294" y="0" width="40" height="28" fill="#a89bec"/><text x="314" y="19" text-anchor="middle" font-size="12">3</text>
  </g>

  <!-- Pass 1: histogram -->
  <rect x="40" y="110" width="820" height="90" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="132" font-size="13" font-weight="700" fill="#6d5bd0">Pass 1 — Histogram count[v] = frequency of v</text>
  <g transform="translate(240,148)">
    <rect x="0" y="0" width="50" height="28" fill="#6d5bd0"/><text x="25" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">2</text>
    <rect x="52" y="0" width="50" height="28" fill="#6d5bd0"/><text x="77" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">0</text>
    <rect x="104" y="0" width="50" height="28" fill="#6d5bd0"/><text x="129" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">2</text>
    <rect x="156" y="0" width="50" height="28" fill="#6d5bd0"/><text x="181" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">3</text>
    <rect x="208" y="0" width="50" height="28" fill="#6d5bd0"/><text x="233" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">0</text>
    <rect x="260" y="0" width="50" height="28" fill="#6d5bd0"/><text x="285" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">1</text>
    <text x="25" y="44" text-anchor="middle" font-size="10">v=0</text>
    <text x="77" y="44" text-anchor="middle" font-size="10">v=1</text>
    <text x="129" y="44" text-anchor="middle" font-size="10">v=2</text>
    <text x="181" y="44" text-anchor="middle" font-size="10">v=3</text>
    <text x="233" y="44" text-anchor="middle" font-size="10">v=4</text>
    <text x="285" y="44" text-anchor="middle" font-size="10">v=5</text>
  </g>

  <!-- Pass 2: prefix sum -->
  <rect x="40" y="215" width="820" height="90" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="237" font-size="13" font-weight="700" fill="#6d5bd0">Pass 2 — Prefix sum → count[v] = index one past last slot for v</text>
  <g transform="translate(240,253)">
    <rect x="0" y="0" width="50" height="28" fill="#cc4444"/><text x="25" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">2</text>
    <rect x="52" y="0" width="50" height="28" fill="#cc4444"/><text x="77" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">2</text>
    <rect x="104" y="0" width="50" height="28" fill="#cc4444"/><text x="129" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">4</text>
    <rect x="156" y="0" width="50" height="28" fill="#cc4444"/><text x="181" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">7</text>
    <rect x="208" y="0" width="50" height="28" fill="#cc4444"/><text x="233" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">7</text>
    <rect x="260" y="0" width="50" height="28" fill="#cc4444"/><text x="285" y="19" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">8</text>
  </g>

  <!-- Pass 3: placement -->
  <rect x="40" y="320" width="820" height="120" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="342" font-size="13" font-weight="700" fill="#6d5bd0">Pass 3 — Scan input in REVERSE, place x at --count[x]</text>
  <text x="60" y="360" font-size="11" fill="#1a1822">x=3 → count[3]=7 → out[6]=3; x=0 → out[0]=0; x=3 → out[5]=3; x=2 → out[3]=2; …</text>

  <text x="60" y="395" font-size="12" font-weight="700" fill="#4caf50">Output:</text>
  <g transform="translate(150,380)">
    <rect x="0" y="0" width="40" height="28" fill="#4caf50"/><text x="20" y="19" text-anchor="middle" fill="#fff" font-size="12">0</text>
    <rect x="42" y="0" width="40" height="28" fill="#4caf50"/><text x="62" y="19" text-anchor="middle" fill="#fff" font-size="12">0</text>
    <rect x="84" y="0" width="40" height="28" fill="#4caf50"/><text x="104" y="19" text-anchor="middle" fill="#fff" font-size="12">2</text>
    <rect x="126" y="0" width="40" height="28" fill="#4caf50"/><text x="146" y="19" text-anchor="middle" fill="#fff" font-size="12">2</text>
    <rect x="168" y="0" width="40" height="28" fill="#4caf50"/><text x="188" y="19" text-anchor="middle" fill="#fff" font-size="12">3</text>
    <rect x="210" y="0" width="40" height="28" fill="#4caf50"/><text x="230" y="19" text-anchor="middle" fill="#fff" font-size="12">3</text>
    <rect x="252" y="0" width="40" height="28" fill="#4caf50"/><text x="272" y="19" text-anchor="middle" fill="#fff" font-size="12">3</text>
    <rect x="294" y="0" width="40" height="28" fill="#4caf50"/><text x="314" y="19" text-anchor="middle" fill="#fff" font-size="12">5</text>
  </g>
  <text x="60" y="428" font-size="11" fill="#1a1822" font-style="italic">Stable: equal keys (e.g. the two 3s, the two 0s, the two 2s) retain their original relative order.</text>

  <text x="60" y="465" font-size="13" font-weight="700" fill="#6d5bd0">Complexity:</text>
  <text x="160" y="465" font-size="12" fill="#1a1822">Time Θ(n + k) — beats O(n log n) when k = O(n). Space Θ(n + k). Stable. Integer keys only.</text>
</svg>
