<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Extraction Phase Trace — Swap Root→End, Shrink, Sift-Down</text>

  <!-- Step 1 -->
  <text x="60" y="75" font-size="13" font-weight="700" fill="#6d5bd0">Step 1 — heap = [9,8,6,5,1,3,4]</text>
  <g transform="translate(60,85)">
    <rect x="0" y="0" width="35" height="25" fill="#cc4444"/><text x="17" y="17" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">9</text>
    <rect x="37" y="0" width="35" height="25" fill="#a89bec"/><text x="54" y="17" text-anchor="middle" font-size="11">8</text>
    <rect x="74" y="0" width="35" height="25" fill="#a89bec"/><text x="91" y="17" text-anchor="middle" font-size="11">6</text>
    <rect x="111" y="0" width="35" height="25" fill="#a89bec"/><text x="128" y="17" text-anchor="middle" font-size="11">5</text>
    <rect x="148" y="0" width="35" height="25" fill="#a89bec"/><text x="165" y="17" text-anchor="middle" font-size="11">1</text>
    <rect x="185" y="0" width="35" height="25" fill="#a89bec"/><text x="202" y="17" text-anchor="middle" font-size="11">3</text>
    <rect x="222" y="0" width="35" height="25" fill="#cc4444"/><text x="239" y="17" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4</text>
  </g>
  <text x="330" y="102" font-size="11" fill="#1a1822">swap 9↔4, sift-down 4</text>

  <!-- Step 2 -->
  <text x="60" y="145" font-size="13" font-weight="700" fill="#6d5bd0">Step 2 — heap = [8,5,6,4,1,3] | sorted = [9]</text>
  <g transform="translate(60,155)">
    <rect x="0" y="0" width="35" height="25" fill="#cc4444"/><text x="17" y="17" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">8</text>
    <rect x="37" y="0" width="35" height="25" fill="#a89bec"/><text x="54" y="17" text-anchor="middle" font-size="11">5</text>
    <rect x="74" y="0" width="35" height="25" fill="#a89bec"/><text x="91" y="17" text-anchor="middle" font-size="11">6</text>
    <rect x="111" y="0" width="35" height="25" fill="#a89bec"/><text x="128" y="17" text-anchor="middle" font-size="11">4</text>
    <rect x="148" y="0" width="35" height="25" fill="#a89bec"/><text x="165" y="17" text-anchor="middle" font-size="11">1</text>
    <rect x="185" y="0" width="35" height="25" fill="#cc4444"/><text x="202" y="17" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3</text>
    <rect x="222" y="0" width="35" height="25" fill="#4caf50"/><text x="239" y="17" text-anchor="middle" fill="#fff" font-size="11">9</text>
  </g>
  <text x="330" y="172" font-size="11" fill="#1a1822">swap 8↔3, sift-down 3</text>

  <!-- Step 3 -->
  <text x="60" y="215" font-size="13" font-weight="700" fill="#6d5bd0">Step 3 — heap = [6,5,3,4,1] | sorted = [8,9]</text>
  <g transform="translate(60,225)">
    <rect x="0" y="0" width="35" height="25" fill="#cc4444"/><text x="17" y="17" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">6</text>
    <rect x="37" y="0" width="35" height="25" fill="#a89bec"/><text x="54" y="17" text-anchor="middle" font-size="11">5</text>
    <rect x="74" y="0" width="35" height="25" fill="#a89bec"/><text x="91" y="17" text-anchor="middle" font-size="11">3</text>
    <rect x="111" y="0" width="35" height="25" fill="#a89bec"/><text x="128" y="17" text-anchor="middle" font-size="11">4</text>
    <rect x="148" y="0" width="35" height="25" fill="#cc4444"/><text x="165" y="17" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1</text>
    <rect x="185" y="0" width="35" height="25" fill="#4caf50"/><text x="202" y="17" text-anchor="middle" fill="#fff" font-size="11">8</text>
    <rect x="222" y="0" width="35" height="25" fill="#4caf50"/><text x="239" y="17" text-anchor="middle" fill="#fff" font-size="11">9</text>
  </g>
  <text x="330" y="242" font-size="11" fill="#1a1822">swap 6↔1, sift-down 1</text>

  <!-- Step 4 -->
  <text x="60" y="285" font-size="13" font-weight="700" fill="#6d5bd0">Step 4 — heap = [5,4,3,1] | sorted = [6,8,9]</text>

  <!-- Step 5 -->
  <text x="60" y="325" font-size="13" font-weight="700" fill="#6d5bd0">Step 5 — heap = [4,1,3] | sorted = [5,6,8,9]</text>

  <!-- Step 6 -->
  <text x="60" y="365" font-size="13" font-weight="700" fill="#6d5bd0">Step 6 — heap = [3,1] | sorted = [4,5,6,8,9]</text>

  <!-- Final -->
  <text x="60" y="405" font-size="13" font-weight="700" fill="#4caf50">Final sorted array:</text>
  <g transform="translate(250,390)">
    <rect x="0" y="0" width="35" height="25" fill="#4caf50"/><text x="17" y="17" text-anchor="middle" fill="#fff" font-size="11">1</text>
    <rect x="37" y="0" width="35" height="25" fill="#4caf50"/><text x="54" y="17" text-anchor="middle" fill="#fff" font-size="11">3</text>
    <rect x="74" y="0" width="35" height="25" fill="#4caf50"/><text x="91" y="17" text-anchor="middle" fill="#fff" font-size="11">4</text>
    <rect x="111" y="0" width="35" height="25" fill="#4caf50"/><text x="128" y="17" text-anchor="middle" fill="#fff" font-size="11">5</text>
    <rect x="148" y="0" width="35" height="25" fill="#4caf50"/><text x="165" y="17" text-anchor="middle" fill="#fff" font-size="11">6</text>
    <rect x="185" y="0" width="35" height="25" fill="#4caf50"/><text x="202" y="17" text-anchor="middle" fill="#fff" font-size="11">8</text>
    <rect x="222" y="0" width="35" height="25" fill="#4caf50"/><text x="239" y="17" text-anchor="middle" fill="#fff" font-size="11">9</text>
  </g>

  <rect x="60" y="435" width="780" height="55" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="80" y="458" font-size="13" font-weight="700" fill="#6d5bd0">Invariant after each step:</text>
  <text x="80" y="478" font-size="12" fill="#1a1822">arr[0..heapSize) is a max-heap; arr[heapSize..n) is sorted in ascending order — and contains the largest elements.</text>
</svg>
