<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1822">Bubble Sort — Pass-by-Pass Adjacent Swaps</text>
  <text x="450" y="58" text-anchor="middle" font-size="13" fill="#1a1822">Input: [5, 1, 4, 2, 8] — largest element &quot;bubbles&quot; to the end each pass</text>

  <!-- Pass 1 -->
  <text x="40" y="100" font-size="14" font-weight="700" fill="#6d5bd0">Pass 1</text>
  <g transform="translate(120,80)">
    <rect x="0" y="0" width="50" height="40" fill="#cc4444" stroke="#1a1822"/><text x="25" y="25" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">5</text>
    <rect x="55" y="0" width="50" height="40" fill="#cc4444" stroke="#1a1822"/><text x="80" y="25" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">1</text>
    <rect x="110" y="0" width="50" height="40" fill="#a89bec" stroke="#1a1822"/><text x="135" y="25" text-anchor="middle" font-size="14" fill="#1a1822">4</text>
    <rect x="165" y="0" width="50" height="40" fill="#a89bec" stroke="#1a1822"/><text x="190" y="25" text-anchor="middle" font-size="14" fill="#1a1822">2</text>
    <rect x="220" y="0" width="50" height="40" fill="#a89bec" stroke="#1a1822"/><text x="245" y="25" text-anchor="middle" font-size="14" fill="#1a1822">8</text>
    <text x="400" y="25" font-size="13" fill="#cc4444">swap (5,1) →</text>
    <rect x="510" y="0" width="50" height="40" fill="#a89bec" stroke="#1a1822"/><text x="535" y="25" text-anchor="middle" font-size="14" fill="#1a1822">1</text>
    <rect x="565" y="0" width="50" height="40" fill="#a89bec" stroke="#1a1822"/><text x="590" y="25" text-anchor="middle" font-size="14" fill="#1a1822">4</text>
    <rect x="620" y="0" width="50" height="40" fill="#a89bec" stroke="#1a1822"/><text x="645" y="25" text-anchor="middle" font-size="14" fill="#1a1822">2</text>
    <rect x="675" y="0" width="50" height="40" fill="#a89bec" stroke="#1a1822"/><text x="700" y="25" text-anchor="middle" font-size="14" fill="#1a1822">5</text>
    <rect x="730" y="0" width="50" height="40" fill="#4caf50" stroke="#1a1822"/><text x="755" y="25" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">8</text>
  </g>
  <text x="120" y="145" font-size="12" fill="#1a1822">(after 4 adjacent compares; 8 settles at the tail — permanently sorted)</text>

  <!-- Pass 2 -->
  <text x="40" y="190" font-size="14" font-weight="700" fill="#6d5bd0">Pass 2</text>
  <g transform="translate(120,170)">
    <rect x="0" y="0" width="50" height="40" fill="#a89bec" stroke="#1a1822"/><text x="25" y="25" text-anchor="middle" font-size="14" fill="#1a1822">1</text>
    <rect x="55" y="0" width="50" height="40" fill="#a89bec" stroke="#1a1822"/><text x="80" y="25" text-anchor="middle" font-size="14" fill="#1a1822">4</text>
    <rect x="110" y="0" width="50" height="40" fill="#a89bec" stroke="#1a1822"/><text x="135" y="25" text-anchor="middle" font-size="14" fill="#1a1822">2</text>
    <rect x="165" y="0" width="50" height="40" fill="#a89bec" stroke="#1a1822"/><text x="190" y="25" text-anchor="middle" font-size="14" fill="#1a1822">5</text>
    <rect x="220" y="0" width="50" height="40" fill="#4caf50" stroke="#1a1822"/><text x="245" y="25" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">8</text>
    <text x="400" y="25" font-size="13" fill="#cc4444">swap (4,2) →</text>
    <rect x="510" y="0" width="50" height="40" fill="#a89bec" stroke="#1a1822"/><text x="535" y="25" text-anchor="middle" font-size="14" fill="#1a1822">1</text>
    <rect x="565" y="0" width="50" height="40" fill="#a89bec" stroke="#1a1822"/><text x="590" y="25" text-anchor="middle" font-size="14" fill="#1a1822">2</text>
    <rect x="620" y="0" width="50" height="40" fill="#a89bec" stroke="#1a1822"/><text x="645" y="25" text-anchor="middle" font-size="14" fill="#1a1822">4</text>
    <rect x="675" y="0" width="50" height="40" fill="#4caf50" stroke="#1a1822"/><text x="700" y="25" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">5</text>
    <rect x="730" y="0" width="50" height="40" fill="#4caf50" stroke="#1a1822"/><text x="755" y="25" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">8</text>
  </g>

  <!-- Pass 3 -->
  <text x="40" y="280" font-size="14" font-weight="700" fill="#6d5bd0">Pass 3</text>
  <g transform="translate(120,260)">
    <rect x="510" y="0" width="50" height="40" fill="#4caf50" stroke="#1a1822"/><text x="535" y="25" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">1</text>
    <rect x="565" y="0" width="50" height="40" fill="#4caf50" stroke="#1a1822"/><text x="590" y="25" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">2</text>
    <rect x="620" y="0" width="50" height="40" fill="#4caf50" stroke="#1a1822"/><text x="645" y="25" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">4</text>
    <rect x="675" y="0" width="50" height="40" fill="#4caf50" stroke="#1a1822"/><text x="700" y="25" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">5</text>
    <rect x="730" y="0" width="50" height="40" fill="#4caf50" stroke="#1a1822"/><text x="755" y="25" text-anchor="middle" font-size="14" fill="#fff" font-weight="700">8</text>
    <text x="0" y="25" font-size="13" fill="#1a1822">no swaps — flag false →</text>
    <text x="260" y="25" font-size="13" fill="#4caf50" font-weight="700">early termination</text>
  </g>

  <!-- Invariant box -->
  <rect x="60" y="340" width="780" height="130" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="80" y="365" font-size="14" font-weight="700" fill="#6d5bd0">Loop Invariant</text>
  <text x="80" y="390" font-size="13" fill="#1a1822">After k complete passes, the last k positions hold the k largest elements in sorted order.</text>
  <text x="80" y="415" font-size="13" fill="#1a1822">Best case (pre-sorted): O(n) — one pass with zero swaps triggers the early-termination flag.</text>
  <text x="80" y="440" font-size="13" fill="#1a1822">Worst case (reverse-sorted): O(n²) — exactly n(n−1)/2 comparisons and n(n−1)/2 swaps.</text>
  <text x="80" y="460" font-size="13" fill="#1a1822">Stable when the swap predicate is strictly &quot;a[i] &gt; a[i+1]&quot; — equal elements never swap.</text>
</svg>
