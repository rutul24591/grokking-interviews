<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Heap Sort — Two Phases: Build-Heap then Repeated Extract-Max</text>

  <!-- Phase 1 -->
  <rect x="40" y="60" width="400" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="240" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Phase 1: Build Max-Heap (Floyd) — Θ(n)</text>
  <text x="60" y="108" font-size="11" fill="#1a1822">sift-down from ⌊n/2⌋−1 down to 0</text>

  <!-- unsorted array -->
  <text x="60" y="135" font-size="11" font-weight="700" fill="#1a1822">input:</text>
  <g transform="translate(105,120)">
    <rect x="0" y="0" width="35" height="25" fill="#a89bec"/><text x="17" y="17" text-anchor="middle" font-size="11">3</text>
    <rect x="37" y="0" width="35" height="25" fill="#a89bec"/><text x="54" y="17" text-anchor="middle" font-size="11">1</text>
    <rect x="74" y="0" width="35" height="25" fill="#a89bec"/><text x="91" y="17" text-anchor="middle" font-size="11">6</text>
    <rect x="111" y="0" width="35" height="25" fill="#a89bec"/><text x="128" y="17" text-anchor="middle" font-size="11">5</text>
    <rect x="148" y="0" width="35" height="25" fill="#a89bec"/><text x="165" y="17" text-anchor="middle" font-size="11">9</text>
    <rect x="185" y="0" width="35" height="25" fill="#a89bec"/><text x="202" y="17" text-anchor="middle" font-size="11">8</text>
    <rect x="222" y="0" width="35" height="25" fill="#a89bec"/><text x="239" y="17" text-anchor="middle" font-size="11">4</text>
  </g>

  <!-- Max heap -->
  <g transform="translate(100,175)">
    <line x1="120" y1="10" x2="60" y2="45" stroke="#1a1822"/>
    <line x1="120" y1="10" x2="180" y2="45" stroke="#1a1822"/>
    <line x1="60" y1="55" x2="20" y2="85" stroke="#1a1822"/>
    <line x1="60" y1="55" x2="100" y2="85" stroke="#1a1822"/>
    <line x1="180" y1="55" x2="140" y2="85" stroke="#1a1822"/>
    <line x1="180" y1="55" x2="220" y2="85" stroke="#1a1822"/>
    <circle cx="120" cy="5" r="14" fill="#cc4444"/><text x="120" y="9" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">9</text>
    <circle cx="60" cy="50" r="13" fill="#a89bec"/><text x="60" y="54" text-anchor="middle" font-size="11">8</text>
    <circle cx="180" cy="50" r="13" fill="#a89bec"/><text x="180" y="54" text-anchor="middle" font-size="11">6</text>
    <circle cx="20" cy="90" r="11" fill="#a89bec"/><text x="20" y="94" text-anchor="middle" font-size="10">5</text>
    <circle cx="100" cy="90" r="11" fill="#a89bec"/><text x="100" y="94" text-anchor="middle" font-size="10">1</text>
    <circle cx="140" cy="90" r="11" fill="#a89bec"/><text x="140" y="94" text-anchor="middle" font-size="10">3</text>
    <circle cx="220" cy="90" r="11" fill="#a89bec"/><text x="220" y="94" text-anchor="middle" font-size="10">4</text>
  </g>

  <!-- Phase 2 -->
  <rect x="460" y="60" width="400" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="660" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#6d5bd0">Phase 2: Extract-Max n−1 times — Θ(n log n)</text>
  <text x="480" y="108" font-size="11" fill="#1a1822">swap arr[0] ↔ arr[end]; shrink heap; sift-down arr[0]</text>

  <text x="480" y="138" font-size="11" fill="#1a1822">iter 1: swap 9↔4 → sift-down 4 → heap max=8</text>
  <text x="480" y="156" font-size="11" fill="#1a1822">iter 2: swap 8↔3 → sift-down 3 → heap max=6</text>
  <text x="480" y="174" font-size="11" fill="#1a1822">iter 3: swap 6↔1 → sift-down 1 → heap max=5</text>
  <text x="480" y="192" font-size="11" fill="#1a1822">… continue until size = 1</text>

  <text x="480" y="225" font-size="11" font-weight="700" fill="#4caf50">result array:</text>
  <g transform="translate(575,213)">
    <rect x="0" y="0" width="30" height="22" fill="#4caf50"/><text x="15" y="15" text-anchor="middle" fill="#fff" font-size="10">1</text>
    <rect x="32" y="0" width="30" height="22" fill="#4caf50"/><text x="47" y="15" text-anchor="middle" fill="#fff" font-size="10">3</text>
    <rect x="64" y="0" width="30" height="22" fill="#4caf50"/><text x="79" y="15" text-anchor="middle" fill="#fff" font-size="10">4</text>
    <rect x="96" y="0" width="30" height="22" fill="#4caf50"/><text x="111" y="15" text-anchor="middle" fill="#fff" font-size="10">5</text>
    <rect x="128" y="0" width="30" height="22" fill="#4caf50"/><text x="143" y="15" text-anchor="middle" fill="#fff" font-size="10">6</text>
    <rect x="160" y="0" width="30" height="22" fill="#4caf50"/><text x="175" y="15" text-anchor="middle" fill="#fff" font-size="10">8</text>
    <rect x="192" y="0" width="30" height="22" fill="#4caf50"/><text x="207" y="15" text-anchor="middle" fill="#fff" font-size="10">9</text>
  </g>

  <!-- Complexity panel -->
  <rect x="40" y="285" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="310" font-size="14" font-weight="700" fill="#6d5bd0">Complexity &amp; Properties</text>
  <text x="60" y="333" font-size="12" fill="#1a1822"><tspan font-weight="700">Time:</tspan> Θ(n log n) all cases — no dependency on input distribution (not adaptive).</text>
  <text x="60" y="353" font-size="12" fill="#1a1822"><tspan font-weight="700">Space:</tspan> O(1) auxiliary — entirely in place.</text>
  <text x="60" y="373" font-size="12" fill="#1a1822"><tspan font-weight="700">Stable:</tspan> No — sift-down swaps reorder equal keys.</text>
  <text x="60" y="393" font-size="12" fill="#1a1822"><tspan font-weight="700">Why slower than quicksort:</tspan> jumps between parent i and children 2i+1/2i+2 cause cache misses;</text>
  <text x="60" y="411" font-size="12" fill="#1a1822">quicksort scans sequentially.</text>
  <text x="60" y="435" font-size="12" fill="#4caf50" font-weight="700">Production role: introsort fallback, Linux kernel sort(), priority queues, top-k selection, Dijkstra.</text>
  <text x="60" y="458" font-size="12" fill="#cc4444" font-weight="700">Never primary sort in cache-sensitive code — use quicksort or merge sort.</text>
  <text x="60" y="478" font-size="11" font-style="italic" fill="#1a1822">Floyd&apos;s insight: build-heap is Θ(n), not Θ(n log n), because most nodes have tiny height.</text>
</svg>
