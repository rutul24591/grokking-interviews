<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Bitmask DP — Encoding Subsets as Integers</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">A subset S ⊆ {0..n−1} is stored as an n-bit integer. Bit i set ⇔ element i ∈ S.</text>

  <!-- Subset encoding -->
  <rect x="40" y="80" width="820" height="120" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="105" font-size="13" font-weight="700" fill="#6d5bd0">Example: n=4 cities, mask = 0b1011 = 11</text>
  <g transform="translate(300,115)" font-size="12" font-family="monospace">
    <rect x="0" y="0" width="40" height="40" fill="#a89bec" stroke="#6d5bd0"/><text x="20" y="26" text-anchor="middle" fill="#fff" font-weight="700">1</text>
    <rect x="40" y="0" width="40" height="40" fill="#e8e4f8" stroke="#6d5bd0"/><text x="60" y="26" text-anchor="middle">0</text>
    <rect x="80" y="0" width="40" height="40" fill="#a89bec" stroke="#6d5bd0"/><text x="100" y="26" text-anchor="middle" fill="#fff" font-weight="700">1</text>
    <rect x="120" y="0" width="40" height="40" fill="#a89bec" stroke="#6d5bd0"/><text x="140" y="26" text-anchor="middle" fill="#fff" font-weight="700">1</text>
    <text x="20" y="58" text-anchor="middle" font-size="10" fill="#1a1822">bit 3</text>
    <text x="60" y="58" text-anchor="middle" font-size="10" fill="#1a1822">bit 2</text>
    <text x="100" y="58" text-anchor="middle" font-size="10" fill="#1a1822">bit 1</text>
    <text x="140" y="58" text-anchor="middle" font-size="10" fill="#1a1822">bit 0</text>
  </g>
  <text x="520" y="140" font-size="11" fill="#1a1822">Represents S = {0, 1, 3}.</text>
  <text x="520" y="158" font-size="11" fill="#1a1822">2ⁿ possible masks total.</text>
  <text x="520" y="180" font-size="11" fill="#cc4444" font-weight="700">n ≤ 20 practical limit.</text>

  <!-- Bitwise ops cheat sheet -->
  <rect x="40" y="220" width="820" height="255" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="245" font-size="14" font-weight="700" fill="#6d5bd0">Bitwise ops for subset manipulation</text>

  <g font-size="11" font-family="monospace">
    <text x="60" y="275" fill="#1a1822">mask | (1 &lt;&lt; i)</text>
    <text x="300" y="275" fill="#1a1822" font-family="system-ui">— add element i to set</text>

    <text x="60" y="295" fill="#1a1822">mask &amp; ~(1 &lt;&lt; i)</text>
    <text x="300" y="295" fill="#1a1822" font-family="system-ui">— remove element i</text>

    <text x="60" y="315" fill="#1a1822">mask &amp; (1 &lt;&lt; i)</text>
    <text x="300" y="315" fill="#1a1822" font-family="system-ui">— is element i present?</text>

    <text x="60" y="335" fill="#1a1822">mask ^ (1 &lt;&lt; i)</text>
    <text x="300" y="335" fill="#1a1822" font-family="system-ui">— toggle element i</text>

    <text x="60" y="355" fill="#1a1822">popcount(mask)</text>
    <text x="300" y="355" fill="#1a1822" font-family="system-ui">— |S|, cardinality</text>

    <text x="60" y="375" fill="#1a1822">(1 &lt;&lt; n) - 1</text>
    <text x="300" y="375" fill="#1a1822" font-family="system-ui">— full set {0..n−1}</text>

    <text x="60" y="395" fill="#1a1822">mask &amp; (mask - 1)</text>
    <text x="300" y="395" fill="#1a1822" font-family="system-ui">— drop lowest set bit</text>

    <text x="60" y="415" fill="#1a1822">mask &amp; -mask</text>
    <text x="300" y="415" fill="#1a1822" font-family="system-ui">— isolate lowest set bit</text>

    <text x="60" y="435" fill="#1a1822">sub = (sub - 1) &amp; mask</text>
    <text x="300" y="435" fill="#1a1822" font-family="system-ui">— iterate all subsets of mask (SOS)</text>

    <text x="60" y="455" fill="#1a1822">submask enumeration: Σ 2^|mask| = 3ⁿ total</text>
  </g>
</svg>
