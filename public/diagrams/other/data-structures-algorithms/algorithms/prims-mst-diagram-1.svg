<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Prim's MST — Grow the Tree From a Frontier</text>

  <rect x="40" y="60" width="820" height="200" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="60" y="85" font-size="13" font-weight="700" fill="#6d5bd0">Algorithm (heap-based)</text>
  <text x="60" y="115" font-size="11" font-family="monospace">in_mst[v] = false; key[v] = ∞; key[start] = 0</text>
  <text x="60" y="133" font-size="11" font-family="monospace">heap.push((0, start))</text>
  <text x="60" y="151" font-size="11" font-family="monospace">while heap:</text>
  <text x="60" y="169" font-size="11" font-family="monospace">  (k, u) = heap.pop()</text>
  <text x="60" y="187" font-size="11" font-family="monospace">  if in_mst[u]: continue</text>
  <text x="60" y="205" font-size="11" font-family="monospace">  in_mst[u] = true; total += k</text>
  <text x="60" y="223" font-size="11" font-family="monospace">  for (v, w) in adj[u] where not in_mst[v]:</text>
  <text x="60" y="241" font-size="11" font-family="monospace">    if w &lt; key[v]: key[v] = w; heap.push((w, v))</text>

  <rect x="40" y="280" width="820" height="195" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="60" y="305" font-size="13" font-weight="700" fill="#4caf50">Complexity</text>
  <text x="60" y="330" font-size="11">• Binary heap (lazy): O((V + E) log V). Default in production.</text>
  <text x="60" y="350" font-size="11">• Fibonacci heap: O(E + V log V). Theoretical optimum, slow in practice.</text>
  <text x="60" y="370" font-size="11">• Array (dense graphs): O(V²). Wins when E ≈ V².</text>
  <text x="60" y="390" font-size="11">• Indexed binary heap (eager): bounded V entries; decrease-key in O(log V).</text>
  <text x="60" y="410" font-size="11">• Memory: O(V) for keys/in-mst; lazy heap may grow to O(E).</text>
  <text x="60" y="430" font-size="11" font-weight="700">Resembles Dijkstra structurally — greedy frontier with min-priority queue.</text>
  <text x="60" y="465" font-size="11" fill="#4caf50" font-weight="700">Difference from Dijkstra: relax with edge weight w, not dist[u] + w.</text>
</svg>
