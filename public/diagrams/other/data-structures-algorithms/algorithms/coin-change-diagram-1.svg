<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, sans-serif">
  <rect width="900" height="500" fill="#f3f1f8"/>
  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1a1822">Coin Change — Min Coins for Amount 11, Denominations {1, 2, 5}</text>
  <text x="450" y="54" text-anchor="middle" font-size="12" fill="#1a1822">dp[a] = min coins summing to a. dp[0] = 0. dp[a] = 1 + min over c in coins of dp[a-c].</text>

  <!-- Table of dp values -->
  <g transform="translate(60,90)" font-size="12" font-family="monospace">
    <text x="0" y="0" font-weight="700" fill="#6d5bd0">amount a:</text>
    <text x="0" y="22" font-weight="700" fill="#6d5bd0">dp[a]    :</text>
    <g>
      <rect x="90" y="-14" width="40" height="22" fill="#e8e4f8" stroke="#6d5bd0"/><text x="110" y="2" text-anchor="middle">0</text>
      <rect x="130" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="150" y="2" text-anchor="middle">1</text>
      <rect x="170" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="190" y="2" text-anchor="middle">2</text>
      <rect x="210" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="230" y="2" text-anchor="middle">3</text>
      <rect x="250" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="270" y="2" text-anchor="middle">4</text>
      <rect x="290" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="310" y="2" text-anchor="middle">5</text>
      <rect x="330" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="350" y="2" text-anchor="middle">6</text>
      <rect x="370" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="390" y="2" text-anchor="middle">7</text>
      <rect x="410" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="430" y="2" text-anchor="middle">8</text>
      <rect x="450" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="470" y="2" text-anchor="middle">9</text>
      <rect x="490" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="510" y="2" text-anchor="middle">10</text>
      <rect x="530" y="-14" width="40" height="22" fill="#cc4444"/><text x="550" y="2" text-anchor="middle" fill="#fff" font-weight="700">11</text>
    </g>
    <g transform="translate(0,22)">
      <rect x="90" y="-14" width="40" height="22" fill="#e8e4f8" stroke="#6d5bd0"/><text x="110" y="2" text-anchor="middle">0</text>
      <rect x="130" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="150" y="2" text-anchor="middle">1</text>
      <rect x="170" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="190" y="2" text-anchor="middle">1</text>
      <rect x="210" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="230" y="2" text-anchor="middle">2</text>
      <rect x="250" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="270" y="2" text-anchor="middle">2</text>
      <rect x="290" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="310" y="2" text-anchor="middle">1</text>
      <rect x="330" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="350" y="2" text-anchor="middle">2</text>
      <rect x="370" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="390" y="2" text-anchor="middle">2</text>
      <rect x="410" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="430" y="2" text-anchor="middle">3</text>
      <rect x="450" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="470" y="2" text-anchor="middle">3</text>
      <rect x="490" y="-14" width="40" height="22" fill="#fff" stroke="#6d5bd0"/><text x="510" y="2" text-anchor="middle">2</text>
      <rect x="530" y="-14" width="40" height="22" fill="#cc4444"/><text x="550" y="2" text-anchor="middle" fill="#fff" font-weight="700">3</text>
    </g>
  </g>

  <!-- Recurrence box -->
  <rect x="60" y="180" width="800" height="125" fill="#fff" stroke="#6d5bd0" stroke-width="2" rx="6"/>
  <text x="80" y="205" font-size="13" font-weight="700" fill="#6d5bd0">Recurrence (min coins)</text>
  <text x="80" y="228" font-size="11" fill="#1a1822" font-family="monospace">dp[0] = 0</text>
  <text x="80" y="246" font-size="11" fill="#1a1822" font-family="monospace">for a in 1..A:</text>
  <text x="80" y="264" font-size="11" fill="#1a1822" font-family="monospace">    dp[a] = 1 + min(dp[a-c] for c in coins if a-c &gt;= 0)   # ∞ if impossible</text>
  <text x="80" y="287" font-size="11" fill="#1a1822">Optimal for a=11: 5 + 5 + 1 → 3 coins. Also 5+3*2, 2+2+2+5. Pointer to argmin recovers the set.</text>

  <!-- Ways count variant -->
  <rect x="60" y="325" width="800" height="150" fill="#fff" stroke="#4caf50" stroke-width="2" rx="6"/>
  <text x="80" y="350" font-size="13" font-weight="700" fill="#4caf50">Number of ways (order outer loop correctly!)</text>
  <text x="80" y="375" font-size="11" fill="#1a1822" font-family="monospace">ways[0] = 1</text>
  <text x="80" y="393" font-size="11" fill="#1a1822" font-family="monospace">for c in coins:          # outer: coins → counts combinations</text>
  <text x="80" y="411" font-size="11" fill="#1a1822" font-family="monospace">    for a in c..A:</text>
  <text x="80" y="429" font-size="11" fill="#1a1822" font-family="monospace">        ways[a] += ways[a-c]</text>
  <text x="80" y="455" font-size="11" fill="#cc4444" font-weight="700">Swap the loops → you’d count ordered sequences (permutations), not combinations.</text>
</svg>
