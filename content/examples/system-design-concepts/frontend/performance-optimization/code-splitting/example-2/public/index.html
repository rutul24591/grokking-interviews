<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Splitting Demo</title>
    <style>
      body { font-family: Inter, system-ui, sans-serif; background: #f6f3ef; color: #1f2937; margin: 0; }
      .shell { max-width: 920px; margin: 0 auto; padding: 48px 24px; }
      .card { background: rgba(255,255,255,0.92); border: 1px solid #e5e7eb; border-radius: 24px; padding: 24px; box-shadow: 0 18px 50px rgba(15,23,42,0.08); }
      button { border: 0; border-radius: 999px; background: #111827; color: white; padding: 12px 18px; cursor: pointer; }
      #results { margin-top: 18px; font-size: 14px; line-height: 1.7; color: #475569; }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <div>Component-level split</div>
        <h1>Load the heavy inspector only when the user asks for it.</h1>
        <p>
          The article search shell ships immediately. The expensive inspector code is behind a dynamic import and
          is only fetched after the button click.
        </p>
        <button id="load-inspector">Open heavy inspector</button>
        <div id="results">Waiting for interaction.</div>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
  </html>
