<html>
  <body>
    <input id="msg" />
    <button onclick="sendMsg()">Send</button>
    <pre id="log"></pre>
    <script>
      const ws = new WebSocket("ws://localhost:5100");
      const log = document.getElementById("log");
      ws.onmessage = (e) => (log.textContent += "\\n" + e.data);
      function sendMsg() {
        ws.send(document.getElementById("msg").value);
      }
    </script>
  </body>
</html>
